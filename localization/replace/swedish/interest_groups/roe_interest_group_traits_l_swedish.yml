l_swedish:
 ig_trait_zaibatsu_cooperation:0 "Consortium Cooperation"
 ig_trait_zaibatsu_cooperation_desc:0 "A healthy relationship between industry and the government benefits everyone. It's in both our interests to ensure this amicable state of affairs continues."
 ig_trait_zaibatsu_withdrawal:0 "Consortium Withdrawal"
 ig_trait_zaibatsu_withdrawal_desc:0 "Our financial health would benefit most through a refocusing on currency speculation and internal re-investment. Public trading is, sadly for the government, not a priority right now."
 ig_trait_stamped_and_signed_desc:0 "Stamps and ledgers are the methods we use to create order out of chaos. Our governance requires an ocean of paper, and it is our task to ensure it circulates flawlessly."
 ig_trait_responsible_government_desc:0 "Our mission is to extend justice and civilization to all—and, of course, to perpetuate the rule which permits this forevermore."
 ig_trait_wiener_walzer:0 "Imperial Myth"
 ig_trait_wiener_walzer_desc:0 "A thousand years the clans have upheld the empire, and a thousand years more they will back the emperor. Long live Dumonia!"
 ig_trait_bad_boyars:0 "Disloyal Clans"
 ig_trait_bad_boyars_desc:0 "So they want to say the emperor is being misled by the clans? Oh, we can show them what the Kinfold is capable of."
 ig_trait_old_lady_of_threadneedle_street:0 "The Golden Trust"
 ig_trait_old_lady_of_threadneedle_street_desc:0 "Come nightfall or high water, dragon or recession, there's one place your assets will be safe: the vaults of the Golden Trust."
 ig_trait_parochial_leadership_desc:0 "In these dark times, it's every goblin for himself, and every province must look to its own welfare first and foremost. It is unreasonable to expect every officer to lead enthusiastically far away from home, when his own hearth could be under threat."
 ig_trait_work_ethic_desc:0 "Remember, money has a generating nature. Money begets money; the production of profits is an act of creation, an honoring and glorification of Mavelis the Gilded's own work."
 ig_trait_heavenly_sovereign:0 "Heavenly Sovereign"
 ig_trait_heavenly_sovereign_desc:0 "Those who rule justly in the name of Kamiros are considered to do so with his divine favor. This font of tradition rightly deserves veneration, and as a nation we should acknowledge that."
 ig_trait_secular_shrine_theory:0 "Ardent Prosyletizers"
 ig_trait_secular_shrine_theory_desc:0 "The faithful of Kamiros do not keep truth to themselves. Righteousness must be carried to every corner of the world, and the impure must be shown the light, whether by word or by flame. Spreading the divine law is not merely encouraged; it is a sacred duty entrusted to every believer."
 ig_trait_haibutsu_kishaku:0 "Zealotry"
 ig_trait_haibutsu_kishaku_desc:0 "Foreign religions must be abolished from the nation and their figures destroyed. Look at what havoc they have caused! Go into their shrines, their temples, their shacks, and show them that they have no place here!"
 ig_trait_khalsa:0 "Warchief's Command"
 ig_trait_khalsa_desc:0 "We have a duty to test our mettle and weed out the weak. As warriors we must fight bravely regardless of the odds and live true to our traditions."
 ig_trait_kar_seva:0 "Mother's Caress"
 ig_trait_kar_seva_desc:0 "The mother watches over us. It behooves us all to engage in honest work and share the fruits of that labor with others, and by those means be closer to her garden."
 ig_trait_rehat:0 "Call of the Hunt"
 ig_trait_rehat_desc:0 "Since the time of the first hunt, our faith has stirred the greatest warriors to join our righteous cause. In these challenging times, soldiers are once again moved by faith to serve under our banners."
 ig_arcane_intervention:0 "Arcane Intervention"
 ig_arcane_intervention_desc:0 "We may have a reputation as withdrawn recluses, but let it be known that we are very capable of solving the issues we see before us if we feel like our interests are fairly addressed."
 ig_mystical_traditions:0 "Mystical Tradition"
 ig_mystical_traditions_desc:0 "The Mages adhere to their ancient and esoteric customs which contribute to the nation's rich cultural tapestry, fostering a sense of wonder and respect among the populace. However, their practices are largely self-contained, offering little direct benefit to the broader society."
 ig_isolationist:0 "Isolationist"
 ig_isolationist_desc:0 "The Mages often choose to remain detached from mainstream society. Their insular nature leads to a reluctance to engage in social and economic activities, resulting in diffulty for productivity and assimilation. This isolationist stance creates friction and stifles the nation's overall development."
 ig_trait_red_hand:0 "The Red Hand"
 ig_trait_red_hand_desc:0 "There is no room for dissent under the the crimson fist of the Yernit."
 ig_trait_raider_logistics:0 "Officer Loyalties"
 ig_trait_raider_logistics_desc:0 "Goblins are particularly spineless creatures — until they fall under the command of charismatic or ruthless leaders. While effective officers are rare among goblins, where they do exist, you can no longer count on goblins fleeing at the first sign of trouble."
 ig_trait_sparkpowder_legacy:0 "Sparkpowder Legacy"
 ig_trait_sparkpowder_legacy_desc:0 "The invention goblinkind is most renowned for is the firearm. Unsurprisingly, goblins continue to devise new ways to eliminate everyone around them."
 ig_trait_yulug_sparkpowder_legacy:0 "Discipline Without Equal"
 ig_trait_yulug_sparkpowder_legacy_desc:0 "No matter what fate befalls the hobgoblins of Exether, one thing will remain constant: those under their command will be drilled to the bone and discover a courage they may never have known they possessed."
 ig_trait_ogre_violence:0 "Unbridled Brutality"
 ig_trait_ogre_violence_desc:0 "Ogres are violent creatures naturally. Their tendencies for destruction are terminal in nature and grow more severe the more they succeed on the field of battle. Once a stupor begins, there will be no survivors."
 ig_trait_ogre_greed:0 "Endless Greed"
 ig_trait_ogre_greed_desc:0 "Ogres are inherently violent creatures. Their destructive impulses intensify with each success on the battlefield. Once a rampage begins, there are no survivors."
 ig_trait_dwarf_reluctance:0 "Dwarf Stubbornness"
 ig_trait_dwarf_reluctance_desc:0 "Once the troops lose faith in their commanders it becomes increasingly difficult to get stubborn Dwarves to leave their positions and attack, for the default mentality of any proud Dwarf is an unflinching defensive posture."
 ig_trait_dwarf_resilience:0 "The Best Defense is the Best Offence"
 ig_trait_dwarf_resilience_desc:0 "Throughout history, the unyielding spirit of dwarves is legendary. Like the mighty mountains where they slumbered for millennia, dwarves become an unassailable force when properly inspired."
 ig_trait_orcish_fury:0 "Warrior's Oath"
 ig_trait_orcish_fury_desc:0 "Any orc general worth their salt can ignite the ancestral fury of their warriors when their homes are threatened. Woe to any invader who faces such leaders."
 ig_trait_supernational_influence:0 "Supernational Influence"
 ig_trait_supernational_influence_desc:0 "#lore We have a duty to maintain international peace and security, develop friendly relations among nations, achieve international cooperation, and be a centre for harmonizing the actions of nations!#!"
 ig_trait_shield_of_humanity:0 "Shield of Humanity"
 ig_trait_shield_of_humanity_desc:0 "Every human, no matter their origin, is the charge of the Church.  We shall celebrate their cultures even if the State seeks to erase them."
 ig_trait_secular_church_theory:0 "Secular Church Theory"
 ig_trait_secular_church_theory_desc:0 "Churches are an inherent belief of Humanity; they exist intitutionally for the purpose of public rituals of the state. The Church of Man and its offshoots are ideological: they are an expression of patriotism whose attendance we expect of every citizen."
 ig_trait_indulgences:0 "Selling of Indulgences"
 ig_trait_indulgences_desc:0 "Where there have been moral failings, there must be recompense.  Such recompense will be catergorized, quantified, and ultimately monetized to atone for immoral leadership."
 ig_trait_unfulfilled_quests:0 "Unfulfilled Quests"
 ig_trait_unfulfilled_quests_desc:0 "Our Adventurers are refusing to take Quests under the current circumstances. Should this stay the case we should expect great trouble as these issues stay unresolved."
 ig_trait_daring_pioneers:0 "Daring Pioneers"
 ig_trait_daring_pioneers_desc:0 "None as daring, as brave, as skilled as our Adventurers. They take great risks, and find great rewards waiting for them. And thus the Guild prospers."
 ig_trait_adventurous_spirit:0 "Adventurous Spirit"
 ig_trait_adventurous_spirit_desc:0 "An Adventurer lives a wild life, full of danger, adrenaline and riches. This is not for everyone, but for those who posess the right Spirit the lifestyle has an irresistable call. And nowhere is the Adventurer Spirit as pure and true as here!"
 ig_trait_defenders_of_the_forest:0 "Defenders of the Forest"
 ig_trait_defenders_of_the_forest_desc:0 "These lands belong to us, and it is up to us to defend them."
 ig_trait_gardentenders:0 "Garden-tenders"
 ig_trait_gardentenders_desc:0 "A well-tended garden can provide for an entire household. We are happy to share."
 ig_trait_guests_of_the_forest:0 "Guests of the Forest"
 ig_trait_guests_of_the_forest_desc:0 "WIP"
