 rubber_events.1.t:0 "Gummi-rus"
 rubber_events.1.d:0 "Gummiträd har odlats framgångsrikt i [ROOT.GetState.GetName]. Eftersom dessa träd är ömtåliga och kräver svåra odlingsförhållanden är denna bedrift särskilt betydelsefull."
 rubber_events.1.f:0 "Monopolet på gummi från Amazonas är äntligen över! De där vackra träden har bestämt sig för att växa någon annanstans efter flera misslyckade försök – de där envisa små rackarna – och nu är det vår plikt att sätta stopp för de giriga magnaternas imperier."
 rubber_events.1.a:0 "Samla alla och[SCOPE.sState('rubber_state').GetName] sätt igång med arbetet."
 rubber_events.1.b:0 "[SCOPE.sBuilding('rubber_plantation').GetName]En anledning för oss att arbeta hårdare."
 rubber_events.1.c:0 "Låt gummi alltid vara drivkraften bakom ny tillväxt."
 rubber_events.1.e:0 "Fokusera alltid på våra befintliga plantager."
 rubber_always_spread_tt:0 "Denna händelse kommer att döljas i framtiden, och ovanstående effekter kommer att tillämpas automatiskt varje gång det uppstår en gummirush."
 rubber_always_concentrate_tt:0 "Denna händelse kommer att döljas i framtiden, och ovanstående effekter kommer automatiskt att tillämpas på den[concept_state]med flest[SCOPE.sBuilding('rubber_plantation').GetName]  när det finns risk för en gummirush."
 state_rubber_modifier:0 "Gummi-rus"
 state_rubber_nexus_modifier:0 "Ruthless Rubber"
 children_rights_events.1.t:0 "Det osynliga ropet"
 children_rights_events.1.d:0 "På grund av de omänskliga förhållanden som barnen utsätts för på sina arbetsplatser har många familjer i[SCOPE.sState('child_labor_state').GetName]  valt att gömma undan sina barn i hopp om att de inte ska tvingas ut på arbete."
 children_rights_events.1.f:0 "”De sa åt oss att vara tysta, sir, så det var precis vad vi gjorde. Min bror och jag stod där, tysta som en grav, förstår ni, jag höll andan så gott jag kunde, men det var för mörkt, så jag tänkte att de redan hade gått. De skulle inte hitta oss här, förstår ni, det var vad mamma sa, men det var för mörkt, herr, och det var kallt.”"
 children_rights_events.1.a:0 "Barn? Vilka barn?"
 children_rights_events.1.b:0 "Det vore synd om de skulle gömma sig i de här övergivna husen..."
 hidden_children_modifier:0 "Dolda barn"
 helped_hidden_children_modifier:0 "Hjälpte till att gömma barn"
 children_rights_events.2.t:0 "En bitter sanning"
 children_rights_events.2.d:0 "Med tanke på de låga lönerna som arbetarna i[SCOPE.sState('child_labor_state').GetName]  får tvingas allt fler föräldrar att skicka ut sina barn i arbete för att bidra till familjens försörjning."
 children_rights_events.2.f:0 "”Det här är rena galenskapen! Hur ska vi kunna hjälpa dessa människor om de själva tvingar sina barn att arbeta?! Vi måste göra något! Stoppa omedelbart detta barbariska beslut!” \n\n”Tja, det verkar ju ganska uppenbart att det här inte är något de skulle vilja för sina egna barn, om de hade andra alternativ, eller hur? Att döma dessa stackars människor utifrån deras överlevnadsbeslut hjälper dem inte heller.”"
 children_rights_events.2.a:0 "Vi måste sätta stopp för detta."
 children_rights_events.2.b:0 "De gör vad de måste göra."
 stopped_families_modifier:0 "Debatten om barnarbete"
 allowed_families_send_their_children_modifier:0 "Eftergifter i fråga om barnarbete"
 didnt_allow_families_send_their_children_modifier:0 "Inga eftergifter när det gäller barnarbete"
 children_rights_events.3.t:0 "Oundvikliga skador"
 children_rights_events.3.d:0 "[SCOPE.sLaw('current_law_scope').GetName]I och med regeringens satsning på har vuxna män tvingats fylla den lucka som de skulle lämna efter sig. Deras kroppar är dock för stora och fingrarna för breda för detta, vilket har lett till att antalet arbetsolyckor har ökat."
 children_rights_events.3.f:0 "”Deras skrik fyllde fabriken, deras blod täckte maskinerna som om de hade ett eget hjärta. Det är tionde gången på en vecka som en man skär sig i fingret när han försöker hantera någon liten maskin, som tidigare endast hanterats av ett barns smala händer. Protesterna har tilltagit: \"Om inte de, så är det vi.\"\""
 children_rights_events.3.a:0 "Ingen borde behöva utföra det här arbetet."
 children_rights_events.3.b:0 "Barnen kommer inte tillbaka, så det är bäst att de vänjer sig vid det."
 workers_appeased_modifier:0 "Blidkade arbetarna"
 confronted_workers_modifier:0 "Konfronterade arbetarna"
 everfrost_expedition:0 "Everfrostern-expeditionen"
 everfrost_expedition_desc:0 "Tack vare teknikens underverk och våra upptäcktsresandes hjältemod kan det äntligen bli möjligt att nå in i den evigt frusna kontinentens inre. Tävlingen har börjat, och vi måste vara först framme vid polen!"
 cold.101.t:0 "Expedition till Everfrosterna"
 cold.101.d:0 "Kontinenten Everfrostern är fortfarande nästan helt outforskad. En expedition till denna vidsträckta, frusna ödemark skulle bli kostsam och fylld av faror, men äran att vara den första att nå polen skulle vara oerhörd."
 cold.101.f:0 "Snart fylls salarna vid världens mest prestigefyllda vetenskapsakademier av mummel och viskningar, när utsikterna att göra den sista geografiska upptäckten blir mycket mer än bara en feberdröm."
 cold.101.a:0 "Jag vet precis vem som är rätt man för jobbet."
 cold.101.b:0 "Har statskassan råd med en sådan utgift?"
 cold.102.t:0 "En polarforskare"
 cold.102.d:0 "Vi måste välja en ledare för den kommande expeditionen till kontinenten Everfrostern. Några lovande kandidater har utmärkt sig."
 cold.102.f:0 "Det är få som kan uppskatta denna hjältemodiga bedrift till fullo, detta lysande bevis på mänskligt mod och handlingskraft. Dessa män kommer att segla rakt in i hjärtat av packisen, något som alla tidigare upptäcktsresande har betraktat som en säker död. Dessa män är hjältar – hjältar i ordets högsta bemärkelse."
 cold.102.a:0 "[SCOPE.sCharacter('expedition_leader_1').GetFullName] är en erfaren polarforskare."
 cold.102.b:0 "[SCOPE.sCharacter('expedition_leader_2').GetFullName] kommer att leda oss till ära."
 cold.102.c:0 "[SCOPE.sCharacter('expedition_leader_3').GetFullName] har aldrig svikit oss tidigare."
 cold.102.e:0 "[SCOPE.sCharacter('expedition_leader_4').GetFullName] är den som är bäst förberedd."
 cold.1.t:0 "I galenskapens berg"
 cold.1.d:0 "Expeditionen får syn på de två vulkaniska topparna Erebus och Terror vid horisonten. När de först upptäcktes av James Clark Ross konstaterades det att Erebus var i utbrott. Lyckligtvis ser vi att bergen nu är lugna."
 cold.1.f:0 "”De reste sig hotfullt mot den västra himlen; vilket gjorde att vi kunde urskilja olika kala, ödsliga, svartaktiga bergstoppar och uppleva den märkliga känslan av fantasi som de väckte när de betraktades i det rödaktiga antarktiska ljuset mot den suggestiva bakgrunden av skimrande isdammmoln.”"
 cold.1.a:0 "Vi borde gå vidare snabbt."
 cold.1.b:0 "Samla in geologiska prover."
 cold.1.c:0 "Bestig Mount Erebus. Vi kommer att vara de första som når kratern!"
 antarctic_mountains_modifier:0 "Undersökte Polarbergen"
 cold.2.t:0 "Halvvägsstugan"
 cold.2.d:0 "Expeditionen går i land på den frusna kusten på kontinenten Everfrostern. På en relativt lättillgänglig plats föreslår en besättningsmedlem att vi bygger en hållbar stuga där vi kan vila och lämna förnödenheter inför återresan, och kanske till och med för framtida upptäcktsresande."
 cold.2.d2:0 "Expeditionen går i land på den frusna kusten på kontinenten Everfrostern och möts av den betryggande synen av en träkoja. Den är bara lite insnöad och kan lätt göras beboelig, och besättningen upptäcker att det finns rikliga matförråd därinne."
 cold.2.f:0 "”Det är förstås kallt i stugan, men i alla andra avseenden har vi det alldeles utmärkt. Det finns obegränsade mängder kex, och vår upptäckt vid Pram Point innebär en obegränsad tillgång på sälkött. En tom fotogenburk och några eldfast tegelstenar har omvandlats till en utmärkt liten kamin, som har anslutits till det gamla kaminröret. Redan nu kan vi betrakta den som ett tillfälligt hem.”"
 cold.2.a:0 "Den här stugan ska stå sig genom tiderna."
 cold.2.b:0 "Stugan behöver bara hålla tills vi kommer tillbaka."
 cold.2.c:0 "Vi borde vila och fylla på förråden innan vi fortsätter."
 discovery_hut_tt:0 "Framtida upptäcktsresande kommer att göra #tooltippable;positive_value;TOOLTIP:expedition_progress_explanation_tt framsteg#! när de besöker stugan."
 cold.3.t:0 "Missade målet"
 cold.3.d:0 "Expeditionen har insett att de har kommit för långt på vägen mot nästa förrådsdepå."
 cold.3.f:0 "”När vi fortsatte vår väg genom det obarmhärtiga vita hade snöhögarna blivit allt mer sällsynta. Eller så trodde vi i alla fall. ’Det är snart kväll.’ Vi stannade alla till. ’Har vi tillräckligt med mat?’, lyckades jag fråga. Vi visste alla svaret, vi visste alla varför jag frågade. En enda nick, ingen sa något. Vi visste alla att de där lögnerna var lika vita som det här landskapet.”"
 cold.3.f2:0 "”Allteftersom vi fortsatte vår väg genom den obarmhärtiga vitheten hade snöhögarna blivit allt mer sällsynta. Eller så trodde vi i alla fall. Gud hjälpe oss, vi orkar inte fortsätta dra så här, det är säkert. Bland oss själva är vi oändligt glada, men vad var och en känner i sitt hjärta kan jag bara gissa.”"
 cold.3.a:0 "Vi behöver de där förnödenheterna. Vänd om."
 cold.3.b:0 "Fortsätt framåt, vi klarar oss utan förnödenheterna."
 cold.4.t:0 "Slutet är nära"
 cold.4.d:0 "Expeditionen är dömd att misslyckas. Helt utmattade, förfrusna och utan förnödenheter återstår inget annat än att invänta dödens kalla omfamning."
 cold.4.f:0 "”Varje dag har vi varit redo att ge oss av mot vårt depå 11 miles bort, men utanför tältdörren råder fortfarande en scen av virvlande snödrivor. Jag tror inte att vi kan hoppas på något bättre nu. Vi ska hålla ut till slutet, men vi blir förstås allt svagare, och slutet kan inte vara långt borta. Det är synd, men jag tror inte att jag kan skriva mer.” \n\n”För Guds skull, ta hand om våra män.”"
 cold.4.a:0 "Jag ska bara gå ut ett tag, det kan ta lite tid."
 cold.5.t:0 "Sydpolen"
 cold.5.d:0 "Expeditionen har nått sitt mål: Sydpolen![SCOPE.sCharacter('expedition_leader').GetFullName]  De sätter stolt upp ett tält med  flaggan[SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting], och besättningen skålar med en kopp kakao för att fira."
 cold.5.d2:0 "Expeditionen når Sydpolen, men upptäcker där ett tält med flaggan[SCOPE.sCountry('pole_winner_country').GetAdjectiveNoFormatting]. Någon har hunnit före oss till vårt mål!"
 cold.5.f:0 "”Polen. Obefläckad, oklanderlig. Luften glittrade som om snön hade ett eget ljus; under våra frusna fötter måste det ha legat en hemlig sol. \n\n’Den är här.’ Och vi vidtog åtgärder, vi registrerade varje möjlig avvikelse: \”Det är här, flytta fyren\”, och sedan var det här, rakt framför mina ögon, och sedan var det där, närmare slädarna, men det var här. Det var äntligen här, och dess reflekterade blekhet lyser upp våra trötta ansikten. \”Mina herrar, nu kan vi vila.\” \n\nDet är här.\”"
 cold.5.a:0 "Lyckades! Men nu börjar den svåra resan norrut..."
 cold.5.b:0 "Förbannat! Och nu börjar den strapatsrika resan norrut..."
 cold.6.t:0 "Hundkött"
 cold.6.d:0 "Förnödenheterna börjar ta slut för upptäcktsresande på Everfrostern. Besättningen diskuterar om det vore klokt att avliva några av slädhundarna och dela upp köttet mellan männen och de kvarvarande hundarna för att öka sina chanser att överleva."
 cold.6.f:0 "”Man kan inte lugnt förhålla sig till mordet på djur som besitter en sådan intelligens och individualitet, som ofta har så förtjusande egenskaper och som man mycket väl kan ha lärt sig att betrakta som vänner och följeslagare.”\n\n ”Vi har kommit överens om att inte dra oss för någonting för att nå vårt mål! Och dessutom, om vi inte gör detta, kommer hundarna ändå säkert att dö av undernäring eller utmattning.”"
 cold.6.a:0 "Det är det mest praktiska man kan göra."
 cold.6.b:0 "Vi kommer inte att sänka oss till sådan barbarism!"
 pet_dog.tt:0 "Du klappar hundarna och fortsätter resan."
 ate_dogs_modifier:0 "Åt upp hundarna"
 cold.7.t:0 "Hemkomst"
 cold.7.d:0 "Besättningen på Everfrostern-expeditionen har äntligen återvänt hem. Även om de inte lyckades uppnå sitt mål har deras insatser bidragit till den vetenskapliga utvecklingen och banat väg för framtida upptäcktsresande."
 cold.7.d2:0 "Besättningen på Everfrostern-expeditionen har äntligen återvänt hem. Som de första människorna någonsin som nått Sydpolen hyllas de som[SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting]hjältar."
 cold.7.f:0 "”Ära. Seger. Jubel och parader. Absurda summor pengar. Vänliga ord. Hjältens skugga som ständigt faller över ens eget namn. Besättningen. Den där underbara skaran av oböjliga jävlar. Hemmet. Dagarna. Nätter. Hur mycket jag hade saknat dagarna och nätterna, deras beräknade följd. Rutins tråkighet. Att vakna upp i min säng. Varm choklad. Kaffe. Te. Mina favoritbakelser. Hur mycket jag hade saknat bullret från den här gatan.”"
 cold.7.a:0 "Nästa gång kommer vi att lyckas."
 cold.7.b:0 "De gör sitt land heder."
 succesfull_south_pole_modifier:0 "Framgångsrik polarforskare"
 cold.8.t:0 "Packis"
 cold.8.d:0 "När expeditionen närmar sig sitt mål börjar vattenytan täckas av isbitar. Fartygets skrov försöker ta sig fram genom den kalla ismassan genom att rammma och krossa isen, men isen blir allt tjockare ju längre de kommer."
 cold.8.f:0 "”Det vore inte klokt att erkänna att en sådan fara väckte mitt intresse, men att vårt slutmål nu var nära förestående – vilket det allt tjockare havsiset som omgav oss vittnade om – kunde inte annat än att både skrämma och fascinera mig på samma gång. Det snötäcke som sträckte sig över havet hade hindrat vattnet från att spegla våra silhuetter eller vårt skepps – det fanns inget annat att se: det var bara vi och polen.”"
 cold.8.a:0 "Framåt!"
 cold.8.b:0 "Vi måste lita [SCOPE.sCharacter('expedition_leader').GetFullName]på deras sakkunskap."
 cold.9.t:0 "Isbunden"
 cold.9.d:0 "En serie tryckvågor slog mot expeditionens fartyg, vilket fick isen runt omkring att brytas upp i stora bitar. Efter ett ögonblick av triumf fastnar snart två isflak på styrbords sida, ett vid fören och ett vid aktern. Besättningen samlas för att lägga upp en plan för att få loss fartyget."
 cold.9.d2:0 "Att bryta sig fram genom packisen visade sig vara ett sisyfosarbete. Ännu värre är att den framryckande isen krossar fartyget. Även om det vore möjligt att befria henne från isen är hon inte längre sjövärdig. Det enda alternativet som återstår är att överge fartyget och hoppas på att till fots kunna hitta en valfångststation."
 cold.9.f:0 "”Kylan hade nått oss. Plankorna av antik ek var nu blygt dolda bakom snötyngda lager av vitt, och hela skeppet skulle ha verkat övergivet om det inte vore för de fladdrande ljusen som vi lyckats hålla tända. Isen omslöt oss och började med sin naturliga elegans tränga in i vårt dyrbara skydd.”"
 cold.9.a:0 "Vi ska bryta oss igenom isen!"
 cold.9.b:0 "Överge skeppet."
 cold.10.t:0 "Valfångststation"
 cold.10.d:0 "[SCOPE.sCharacter('expedition_leader').GetFullName] har framgångsrikt lett expeditionsbesättningen till en valfångststation på Sydgeorgien, efter att ha trotsat resan från Elephant Island i en öppen livbåt med knappa förråd. Berättelserna om [SCOPE.sCharacter('expedition_leader').GetFirstName]hans hjältemod sprids över hela landet trots att expeditionen misslyckades."
 cold.10.f:0 "”Under vår sista natt då vi campade under det obarmhärtiga vita ljuset hade vår kock frågat mig om det hade varit ett svårt beslut att ’vända om’, som han uttryckte det, ’efter att ha kommit så här långt, var det inte svårt?’”. Nej, ville jag säga. Nej, det var det inte. \n\nVilken glädje kunde polen ge en man, instängd mellan havet och bergskedjorna, en utsvulten silhuett av dimma och kyla? Om den torra luften hade blåst lite starkare, skulle vi alla ha skingrats, som genomskinliga snöflingor.”"
 cold.10.a:0 "Tre hurrarop för [SCOPE.sCharacter('expedition_leader').GetFullName]!"
 safe_polar_exp_modifier:0 "Polar Savior"
 cold.11.t:0 "Den stora isbarriären"
 cold.11.d:0 "När expeditionens fartyg svänger åt sidan ser besättningen med vördnad en hög, lodrät isvägg – deras enda väg in till kontinenten."
 cold.11.f:0 "”Och där stod den. Om den hade haft ett ansikte, vet jag att den skulle ha skrattat åt oss. Det där löjliga knakande ljudet – isen som bröts. Och där går den, där, en isblock faller ner i havet. Hotfullt. Ödesdigert. Det är i riktning mot vårt skepp. Denna stund hade förföljt oss i tankarna ända sedan vi lämnade den senaste hamnen. Seglingen hade varit svår, men att ge sig in på den okända kontinenten skulle vara som att sjunka ner i djupet av ett fruset helvete.”"
 cold.11.a:0 "Vi måste bestiga det!"
 cold.11.b:0 "Vi borde ta en omväg runt sprickorna."
 cold.12.t:0 "De transantarktiska bergen"
 cold.12.d:0 "Expeditionen har tagit sig fram genom oändliga dagar av snömarsch tills den stötte på de oöverstigliga Transantarktiska bergen. En ny utmaning väntar, eftersom rutterna dit knappt har dokumenterats."
 cold.12.f:0 "”Den ständigt grå himlen hade försatt oss i ett tillstånd av grym bedövning, oförmögna att urskilja gränsen mellan snö och atmosfär, mellan snö och fotspår, mellan snö och oss själva. En skarpare grå nyans bredde ut sig framför oss, och i dess bedövning fanns en välbekant tröst. \n\nStenmuren var täckt av vitt, och det tog oss nästan hela dagen att inse att det inte var någon vertikal himmel, ingen himmel som föll över oss, den sista sången, de dömda trumpeterna, en hägring. Det var berg.”"
 cold.12.a:0 "Vi hittar en ny väg."
 cold.12.b:0 "Vi kommer att använda en beprövad metod."
 cold.13.t:0 "Märkliga märken"
 cold.13.d:0 "Under expeditionens framfart genom snön har man upptäckt en märklig sten med okända märken, som delvis var begravd under deras fötter."
 cold.13.f:0 "”En ljus sten grävdes upp just i morse. Dess släta yta och perfekta rundning avbröts endast av ett mönster av okända märken, som alla förekom i en ordning som ingen av våra män vågade tyda. När man håller den mellan ögat och solen varierar dess färgton, till synes beroende på tidpunkten på dagen; nu vit, nu gul, i skymningen – grön.”"
 cold.13.f2:0 "”En ljus sten grävdes upp just i morse. Dess släta yta och perfekta rundning avbröts endast av ett mönster av okända tecken, som alla förekom i en ordning som till en början var obegriplig, men vars innebörd jag insåg efter ett tag. Jag kunde inte språket, jag kände inte ens igen de förvrängda orden var för sig, men tillsammans – tillsammans förstod jag. De blir hungriga, förstår du. Hungriga.”"
 cold.13.a:0 "Stanna upp och studera det."
 cold.13.b:0 "Strunta i det."
 je_antarctica:0 "Everfrostern-expeditionen"
 expedition_goal:0 "Uppnå en framstegsnivå på 8 eller högre."
 je_expedition_fail:0 "Expeditionen når en farograd på 8 eller högre."
