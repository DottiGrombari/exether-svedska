 coup_pulse_events.1.t:0 "General anklagad för komplott"
 coup_pulse_events.1.d:0 "[SCOPE.sCharacter('accused_general').GetFullName], en general knuten till [SCOPE.gsInterestGroup('accused_general_ig').GetName], har anklagats för grov illojalitet.[SCOPE.sCharacter('accused_general').GetFullName]  hävdar att detta inte är något annat än en komplott av subversiva krafter för att undanröja ett hinder för deras makt."
 coup_pulse_events.1.f:0 "”Jag försäkrar er, mina herrar, att jag inte har någon kännedom om någon av de handlingar som beskrivs i dessa påstådda brev från mig. Om ni måste gå igenom mina personliga tillhörigheter för att rentvå mig, är ni välkomna att göra det.”"
 coup_pulse_events.1.a:0 "Vi kan inte ta några risker när det gäller våra generalers lojalitet."
 coup_pulse_events.1.a.tt:0 "[SCOPE.sCharacter('accused_general').GetFullName] kommer att tas ur bruk."
 coup_pulse_events.1.b:0 "Vem var det egentligen som framförde denna anklagelse?"
 coup_pulse_events.2.t:0 "En växande klyfta"
 coup_pulse_events.2.d:0 "[SCOPE.gsInterestGroup('conflicted_loyalty_ig').GetName]De, trots att de står i nära förbindelse med[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName] s [SCOPE.sParty('conflicted_loyalty_party').GetName], motsätter sig tanken på att störta regeringen med våld."
 coup_pulse_events.2.f:0 "”Vilken anledning finns det att fortsätta vårt samarbete? Först distanserade du dig, och nu talas det om att man vill ifrågasätta själva grundvalarna för den statliga ordningen. Jag begär att du omedelbart redogör för dessa anklagelser, annars kommer nästa förslag som läggs fram att vara min avskedsansökan.”"
 coup_pulse_events.2.a:0 "Att hävda att man har goda avsikter kan påverka till och med den renaste själen."
 coup_pulse_events.2.b:0 "Deras kärlek är överflödig. Det enda som spelar någon roll är att de lyder."
 coup_pulse_events.3.t:0 "Kritiskt stöd"
 coup_pulse_events.3.d:0 "En grupp som företräder de vanliga oppositionskrafterna i landet[SCOPE.gsInterestGroup('critical_support_ig').GetName] har vänt sig till regeringen för att föreslå ett samarbete mot ”krafter som skulle vilja störta regeringen i[ROOT.GetCountry.GetName] landet”."
 coup_pulse_events.3.f:0 "”Vi måste verkligen hålla ihop, annars kommer vi utan tvekan alla att hängas var för sig.” \n\n– Benjamin Franklin"
 coup_pulse_events.3.a:0 "Ta emot deras lyckönskningar... för tillfället."
 coup_pulse_events.3.b:0 "Vi kommer inte att underlätta deras egen komplott mot oss."
 coup_pulse_events.4.t:0 "Oro bland investerare"
 coup_pulse_events.4.d:0 "I takt med att[ROOT.GetCountry.GetName] oron för den[SCOPE.gsInterestGroup('investor_ig').GetName] nationella stabiliteten ökar har investerare med kopplingar till  hotat att dra tillbaka sina investeringar från flera fabriker i [SCOPE.sState('investor_affected_state').GetName]."
 coup_pulse_events.4.f:0 "Skräcken var påtaglig på gatorna och spred sig bland förbipasserande som en giftig dimma. De gick med snabba steg, kastade smygande blickar och talade tyst.\n\nMannen i höghatten vände sig till sin kollega, som fortfarande stirrade ut genom restaurangfönstret. \n\n”Det här är inget sätt att styra ett land på, och inget land att driva affärer i.”"
 coup_pulse_events.4.a:0 "[SCOPE.gsInterestGroup('investor_ig').GetName]Blidka  genom att godta en räntehöjning."
 coup_pulse_events.4.b:0 "Om de verkligen var bekymrade skulle de stå upp för [ROOT.GetCountry.GetName]."
 coup_pulse_events.5.t:0 "Det rökiga bakrummet"
 coup_pulse_events.5.d:0 "Personer med kopplingar till[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle]  [SCOPE.sCharacter('golpista_general').GetLastName] och[SCOPE.gsInterestGroup('golpista_ig').GetName]   har tagit kontakt med medlemmar av [SCOPE.gsInterestGroup('approached_ig').GetName], i hopp om att få stöd i en hypotetisk komplott mot regeringen."
 coup_pulse_events.5.f:0 "”Jag är väl medveten om att våra relationer har varit spända tidigare, men jag hoppas att det radikala hot som vår nation står inför, och behovet av beslutsamma åtgärder, är tillräckligt för att förena oss vid detta avgörande tillfälle...”"
 coup_pulse_events.5.a:0 "Ett samarbete skulle kunna vara givande för båda parter."
 coup_pulse_events.5.b:0 "De[SCOPE.gsInterestGroup('approached_ig').GetName]  visar inget intresse för dessa intriger."
 coup_pulse_events.6.t:0 "Trånga gator"
 coup_pulse_events.6.d:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]I takt med att ryktena om en komplott för att störta den sittande regeringen tar fart har[SCOPE.gsInterestGroup('pro_government_ig').GetName]  mobiliserat stöd för den folkvalda regeringen. Demonstranter som uttrycker sitt stöd för  har fyllt gatorna i [SCOPE.sState('protest_state').GetCityHubName]."
 coup_pulse_events.6.f:0 "”Stå upp för era principer, era fegisar, innan ni inte har något att gömma er bakom!”"
 coup_pulse_events.6.a:0 "De har intagit en ledande roll i kampen för rättvisa."
 coup_pulse_events.6.b:0 "Ett kaotiskt virrvarr av lågklassig mänsklighet."
 coup_pulse_events.7.t:0 "Ett skott i blindo"
 coup_pulse_events.7.d:0 "[SCOPE.gsInterestGroup('assassination_ig').GetName]En framstående funktionär och anhängare av  har skjutits mitt på ljusa dagen på gatorna i [SCOPE.sState('assassination_state').GetCityHubName]. Den lokala polisen verkar inte intresserad av att utreda saken vidare."
 coup_pulse_events.7.f:0 "Polismannen som stod vid hörnet försökte att inte rycka till när skottet slet genom luften och åskådarnas skrik började eka över gatorna. I slutändan, intalade han sig själv, var den nya och tunga vikten i hans myntpung mer än tillräcklig för att uppväga alla hans tvivel."
 coup_pulse_events.7.a:0 "Rättvisa måste skipas."
 coup_pulse_events.7.b:0 "Vi står vid kanten av en avgrund och får inte falla ner i den."
 coup_pulse_events.8.t:0 "Fiendens fiende"
 coup_pulse_events.8.d:0 "[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName]Hans allierade inom diplomatkåren har erbjudit sig att vända sig till regeringen[SCOPE.sCountry('coup_sponsor_country').GetAdjective] för att få stöd i deras strävan efter makten, i utbyte mot vissa framtida åtaganden."
 coup_pulse_events.8.f:0 "”Man säger att ingenting blir gjort här utan att[SCOPE.sCountry('coup_sponsor_country').GetAdjectiveNoFormatting]de ger sitt godkännande. Jag vill gärna tro att det inte stämmer. Men om vi vill se till att allt går enligt planerna...” \n\nMannen i kostym nickade långsamt åt den stammande tjänstemannen. \n\n”Och vad säger du om deras förslag?”"
 coup_pulse_events.8.a:0 "Denna lösning är acceptabel för tillfället."
 coup_pulse_events.8.b:0 "När har[SCOPE.sCountry('coup_sponsor_country').GetAdjective]det någonsin gått bra att lägga sig i?"
 coup_pulse_events.9.t:0 "Informanten"
 coup_pulse_events.9.d:0 "En av[SCOPE.sCharacter('golpista_general').GetPrimaryRoleTitle] [SCOPE.sCharacter('golpista_general').GetLastName] s medarbetare har fallit ut genom fönstret på en[SCOPE.sBuilding('informant_building').GetName]  i [SCOPE.sState('informant_state').GetName], och skadades allvarligt vid nedslaget. Han har erbjudit regeringen information i utbyte mot sin säkerhet."
 coup_pulse_events.9.f:0 "Det hördes ett skrik, ett vrål och ljudet av något tungt som slog i kullerstensgatan. Genom det hastigt öppnade fönstret kunde man nästan se en silhuett vända sig om och smyga iväg. Där det tidigare bara hade funnits slitna stenar låg nu en gestalt i en pöl av blod som spred sig."
 coup_pulse_events.9.a:0 "Han skulle kunna bli en ovärderlig tillgång."
 coup_pulse_events.9.b:0 "Han kommer inte att överleva för att berätta vad som hände."
 coup_pulse_events.10.t:0 "I uppror"
 coup_pulse_events.10.d:0 "[SCOPE.sBuilding('barracks_theft_building').GetName] I[SCOPE.sState('barracks_theft_state').GetName]  har man på senare tid rapporterat om ett stort antal mystiska försvinnanden av skjutvapen."
 coup_pulse_events.10.f:0 "”Armén slösar bort tillräckligt med ammunition varje dag för att utrusta ett helt regemente på skjutbanan. Vad är väl hundra skott jämfört med den enorma förbrukningen? Vad är väl tusen?” \n\n”Skillnaden är att vi på skjutbanan kan vara säkra på att den inte flyger mot oss.”"
 coup_pulse_events.10.a:0 "De[SCOPE.gsInterestGroup('armed_forces_ig').GetName]har sina egna behov."
 coup_pulse_events.10.b:0 "Detta är ett tydligt bevis på att det rör sig om någon form av komplott."
 coup_pulse_events.11.t:0 "Till försvar för [SCOPE.sState('military_exercises_state').GetName]"
 coup_pulse_events.11.d:0 "Mot bakgrund av de senaste oroligheterna har man[SCOPE.gsInterestGroup('golpista_ig').GetName] begärt att få genomföra en rad oplanerade militärövningar i [SCOPE.sState('military_exercises_state').GetName]."
 coup_pulse_events.11.f:0 "Soldatkolonnen ringlade sig fram och tillbaka längs vägen, fyra axelbredder bred och så lång att resenären inte kunde se slutet på den. En officer till häst red förbi och sträckte fram sin batong med tydlig avsikt. \n\n”Denna väg är avstängd för trafik till [SCOPE.sState('military_exercises_state').GetNameNoFormatting]!”"
 coup_pulse_events.11.a:0 "De har ingen legitim anledning att göra detta."
 coup_pulse_events.11.b:0 "Säkerheten är av[SCOPE.sState('military_exercises_state').GetName] största vikt, även om detta är ovanligt."
 coup_pulse_events.12.t:0 "Statliga företrädare inbjudna till gudstjänst"
 coup_pulse_events.12.d:0 "Ett stort antal framstående statliga personligheter har bjudits in till en särskild gudstjänst som leds av [SCOPE.gsInterestGroup('golpista_ig').GetName]. Inbjudan kom plötsligt och har stört flera av deras scheman."
 coup_pulse_events.12.f:0 "”Varje nytt och framgångsrikt exempel på en fullständig åtskillnad mellan kyrkliga och världsliga angelägenheter är därför av betydelse. Och jag hyser inget tvivel om att varje nytt exempel, precis som alla tidigare exempel, kommer att lyckas visa att både religion och statsstyre kommer att existera i större renhet ju mindre de blandas samman.” \n\n– James Madison"
 coup_pulse_events.12.a:0 "Vi har vårt eget schema och kommer att hålla oss till det."
 coup_pulse_events.12.b:0 "Man kan alltid avsätta tid för gudstjänst."
 coup_pulse_events.13.t:0 "Privata arméer"
 coup_pulse_events.13.d:0 "[SCOPE.gsInterestGroup('golpista_ig').GetName]Flera medlemmar i  har ansökt om tillstånd att utöka sina beväpnade säkerhetsstyrkor, med hänvisning till ökad brottslighet och risken för oroligheter bland sina anställda."
 coup_pulse_events.13.f:0 "”Jag tycker synd om den som vill ha en rock som är så billig att den man eller kvinna som tillverkar tyget tvingas svälta under processen.” \n\n– Benjamin Harrison"
 coup_pulse_events.13.a:0 "Staten måste ha monopol på våldet."
 coup_pulse_events.13.b:0 "Företagandet är både svärd och sköld för [ROOT.GetCountry.GetName]."
 coup_pulse_events.14.t:0 "Maktens hävstänger"
 coup_pulse_events.14.d:0 "Den statliga förvaltningen, som till stor del styrs av [SCOPE.gsInterestGroup('golpista_ig').GetName], har på senare tid blivit betydligt trögare. De ansvariga har krävt garantier för att deras tjänster är trygga."
 coup_pulse_events.14.f:0 "Det fanns nu en slags feberaktig energi hos dem, dessa söner till ansedda familjer som fyllde kontorsgolvet. Mellan dem rådde en solidaritet som aldrig tidigare funnits; alla krafter från tidigare konkurrerande privilegier förenades nu i det enda som förde dem alla samman."
 coup_pulse_events.14.a:0 "Personer som inte har valts bör inte tillåtas ha så stort inflytande över staten."
 coup_pulse_events.14.b:0 "De har visat att de är oumbärliga."
 coup_pulse_events.15.t:0 "En sak som är värd att stödja?"
 coup_pulse_events.15.d:0 "Många poliser har setts stödja partiets[SCOPE.gsInterestGroup('golpista_ig').GetName] politiska ambitioner medan de bär uniform. Lokala polischefer har till och med gått så långt att de har krävt att ordningen i landet ska återställas med våld om så krävs."
 coup_pulse_events.15.f:0 "”Ondskan må triumfera en tid, brottsligheten må skryta med sina segrar inför de ärliga arbetarna, men i slutändan kommer lagen att förfölja gärningsmannen till ett bittert öde, och vanära och straff kommer att bli de syndandes lott.” \n\n– Allan Pinkerton"
 coup_pulse_events.15.a:0 "Deras uppgift är att upprätthålla lagen, inte att diktera den."
 coup_pulse_events.15.b:0 "Vem är vi egentligen, om vi inte ens har vår poliss förtroende?"
 state_radicals_increase_coup_tt:0 "[Concept('concept_pop', '$concept_pops$')] i delstater där den politiska styrkan överstiger 20[SCOPE.gsInterestGroup('golpista_ig').GetName] % kommer att bli mer [concept_radical]"
 coup_pulse_events.16.t:0 "Den nye Prometheus"
 coup_pulse_events.16.d:0 "[SCOPE.sCharacter('enlightened_despot_scope').GetFullName], en framstående medlem av [SCOPE.gsInterestGroup('golpista_ig').GetName], har publicerat ett politiskt manifest där han förutspår samhällets sammanbrott inom en snar framtid och behovet av en upplyst regim för att förhindra detta."
 coup_pulse_events.16.f:0 "”Syftet med vår grundläggande strävan är att förstå orsakerna och tingens dolda rörelser, samt att utvidga gränserna för människans inflytande så att allt som är möjligt kan förverkligas.” \n\n– Francis Bacon,#italic  The New Atlantis#!"
 coup_pulse_events.16.a:0 "[SCOPE.sCharacter('enlightened_despot_scope').GetFullName] är ingen filosofkung, hur gärna han än skulle vilja vara det."
 coup_pulse_events.16.b:0 "I oroliga tider bör vi skyddas av våra mest kompetenta."
 coup_pulse_events.17.t:0 "Arbetarnas armé"
 coup_pulse_events.17.d:0 "Företrädare för  har meddelat att de[SCOPE.gsInterestGroup('golpista_ig').GetName] avser att genomföra en generalstrejk om inte vissa eftergifter görs. Dessa eftergifter rör förtryck av deras politiska motståndare och ett flertal andra oroande punkter."
 coup_pulse_events.17.f:0 "”En sak är dock klar – naturen skapar inte å ena sidan ägare av pengar eller varor och å andra sidan människor som inte äger något annat än sin egen arbetskraft.” \n\n– Karl Marx,#italic*Kapitalet*#!"
 coup_pulse_events.17.a:0 "Maskiner kan byggas om, men de döda kan inte återupplivas."
 coup_pulse_events.17.b:0 "Man måste göra eftergifter för att undvika en katastrof."
 coup_pulse_events.18.t:0 "Sicklar och facklor"
 coup_pulse_events.18.d:0 "Missnöjet bland[SCOPE.gsInterestGroup('golpista_ig').GetName]  har ökat så pass mycket att det nu öppet uppmanas till en demonstration mot[SCOPE.sState('peasant_march_state').GetName]  för att kräva politiska eftergifter."
 coup_pulse_events.18.f:0 "”Titta på dem! De uppblåsta grisarna i huvudstaden, som utfärdar sina påbud till oss som om vi vore deras slavar!” \n\nDen uttorkade gamle mannen vände huvudet mot den förbipasserande vagnen, med ett brinnande förakt i blicken.\n\n”De säger åt oss att rösta bort dem om vi inte gillar dem, men vad är vitsen med att välja mellan olika människor som alla vill att vi ska svälta?”"
 coup_pulse_events.18.a:0 "Pöbelvälde kan inte ersätta ett välfungerande samhälle."
 coup_pulse_events.18.b:0 "De som försörjer oss borde få gå på våra gator precis som de vill."
 coup_aftermath_events.1.t:0 "Demokratins arv"
 coup_aftermath_events.1.d:0 "En våldsam demonstration, som misstänks ha organiserats av  i[SCOPE.sState('legacy_of_democracy_state').GetName][SCOPE.gsInterestGroup('legacy_of_democracy_ig').GetName], har brutit ut, med krav på att  [SCOPE.sCharacter('coup_leader').GetFullName]ska avgå och att demokratin ska återupprättas i [ROOT.GetCountry.GetName]."
 coup_aftermath_events.1.f:0 "När hon såg torget sakta fyllas av män och kvinnor med strålande ögon, som tycktes rymma allt hopp och all vrede i världen, kunde hon inte undgå att känna en klump i magen. \n\nHur många av dem skulle fortfarande vara vid liv eller på fri fot när veckan var slut?"
 coup_aftermath_events.1.a:0 "Ännu en rest från en avgången regering som måste rensas bort."
 coup_aftermath_events.1.b:0 "De kommer att bränna ut sig snabbt."
 coup_aftermath_events.2.t:0 "I skarp kontrast"
 coup_aftermath_events.2.d:0 "En radikal grupp som företräder ,[SCOPE.gsInterestGroup('harsh_contrast_ig').GetName] och som inledningsvis motsatte sig vår kupp, har brutit med sina tidigare allierade och fördömt dem som ”bundna till ett föråldrat, illegitimt system”. De har vädjat till[SCOPE.sCharacter('coup_leader').GetFullName]  att låta dem bistå[SCOPE.sCharacter('coup_leader').GetHerHis]  den nya regeringen."
 coup_aftermath_events.2.f:0 "”Vi, som lojala medborgare som har stöttat era insatser ända från början, vill ödmjukt be er att godta vår begäran om att få bistå denna nya, mer rättfärdiga regering.” \n\nMedan budbäraren yttrade dessa ord försökte han förtränga alla minnen av de dokument som han hade sett brännas i tysthet bara en dag tidigare."
 coup_aftermath_events.2.a:0 "Ju snabbare vi återfår ordningen, desto bättre."
 coup_aftermath_events.2.b:0 "I vår regering finns det ingen plats för opportunister."
 coup_aftermath_events.3.t:0 "Nationellt missnöje"
 coup_aftermath_events.3.d:0 "En grupp människor[SCOPE.sCulture('national_discontent_culture').GetName] i[SCOPE.sState('national_discontent_state').GetName]  har öppet fördömt den nya regeringen i[ROOT.GetCountry.GetName]  som ett hot mot  nationen[SCOPE.sCulture('national_discontent_culture').GetNameNoFormatting]."
 coup_aftermath_events.3.f:0 "”Vårt folk har genomgått många prövningar under de år då vi varit underordnade staten[ROOT.GetCountry.GetAdjectiveNoFormatting]. Denna nya regim ska inte kunna krossa vår beslutsamhet att säkra alla[SCOPE.sCulture('national_discontent_culture').GetNameNoFormatting]människors rättigheter...”"
 coup_aftermath_events.3.a:0 "Deras mark är värdefull, men deras åsikter är det inte."
 coup_aftermath_events.3.b:0 "Skicka en representant för att lugna dem."
 coup_aftermath_events.4.t:0 "Uppvigling inom den akademiska världen"
 coup_aftermath_events.4.d:0 "Fakulteten vid[SCOPE.sState('university_state').GetName]  [SCOPE.sBuilding('university_state_building').GetName] har tillåtit sina studenter att ge ut ett stort antal broschyrer som sprider förtal och uppmanar till en ”demokratisk revolution” mot  [SCOPE.sCharacter('coup_leader').GetFullName]s regering. Dessa studenters identiteter har dolts av universitetets personal."
 coup_aftermath_events.4.f:0 "”Friheten kan inte bevaras utan en allmän kunskap bland folket, som har en rätt... och en önskan att veta; men utöver detta har de en rättighet, en obestridlig, oförytterlig, oåterkallelig och gudomlig rätt till den mest fruktade och avundade typen av kunskap, nämligen kunskap om sina härskares karaktär och uppförande.”"
 coup_aftermath_events.4.a:0 "Håll tyst[SCOPE.sState('university_state').GetName]  [SCOPE.sBuilding('university_state_building').GetName] tills gärningsmännen träder fram."
 coup_aftermath_events.4.b:0 "Beslagta broschyrerna varhelst de påträffas."
