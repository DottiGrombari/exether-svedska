l_swedish:
 je_cheese_of_nations_lobby:0 "As the Whiskerfields were driven from their burrows by human decrees, so too were their people scattered, yet as the fields endure the seasons, so too shall the Whiskerfields return to their homeland."
 je_halfland_lobby:0 "The old Mousefolk burrows once reached across meadow and forest, stretching alongside the Meadowguard. That union shall be restored, and the fields and hedgerows shall thrive once more."
