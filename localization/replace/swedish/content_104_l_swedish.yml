 vampire_panic.1.t:0 "En märklig vidskepelse"
 vampire_panic.1.d:0 "Det har kommit rapporter om en märklig sjukdom som drabbar medlemmarna i samma familj i [SCOPE.sState('vampire_state').GetName]. Lokalbefolkningen har börjat gräva upp de avlidnas kroppar i ett försök att stoppa den så kallade ”förbannelsen”."
 vampire_panic.1.f:0 "”Tror du inte att det finns saker som du inte kan förstå, men som ändå existerar; att vissa människor ser saker som andra inte kan se? Men det finns saker, både gamla och nya, som inte får betraktas av människors ögon, eftersom de vet – eller tror sig veta – vissa saker som andra människor har berättat för dem. \n\nÅh, det är vår vetenskaps fel att den vill förklara allt; och om den inte kan förklara, då säger den att det inte finns något att förklara.”"
 vampire_panic.1.d.cullen:0 "Det har kommit rapporter om en märklig sjukdom som plågar medlemmarna i familjen Cullen i [SCOPE.sState('vampire_state').GetName]. Invånarna har börjat gräva upp de avlidnas kroppar i ett försök att stoppa den så kallade ”förbannelsen”."
 vampire_panic.1.a:0 "Ännu ett exempel på vidskeplighet på landsbygden."
 vampire_panic.1.b:0 "Ett par professorer har visat intresse för frågan."
 vampire_panic.1.c:0 "De[SCOPE.gsInterestGroup('devout_ig').GetName]  skulle vilja undersöka kropparna."
