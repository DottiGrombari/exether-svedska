l_swedish:
 newspaper_toggle.1.t:0 "Hear ye, Hear ye! The news Has Arrived!"
 newspaper_toggle.1.d:0 "In this event you can decide if you want to have the newspaper events apear or not. You can toggle them on and off at any time altough it may be buggy if you retoggle them in the middle of a game. Below are two options for either turning it on or off, i hope you will enjoy the mod!"
 newspaper_toggle.1.f:0 "Have fun with the mod!"
 newspaper_toggle.1.a:0 "Turn the newspaper on"
 newspaper_toggle.1.b:0 "Turn the newspaper off"
 thalorian_crusade.1.t:0 "The Treaty of Flōkkdrē"
 thalorian_crusade.1.d:0 "The Third Thalorian crusade succeeds in dismantling the Thalorian empire!"
 thalorian_crusade.1.d_thaloria:0 "[SCOPE.sCountry('rav_scope').GetNameNoFlag] is defeated, and we reclaim our homeland!"
 thalorian_crusade.1.f:0 "In a daring midnight raid, [ROOT.GetCountry.GetAdjective] soldiers infiltrated the imperial palace and assassinated the Thalorian emperor. With the emperor's death, South Thaloria descends into chaos, its fragile unity shattered. The once-great empire fractures into five nations: [SCOPE.sCountry('thy_scope').GetName], [SCOPE.sCountry('vrc_scope').GetName], [SCOPE.sCountry('olt_scope').GetName], [SCOPE.sCountry('tha_scope').GetName], and [SCOPE.sCountry('dnv_scope').GetName]. Each new country vies for dominance, driven by ancient rivalries and the ambition of their leaders. Amidst the turmoil, the people of South Thaloria face an uncertain future, as alliances form and dissolve in the struggle for power and survival"
 thalorian_crusade.1.f_thaloria:0 "Underestimating the might and resilience of the [ROOT.GetCountry.GetAdjectiveNoFlag] forces, the [SCOPE.sCountry('rav_scope').GetAdjectiveNoFlag] soldiers faced a devastating defeat. The failed crusade sends shockwaves through [SCOPE.sCountry('rav_scope').GetNameNoFlag], leading to extreme backlash against the government.\n\n[ROOT.GetCountry.GetNameNoFlag] now stands triumphant, having turned the tide after a series of Thalorian defeats. The resurgence of the empire, once considered a pipe dream, now appears attainable once more."
 thalorian_crusade.1.a:0 "The Age of Men is over, the time of the Gnome has come!"
 thalorian_crusade.1.b:0 "Thaloria prevails! We will stop the [SCOPE.sCountry('rav_scope').GetAdjectiveNoFlag] menace!"
 thalorian_crusade.2.t:0 "Darkness Falls"
 thalorian_crusade.2.d:0 "The Third Thalorian Crusade fails!"
 thalorian_crusade.2.d_thaloria:0 "[SCOPE.sCharacter('ruler_scope').GetFullName] has been executed by [SCOPE.sCountry('rav_scope').GetAdjective] soldiers. The end of Thaloria is nigh."
 thalorian_crusade.2.f:0 "Underestimating the might and resilience of the [SCOPE.sCountry('tle_scope').GetAdjectiveNoFlag] forces, our soldiers faced a devastating defeat. The failed crusade sends shockwaves through [ROOT.GetCountry.GetNameNoFlag], leading to extreme backlash against the government. Trust in [SCOPE.sCharacter('ruler_scope').GetFullName] along with the rest of the leadership is shattered, and the populace begins to question the very foundations of their political system. Public outcry and political upheaval threaten to dismantle the once-stable leadership. As the nation grapples with the consequences of their failed ambition, [ROOT.GetCountry.GetNameNoFlag] teeters on the brink of internal collapse, searching for a path to recovery and redemption."
 thalorian_crusade.2.f_thaloria:0 "In a daring midnight raid, [SCOPE.sCountry('rav_scope').GetAdjective] soldiers infiltrated the imperial palace and assassinated [SCOPE.sCharacter('ruler_scope').GetFullName]. With the emperor's death, Thaloria is thrown into chaos, shattering alliances and sparking turmoil. Noble houses vie for power and the empire collapses into anarchy without a central authority or a clear successor. Heroes must rise to restore order or watch Thaloria descend into darkness!"
 thalorian_crusade.2.a:0 "We have grown arrogant, victory has defeated us."
 thalorian_crusade.2.b:0 "[ROOT.GetCountry.GetName] must weather the storm."
 thalorian_crusade.2.g:0 "[SCOPE.sCountry('dnv_scope').GetName] will avenge this injustice."
 thalorian_crusade.2.l:0 "[SCOPE.sCountry('tha_scope').GetName] is our only hope."
 dragonblight.1.t:0 "A Blight on Our Nation"
 dragonblight.1.d:0 "Our country has been rocked to its core by the recent reappearance of the Dragonblight: a curse that turns [GetCulture('illvasaari').GetName] dragonborn into [GetCulture('kotskarvi').GetName] and [GetCulture('drogori').GetName] kobolds."
 dragonblight.1.f:0 "Everyone had a different answer as to #italic why.#! The clergy claimed it was a failure to uphold our religious values; the aristocrats and the farmers blamed the cities, as cesspools of disease.\nThis was, of course, not the first case of Dragonblight in the [ROOT.GetCountry.GetNameNoFlag]..."
 dragonblight.1.a:0 "...But would it be the last?"
 dragonblight.2.t:0 "A Plague of Emigration"
 dragonblight.2.d:0 "Large numbers of [GetCulture('illvasaari').GetName] are immigrating to [SCOPE.sCountry('thassarcia_scope').GetNameNoFlag] in an attempt to escape the Dragonblight."
 dragonblight.2.f:0 "Thassarcia can trace its original founding to outbreak of Dragonblight nearly three hundred years ago.Dragonborn leaving the isles in fear is nothing new, and there were stories of the Stewards of Old going as far as to burn down substantial portions of their merchant fleet to prevent emigrants from fleeing.While we need not take such drastic measures, we can certainly make efforts to prevent any further emigration."
 dragonblight.2.a:0 "The time has come for legal restrictions."
 dragonblight.2.b:0 "We have no right to stop them."
 dragonblight_2_tt:0 "Will begin a [Concept('concept_migration_target', '$concept_mass_migration$')] of [GetCulture('illvasaari').GetName] pops to a random state in Thassarcia"
 dragonblight.3.t:0 "Seeking New Shores"
 dragonblight.3.d:0 "Large numbers of [GetCulture('illvasaari').GetName] dragonborn are fleeing the Dragonblight, and are moving to our country as a result."
 dragonblight.3.f:0 "All hopeful immigrants are required to undertake a two-week layover in the [SCOPE.sCountry('lizard_scope').GetAdjectiveNoFlag], to ensure they carry no symptoms of the Blight, but are then free to move wherever they like."
 dragonblight.3.a:0 "We shall welcome them with open arms."
 dragonblight.5.t:0 "Referendum of Secession"
 dragonblight.5.d:0 "The majority kobold settlements on our border, previously a part of the [SCOPE.sCountry('dragon_scope').GetAdjectiveNoFlag], have held a referundum to join our country."
 dragonblight.5.f:0 "Parties and feasts run late into the night in the villages as [GetCulture('kotskarvi').GetName] celebrate their newfound freedom. In even the poorest rural villages, kobolds begin to look out with positivity for what tomorrow might bring.While their future may still be uncertain, many believe the hardest part to be over."
 dragonblight.5.a:0 "Now is a time to celebrate!"
 dragonblight.5.b:0 "We shall not stop with the villages. All oppressed [GetCulture('kotskarvi').GetName] will be free!"
 dragonblight.99.t:0 "Endemic's End"
 dragonblight.99.d:0 "After years of struggle, it seems the Dragonblight has finally reached its' end."
 dragonblight.99.f:0 "\"I told you this 'dragonblight' stuff was all a hoax! All these 'experts' wouldn't know a kobold if it bit 'em on the ass. Now, quit your worrying and get back to work.\""
 dragonblight.99.a:0 "\"We have learned much, that they may have the privilege to remain ignorant.\""
 dragonblight.100.t:0 "Administrative Flatline"
 dragonblight.100.d:0 "Our government can no longer withstand the weight of the pandemic.In the cities, groups of [GetCulture('kotskarvi').GetName] kobolds are inciting open revolt. Meanwhile, many of the rural communities have already declared themselves independent of our rule."
 dragonblight.100.f:0 "Years later, historians would chalk it up to a sort of \"historical inevitability,\" because after all, how could the [GetCulture('illvasaari').GetName] expect to go on without punishment for their failure to protect the ancient Dragons.It was only natural that they should be cursed with smaller stature as punishment for their failure to protect their quarry."
 dragonblight.100.a:0 "There was nothing we could do."
 dragonblight_pulse.1.t:0 "Sickly Cargo"
 dragonblight_pulse.1.d:0 "In an unfortunate series of events, cargo clippers hailing from [SCOPE.sCountry('disease_exporter').GetAdjective] ports have brought back the Blight to our shores. An outbreak has begun"
 dragonblight_pulse.1.f:0 "From distant shores, a touch's blight, a journey's end, in fever's night."
 dragonblight_pulse.1.a:0 "Another form, another plight"
 dragonblight_pulse.2.t:0 "The Blight Spreads"
 dragonblight_pulse.2.d:0 "Despite our best efforts, an outbreak of the Blight has begun in [SCOPE.sState('neighbour_infection').GetName], due to its proximity to [SCOPE.sState('infected_neighbour').GetName]."
 dragonblight_pulse.2.f:0 "\"You're not the butcher. Where's he?\"\n\n\"Down with the Blight, ma'am. Got it from the market at [SCOPE.sState('infected_neighbour').GetFarmHubName], he did.\""
 dragonblight_pulse.2.a:0 "Damnation!"
 dragonblight_pulse.3.t:0 "A Blight On The Nation"
 dragonblight_pulse.3.d:0 "We don't know how it got here. Perhaps it came by boat, or cart. We don't know who Patient Zero was, perhaps an immigrant or a merchant. We don't even know when exactly it reached our lands. At long last, the Dragonblight is here."
 dragonblight_pulse.3.f:0 "First, the scales fall off, piece by piece, revealing smooth skin under. Second comes the the warping of the face into a snout. Then there's the agonising fever and body ache as the body shrinks. The end goal of this metamorphis is a sad, twisted creature called a kobold."
 dragonblight_pulse.3.a:0 "Perhaps we should take special measures..."
 dragonblight_pulse.4.t:0 "Blighted [SCOPE.sState('dragonblight_port').GetPortHubName]"
 dragonblight_pulse.4.d:0 "Due to our failure to enact port controls across the nation, cargo ships and travellers have brought the Blight to [SCOPE.sState('dragonblight_port').GetName], with dire consequences for us all."
 dragonblight_pulse.4.f:0 "The only thing necessary for the triumph of disease is for healthy dragonborn to do nothing."
 dragonblight_pulse.4.a:0 "Is it too late to say sorry?"
 dragonblight_pulse.5.t:0 "A New Epicentre"
 dragonblight_pulse.5.d:0 "With little to no pre-existing structures capable of mitigating the spread of Dragonblight, it has spread like wildfire from [SCOPE.sState('blighter_state').GetName] across [SCOPE.sState('blighted_state').GetName], turning it into the next epicentre of the disease"
 dragonblight_pulse.5.f:0 "\"So I looked, and behold, a pale horse. And the name of him who sat on it was Death, and the [concept_angel] followed with him.\""
 dragonblight_pulse.5.a:0 "Our gods, our gods, why have you forsaken us?"
 dragonblight_pulse.6.t:0 "Turning the Tide"
 dragonblight_pulse.6.d:0 "In spite of our disorganised health system, the emergency health measures have succeeded in turning the tide of infection in [SCOPE.sState('tide_turned').GetName] and as a result, there is no longer a serious outbreak of the Blight there"
 dragonblight_pulse.6.f:0 "VICTORY OVER BLIGHT!, read the headline, almost mocking the widower. Victory had come too late to save his #italic taer. #!"
 dragonblight_pulse.6.a:0 "That's a relief!"
 dragonblight_pulse.7.t:0 "Flattening the Curve"
 dragonblight_pulse.7.d:0 "Local authorities working claw in claw with our robust health system have flattened the curve in [SCOPE.sState('curve_flat').GetName]. As a result, there is no longer a serious outbreak of Dragonblight there."
 dragonblight_pulse.7.f:0 "The physician charted the week's numbers on the massive graph that hung in the war room. 71 cases, down by 106 from the previous week, 341 from a fortnight ago and 890 from three weeks ago. He smiled, for the first time in weeks."
 dragonblight_pulse.7.a:0 "Not all heroes kill monsters."
 dragonblight_pulse.8.t:0 "The Vaccine Drive"
 dragonblight_pulse.8.d:0 "Residents of [SCOPE.sState('vaccine_drive').GetName] have begun to obtain the dragonblight vaccine from their local hospital. Already, the effect can be seen as the infection rate falls."
 dragonblight_pulse.8.f:0 "\"Will it hurt mama?\"\n\n\"\"Just a little bit, sweetie.\""
 dragonblight_pulse.8.a:0 "The end is in sight."
 dragonblight_pulse.9.t:0 "The Vaccine Mandate"
 dragonblight_pulse.9.d:0 "With a vaccine mandate in place, residents of [SCOPE.sState('vaccine_mandate').GetName] have been obtaining their compulsory dragonblight immunisation. The infection rate has plummeted to negligible numbers."
 dragonblight_pulse.9.f:0 "\"See, sweetie? It didn't hurt did it?\"\"\n\n\"\"Just a little bit mama\""
 dragonblight_pulse.9.a:0 "The end is in sight."
 dragonblight_pulse.10.t:0 "Dragonblight Spreads"
 dragonblight_pulse.10.a:0 "What can we do?"
 dragonblight_pulse.10.d:0 "Dragonblight has spread into [SCOPE.sState('kobold_neighbour_state').GetName] from their [GetCulture('kotskarvi').GetName] neighbors."
 dragonblight_pulse.10.f:0 "The clergyman sighed, \"All we can do now is wait, the the symptoms won't start to fully appear for three to four more days.\""
 dragonblight_pulse.11.t:0 "A Quiet End"
 dragonblight_pulse.11.d:0 "After wreaking much havoc, the dragonblight outbreak in [SCOPE.sState('herd_immunity').GetName] has finally run its course - for now."
 dragonblight_pulse.11.f:0 "Having taken their toll, the fiends of Death return to their constellation, sated for the moment."
 dragonblight_pulse.11.a:0 "All is well that ends well."
 dragonblight_pulse.12.t:0 "Anatomy of a Party"
 dragonblight_pulse.12.d:0 "[SCOPE.sCharacter('party_time_guy').GetFullName] has been caught hosting a birthday party for his mistress despite the current restrictions due to Dragonblight. The public is outraged."
 dragonblight_pulse.12.f:0 "Normally, the revelation of a politician's mistress would be news for only the tabloid papers. That is less so when it involves the contravention of measures everyone else is forced to grin and bear."
 dragonblight_pulse.12.a:0 "What would we arrest them for? Having fun?"
 dragonblight_pulse.12.b:0 "A mild reprimand is enough"
 dragonblight_pulse.12.c:0 "Break the rules? Believe it or not, jail."
 dragonblight_pulse.14.t:0 "Outbreaks in [SCOPE.sState('unruly_kobold_state').GetName]"
 dragonblight_pulse.14.d:0 "Attempts at integrating [SCOPE.sState('unruly_kobold_state').GetName] into our administration are being brought to a standstill by Dragonblight outbreaks."
 dragonblight_pulse.14.f:0 "\"Don't bother going out there. It's a fool's errand.I tried collecting taxes in [SCOPE.sState('unruly_kobold_state').GetFarmHubName] last week and one of those lizards had the gall to sneeze at me.\""
 dragonblight_pulse.14.a:0 "Perhaps this was a mistake..."
 dragonblight_pulse.15.t:0 "Trickle-Down Charity"
 dragonblight_pulse.15.d:0 "A local industrial magnate has built a sickhouse for those affected with the Blight in [SCOPE.sState('sickhouse_state').GetName], a known hotspot state, to much acclaim."
 dragonblight_pulse.15.f:0 "\"In my family, we strongly believe in giving back to the community. Which is why Haabuo Factories is proud to present the first Haabuo Hospital!\""
 dragonblight_pulse.15.a:0 "Get this dragon a medal!"
 dragonblight_pulse.15.b:0 "Okay, and?"
 dragonblight_pulse.15.c:0 "They should all \"give back\" to their community."
 dragonblight_pulse.15.tt:0 "The Dragonblight will progress slower here"
 dragonblight_pulse.16.t:0 "On Permanent Patrol"
 dragonblight_pulse.16.d:0 "Sailors based in [SCOPE.sState('dragon_permpatrol').GetPortHubName] have begun to extend their cruises to avoid returning to shore."
 dragonblight_pulse.16.f:0 "\"Wasn't your brother's ship supposed to return today?\"\n\n\"Yes,but apparently they've been becalmed\"\n\n\"But it's been so windy this past week!\""
 dragonblight_pulse.16.a:0 "They have court-martials waiting for them."
 dragonblight_pulse.16.b:0 "There is nothing we can do."
 dragonblight_pulse.17.t:0 "Absentee Workers"
 dragonblight_pulse.17.d:0 "Locals of all scales in [SCOPE.sState('workers_stay_home_state').GetName] have reportedly refused to go to work, declaring that they are \"self-isolating\". Productivity is at an all-time low."
 dragonblight_pulse.17.f:0 "\"Gods, the city is so quiet! You could almost hear your own thoughts...I think. I don't have any"
 dragonblight_pulse.17.a:0 "We'll let them self-isolate in a cell if they don't start moving."
 dragonblight_pulse.17.b:0 "Good for them, I suppose."
 dragonblight_pulse.18.t:0 "A Blighted View"
 dragonblight_pulse.18.d:0 "Well-to-do residents of [SCOPE.sState('not_in_my_backyard').GetCityHubName] are complaining about the construction of a number of sickhouses for the blighted in their neighbourhoods."
 dragonblight_pulse.18.f:0 "\"I don't have anything against the blighted, honest to the gods. It's just... must I see them every time I go to the baths?\""
 dragonblight_pulse.18.a:0 "We will rebuild it in another neighbourhood."
 dragonblight_pulse.18.b:0 "Yes, you must see them."
 dragonblight_pulse.18.c:0 "We shall tear it all down."
 dragonblight_pulse.19.t:0 "Cult of the Blight"
 dragonblight_pulse.19.d:0 "A death cult has formed in [SCOPE.sState('dragon_cultist_state').GetName], seeking to deliberately infect themselves with Dragonblight. They view the metamorphis to a Kobold as a leap of faith ordained by the gods."
 dragonblight_pulse.19.f:0 "Dragonborns in various stages of the blight lay in neat rows across the warehouse. 20, 40, 60, the physician kept counting. The police officers felt they might have caught the blight from merely seeing the sight."
 dragonblight_pulse.19.a:0 "Leave the mad to themselves."
 dragonblight_pulse.19.b:0 "They are a threat to public health and safety."
 dragonblight_pulse.20.t:0 "Fairweather Friends"
 dragonblight_pulse.20.d:0 "Well-known politician, [SCOPE.sCharacter('the_diseased_guy').GetFullName], has been struck with the Blight recently. His allies are torn over what to do about him."
 dragonblight_pulse.20.f:0 "\"Get...well...soon. That ought to suffice\"\n\n\"It's the blight, he's never getting better\"\n\n\"Oh... right.\""
 dragonblight_pulse.20.a:0 "Ignore them. They are a disgrace to us all."
 dragonblight_pulse.20.b:0 "Our thoughts and prayers are with him and his family."
 dragonblight_pulse.21.t:0 "The Thadaolungaax"
 dragonblight_pulse.21.d:0 "Months of resentment and simmering anger has boiled over into brutish violence in [SCOPE.sState('kobold_pogrom_state').GetName] where dragonborn residents of [SCOPE.sState('kobold_pogrom_state').GetCityHubName] massacred the members of a kobold community yesternight. The papers are already calling it the #italic Thadaolungaax #! - Night of Screams."
 dragonblight_pulse.21.f:0 "The scent of burning flesh filled the air as we huddled together in fear. Outside, the mob raged, their shouts and laughter echoing through the streets. We saw the flames rising from the community hall down the road, the orange glow illuminating the night sky. In my dreams, I still hear the screams of my fellow kobolds."
 dragonblight_pulse.21.a:0 "Better they vent their wrath on them than the state."
 dragonblight_pulse.21.b:0 "This is sickening. Arrest the perpetrators. Now."
 dragonblight_pulse.22.t:0 "[SCOPE.sState('outbreak_state').GetName] Secedes!"
 dragonblight_pulse.22.d:0 "Tensions between kobolds and dragonborn in [SCOPE.sState('outbreak_state').GetCityHubName] have reached a head as the kobolds, who now make up the vast majority of the population there, have declared their unification with a nearby kobold country."
 dragonblight_pulse.22.f:0 "\"After all, why ought we be ruled by a bunch a hoighty-toighty tallfolk an island away? This is our land now, and they want to take it back, all we need do is sneeze on them.\""
 dragonblight_pulse.22.a:0 "How can we defend against a disease?"
 dragonblight_pulse.23.t:0 "Doctors Present Demands"
 dragonblight_pulse.23.d:0 "A group of doctors has presented a list of precautions the government could undertake to reduce the incidence of Dragonblight."
 dragonblight_pulse.23.f:0 "...And above all, it is absolutely imperative that one washes their claws in between patients."
 dragonblight_pulse.23.a:0 "These are all reasonable points."
 dragonblight_pulse.23.b:0 "We shall put someone qualified up to the task."
 dragonblight_pulse.23.c:0 "But I am #italic unreproachable #!gentledragon!"
 formation.1.t:0 "Gavkhani Unification"
 formation.1.d:0 "The victory of [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] brings the contest of Khans to an end, finally unifying [ROOT.GetCountry.GetName]."
 formation.1.f:0 "The days of warring khans were over. [ROOT.GetCountry.GetNameNoFormatting] would return to the fold of a sublime emperor, the champion of goblinkind upon this land. Stability and modernity may now follow under the eyes of [SCOPE.sCharacter('ruler_scope').GetFullName], the emperor of Gavkhan."
 formation.1.a:0 "Flaqi to a Dorf!"
 union_of_the_sands.1.t:0 "The Purpur Wedding"
 union_of_the_sands.1.d:0 "[SCOPE.sCharacter('dro_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dro_ruler_scope').GetFullName] and [SCOPE.sCharacter('voz_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('voz_ruler_scope').GetFullName] have exchanged vows, binding together their respective nations."
 union_of_the_sands.1.a:0 "Long live the [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]!"
 union_of_the_sands.1.b:0 "At least the cake was delicious."
 union_of_the_sands.1.f:0 "In an extravagant ceremony held in the lush gardens of [SCOPE.sState('winner_capital_scope').GetName], [SCOPE.sCharacter('dro_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dro_ruler_scope').GetFullName] has taken [SCOPE.sCharacter('voz_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('voz_ruler_scope').GetFullName] as her royal consort.\n\nOver the years, [SCOPE.sCountry('dro_scope').GetNameNoFlag] has proven itself to be the dominant economic force in the region. As a measure of goodwill and as an extension of the existing union, [SCOPE.sCharacter('voz_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('voz_ruler_scope').GetFullName] has accepted [SCOPE.sCountry('dro_scope').GetAdjectiveNoFlag] supremacy."
 union_of_the_sands.1.f_dwarf:0 "In a breathtaking ceremony held atop an airship circling [SCOPE.sState('winner_capital_scope').GetName], [SCOPE.sCharacter('voz_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('voz_ruler_scope').GetFullName] has taken [SCOPE.sCharacter('dro_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dro_ruler_scope').GetFullName] as his queen consort.\n\nOver the years, [SCOPE.sCountry('voz_scope').GetNameNoFlag] has proven itself to be the dominant economic force in the region. As a measure of goodwill and as an extension of the existing union, [SCOPE.sCharacter('dro_ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('dro_ruler_scope').GetFullName] has accepted [SCOPE.sCountry('voz_scope').GetAdjectiveNoFlag] supremacy."
 union_of_the_sands.2.t:0 "The Union of the Sands"
 union_of_the_sands.2.d:0 "We have successfully mended the rift between our [SCOPE.sCulture('aridrun_scope').GetName] and [SCOPE.sCulture('vozi_scope').GetName] subjects."
 union_of_the_sands.2.a:0 "Never thought i'd die fighting side by side with a dwarf."
 union_of_the_sands.2.b:0 "Never thought i'd die fighting side by side with an elf."
 union_of_the_sands.2.f:0 "Thanks to a long line of legal reforms and the efforts of egalitarians nationwide, men and women in [ROOT.GetCountry.GetNameNoFlag] will now enjoy the same legal rights, paving the way for closer ties between the [SCOPE.sCulture('aridrun_scope').GetName] elves and [SCOPE.sCulture('vozi_scope').GetName] dwarves.\n\nThe question of gender roles was the last obstacle to a true union between the nations of the Nogi sands, which shall henceforth be known as the nation of #bold Yavoz#!."
 gavkhan.1.t:0 "The Pretender"
 gavkhan.1.d:0 "A warrior of the Clan of Qushva has rapidly risen to power and popularity. He has defeated every army sent against him and now he seeks to take the throne of [ROOT.GetCountry.GetName] by force."
 gavkhan.1.f:0 "The tale of a goblin warlord rising through sheer cunning is both riveting and fearsome. Once a lowly scavenger, Zulth Qushva now commands respect and fear across the land. Even deprived of honor and status, Zulth has swiftly amassed a loyal legion, captivating the hearts and minds of his kin with his clever strategies and ruthless efficiency."
 gavkhan.1.a:0 "Might makes right! Enthrone him!"
 gavkhan.1.b:0 "We will show him how we deal with pretenders."
 tewodros_modifier:0 "Upstart Warlord"
 blood_tribunal.1.t:0 "The Strong Will Thrive"
 blood_tribunal.1.a:0 "The weak will tithe."
 blood_tribunal.1.d:0 "Once a mere legend, whispers grow louder that the lords of Ravencliff require a yearly blood-tithe from all of their subjects."
 blood_tribunal.1.f:0 "\"Corvée? Do not make me laugh.Most of those brought within [ROOT.GetCountry.GetNameNoFlag] do not return.Those who do...\nYou will wish had not.\""
 blood_tribunal.2.t:0 "The Rise of the Blood Tribunals"
 blood_tribunal.2.d:0 "No longer bound by our old masquerade, we are finally strong enough to claim our rightful tithe openly."
 blood_tribunal.2.f:0 "What was once a haphazard and secretive system of tributes and tithes has been codified into a system of standardized harvest. Those subject to our tribunals will come to know the place they serve in our hierarchy."
 blood_tribunal.2.a:0 "The farmer cares not for the cries of the cattle."
 blood_tribunal.3.t:0 "The Rising Tithe"
 blood_tribunal.3.d:0 "This year's batch of blood-tithes has arrived without any delays."
 blood_tribunal.3.f:0 "Whether mandated by Writ of Corvée or enticed by other means, the tributes have begun to arrive in [ROOT.GetCountry.GetNameNoFlag] this year without the usual accompanying whispers of deception or trickery."
 blood_tribunal.3.a:0 "Perhaps some may even be worth bringing into the fold."
 blood_tribunal.8.t:0 "Detestable Harvest"
 blood_tribunal.8.a:0 "\"Perhaps we can try vegetarianism?\""
 blood_tribunal.8.d:0 "For reasons difficult to surmise, this year's tithe is near completely inedible."
 blood_tribunal.8.f:0 "\"Even their youngest and strongest are so-afflicted.The flavor is tainted by dread and despair, turning thick and cold as though curdled by the very air itself.\""
 blood_tribunal.9.t:0 "Seditious Rumors"
 blood_tribunal.9.a:0 "We will not lend credence to the stories of rumormongers."
 blood_tribunal.9.b:0 "The peasants must be kept in line."
 blood_tribunal.9.d:0 "This year's tithe is plagued by whispers and silent protests."
 blood_tribunal.9.f:0 "The word \"vampire\" is being spoken in hushed whispers in the rural taverns. In the cities, streets that once bustled into the night grow silent after sunset."
 blood_tribunal.10.t:0 "Meddlesome Priest"
 blood_tribunal.10.d:0 "An adventuring party led by a cleric from [SCOPE.sCountry('allegation_state_owner').GetNameNoFlag] was caught crossing the border near [SCOPE.sState('allegation_state').GetName]; they claim to be in pursuit of a dangerous vampire!"
 blood_tribunal.10.f:0 "The would-be do-gooders were captured just outside of [SCOPE.sState('allegation_state').GetCityHubName] with 60 silver musket balls and enough holy water to drown a rat. While their claims of a feral vampire operating in the region appear to be credible, it is difficult to know whether they suspect some sort of larger sanguine conspiracy.\n\nThe tabloids have not yet caught wind of the party or its capture; we may have a slim opportunity in which they could simply disappear."
 blood_tribunal.10.f2:0 "The would-be do-gooders were captured just outside of [SCOPE.sState('allegation_state').GetCityHubName] with 60 silver musket balls and enough holy water to drown a rat. While their claims of a feral vampire operating in the region appear to be credible, it is difficult to know whether they suspect some sort of larger sanguine conspiracy amongst our elite.\n\nUnfortunately, the papers have already caught wind of the party; as [SCOPE.sCountry('allegation_state_owner').GetAdjectiveNoFormatting] celebrities, we could not simply make them disappear without causing a diplomatic incident."
 blood_tribunal.10.a:0 "Ship them back to [SCOPE.sCountry('allegation_state_owner').GetNameNoFlag]."
 blood_tribunal.10.b:0 "They have seen too much."
 blood_tribunal.10.c:0 "They have seen too much."
 blood_tribunal.11.t:0 "Sanguine Upstarts"
 blood_tribunal.11.d:0 "A group of fledgling vampires has usurped some of the aristocracy in [SCOPE.sState('usurper_state').GetFarmHubName]."
 blood_tribunal.11.f:0 "Uplifting new vampires is a process of endless curation. Fledglings are often chosen for their courage or for their strength of will, but these traits do not always make for loyal vampiric servants.\n\nThis is further compounded by the fact that while the prowess of fledgling vampires is eclipsed by that of their elders, their inexperience with managing the life force that powers their abilities can lead them to overextend in much the same way a young snake will expel their entire venom gland into the first rat it bites. The aftermath of a fight between a fledgling and a prime vampire often requires two coffins.\n\nThe fledglings in [SCOPE.sState('usurper_state').GetFarmHubName] are a rare success story; having successfully slain their supposed betters, they have now reached out to our administration about resuming the bureaucratic roles and titles their victims previously held."
 blood_tribunal.11.a:0 "Crush the fledgling usurpers."
 blood_tribunal.11.b:0 "These are vampires who know how to get things done!"
 blood_tribunal.12.t:0 "Vampiric Hypnotism"
 blood_tribunal.12.d:0 "Hypnotism, and whether fledglings should be allowed to use it, is the talk of the week amongst the vampiric elite."
 blood_tribunal.12.f:0 "While vampires retained many of their preternatural  powers even after the [concept_godsbane], a great deal of their higher supernatural abilities were suppressed by the [concept_veil], and have only recently begun to return.\n\nVampiric hypnotism is one such ability, with nearly a third of vampires having gained a newfound power to directly suggest or command mortals to force them to forget or to force them in thrall.\n\nThe only problem is that an inexperienced hypnotist may leave lasting psychological or mental damage to the target, meaning that if the fledglings are not kept in check, it may result in a… blunting… of our workforce."
 blood_tribunal.12.a:0 "How else will they cover up their mistakes?"
 blood_tribunal.12.b:0 "Only experienced vampires will be allowed to hypnotize mortals."
 blood_tribunal.13.t:0 "Bloody Revolution in Cuisine"
 blood_tribunal.13.d:0 "The introduction of canning has made keeping a fresh supply of blood much easier than before."
 blood_tribunal.13.f:0 "With the invention of the cannery, the food industries in [ROOT.GetCountry.GetNameNoFlag] have experienced a boom, but none could have predicted the impact this technology would have on vampire society. The once-challenging need for fresh blood has been revolutionized—now, blood can be preserved in sealed cans, ensuring a stable supply for even the most remote and isolated vampire."
 blood_tribunal.13.a:0 "A practical revolution!"
 blood_tribunal.14.t:0 "The Unseen Lords"
 blood_tribunal.14.d:0 "People are beginning to notice that vampires do not appear in photographs."
 blood_tribunal.14.f:0 "As [ROOT.GetCountry.GetNameNoFlag]’s burgeoning vampire elite embraced the technological advances of the industrial age, the invention of photography became the talk of the city. Nobles, eager to immortalize their wealth and power, posed for portraits, only to be confronted by a chilling revelation: in the developed photographs, the vampires themselves were absent. The lavish halls and opulent attire they wore were captured perfectly, but their faces were nowhere to be found.\n\nThis disturbing discovery has caused an uproar among the vampire aristocracy. Some see it as a trivial anomaly, while others perceive it as an omen, calling into question their place in the modern world.\n\nThe people of [ROOT.GetCountry.GetNameNoFlag] are beginning to whisper—are their immortal rulers as infallible as they seem?"
 blood_tribunal.14.a:0 "A mere quirk of science."
 blood_tribunal.15.t:0 "A Familiar Problem"
 blood_tribunal.15.d:0 "There are so many vampires in [ROOT.GetCountry.GetNameNoFlag] that it is becoming difficult to find skilled familiars."
 blood_tribunal.15.f:0 "When a vampire takes on a non-vampiric protege or apprentice, this protege is called a \"familiar.\" While most [GetPlayer.GetCustom('species_adjective')] people lack the the talent or the loyalty required to be taken on as a familiar, so long as the ratio of [GetPlayer.GetCustom('species_adjective')] to vampire remains high, a shortage of loyal stock for familiars is rarely realized.\n\nHowever, the vampire population has reached such epic proportions that even the most elder vampires are struggling to find suitable minions."
 blood_tribunal.15.a:0 "Who cares? Minions are essentially fungible."
 blood_tribunal.15.b:0 "We may have to get used to doing our own dirty work."
 blood_tribunal.16.t:0 "A Sanguine Novelization"
 blood_tribunal.16.d:0 "Cafes across [ROOT.GetCountry.GetNameNoFlag] are abuzz after the recent release of a vampire-[GetPlayer.GetCustom('species_adjective')] romance novel."
 blood_tribunal.16.f1:0 "Critics and fans alike are raving after the release of "
 blood_tribunal.16.f2:0 "the sequel to a popular vampire-[GetPlayer.GetCustom('species_adjective')] romance novel. The story follows a tantalizing love triangle between a [GetPlayer.GetCustom('species_adjective')] man and two women; one a vampire, the other a swamp hag.\n\nWhile much of the story is based more in folklore than any sort of reality, this seems to matter little to the intended readership."
 blood_tribunal.16.a:0 "And so, the lion fell in love with the lamb."
