 decree_events.1.t:0 "På rätt spår"
 decree_events.1.d:0 "Det utmärkta skicket på våra vägnät har lockat ingenjörer från hela landet som nu vill samarbeta med oss på olika intressanta sätt."
 decree_events.1.f:0 "”Slät asfalt, lika glänsande som ytan på en stålglänsande lagun, stilla. Lukten av bilavgaser, gummi, naturen tämjd av framsteg... vi lever för att förkorta avstånden! \n\nOm du anställer någon av ingenjörerna som har examen från vårt prestigefyllda universitet i [SCOPE.sState('engineers_state').GetNameNoFormatting], kan jag försäkra dig, min käre vän, att ingenting – ingenting! – någonsin kommer att stå i vägen för dig... eller för din bil!”"
 decree_events.1.a:0 "Ett bättre dräneringssystem bör vara vår prioritet."
 decree_events.1.b:0 "Den här lovande unge mannen erbjuder oss ett billigare alternativ."
 decree_events.1.c:0 "Stenfundament, säger du? Riskabelt, men toppen!"
 decree_events.1.e:0 "Vi behöver inte lyssna på dessa bedragare."
