  amendment_divine_magic_schools_2:0 "Divine Magic Schools"
  amendment_divine_magic_schools:0 "Divine Magic Schools"
  amendment_divine_magic_schools_2_desc:0 "Magic is taught through a religious lens, with great focus placed upon divine inspiration and ritual."
  amendment_divine_magic_schools_desc:0 "Magic is taught through a religious lens, with great focus placed upon divine inspiration and ritual."
  amendment_corporate_state_nominating_body_ma:0 "Pro-Magic Bias"
  amendment_corporate_state_nominating_body_ma_desc:0 "The nominating bodies for the state's corporate assembly are systematically biased towards starbrands and magical institutions."
  amendment_paladin_courts:0 "Paladin Courts"
  amendment_paladin_courts_desc:0 "Local law enforcement is supplemented by parallel religious Paladin Courts with their own jurisdiction and authority."
  amendment_avian_caste_system:0 "Avian Caste System"
  amendment_avian_caste_system_desc:0 "The avian population is organized into a rigid caste system based on the elevation of their home nests. Higher nests confer greater status and privilege, while lower nests are associated with labor and servitude."
  MIRACLES_LAW:0 "[GetLawType('law_religious_sanctioned_magic').GetName] [concept_law]"
  PHOENIX_LAW:0 "[GetLawType('law_arcane_economy').GetName] [concept_law]"
  ASTROLOGICAL_STUDIES_LAW:0 "[GetLawType('law_arcane_ascendancy').GetName] [concept_law]"
  GOLEM_LAW:0 "[GetLawType('law_industry_banned_druidic').GetName] [concept_law]"
  law_chiefs_distribute_aid:0 "Trickle-Down Looting"
  law_chiefs_distribute_aid_desc:0 "A system where a portion of the spoils is redirected to feed families, fund local services, and support armed enforcers. By keeping the people fed and towns functioning, the criminal regime secures loyalty and maintains control."
  law_panopticon:0 "Panopticon"
  law_panopticon_desc:0 "The state maintains a comprehensive apparatus of continuous observation, employing sanctioned scrying, divination, and informant networks to monitor the population. In the name of security and internal stability, private life is rendered conditionally visible."
  law_organic_regulation:0 "Guild Compacts"
  law_organic_regulation_desc:0 "This country is governed by a network of interlocking guild compacts that regulate authority and responsibility. The Head of State is appointed by representatives of the chartered guilds rather than by popular mandate."
  lawgroup_magic:0 "Magical Acceptance"
  law_hedge_practice:0 "Hedge Practice"
  law_hedge_practice_desc:0 "Magic has no legal standing and exists only through custom, tradition, or tolerated exception. Spellcasters operate quietly within established trades or social roles, without recognition or protection."
  law_wizards_suppressed:0 "Starbrands Suppressed"
  law_wizards_suppressed_desc:0 "Magic is regarded as dangerous and is either prohibited or subject to severe restrictions. While individual spellcasting may persist under narrow allowances, the organization of spellcasters into circles, schools, or covens is actively suppressed."
  law_arcane_regulations:0 "Arcane Regulations"
  law_arcane_regulations_desc:0 "Magical practice is legally permitted, but subject to oversight and restrictions on collective or disruptive use."
  law_religious_sanctioned_magic:0 "Religious Monopoly"
  law_religious_sanctioned_magic_desc:0 "Spellcasting is permitted primarily through recognized religious institutions. While miracles and holy rites are embraced, secular or independent magical practice is subject to restriction and oversight."
  law_sanctioned_magic:0 "Sanctioned Magic"
  law_sanctioned_magic_desc:0 "Magic is recognized as a legitimate and valued part of society, and spellcasters are openly employed across civilian and state functions."
  law_arcane_ascendancy:0 "Arcane Ascendancy"
  law_arcane_ascendancy_desc:0 "Spellcasters dominate magical production and reshape society around arcane power."
