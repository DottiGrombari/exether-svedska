 je_nihilist_movement:0 "Nihiliströrelsen"
 je_nihilist_movement_goal:0 "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName]Ett av följande:\n[SCOPE.GetRootScope.GetCountry.GetName] har antagit[GetLawType('law_censorship').GetName]  eller [GetLawType('law_outlawed_dissent').GetName], och alla nihilistiska intressegrupper har hållits i schack i mer än 5 år\n[SCOPE.GetRootScope.GetCountry.GetName]; har upprätthållit  positivt#! stöd#bold från , eller har hållit dem marginaliserade i mer än 5 år"
 je_nihilist_movement_trigger_tt_1:0 "$movement_nihilist$#![SCOPE.GetRootScope.GetCountry.GetName] har trätt i kraft[GetLawType('law_censorship').GetName]  eller [GetLawType('law_outlawed_dissent').GetName], och  #b har varit upphävd i mer än 5 år"
 je_nihilist_movement_trigger_tt_2:0 "[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName][SCOPE.GetRootScope.GetCountry.GetName] har behållit det#boldpositiva#! stödet från , eller har hållit dem i en marginaliserad position i mer än 5 år"
 je_nihilist_movement_reason:0 "En radikal[GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] rörelse, som hävdar att den strävar efter att avskaffa allt som förklarats heligt, har börjat sprida skrifter som fördömer gudomligt utsatt styre. Denna rörelse hotar själva grundvalarna för vår regering med sin kritik."
 has_no_nihilist_movement_tt:0 "Har#binte#! någon aktiv#v  $movement_nihilist$#!"
