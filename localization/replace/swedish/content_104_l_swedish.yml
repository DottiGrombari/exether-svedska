 je_antarctica_reason:0 "Vår planets mysterier börjar sakta avslöjas. Att vara först med att kartlägga Sydpolen skulle ge oss ovärderlig vetenskaplig kunskap."
 antarctic_research:0 "Everfrosterns geologiska undersökning"
 climbed_erebus:0 "Erebus i skala"
 first_to_the_pole:0 "Den första som nådde Sydpolen"
