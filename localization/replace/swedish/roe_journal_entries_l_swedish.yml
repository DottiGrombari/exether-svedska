 je_halfland:0 "The Halfland Accord"
 je_halfland_reason:0 "In elder days, the Softpaw and Meadowguard folk stood side by side in fellowship, their shires bound by trust and plenty. Now, as the age of Halfland dawns anew, that bond must be restored and strengthened — so that halfling hands may once more shape their own destiny."
