 warlord_china_events.301.t:0 "[SCOPE.sCharacter('yan_xishan_thinker').GetFullName] Tanke"
 warlord_china_events.301.d:0 "Vår ledare[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]har utarbetat en genomarbetad ny ideologi som syftar till att ena nationen. Den bygger på många olika källor, är komplex och kan vara svår att förmedla till folket."
 warlord_china_events.301.f:0 "”Vår härliga nya ideologi är helt och hållet allomfattande och förenar allt som är av värde inom militarism, nationalism, anarkism, demokrati, kapitalism, kommunism, individualism, imperialism, universalism, paternalism och utopism.”"
