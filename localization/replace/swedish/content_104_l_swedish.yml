 decree_events.6.t:0 "Musik för mina öron"
 decree_events.6.d:0 "En hyllad grupp kringresande artister har anlänt till [SCOPE.sState('decree_state').GetName], vilket har följts av hundratals förfrågningar om vårt generösa statliga stöd till en av deras konserter."
 decree_events.6.f:0 "”Deras texter… nej, du skulle inte förstå dem, bara de sorgsnaste och djupaste själarna kan dyka in i deras hjärtan, som ligger vidöppna framför oss genom de där pianotonen… Deras låtar handlar om ensamhet, oförståelse, avsaknaden av en fridfull plats att dra sig tillbaka till... De fångar verkligen en tonårings själs sorg, hur skulle du kunna förstå det?”"
 decree_events.6.a:0 "Stöd dem!"
 decree_events.6.b:0 "De låter… inte särskilt bra."
 foreign_concert_modifier:0 "Utländsk konsert"
 foreign_concert_costs_modifier:0 "Kostnader för utlandskonserter"
