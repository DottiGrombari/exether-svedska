 meiji.13.t:0 "The Opening of Japan"
 meiji.13.d:0 "Forced to open itself to the world, [ROOT.GetCountry.GetName] must now contend with the economic interference of other powers. The authority of the [SCOPE.sCharacter('shogun_scope').GetLastName] Clan and the [SCOPE.gsInterestGroup('shogunate_ig').GetName] have, consequently, been greatly undermined."
 meiji.13.f:0 "The changing winds of time howl against our door and to preserve our establishement we must bend and open them to the whims of the world."
 meiji.13.a:0 "We must adapt to our new circumstances."
 bic_breakup.1.t:0 "The End of British Rule?"
 bic_breakup.1.d:0 "Rudderless and without the support of its colonial overlord, the [ROOT.GetCountry.GetName] is on the verge of collapse. It seems that [SCOPE.sCulture('british_culture').GetName] rule is at an end."
 bic_breakup.1.f:0 "\"Abandoning our post? What post, what army? In a few hours this place will be swarming with Hindus, or on fire, or both. Now stop complaining and pick up that sack. Take anything of value that isn't nailed down, and I'll secure passage to London.\""
 bic_breakup.1.a:0 "India will be divided between the Princes."
 bic_breakup.1.b:0 "This is the birth of an Indian nation."
 bic_breakup.1.c:0 "British rule must be maintained at all costs."
 india_princes_independent_tt:0 "All [concept_subject] countries will become independent, and our [Concept('concept_state', '$concept_states$')] will be divided between them."
 warlord_china_implosion_tt:0 "Our [Concept('concept_state', '$concept_states$')] will be divided between the warlords"
 dei_breakup.1.t:0 "The East Indies' End"
 dei_breakup.1.d:0 "Rendered without support by the withdrawal of its colonial overlord, the [ROOT.GetCountry.GetName]'s administration has begun to collapse across the Indonesian archipelago. It seems that colonial rule is at an end at last."
 dei_breakup.1.f:0 "Across the islands, the silence rose like a wave. Cut telegraph wires, deserting policemen, farms that would no longer report their harvests. And then, the silence broke, and with it came annihilation."
 dei_breakup.1.a:0 "The peoples of the archipelago have seized their right."
 dei_breakup.1.b:0 "One motherland, one nation, one language!"
 dei_breakup.1.c:0 "We will rage against the storm until we are saved."
 dei_vassals_independent_tt:0 "All [concept_subject] countries will become independent, and our [Concept('concept_state', '$concept_states$')] will be divided between them."
