 doctrine_of_lapse_disabled:0 "#!”Lapse-doktrinen”#b kommer att avskaffas, vilket innebär att [Concept('concept_princely_state','$concept_princely_states$')]"
 raj.1.t:0 "Kronjuvelen"
 raj.1.d:0 "Dess[SCOPE.sCountry('company_country').GetName] styre har upphört, och den[SCOPE.sCountry('british_raj_country').GetAdjectiveNoFormatting] brittiska regeringen kommer nu att spela en större roll i indiska angelägenheter. Historien kommer att minnas denna dag som början på det brittiska kolonialväldet."
 raj.1.f:0 "”Så länge vi härskar över Indien är vi världens mäktigaste makt. Om vi förlorar det kommer vi omedelbart att sjunka till en tredjeklassens makt. Endast genom despotiska metoder kan vi utvinna det som imperiet behöver från Indien.”"
 raj.1.a:0 "Äntligen är företagsstyret borta."
 activate_british_raj:0 "Ostindiska kompaniet kommer att ombildas till det brittiska imperiet"
 raj.2.t:0 "Principen om förfall åberopas"
 raj.2.d1:0 "Invånaren[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] har åberopat ”lapse-doktrinen” och hänvisat till vår härskares höga ålder och oförmåga att få en manlig tronarvinge. Genom[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting]ett dekret ska territoriet[ROOT.GetCountry.GetName] omedelbart införlivas i [ROOT.GetCountry.GetTopOverlord.GetName]."
 raj.2.d2:0 "Residenten[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting] har åberopat principen om förfall och hänvisat till den påstådda inkompetensen hos vår [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Genom[ROOT.GetCountry.GetTopOverlord.GetAdjectiveNoFormatting]ett dekret ska territoriet[ROOT.GetCountry.GetName]  omedelbart införlivas i [ROOT.GetCountry.GetOverlord.GetName]."
 raj.2.f:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]Klockan ett på eftermiddagen, på slaget, kom residenschefen in. Klockan ett och fem minuter serverades te till  och[ROOT.GetCountry.GetRuler.GetHerHis]  tolken[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Klockan ett och tio minuter serverades diktamen. Klockan ett och femton minuter fanns det varken  [ROOT.GetCountry.GetNameNoFormatting]eller  längre. Residenschefen gick därifrån, medan ångan fortfarande steg upp från hans orörda kopp."
 raj.2.a:0 "Det finns ingen möjlighet för oss att göra motstånd."
 raj.2.b:0 "Samla vår armé, här ska vi stå emot."
