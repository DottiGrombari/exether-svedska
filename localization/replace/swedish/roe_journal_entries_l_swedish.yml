 je_being_raided:0 "Bandit Raids"
 je_being_raided_reason:0 "Vile bandits and pirates such as [SelectLocalization(ROOT.GetCountry.MakeScope.Var('subject_raided_state_perpetrator').GetCountry.IsValid, ROOT.GetCountry.MakeScope.Var('subject_raided_state_perpetrator').GetCountry.GetNameNoFlag, ROOT.GetCountry.MakeScope.Var('owned_raided_state_perpetrator').GetCountry.GetNameNoFlag)] are plaguing our country. Their raiders have slain our merchants and harried our people for too long. \n\nWe could answer with overwhelming force to make an example of them. \n\n#v Raiding:#! \nRaided [Concept('concept_state', '$concept_states$')] suffer penalties to [concept_taxes] and increased effects from [concept_turmoil]."
 je_being_raided_lobby:0 "Vile bandits and pirates such as [SelectLocalization(ROOT.GetCountry.MakeScope.Var('subject_raided_state_perpetrator').GetCountry.IsValid, ROOT.GetCountry.MakeScope.Var('subject_raided_state_perpetrator').GetCountry.GetNameNoFlag, ROOT.GetCountry.MakeScope.Var('owned_raided_state_perpetrator').GetCountry.GetNameNoFlag)] are plaguing our country. Their raiders have slain our merchants and harried our people for too long. \n\nWe could answer with overwhelming force to make an example of them. \n\n#v Raiding:#! \nRaided [Concept('concept_state', '$concept_states$')] suffer penalties to [concept_taxes] and increased effects from [concept_turmoil]."
