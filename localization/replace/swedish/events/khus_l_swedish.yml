 je_fate_of_tisenaria_reason:0 "The marriage of Yolmu Tisenari and Alys Zehiran led to the two independent domains integrating into one, yet it was not a happily-ever-after. Zehiranese seperatists yell on the streets as Yolmu's sister, Nae, seeks to take the Tisenarian throne from her brother. Meanwhile, Athrensei and Thynadûr, two rising hegemons of the region, see an opportunity.\n\n #italic Athrensei and Thynadûr influence in Tisenaria will increase or decrease depending on their respective [Concept('concept_relations', '$concept_relations$')] with Tisenaria. [Concept('concept_fund_lobbies', 'Funding Lobbies')] will drastically increase influence. #!"
