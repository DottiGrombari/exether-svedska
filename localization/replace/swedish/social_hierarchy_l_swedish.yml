l_swedish:
 upper_strata_concept:0 "[concept_upper_strata]"
 middle_strata_concept:0 "[concept_middle_strata]"
 lower_strata_concept:0 "[concept_lower_strata]"
 default_social_hierarchy:0 "Base Hierarchy"
 default_social_hierarchy_desc:0 "A system of organization which classifies members of society into clearly defined categories, seeking to describe social relationships between individuals and groups. Greater material and social resources are afforded to those in higher status groups than those in lower status ones, leading to divergent outcomes and opportunities."
 upper_class:0 "Upper Class"
 upper_class_desc:0 "Members of society with the most privilege and undisputed power. They are in the upper echelon of the Social Hierarchy."
 middle_class:0 "Middle Class"
 middle_class_desc:0 "Members of society with more privilege than the Lower Class. They are mid-ranking within the Social Hierarchy and have some potential for social mobility."
 lower_class:0 "Lower Class"
 lower_class_desc:0 "Members of society with the least privilege, power, and wealth. They are of the lowest ranking of the Social Hierarchy and have limited social mobility."
 upper_class_minority:0 "Rich Heathens"
 upper_class_minority_desc:0 "Members of society with the most privilege and undisputed power. They are in the upper echelon of the Social Hierarchy."
 middle_class_minority:0 "Average Heathens"
 middle_class_minority_desc:0 "Members of society with more privilege than the Lower Class. They are mid-ranking within the Social Hierarchy and have some potential for social mobility."
 lower_class_minority:0 "Poor Heathens"
 lower_class_minority_desc:0 "Members of society with the least privilege, power, and wealth. They are of the lowest ranking of the Social Hierarchy and have limited social mobility."
 british_indian_caste_system:0 "British Indian Caste System"
 british_indian_caste_system_desc:0 "A simplified codification by the British of an ancient Hindu class hierarchy. Initially created to serve and guide the central administration of the Raj. One's position in the hierarchy, and thus one's rights and privileges, are inherited and fixed."
 british_indian_caste_system_trigger_desc:0 "Has #b $hindu$#! [concept_religion] and belongs to a [concept_culture] that has the #b $heritage_group_south_asian$#! [concept_heritage_trait]"
 brahmins:0 "Brahmins"
 brahmins_desc:0 "Traditionally teachers and priests, the Brahmins are the sole people with the right to interpret religious Hindu texts. As such, they dictate the divine rights and privileges afforded to every other caste. Brahmins within the Raj often serve as political representatives and intermediaries."
 kshatriyas:0 "Kshatriyas"
 kshatriyas_desc:0 "Traditionally warriors, the Khashtriyas are charged with military and leadership positions. They enjoy most rights and privileges, bar the ability to dictate divine will."
 vaishyas:0 "Vaishyas"
 vaishyas_desc:0 "The Vaishya caste consists of merchants, traders, and landowners. As such, they are allowed to accumulate wealth and knowledge in the service of the castes above them."
 shudras:0 "Shudras"
 shudras_desc:0 "Shudras are the lowest class within the four recognized castes. They are restricted to servant and labor positions at the mercy of higher castes. They cannot accumulate wealth or knowledge."
 dalit:0 "Dalit"
 dalit_desc:0 "A term used to describe those born out of the four castes. Dalits have no way to join the hierarchy. As such, they are and have been, ostracized and marginalized for generations. Dalits are forced to do menial labor and are afforded no rights or privileges."
 STRATA_CONCEPTS_DEPEND_ON_SOCIAL_HIERARCHY:0 "Which $concept_pops$ belong to this Strata depends on the [Concept('concept_country','$concept_country_possessive$')] [concept_social_hierarchy]."
 jaguda:0 "Jâguda"
 jaguda_desc:0 "The Jaguda (Plowers), comprised of farmers, peasants, slaves, and laborers, toil in the dirt and depths, performing the grueling tasks others shun. They cultivate fields, mine the earth, and shoulder the harshest burdens of society. Essential yet despised, the Jaguda are bound to lives of hardship, their toil ignored and their existence scorned by those they sustain."
 nisnar:0 "Nisnar"
 nisnar_desc:0 "The Nisnar, composed of capitalists, officers, bureaucrats, and academics, are the architects and enforcers of society’s order. They manage resources, direct institutions, and shape policies, bridging the gap between the ruling Ezd Zol and the laboring classes. Valued for their intellect and efficiency, the Nisnar wield influence through systems and strategy, ensuring the machinery of society operates smoothly while securing their own comfort and status."
 ezd_zol:0 "Ezd zôl"
 ezd_zol_desc:0 "The Ezd Zol (Respected Blood) are the aristocracy, heroes, clergy, and powerful mages who stand at the pinnacle of society. Revered for their lineage and deeds, they command authority and wield influence over all others. Guardians of tradition and power, they are celebrated in tales and histories, their names etched into the annals of greatness. To be Ezd Zol is to embody privilege, prestige, and the weight of destiny."
 thoma:0 "Thoma"
 thoma_desc:0 "The Thoma, (Runeseers), are the revered custodians of dwarven heritage and spiritual wisdom. As powerful archmages and devoted clergy, they bridge the realms of the living and the ancestral. Guardians of sacred knowledge, they interpret the ancient runes, preserving the truths of ages past while guiding the present. To be Thoma is to hold the weight of memory and foresight, shaping destiny through communion with the divine and the eternal wisdom of the ancestors.."
 udat:0 "Ûdat"
 udat_desc:0 "The Udat are artificers, artisans, adventurers, and engineers—the hands and minds behind society’s progress. Revered for their \"honest work,\" they build, craft, and explore, shaping the world with skill and determination. Neither rulers nor laborers, the Udat earn respect through their ingenuity and grit, standing as the heart of industry and innovation."
 sassat:0 "Sassat"
 sassat_desc:0 "The Sassat (Forgotten), consisting of clerks, soldiers, and shopkeepers, form the essential but unremarked backbone of society. Bound to their roles by tradition, they serve diligently yet remain nameless in history, their contributions overlooked and their lives destined for quiet obscurity."
 mek:0 "Mek"
 mek_desc:0 "The Mek (Chiefs) are warchiefs, nobles, officers, and sorcerers. They rule through strength, fear, and cunning, carrying the weight of tribe and blood. To be Mek is to command, to conquer, and to risk all for glory."
 kvotmat:0 "Kvotmat"
 kvotmat_desc:0 "The Kvotmat (Teachers) are priests, scholars, and law-speakers. They guard the old ways, whisper counsel to the chiefs, and bind the tribes through memory and ritual. Their wisdom is feared as much as it is needed."
 kvokve:0 "Kvokve"
 kvokve_desc:0 "The Kvokve (Warriors) are the sword-arm of the orcs. Soldiers, hunters, and champions, they live for the clash of steel and the honor of ancestors. In their ranks, life and death are one."
 yukh:0 "Yukh"
 yukh_desc:0 "The Yukh (Rich) are landholders and traders, their coin and harvests giving them sway. They wield power without titles, envied for their plenty but mistrusted for their hunger."
 hidi:0 "Hidi"
 hidi_desc:0 "The Hidi (Strong) are the laborers and peasants. Their backs raise halls, their hands feed the clans. Hard lives forge hard folk, honored for their toil but bound to it."
 zed:0 "Zed"
 zed_desc:0 "The Zed (Weak) are clerks, shopkeepers, and petty tradesmen. Scorned for their smallness, they slip through history unnoticed, surviving in the cracks left by greater lives."
 on_secue:0 "On Secue"
 on_secue_desc:0 "The On Secue (Higher Priesthood) are scholars, bureaucrats, clergy, and powerful mages who dwell in the highest reaches. Blessed by the divine and the heavens, they interpret sacred knowledge and guide the spiritual and intellectual direction of society. To be On Secue is to stand closest to the celestial realm."
 pofen_secue:0 "Pofen Secue"
 pofen_secue_desc:0 "The Pofen Secue (Lower Priesthood) are clergy, scholars, and mages dwelling in the lowlands. Though removed from the heights, they still serve the spiritual needs of their people and preserve sacred knowledge, their connection to the divine mediated through those above them."
 on_gronil:0 "On Gronil"
 on_gronil_desc:0 "The On Gronil (Higher Masters) are aristocrats, lords, capitalists, and officers who dwell upon the peaks. These masters command authority and wealth through their elevated station, directing the affairs of state and commerce from their lofty positions. To be On Gronil is to hold dominion."
 pofen_gronil:0 "Pofen Gronil"
 pofen_gronil_desc:0 "The Pofen Gronil (Lower Masters) are nobles, capitalists, engineers, and officers of the plains and valleys. Though lacking the prestige of their higher counterparts, they still wield considerable influence over resources and people, their authority constrained by geography and birth."
 on_alal:0 "On Alal"
 on_alal_desc:0 "The On Alal (Higher Traders) are merchants, clerks, and shopkeepers who conduct business from the mountain settlements. Elevated by their commerce and cunning, they accumulate wealth and facilitate trade between the heights and lowlands, their prosperity tied to advantageous position."
 pofen_alal:0 "Pofen Alal"
 pofen_alal_desc:0 "The Pofen Alal (Lower Traders) are merchants, farmers, and shopkeepers of the lowlands. Their trade and commerce sustain communities below, yet their station remains subordinate to those dwelling in the heights. They survive through industry and negotiation."
 on_adrir:0 "On Adrir"
 on_adrir_desc:0 "The On Adrir (Higher Workers) are laborers, soldiers, and craftspeople who toil in the mountain strongholds. Though bound to labor, their position serves essential functions in the elevated communities, affording them slightly greater standing than their lowland counterparts."
 pofen_adrir:0 "Pofen Adrir"
 pofen_adrir_desc:0 "The Pofen Adrir (Lower Workers) are laborers, farmers, peasants, and soldiers of the valleys and plains. They perform the grueling toil of the lowlands, their lives constrained by geography and station. Essential yet despised, they are the foundation upon which society rests."
 ocamu:0 "Ocamu"
 ocamu_desc:0 "The Ocamu are slaves and bondspeople stripped of freedom and dignity. Denied status within the hierarchy, they represent the lowest rung of society—a permanent underclass serving at the whim of their masters. To be Ocamu is to exist beneath consideration."
 orc_social_hierarchy:0 "Moyadi"
 orc_social_hierarchy_desc:0 "The Moyadi (The Order), is the measure of worth among the orcs. What one does, whether leading, fighting, building, or trading, marks their standing. The Moyadi is no fixed law, but a shifting balance that rises and falls with strength, fortune, and need."
 dwarf_social_hierarchy:0 "Kakhâ Tradition"
 dwarf_social_hierarchy_desc:0 "The Kakhâ Tradition is an ancient dwarven social hierarchy, deeply rooted in tradition and stonebound law. It delineates one’s role, rights, and privileges within society, with status inherited and immutable. Originally established to preserve order and ensure the prosperity of the dwarven holds, it binds individuals to their ancestral crafts or duties, reinforcing a sense of purpose while cementing the social structure. Though revered for its stability, the Kakhâ Tradition leaves little room for ambition or change, emphasizing duty over individuality."
 dwarf_social_hierarchy_trigger_desc:0 "Belongs to a [concept_culture] that has a #b $Dwarf$#! [concept_heritage_trait]"
 orc_social_hierarchy_trigger_desc:0 "Belongs to a [concept_culture] that has an #b $Orc$#! [concept_heritage_trait]"
 avian_social_hierarchy_trigger_desc:0 "Belongs to a [concept_culture] that has an #b $Avian$#! [concept_heritage_trait]"
 avian_social_hierarchy:0 "The Laws of Vitic"
 avian_social_hierarchy_desc:0 "Avian myth states that the Laws of Vitic were put into place after Vitic called all of the great bird tribes to prove their strength to decide who would receive dominion over the mountains. According to legend, the Whitefeathers were given dominion over all the highest points of the world after their champion flew beyond the Realms of Exether and brought back the sun itself."
 law_avian_caste_codified:0 "Caste System Codified"
 law_avian_caste_enforced:0 "Caste System Enforced"
 law_avian_caste_not_enforced:0 "Caste Not Enforced"
 law_abirbbative_action:0 "Affirmative Action"
 lawgroup_avian_caste_hegemony:0 "Caste Hegemony"
 lawgroup_dwarf_guild_dominance:0 "Guild Dominance"
 lawgroup_orc_militarization:0 "Militarization"
 starbrands:0 "Starbrands"
 starbrands_desc:0 "Zodiac Brands are rare, celestial marks bestowed upon a limited number of children born under a highly specific astral convergence: during the zodiac sign's ruling month in the year governed by that same sign. These individuals, known colloquially as [Concept('concept_starbrand', 'Starbrands')], are granted a magical affinity with their patron sign and the innate capacity for spellcasting."
 clergy:0 "Clergy"
 clergy_desc:0 "Clergy are individuals who have taken religious vows and dedicate their lives to the service of their faith."
