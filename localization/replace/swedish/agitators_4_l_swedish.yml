 single_party_state.1.t:0 "Partiet för [ROOT.GetCountry.GetNameNoFormatting]"
 single_party_state.1.d:0 "Som ett uttryck för stöd och nationell enighet har[SCOPE.gsInterestGroup('party_switch_ig').GetName]  beslutat att stödja  kandidatlista[SCOPE.sParty('ruling_party').GetName] inför alla kommande val, i stället för sitt eget partis."
 single_party_state.1.f:0 "”I dessa tider av ständiga kriser finns det ingen jag hellre skulle ställa mig bakom än , och inget parti jag hellre skulle stödja än [SCOPE.sParty('ruling_party').GetNameNoFormatting][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]. Så säger vi alla.”"
 single_party_state.1.a:0 "Med tiden kommer de alla att ställa sig bakom oss."
 single_party_state.1.b:0 "Låt detta[SCOPE.gsInterestGroup('party_switch_ig').GetName]vara ett föredöme för oss alla."
 single_party_state.2.t:0 "Folket och partiet"
 single_party_state.2.d:0 "I takt med att arbetet med att bygga upp[SCOPE.sLaw('current_law_scope').GetName]  fortsätter har många medlemmar i  börjat ställa frågor om hur man bäst kan öka medlemmarnas[SCOPE.sParty('ruling_party').GetName] deltagande i partiarbetet."
 single_party_state.2.f:0 "”Vi måste ha förtroende för folket och vi måste ha förtroende för partiet. Detta är två grundläggande principer. Om vi tvivlar på dessa principer kommer vi inte att åstadkomma någonting.”"
 single_party_state.2.a:0 "Vi måste först fokusera på att skapa en ram innan vi kan expandera."
 single_party_state.2.b:0 "Det är av avgörande betydelse att partiet omfattar hela folket."
 single_party_state.3.t:0 "Gatorna lever"
 single_party_state.3.d:0 "[SCOPE.sLaw('current_law_scope').GetName]I protest mot  :s[SCOPE.sParty('ruling_party').GetName] försök att inrätta en  har demonstranter, som till stor del är knutna till  ,[SCOPE.gsInterestGroup('protester_ig').GetName] inlett en flerdagars ockupation av gatorna i städer över hela [SCOPE.sState('capital_scope').GetName]."
 single_party_state.3.f:0 "Gatorna i[SCOPE.sState('capital_scope').GetCityHubName]  var ett hav av röster, där slagorden svallade fram och tillbaka medan arrangörerna ledde kören. Deras röster ekade genom gatorna, genljöd genom fönstren och reflekterades i polisernas brickor, som stod uppställda i formation framför dem. \n\nIkväll var gatorna i[ROOT.GetCountry.GetNameNoFormatting]  fulla av liv – men något annat kunde skönjas i varje demonstrants ögon. En bister beslutsamhet och rädslan för att denna natt skulle bli den sista."
 single_party_state.3.a:0 "Uppmana våra anhängare att visa sitt stöd."
 single_party_state.3.b:0 "Sådana saker kräver batongen, och inte mycket annat."
 single_party_state.3.c:0 "Vi måste ägna mer tid åt att informera allmänheten om vårt system."
 single_party_state.4.t:0 "Att stoppa revolutionen"
 single_party_state.4.d:0 "Ansträngningarna att upplösa de[SCOPE.sParty('ruling_party').GetName] återstående borgerliga partierna i[ROOT.GetCountry.GetName]  har hindrats av hårt motstånd från extremhögerelement som sympatiserar med [SCOPE.gsInterestGroup('fascist_ig').GetName]."
 single_party_state.4.f:0 "[SCOPE.sParty('ruling_party').GetNameNoFormatting]Sotet hade täckt framsidan av högkvarteret – ett resultat av det kortvariga inferno som utlöstes av den brinnande oljan som kastats mot fasaden. Krossat glas knastrade under fötterna när milismännen rörde sig för att återigen säkra byggnaden.\n\nDet stod klart att detta inte var en enkel vandalismhandling. Detta var en reaktion på den pågående revolutionen – en krigshandling mot proletariatet."
 single_party_state.4.a:0 "Vi måste först och främst fokusera på vår egen agenda."
 single_party_state.4.b:0 "Ned med fascisterna, innan de hinner gömma sig!"
 single_party_state.5.t:0 "Enbart för folket"
 single_party_state.5.d:0 ":s[SCOPE.sParty('ruling_party').GetName] försök att befästa sin makt över[ROOT.GetCountry.GetName]  har hindrats av hårt motstånd från socialistiska krafter som sympatiserar med [SCOPE.gsInterestGroup('socialist_ig').GetName]."
 single_party_state.5.f:0 "”Vi får inte acceptera denna hänsynslösa förstärkning av de reaktionära krafterna i samhället! Proletariatets partis uppgift är att förena de arbetande folken till en sammanhållen front för hela proletariatet. Kom, arbetare, bönder, frihets- och demokrativänner... stå emot den fascistiska vågen och rädda er själva!” \n\nDen sönderslitna affischen syntes bara ett ögonblick genom det smutsiga vattnet i pölen där den låg, innan ännu en känga tryckte ner den under ytan."
 single_party_state.5.a:0 "Vår väg är helt och hållet vår egen."
 single_party_state.5.b:0 "Krossa kommunisterna, vad det än krävs!"
 single_party_state.6.t:0 "Reform genom revolution"
 single_party_state.6.d:0 "Med många statsangelägenheter lamslagna till följd av  [SCOPE.sParty('ruling_party').GetName]:s insatser har kommunistiska miliser under befäl av[SCOPE.sCharacter('communist_leader_scope').GetFullName]  ockuperat viktiga byggnader över hela [SCOPE.sState('capital_scope').GetName], och förkunnat slutet på den ”borgerliga diktaturen”."
 single_party_state.6.f:0 "Det är vår uppgift att avskaffa det gamla och införa en högre form av demokrati, en som kommer att inspirera massorna av det utnyttjade proletariatet att skapa ny historia.\n\nDe som anställer andra för vinstens skull; de som lever på inkomster som inte härrör från deras eget arbete – ränta på kapital, industriföretag eller jordegendom; privata affärsmän, agenter, mellanhänder; munkar och präster av alla trosriktningar; före detta anställda vid de gamla polisstyrkorna; galningar och brottslingar... alla dessa är inte välkomna inom folkets parti."
 single_party_state.6.a:0 "All makt åt proletariatet!"
 single_party_state.6.b:0 "Förhindra denna kupp redan vid portarna!"
 single_party_state.7.t:0 "Bemyndigandelagarna"
 single_party_state.7.d:0 "De[SCOPE.sParty('ruling_party').GetName]har låst dörrarna till[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]  med lagstiftarna kvar inne och omedelbart lagt fram ett förslag om att radikalt utvidga den nuvarande regeringens befogenheter. Oppositionen har tystats av brunklädda fascistiska paramilitärer på åhörarläktaren."
 single_party_state.7.f:0 "§ 1: \nUtöver det förfarande som föreskrivs i konstitutionen kan lagar i[ROOT.GetCountry.GetNameNoFormatting]  även antas av regeringens i [ROOT.GetCountry.GetNameNoFormatting]. \n\n§ 2: \nLagar som antas av regeringens i[ROOT.GetCountry.GetNameNoFormatting]  får avvika från konstitutionen så länge de inte påverkar institutionerna i [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. Rättigheterna för[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  förblir oförändrade."
 single_party_state.7.a:0 "[SCOPE.sParty('fascist_party_scope').GetName]Endast  kan rädda [ROOT.GetCountry.GetName]!"
 single_party_state.7.b:0 "Åt helvete med konsekvenserna, det här är ingen demokrati!"
