 agitators_law_events.1.t:0 "Obstruktionism i [SCOPE.gsInterestGroup('opposing_ig').GetName]"
 agitators_law_events.1.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName]"
 agitators_law_events.1.f:0 "”De [SCOPE.gsInterestGroup('opposing_ig').GetNameNoFormatting]där! En samling råttor som sitter i sina förgyllda stolar och påstår sig tjäna folkets intressen. Och ändå har folket talat, och det är just detta folk som kräver att de ska upphöra med detta!”"
 agitators_law_events.1.a:0 "Tvinga dem[SCOPE.gsInterestGroup('opposing_ig').GetName]att samarbeta för tillfället."
 agitators_law_events.1.b:0 "Vi kommer inte att äventyra vår relation på grund av en enda lag."
 agitators_law_events.2.t:0 "Politisk fängsling"
 agitators_law_events.2.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName] och[SCOPE.sCharacter('supporting_agitator').GetHerHis]  anhängare har offentligt lämnat in en petition vid ett fängelse i[SCOPE.sState('imprisoned_state').GetName]  för att en pro-demokrati-demonstrant[SCOPE.sLaw('current_law_scope').GetName] som hålls fängslad där, anklagad för störande av allmän ordning, ska friges."
 agitators_law_events.2.f:0 "Fången satt i sin mörka cell och stirrade apatiskt på väggen. Rösterna började återigen tränga sig in i hans sinne, upprepade hans namn om och om igen och gav uttryck för hans plåga. \n\nHan blundade och täckte för öronen, i ett försök att få det att sluta. Först när en välsignad tystnad äntligen sänkte sig över honom insåg han att sångerna inte alls kom inifrån hans huvud."
 agitators_law_events.2.a:0 "Hans fängelsestraff har redan uppnått sina mål."
 agitators_law_events.2.b:0 "Rättvisan kommer inte att undergrävas av pöbelns påbud."
 agitators_law_events.3.t:0 "Utländsk efterlikning"
 agitators_law_events.3.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName][SCOPE.sLaw('current_law_scope').GetName]De framgångar som[SCOPE.sCountry('emulated_country').GetName]  har uppnått med sin politik har uppmärksammats av  sina anhängare, som lyfter fram landet som ett exempel på en idealisk stat."
 agitators_law_events.3.f:0 "[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting] han höll upp tidningen med ett roat uttryck i[SCOPE.sCharacter('supporting_agitator').GetHerHis]ansiktet\n\n: ”Ser du det här? Det här är ett erkännande av seger. De må kalla oss spioner, agenter för utländska makter, men de medger också att den förändring vi eftersträvar inte alls är något främmande eller utan motstycke...”"
 agitators_law_events.3.a:0 "Det som lyckades i[SCOPE.sCountry('emulated_country').GetName]  kommer att lyckas i [ROOT.GetCountry.GetName]."
 agitators_law_events.3.b:0 "[ROOT.GetCountry.GetName] är inte [SCOPE.sCountry('emulated_country').GetName]."
 agitators_law_events.3.c:0 "Varför inte använda den aktuella[SCOPE.sCountry('emulated_country').GetAdjective]lagen som mall?"
 agitators_law_events.4.t:0 "Att äventyra folkets säkerhet"
 agitators_law_events.4.d:0 "Företrädare för  inom regeringen[SCOPE.gsInterestGroup('opposing_ig').GetName] har krävt flera kompromisser i samband med införandet av [SCOPE.sLaw('current_law_scope').GetName]. Dessa åtgärder har redan fördömts av anhängare av[SCOPE.sCharacter('supporting_agitator').GetFullName]  som något som undergräver reformen i sin helhet."
 agitators_law_events.4.f:0 "”En folkmassas rop på gatan kommer inte att förändra vad som ligger i nationens intresse. Vi har valt att hålla fast vid våra principer och hindra denna regering från att begå ett fruktansvärt misstag. Det är allt, och det är allt det någonsin kommer att handla om.”"
 agitators_law_events.4.a:0 "Fördelen med detta[SCOPE.gsInterestGroup('opposing_ig').GetName]uppväger inte den skada som orsakas."
 agitators_law_events.4.b:0 "[SCOPE.sCharacter('supporting_agitator').GetLastName] kommer att klaga, men vi kommer att agera."
 agitators_law_events.5.t:0 "Förvirring och förseningar"
 agitators_law_events.5.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName][SCOPE.gsInterestGroup('agitator_ig').GetName]Anhängare av[SCOPE.sLaw('current_law_scope').GetName] [...], bland vilka [...], med [...], i spetsen, har offentligt ifrågasatt hur lång tid det tar för lagen att antas."
 agitators_law_events.5.f:0 "”Regeringen begår just nu en grymhet genom sin kalla byråkrati. Den prioriterar rutiner framför människoliv, pappersarbete framför hunger. Hur många människor måste lida för att tillfredsställa känslorna hos vissa statstjänstemän som aldrig i sitt liv har känt minsta hunger? Dokument kan vänta, mina damer och herrar – men folkets lidande kan inte det!”"
 agitators_law_events.5.a:0 "Lagförslaget kommer att antas när förfarandet är avslutat."
 agitators_law_events.5.b:0 "Dokument kan vänta. Människorna kan inte det."
 agitators_law_events.6.t:0 "Folkets opposition"
 agitators_law_events.6.d:0 "Verksamheten inom[SCOPE.sCharacter('opposing_agitator').GetFullName]  har väckt ett betydande motstånd bland allmänheten mot införandet av [SCOPE.sLaw('current_law_scope').GetName]. Vissa personer inom[SCOPE.gsInterestGroup('concerned_ig').GetName]  är oroliga för hur detta kan påverka deras stöd bland befolkningen."
 agitators_law_events.6.f:0 "Ett hav av papper täckte huvudstadens väggar, trots renhållningsverkets tappert kämpande nattliga försök att ta bort dem.[SCOPE.sCharacter('concerned_ig_leader').GetFullNameNoFormatting]Han pekade slumpmässigt på en byggnad. \n\n”Ser du det där? Hur ska jag kunna få stöd för förslaget om det kan vara mitt hem som blir utsatt för vandalism nästa gång?”"
 agitators_law_events.6.a:0 "Inled en dialog med oppositionen."
 agitators_law_events.6.b:0 "[SCOPE.gsInterestGroup('concerned_ig').GetName]Dessa farhågor är helt ogrundade."
 agitators_law_events.7.t:0 "Föraktlig neutralitet"
 agitators_law_events.7.d:0 "Den allmänna opinion som[SCOPE.sCharacter('opposing_agitator').GetFullName]har väckts mot[SCOPE.sLaw('current_law_scope').GetName] [...], har fått [[SCOPE.gsInterestGroup('neutral_ig').GetName]...], att vägra att stödja lagen i dess nuvarande utformning."
 agitators_law_events.7.f:0 "”Vi beklagar att behöva meddela er att vårt beslut i denna fråga är fattat. Det är uppenbart att allmänheten är starkt emot lagen i dess nuvarande utformning, och vi har inget intresse av att ställa oss bakom ett förslag som i sin helhet har visat sig vara skadligt.”"
 agitators_law_events.7.a:0 "Ändra lagen så att den blir lättare att stödja."
 agitators_law_events.7.b:0 "Gör det tydligt för dem[SCOPE.gsInterestGroup('neutral_ig').GetName]att de är onödiga."
 agitators_law_events.8.t:0 "En ström av kränkningar"
 agitators_law_events.8.d:0 "[SCOPE.sCharacter('opposing_agitator').GetFullName] har riktat en rad hårda förolämpningar mot[SCOPE.sCharacter('supporting_ig_leader').GetFullName]  på grund av hans stöd till [SCOPE.sLaw('current_law_scope').GetName].  har krävt att[SCOPE.gsInterestGroup('supporting_ig').GetName] regeringen ska vidta åtgärder för att försvara[SCOPE.sCharacter('supporting_ig_leader').GetHerHis]  hedern."
 agitators_law_events.8.f:0 "\"[SCOPE.sCharacter('supporting_ig_leader').GetFullNameNoFormatting]har samma mentalitet som ett särskilt långsamt barn. Detta är helt enkelt verkligheten i[SCOPE.sCharacter('supporting_ig_leader').GetHerHis]situationen. Jag tvivlar starkt på att[SCOPE.sCharacter('supporting_ig_leader').GetSheHe]han fullt ut förstår konsekvenserna av det han påstår sig önska. Jag misstänker snarare att[SCOPE.sCharacter('supporting_ig_leader').GetHerHis]hans näsflöden – som av någon olycklig översättare uppfattats som tal – helt enkelt automatiskt har likställts med den värsta möjliga åsikten.\"\n\n\”Det är dock inte förvånande att en sådan åsikt kom över[SCOPE.sCharacter('supporting_ig_leader').GetHerHis]  läppar, för man måste inse att[SCOPE.sCharacter('supporting_ig_leader').GetSheHe]  helt enkelt saknar de mentala förmågorna att delta i politik i god tro...”"
 agitators_law_events.8.a:0 "[SCOPE.sCharacter('supporting_ig_leader').GetFullName] måste lära sig att bli mer motståndskraftig."
 agitators_law_events.8.b:0 "Påminn[SCOPE.sCharacter('opposing_agitator').GetFullName]om våra lagar mot förtal."
 agitators_law_events.9.t:0 "Föråldrade ord"
 agitators_law_events.9.d:0 "Tidningsartiklar och uttalanden från flera år tillbaka, där nuvarande regeringsföreträdare uttryckt sitt motstånd[SCOPE.sLaw('current_law_scope').GetName] mot [...], har grävts fram av tidningar som sympatiserar med [SCOPE.sCharacter('opposing_agitator').GetFullName][...]. Dessa avslöjanden har lett till anklagelser om opportunism från såväl lagens motståndare som dess anhängare."
 agitators_law_events.9.f:0 "”Vi måste nu ta upp frågan om tidigare ståndpunkter i detta ärende. För inte mindre än tre år sedan publicerade en av lagförslagets medförslagsställare en ledare där han fördömde just detta förslag som ett \”hopplöst slöseri med tid\”, en \”dåligt genomtänkt och irrelevant fråga\” samt andra hårda omdömen. Men under de senaste dagarna, utan tvekan med hjälp av betydande summor pengar, verkar den påstått hedervärde herren ha ändrat sin åsikt helt och hållet...”"
 agitators_law_events.9.a:0 "Vilken slapp principlöshet!"
 agitators_law_events.9.b:0 "Människor kan ändra åsikt med tiden."
 agitators_law_events.10.t:0 "Brev till de dömda"
 agitators_law_events.10.d:0 "[SCOPE.sCharacter('opposing_agitator').GetFullName]Efter gripandet av en framstående motståndare till[SCOPE.sLaw('current_law_scope').GetName]  har man inlett en offentlig brevkampanj för att visa sitt stöd för denne."
 agitators_law_events.10.f:0 "”Jag hoppas att du har haft det bra...” \n\n”Vi ber för att du snart ska släppas fri...” \n\n”Denna orättvisa har blottlagts på ett skoningslöst sätt...” \n\nAllt detta och mycket mer låg och skramlade i postväskan, medan kuriren närmade sig sin destination."
 agitators_law_events.10.a:0 "Bokstäverna måste flyta fritt."
 agitators_law_events.10.b:0 "Se till att inget av det här tramset hamnar i fängelset."
 agitators_law_events.11.t:0 "Medborgarföreningen[SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]"
 agitators_law_events.11.d:0 "En sällskapsklubb som är populär bland den bildade klassen har anordnat en salong i [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], där[SCOPE.sCharacter('supporting_agitator').GetFullName]  talade till förmån för[SCOPE.sLaw('current_law_scope').GetName]  i egenskap av hedersgäst."
 agitators_law_events.11.f:0 "”Det är utan tvekan så. Men har du funderat på hur något sådant skulle tas emot?”\n\n[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting] Han nickade mot talaren och lät sedan blicken vandra runt i det träpanelklädda rummet.[SCOPE.sCharacter('supporting_agitator').GetSheHe|U]  Han ställde ner[SCOPE.sCharacter('supporting_agitator').GetHerHis]koppen. \n\n”Jag har funderat en del på det – vi måste i alla sammanhang ta hänsyn till hur de som ser något för första gången upplever det. En första betraktelse sker med oskyldiga ögon, med ett sinne öppet för nya möjligheter...”"
 agitators_law_events.11.a:0 "De verkar vara den typen som vet vad som är bäst."
 agitators_law_events.11.b:0 "Uppmuntra till vidare utveckling av dessa salonger."
 agitators_law_events.12.t:0 "Konstnärliga uttryck"
 agitators_law_events.12.d:0 "[SCOPE.gsInterestGroup('poet_ig').GetName]Ett populärt[SCOPE.sCulture('poet_culture').GetName]nyhetsbrev har publicerat ett uttalande från [SCOPE.sCharacter('supporting_agitator').GetFullName], där man uttrycker sitt stöd för flera poeter som är kända för att sympatisera med  :s intressen."
 agitators_law_events.12.f:0 "”Idealen om kärlek och kamratskap finns där, men när man ser bortom ytan möts man av just de förutsättningar som krävs för något sådant. De saker som främjar de högsta idealen och som kan förverkligas i ens vardag...”"
 agitators_law_events.12.a:0 "Kulturens[SCOPE.sCulture('poet_culture').GetName] förebilder står bakom våra reformer."
 agitators_law_events.12.b:0 "Det[SCOPE.gsInterestGroup('poet_ig').GetName] lojala stödet från  bör belönas."
 agitators_law_events.13.t:0 "Populärvetenskaplig förmedling"
 agitators_law_events.13.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName] har påbörjat en veckolång turné på landsbygden för att öka medvetenheten om behovet av[SCOPE.sLaw('current_law_scope').GetName]  bland [SCOPE.gsInterestGroup('peasants_ig').GetName]."
 agitators_law_events.13.f:0 "”Det är verkligen en glädje för mig att mitt hjärta kan känna samma enkla och oskyldiga glädje som bonden vars bord är täckt av mat som han själv odlat, och som inte bara njuter av sin måltid, utan också med glädje minns de lyckliga dagarna och soliga morgnarna då han planterade den, de milda kvällarna då han vattnade den och den glädje han kände när han följde dess dagliga tillväxt.” \n\n– Johann Wolfgang von Goethe,#italic  Den unge Werthers lidanden#!"
 agitators_law_events.13.a:0 "Ett ädelt syfte – och, med lite tur, ett som också vinner folkets gillande."
 agitators_law_events.13.b:0 "Precis som[SCOPE.sCharacter('supporting_agitator').GetFullName]  sträcker ut en hand till människorna, så sträcker även de ut en hand till [SCOPE.sCharacter('supporting_agitator').GetHerHim]."
 agitators_law_events.13.c:0 "Varför bry sig om en utomstående som inte har något annat att erbjuda än ord?"
 agitators_law_events.13.e:0 "Påminn honom[SCOPE.sCharacter('supporting_agitator').GetHerHim]om att han inte är välkommen utanför[SCOPE.sCharacter('supporting_agitator').GetHerHis]staden!"
 agitators_law_events.14.t:0 "En kampanj med banketter"
 agitators_law_events.14.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName]"
 agitators_law_events.14.f:0 "När arrangören, längst bort vid bordet, reste sig för att utbringa en skål för reformrörelsens klara visdom, kunde han inte låta bli att tänka på hur mycket ljudet av hans gaffel mot glaset påminde om ett mynt som faller ner i en bank eller en tom patronhylsa som slår i marken."
 agitators_law_events.14.a:0 "Näring för kroppen och plånboken."
 agitators_law_events.14.b:0 "Stora summor pengar som strömmar in i politiken, säger du?"
 agitators_law_events.15.t:0 "Omdömen i media"
 agitators_law_events.15.d:0 "[SCOPE.sLaw('current_law_scope').GetName][SCOPE.sState('newspaper_scope').GetStateRegion.GetCityHubName]Tidningen ”The Voice of”, en populär tidning som läses av  klassen[SCOPE.gsInterestGroup('newspaper_ig').GetName] över hela [ROOT.GetCountry.GetName], har publicerat en artikel av[SCOPE.sCharacter('supporting_agitator').GetFullName]  där han förespråkar att  ska införas."
 agitators_law_events.15.f:0 "”Att ge ut en tidning utan marknadsföring är som att blinka åt en flicka i mörkret – välmenande, men verkningslöst.” \n\n– William Randolph Hearst"
 agitators_law_events.15.a:0 "Vem är vi att sätta oss emot folkets röst?"
 agitators_law_events.15.b:0 "Vi vill framföra vårt tack till förlaget."
 agitators_law_events.16.t:0 "Oppositionen i tryck"
 agitators_law_events.16.d:0 "En knappt förtäckt polemik mot[SCOPE.sLaw('current_law_scope').GetName]  – skriven av[SCOPE.sCharacter('opposing_agitator').GetFullName]  – har publicerats i en populär oppositionstidning som ges ut över hela [ROOT.GetCountry.GetName]."
 agitators_law_events.16.f:0 "”Ni borde ta en titt på morgontidningen, sir. Den är…” ”Ja?\n\n” \n\n”Jo, det finns en[SCOPE.sCharacter('opposing_agitator').GetLastNameNoFormatting]artikel i den. På tredje sidan.” \n\nTjänstemannen sträckte sig upp och lade en hand mot tinningen. Och i det ögonblicket insåg han att han var på väg att läsa något som kunde kosta honom flera år av livet."
 agitators_law_events.16.a:0 "[SCOPE.sCharacter('supporting_agitator').GetSheHe|U] är en plåga, som alltid."
 agitators_law_events.16.b:0 "Uppmuntra våra anhängare att publicera artiklar med motsatta åsikter."
 agitators_law_events.17.t:0 "Gräsrotsinitiativ"
 agitators_law_events.17.d:0 "Genom ett uppseendeväckande tips från en före detta tidningsutgivare har det kommit fram för regeringen att en våg av nyligen publicerade kritiska[SCOPE.sLaw('current_law_scope').GetName] artiklar i själva verket alla har skrivits av[SCOPE.sCharacter('opposing_agitator').GetFullName]  under olika namn och i olika stilar."
 agitators_law_events.17.f:0 "”Vi anser att ingen enskild person eller grupp av personer har rätt att fastställa vilka uttrycksformer som är lämpliga för andra.” \n\n– William Randolph Hearst"
 agitators_law_events.17.a:0 "Det verkar som om oppositionen är både mer och mindre enhetlig än vad den ger sken av att vara."
 agitators_law_events.17.b:0 "Allmänheten skulle gärna vilja veta mer om den här historien."
 agitators_law_events.18.t:0 "Att försvaga motståndet"
 agitators_law_events.18.d:0 "Som ett tecken på splittring bland regeringens motståndare har man öppet offentliggjort namnen på vissa rivaliserande oppositionsfigurer i en av[SCOPE.sCharacter('opposing_agitator').GetHerHis]broschyrerna.[SCOPE.sCharacter('opposing_agitator').GetFullName] Att dessa identiteter nu har avslöjats ger polisen ett välkommet tillfälle."
 agitators_law_events.18.f:0 "”Utan en stark organisation som är skicklig på att föra politisk kamp under alla omständigheter och vid alla tillfällen kan det inte vara tal om den systematiska handlingsplan som vägleds av fasta principer och genomförs med orubblig beslutsamhet, och som är den enda som förtjänar benämningen taktik.” \n\n– Vladimir Lenin"
 agitators_law_events.18.a:0 "Så praktiskt."
 agitators_law_events.18.b:0 "Vi kommer inte att ge efter för[SCOPE.sCharacter('supporting_agitator').GetHerHis]barnsliga intriger."
 agitators_law_events.19.t:0 "Familjefrågor"
 agitators_law_events.19.d:0 "[SCOPE.sCharacter('supporting_ig_leader').GetFullName]Under sin utbildning vid[SCOPE.sBuilding('uni_scope').GetName][SCOPE.sState('uni_state').GetName]  har  s son börjat uttrycka åsikter som påminner om dem som  [SCOPE.sCharacter('opposing_agitator').GetFullName]s anhängare förespråkar."
 agitators_law_events.19.f:0 "[SCOPE.sCharacter('supporting_ig_leader').GetLastNameNoFormatting]”Tja, faktiskt så berättade professorn om det mest fascinerande jag hört på lektionen idag...” \n\nMedan han pratade på och på, till synes helt omedveten om vad som pågick, kramade han näven allt hårdare under matbordet."
 agitators_law_events.19.a:0 "Familjerna måste respektera andras åsikter vid matbordet."
 agitators_law_events.19.b:0 "Få den oförskämda ungen att ta sitt förnuft till fånga."
 agitators_law_events.19.c:0 "Kanske borde han gå i en annan sorts skola."
 problem_child_barracks_tt:0 "Kasernen[SCOPE.sState('problem_child_barracks').GetName] borde få honom att ta sitt förnuft till fånga."
 agitators_law_events.20.t:0 "Ursprungligt missnöje"
 agitators_law_events.20.d:0 "En person i  s närhet[SCOPE.sCharacter('opposing_agitator').GetFullName]har vänt sig till en stor[SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]  tidning med en begäran om att en egenkomponerad dikt, som på ett subtilt sätt uttrycker motstånd mot införandet av[SCOPE.sLaw('current_law_scope').GetName] , ska publiceras i tidningen."
 agitators_law_events.20.f:0 "”Det är en av min fars, sir, från tiden innan han gick bort. Han var väldigt engagerad, förstår ni...” \n\n”Nej, nej. När han säger så menar han inte nu. Han syftar på den sista gången något sådant... försökte man göra, förstår ni, det handlar om cykliska... mönster i historien. Inte själva handlingen.”"
 agitators_law_events.20.a:0 "Absolut inte. Vi vet alla vem den verkliga författaren är."
 agitators_law_events.20.b:0 "Vem är vi att tacka nej till ett bra arbete?"
 agitators_law_events.21.t:0 "Upplysningstidens arv"
 agitators_law_events.21.d:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName] har hållit ett särskilt övertygande offentligt tal till stöd för en [SCOPE.sLaw('current_law_scope').GetName], där han i lika stor utsträckning sprider jämlikhetsidéer som citerar antikunglig litteratur. "
 agitators_law_events.21.f:0 "”Om vi vill att republiken ska vara stabil måste vi först lägga dess grund. Vi behöver inte söka denna grund utomlands; vi bör söka den i hjärtat hos hela nationens folk.” \n\n– Sun Yat-Sen"
 agitators_law_events.21.a:0 "En fantastisk uppvisning!"
 agitators_law_events.21.b:0 "Inga ord kan störta den gudomliga ordningen."
 agitators_law_events.22.t:0 "Ett fall av majestätsbrott"
 agitators_law_events.22.d:0 "I samband[SCOPE.sCharacter('supporting_agitator').GetHerHis]med[SCOPE.sCharacter('supporting_agitator').GetFullName] protesterna mot monarkin har han gjort ett flertal uttalanden som har tolkats som majestätsbrott. Hans[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] anhängare har krävt[SCOPE.sCharacter('supporting_agitator').GetHerHis] att han ska åtalas."
 agitators_law_events.22.f:0 "”Och när det[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]gäller frågan om …” \n\nFolkmassan höll andan, i förväntan om att något fantastiskt skulle hända. \n\n”Jag ser ingen anledning att låtsas respektera någon vars ställning enbart bygger på att han har mer inavlat blod än vi andra! Om himlen skulle sända någon som var värdig titeln som härskare över [ROOT.GetCountry.GetNameNoFormatting], skulle det säkerligen inte vara någon vars ådror är fyllda med vatten!”"
 agitators_law_events.22.a:0 "[SCOPE.sCharacter('supporting_agitator').GetHerHis|U] Hans beteende har äntligen gått över gränsen."
 agitators_law_events.21.a.tt:0 "[SCOPE.sCharacter('supporting_agitator').GetFullName] ska dömas och fängslas för brott mot kronan."
 agitators_law_events.22.b:0 "Vågar vi riskera att göra[SCOPE.sCharacter('supporting_agitator').GetHerHis]våra anhängare arga?"
 agitators_law_events.23.t:0 "Demokratisk republikanism"
 agitators_law_events.23.d:0 "[ROOT.GetCountry.GetGovernment.GetName]Verksamheten inom[SCOPE.sCharacter('supporting_agitator').GetFullName]  har lett till en framträdande allians mellan republikaner och dem som förespråkar utökad rösträtt. De som förespråkar ett mer demokratiskt system, snarare än en republik, marginaliseras i snabb takt."
 agitators_law_events.23.f:0 "”Republiken måste vara en republik som skapas och upprätthålls av hela folket, så att den inte blir svag redan från födseln till sin snabba och skamfyllda undergång.”"
 agitators_law_events.23.a:0 "En koalition som kommer att skaka om världen omkring dem."
 agitators_law_events.23.b:0 "De[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]måste visa att[ROOT.GetCountry.GetRuler.GetSheHe]de kan styra i en demokrati."
 agitators_law_events.23.c:0 "Alla liberaler kommer så småningom att förråda kronan och nationen."
 agitators_law_events.24.t:0 "En soldatrepublik?"
 agitators_law_events.24.d:0 "Nära medarbetare till[SCOPE.sCharacter('supporting_agitator').GetFullName]  har setts i sällskap med flera reforminriktade militärer, däribland [SCOPE.sCharacter('suspected_general_scope').GetFullName]. Dessa aktiviteter väcker farhågor om en påtvingad kupp mot [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 agitators_law_events.24.f:0 "”Oavsett vilka skäl man[SCOPE.sCharacter('suspected_general_scope').GetSheHe]än kan tänka sig är det uppenbart att[SCOPE.sCharacter('suspected_general_scope').GetHerHis]umgänget med denna avskyvärda person tyder på vissa farliga tendenser. Jag har gett er allt jag kunnat samla in i ärendet. För tronens heder ber jag er att utreda detta så snabbt som möjligt.”"
 agitators_law_events.24.a:0 "Ställ honom till[SCOPE.sCharacter('suspected_general_scope').GetLastName] exempel för uppvigling."
 agitators_law_events.24.b:0 "Vi kan inte minska antalet militärer enbart på grund av misstankar."
 agitators_law_events.25.t:0 "Massornas marsch"
 agitators_law_events.25.d:0 "Agitationen i[SCOPE.sCharacter('supporting_agitator').GetFullName]  har lett till en demonstration i [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], där deltagarna uttryckte sitt stöd för utökad rösträtt och större politiska rättigheter för folket."
 agitators_law_events.25.f:0 "Marschen fortsatte i mer än ett kvarter – en procession av strålande ögon och feberheta hjärtan som tycktes fylla staden med en särskild energi. \n\nLängst fram i kolonnen stod han,[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting] större än livet, och ledde den med en utstrålning präglad av gränslöst hopp."
 agitators_law_events.25.a:0 "Ett uttryck för stöd för ett fantastiskt lagförslag."
 agitators_law_events.25.b:0 "Indra[SCOPE.sCharacter('supporting_agitator').GetHerHis]talerätten, under hot om gripande."
 agitators_law_events.26.t:0 "Folkets fiender"
 agitators_law_events.26.d:0 "[SCOPE.sState('capital_scope').GetName]Under ett tal vid en reformistisk salong i  höll  ett särskilt passionerat tal där[SCOPE.sCharacter('supporting_agitator').GetFullName]han[SCOPE.gsInterestGroup('landowners_ig').GetName] fördömde  som demokratins motståndare och folket i stort."
 agitators_law_events.26.f:0 "”Jag måste nu ta upp karaktären hos vissa individer som har visat sig vara helt hängivna åt förtrycket av hela folket. De är grymma och lättjefulla varelser, vars hela tillvaro är genomsyrad av privilegier – reliker från en stillastående era, vars sinnen gör uppror inför utsikten till en nation där deras makt utmanas.”"
 agitators_law_events.26.a:0 "Ned med frihetens fiender!"
 agitators_law_events.26.b:0 "Folket kommer alltid att behöva stå under tillsyn av sina överordnade."
 agitators_law_events.26.c:0 "Vi vet alla vilka ”privilegierade” det[SCOPE.sCharacter('supporting_agitator').GetSheHe] egentligen handlade om."
 agitators_law_events.27.t:0 "Umstridda vänner"
 agitators_law_events.27.d:0 "Deltagandet vid ett möte som[SCOPE.sCharacter('supporting_agitator').GetFullName]anordnades av en radikal reformvänlig förening i[SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]  har ökat allmänhetens medvetenhet om föreningen och gjort det betydligt svårare för polisen att vidta åtgärder mot den."
 agitators_law_events.27.f:0 "Tjänstemannen betraktade dokumentet på sitt skrivbord med en viss förvåning och tittade på namnet på den grupp som stolt hade tagit på sig ansvaret för den senaste demonstrationen. Den där hatiska och utan tvekan förtryckta gruppen, i kombination med namnet på den där besvärlige[SCOPE.sCharacter('supporting_agitator').GetLastNameNoFormatting]mannen som hade orsakat så många problem under de senaste åren. Han rynkade pannan och vände sig till sin granne. \n\n”Har vi inte redan offentliggjort arresteringsordern mot dessa personer?”"
 agitators_law_events.27.a:0 "Kanske är det dags att ge dem vårt godkännande."
 agitators_law_events.27.b:0 "Allmänhetens åsikt är ingen ursäkt."
 agitators_law_events.28.t:0 "Romantik på censurkontoret"
 agitators_law_events.28.d:0 "Under sken av att vara en särskilt stelbent kärleksroman har författaren lyckats få igenom en text med subtila regeringskritiska inslag genom censurmyndigheten.[SCOPE.sCharacter('supporting_agitator').GetFullName] Romanens undertext förespråkar yttrandefrihet och ett avståndstagande från det som den betecknar som ”despotism”."
 agitators_law_events.28.f:0 "”Är det inte alltid så det är? Om en människa är benägen att leta efter något, hittar hon det var hon än tittar. Även om det inte finns något spår av det alls, hittar hon ändå tydliga bevis. Även om det inte ens finns en skugga, ser hon ändå inte bara en skugga av det hon letar efter utan allt hon letar efter. Han ser det på det mest otvetydiga sättet, och detta blir allt tydligare för varje ny blick och varje ny tanke.” \n\n– Nikolaj Tjernysjevskij,#italic  Vad ska göras?#!"
 agitators_law_events.28.a:0 "Vi kommer inte att läsa om en bok på femhundra sidor bara för att vi känner för det!"
 agitators_law_events.28.b:0 "Dra tillbaka romanen och kräv att befintliga exemplar lämnas in."
 agitators_law_events.29.t:0 "Bristande tillsyn"
 agitators_law_events.29.d:0 "En anonym person inom poliskåren har lämnat in en lista över poliser som påstås sympatisera med [SCOPE.sCharacter('supporting_agitator').GetFullName][namn]s sak. Enligt brevet har dessa poliser i tysthet vägrat att utföra censuruppgifter."
 agitators_law_events.29.f:0 "\"...ja, just han. Har du hört vad han sa efter att vi gav honom den där romanen?" \n\nExpediten följde med blicken den uppgiftslämnarens pekande tumme, som var riktad mot en man som, helt ovetande, satt och åt sin lunch. \n\n\"Nej. Berätta\", sa han med uttryckslöst ansikte. \n\n\"”Tja, det var ungefär något i stil med \"styrelsen är redan halvdöd...\"”"
 agitators_law_events.29.a:0 "Varför bry sig? Censuren är ändå på väg att försvinna."
 agitators_law_events.29.b:0 "Vi kommer att tillämpa denna lag fram till den stund då den upphävs."
 agitators_law_events.30.t:0 "En utmaning"
 agitators_law_events.30.d:0 "En tidning med populistisk [SCOPE.gsInterestGroup('newspaper_ig').GetName]inriktning har publicerat en djärv artikel av [SCOPE.sCharacter('supporting_agitator').GetFullName][författare], där man kräver att censuren ska avskaffas. Tidningens popularitet, även bland regeringens anhängare, gör det riskabelt att förbjuda den."
 agitators_law_events.30.f:0 "När chefen klev in på kontoret, med ögonen trötta efter en orolig natt, märkte han snabbt de plågade uttrycken i sina medarbetares ansikten. En blick på anslagstavlan förklarade omedelbart deras obehag – det stod där i fet stil på tidningspapper: \n\n”TILL ER ÖVERVÄGANDE: ETT FALL FÖR YTTRANDEFRIHET”"
 agitators_law_events.30.a:0 "Till och med vissa av oss håller med om att de har en poäng."
 agitators_law_events.30.b:0 "Om vi slappnar av nu kommer det bara att bli värre."
 je_silkworm_diseases:0 "Pébrine-epidemin"
 je_silkworm_diseases_goal:0 "[ROOT.GetCountry.GetName] har haft ett[GetDecreeType('decree_encourage_agricultural_industry').GetName]dekret i kraft i minst 75 % av de stater som drabbats av#BOLDpébrine#! under ett år efter att en lösning\n\n på epidemin har hittats. En lösning på epidemin kan erhållas genom forskning#BOLDom snabbfrysning eller#! genom att ta emot den från ett annat land som har hittat lösningen."
 je_silkworm_diseases_reason:0 "Silkesindustrin[ROOT.GetCountry.GetAdjective] har drabbats i stor utsträckning av#BOLDpébrine#!, en epidemi som hotar att utplåna våra silkesmasksodlingar om den inte bekämpas."
 pebrine_cure_tt:0 "Vi har lärt oss hur man bekämpar pébrine-epidemin#!#BOLD, antingen genom inhemsk forskning eller genom kunskaper från ett annat land"
 pebrine_cure_acquire_tt:0 "#!Man har funnit en metod för att begränsa pébrine-epidemin#BOLD genom förordningen[GetDecreeType('decree_encourage_agricultural_industry').GetName]."
 pebrine_je_fail_tt:0 "Silkeindustrin[SCOPE.sCountry('pebrine_country_scope').GetAdjective] har drabbats av ett allvarligt bakslag som kommer att kännas av under överskådlig framtid."
 modifier_pebrine_state_modifier:0 "Pébrine-epidemin"
 modifier_pebrine_research_funds:0 "Finansiering av forskning om sjukdomar hos silkesmaskar"
