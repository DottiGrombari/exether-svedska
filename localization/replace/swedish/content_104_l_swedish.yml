 psychology_events.6.t:0 "The Journal of Philosophical Studies"
 psychology_events.6.d:0 "Medlemmar vid filosofiska institutionen vid[SCOPE.sState('university_state').GetName][SCOPE.sBuilding('university_building').GetName]  har undertecknat en formell petition om statligt stöd till sitt nästa projekt: en vetenskaplig tidskrift."
