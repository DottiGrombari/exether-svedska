 french_pretenders_pulse.10.t:0 "Arvingarna till Grande Armée"
 french_pretenders_pulse.10.d:0 "Soldaternas[ROOT.GetCountry.GetAdjective] goda moral i vår nuvarande konflikt väcker minnen av Napoleon I:s segrande arméer. Saken[SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName] har vunnit allt större popularitet längs frontlinjerna"
 french_pretenders_pulse.10.f:0 "En våg av upprymdhet bland både folket och soldaterna spred sig genom gatorna. Från de fuktigaste hörnen på värdshusen till de upptrampade åkrarna väckte minnet av Napoleons första avgörande segrar alla till liv. Frankrikes storslagna regementen skulle kanske återigen marschera fram[SCOPE.sState('capital_scope').GetCityHubName]på order av en ny Bonaparte."
 french_pretenders_pulse.10.a:0 "Det[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]kommer att leda oss till många fler segrar."
 french_pretenders_pulse.10.b:0 "Uppmuntra soldaterna för deras fina insats."
 french_pretenders_pulse.10.c:0 "Det bådar gott för  saken[SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName]."
 french_pretenders_pulse.11.t:0 "Frukterna av flit"
 french_pretenders_pulse.11.d:0 "Handelns[ROOT.GetCountry.GetAdjective] blomstring har varit till stor fördel för de förmögna stödjarna av saken[SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]. De har återinvesterat sina medel för att stödja sin kandidats anspråk."
 french_pretenders_pulse.11.f:0 "Ju mer saker och ting förändras, desto mer förblir de desamma. Förr i tiden ägde baronerna smedjor och åkrar. I dag äger de maskiner och handelslager. För en klok kung spelar det ingen roll vilka nycklar baronerna förvarar, så länge nycklarna förblir i rätt händer."
 french_pretenders_pulse.11.a:0 "Den[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  är beskyddare av[ROOT.GetCountry.GetAdjectiveNoFormatting]  välstånd."
 french_pretenders_pulse.11.b:0 "Våra magnater förtjänar beröm för sitt hårda arbete."
 french_pretenders_pulse.11.c:0 "Det bådar gott för  saken[SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]."
 french_pretenders_pulse.12.t:0 "Kyrkans ord"
 french_pretenders_pulse.12.d:0 "Det växande anseendet och inflytandet hos  har[SCOPE.gsInterestGroup('devout_ig').GetName] lett till en motsvarande uppgång för  saken[SCOPE.sCharacter('legitimist_character').GetIdeology.GetName]. Nostalgiska präster hyllar de forna kungarna."
 french_pretenders_pulse.12.f:0 "Mässingsklockorna i Reims hade polerats till spegelglans den morgonen. Det är länge sedan en kröning hölls här. En gång i tiden förkunnade klockorna kungarnas tid, de som av Gud utsetts till den lysande juvelen i Hans krona. Nu är det bara spöken och spindelnät som sällar sig till klockorna. Men Guds rike är evigt, och det är bara en tidsfråga innan klockorna återigen ringer för en ny kung."
 french_pretenders_pulse.12.a:0 "De[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]kommer att minnas deras stöd."
 french_pretenders_pulse.12.b:0 "Kyrkan är den grundval som vi vilar på."
 french_pretenders_pulse.12.c:0 "Det bådar gott för  saken[SCOPE.sCharacter('legitimist_character').GetIdeology.GetName]."
 french_pretenders_pulse.13.t:0 "[SCOPE.sCharacter('partisan_character').GetFullName] Stöder[SCOPE.sCharacter('partisan_character').GetIdeology.GetName]  saken"
 french_pretenders_pulse.13.d:0 "[SCOPE.sCharacter('partisan_character').GetFullName] har förbundit sig att[SCOPE.sCharacter('partisan_character').GetInterestGroup.GetName]till fullo stödja  saken[SCOPE.sCharacter('partisan_character').GetIdeology.GetName].[SCOPE.sCharacter('partisan_character').GetHerHis] Även om uttalandena är ambitiösa har de väckt kontroverser både inom  och utanför organisationen[SCOPE.sCharacter('partisan_character').GetInterestGroup.GetNameNoFormatting]."
 french_pretenders_pulse.13.f:0 "[SCOPE.sCharacter('partisan_character').GetLastNameNoFormatting]#bold [SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting]: ”Mitt hjärta för [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]!”#!\n\n En lyckosam dag gryr för Huset [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]. Den produktive rojalisten och den frispråkige kommentatorn för [SCOPE.sCharacter('partisan_character').GetInterestGroup.GetNameNoFormatting],[SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting]  uttrycker sitt stöd för husets bestigning av Karl den store tronen. Folket i[SCOPE.sState('capital_scope').GetCityHubName]  var snabba att både hylla och kritisera  s tillkännagivande i morse. (forts. på s. 2)"
 french_pretenders_pulse.13.a:0 "[SCOPE.sCharacter('partisan_character').GetSheHe|U] Det är bäst att upprätthålla anständigheten."
 french_pretenders_pulse.13.b:0 "Vad är ett rykte värt om man inte kan dra nytta av det?"
 french_pretenders_pulse.14.t:0 "En[SCOPE.sCharacter('partisan_character').GetIdeology.GetName]  armé?"
 french_pretenders_pulse.14.d:0 "[SCOPE.sCharacter('partisan_character').GetFullName][SCOPE.sCharacter('partisan_character').GetPrimaryRoleTitle]  har gjort ett flertal uttalanden till stöd för  saken[SCOPE.sCharacter('partisan_character').GetIdeology.GetName] och utnyttjat[SCOPE.sCharacter('partisan_character').GetHerHis]sin  position inom militären för att sprida[SCOPE.sCharacter('partisan_character').GetHerHis]  sina åsikter vida omkring."
 french_pretenders_pulse.14.f:0 "”Min familj offrade sitt liv för Napoleon och hans storslagna drömmar om ett Europa under Frankrikes ledning. Och nu kommer en ny tronpretendent och ber mig att offra mitt liv för samma dröm.” ”Det är ingen vanlig \n\ntronpretendent, general. Och det är inte heller vilken dröm som helst. En återupprättad tron, mäktigare än någon republik som funnits eller kommer att finnas. Och med er i spetsen. Vi kommer inte att acceptera något annat.”"
 french_pretenders_pulse.14.a:0 "Våra soldater hyllar  saken[SCOPE.sCharacter('partisan_character').GetIdeology.GetName]."
 french_pretenders_pulse.14.b:0 "[SCOPE.sCharacter('partisan_character').GetIdeology.GetName]De skulle ha nytta av en konsekvent förespråkare."
 french_pretenders_pulse.14.c:0 "[SCOPE.sCharacter('partisan_character').GetHerHis|U] Orden tyder på en kupp. Avskeda honom omedelbart."
 french_pretenders_pulse.15.t:0 "[SCOPE.sCharacter('partisan_character').GetIdeology.GetName]Folket för s"
 french_pretenders_pulse.15.d:0 "[SCOPE.sCharacter('partisan_character').GetFullName], en erfaren och starkt populistisk politisk förespråkare, har inlett en kampanj för att främja sakens[SCOPE.sCharacter('partisan_character').GetHerHis][SCOPE.sCharacter('partisan_character').GetIdeology.GetName] sak bland vanligt folk."
 french_pretenders_pulse.15.f:0 "[SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')][SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')]#bold Rheims-tullen för huset! #!\n\nEn ny kung; en ny Karl den store! Länge leve Frankrike! Länge leve!\n\n#italic Civil marsch bakom[SCOPE.sState('capital_scope').GetCityHubName] [SCOPE.sCharacter('partisan_character').GetFullNameNoFormatting]. Deltagarna uppmanas att bära färgerna för [SCOPE.sCharacter('partisan_character').GetCustom('french_dynasty_name')].#!"
 french_pretenders_pulse.15.a:0 "En riktig välsignelse för[SCOPE.sCharacter('partisan_character').GetHerHis]  saken."
 french_pretenders_pulse.15.b:0 "[SCOPE.sCharacter('partisan_character').GetHerHis|U] Arbetet kommer att visa ledarna[SCOPE.sCharacter('partisan_character').GetIdeology.GetName] i ett nytt ljus."
 french_pretenders_pulse.16.t:0 "Ett kluster av hus"
 french_pretenders_pulse.16.d:0 "[SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetIdeology.GetName][SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetFullName], en hängiven anhängare, har riktat en rad verbala angrepp och anklagelser om opportunism mot den ledande[SCOPE.sCharacter('monarchist_leader').GetIdeology.GetName]saken."
 french_pretenders_pulse.16.f:0 "[SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetLastNameNoFormatting]”Jag antar att ni förstår anledningen till att ni har kallats hit idag, monsieur. Dessa förseningar har pågått tillräckligt länge.” \n\n”Naturligtvis ska Hans Majestäts vilja ske, och med största omsorg och skyndsamhet. Men med tanke på vår härliga nations historia, borde det inte ligga i Hans Majestäts intresse att hans dekret accepteras av alla?” \n\n”Vi är inte road av era lekar,”"
 french_pretenders_pulse.16.a:0 "En önskan[SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetHerHim]att tiga, för att inte[SCOPE.gsInterestGroup('monarchist_opposition').GetLeader.GetSheHe]låta situationen eskalera för långt."
 french_pretenders_pulse.16.b:0 "En fartfylld och underhållande föreställning."
 french_pretenders_pulse.17.t:0 "Virvlande missnöje"
 french_pretenders_pulse.17.d:0 "I takt med att radikalismen ökar i [ROOT.GetCountry.GetName]landet har skulden för den osäkerhet som nationen står inför helt och hållet lagts på[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]  [SCOPE.sCharacter('monarch_scope').GetFullName]och  saken[SCOPE.sCharacter('monarch_scope').GetIdeology.GetName]."
 french_pretenders_pulse.17.d1:0 "Mitt i de revolutionära strömningarna under ”Folkens vår” har skulden för den osäkerhet som  står[ROOT.GetCountry.GetName] inför helt och hållet lagts på[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]  [SCOPE.sCharacter('monarch_scope').GetFullName]och  saken[SCOPE.sCharacter('monarch_scope').GetIdeology.GetName]."
 french_pretenders_pulse.17.f:0 "Frankrike var inte främmande för kungamord. Landets revolutioner genomfördes med eld och skott, och en flodvåg av kokande raseri bröt ut på en gång. På samma sätt har landets härskare lärt sig att känna igen varningssignalerna väl. En illvillig grimas här, en mordisk blick där – tändved som väntar på rätt tändsticka."
 french_pretenders_pulse.17.a:0 "Folkets vilja är i bästa fall ombytlig."
 french_pretenders_pulse.17.b:0 "[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]Hans regeringstid är väl värd några brutna revben."
 french_pretenders_pulse.17.a1:0 "Vi måste samla våra krafter och rida ut stormen."
 french_pretenders_pulse.17.b1:0 "Denna utveckling måste stoppas här och nu."
 french_pretenders_pulse.18.t:0 "Karl X:s död"
 french_pretenders_pulse.18.d:0 "Kung Karl X, som regerade i[ROOT.GetCountry.GetName]  före julirevolutionen, har avlidit i exil i [SCOPE.sCountry('slovenia_owner_scope').GetName]. Anhängare av legitimisterna har lämnat in en begäran om att hans kvarlevor ska återföras till[ROOT.GetCountry.GetNameNoFormatting]  för begravning."
 french_pretenders_pulse.18.f:0 "Kungen var död, men få var beredda att upprepa det gamla refrängen. Tusentals krävde att den landsflyktige kungens kropp skulle återföras till Frankrike för begravning. ”Tradition”, sa de. Tusentals andra svor att de skulle bränna liket. ”Kolera”, sa de."
 french_pretenders_pulse.18.a:0 "Han avstod från sin rättighet år 1830."
 french_pretenders_pulse.18.b:0 "Vi kan göra en insats för att överbrygga de klyftor som uppstod i juli."
 french_pretenders_pulse.19.t:0 "Askan återvänder"
 french_pretenders_pulse.19.d:0 "Napoleon Bonapartes kvarlevor har återförts från [SCOPE.sCountry('saint_helena_owner_scope').GetName]och transporterats från Sankta Helena till[ROOT.GetCountry.GetAdjective] . Begravningen av kejsarens kvarlevor utgör ett tillfälle att återupprätta det kejserliga förflutna."
 french_pretenders_pulse.19.f:0 "”Jag anser mig lycklig över att det har tillfallit mig att återföra den avlidnes kvarlevor till fransk mark – han som tillfört så mycket ära åt vårt högtidliga upptåg – och att betala vår skuld till vårt gemensamma fosterland genom att omge hans kista med alla de hedersbetygelser som tillkommer honom.”"
 french_pretenders_pulse.19.a:0 "Vi har äntligen lagt Empereur till vila."
 french_pretenders_pulse.19.b:0 "Utnyttja detta tillfälle för att vinna bonapartisternas gunst."
 french_pretenders.7.t:0 "Den nya monarkin"
 french_pretenders.7.d:0 "Nu när monarkin[ROOT.GetCountry.GetAdjective] återinförts och en regent tillfälligt innehar tronen är det dags att avgöra vilken dynasti som ska anförtros den återupprättade franska kronan."
 french_pretenders.7.f:0 "Klockorna ringer i Reims, men ingen kung sitter på tronen. De tre stora ädelhusen höll sig på avstånd från varandra, och deras tronpretendenter var ovilliga att ta makten. Om någon agerade för hastigt skulle den drabbas av ett krig på två fronter. Frankrike självt verkade inte ha någon brådska med att den ”rätta” kungen skulle bestiga tronen, utan var bara angeläget om att någon kung överhuvudtaget satt där."
 french_pretenders.7.a:0 "Bonaparte-huset kommer att leda oss till ära."
 french_pretenders.7.b:0 "Huset av Orléans kommer att skänka Frankrike välstånd."
 french_pretenders.7.c:0 "Huset Bourbon kommer att hämnas revolutionens brott."
 french_pretenders.7.d1:0 "De forna dynastierna har visat sig vara alltför felbara."
 pretenders_7_legitimists_tt:0 "[SCOPE.sCountry('reflexive_reference_france').GetName]Tronen kommer att överlåtas till tronpretendenten[SCOPE.sCharacter('legitimist_character').GetIdeology.GetName]"
 pretenders_7_orleanist_tt:0 "[SCOPE.sCountry('reflexive_reference_france').GetName]Tronen kommer att överlåtas till tronpretendenten[SCOPE.sCharacter('orleanist_character').GetIdeology.GetName]"
 pretenders_7_bonapartist_tt:0 "[SCOPE.sCountry('reflexive_reference_france').GetName]Tronen kommer att överlåtas till tronpretendenten[SCOPE.sCharacter('bonapartist_character').GetIdeology.GetName]"
 pretenders_7_fourth_way_tt:0 "Vi kommer att lämna de gamla dynastierna bakom oss och överlåta tronen till[SCOPE.sCharacter('prospective_monarch_scope').GetPrimaryRoleTitle][SCOPE.sCountry('reflexive_reference_france').GetName]  [SCOPE.sCharacter('prospective_monarch_scope').GetFullName]"
 notification_paris_commune_automation_pulse_1_a_name:0 "Kommunarderna stänger kyrkor i Paris"
 notification_paris_commune_automation_pulse_1_a_desc:0 "Myndigheterna[SCOPE.sCountry('paris_commune_nation_scope').GetName]har beslagtagit och med våld stängt ett stort antal kyrkor, vilket har lett till en ökning av[SCOPE.sReligion('atheist_scope').GetName]  stämningarna i hela Paris. \n\nParis-kommunens#!#bold framgångar har#bold  ökat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_1_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_1_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_1_a_desc$"
 notification_paris_commune_automation_pulse_1_b_name:0 "Kommunarderna plundrar kyrkor i Paris"
 notification_paris_commune_automation_pulse_1_b_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har beslagtagit och sålt av kyrkliga reliker från ett stort antal parisiska kyrkor, vilket gett den ett tillfälligt tillskott av resurser. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_1_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_1_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_1_b_desc$"
 notification_paris_commune_automation_pulse_1_c_name:0 "Kommunarderna överlämnar kyrkorna till [SCOPE.gsInterestGroup('seize_church_ig').GetName]"
 notification_paris_commune_automation_pulse_1_c_desc:0 "Organisationen[SCOPE.sCountry('paris_commune_nation_scope').GetName]har omvandlat ett stort antal före detta kyrkor i Paris till lokaler[SCOPE.gsInterestGroup('seize_church_ig').GetName]för politiska möten. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_1_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_1_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_1_c_desc$"
 notification_paris_commune_automation_pulse_2_a_name:0 "Kommunarderna avrättar[SCOPE.sCharacter('executed_general_scope').GetRankName]  [SCOPE.sCharacter('executed_general_scope').GetFullName]"
 notification_paris_commune_automation_pulse_2_a_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Nationalgardister har tillfångatagit och avrättat[SCOPE.sCharacter('executed_general_scope').GetRankName] personer [SCOPE.sCharacter('executed_general_scope').GetFullName]genom skjutning utanför Paris. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_2_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_2_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_2_a_desc$"
 notification_paris_commune_automation_pulse_2_b_name:0 "Kommunarderna fängslas[SCOPE.sCharacter('executed_general_scope').GetRankName]  [SCOPE.sCharacter('executed_general_scope').GetFullName]"
 notification_paris_commune_automation_pulse_2_b_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Nationalgardister har gripit[SCOPE.sCharacter('executed_general_scope').GetRankName] [SCOPE.sCharacter('executed_general_scope').GetFullName]honom utanför Paris. Han har förts till ett fängelse inne i staden. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_2_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_2_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_2_b_desc$"
 notification_paris_commune_automation_pulse_2_c_name:0 "Kommunarderna avrättar[SCOPE.sCharacter('executed_general_scope').GetRankName]  [SCOPE.sCharacter('executed_general_scope').GetFullName]"
 notification_paris_commune_automation_pulse_2_c_desc:0 "Man[SCOPE.sCountry('paris_commune_nation_scope').GetName]har officiellt berömt en enhet av nationalgardister som tillfångatog och avrättade[SCOPE.sCharacter('executed_general_scope').GetRankName]   genom [SCOPE.sCharacter('executed_general_scope').GetFullName]skjutning utanför Paris. \n\nParis-kommunens#!#bold framfart har#boldminskat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_2_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_2_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_2_c_desc$"
 notification_paris_commune_automation_pulse_3_a_name:0 "Communards lägger fram befästningsplaner"
 notification_paris_commune_automation_pulse_3_a_desc:0 "Kommunen[SCOPE.sCountry('paris_commune_nation_scope').GetName]har delegerat ansvaret för Paris försvar till invånarna i de olika stadsdelarna. Denna populistiska strategi har stärkt försvararnas moral. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_3_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_3_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_a_desc$"
 notification_paris_commune_automation_pulse_3_b_name:0 "Kommunarderna centraliserar försvaret av Paris"
 notification_paris_commune_automation_pulse_3_b_desc:0 "Man[SCOPE.sCountry('paris_commune_nation_scope').GetName]har centraliserat försvaret av Paris under centralkommittén och inrättat en styrka[GetLawType('law_professional_army').GetName]ur nationalgardet, vilket har skett på bekostnad av omfördelade resurser och har stöttat populisterna. \n\nParis-kommunens#!#bold framsteg har#boldminskat#! med #variable10#!."
 notification_paris_commune_automation_pulse_3_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_3_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_b_desc$"
 notification_paris_commune_automation_pulse_3_c_name:0 "Kommunarderna befäster Paris förorter"
 notification_paris_commune_automation_pulse_3_c_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har skapat en försvarsring bemannad av nationalgardet runt Paris utkanter, vilket kraftigt har stärkt deras positioner på bekostnad av lokalbefolkningens stöd. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_3_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_3_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_3_c_desc$"
 notification_paris_commune_automation_pulse_4_a_name:0 "Kommunarder utför brandattentat"
 notification_paris_commune_automation_pulse_4_a_desc:0 "Anhängare av  har genomfört ett[SCOPE.sCountry('paris_commune_nation_scope').GetName] stort antal brandattentat i utkanten av Paris och bränt ner byggnader som skulle kunna utnyttjas som fördelaktiga positioner i strid.  \n\nParis-kommunens#!#bold framryckning har#bold  ökat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_4_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_4_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_a_desc$"
 notification_paris_commune_automation_pulse_4_b_name:0 "Kommunarder genomför omfattande brandattentat"
 notification_paris_commune_automation_pulse_4_b_desc:0 "Anhängare av  har genomfört ett[SCOPE.sCountry('paris_commune_nation_scope').GetName] stort antal brandattentat i Paris, riktade mot byggnader med koppling till kyrkan och konservativa institutioner. Bränderna rasar okontrollerat på gatorna.  \n\nParis-kommunens#!#bold framfart har#bold  minskat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_4_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_4_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_b_desc$"
 notification_paris_commune_automation_pulse_4_c_name:0 "Kommunardkvinnor utför brandattentat"
 notification_paris_commune_automation_pulse_4_c_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]Kvinnliga anhängare av  har anklagats för att ha utfört ett flertal brandattentat i utkanten av Paris, riktade mot byggnader med koppling till kyrkan, militären och andra konservativa institutioner.  \n\nParis-kommunens#!#bold framsteg har#bold  minskat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_4_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_4_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_4_c_desc$"
 notification_paris_commune_automation_pulse_5_a_name:0 "Regeringen i Versailles beordrar användning av dödligt våld"
 notification_paris_commune_automation_pulse_5_a_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]Regeringen i Versailles har godkänt att tillfångatagna kommunarder ska ställas inför rätta, dömas och avrättas av militärdomstolar.  Militanta och socialister inom  har blivit uppmuntrade av dessa dekret.  \n\nParis-kommunens#!#bold framsteg har#bold  minskat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_5_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_5_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_a_desc$"
 notification_paris_commune_automation_pulse_5_b_name:0 "Regeringen i Versailles beordrar avrättning av fångar"
 notification_paris_commune_automation_pulse_5_b_desc:0 "Regeringen i Versailles har godkänt att tillfångatagna kommunarder ska ställas inför rätta, dömas och avrättas av militärdomstolar, vilket har lett till massavrättningar av misstänkta sympatisörer till Pariskommunen. Militanta och socialister inom[SCOPE.sCountry('paris_commune_nation_scope').GetName]  har blivit betydligt mer uppmuntrade av dessa grymheter. \n\nPariskommunens#!#bold framsteg har#boldminskat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_5_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_5_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_b_desc$"
 notification_paris_commune_automation_pulse_5_c_name:0 "Regeringen i Versailles genomför gripanden"
 notification_paris_commune_automation_pulse_5_c_desc:0 "Regeringen i Versailles har inlett rättegångarna och domarna mot misstänkta kommunarder, och har utlovat långa fängelsestraff men uteslutit dödsstraff. De blodiga förutsägelserna från militanta och socialister inom[SCOPE.sCountry('paris_commune_nation_scope').GetName]  har, för tillfället, inte besannats. \n\nParis-kommunens#!#bold framsteg har#bold  ökat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_5_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_5_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_5_c_desc$"
 notification_paris_commune_automation_pulse_6_a_name:0 "Kommunarderna griper präster i Paris"
 notification_paris_commune_automation_pulse_6_a_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har gripit präster från den katolska kyrkan inom Paris stadsgränser och håller dem som gisslan. De antiklerikala stämningarna fortsätter att sprida sig över staden. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_6_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_6_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_6_a_desc$"
 notification_paris_commune_automation_pulse_6_b_name:0 "Kommunarderna förvisar prästarna i Paris"
 notification_paris_commune_automation_pulse_6_b_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har gripit präster från den katolska kyrkan i Paris och tillåtit dem att lämna staden med en väska. Flyktingar med anknytning till kyrkan har strömmat ut på vägarna i utkanten av kommunen. \n\nParis-kommunens#!#bold framfart har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_6_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_6_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_6_b_desc$"
 notification_paris_commune_automation_pulse_6_c_name:0 "Kommunarderna avrättar präster i Paris"
 notification_paris_commune_automation_pulse_6_c_desc:0 "[GetLawType('law_state_atheism').GetName]Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har genomfört ett stort antal avrättningar av katolska präster inom Paris stadsgränser. Denna radikalt antiklerikala politik har lett till att radikala kommunardfraktioner som stöder har blivit mer djärva. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_6_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_6_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_6_c_desc$"
 notification_paris_commune_automation_pulse_7_a_name:0 "Regeringen i Versailles griper nationalgardet"
 notification_paris_commune_automation_pulse_7_a_desc:0 "Regeringen i Versailles har tillfångatagit en avdelning av nationalgardet som är lojal mot[SCOPE.sCountry('paris_commune_nation_scope').GetName]  i utkanten av Paris. De tillfångatagna har ställts inför rätta och fängslats i väntan på en militärdomstol.  \n\nParis-kommunens#!#bold framfart har#bold  minskat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_7_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_7_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_7_a_desc$"
 notification_paris_commune_automation_pulse_7_b_name:0 "Regeringen i Versailles avrättar tillfångatagna medlemmar av nationalgardet"
 notification_paris_commune_automation_pulse_7_b_desc:0 "Versaillesregeringen har tillfångatagit och avrättat en avdelning av Nationalgardet som var lojal mot  Massakern[SCOPE.sCountry('paris_commune_nation_scope').GetName] på fångarna har väckt upprördhet och stärkt stödet för de mest militanta krafterna inom Kommunen. \n\nParis-kommunens#!#bold framsteg har#bold  ökat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_7_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_7_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_7_b_desc$"
 notification_paris_commune_automation_pulse_8_a1_name:0 "Regeringen i Versailles beslagtar kanonlager"
 notification_paris_commune_automation_pulse_8_a1_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]Under reträtten från Paris har soldater lojala mot Versaillesregeringen beslagtagit eller förstört en betydande andel av kommunens kanonlager. \n\nParis-kommunens#!#bold framsteg har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_8_a1_tooltip:0 "#header $notification_paris_commune_automation_pulse_8_a1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_8_a1_desc$"
 notification_paris_commune_automation_pulse_8_a2_name:0 "Regeringen i Versailles misslyckas med att beslagta kanonlagren"
 notification_paris_commune_automation_pulse_8_a2_desc:0 "Under reträtten från Paris har soldater lojala mot Versaillesregeringen försökt lägga beslag på[SCOPE.sCountry('paris_commune_nation_scope').GetName] ”s” artilleriförråd. Räden slogs tillbaka av Nationalgardet, vilket ledde till att soldater övergick till kommunens styrkor. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_8_a2_tooltip:0 "#header $notification_paris_commune_automation_pulse_8_a2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_8_a2_desc$"
 notification_paris_commune_event_8_a1_name:0 "Framgångsrik beslagtagning av kanonstockar"
 notification_paris_commune_event_8_a1_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]”Under reträtten från Paris har soldater som är lojala mot vår regering beslagtagit eller förstört en betydande del av ’s kanonlager.”"
 notification_paris_commune_event_8_a1_tooltip:0 "#header $notification_paris_commune_event_8_a1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_event_8_a1_desc$"
 notification_paris_commune_event_8_a2_name:0 "Räd mot kanonlagren misslyckas"
 notification_paris_commune_event_8_a2_desc:0 "Under reträtten från Paris har soldater som är lojala mot vår regering försökt lägga beslag på[SCOPE.sCountry('paris_commune_nation_scope').GetName] ”s” artilleriförråd. Rädden slogs tillbaka av Nationalgardet, vilket ledde till att soldater övergick till fiendens styrkor."
 notification_paris_commune_event_8_a2_tooltip:0 "#header $notification_paris_commune_event_8_a2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_event_8_a2_desc$"
 notification_paris_commune_automation_pulse_8_b_name:0 "Regeringen i Versailles drar tillbaka sina styrkor från Paris"
 notification_paris_commune_automation_pulse_8_b_desc:0 "Versaillesregeringen, som insåg att dess ställning var ohållbar, har dragit tillbaka alla styrkor från gränserna till [SCOPE.sCountry('paris_commune_nation_scope').GetName]. Regeringsstyrkornas tillfälliga tillbakadragande har hyllats som en stor seger för Nationalgardet. \n\nPariskommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_8_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_8_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_8_b_desc$"
 notification_paris_commune_automation_pulse_8_c_name:0 "Regeringen i Versailles mobiliserar modernt artilleri"
 notification_paris_commune_automation_pulse_8_c_desc:0 "Regeringen i[SCOPE.sCountry('paris_commune_nation_scope').GetName] Versailles har dragit tillbaka soldater från gränserna till  och placerat ut moderna artilleripjäser med bakladdning runt Paris stadsgränser.  \n\nParis-kommunens#!#bold framfart har#boldminskat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_8_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_8_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_8_c_desc$"
 notification_paris_commune_automation_pulse_9_a1_name:0 "Kommunardernas kvinnoförbund förbjuder bordeller"
 notification_paris_commune_automation_pulse_9_a1_desc:0 "Kvinnounionen[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] har framgångsrikt verkat för ett förbud mot bordeller i Paris, med hänvisning till de frekventa övergreppen mot kvinnor på dessa inrättningar. Kvinnounionens framgångar har inspirerat till en ökad feministisk aktivism även utanför Kommunen. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_9_a1_tooltip:0 "#header $notification_paris_commune_automation_pulse_9_a1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_9_a1_desc$"
 notification_paris_commune_automation_pulse_9_a2_name:0 "Kommunardernas kvinnoförbund förbjuder bordeller"
 notification_paris_commune_automation_pulse_9_a2_desc:0 "Kvinnounionen[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] har framgångsrikt verkat för ett förbud mot bordeller i Paris, med hänvisning till de frekventa övergreppen mot kvinnor på dessa inrättningar. \n\nFramstegen för Pariskommunen#!#bold har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_9_a2_tooltip:0 "#header $notification_paris_commune_automation_pulse_9_a2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_9_a2_desc$"
 notification_paris_commune_automation_pulse_9_b_name:0 "Kommunarderna avvisar kvinnounionens krav"
 notification_paris_commune_automation_pulse_9_b_desc:0 "Partiets[SCOPE.sCountry('paris_commune_nation_scope').GetName] centralkommitté har avvisat kvinnounionens framställning om att stänga bordellerna i Paris. Beslutet har varit en stor besvikelse för dem som kämpar för ökade kvinnorättigheter i Paris. \n\nFramstegen för Pariskommunen#!#bold har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_9_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_9_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_9_b_desc$"
 notification_paris_commune_automation_pulse_9_c_name:0 "Kommunarderna åtalar parisiska prostituerade"
 notification_paris_commune_automation_pulse_9_c_desc:0 "Partiets[SCOPE.sCountry('paris_commune_nation_scope').GetName] centralkommitté har beordrat stängning av bordellerna i Paris och åtal mot deras personal. \n\nParis-kommunens#!#bold framgångar har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_9_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_9_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_9_c_desc$"
 notification_paris_commune_automation_pulse_10_a1_name:0 "Fästningen återerövrad från Versailles-regeringen"
 notification_paris_commune_automation_pulse_10_a1_desc:0 "Efter att en enhet ur Nationalgardet dragit sig tillbaka från en befäst position och denna tagits över av Versailles-regeringen har förstärkningar lyckats återta positionen.[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective] Denna seger har stärkt de krigiska krafterna inom Kommunen. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable10#!."
 notification_paris_commune_automation_pulse_10_a1_tooltip:0 "#header $notification_paris_commune_automation_pulse_10_a1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_10_a1_desc$"
 notification_paris_commune_event_10_a1_name:0 "Förstärkningar från Kommunarden återtar fästningen"
 notification_paris_commune_event_10_a1_desc:0 "Efter att de belägrade[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective]styrkorna hade dragit sig tillbaka från en befäst ställning kunde förstärkningarna återta ställningen från våra trupper.[SCOPE.sCountry('paris_commune_nation_scope').GetAdjectiveNoFormatting]"
 notification_paris_commune_event_10_a1_tooltip:0 "#header $notification_paris_commune_event_10_a1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_event_10_a1_desc$"
 notification_paris_commune_event_10_a2_name:0 "Lojaliststyrkorna intar fästningen"
 notification_paris_commune_event_10_a2_desc:0 "Efter att de belägrade[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective]styrkorna dragit sig tillbaka från en befäst position har våra styrkor lyckats säkra ytterligare ett område vid gränsen till Paris."
 notification_paris_commune_event_10_a2_tooltip:0 "#header $notification_paris_commune_event_10_a2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_event_10_a2_desc$"
 notification_paris_commune_automation_pulse_10_a2_name:0 "Regeringen i Versailles tillåter tillbakadragande från fästningen"
 notification_paris_commune_automation_pulse_10_a2_desc:0 "Striderna kring en befäst position som hålls av[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective]styrkorna har lett till att Nationalgardet har dragit sig tillbaka för att strida vid ett senare tillfälle. Detta har tolkats som en fredsgest från Versailles av reformistiska krafter inom Kommunen. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_10_a2_tooltip:0 "#header $notification_paris_commune_automation_pulse_10_a2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_10_a2_desc$"
 notification_paris_commune_automation_pulse_10_b_name:0 "Regeringen i Versailles tar kontroll över garnisonen"
 notification_paris_commune_automation_pulse_10_b_desc:0 "En befäst ställning som försvaras av[SCOPE.sCountry('paris_commune_nation_scope').GetAdjective]nationalgardister har omringats och stormats av Versaillesregeringens styrkor. Rapporter om massavrättningar av de omringade nationalgardisterna har redan börjat nå Paris. \n\nParis-kommunens#!#bold framsteg har#boldminskat#! med #variable10#!."
 notification_paris_commune_automation_pulse_10_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_10_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_10_b_desc$"
 notification_paris_commune_automation_pulse_11_a_name:0 "Kommunarderna uppmuntrar arbetstagarägande"
 notification_paris_commune_automation_pulse_11_a_desc:0 "Partiets[SCOPE.sCountry('paris_commune_nation_scope').GetName] centralkommitté har utfärdat ett dekret som ger de anställda rätt att gemensamt ta över ägandet av sina arbetsplatser i händelse av att ägaren är frånvarande. \n\nFramstegen för Pariskommunen#!#bold har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_11_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_11_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_11_a_desc$"
 notification_paris_commune_automation_pulse_11_b_name:0 "Kommunarderna tar över företag i Paris"
 notification_paris_commune_automation_pulse_11_b_desc:0 "Partiets[SCOPE.sCountry('paris_commune_nation_scope').GetName] centralkommitté har utfärdat ett dekret som ger arbetstagarna rätt att gemensamt ta över äganderätten till sina arbetsplatser, vilket har väckt oro bland medelklassen när det gäller äganderätten och stärkt de socialistiska krafterna inom kommunen. \n\nParis-kommunens#!#bold framsteg har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_11_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_11_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_11_b_desc$"
 notification_paris_commune_automation_pulse_12_a_name:0 "Kommunarderna förbjuder barnarbete"
 notification_paris_commune_automation_pulse_12_a_desc:0 "Kommunen[SCOPE.sCountry('paris_commune_nation_scope').GetName]har generellt förbjudit barnarbete i Paris, främjat skolgång för alla barn och stärkt de reformistiska krafterna inom kommunen."
 notification_paris_commune_automation_pulse_12_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_12_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_12_a_desc$"
 notification_paris_commune_automation_pulse_12_b_name:0 "Kommunarderna mobiliserar barnsoldater"
 notification_paris_commune_automation_pulse_12_b_desc:0 "Man[SCOPE.sCountry('paris_commune_nation_scope').GetName]har generellt förbjudit barnarbete i Paris och utvidgat rekryteringsområdet för Nationalgardet. Denna användning av barn inom militären har stärkt de delar av militären[SCOPE.sCountry('france_scope').GetAdjective]som förespråkar att Kommunen omedelbart ska krossas. \n\nParis-kommunens#!#bold framsteg har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_12_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_12_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_12_b_desc$"
 notification_paris_commune_automation_pulse_12_c1_name:0 "Kommunardernas utbildningspolitik väcker oro"
 notification_paris_commune_automation_pulse_12_c1_desc:0 "Kommunen[SCOPE.sCountry('paris_commune_nation_scope').GetName]har utfärdat ett dekret som förbjuder barnarbete och inför[GetLawType('law_compulsory_primary_school').GetName]  för alla barn i Paris. Denna politik har gett upphov till rörelser för sociala reformer över hela [SCOPE.sCountry('france_scope').GetName], trots att situationen kring Kommunen fortfarande är olöst."
 notification_paris_commune_automation_pulse_12_c1_tooltip:0 "#header $notification_paris_commune_automation_pulse_12_c1_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_12_c1_desc$"
 notification_paris_commune_automation_pulse_12_c2_name:0 "Kommunarderna inför obligatorisk skolgång"
 notification_paris_commune_automation_pulse_12_c2_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har utfärdat ett dekret som förbjuder barnarbete och inför[GetLawType('law_compulsory_primary_school').GetName]  för alla barn i Paris. Denna politik har fungerat som en inspirationskälla för Kommunens radikala samhällsreformatorer."
 notification_paris_commune_automation_pulse_12_c2_tooltip:0 "#header $notification_paris_commune_automation_pulse_12_c2_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_12_c2_desc$"
 notification_paris_commune_automation_pulse_13_a_name:0 "Kommunarder tar präster som gisslan"
 notification_paris_commune_automation_pulse_13_a_desc:0 "De[SCOPE.sCountry('paris_commune_nation_scope').GetName] mest militanta och tyranniska krafterna i  har stormat kyrkor i ett stort arrondissement och tagit hundratals fångar."
 notification_paris_commune_automation_pulse_13_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_13_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_13_a_desc$"
 notification_paris_commune_automation_pulse_13_b_name:0 "Kommunarderna visar försonlighet mot prästerna"
 notification_paris_commune_automation_pulse_13_b_desc:0 "Den[SCOPE.sCountry('paris_commune_nation_scope').GetName]har beordrat att prästerna i Paris ska hållas i husarrest, till stor glädje för de mindre radikala krafterna inom Kommunen."
 notification_paris_commune_automation_pulse_13_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_13_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_13_b_desc$"
 notification_paris_commune_automation_pulse_13_c_name:0 "Kommunarderna avrättar gisslan bland prästerna"
 notification_paris_commune_automation_pulse_13_c_desc:0 "Skott ekar över Paris när dussintals personer[GetPopType('clergymen').GetName]döms till avrättning i [SCOPE.sCountry('paris_commune_nation_scope').GetName]. De delar av Kommunen som är mest radikalt inställda mot kyrkan har inlett sina egna väpnade jakter."
 notification_paris_commune_automation_pulse_13_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_13_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_13_c_desc$"
 notification_paris_commune_automation_pulse_14_a_name:0 "Kommunarderna reformerar nationalgardet"
 notification_paris_commune_automation_pulse_14_a_desc:0 "Man[SCOPE.sCountry('paris_commune_nation_scope').GetName]har infört en strängare befälsstruktur för Nationalgardet, med[GetPopType('officers').GetName] en person med militär erfarenhet vid rodret."
 notification_paris_commune_automation_pulse_14_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_14_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_14_a_desc$"
 notification_paris_commune_automation_pulse_14_b_name:0 "Kommunarderna mobiliserar arbetarmiliser"
 notification_paris_commune_automation_pulse_14_b_desc:0 "Omfattande reformer över hela staden[SCOPE.sCountry('paris_commune_nation_scope').GetName]har lett till att arbetarmiliser har bildats i de olika arrondissementen i Paris."
 notification_paris_commune_automation_pulse_14_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_14_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_14_b_desc$"
 notification_paris_commune_automation_pulse_14_c_name:0 "Kommunarderna utökar nationalgardet"
 notification_paris_commune_automation_pulse_14_c_desc:0 "En ny rekryteringskampanj inom organisationen[SCOPE.sCountry('paris_commune_nation_scope').GetName]har stärkt de moderata krafterna i centralkommittén."
 notification_paris_commune_automation_pulse_14_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_14_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_14_c_desc$"
 notification_paris_commune_automation_pulse_15_a_name:0 "Kommunarderna avsätter ledamöter i Nationalförsamlingen"
 notification_paris_commune_automation_pulse_15_a_desc:0 "#![SCOPE.sCountry('paris_commune_nation_scope').GetName]Mot bakgrund av anklagelser om intressekonflikter har ledamöter i Nationalförsamlingen formellt avsatts från sina platser i ”s centralkommitté”. Det är nu en verklig proletär diktatur. \n\nFramstegen för Pariskommunen#bold har#boldminskat#! med #variable5#!."
 notification_paris_commune_automation_pulse_15_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_15_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_15_a_desc$"
 notification_paris_commune_automation_pulse_15_b_name:0 "Kommunarderna utser ledamöter till nationalförsamlingen"
 notification_paris_commune_automation_pulse_15_b_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]Trots påståenden om intressekonflikter har ledamöter i Nationalförsamlingen valts in i centralkommittén. \n\nFramstegen för Pariskommunen#!#bold har#boldökat#! med #variable5#!."
 notification_paris_commune_automation_pulse_15_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_15_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_15_b_desc$"
 notification_paris_commune_automation_pulse_16_a_name:0 "Kommunarderna bildar en militär hjälpstyrka för kvinnor"
 notification_paris_commune_automation_pulse_16_a_desc:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]Kvinnor i  har fått tillstånd att utföra icke-stridande uppgifter inom Nationalgardet. \n\nFramstegen för  Pariskommunen#!#bold har#bold  ökat#! med#variable  5#!."
 notification_paris_commune_automation_pulse_16_a_tooltip:0 "#header $notification_paris_commune_automation_pulse_16_a_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_16_a_desc$"
 notification_paris_commune_automation_pulse_16_b_name:0 "Communards utestänger kvinnor från tjänsten"
 notification_paris_commune_automation_pulse_16_b_desc:0 "Enligt rapporter från delstaten[SCOPE.sCountry('paris_commune_nation_scope').GetName] har nationalgardet förbjudit kvinnor att utföra någon form av militärtjänst, vilket har väckt missnöje bland feministerna i Paris."
 notification_paris_commune_automation_pulse_16_b_tooltip:0 "#header $notification_paris_commune_automation_pulse_16_b_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_16_b_desc$"
 notification_paris_commune_automation_pulse_16_c_name:0 "Kommunarderna tillåter kvinnliga soldater"
 notification_paris_commune_automation_pulse_16_c_desc:0 "Ett nytt dekret i  har[SCOPE.sCountry('paris_commune_nation_scope').GetName]gjort det möjligt för kvinnor att tjänstgöra i stridande befattningar inom försvarsmakten. Enligt uppgift har hela kompanier bildats över en natt. \n\nFramstegen för  Pariskommunen#!#bold har#bold  ökat#! med#variable  10#!."
 notification_paris_commune_automation_pulse_16_c_tooltip:0 "#header $notification_paris_commune_automation_pulse_16_c_name$#!\n$TOOLTIP_DELIMITER$\n$notification_paris_commune_automation_pulse_16_c_desc$"
 fra_paris_commune_drain:0 "Knivhuggen i hjärtat"
 paris_commune.5.t:0 "Krisen i Paris"
 paris_commune.5.d:0 "Missnöjet i[SCOPE.sCountry('france_scope').GetName]  har lett till att revolutionärerna har intagit staden Paris. Frankrike är nu uppdelat mellan två rivaliserande regeringar – den i Paris och den i Versailles."
 paris_commune.5.f:0 "Det var nu middagstid, och hela händelsen framstod som ytterst märklig och obegriplig för den som inte var van vid att bygga barrikader. I stället för att regeringen spärrade av varje gata, som hade varit fallet på morgonen, riktades nu en fientlig kanon mot varje gata. \n\n— Anonym#italic korrespondent för Times of London#!, 1871"
 paris_commune.5.a:0 "”Regeringen” i Paris har inget att stödja sig på."
 paris_commune.5.b:0 "[SCOPE.sCountry('france_scope').GetNameNoFormatting] skulle behöva ett regeringsskifte."
 paris_commune.5.c:0 "Vi har inget intresse av detta."
 will_improve_commune_progress_tt:0 "#!Pariskommunen#bold kommer att ha fördelar i sin kamp mot [SCOPE.sCountry('france_scope').GetName]"
 notification_foreign_country_supports_commune_name:0 "[SCOPE.sCountry('recogniser_scope').GetName] Erkänner Pariskommunen"
 notification_foreign_country_supports_commune_desc:0 "Regeringen i[SCOPE.sCountry('recogniser_scope').GetName]  har erkänt regeringen i  som den[SCOPE.sCountry('paris_commune_scope').GetName] legitima regeringen för hela Frankrike, med hänvisning till påstådda brister hos Versaillesregeringen när det gäller att på ett korrekt sätt tjäna sitt folk."
 notification_foreign_country_supports_commune_tooltip:0 "#header $notification_foreign_country_supports_commune_name$#!\n$TOOLTIP_DELIMITER$\n$notification_foreign_country_supports_commune_desc$"
