l_swedish:
 concept_magic_reserves:0 "Arcana"
 concept_magic_reserves_desc:0 "@magic! Arcana is a [concept_capacity] used to affect internal change to your [concept_country], like channeling [concept_arcana_cards] or changing [Concept('concept_production_method', '$concept_production_methods$')]. It represents the mystical and supernatural influence a nation wields. It encapsulates the nation's ability to harness and spread magical knowledge, the populace's awareness and acceptance of the mystical arts, and the overall magical capacity and prowess of the country."
 concept_renown:0 "Wanderlust"
 concept_renown_desc:0 "@renown! Renown is a [concept_capacity] used to effect internal change to your [concept_country], like WIP. It represents the reputation a country wields among the heroes of the realm. It encapsulates the nation's ability to call upon legendary adventurers and handling of supernatural threats."
 concept_adventurer_coverage_added:0 "[GetBuildingType('building_questing_office').GetName]"
 concept_adventurer_coverage:0 "Adventurer Coverage"
 concept_monstrous_harvest_condition:0 "Monstrous Harvest Condition"
 monstrous:0 "Monstrous"
 concept_monstrous_harvest_condition_desc:0 "A $concept_monstrous_harvest_condition$ is a [concept_harvest_condition] caused by creatures, spirits or other monsters. While their exact triggers can be very different, they are commonly #green averted#! by positive [concept_adventurer_coverage], and #red encouraged#! by negative [concept_adventurer_coverage] and heavy [concept_pollution_impact]."
 concept_heptadrone_condition:0 "Heptadrones"
 concept_heptadrone_condition_desc:0 "Heptadrone Swarms are a monstrous harvest condition unique to Rimeroot. Their likelihood is #green reduced#! with positive [concept_adventurer_coverage], and #red increased#! with [concept_pollution_impact], $building_sunstation$ usage, and negative [concept_adventurer_coverage]. They do not They can be prevented by completing the $je_heptadron_probs$."
 concept_adventurer_coverage_desc:0 "$concept_adventurer_coverage$ is provided by [Concept('concept_building','$concept_buildings$')] like [SelectLocalization(GetPlayer.IsValid,'concept_adventurer_coverage_added','Adventuring Guilds')]. It influences the wellbeing of the state, reducing [Concept('concept_pop_growth', '$concept_pop_growth_mortality$')]."
 concept_godsbane:0 "Godsbane"
 concept_godsbane_desc:0 "The Godsbane was a grand scheme orchestrated by a handful of gods during the [concept_age_of_gods] to erect a [concept_veil] around the [concept_material_plane] in order to protect the world from the apocalyptic wars between deities. This event began the [concept_age_of_man]."
 concept_bloodtithe:0 "Blood-tithe"
 concept_bloodtithes:0 "Blood-tithes"
 concept_bloodtithe_desc:0 "Blood-tithes are a special condition of subjugation beneath Dreadmoor. Those subject to a blood-tithe must send 4-6% of the [Concept('concept_pop', '$concept_pops$')] of their most populated [concept_state] to their [concept_overlord] each year. Blood-tithes can be directed to a specific [concept_state] with the [GetDecreeType('decree_special_measures').GetName] decree.\n\nMore countries can take advantage of the blood-tithe system through the #bold Bloodtithe Mode#! game rule setting."
 concept_dumonia:0 "Dumonia"
 concept_dumonia_desc:0 "Founded by the legendary emperor Urik Romhaar, who was the first man to unite the human tribes of Noricum centuries ago. The Empire of Dumonia used to be the peak of human civilization, stretching from Noricum to the Salt Wastes of Zalaron. While the modern Empire of Dumonia is merely a shadow of this past glory, its influence still remains through the language, religion and customs that it established all across Zalaron."
 concept_khus:0 "Khus"
 concept_khus_desc:0 "Khus used to be a mighty empire in the middle of [concept_zalaron]. Thanks to its monopoly on magic during the final years of the [concept_age_of_man], it could even rival the mighty empire of [concept_dumonia]. The empire ended in disaster during the [concept_nightfall], and today remains a cursed wasteland where only monsters thrive."
 concept_einaire_yol:0 "Einaire Yol"
 concept_einaire_yol_desc:0 "The [concept_nightfall] destroyed the Empire of [concept_khus], leaving Lysei, a backwater province in the Empire, without central authority. Such began the Night Without End, or \"Einaire Yol.\" With a rapid collapse of central authority, the region descended into chaos, and two main schools of thought rose from the ashes. Those who kept believing in [concept_alestair_marktaros]' teachings, and those who utterly rejected them, fearing a second [concept_nightfall]."
 concept_recruitment:0 "Join the Exether Team!"
 concept_recruitment_desc:0 "Development for Exether is done on a volunteer, as-available basis, with roles available for people of all skill levels. If you're interested in joining, reach out to Nightingale or Dotti through the Discord. A link can be found on the Steam page or on the Exether subreddit."
 concept_alestair_marktaros:0 "Alestair Marktaros"
 concept_alestair_marktaros_desc:0 "Alestair Marktaros was the first wizard since the [concept_godsbane]. He transformed the desert kingdom of [concept_khus] into a [concept_hegemon] and taught a new generation of mages. His legacy remains controversial, as his actions indirectly led to the [concept_nightfall]."
 concept_marktaros_short:0 "Marktaros"
 concept_blooming:0 "Blooming"
 concept_blooming_desc:0 "A decade after the [concept_nightfall], one evening across the lands of Thiral, an event occurred that defied natural explanation. Seemingly overnight, vast fields of pink roses began to bloom in unison. These roses, glowing faintly with a mysterious inner light, appeared near noble estates, temples, and prominent landmarks of the Rose Court. Each flower was not only visually stunning but also emitted an aura of power that resonated with followers of The Rose Court.\n\nIt was quickly discovered that these roses possessed magical properties: individuals who were near them felt a surge of strength, clarity, and beauty. Those who upheld the values of chivalry and noblesse oblige were especially affected, becoming beacons of both wisdom and power. Their abilities extended beyond mere combat prowess. Some even manifested magical abilities tied to their virtue, such as healing, protection, and control over nature."
 concept_nightfall:0 "Nightfall"
 concept_nightfall_desc:0 "During a great war between [concept_khus] and [concept_dumonia], desperate disciples of [concept_alestair_marktaros] performed a reckless arcana to gain more power from the ley lines of Zalaron, and inadvertently cracked open the [concept_veil] above Khus. This resulted in a devastating cataclysm across Zalaron, and unleashed magical storms across all of [concept_exether], which obscured the sun for five days and five nights."
 concept_age_of_stars:0 "Age of Stars"
 concept_age_of_stars_desc:0 "The Age of Stars is the present era. It began when Alestair Marktaros of Khus rediscovered [concept_magic], and his disciples brought about the [concept_nightfall]. It is named for the [concept_stars] in the night sky, which have only appeared recently as a result of the damage done to the [concept_veil]."
 concept_age_of_man:0 "Age of Man"
 concept_age_of_man_desc:0 "The Age of Man was the nearly millenium-long period after the [concept_nightfall] when the world was almost entirely devoid of [concept_magic]. During this time, humanity became ascendant across the world, and Urik Romhaar founded the Dumonian Empire which covered most of [concept_noricum] and [concept_zalaron]."
 concept_age_of_gods:0 "Age of Gods"
 concept_age_of_gods_desc:0 "Legends tell of a time when gods walked upon Exether among mortals. They guided civilizations, overseeing the construction of temples and raising palaces out of the mud.\nA few gods were kind to their followers, while others commanded faith through fear or violence. Every step of mortal life was at the whims of a deity to whom the [concept_material_plane] was a game. The gods had collectively created the world to prove who was superior, with each one convinced that mortals would worship them above all others.\nBut the gods were in for a rude awakening as mortal worship is fickle. Some were hated for their twisted ideals, while others lost their following when the people of Exether picked new favorites. What had started as an honorable competition soon became an all-out divine war as scorned gods lashed out at the world that rejected them with jealousy, leading to the [concept_godsbane]."
 concept_material_plane:0 "Material Plane"
 concept_material_plane_desc:0 "The material plane, also known as [concept_exether] exists in between all of the [concept_outer_realms]. The [concept_creation_of_exether] was the result over an eternal struggle between the outer gods. It is seperated from the [concept_outer_realms] by an enormous magical [concept_veil] created by the gods to protect it from their constant warring, but that protection has weakened since the [concept_nightfall] and continues to weaken as magical innovations draw more and more magic through it."
 concept_veil_integrity:0 "Veil Integrity"
 concept_veil_integrity_desc:0 "Veil Integrity is a measure of how much magic is seeping into the world through the [concept_veil]. Significant enough changes in Veil Integrity will have devastating effects across [concept_exether], and its destruction could doom the [concept_material_plane] as a whole forever."
 concept_veil_impact:0 "Veil Impact"
 concept_veil_impact_desc:0 "A measure of your country's individual contribution to the degradation of the [concept_veil]. Significant enough changes in [concept_veil_integrity] will have devastating effects across [concept_exether], and its destruction could doom the [concept_material_plane] as a whole forever."
 concept_veil:0 "Veil"
 concept_veil_desc:0 "The veil was created to shield the [concept_material_plane] from the influence of the [concept_outer_realms]. Its creation ended the [concept_age_of_gods] and led to almost a thousand years without magic on [concept_exether]. During the [concept_nightfall], the veil was catastrophically damaged and magic has seeped into the material plane once more through the [concept_stars]."
 concept_stars:0 "Stars"
 concept_stars_desc:0 "Stars, which twinkle brightly when the sun is absent, are actually small perforations in the [concept_veil] through which the [concept_outer_realms] can and do influence the [concept_material_plane]. It is also believed that Wishstone originates from these Stars in some way."
 concept_noricum:0 "Noricum"
 concept_noricum_desc:0 "[GetGeographicRegion('geographic_region_noricum').GetName] is a continent in the northeast of Exether. It is the home of humanity and giantkind."
 concept_zalaron:0 "Zalaron"
 concept_zalaron_desc:0 "Zalaron is the central and largest continent on Exether."
 concept_locari:0 "Locari"
 concept_locari_desc:0 "Locari is located to the southeast of Exether. It has not been wholly explored, and contains many mysteries such as [concept_psionics]. Traditionally it has been inhabited by Lizardfolk, Naga, Goblins, and Awakened Bears, but the recent success of a few human settlements has made it the target of many aspiring colonizers."
 concept_psionics:0 "Psionics"
 concept_psionics_desc:0 "Psionic magic comes from within, rather than as a result of the [concept_outer_realms]. It was therefore unaffected when all other [concept_magic] was cut off during the [concept_age_of_man] by the [concept_veil]."
 concept_creation_of_exether:0 "Creation of Exether"
 concept_creation_of_exether_desc:0 "After the [concept_coalescence], the first gods began looking outwards toward the other [concept_outer_realms] floating through the ethereal phlogiston. There they met other gods, some of whom were open to cooperation while others attempted conquests. The planes went through a period of epic conflicts, alliances, and plots for dominance of existence, but every invasion failed, every coalition fell apart, and every scheme fizzled out. The planes rejected foreign gods, and fate upheld the status quo no matter what. Realizing the futility of their actions, the gods gathered and came up with a compromise: they would create a new [concept_material_plane] where they could all vie for dominance, a world with nothing set in stone. Thus began the [concept_age_of_gods]."
 concept_long_slumber:0 "Long Slumber"
 concept_long_slumber_desc:0 "Fearing the imminent anarchy after the [concept_godsbane] which their runeseers saw with unprecedented clarity, the dwarves retreated into massive subterranean vaults and turned themselves to stone, waiting for their gods to return and free them. What no runeseer had foreseen was that their long sleep would trap them for nearly a millennium, only waking up after the [concept_nightfall] afflicted by the [concept_curse_of_the_mountain]."
 concept_buramog_wars:0 "Buramog Wars"
 concept_buramog_wars_desc:0 "The Buramog Wars were a series of brutal conflicts between the Humans of the Ceraun and the Buramog Orcs of the Dimri Woods. The wars reached a grim crescendo with the deployment of Wyldfire Tincture, an alchemical weapon that scorched the Dimri Woods, transforming them into the cursed expanse now called the Plaguewood. The tincture's horrific effects not only decimated the Buramog orcs but also poisoned the land itself, leaving scars that have festered in both the earth and history ever since."
 concept_curse_of_the_mountain:0 "Curse of the Mountain"
 concept_curse_of_the_mountain_desc:0 "The Curse of the Mountain is a name given to the race-wide phenomenon of claustrophobia among dwarves. Since the [concept_age_of_stars], dwarves have preferred to live on top of mountains rather than inside of them. Drawn to wide fields and open skies, the dwarves of today live very different lives to their ancestors."
 concept_exether:0 "Exether"
 concept_exether_desc:0 "Exether is the name of the world. It is also known as the [concept_material_plane]."
 concept_magic:0 "Magic"
 concept_magic_desc:0 "Magic is the harnessed power of the cosmos, seeping in through [concept_stars] into the world of [concept_exether]. It has only recently returned to the world after the [concept_age_of_man]."
 concept_rememberancers:0 "Rememberancers"
 concept_rememberancers_desc:0 "Rememberancy is a type of [concept_magic] that grants perfect recall to the Mage wielding it, professionally known as Rememberancers.  Such Mages are resistant to having their memories probed via [concept_psionics]."
 concept_outer_realms:0 "Outer Realms"
 concept_outer_realms_desc:0 "The twelve Outer Realms formed during the [concept_coalescence]. Each one embodies a unique combination of evil and good, as well as order and chaos. These planes are unchanging, and any outside influence on these planes will be erased over time by the natural forces of the universe."
 concept_coalescence:0 "Coalescence"
 concept_coalescence_desc:0 "The most widely accepted tale of the world's origins is the myth of the Coalescence. The myth holds that the [concept_outer_realms] formed out of the primordial chaos between the Negative and Positive planes at the beginning of time. Soon, the cosmic winds of magic breathed life into the Outer Realms, giving birth to the first gods who were inextricably bound to their realms and soon sparked the [concept_creation_of_exether]."
 concept_astral_calendar:0 "Astral Calendar"
 concept_astral_calendar_desc:0 "The Astral Calendar is the most common interpretation of the movement of the [Concept('concept_constellation','constellations')] across the night sky. Spread across the known world during the height of the [Concept('concept_dumonia','Dumonian Empire')], this calendar categorizes the constellations into twelve star signs: [concept_gryphon], [concept_justice], [concept_sphinx], [concept_golem], [concept_unicorn], [concept_fey], [concept_phoenix], [concept_djinn], [concept_siren], [concept_kraken], [concept_fiend] and [concept_angel]."
 concept_zodiac:0 "Zodiac"
 concept_zodiac_desc:0 "The Zodiac is a belt-shaped region of the universe created after the [concept_coalescence]. It consists of twelve [Concept('concept_constellation','constellations')] in a ring around the [concept_material_plane]. It is unknown if anything exists beyond the Zodiac."
 concept_constellation:0 "Constellation"
 concept_constellation_desc:0 "A constellation is collection of [concept_outer_realms] that have embody similar concepts. The constellations form a ring known as the [concept_zodiac]. On [concept_exether], they have been visible to the naked eye as [concept_stars] since the [concept_nightfall]."
 concept_gryphon:0 "Gryphon"
 concept_gryphon_desc:0 "The #bold Gryphon#! is the seventh astrological sign of the [concept_astral_calendar]. The Gryphon contains the [concept_outer_realms] of #bold Wind#! that embody freedom and the primal element of air."
 concept_justice:0 "Justice"
 concept_justice_desc:0 "The #bold Justice#! is the second astrological sign of the [concept_astral_calendar]. The Justice contains the [concept_outer_realms] of #bold Order#! that embody law and cooperation."
 concept_sphinx:0 "Sphinx"
 concept_sphinx_desc:0 "The #bold Sphinx#! is third astrological sign of the [concept_astral_calendar]. The Sphinx contains the [concept_outer_realms] of #bold Logic#! that embody reason and learning."
 concept_golem:0 "Golem"
 concept_golem_desc:0 "The #bold Golem#! is the first astrological sign of the [concept_astral_calendar]. The Golem contains the [concept_outer_realms] of #bold Earth#! that embody reliability and the primal element of stone."
 concept_unicorn:0 "Unicorn"
 concept_unicorn_desc:0 "The #bold Unicorn#! is the fifth astrological sign of the [concept_astral_calendar]. The Unicorn contains the [concept_outer_realms] of #bold Light#! that embody compassion and empathy."
 concept_fey:0 "Fey"
 concept_fey_desc:0 "The #bold Fey#! is the sixth astrological sign of the [concept_astral_calendar]. The Fey contains the [concept_outer_realms] of #bold Life#! that embody nature and growth."
 concept_phoenix:0 "Phoenix"
 concept_phoenix_desc:0 "The #bold Phoenix#! is the fourth astrological sign of the [concept_astral_calendar]. The Phoenix contains the [concept_outer_realms] of #bold Flame#! that embody passion and and the primal element of fire."
 concept_djinn:0 "Djinn"
 concept_djinn_desc:0 "The #bold Djinn#! is the eighth astrological sign of the [concept_astral_calendar]. The Djinn contains the [concept_outer_realms] of #bold Chaos#! that embody disorder and change."
 concept_siren:0 "Siren"
 concept_siren_desc:0 "The #bold Siren#! is the ninth astrological sign of the [concept_astral_calendar]. The Siren contains the [concept_outer_realms] of #bold Emotion#! that embody feelings and intuition."
 concept_kraken:0 "Kraken"
 concept_kraken_desc:0 "The #bold Kraken#! is the tenth astrological sign of the [concept_astral_calendar]. The Kraken contains the [concept_outer_realms] of #bold Water#! that embody calmness and and the primal element of water."
 concept_fiend:0 "Fiend"
 concept_fiend_desc:0 "The #bold Fiend#! is the eleventh astrological sign of the [concept_astral_calendar]. The Fiend contains the [concept_outer_realms] of #bold Darkness#! that embody cruelty and apathy."
 concept_angel:0 "Angel"
 concept_angel_desc:0 "The #bold Angel#! is the twelfth astrological sign of the [concept_astral_calendar]. The Angel contains the [concept_outer_realms] of #bold Death#! that embody rot and decay."
 concept_dragon:0 "Dragon"
 concept_dragon_desc:0 "The #bold Dragon#! is the astrological sign of [concept_exether]. It is not related to the the [concept_outer_realms], but instead symbolizes the power of mortal souls and the sun."
 concept_sky_node:0 "Sky Node"
 concept_sky_node_desc:0 "Sky nodes can be found overland where airships can connect to the global market. This allows landlocked nations to interact with the global market"
 concept_opponents:0 "Opponents"
 concept_opponents_desc:0 "Placeholder text :D"
 concept_starbrand:0 "Starbrand"
 concept_starbrand_desc:0 "Starbrands are those born in both the month and year of their [concept_zodiac] sign, manifesting a Zodiac Brand on their body. They are the only people in [concept_exether] who can perform magic without needing some sort of magical focus. They are typically more skilled in magic directly related to their [concept_zodiac] sign."
 concept_starbrands:0 "Starbrands"
 concept_retainer:0 "Retainer"
 concept_retainer_desc:0 "Retainers are hired adventurers that solve various situations and emergencies for the state."
 concept_arcana_cards:0 "Astral Blessings"
 concept_arcana_cards_desc:0 "#bold Astral Blessings#! are cast using your country's [concept_magic_reserves] and provide powerful benefits. The Blessings available to you is based on your nation's [concept_religion], and after adding or changing a blessing you cannot do so again for another 12 years."
 concept_satrapy:0 "Satrapy"
 concept_satrapy_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')] may turn a weaker [concept_country] into their $concept_satrapy$. A $concept_satrapy$ is a more autonomous [concept_subject] type that are able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] and are not forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]. They must pay #v 25%#! of their [concept_treasury] income to their $concept_overlord$ each week."
 concept_letter_of_marque:0 "Letter of Marque"
 concept_letter_of_marque_desc:0 "[Concept('concept_recognized_power','$concept_recognized_powers$')] may turn a weaker [concept_bandit_country] [concept_country] into their $concept_letter_of_marque$. A $concept_letter_of_marque$ is a more autonomous [concept_subject] type that are able to start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')] and are not forced to join their [Concept('concept_overlord','$concept_overlord_possessive$')] [Concept('concept_war','$concept_wars$')]. They must pay #v 10%#! of their [concept_treasury] income to their $concept_overlord$ each week, and cannot target their $concept_overlord$ with [concept_raiding]"
 concept_bandit_country:0 "Bandit Country"
 concept_bandit_country_desc:0 "A [concept_bandit_country] is a [concept_country] that has fallen into lawlessness and chaos, and is able to conduct [concept_raiding]. They are typically plagued by internal problems and low [concept_legitimacy]."
 concept_hegemon:0 "Hegemon"
 concept_hegemons:0 "Hegemonies"
 concept_hegemon_desc:0 "The [Concept('concept_country', '$concept_countries$')] that stand above even $concept_great_powers$ [concept_rank] are known as $concept_hegemons$. They have established absolute dominance over their local regions and command respect worldwide. [AddLocalizationIf(GetPlayer.IsValid,'concept_hegemon_desc_added')]"
 concept_hegemon_desc_added:0 "\n\n$concept_hegemons$ gain the following benefits:\n[GetRankModifier('hegemon').GetDesc]"
 concept_real_union:0 "Real Union"
 concept_real_union_desc:0 "Two [Concept('concept_country', '$concept_countries$')] may be joined together in a $concept_real_union$, a [concept_subject] symbolizing a union of two or more $concept_countries$, which share some state institutions in contrast to personal unions. The subject cannot start their own [Concept('concept_diplomatic_play','$concept_diplomatic_plays$')], yet are forced to join their $concept_overlord$'s [Concept('concept_war','$concept_wars$')]."
 concept_traditions:0 "Traditions"
 concept_traditions_desc:0 "The world of [concept_exether] is shaped by the traditions of the species that inhabit it. Accordingly, every [concept_country] has access to a unique [concept_technology] depending on what species has traditionally made it their home."
 concept_rungloam:0 "Rūngloam"
 concept_rungloam_desc:0 "Rūngloam is a pervasive and ethereal phenomenon born from the catastrophic [concept_nightfall] over the old Kingdom of [concept_khus].  Invisible to the naked eye but palpable to those attuned to magic, Rūngloam lingers like a mist infused with celestial power."
 concept_blue_riband:0 "Azure Pennant"
 concept_blue_riband_desc:0 "The #bold Azure Pennant#! is an award given to the nation with the fastest ocean liner. It is determined by a country's technological prowess and shipbuilding capacity."
 concept_south_sea_favor:0 "Favor"
 concept_south_sea_favor_desc:0 "Favor can be exchanged for boons"
 concept_changeling_crisis:0 "Changeling Crisis"
 concept_changeling_crisis_desc:0 "An ongoing series of events occurring primarily in Achon. The mass creation of [concept_changelings] during the [concept_nightfall], though generally considered to be mere folk tales, was revealed to be real and widespread. This realization caused an epidemic of fear and paranoia to spread among the people. Unable to cope with this reality and despite the formation of the [concept_achon_agency], Achonites of all stripes are demanding ever more radical government action to assuage their fears."
 concept_realmtouched:0 "Realmtouched"
 concept_realmtouched_desc:0 "The realmtouched refers to a select group of people living on [concept_exether]. They are former mortals and their descendants, who were subjected to intense magical energy unleashed during the [concept_nightfall]. This event caused them to transform, body and soul, into new beings infused with the [concept_magic] of the [concept_outer_realms]. Though in some ways they still resemble their ancestors, their very being and strange way of life have fundamentally diverged from their mortal cousins."
 concept_changelings:0 "Changelings"
 concept_changelings_desc:0 "A moniker bestowed upon [concept_realmtouched] beings living in the Achon-Arrador borderland. Named such for their uncanny ability to almost perfectly assume the form of mortals, provided this new shape is within a certain range of their natural form. Changelings do not just possess the ability to mimic their looks, but their speech and behaviour too. Magical energy, particularly in the form of wishstone, disrupts a changelings mimicry and forces them to reveal their true nature."
 concept_achon_agency:0 "Survey and Control Agency"
 concept_achon_agency_desc:0 "The State Survey and Control Agency of Achon, also known as the SCA, is a militarized government task force established to combat the [concept_changeling_crisis]. Originally only tasked with uncovering and registering [concept_changelings], they have become more powerful, radical and vicious as the crisis worsens. Backed by both political will and a popular mandate, they aim to keep Achon free from changeling influence at any cost."
 concept_erigan:0 "Erigan"
 concept_erigan_desc:0 "Erigan is one of the gods of the [GetReligion('church_of_man').GetName]. He is the god of writing, knowledge, and poets."
 concept_kamiros:0 "Kamiros"
 concept_kamiros_desc:0 "Kamiros is one of the gods of the [GetReligion('church_of_man').GetName]. He is the god of light, hope, and justice."
 concept_kamiran_conclave:0 "Concilium Lux Aeternae"
 concept_kamiran_conclave_desc:0 "The Council of the Eternal Light is a gathering of the [concept_kamiran_cardinals] that takes place shortly after the death of the [concept_luminarch]. The priests enter in solemn communion with [concept_kamiros], waiting for His guiding light to reveal the next Luminarch. The church holds this event to be wholly spiritual endeavor, though it's remarked that Kamiros's guidance often seems to take the form of cutthroat politics. Many among Kamiros' clergy would not reject this accusation however. They say that humanity in all its fickle forms is most precious to the Sun God and that heated discussion followed by unwavering compromise is just what He wishes to see."
 concept_kamiran_cardinals:0 "Principes Luminarii"
 concept_kamiran_cardinals_desc:0 "The First amongst the Enlightened servants of [concept_kamiros]' holy church. Preachers, teachers, scholars. They are the highest ranking members of the clergy, superseded in authority only by the [concept_luminarch] and the God Himself. Often filling high-ranking positions within the church hierarchy and the lands it controls, theirs is the responsibility for making decisions that effect the entirety of the church and its flock. Their most well-known duty however, is their participation in the [concept_kamiran_conclave]. Here, it is usually one of their number who is elevated to the position of Luminarch."
 concept_luminarch:0 "Luminarch"
 concept_luminarch_desc:0 "The Luminarch is the acting head of the Church of [concept_kamiros] in the Sun Gods' stead. For as long as the Bright Judge remains in the heavens the Luminarch will relay His divine will unto the mortal realm. He is the Solpontarion, the Bridge to the Sun, who is closest to His domain and can see His guiding light most clearly. He is the warden of the empty throne, tasked with keeping the church on track and maintaining the sacraments in accordance with His teachings. The Luminarch also possesses temporal power as ruler of the Dumonian state of Arelon. Though he is always presented as a spiritual figure first, the Luminarch is invariably as much a deft politician as theologian."
 concept_pibliyakimo:0 "Pibliyakimo"
 concept_pibliyakimo_desc:0 "Pibliyakimo, literally #italic 'Pure Dragon',#! is an ancient title that was abolished by the tyrannical Council, but has since been restored since the Revolution. They are the avatar of the sun god Akini upon the world. They are considered [Concept('concept_perfect', '$concept_perfects$')], or humans who have achieved an ascended state of being."
 concept_lightspeaker:0 "Light-Speaker"
 concept_lightspeakers:0 "Light-Speakers"
 concept_lightspeaker_desc:0 "Light-Speakers are wandering sages, elders, and priests. They carry the stories of their communities to pass down to the next generation. In a society without widespread literacy, they held sway as wise men."
 concept_perfect:0 "Perfect"
 concept_perfects:0 "Perfects"
 concept_perfect_desc:0 "The cycle of reincarnation can only be broken by becoming a Perfect. This is accomplished by living a spiritual life unfettered by desire or defilements. For regular mortals, this must be consecrated by receiving a Purification ritual as close to the person's hour of death as possible. The person cannot eat or drink if they hope to remain a Perfect at the hour of their death, as food travels through their body and defiles it with material impurities that become waste. For a Pibliyakimo, becoming a Perfect is necessary to achieve the [concept_prophecy_dawn]."
 concept_nchyama:0 "Zikapa Nchamya"
 concept_nchyama_desc:0 "When the Council of the Six Golden Rays marched on the capital of the Revolution, President Zikapa Nchamya slipped away to a forgotten temple outside the city. There, he prayed to Akini for salvation, and Akini answered by summoning a giant cobra that served as an obedient mount to Nchyama. He rode it out and fought the last two councilors and their army. His cobra fought both Rexes of the councilors, paralyzing and killing them with its venom and devouring both councilors. It died of its mortal wounds after the battle had been won.\n\nWith their last leaders defeated, the Councilor army dispersed into the mountains and over the years trickled back to re-enter society or remain as bandits. To thank its service to the Republic, Nchyama decreed that the cobra be made as the Republic's emblem on the new flag.\n\nHe became an unquestioned hero, and was acclaimed President-For-Life until his arrangement of a new election which was forever delayed, until his death."
 concept_prophecy_dawn:0 "Prophecy of the New Dawn"
 concept_prophecy_dawn_desc:0 "The Prophecy of the New Dawn has it said that one day Akini will be reborn into a human body and, upon becoming a Perfect, will realize their true nature and become ruler of the world in a new messianic age. They will guide all people to become Perfect and live in harmony until the sun regains its strength to remake the world."
 concept_six_golden:0 "Council of the Six Golden Rays"
 concept_six_golden_desc:0 "After the first revolution of 1128 threw off the Seven Tyrants, Amanzi fell into a period of instability as the young republic struggled to maintain cohesion.\n\nIn 1168 the conservatives launched a rebellion that threw the country into civil war, led by a new group calling themselves the Council of the Six Golden Rays. These councilmen rode into battle on war-tyranosauruses.\n\nThe Republicans, with a taboo on riding rexes due to their association with the old oligarchy, used smaller raptor cavalry to supplement the infantry, and trained flying dinosaurs carried young women who dropped bombs from great heights."
 concept_heptadrones:0 "Heptadrones"
 concept_heptadrones_desc:0 "Heptadrones are the ancient servants of the dragonkind of Rimeroot, who created them to assist in stewarding over the sunstations. They came back online after the [concept_nightfall] to find themselves masterless in a world very different from before."
 outer_plane:0 "Outer Realm"
 concept_doloria:0 "Doloria"
 concept_doloria_desc:0 "#bold Doloria#!, the Weeping Opera, is an [Concept('concept_outer_realms', '$outer_plane$')] where sorrow is sanctified and every heartbreak becomes a scene in a sweeping tragic performance.\n\nHere, even the smallest misfortune is met with trembling voices, quivering hands, and tears that fall like rehearsed rain upon velvet stages."
 doloria_tooltip:0 "$concept_doloria_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_siren', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_mirthra:0 "Mirthra"
 concept_mirthra_desc:0 "#bold Mirthra#!, the Eternal Masquerade, is an [Concept('concept_outer_realms', '$outer_plane$')] where joy conceals truth and identity is a costume worn and shed without consequence.\n\nLaughter echoes behind gilded masks as dancers drift through candlelit halls, spinning secrets into silk and delight into illusion."
 mirthra_tooltip:0 "$concept_mirthra_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_siren', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_vermior:0 "Vermior"
 concept_vermior_desc:0 "#bold Vermior#!, the Seething Pit, is an [Concept('concept_outer_realms', '$outer_plane$')] where anger boils over and unrest smolders beneath cracked stone and iron streets.\n\nHere, resentment builds like steam, and every whispered slight becomes the spark that feeds a firestorm of riot and ruin."
 vermior_tooltip:0 "$concept_vermior_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_siren', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_morvane:0 "Morvane"
 concept_morvane_desc:0 "#bold Morvane#!, the Tower of Nightmares, is an [Concept('concept_outer_realms', '$outer_plane$')] where fear is endless and the mind unravels behind every door.\n\nThe tower winds upward without end, each level conjuring deeper dread; footsteps vanish into darkness, and dreams bleed into waking shadow."
 morvane_tooltip:0 "$concept_morvane_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_siren', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_aveline:0 "Aveline"
 concept_aveline_desc:0 "#bold Aveline#!, the Isles of Adoration, is an [Concept('concept_outer_realms', '$outer_plane$')] where affection blossoms and desire lingers in every breath of salt wind.\n\nPetals drift across still lagoons as lovers carve vows into bark and whisper promises beneath stars that never fade."
 aveline_tooltip:0 "$concept_aveline_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_siren', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_rylmar:0 "Rylmar"
 concept_rylmar_desc:0 "#bold Rylmar#!, the Feast of Legends, is an [Concept('concept_outer_realms', '$outer_plane$')] where heroes dine in memory and every epic deed is celebrated across golden halls.\n\nBanquet tables float beneath vaulted skies as shades reenact legendary triumphs, their stories echoing through marble pillars and gilded tombs."
 rylmar_tooltip:0 "$concept_rylmar_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_angel', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_draelyn:0 "Draelyn"
 concept_draelyn_desc:0 "#bold Draelyn#!, the Ethereal Lodge, is an [Concept('concept_outer_realms', '$outer_plane$')] where memories take shape and every lost soul drifts in misty halls.\n\nGhostly lodges sit in fog-choked groves; ephemeral figures wander between spectral inn‑rooms, their whispered recollections weaving threads between life and after."
 draelyn_tooltip:0 "$concept_draelyn_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_angel', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_nemorath:0 "Nemorath"
 concept_nemorath_desc:0 "#bold Nemorath#!, the Silent Expanse, is an [Concept('concept_outer_realms', '$outer_plane$')] where sound fades and every thought drifts into stillness.\n\nA grey plain stretches beneath a blank sky; petrified trees and cairns stand silent, and even echoes vanish, leaving the landscape hushed and empty."
 nemorath_tooltip:0 "$concept_nemorath_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_angel', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_ylvaris:0 "Ylvaris"
 concept_ylvaris_desc:0 "#bold Ylvaris#!, the Cenotaph of the Gods, is an [Concept('concept_outer_realms', '$outer_plane$')] where every name ever lost is carved in stone and every memory stands immortal.\n\nRows of towering obelisks and silent sarcophagi stretch into mist; faceless sentinels guard inscriptions of forgotten deities and vanished species."
 ylvaris_tooltip:0 "$concept_ylvaris_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_angel', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_morgrith:0 "Morgrith"
 concept_morgrith_desc:0 "#bold Morgrith#!, the Rotting Mire, is an [Concept('concept_outer_realms', '$outer_plane$')] where decay thrives and every drop of water births undeath.\n\nFetid bogs bubble with fungal growths and tumbling corpses; undead forms rise from ooze as rot and renewal twist together in the stench of endless decomposition."
 morgrith_tooltip:0 "$concept_morgrith_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_angel', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_yagaduma:0 "Yagaduma"
 concept_yagaduma_desc:0 "#bold Yagaduma#!, the Stoneheart Regime, is an [Concept('concept_outer_realms', '$outer_plane$')] where empires rise on pillars of tyranny and every citizen’s breath is measured by discipline.\n\nMarching columns patrol silent courtyards beneath iron eagles as edicts chisel themselves into monolithic walls. Here, will is forged into obedience, and freedom is a crime carved into the heart of the state."
 yagaduma_tooltip:0 "$concept_yagaduma_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_drazkar:0 "Drazkar"
 concept_drazkar_desc:0 "#bold Drazkar#!, the Academy of Torment, is an [Concept('concept_outer_realms', '$outer_plane$')] where pain is pedagogy and cruelty a fine art learned by design.\n\nAudiences sit in glass amphitheaters as lecturers dissect suffering and apprentices master the balance of nerve-breaking whispers and cold steel discipline."
 drazkar_tooltip:0 "$concept_drazkar_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_gomgraz:0 "Gomgraz"
 concept_gomgraz_desc:0 "#bold Gomgraz#!, the Theater of War, is an [Concept('concept_outer_realms', '$outer_plane$')] where carnage is spectacle and every clash is staged for dominance.\n\nScarlet banners flutter over bloodied amphitheaters as generals choreograph advance and retreat in perfect rhythm—each strategy a drama, each casualty a footnote in the grand design."
 gomgraz_tooltip:0 "$concept_gomgraz_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_anu_dartu:0 "Anu‑Dartu"
 concept_anu_dartu_desc:0 "#bold Anu‑Dartu#!, the Dungeons of Deceit, is an [Concept('concept_outer_realms', '$outer_plane$')] where lies live in stone and every victim is trapped by crafted betrayal.\n\nCorridors twist under false ceilings, whispered promises echo against unbreakable bars, and shadowed wards feed on hope until even truth feels like a conspiracy."
 anu_dartu_tooltip:0 "$concept_anu_dartu_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_ladregn:0 "Ladregn"
 concept_ladregn_desc:0 "#bold Ladregn#!, the Priceless Hoard, is an [Concept('concept_outer_realms', '$outer_plane$')] where wealth is worshipped and every secret priced with gold.\n\nVaults sprawl under crystal domes, coins rain like confessions, and treasure‑hunters barter betrayal for a handful of glimmering trinkets."
 ladregn_tooltip:0 "$concept_ladregn_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_dulan:0 "Dulan"
 concept_dulan_desc:0 "#bold Dulan#!, the Engulfing Darkness, is an [Concept('concept_outer_realms', '$outer_plane$')] where light dissolves and every glance senses the yawning void.\n\nAn all‑black sea stretches beyond sight, boundaries vanish in silent depths, and presence itself becomes a prey swallowed by the living shadow."
 dulan_tooltip:0 "$concept_dulan_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fiend', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_caymir:0 "Caymir"
 concept_caymir_desc:0 "#bold Caymir#!, the Primordial Sea, is an [Concept('concept_outer_realms', '$outer_plane$')] where surface and seabed vanish, and identity drifts in eternal currents.\n\nHere, ancient water‑spirits flow through crushing depth and ceaseless tide. Movement, direction, and sense of self dissolve in an infinite blue.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 caymir_tooltip:0 "$concept_caymir_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_sebakwa:0 "Sebakwa"
 concept_sebakwa_desc:0 "#bold Sebakwa#!, the Fogbound Brokerage, is an [Concept('concept_outer_realms', '$outer_plane$')] where mist asks for more than coin: it claims memories, senses, and certainty.\n\nPale ferrymen guide you through hushed isles, but each toll is a piece of yourself. Wander too long, and you may forget the path home—or who you were.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 sebakwa_tooltip:0 "$concept_sebakwa_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_jahvarka:0 "Jahvarka"
 concept_jahvarka_desc:0 "#bold Jahvarka#!, the Pearl Kingdom, is an [Concept('concept_outer_realms', '$outer_plane$')] where coral towers gleam and merfolk enforce purity with unyielding clarity.\n\nShimmering bays and immaculate reefs sprawl beneath glass‑clear waves. In lagoon courts, every blemish is judged, and every impurity banished with cold precision.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 jahvarka_tooltip:0 "$concept_jahvarka_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_saphrat:0 "Saphrat"
 concept_saphrat_desc:0 "#bold Saphrat#!, the Well of Memories, is an [Concept('concept_outer_realms', '$outer_plane$')] where past reflections swim just beneath the surface—and linger too long.\n\nGrotto pools echo with mirrored recollections. Some are comforting, others twist memory until the mind drowns in its own longing.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 saphrat_tooltip:0 "$concept_saphrat_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_naylu:0 "Naylu"
 concept_naylu_desc:0 "#bold Naylu#!, the Stream of Consciousness, is an [Concept('concept_outer_realms', '$outer_plane$')] where dreams flow like rivers and thoughts carve shifting landscapes.\n\nCurrents wind through waking visions shaped by minds undone or awake. To walk here is to shape reality—and risk drowning in your own ideas.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 naylu_tooltip:0 "$concept_naylu_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_ondis:0 "Ondis"
 concept_ondis_desc:0 "#bold Ondis#!, the Leviathan Depths, is an [Concept('concept_outer_realms', '$outer_plane$')] where pressure crushes light and ancient behemoths drift in ageless dark.\n\nBioluminescent giants glide through trench-black water. Depth here is timeless, and creatures dwell beneath waves older than stars.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 ondis_tooltip:0 "$concept_ondis_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_bhalora:0 "Bhalora"
 concept_bhalora_desc:0 "#bold Bhalora#!, the Shivering Wharf, is an [Concept('concept_outer_realms', '$outer_plane$')] where ice floes creak and survival is carved into frozen silence.\n\nFisher‑folk carve shelters amid drifting icebergs beneath glacial peaks. Their voices meld with crack and howl as they endure the relentless chill in disciplined ritual.\n\nThis realm typically oscillates within the constellation of the [concept_kraken]."
 bhalora_tooltip:0 "$concept_bhalora_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_kraken', MakeScopeValue('(CFixedPoint)7')).End)]"
 concept_khaelith:0 "Khaelith"
 concept_khaelith_desc:0 "#bold Khaelith#!, the Warping Crossroads, is an [Concept('concept_outer_realms', '$outer_plane$')] where every road shifts and every direction is unstable.\n\nBridges fold into themselves, portals flicker open mid‑air, and travelers may step forward only to arrive someplace unrecognizable—or return unchanged after countless loops."
 khaelith_tooltip:0 "$concept_khaelith_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_cyndral:0 "Cyndral"
 concept_cyndral_desc:0 "#bold Cyndral#!, the Ephemeral Sands, is an [Concept('concept_outer_realms', '$outer_plane$')] where mirages hatch like dreams and whole cities shimmer into being—then vanish.\n\nShifting dunes hold half‑remembered roads, and travelers chase horizons that retreat before their eyes. One moment the sand is still, the next it births a market of ghosts that dissolves in a breath."
 cyndral_tooltip:0 "$concept_cyndral_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_myrvak:0 "Myrvak"
 concept_myrvak_desc:0 "#bold Myrvak#!, the Unbound Maelstrom, is an [Concept('concept_outer_realms', '$outer_plane$')] where storms reshape reality with no warning.\n\nLightning tears at floating isles while currents of pure chaos twist matter, energy, even thought. Survivors emerge altered—if they emerge at all."
 myrvak_tooltip:0 "$concept_myrvak_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_ulmeon:0 "Ulmeon"
 concept_ulmeon_desc:0 "#bold Ulmeon#!, the Realms of Possibility, is an [Concept('concept_outer_realms', '$outer_plane$')] where every choice fractures existence and spawned paths stretch forever.\n\nHere, wanderers glimpse alternate selves in mirrored crossroads. Every decision flickers branches, and echoes of unlived lives haunt the air."
 ulmeon_tooltip:0 "$concept_ulmeon_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_tzyrra:0 "Tzyrra"
 concept_tzyrra_desc:0 "#bold Tzyrra#!, the Shifting Labyrinth, is an [Concept('concept_outer_realms', '$outer_plane$')] where halls realign and walls betray travelers in endless puzzle.\n\nMonsters lurk behind hidden doors, traps snap shut without warning, and fortunes turn on corridors that relink behind your back. No one truly reaches the center."
 tzyrra_tooltip:0 "$concept_tzyrra_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_ithraxis:0 "Ithraxis"
 concept_ithraxis_desc:0 "#bold Ithraxis#!, the City of Anarchs, is an [Concept('concept_outer_realms', '$outer_plane$')] where rule breaks daily and chaos crowns a new sovereign every dawn.\n\nStatues topple in riots, banners rise in fury, and no decree holds longer than sunrise. Here, authority is momentary, and every citizen is both liberator and convict."
 ithraxis_tooltip:0 "$concept_ithraxis_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_djinn', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_laurilia:0 "Laurilia"
 concept_laurilia_desc:0 "#bold Laurilia#!, the Empty Throne, is an [Concept('concept_outer_realms', '$outer_plane$')] where no ruler holds sway and all voices carry equal weight.\n\nHere, debates stretch across open plazas like wandering breezes, customs shift with every breath, and the wind of discourse never settles. Freedom of choice is law, and every individual’s voice can still turn the tide."
 laurilia_tooltip:0 "$concept_laurilia_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_voltyr:0 "Voltyr"
 concept_voltyr_desc:0 "#bold Voltyr#!, the Heart of Thunder, is an [Concept('concept_outer_realms', '$outer_plane$')] where perpetual storms reign and lightning pulses like a living heartbeat.\n\nBolts strike earth and sky with rhythmic fury, charging the air with raw energy. Thunder rolls in constant crescendo, and the land trembles beneath the storm’s electric pulse."
 voltyr_tooltip:0 "$concept_voltyr_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_takwilan:0 "Takwilan"
 concept_takwilan_desc:0 "#bold Takwilan#!, the Soaring Archipelago, is an [Concept('concept_outer_realms', '$outer_plane$')] where islands drift on eternal currents and flight is as natural as breath.\n\nHigh cliffs and fragile bridges float on sheer wind currents. Gliders and feathered wings carry travelers between drifting isles, and every horizon promises another skyward passage."
 takwilan_tooltip:0 "$concept_takwilan_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_ravaylen:0 "Ravaylen"
 concept_ravaylen_desc:0 "#bold Ravaylen#!, the Sovereign Frontier, is an [Concept('concept_outer_realms', '$outer_plane$')] where wide plains meet jagged ridges and each traveler writes their own law.\n\nWindswept mesas stand under open skies, tents spring up and vanish, and lone traders map the land by the song of the wind. Independence is survival, and solitude sharpens purpose."
 ravaylen_tooltip:0 "$concept_ravaylen_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_saharzin:0 "Saharzin"
 concept_saharzin_desc:0 "#bold Saharzin#!, the Traveler’s Trail, is an [Concept('concept_outer_realms', '$outer_plane$')] where the wind punishes those who linger and rewards those who move.\n\nStorms rise for the static, slashing stillness with sudden gales, while travelers find gusting aid at every mile. Here, journey is life, and pause is peril under restless skies."
 saharzin_tooltip:0 "$concept_saharzin_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_oragea:0 "Oragea"
 concept_oragea_desc:0 "#bold Oragea#!, the Eye of the Storm, is an [Concept('concept_outer_realms', '$outer_plane$')] where cyclones twist reality and only the sky remains.\n\nEndless vortices swirl through open air, winds spiral with savage elegance, and survival depends on the grace to ride chaos. Few live within the tempest’s core—and fewer still learn its dance."
 oragea_tooltip:0 "$concept_oragea_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_gryphon', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_fushat:0 "Fushat"
 concept_fushat_desc:0 "#bold Fushat#!, the Innumerable Swarm, is an [Concept('concept_outer_realms', '$outer_plane$')] where chitin towers rise and hunger never ends.\n\nInsectoid spires march across the land in ceaseless colonies. Every moment bursts with ravenous purpose, and what once was forest falls to grinding mandibles and endless reproduction."
 fushat_tooltip:0 "$concept_fushat_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)7')).End)]"
 concept_sylveris:0 "Sylveris"
 concept_sylveris_desc:0 "#bold Sylveris#!, the Living Canopy, is an [Concept('concept_outer_realms', '$outer_plane$')] where forest and life breathe as one.\n\nEvery vine, moss, and creature is woven into a vast network. Trees whisper warnings through roots, blossoms open in shared response, and intruders feel the forest's unified awareness."
 sylveris_tooltip:0 "$concept_sylveris_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_myrnella:0 "Myrnella"
 concept_myrnella_desc:0 "#bold Myrnella#!, the Rampant Overgrowth, is an [Concept('concept_outer_realms', '$outer_plane$')] where vegetation crushes stone and nature fights to dominate.\n\nCarnivorous blooms lure hapless prey while colossal vines choke ruins. Amid tangled growth, predator and plant wage silent war beneath suffocating green."
 myrnella_tooltip:0 "$concept_myrnella_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_anvu:0 "Anvu"
 concept_anvu_desc:0 "#bold Anvu#!, the Cradle of Immortals, is an [Concept('concept_outer_realms', '$outer_plane$')] where life springs endlessly and death’s sting fades away.\n\nSprings bubble with youth, seeds take root in stillborn soil, and creatures linger beyond mortal span. Time’s grip loosens in gentle meadows of perpetual bloom."
 anvu_tooltip:0 "$concept_anvu_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_izarbel:0 "Izarbel"
 concept_izarbel_desc:0 "#bold Izarbel#!, the Mycelian Undergrove, is an [Concept('concept_outer_realms', '$outer_plane$')] where fungi weave unseen realms and spores carry secret purpose.\n\nMushroom groves pulse beneath the earth, their tendrils connecting root and root. In shaded depths, glowing caps guide silent passage and the mind hums with ancient fungal wisdom."
 izarbel_tooltip:0 "$concept_izarbel_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_savokar:0 "Savokar"
 concept_savokar_desc:0 "#bold Savokar#!, the Savage Beastsprawl, is an [Concept('concept_outer_realms', '$outer_plane$')] where wild creatures roam unchecked and survival sharpens every fang.\n\nJungles teem with roars, claws slice through undergrowth, and the law of tooth and claw rules supreme. Here only cunning or strength endure beneath sun‑dappled canopy.\n\nThis realm typically oscillates within the constellation of the [concept_fey]."
 savokar_tooltip:0 "$concept_savokar_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_kalinda:0 "Kalinda"
 concept_kalinda_desc:0 "#bold Kalinda#!, the Pools of Rebirth, is an [Concept('concept_outer_realms', '$outer_plane$')] where water heals and transforms with patient clarity.\n\nCrystal pools reflect new forms, wounds close beneath gentle ripples, and what was brittle becomes supple once more. Here, renewal flows through every current."
 kalinda_tooltip:0 "$concept_kalinda_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_fey', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_aevum:0 "Aevum"
 concept_aevum_desc:0 "#bold Aevum#!, the Arsenal of Mercy, is an [Concept('concept_outer_realms', '$outer_plane$')] where justice is tempered with compassion.\n\nAlabaster citadels rise amidst sacred battlegrounds, where lion-like warriors train not for conquest but to shield the helpless. Mercy is shown as a difficult and often painful choice, and fallen enemies who genuinely repent are granted protection and healing."
 aevum_tooltip:0 "$concept_aevum_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_pharol:0 "Pharol"
 concept_pharol_desc:0 "#bold Pharol#!, the Golden Horizon, is an [Concept('concept_outer_realms', '$outer_plane$')] where perpetual dawn brings hope and renewal.\n\nEndless radiant plains stretch beneath golden skies, carved from white marble and gilded sandstone. Temples, forums, and gardens are tended by luminous beings who guide travelers toward renewal and hope, offering refuge to those on the brink of despair."
 pharol_tooltip:0 "$concept_pharol_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_mendelyn:0 "Mendelyn"
 concept_mendelyn_desc:0 "#bold Mendelyn#!, the Soothing Embrace, is an [Concept('concept_outer_realms', '$outer_plane$')] where all wounds find comfort.\n\nThe land itself seems to breathe with empathy, its meadows blooming in calming colors and winds carrying lullabies. Waters from its rivers soothe pain and ease burdens, cared for by gentle beings who ask nothing in return except that visitors pass on the compassion they have received."
 mendelyn_tooltip:0 "$concept_mendelyn_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_serenica:0 "Serenica"
 concept_serenica_desc:0 "#bold Serenica#!, the Untouched Meadow, is an [Concept('concept_outer_realms', '$outer_plane$')] where innocence and purity reign.\n\nRolling hills are dotted with wildflowers, untouched by suffering, hardship, or malice. There are no predators, no storms, no shadows—only a pristine stillness that preserves the purity of existence."
 serenica_tooltip:0 "$concept_serenica_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_elara:0 "Elara"
 concept_elara_desc:0 "#bold Elara#!, the Martyr's Vigil, is an [Concept('concept_outer_realms', '$outer_plane$')] where sacrifice is honored and remembered.\n\nSilent vigil keeps watch over the sacrifices of the past, honoring those who gave all for a greater cause. The realm is a place of reflection and reverence, where the echoes of selfless acts resonate through the ages."
 elara_tooltip:0 "$concept_elara_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_festus:0 "Festus"
 concept_festus_desc:0 "#bold Festus#!, the Merry Hearth, is an [Concept('concept_outer_realms', '$outer_plane$')] where joy and celebration are eternal.\n\nA realm of warmth and laughter, where the hearth never goes cold and the feast never ends. Beings of light and mirth gather to share stories, music, and dance, spreading joy and camaraderie to all who enter."
 festus_tooltip:0 "$concept_festus_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_unicorn', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_luceros:0 "Luceros"
 concept_luceros_desc:0 "#bold Luceros#!, the Foundry of Fascination, is an [Concept('concept_outer_realms', '$outer_plane$')] where creation flows like molten rivers.\n\nLava courses gently across the land, nurturing alien flora and leaving behind rich soil and glittering minerals. Towering basalt spires stand as ancient sentinels, shaped by countless flows, embodying the relentless spirit of invention."
 luceros_tooltip:0 "$concept_luceros_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_kurothane:0 "Kurothane"
 concept_kurothane_desc:0 "#bold Kurothane#!, the Sweltering Canopy, is an [Concept('concept_outer_realms', '$outer_plane$')] where emotion and climate are inextricably linked.\n\nA tropical jungle of warmth and beauty, its mood shifts unpredictably—from serene calm to torrential rain or blood-red mists. The land mirrors the passions of its people, who value loyalty, expression, and deep-rooted customs."
 kurothane_tooltip:0 "$concept_kurothane_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_grisval:0 "Grisval"
 concept_grisval_desc:0 "#bold Grisval#!, the Breakneck Breach, is an [Concept('concept_outer_realms', '$outer_plane$')] where the earth trembles with constant change.\n\nPlains fissure into geysers and hot springs, steam clouds drift between cracks, and underground lakes of scalding water lie exposed in deep ravines. The land reshapes itself constantly, embodying the relentless force of transformation."
 grisval_tooltip:0 "$concept_grisval_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_tyranor:0 "Tyranor"
 concept_tyranor_desc:0 "#bold Tyranor#!, the Igneous Ascent, is an [Concept('concept_outer_realms', '$outer_plane$')] where volcanic peaks challenge the brave.\n\nJagged mountains of obsidian and magma rise against the sky, their slopes treacherous and unforgiving. Only the daring ascend, seeking the glory of the summit and the transformative power of the molten depths."
 tyranor_tooltip:0 "$concept_tyranor_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_skarnov:0 "Skarnov"
 concept_skarnov_desc:0 "#bold Skarnov#!, the Ashen Ruin, is an [Concept('concept_outer_realms', '$outer_plane$')] where decay and rebirth coexist.\n\nRuins of ancient civilizations lie buried beneath layers of ash, their stories preserved in the soot. The land is a testament to the cycle of destruction and renewal, where the past fuels the future's growth."
 skarnov_tooltip:0 "$concept_skarnov_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_qasyran:0 "Qasyran"
 concept_qasyran_desc:0 "#bold Qasyran#!, the Heart of Flame, is an [Concept('concept_outer_realms', '$outer_plane$')] where the essence of fire burns eternal.\n\nA realm of unyielding heat and light, its core pulses with the primal force of creation. Here, the spirit is tested, and only those who endure the searing trials emerge transformed."
 qasyran_tooltip:0 "$concept_qasyran_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_phoenix', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_pavrion:0 "Pavrion"
 concept_pavrion_desc:0 "#bold Pavrion#!, the Infinite Library, is an [Concept('concept_outer_realms', '$outer_plane$')] where all knowledge is cataloged.\n\nEndless corridors house scrolls, books, and tablets, each meticulously indexed. Scholars and seekers navigate its vast halls, searching for truths hidden among the shelves.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 pavrion_tooltip:0 "$concept_pavrion_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_lamassia:0 "Lamassia"
 concept_lamassia_desc:0 "#bold Lamassia#!, the Temporal Museum, is an [Concept('concept_outer_realms', '$outer_plane$')] where history is preserved in stasis.\n\nMoments of significance are frozen in time, displayed as exhibits within its vast wings. Each floor represents a different era, offering a glimpse into the past and future.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 lamassia_tooltip:0 "$concept_lamassia_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_shingon:0 "Shingon"
 concept_shingon_desc:0 "#bold Shingon#!, the Cenobium of Truth, is an [Concept('concept_outer_realms', '$outer_plane$')] where clarity reigns.\n\nA realm of open skies and transparent waters, where illusions are absent. Structures are built from raw, unpolished materials, embodying honesty and openness.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 shingon_tooltip:0 "$concept_shingon_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_heuravon:0 "Heuravon"
 concept_heuravon_desc:0 "#bold Heuravon#!, the College of Reason, is an [Concept('concept_outer_realms', '$outer_plane$')] where logic and deduction are paramount.\n\nEndless lecture halls and debate chambers host scholars engaged in rigorous discourse. The pursuit of knowledge through reason is the realm's guiding principle.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 heuravon_tooltip:0 "$concept_heuravon_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_tarduk:0 "Tarduk"
 concept_tarduk_desc:0 "#bold Tarduk#!, the Vault of Secrets, is an [Concept('concept_outer_realms', '$outer_plane$')] where hidden knowledge is safeguarded.\n\nAncient tomes and forbidden texts are stored within its secure chambers. Only those deemed worthy may access its contents.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 tarduk_tooltip:0 "$concept_tarduk_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_calyxos:0 "Calyxos"
 concept_calyxos_desc:0 "#bold Calyxos#!, the Fractal Forest, is an [Concept('concept_outer_realms', '$outer_plane$')] where patterns and structures proliferate.\n\nA vast forest of repeating geometric shapes and recursive patterns. Each path leads deeper into complexity, reflecting the infinite nature of knowledge.\n\nThis realm typically oscillates within the constellation of the [concept_sphinx]."
 calyxos_tooltip:0 "$concept_calyxos_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_sphinx', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_optima:0 "Optima"
 concept_optima_desc:0 "#bold Optima#!, the Perfect Machine, is an [Concept('concept_outer_realms', '$outer_plane$')] where precision and purpose reign.\n\nEndless metal corridors hum with synchronized gears and pistons, each element moving in calculated harmony. Servitors of brass and crystal patrol tirelessly, maintaining the system's flawless operation, while the enigmatic Mechanic oversees its grand design.\n\nThis realm typically oscillates within the constellation of the [concept_justice]."
 optima_tooltip:0 "$concept_optima_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_justice', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_regalon:0 "Regalon"
 concept_regalon_desc:0 "#bold Regalon#!, the Unyielding Crown, is an [Concept('concept_outer_realms', '$outer_plane$')] where hierarchy and duty are absolute.\n\nTowering castles preside over meticulously ordered fiefdoms, and every soul knows their place. The laws of Regalon are etched in iron and upheld by the feared Elk Knights, antlered warriors who enforce the will of the Crown with unwavering silence.\n\nThis realm typically oscillates within the constellation of the [concept_justice]."
 regalon_tooltip:0 "$concept_regalon_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_justice', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_senthris:0 "Senthris"
 concept_senthris_desc:0 "#bold Senthris#!, the Immutable Canvas, is a vast landscape shaped with exacting care.\n\nEvery flower, every path, every living creature plays a role in a grand aesthetic design. Neatlings—sprite-like caretakers—flit endlessly through the hedges, pruning, polishing, and correcting even the subtlest disruptions. The realm is breathtaking in its perfection, but nothing may change without approval. Beauty is frozen in time, and all must remain in their assigned place, like brushstrokes in a living painting.\n\nThis realm typically oscillates within the constellation of the [concept_justice]."
 senthris_tooltip:0 "$concept_senthris_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_justice', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_korrath:0 "Korrath"
 concept_korrath_desc:0 "#bold Korrath#!, the Highest Court, is an [Concept('concept_outer_realms', '$outer_plane$')] where judgment is absolute.\n\nA realm of towering spires and vast chambers, where every dispute is settled with finality. The judges of Korrath are impartial and unyielding, their decisions echoing through the ages as the ultimate authority on justice.\n\nThis realm typically oscillates within the constellation of the [concept_justice]."
 korrath_tooltip:0 "$concept_korrath_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_justice', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_othraal:0 "Othraal"
 concept_othraal_desc:0 "#bold Othraal#!, the Harmonious Hive, is an [Concept('concept_outer_realms', '$outer_plane$')] where unity and cooperation are paramount.\n\nA vast network of interconnected chambers and tunnels, where every being works in concert for the greater good. The inhabitants of Othraal are bound by a collective purpose, their actions synchronized to maintain harmony and order.\n\nThis realm typically oscillates within the constellation of the [concept_justice]."
 othraal_tooltip:0 "$concept_othraal_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_justice', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_kelvarin:0 "Kelvarin"
 concept_kelvarin_desc:0 "#bold Kelvarin#!, the Basalt Bastion, is an [Concept('concept_outer_realms', '$outer_plane$')] where time moves with immense weight.\n\nA landscape of rolling mossy hills, cut through with moats, trenches, and ancient fortresses. Enormous basalt spires rise across the land. Stone golems slowly wage siege across this realm, sometimes waiting centuries before advancing. During these long pauses, they become overgrown with moss and forgotten by time. Conflict here moves slowly, but with immense weight."
 kelvarin_tooltip:0 "$concept_kelvarin_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_corvalla:0 "Corvalla"
 concept_corvalla_desc:0 "#bold Corvalla#!, the Placid Pasture, is an [Concept('concept_outer_realms', '$outer_plane$')] where change is nearly impossible.\n\nA quiet and gentle realm where little ever changes. Grey shepherds dwell among wide fields and low hills, often remaining still for years at a time. They are known for their great beards, which grow longer than they are tall. Time seems to stretch thin here, and change is nearly impossible. Disturbances from outsiders are rare but unwelcome."
 corvalla_tooltip:0 "$concept_corvalla_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_yronfell:0 "Yronfell"
 concept_yronfell_desc:0 "#bold Yronfell#!, the Ceaseless Delve, is an [Concept('concept_outer_realms', '$outer_plane$')] where labor is tireless.\n\nA vast expanse of valleys, mountains, and quarries. This realm is home to the Grymgar, stocky miners and sculptors who never stop working. They extract gemstones to eat and carve grand halls from the stone beneath their feet. The mountains are riddled with tunnels, while the valleys below host enormous stone estates covered in artwork. The Grymgar see no end to their purpose and will tirelessly continue, no matter the obstacles."
 yronfell_tooltip:0 "$concept_yronfell_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_molgrund:0 "Molgrund"
 concept_molgrund_desc:0 "#bold Molgrund#!, the Stone Foundation, is an [Concept('concept_outer_realms', '$outer_plane$')] where the land is ever-changing.\n\nAn elemental realm of jagged rock, unstable canyons, and ever-shifting tectonic forces. Earthquakes and floods frequently alter the terrain, making permanent settlements impossible. Its elemental inhabitants are tribal and adaptable, constantly moving and changing in response to the land. Outsiders rarely find safety here."
 molgrund_tooltip:0 "$concept_molgrund_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)6')).End)]"
 concept_zarnathul:0 "Zarnathul"
 concept_zarnathul_desc:0 "#bold Zarnathul#!, the Venerable Vestige, is an [Concept('concept_outer_realms', '$outer_plane$')] where the past is preserved.\n\nA desert realm of endless dunes and scorching sun. Beneath the sands lie the buried remains of an impossibly ancient city. As sandstorms pass, parts of the city are uncovered or reburied, revealing strange and alien architecture. Silent custodians roam the ruins, tending to the city without explanation. They ignore peaceful visitors but react with violent fury if their work is disturbed."
 zarnathul_tooltip:0 "$concept_zarnathul_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_tharndrel:0 "Tharndrel"
 concept_tharndrel_desc:0 "#bold Tharndrel#!, the Crystalline Waste, is an [Concept('concept_outer_realms', '$outer_plane$')] where stillness is eternal.\n\nA silent realm thick with massive crystal formations that slowly overgrow anything new. Statues, remnants, and even travelers are eventually preserved in crystal. Deep within the caverns sleep enormous worms made of stone and crystal. They seem unaware of the world around them, their occasional breath shaking the caverns. They are ancient and unmoving, and it is best that they remain so."
 tharndrel_tooltip:0 "$concept_tharndrel_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_golem', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_orravel:0 "Orravel"
 concept_orravel_desc:0 "#bold Orravel#!, the Shattered Moon, is both skyborne relic and fallen godstone.\n\nOnce whole, it stood with Varkuun to temper the influence of the outer realms, maintaining balance over Exether. But Orravel was undone—shattered in a divine conspiracy by outer gods. Half remains adrift in the heavens, while the other crashed into the world, birthing the haunted continent of Iaslesh."
 orravel_tooltip:0 "$concept_orravel_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_dragon', MakeScopeValue('(CFixedPoint)2')).End)]"
 concept_varkuun:0 "Varkuun"
 concept_varkuun_desc:0 "#bold Varkuun#!, the Widow Moon, orbits alone—dim, watchful, and burdened.\n\nWhere once it joined Orravel in shielding Exether from outer influence, it now circles in silence, its power diminished. Yet even in weakness, Varkuun endures. On cloudless nights, its pale glow weaves subtle resistance against intrusion from the stars beyond, a flickering defense in the long war for the mortal soul."
 varkuun_tooltip:0 "$concept_varkuun_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_dragon', MakeScopeValue('(CFixedPoint)5')).End)]"
 concept_zorai:0 "Zorai"
 concept_zorai_desc:0 "#bold Zorai#!, the Radiant Sun, is the blazing soulforge of the mortal realm.\n\nIts fire gave breath to the dragons, who rose to defy the outer realms in the age of strife. More than warmth or light, Zorai is the spiritual fulcrum of Exether—its cycles binding life, time, and death. From its heart flow the raw souls which the gods shaped into mortals. To gaze upon Zorai is to witness the ever-burning defiance of creation."
 zorai_tooltip:0 "$concept_zorai_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_dragon', MakeScopeValue('(CFixedPoint)1')).End)]"
 concept_veil_realm:0 "The Veil"
 concept_veil_realm_desc:0 "#bold The Veil#! is the unseen boundary stretched taut between Exether and the outer realms.\n\nIt shimmers like a membrane of potential, sometimes thin, sometimes thick, but always present. Magic leaks through its folds; dreams pass through its cracks. During rare events like the Nightfall, the Veil is torn or weakened—allowing terrible and wonderful things to pass through."
 veil_tooltip:0 "$concept_veil_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_dragon', MakeScopeValue('(CFixedPoint)4')).End)]"
 concept_exether_realm:0 "Exether"
 concept_exether_realm_desc:0 "#bold Exether#!, the World, is the crucible of history and the stage of all mortal ambition.\n\nA plane of struggle, beauty, and contradiction, surrounded by the stars and scarred by gods. From its oceans to its highlands, from its cataclysms to its quiet dawns, Exether endures. It is the center of myth, memory, and meaning for all who walk beneath its moons."
 exether_realm_tooltip:0 "$concept_exether_desc$\n\n[ScriptedGui.BuildTooltip(GuiScope.SetRoot(AccessPlayer.MakeScope).AddScope('arcana_id_dragon', MakeScopeValue('(CFixedPoint)3')).End)]"
 concept_language_trait:0 "Sphere Trait"
 concept_language_traits:0 "Sphere Traits"
 concept_language_trait_short:0 "Sphere"
 concept_language_traits_short:0 "Spheres"
 concept_language_trait_group:0 "Sphere Trait Group"
 concept_language_trait_groups:0 "Sphere Trait Groups"
 concept_language_trait_group_short:0 "Sphere Group"
 concept_language_trait_groups_short:0 "Sphere Groups"
 concept_language_trait_desc:0 "$concept_language_trait_short$ [Concept('concept_discrimination_trait','$concept_discrimination_traits_short$')] represent $concept_language_traits_short$ deeply associated with a [concept_culture]. They also belong to a [Concept('concept_discrimination_trait_group','$concept_discrimination_trait_group_short$')], a broader family of similar $concept_language_traits_short$."
 concept_raiding:0 "Raiding"
 concept_raiding_short:0 "Raiding"
 concept_raiding_desc:0 "Raiding is income derived from the theft, pillage and plunder of neighboring lands over time. \n\nOur income from raiding is dependent on our [concept_raiding_frequency] multiplied by our army's [concept_power_projection]. #g @money!+[GetPlayer.MakeScope.ScriptValue('max_raiding_income')]#! is the most we can possibly earn from raiding."
 concept_raiding_frequency:0 "Raiding Fervor"
 concept_raiding_frequency_short:0 "Raiding Fervor"
 concept_raiding_frequency_desc:0 "$concept_raiding_frequency$ represents how often we are permitted to [Concept('concept_raiding', 'raid')].\n\nIn addition to increasing our income from [concept_raiding], each #v 1%#! of $concept_raiding_frequency$ will also have the following affects:\n[GetStaticModifier('modifier_bandit_disobedience').GetDesc]"
 concept_changeling_paranoia:0 "Changeling Paranoia"
 concept_changeling_paranoia_short:0 "Paranoia"
 concept_changeling_paranoia_desc:0 "$concept_changeling_paranoia$ represents the pervasiveness of fear, suspicion, and public vigilance regarding changeling infiltration within society, and is closely tied to the perceived necessity of extraordinary security measures.\n\nShould $concept_changeling_paranoia$ fall to #v 0#!, popular support for the Panopticon will evaporate. The public will no longer tolerate constant observation, and the scrying apparatus will be dismantled.\n\n#title The following conditions #r #b decrease#!#! $concept_changeling_paranoia_short$:#! #indent_newline:3 \n• Declaring [concept_bankruptcy]\n• Taking [concept_loans]\n• [Concept('concept_state','$concept_states$')] with [Concept('concept_radical','$concept_radicals$')]\n• [Concept('concept_interest_group','$concept_interest_groups$')] opposing [GetLawType('law_secret_police').GetName]\n• [Concept('concept_activism', '$concept_activism_short$')] of #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#!, #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#!, and $movement_cultural_minority_short$ [Concept('concept_political_movement','$concept_political_movements$')]\n• #bold Base#! [GetCulture('changeling').GetName] [concept_acceptance] at [GetAcceptanceStatus('second_rate_citizen').GetName] or higher \n• Events and other conditions #!\n\n#title The following conditions #g #b increase#!#! $concept_changeling_paranoia_short$:#! #indent_newline:3 \n• Having a positive budget balance\n• [Concept('concept_state', '$concept_states$')] with [Concept('concept_loyalist','$concept_loyalists$')]\n• [Concept('concept_interest_group','$concept_interest_groups$')] supporting [GetLawType('law_secret_police').GetName]\n• [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] of $movement_royalist_absolutist_short$, $movement_religious_majority_short$, and $movement_cultural_majority_short$ [Concept('concept_political_movement','$concept_political_movements$')]\n• Enacting [GetLawType('law_ethnostate').GetName] #!"
 concept_vampire_masquerade:0 "Vampire Masquerade"
 concept_vampire_masquerade_short:0 "Masquerade"
 concept_vampire_masquerade_desc:0 "$concept_vampire_masquerade$ represents the stability of the vampire dominion over the human population.\n\n#title The following conditions #r #b decrease#!#! $concept_vampire_masquerade_short$:#! #indent_newline:3 \n• Vampire population exceeds #v 5%#! of human-heritage [Concept('concept_pop','$concept_pops$')]\n• Vampire population exceeds #v 10%#! of human-heritage [Concept('concept_pop','$concept_pops$')]\n• Arelon exists\n• [Concept('concept_political_movement_support', '$concept_political_movement_support_short$')] and [Concept('concept_radical', '$concept_radicalism$')] of #b $movement_dreadmoor_human_rights_short$#! [Concept('concept_political_movement','$concept_political_movements$')]\n• [Concept('concept_state','$concept_states$')] with [Concept('concept_radical','$concept_radicals$')] ([concept_turmoil] above #v 10%#!)#!\n\n#title The following conditions #g #b increase#!#! $concept_vampire_masquerade_short$:#! #indent_newline:3 \n• Vampire population under control (below #v 5%#!)\n• [GetLawType('law_subjecthood').GetName]\n• [GetLawType('law_serfdom').GetName]\n• [GetLawType('law_outlawed_dissent').GetName] or [GetLawType('law_censorship').GetName]\n• [GetLawType('law_secret_police').GetName]#!"
 concept_salvation_campaign:0 "Salvation Campaign"
 concept_salvation_campaign_desc:0 "The Campaign for the Salvation of the Timari People, is the term for the overarching efforts of the Sirlaelan government to commit ethnocide against the half-elven Timari. Its primary motto is to “Purge the human, save the Elf“. It includes a wide range of policies aimed at destroying the human heritage of the Timari, emphasising their elven nature and enforcing approved cultural norms and religious dogma.\n\nThe idea of protecting the Timari from human influence is deeply rooted within the elven-supremacist school of thought dominating the Opalael political scene. Many proponents of the campaign genuinely believe they are ‘saving’ the Timari people by purging the ‘poison’ inflicted on them through centuries of human domination. That this process of salvation is accompanied by unimaginable suffering inflicted on innocent civilians is scarcely discussed openly and considered a necessary evil at best."
 concept_department_public_welfare:0 "Department of Public Welfare"
 concept_department_public_welfare_desc:0 "The Department of Public Welfare is the deceptively named Opalaelan government agency responsible for overseeing internal affairs. Though it may simply appear to be responsible for auditing other government institutions, the department also houses the Opalaelan secret service, the AKGA. The AKGA is infamous within Opalael for their clandestine activities in service of the nation and the Tetsenñás in particular. Their extrajudicial actions are widely feared and used by the government to keep their choking hold on power ironclad."
 concept_verporis_reformatory_institute:0 "Verporis Reformatory Institute"
 concept_lunhlar:0 "Lunhlar"
 concept_lunhlar_desc:0 "Lunhlar was one of the ancient empires of the elves. At its greatest extent the realm covered the urbanized core of [concept_lunlael], the forested realms of [concept_ista_craejoc] and the great pastures of [concept_quofuola_thren]. Although less prestigious and powerful than its neighbour Eptetila, Lunhlar  permanently influenced the faith and cultures of the many peoples living in and around it.\n\nThe empire broke apart as a united polity after the godsbane; spurred on by the Elven Exodus, human migration and the loss of magic and contact with the Pantheon. Its memory however, lives on in the realms that succeeded it and its reestablishment is the goal of many elven nationalists."
 concept_lunlael:0 "Lunlael"
 concept_lunlael_desc:0 "Lunlael is the name given to the grouping of the [concept_lunhlar] provinces of Sirlael and Opalael. Together they formed the urbanized high elven core of the ancient empire, setting themselves apart from the realm's more rural domains. The inhabitants of Lunlael have always considered themselves distinctly different from their high elven cousins living around the neighbouring Starshimmer Sea.\n\nThey dislike being compared to the legacy of ancient Eptetila and insist that they themselves are the heirs of an equally, but uniquely, glorious past. Their view on the wood elves who occupy the other half of this ancient domain is often quite complex; their cultures had never been very compatible. Regardless of their views on Lunhlar, uniting Sirlael and Opalael remains the fervent dream of all local nationalists."
 concept_ista_craejoc:0 "Ista Craejoc"
 concept_ista_craejoc_desc:0 "The Tranquil Treehome, was the first name given to the forest now known as the deadly Vermilion Thicket. Before its boughs awoke with murderous intent, the vast wood at the heart of Zalaron was a gentle and quiet place. Part of the ancient elven realm of [concept_lunhlar], the Creajoc was known for being a land of honest, hardworking folks and a refuge for those seeking distance from the busy urban heartlands of elvenkind.\n\nThe people here have always lived in close-knit communities, in tune with nature and each other. They have never desired the opulence and power the so-called ‘high elves’ obsessed over. These highborn often looked down on those they considered simple, dismissively calling them ‘wood elves’. The Ista people however, simply consider themselves honest, and perhaps that is why they adapted much easier to a world without magic than their snobby peers did."
 concept_quofuola_thren:0 "Quofuola Thren"
 concept_quofuola_thren_desc:0 "The Beastland Realm, was the name given to the plains, pastures and torn lands now known as the Shaking Fields. Known for cattle, horses, monsters and hardy folk; this land was part of the ancient realm of [concept_lunhlar]. Though considered a rural backwater by many, its people would earn their place in history as the great horselords that once ruled vast swathes of southern Zalaron.\n\nThe Thren was populated by semi-nomadic groups of elves, who relied more on working with their hands than practicing the arcane. They thrived after the godsbane, adapting quickly to a new world without magic and dominating the region through mounted warfare. Though these times are long gone, nomads still dwell here in the form of the ever-travelling Vandori. Although many of the cattle herds have now been replaced with voracious landsharks, the hardy character of the locals endures."
 concept_asvean:0 "Asvëan"
 concept_asvean_desc:0 "The Asvëan are a ranger guild that once held much sway over the forests of the Eastern Steepcliff Coast. Their name translates to 'Forest Walker' in Cardarish."
 concept_escort_convoys:0 "Escort Convoys"
 concept_escort_convoys_desc:0 "Your Convoys are stupid and need to be escorted or else they'll drown"
 concept_raid_convoys:0 "Raid Convoys"
 concept_raid_convoys_desc:0 "You hate your enemy having supplies and want to make sure they don't reach their destination"
