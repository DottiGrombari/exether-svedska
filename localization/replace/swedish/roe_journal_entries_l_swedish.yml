 je_secret_police:0 "Restore Order"
 je_secret_police_reason:0 "Desperate times call for desperate measures. With the magoclasts at the gates threatening to set us back by a century, we must be prepared to use coercion to restore order."
 je_secret_police_lobby:0 "Desperate times call for desperate measures. With the magoclasts at the gates threatening to set us back by a century, we must be prepared to use coercion to restore order."
 je_squko_wispu:0 "Squko Wispu"
 je_squko_wispu_lobby:0 "Giant reptiles, brute earthbound insults to the majesty of the Dragons, roam these lands. To establish our rule we need to raise towns and cities and attract more people to live in our lands."
 je_squko_wispu_reason:0 "Squko Wispu is what the [GetCulture('west_lacertian').GetName] call the jungles on this fair island. In their language it seems to mean something like deep jungle. A simple but adequate name. Our first pioneers quickly found out that while beautiful the jungle is not to be underestimated. Giant reptiles, brute earthbound insults to the majesty of the Dragons, roam these lands. And the [GetCulture('west_lacertian').GetName] are no less dangerous. \n\n To establish our rule we need to raise towns and cities and attract more people to live in our lands."
 je_squko_wispu_completion_tt:0 "We have met our goal of [GetGlobalVariable('je_squko_wispu_target_population').GetValue|D]#  people in [Concept('concept_incorporated_state','$concept_incorporated_states$')] on the island of Vhaulirb. \nYou are currently at [GetGlobalVariable('je_squko_wispu_current_population').GetValue|D]#  in [Concept('concept_incorporated_state','$concept_incorporated_states$')]."
 je_cheese_of_nations:0 "The Hidden Nation"
 je_cheese_of_nations_reason:0 "#italic As the fields were scythed bare, so too were the Whiskerfields by the claws of their foes, and as the meadows regrow in spring, so too shall the Whiskerfields rise anew.#!\n\nThough the last free [SCOPE.sCulture('softpaw_culture_scope').GetName] burrow was snuffed out under the #bold Ratcatcher Decree#!, the dream of return lives on in whiskers and hearts from hedge to hollow.\n\n#bold The Legacy of the Whiskerfields#!\nShould a free mousefolk state be restored, we may call them to join our banner, provided [SCOPE.GetRootScope.GetCountry.GetName] is itself independent."
 je_cheese_of_nations_lobby:0 "#italic As the fields were scythed bare, so too were the Whiskerfields by the claws of their foes, and as the meadows regrow in spring, so too shall the Whiskerfields rise anew.#!\n\nThough the last free [SCOPE.sCulture('softpaw_culture_scope').GetName] burrow was snuffed out under the #bold Ratcatcher Decree#!, the dream of return lives on in whiskers and hearts from hedge to hollow.\n\n#bold The Legacy of the Whiskerfields#!\nShould a free mousefolk state be restored, we may call them to join our banner, provided [SCOPE.GetRootScope.GetCountry.GetName] is itself independent."
 cheese_of_nations_colony_button:0 "Reclaim Wickerrye"
 cheese_of_nations_colony_button_desc:0 "Wickerrye was once the heart of the mousefolk homeland, now designated as the Ashwall to keep the Plaguewood in check and watch the orcs within. The land is mostly empty, offering a chance for the mousefolk to return. The Bossardi will resist this, fearing the loss of their buffer against the Plaguewood, but reclaiming Wickerrye would restore the mousefolk to their ancestral home."
 cheese_of_nations_button:0 "Foster Mousefolk Radicals Abroad"
 cheese_of_nations_button_desc:0 "Across the warrens of the old Whiskerfields, countless cells and committees whisper of freedom. By acting as a safehaven for [SCOPE.sCulture('softpaw_culture_scope').GetName] patriots, and by funding their efforts, [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] can prepare the fields and burrows outside our reach for liberation."
 cheese_of_nations_button_tt_1:0 "Select a foreign [concept_country] with [SCOPE.sCulture('softpaw_culture_scope').GetName] [Concept('concept_homeland','$concept_homelands$')] to embolden [SCOPE.sCulture('softpaw_culture_scope').GetName] [Concept('concept_radical','$concept_radicals$')] in their [Concept('concept_state','$concept_states$')]."
