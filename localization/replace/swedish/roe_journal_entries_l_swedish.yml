 blue_riband_tooltip_delayed:0 "Top [concept_blue_riband] Contenders (Past Month):\n1. [GetGlobalVariable('blue_riband_top_1').GetCountry.GetName] - [GetGlobalVariable('blue_riband_top_1_value').GetValue|Dv]\n2. [GetGlobalVariable('blue_riband_top_2').GetCountry.GetName] - [GetGlobalVariable('blue_riband_top_2_value').GetValue|Dv]\n3. [GetGlobalVariable('blue_riband_top_3').GetCountry.GetName] - [GetGlobalVariable('blue_riband_top_3_value').GetValue|Dv]"
