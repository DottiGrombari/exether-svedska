 krakatoa.1.t:0 "Mörkrets dagar"
 krakatoa.1.d:0 "En serie katastrofer av aldrig tidigare skådad omfattning har fullständigt förstört livet för många av våra medborgare i delstaten [SCOPE.sState('krakatoa_state').GetName]. Krakatoas explosion kunde höras på hundratals miles avstånd, och allt som hade den olyckliga omständigheten att befinna sig i närheten av ön förstördes omedelbart."
 krakatoa.1.f:0 "”Och dagen förvandlades till natt. De enorma eldvattenfallen som forsade nerför bergssidan. Ett svart moln, gigantiskt – alla fåglar har för länge sedan lämnat detta fält. Om många\n\n år kommer jag att sitta vid eldstaden, och ljuset kommer inte längre att störa mig.”"
 krakatoa.1.a:0 "Vi ska göra allt vi kan för att hjälpa till."
 krakatoa.1.b:0 "Naturen är en nyckfull varelse."
 krakatoa_eruption_help_modifier:0 "Krakatoas utbrott"
 krakatoa_cost_modifier:0 "Humanitär hjälp till Krakatoa"
 krakatoa_eruption_no_help_modifier:0 "Krakatoas utbrott"
 krakatoa.5.d:0 "En rad rekordstora katastrofer har fullständigt ödelagt livet för många människor[SCOPE.sCountry('krakatoa_country').GetAdjectiveNoFormatting]i delstaten [SCOPE.sState('krakatoa_state').GetName]. Krakatoas explosion kunde höras på hundratals miles avstånd, och allt som hade den olyckliga omständigheten att befinna sig i närheten av ön förstördes omedelbart."
 krakatoa.5.a:0 "Vi ska göra allt vi kan för att hjälpa till."
 krakatoa.5.b:0 "Naturen är en nyckfull varelse."
 krakatoa.5.c:0 "Vi har inget att avvara..."
 krakatoa.2.t:0 "Vågornas nätter"
 krakatoa.2.d:0 "Vågor som är högre än skorstenar har ödelagt delstaten [SCOPE.sState('tsunami_state').GetName], en fruktansvärd följd av vulkanutbrottet."
 krakatoa.2.f:0 "”Jag kommer aldrig att glömma den tystnaden.”"
 krakatoa.2.a:0 "Det finns inga ord som kan beskriva denna tragedi."
 krakatoa_tsunami_tt:0 "Tsunamin kommer att orsaka ytterligare förödelse i#boldkuststater#! runt om i världen som ligger nära vulkanutbrottet: \nIndokina drabbas av#red 30 %#! förödelse\n, Indonesien drabbas av#red30 %#! förödelse\n, södra Kina drabbas av#red 30 %#! \nförödelse, Japan, Oceanien, Zanj, Etiopien, södra Afrika och södra Indien drabbas av#red 10 %#! förödelse"
 krakatoa.3.t:0 "Brinnande aska"
 krakatoa.3.d:0 "På grund av det temperaturfall som orsakades av vulkanutbrottet har alla skördar i[SCOPE.sState('farm_state').GetName] området förstörts under den efterföljande[GetHarvestConditionType('disease_outbreak').GetName] perioden, och nu har bönderna kommit för att be om hjälp."
 krakatoa.3.f:0 "”Det finns ingen mat hemma, herre, inte en enda rot kvar att rädda. Barnen ställer frågor, herre, himlen är alltid mörk, alltid röd. De är hungriga, hungriga och rädda, min herre – och det är jag också.”"
 krakatoa.3.a:0 "Vi kan skicka lite mat till dem."
 krakatoa.3.b:0 "Det finns inget vi kan göra."
 krakatoa.3.c:0 "Vi hade turen att ha förordningen om nödhjälp."
