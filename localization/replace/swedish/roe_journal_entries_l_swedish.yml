 colonial_administration_events.2.t:0 "The Severed Limb"
 colonial_administration_events.2.d:0 "With our administrative ties to the metropole cut off, massive protests have erupted throughout [ROOT.GetCountry.GetName]. Protest that our   understaffed colonial forces are hard pressed to handle."
 colonial_administration_events.2.f:0 "\"[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] has created us free, and did not make us into heritage or estate. So by [SCOPE.  GetRootScope.GetCountry.GetCustom('GetDivinity')], we shall be bequeathed or enslaved no more.\""
 colonial_administration_events.2.a:0 "May [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] preserve [ROOT.GetCountry.GetNameNoFormatting], for we may lack the means to."
