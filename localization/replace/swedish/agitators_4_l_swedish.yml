 modifier_silk_grand_reopening:0 "Silkeindustrin återupptas"
 modifier_pioneered_pebrine_cure:0 "Banbrytande arbete inom begränsning av pébrine"
 notification_pebrine_spread_notification_name:0 "Pébrine-epidemin sprider sig till [SCOPE.sCountry('pebrine_country_scope').GetName]."
 notification_pebrine_spread_notification_desc:0 "Silkesmaskgårdar i[SCOPE.sCountry('pebrine_country_scope').GetName]  har börjat drabbas av pébrine-epidemin."
 notification_pebrine_spread_notification_tooltip:0 "Silkesmaskgårdar i[SCOPE.sCountry('pebrine_country_scope').GetName]  börjar drabbas av pébrine-epidemin"
 silkworm_diseases.1.t:0 "Pébrine-epidemin"
 silkworm_diseases.1.d:0 "I[SCOPE.sState('pebrine_state').GetName]  har man[SCOPE.sBuilding('pebrine_building').GetName] börjat drabbas av en epidemi av pébrine, en dödlig sjukdom som drabbar silkesmaskar. Eftersom sjukdomen utplånar hela silkesmaskgårdar innebär detta utbrott ett hot mot hela[ROOT.GetCountry.GetAdjective]  silkesindustrin."
 silkworm_diseases.1.f:0 "”Ja, varenda en av dem från den senaste omgången. De är täckta av bruna fläckar och dör en efter en. Det finns inte ett enda silkesfiber bland dem.” \n\nSamma rapporter hade börjat strömma in från nästan alla gårdar i [SCOPE.sState('pebrine_state').GetNameNoFormatting]. Tusentals och åter tusentals silkesmaskar drabbade. Krympta, slöa, med dålig utveckling – och inte ett spår av livskraftigt, ovärderligt silke spunnet."
 silkworm_diseases.1.a:0 "Vi måste agera omedelbart."
 silkworm_diseases.2.t:0 "Pébrine-utbrott i [SCOPE.sState('pebrine_state').GetName]"
 silkworm_diseases.2.d:0 "Det pågående utbrottet av pébrine har spridit sig till  i[SCOPE.sBuilding('pebrine_building').GetName] [SCOPE.sState('pebrine_state').GetName]. Den snabba spridningen av sjukdomen bland[ROOT.GetCountry.GetAdjective]  silkesmasksodlingar utgör en allt större fara för sidenindustrin."
 silkworm_diseases.2.f:0 "Den första omgången ägg som kläckts den här veckan uppvisade en något förhöjd dödlighet, vilket delvis hade förberett dem som hade till uppgift att vaka över sin flock av ryggradslösa djur. \n\nDet hade dock inte förberett dem på nästa omgång. Där man tidigare spunnit högkvalitativt siden kämpade nu vissna, brunfläckiga larver i sina celler, på väg mot den oundvikliga eviga stillheten."
 silkworm_diseases.2.a:0 "Satsa ytterligare på en möjlig lösning."
 silkworm_diseases.2.b:0 "Sjukdomen kommer att avta av sig själv med tiden."
 silkworm_diseases.3.t:0 "Pébrine-utbrott i [SCOPE.sState('pebrine_state').GetName]"
 silkworm_diseases.3.d:0 "[SCOPE.sBuilding('pebrine_building').GetName]Utbrottet av silkesmasksjukdomen pébrine i[SCOPE.sCountry('pebrine_origin').GetName]  har spridit sig till[ROOT.GetCountry.GetAdjective]  jorden.  i[SCOPE.sState('pebrine_state').GetName]  har börjat uppleva massdöd bland sina silkesmaskar."
 silkworm_diseases.3.f:0 "”Ja, varenda en av dem från den senaste omgången. De är täckta av bruna fläckar och dör en efter en. Det finns inte ett enda silkesfiber bland dem.” \n\nSamma rapporter hade börjat strömma in från nästan alla gårdar i [SCOPE.sState('pebrine_state').GetNameNoFormatting]. Tusentals och åter tusentals silkesmaskar drabbade. Krympta, slöa, med dålig utveckling – och inte ett spår av livskraftigt, ovärderligt silke spunnet."
 silkworm_diseases.3.a:0 "Vi måste agera omedelbart."
 silkworm_diseases.3.b:0 "Fan ta den här[SCOPE.sCountry('pebrine_origin').GetAdjective]slarvigheten!"
 silkworm_diseases.4.t:0 "[SCOPE.gsInterestGroup('landowners_scope').GetName] Begär ersättning"
 silkworm_diseases.4.d:0 "De[SCOPE.gsInterestGroup('landowners_scope').GetName]som äger företagen[SCOPE.sBuilding('pebrine_building').GetName]i[SCOPE.sState('pebrine_state').GetName]har vänt sig till regeringen och begärt ersättning för den förlorade vinsten till följd av pébrine-epidemin."
 silkworm_diseases.4.f:0 "”Under en lång tid har vi tvingats lägga ner stora summor pengar och arbete på att säkerställa framgången för våra insatser, bara för att de – utan att någon bär skulden för det – ska drabbas av en kris som hotar själva grundvalarna för [SCOPE.sState('pebrine_state').GetNameNoFormatting]den naturliga miljön. Att underlåta att agera nu skulle vara oerhört katastrofalt för det gemensamma välfärdens framtid...”"
 silkworm_diseases.4.a:0 "Deras branscher är av avgörande betydelse för vårt land."
 silkworm_diseases.4.b:0 "Vi belönar inte vårdslöshet."
 silkworm_diseases.5.t:0 "Den syntetiska lösningen"
 silkworm_diseases.5.d:0 "En grupp som företräder[SCOPE.gsInterestGroup('industrialists_scope').GetName]  har begärt statliga investeringar i utvecklingen av en process för framställning av syntetiskt siden, som ett alternativ till den av pébrine drabbade silkesmasksindustrin."
 silkworm_diseases.5.f:0 "\"...och om orsaken till denna sjukdom inte upptäcks innan hela vår bransch vänds upp och ner? Jag ber er att åtminstone överväga det.” \n\n”En dag kommer vi att kunna framställa vad vi än önskar i en kemisk destillationsapparat – och vi bör inte försumma möjligheten att påbörja den vägen så snart som möjligt.”"
 silkworm_diseases.5.a:0 "En lönsam investering i dessa kristider."
 silkworm_diseases.5.b:0 "Vi kommer inte att utsätta vår sidenindustri för ytterligare hot."
 silkworm_diseases.6.t:0 "Stöd till silkesodlare"
 silkworm_diseases.6.d:0 "De[SCOPE.sBuilding('pebrine_building').GetName][GetPopType('laborers').GetName]i[SCOPE.sState('pebrine_state').GetName]  har drabbats hårt av att deras silkesmaskar har gått förlorade på grund av pébrine. De har lämnat in en begäran till regeringen om ekonomiskt stöd för att kompensera för förlorade inkomster."
 silkworm_diseases.6.f:0 "”Människan blir stor i precis den utsträckning som hon arbetar för sina medmänniskors välfärd.” \n\n– Mahatma Gandhi"
 silkworm_diseases.6.a:0 "Vem är vi att neka dem hjälp?"
 silkworm_diseases.6.b:0 "De kan nog snart hitta ett nytt jobb."
 silkworm_diseases.7.t:0 "Problemets rot"
 silkworm_diseases.7.d:0 "Efter att ha undersökt pébrins egenskaper har vi lyckats identifiera både den svamp som orsakar sjukdomen och en metod för att förhindra att den sprids på silkesmasksodlingarna. Vi kan nu tillämpa de metoder vi har upptäckt för att befria våra odlingar från infektionen."
 silkworm_diseases.7.f:0 "\"...... den uppstår där igen genom de dåliga frön som odlas där eller som importeras dit, och den dag då vi, i ett område med hög kultur, endast odlar frön som är fria från smittämnen, kommer nästan alla generationer där att vara skyddade mot pébrine och kommer, för att inte tala om att denna sjukdom uppenbarligen inte längre kan fortplanta sig.” \n\n— Louis Pasteur"
 silkworm_diseases.7.a:0 "Vi befinner oss återigen i framkant inom den internationella vetenskapen."
 silkworm_diseases.7.b:0 "Dela botemedlet med andra drabbade länder."
 pebrine_foreign_aid_tt:0 "Alla länder som drabbats av#boldpébrine#! kommer att få de medel som krävs för att bekämpa epidemin, i utbyte mot ökade[concept_relations]bidrag och möjligheten att få utestående skulder betalda.  [Concept('concept_obligation', '$concept_obligations$')]"
 silkworm_diseases.8.t:0 "[SCOPE.sCountry('cure_sponsor_scope').GetName] Aktier i Pébrine Solution"
 silkworm_diseases.8.d:0 "Efter att ha upptäckt en metod för att på ett tillförlitligt sätt sortera bort pébrine-infekterade silkesmaskägg har man spridit kunskapen om processen internationellt.[SCOPE.sCountry('cure_sponsor_scope').GetName] Genom att följa de steg som beskrivs i de publicerade artiklarna kan vi nu uppnå samma[SCOPE.sCountry('cure_sponsor_scope').GetAdjectiveNoFormatting]framgångar i praktiken."
 silkworm_diseases.8.f:0 "”Mellan klockan 4 och 6 på kvällen placeras alla par separat på de små tygstyckena, och omedelbart därefter kastas hanarna bort, utan att man bryr sig om hur sönderslagna de är. Efter att honorna har lagt ägg spärras de in i varsitt hörn av tyget med hjälp av en nål, helst genom att trä den genom vingarna, så att malen inte kan flytta sig.” \n\n– Louis Pasteur"
 silkworm_diseases.8.a:0 "Hälsa deras forskare att vi tackar dem."
 silkworm_diseases.8.b:0 "Vi kommer inte att ådra oss några förpliktelser gentemot dem."
 silkworm_diseases.9.t:0 "Slutet på pébrineepidemin"
 silkworm_diseases.9.d:0 "Tack vare ihärdiga insatser både från våra forskare och de silkesodlare som tillämpade deras lösning har vår silkesindustri återhämtat sig från den pébrine-epidemi som drabbade den. Vår nya kunskap om sjukdomens orsak kommer att vara till nytta för oss under många år framöver."
 silkworm_diseases.9.f:0 "Till slut fylldes cellerna återigen med kokonger, och maskarna inuti genomgick ovetandes den metamorfos som snart skulle avbrytas av ett bad i kokande vatten. En arbetare gick mellan raderna av träceller, och stressens skugga hade nästan försvunnit från hans panna. \n\nHans arbetslista hade förstås blivit längre, och hans lön hade bara höjts marginellt – men det var ändå bättre än att inte ha något jobb alls."
 silkworm_diseases.9.a:0 "En skål för våra forskare!"
 silkworm_diseases.9.b:0 "Låt oss återuppliva vår silkesindustri – det finns ingen tid att förlora."
