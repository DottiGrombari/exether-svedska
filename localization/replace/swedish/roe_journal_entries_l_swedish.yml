 je_queenslayer:0 "Killing of a Sacred Griffon"
 je_queenslayer_reason:0 "Our home islands have long been terrorized by #italic Liniriha#!, the Queen Griffon of Argi, and her devoted [GetCulture('cliffpercher').GetName] cult. We must unlock the secrets of these flighted chimerae for usage in our mutagen vats."
 je_queenslayer_lobby:0 "Our home islands have long been terrorized by #italic Liniriha#!, the Queen Griffon of Argi, and her devoted [GetCulture('cliffpercher').GetName] cult. We must unlock the secrets of these flighted chimerae for usage in our mutagen vats."
 je_wingbreaker:0 "Wingbreaker"
 je_wingbreaker_reason:0 "The next step of our mutagen discoveries will require a great number of griffonwings, bird beaks, and wyvern hearts; more than have ever been assembled in one place; the #italic Featherflight Reserve#!.  \n\nThe rate at which the stockpile grows is dependent on hunting lodge buildings on the Aritzakarri continent, [SCOPE.GetRootScope.GetCountry.GetInterestGroupOfType('ig_mages').GetName] clout, and [SCOPE.GetRootScope.GetCountry.GetInterestGroupOfType('ig_rural_folk').GetName] clout.  Employing the Sandsparrow Guild will double progression speed."
 je_wingbreaker_lobby:0 "The next step of our mutagen discoveries will require a great number of griffonwings, bird beaks, and wyvern hearts; more than have ever been assembled in one place; the #italic Featherflight Reserve#!."
 je_wingsplicer:0 "Wingsplicer"
 je_wingsplicer_reason:0 "With the Featherflight Reserve filled, the dream of ogreflight is now within reach. We must greatly expand our essence-processing capabilities, as well as our base of knowledgable artificers and alchemists."
