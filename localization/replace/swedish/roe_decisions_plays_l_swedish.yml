l_swedish:
 newspaper_trigger_decision:0 "Toggle the newspaper on and off"
 newspaper_trigger_decision_desc:0 "With this decision you can toggle the newspaper on and off"
 newspaper_trigger_decision_tooltip:0 "You like the news? Turn it on!"
 raid:0 "Raiding the seas"
 raid_desc:0 "The Empire of Dunomia gazes south. But in its greed, it has dismissed our presence. Muster our fleets and send word to our fellow ravagers, it is time to make the Empire bleed!"
 lonely_lighthouse_decision:0 "Survey the Lonely Islands"
 lonely_lighthouse_decision_desc:0 "The waves around the lonely islands are treacherous. To secure the trade routes between our territories, we should build a lighthouse on the island to guide our ships."
 locari_toldek_stop:0 "Abolish the Toldek Pɑseb"
 locari_toldek_stop_desc:0 "The Toldek Paseb consists of blood sacrifices performed at the top of mighty ziggurats to gain the favor of Xocarati. This claims a significant number of lives every year and should be abolished."
 locari_jihduk_stop:0 "Abolish the Jihduk Pɑseb"
 locari_jihduk_stop_desc:0 "The Jihduk Paseb consists of revealing dark secrets to the minds of sacrifices in ziggurats to try and gain enlightenment from the minutes of mad babbling before their expiration. These vision quests claim a significant number of lives every year and should be abolished."
 zokmir_died:0 "Zokmir is no longer the ruler"
 bhimsen_died:0 "Bhimsen is no longer the ruler"
 locari_examine_draconic_carvings:0 "Examine Ancient Draconic Murals"
 locari_examine_draconic_carvings_desc:0 "With the exploration of the labyrinthic dragon ruin system in one of our states, our workers seem to have found an ancient mural! Important scriptures and religious texts seemed to have been written on it, but we will need some time to translate it all..."
 locari_dragon_tomb_reform:0 "Unearth the Dragon Tomb"
 locari_dragon_tomb_reform_desc:0 "They say that for those Dragonborn who find the tomb of their ancestors, a life in gold and glory awaits. Lost to time they shall be no longer, for we shall see what secrets they keep"
 sell_kilimakazi:0 "Sell Kilimakazi"
 sell_kilimakazi_desc:0 "We can strengthen our militairy ties with Thassarcia by offering to cede Kilimakazi to their subject, the Lacertian League. This will aid us substantially should we wish to attack the Ogres and Goblins that laid waste to the Cicaoran Republic"
 lacertians_annex_kilimakazi:0 "Obtain Kilimakazi"
 lacertians_annex_kilimakazi_desc:0 "We can obtain Kilimakazi for the Lacertian League and strengthen our militairy ties with our Akmuociai kin by offering our support against their foes. While this would surely drag us into a war, it would also tie them to us which will increase our safety in the long term."
