 absorb_minor_tribe_button:0 "Absorb Minor Faction"
 absorb_minor_tribe_button_desc:0 "Many of the various factions of the Thicket are disparate and disunited. They would fall in line to a quick show of force."
 encourage_forward_settlements_button:0 "Encourage Forward Settlements"
 encourage_forward_settlements_button_desc:0 "Many of the decentralized tribes of the Thicket lack rigid borders; we must encourage our faction to take advantage of this."
 create_pro_lobby_button:0 "Create Pro-Country Lobby"
 create_pro_lobby_button_desc:0 "Our previous gifts have garnered us a number of supporters. We must galvanize them to action!"
 improve_vermillion_relations_button:0 "Improve Relations with Faction"
 improve_vermillion_relations_button_desc:0 "Declaring that we do not desire anything at all for our most recent support would be a surefire way to increase their appreciation of us."
 subsidize_woodcutting_industry_button:0 "Subsidize Woodcutting Industry"
 subsidize_woodcutting_industry_button_desc:0 "While the Thicket is ill-suited for most forms of industry, its wood is already world-famous."
 bureaucratic_advisory_button:0 "Send Bureaucratic Advisors"
 bureaucratic_advisory_button_desc:0 "The institutions of the Thicket, while impressive in context, are a far cry from the efficiency of our capital. We could send advisors to provide oversight."
 military_advisory_button:0 "Offer Military Educations"
 military_advisory_button_desc:0 "While the Thicket may resist our entry, there is nothing stopping our benefactors from receiving proper military educations within our own borders. We will petition them to send their best and brightest for proper training."
 developmental_aid_button:0 "Send Developmental Aid"
 developmental_aid_button_desc:0 "What little industry is present in the Thicket is in a pitiful state. They would benefit greatly from industrial advisors."
 demand_favor_button:0 "Demand Obligation"
 demand_favor_button_desc:0 "After all we have invested, it is time we call in a debt of more than gratitude."
 demand_protectorate_button:0 "Demand Protectorate"
 demand_protectorate_button_desc:0 "The Thicket cannot be secured without our heavy-handed presence. Our benefactors will surely understand."
 je_asvean_military:0 "The Forest Sappers"
 je_asvean_military_reason:0 "The $ig_asvean$ are a ranger guild that once held much sway over the forests of the Eastern Steepcliff Coast. While they are a ghost of their former size, they are still a formidable force worthy of defending our lands and training our soldiers.\n\nWe will receive buffs to our homeland defense for as long as this journal remains active. These buffs will get stronger as [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] [concept_clout] increases."
 je_vae_penal:0 "Industry of the Unwanted"
 je_vae_penal_reason:0 "While slavery may be #italic de jure#! abolished within our borders, the state still finds itself burdened by the idle and the unwanted. Vagrants, agitators, and recalcitrant debtors fill the dockets. With sufficient financial incentive, the courts can be guided to route these convicts into our gulag network under the guise of a corrective labor program, so long as we cover their transfer."
 je_vae_penal_lobby:0 "While slavery may be #italic de jure#! abolished within our borders, the state still finds itself burdened by the idle and the unwanted. Vagrants, agitators, and recalcitrant debtors fill the dockets. With sufficient financial incentive, the courts can be guided to route these convicts into our gulag network under the guise of a corrective labor program, so long as we cover their transfer."
 je_extend_penal_contracts_button:0 "Extend Penal Labor Contracts"
 je_vae_penal_button_tt_1:0 "Penal Contract Extension not Available"
 je_vae_penal_button_tt_2:0 "A bright future awaits all former convicts. Break the chains!"
 je_vae_penal_button_tt_3:0 "@warning! This will greatly anger Vairia and give them casus belli to invade!"
 je_cement_penal_contracts_button:0 "Entrench the Penal Labor System"
 je_penal_contracts_indep_button:0 "Unilaterally End Penal Labor"
 je_kinfold:0 "The Kinfold"
 je_kinfold_reason:0 "The [ROOT.GetCountry.GetNameNoFlag] stands at a crossroads. What began as a ceremonial gathering of honored clans, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], has grown into a power unto itself. Regional lords now govern with near autonomy, their allegiance more tradition than law.\n\nThe empire risks becoming a hollow title, its crown ignored and its laws unenforced. To preserve Dumonia's unity, the central government must reassert control before the empire fractures beyond repair."
 je_kinfold_lobby:0 "The [ROOT.GetCountry.GetNameNoFlag] stands at a crossroads. What began as a ceremonial gathering of honored clans, the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], has grown into a power unto itself. Regional lords now govern with near autonomy, their allegiance more tradition than law.\n\nThe empire risks becoming a hollow title, its crown ignored and its laws unenforced. To preserve Dumonia's unity, the central government must reassert control before the empire fractures beyond repair."
 je_kinfold_offer_confederation_button:0 "Integrate Kinfold Clan"
 je_kinfold_offer_confederation_button_desc:0 "Their strength is our strength, and our future is one. Let the banners of clan and crown be woven together as one people, one realm."
 je_kinfold_undermine_clan_autonomy_button:0 "Undermine Kinfold Authority"
 je_kinfold_undermine_clan_autonomy_desc:0 "The old structures of the Kinfold have become outdated. We must assert the supremacy of the emperor over the clans."
 je_kinfold_stop_undermine_clan_autonomy_button:0 "Return Kinfold Authority"
 je_kinfold_stop_undermine_clan_autonomy_desc:0 "We might have underestimated the sway that the old clans still hold over the empire. We should placate them before they prove too cumbersome."
 kamiran_decision:0 "Elevate the Kamiran Cult"
 kamiran_decision_desc:0 "With the restoration of the imperial household to political power, it would be wise to integrate local beliefs into an official state religion emphasizing the Emperor's divinity."
 je_kamiran_missions:0 "Our Place in the Sun"
 je_kamiran_missions_reason:0 "The rise of the [GetReligion('cult_of_the_sun').GetName] cult has brought newfound strength to the [ROOT.GetCountry.GetAdjectiveNoFlag] crown. Their zealous support has enabled colonial ventures that would have once faltered and has bolstered the emperor’s authority within the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].\n\nYet many now question the cost. The cult's rigid doctrine and disdain for compromise stand in stark contrast to the broader [GetReligion('church_of_man').GetName], and their growing presence threatens to erode the ancestral customs that have long defined Dumonia."
 je_kamiran_missions_lobby:0 "The rise of the [GetReligion('cult_of_the_sun').GetName] cult has brought newfound strength to the [ROOT.GetCountry.GetAdjectiveNoFlag] crown. Their zealous support has enabled colonial ventures that would have once faltered and has bolstered the emperor’s authority within the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].\n\nYet many now question the cost. The cult's rigid doctrine and disdain for compromise stand in stark contrast to the broader [GetReligion('church_of_man').GetName], and their growing presence threatens to erode the ancestral customs that have long defined Dumonia."
 je_kamiran_takeover:0 "A New Dawn"
 je_kamiran_takeover_reason:0 "The rise of the [GetReligion('cult_of_the_sun').GetName] cult has brought newfound strength to the [ROOT.GetCountry.GetAdjectiveNoFlag] crown. Their zealous support has enabled colonial ventures that would have once faltered and has bolstered the emperor’s authority within the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].\n\nYet many now question the cost. The cult's rigid doctrine and disdain for compromise stand in stark contrast to the broader [GetReligion('church_of_man').GetName], and their growing presence threatens to erode the ancestral customs that have long defined Dumonia."
 je_kamiran_takeover_lobby:0 "The rise of the [GetReligion('cult_of_the_sun').GetName] cult has brought newfound strength to the [ROOT.GetCountry.GetAdjectiveNoFlag] crown. Their zealous support has enabled colonial ventures that would have once faltered and has bolstered the emperor’s authority within the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant].\n\nYet many now question the cost. The cult's rigid doctrine and disdain for compromise stand in stark contrast to the broader [GetReligion('church_of_man').GetName], and their growing presence threatens to erode the ancestral customs that have long defined Dumonia."
 je_strength_of_thousands:0 "Strength of Thousands"
 je_strength_of_thousands_reason:0 "Few beasts of burden can match the raw strength of a single giant. Whether lifting timber, turning soil, or hauling stone, their labor accelerates industry across every terrain. Settlements with a significant giant population see marked improvements in productivity simply due to their size and endurance.\n\nEvery [concept_state] you own will receive the #tooltippable_name $strength_of_thousands_text$#! modifier. This [concept_modifier] scales with the percentage of the $concept_pops$ belonging to Giant [concept_culture].\n\nGiant cultures include [SCOPE.sCulture('cloud_giant').GetName], [SCOPE.sCulture('fire_giant').GetName], [SCOPE.sCulture('frost_giant').GetName], [SCOPE.sCulture('toftir_giant').GetName], and [SCOPE.sCulture('wood_giant').GetName].\n\nThe [SCOPE.sCulture('grendleth').GetName] culture will instead receive #tooltippable_name $strength_of_hundreds_text$#!."
 je_strength_of_thousands_lobby:0 "Few beasts of burden can match the raw strength of a single giant. Whether lifting timber, turning soil, or hauling stone, their labor accelerates industry across every terrain. Settlements with a significant giant population see marked improvements in productivity simply due to their size and endurance.\n\nEvery [concept_state] you own will receive the #tooltippable_name $strength_of_thousands_text$#! modifier. This [concept_modifier] scales with the percentage of the $concept_pops$ belonging to Giant [concept_culture].\n\nGiant cultures include [SCOPE.sCulture('cloud_giant').GetName], [SCOPE.sCulture('fire_giant').GetName], [SCOPE.sCulture('frost_giant').GetName], [SCOPE.sCulture('toftir_giant').GetName], and [SCOPE.sCulture('wood_giant').GetName].\n\nThe [SCOPE.sCulture('grendleth').GetName] culture will instead receive #tooltippable_name $strength_of_hundreds_text$#!."
