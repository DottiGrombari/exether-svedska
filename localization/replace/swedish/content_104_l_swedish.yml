 krakatoa_crop_failure_tt:0 "Skördebortfallet kommer också att påverka resten av världen."
 krakatoa_crop_failure_small_modifier_tt:0 "I de delstater där det finns jordbruk eller plantager kommer skörden att bli något sämre."
 krakatoa_crop_failure_medium_modifier_tt:0 "Våra delstater med jordbruk eller plantager kommer att drabbas av omfattande skördebortfall."
