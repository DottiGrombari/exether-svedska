 je_high_courts:0 "The High Courts"
 je_high_courts_reason:0 "As we enter the modern era, it becomes clear we need more than slave-states; we need sister-states, with the same right-of-tithe over their [Concept('concept_subject', '$concept_subjects$')] as we do over ours.\n\nYou may uplift the administration of a willing [concept_subject] through the uplift administration [concept_overlord_action]. An uplifted subject will be far more loyal, and may take [Concept('concept_bloodtithe', '$concept_bloodtithes$')] from any subjects of their own. Uplifted subjects will gain the $tradition_vampiric$ [concept_tradition_trait], and begin slowly converting pops.\n\n#red Uplifted subjects do not pay a [concept_bloodtithe].#!"
 je_vampire_masquerade:0 "The Masquerade"
 je_vampire_masquerade_reason:0 "A hidden predator can be managed. A swelling brood cannot.\n\nAs the number of [GetCulture('vampire').GetName] rises within [ROOT.GetCountry.GetNameNoFlag], the strain placed upon its human stock grows ever harder to conceal. To sustain them, [ROOT.GetCountry.GetNameNoFlag] takes 4% of the [Concept('concept_pop', '$concept_pops$')] from its [Concept('concept_subject', '$concept_subjects$')]' most populated state each year as a [concept_bloodtithe].\n\nThese tithes can be directed to the state of your choosing with the [GetDecreeType('decree_special_measures').GetName] decree, or they will be chosen automatically.\n\n[GetCulture('vampire').GetName] [Concept('concept_pop', '$concept_population$')]: #v [ROOT.GetCountry.MakeScope.Var('bt_vampire_ratio').GetValue|1]%#! of human-heritage [Concept('concept_pop', '$concept_pops$')]"
 je_vampire_masquerade_lobby:0 "A hidden predator can be managed. A swelling brood cannot."
 je_vampire_masquerade_fail_tt:0 "[concept_vampire_masquerade] has fallen to #v 0#!"
 je_vampire_university:0 "Blood Tithes"
 je_vampire_university_reason:0 "Managing livestock is no easy task; even moreso when the cattle are sapient.\n\n[ROOT.GetCountry.GetNameNoFlag] takes 4% of the [Concept('concept_pop', '$concept_pops$')] froms its [Concept('concept_subject', '$concept_subjects$')]' most populated state as a [concept_bloodtithe] every year.\n\nThese tithes can be directed to the state of your choosing with the [GetDecreeType('decree_special_measures').GetName] decree, or they will be chosen automatically."
 halt_tithes_button:0 "Halt the Blood-tithes"
 halt_tithes_button_desc:0 "There is such a thing as too much of a good thing. As our herd grows beyond our ability to manage it, we must slow the flow of cattle."
 halt_tithes_tt:0 "We will temporarily halt the blood-tithes"
 halted_tithes_past_tt:0 "We have temporarily halted the blood-tithes"
 unhalted_tithes_past_tt:0 "We are actively collecting blood-tithes"
 unhalt_tithes_button:0 "Begin Blood-tithes Anew"
 unhalt_tithes_button_desc:0 "The fledglings grow hungry and our subjects grow fat. We must remind them of their place."
 unhalt_tithes_tt:0 "We will restart the blood-tithes"
 halt_ini_rites_button:0 "Declare Fasting Period"
 halt_ini_rites_button_desc:0 "Sometimes, the best way to control a herd is to let them graze for a while without prodding. We will temporarily halt feeding, giving our subjects time to settle down and our cattle time to grow."
 halt_ini_rites_tt:0 "We will temporarily halt new initiation rites"
 unhalt_ini_rites_button:0 "Restart Initiation Rites"
 unhalt_ini_rites_button_desc:0 "Our society can only bear the weight of so much cattle.  On occasion, the best of our servants must be uplifted and brought into the fold.\n\nThis will raise radicalism."
 unhalt_ini_rites_tt:0 "We will begin new initiation rites"
 halted_ini_rites_past_tt:0 "We are not performing initiation rites"
 unhalted_ini_rites_past_tt:0 "We are actively performing initiation rites"
 end_charade_button:0 "End the Charade"
 end_charade_button_desc:0 "The Boar's enemies wait for his death to strike, but he is not dead yet! The Margrave has one fight yet still in him!"
 disband_craggedwyn_company_button:0 "Dissolve Thalmaric Alchemics"
 disband_craggedwyn_company_button_desc:0 "We have reigned in Thalmaric Alchemics, and have mustered the political will to revoke the company's charter."
