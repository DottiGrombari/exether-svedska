 je_grey_boar:0 "The Gray Boar"
 je_grey_boar_status:0 "Hushed whispers speak ill of the margrave's health"
 je_grey_boar_reason:0 "The long shadow of Margrave Ludric Zarnak, once a figure of unwavering strength and iron will, now flickers as his health deteriorates. For nearly half a century, he has been the indomitable ruler of Ceraun, first as a hero of the Viceroy's War, then as the architect of a bloody coup that shattered the old nobility. His legacy is marked by the brutal Buramog Wars against the western orcs and the infamous order to the alchemists that unleashed the devastating Wyldfire Tincture, transforming the Wrentsay Forest into the cursed Plaguewoods.\n\nNow, with every raspy cough and weakening breath, the old Margrave’s hold on power slips. His once-loyal subjects, now wary and ambitious, circle him like vultures, eager to fill the inevitable power vacuum. The future of Ceraun teeters on the edge, as the looming struggle for succession threatens to plunge the realm into chaos. How long can the old strongman cling to life—and power—before his rivals strike?"
 je_grey_boar_lobby:0 "The long shadow of Margrave Ludric Zarnak, once a figure of unwavering strength and iron will, now flickers as his health deteriorates. For nearly half a century, he has been the indomitable ruler of Ceraun, first as a hero of the Viceroy's War, then as the architect of a bloody coup that shattered the old nobility. His legacy is marked by the brutal Buramog Wars against the western orcs and the infamous order to the alchemists that unleashed the devastating Wyldfire Tincture, transforming the Wrentsay Forest into the cursed Plaguewoods.\n\nNow, with every raspy cough and weakening breath, the old Margrave’s hold on power slips. His once-loyal subjects, now wary and ambitious, circle him like vultures, eager to fill the inevitable power vacuum. The future of Ceraun teeters on the edge, as the looming struggle for succession threatens to plunge the realm into chaos. How long can the old strongman cling to life—and power—before his rivals strike?"
