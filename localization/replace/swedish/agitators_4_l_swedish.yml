 land_ownership_law_events.10.t:0 "Utförsäljning av jordbruksredskap"
 land_ownership_law_events.10.d:0 "Förmögna medlemmar av  i[SCOPE.gsInterestGroup('landowners_ig').GetName] [SCOPE.sState('kulaks_state').GetName], som en reaktion på [SCOPE.sLaw('current_law_scope').GetName], har beordrat att deras överskottsboskap ska avlivas och att deras rekordskördar ska brännas upp."
 land_ownership_law_events.10.f:0 "”Ser du det här? De bränner ju allt... med en enda av de där bränderna skulle jag kunna försörja hela min familj i en månad.\"\n\n\"Tror du att de där rika mesarna i grannstaden övertalade dem till det?\"\n\n\"Nej... den gamle här är en elak jävel, men han skulle aldrig göra något sånt.\""
 land_ownership_law_events.10.a:0 "Desto större anledning att fortsätta."
 land_ownership_law_events.10.b:0 "Processen kan inte fortsätta om den riskerar att leda till hungersnöd."
 land_ownership_law_events.11.t:0 "En skymf mot trädgården"
 land_ownership_law_events.11.d:0 "[SCOPE.sPop('majority_religion').GetReligion.GetName] Präster delar ut broschyrer där de hävdar att[SCOPE.sCharacter('ruler_scope').GetFullName]  och[SCOPE.sCharacter('industrialists_leader_scope').GetHerHis]  verk om[SCOPE.sLaw('current_law_scope').GetName]  utgör ett hot mot världens naturliga ordning."
 land_ownership_law_events.11.f:0 "Det finns inget säkert sätt att avgöra vilka gudar som bryr sig om hur en gröda växer. Den som har något sunt förnuft skulle sätta sin tillit till den jord man odlar i. Gödsla god jord, sköt om den väl och odla endast sådana växter som inte skadar varandra. Och ändå tror de som har jordisk makt sig veta vad deras gud kräver när den makten hotas."
 land_ownership_law_events.11.a:0 "Desto större anledning att fortsätta framåt."
 land_ownership_law_events.11.b:0 "Processen kan inte fortsätta om vår[SCOPE.sPop('majority_religion').GetReligion.GetName]befolkning gör uppror."
 land_ownership_law_events.11.c:0 "Ta dessa broschyrer och använd dem som bränsle till lyktorna."
 land_ownership_law_events.12.t:0 "Försenad ankomst"
 land_ownership_law_events.12.d:0 "Statliga planerare har återvänt i förtid från sin rundtur på de gårdar som omvandlats till[SCOPE.sLaw('current_law_scope').GetName]  i [SCOPE.sState('collectivised_state').GetName]. De anser att gårdarna inte klarar av att bära upp de tunga maskinerna på ett tillfredsställande sätt."
 land_ownership_law_events.12.f:0 "”Tänk om vi kunde tillverka reservdelar till maskinerna. Tillräckligt med stål skulle hålla längre än leran. Det är jag säker på.” \n\n”Och kan du garantera de här bönderna på landsbygden att deras reservdelar alltid kommer i tid? Utan undantag? Det skulle jag inte kunna. Och jag tänker inte låta stadsarbetarnas liv förstöras av lera från landsbygden. Vi måste komma på något smartare.”"
 land_ownership_law_events.12.a:0 "Maskiner finns till endast för att underlätta människans arbete."
 land_ownership_law_events.12.b:0 "Ett provisoriskt stålverk borde räcka."
 land_ownership_law_events.12.c:0 "Rådgör med[SCOPE.sCharacter('rural_folk_leader').GetFullName]  om vad du ska göra."
 land_ownership_law_events.13.t:0 "Vågiga, kraftfulla hjälpmedel"
 land_ownership_law_events.13.d:0 "Lantbruksarbetare har mellan skördarna organiserat sig för att stödja kollektiviseringsprocessen. De mest engagerade går från dörr till dörr och hjälper till att påskynda alla processer de kan hitta."
 land_ownership_law_events.13.f:0 "”Såg du de där stora männen vid dörren? De luktar jord och saltvatten, och ändå marscherar de genom vårt vardagsrum med… brevpapper, såvitt jag kan se.” ”Ja\n\n, det gjorde jag. Den kraftige sjöng en riktig låt. Och han var fackföreningsman. Han rör inte sprit heller. Han verkade överlycklig när jag bad honom skriva till mig.”\n\n ”Herregud, nämnde... nämnde du mig överhuvudtaget, av en slump?”"
 land_ownership_law_events.13.a:0 "Vi uppskattar deras stöd."
 land_ownership_law_events.13.b:0 "Se till att de får betalt för sina insatser."
 land_ownership_law_events.14.t:0 "Ett pittoreskt samhälle – nu surrealistiskt"
 land_ownership_law_events.14.d:0 "En akademiker som är känd för sina isolationistiska åsikter har publicerat en artikel där han fördömer [SCOPE.sLaw('current_law_scope').GetName]. I artikeln hävdas att detta skulle förstöra idyllen på landsbygden."
 land_ownership_law_events.14.f:0 "”Utan egna åkrar att bruka kommer våra arbetare att upphöra att vara människor. De kommer att ersättas av maskinernas gnisslande, motorernas oväsen och den oändliga, kvävande dimman som genomsyrar fabriksområdet. Ett stillsamt liv som fördrivs av urbaniseringens oändliga frammarsch!”"
 land_ownership_law_events.14.a:0 "Håll kursen."
 land_ownership_law_events.14.b:0 "Dags att öppna ett nytt bläckfat..."
 land_ownership_law_events.15.t:0 "Foreign Farm Acquisitions, Inc."
 land_ownership_law_events.15.d:0 "Debatterna mellan[SCOPE.gsInterestGroup('landowners_ig').GetName]  och[SCOPE.gsInterestGroup('industrialists_ig').GetName]  har hamnat i  nyheterna[ROOT.GetCountry.GetAdjective]. Den centrala frågan: utländska investeringar i [SCOPE.sLaw('current_law_scope').GetName]."
 land_ownership_law_events.15.f:0 "”Med tanke på extraterritorialiteten, vilka rättsliga garantier har vi för att[ROOT.GetCountry.GetAdjectiveNoFormatting]lagarna gäller[SCOPE.sCountry('neighbour_country').GetAdjectiveNoFormatting]medborgarna här?” \n\n”En mer relevant fråga vore vem som arbetar på den marken. Det är[ROOT.GetCountry.GetAdjectiveNoFormatting]  mark, den borde bearbetas av[ROOT.GetCountry.GetAdjectiveNoFormatting]  människohänder!” \n\n”Men om de tar med sig sin egen arbetskraft och sina egna lagar, skulle det kunna vara bättre för de inhemska marknaderna...”"
 land_ownership_law_events.15.a:0 "Alla utländska investerare kommer att omfattas av[ROOT.GetCountry.GetAdjective]civilrätten."
 land_ownership_law_events.15.b:0 "[SCOPE.sCountry('neighbour_country').GetAdjective] lagar är det de är vana vid."
 land_ownership_law_events.15.c:0 "Denna överdrivna försiktighet tjänar ingen."
 land_ownership_law_events.16.t:0 "Helt och hållet top-down-styrning"
 land_ownership_law_events.16.d:0 "De[SCOPE.gsInterestGroup('industrialists_ig').GetName]har visat intresse för [SCOPE.sLaw('current_law_scope').GetName]. Många branschledare hoppas kunna säkra hela leveranskedjan för sina företag."
 land_ownership_law_events.16.f:0 "”Mina herrar, jag vill presentera en modell av framtiden för er: [SCOPE.sCharacter('industrialists_leader_scope').GetLastNameNoFormatting]Landia. Denna diorama, som är sammansatt av delar från detta projekt, syftar till att åskådliggöra hela produktionskedjan. Vi eliminerar mellanhänderna, som gatuförsäljarna brukar säga. Vi äger gårdarna som förser arbetarna med mat, gruvorna som förser våra smältugnar och bomullen till våra uniformer. En helhetskedja, med fokus på försäljning och distribution av vår slutprodukt. Några frågor?”"
 land_ownership_law_events.16.a:0 "Mellanledarna kommer att bli ett minne blott."
 land_ownership_law_events.16.b:0 "Arbetstagarna kommer att behöva ytterligare skyddsåtgärder."
 land_ownership_law_events.16.c:0 "Ett intressant förslag. Vi antar det."
 land_ownership_law_events.17.t:0 "Familjen kommer alltid i första hand"
 land_ownership_law_events.17.d:0 "En rättstvist om[SCOPE.sLaw('current_law_scope').GetName]  har brutit ut mellan några familjer. De tidiga nybyggarna gör alla anspråk på samma mark i [SCOPE.sState('claimed_state').GetName]. Tvisten har satt lagstiftningen i fråga."
 land_ownership_law_events.17.f:0 "Tre anspråk, alla utfärdade av samma kontor, hamnade på domarens skrivbord. Uppgifterna stämde: alla tre gällde samma tomt. Var och en bar en annan underskrift. Domaren kände väl igen de där kontoristernas handstil. Det måste säkert vara ett misstag. Men en så enkel förklaring skulle inte kunna stilla de vilda blickarna i familjens matriarkers ögon."
 land_ownership_law_events.17.a:0 "Upphäva stämningarna och ordna med skadestånd."
 land_ownership_law_events.17.b:0 "Ta reda på vem som undertecknade först och tilldela denne marken."
 land_ownership_law_events.17.c:0 "Dela upp marken mellan alla tre."
 land_ownership_law_events.18.t:0 "Bondbefolkningen – i ny skepnad"
 land_ownership_law_events.18.d:0 "[SCOPE.gsInterestGroup('landowners_ig').GetName]En åsiktskonflikt har brutit ut i [SCOPE.sState('capital_scope').GetName]. Radikala röster på landsbygden har kritiserat lagarna[SCOPE.sLaw('current_law_scope').GetName] för att de främjar ett herre-tjänare-förhållande med ."
 land_ownership_law_events.18.f:0 "”Pfft. Vi jobbar alldeles för hårt för den där madamen. Allt jag säger är att om jag ville ha en kvinna som tog allt jag jobbat för, kedjade fast mig vid en säng och kallade sig min härskarinna, skulle jag hellre vara skyldig henne pengar först.” \n\n”Det närmaste bordellen ligger tre städer bort.” \n\n”Åh, jag tänkte på en brudgåva.”"
 land_ownership_law_events.18.a:0 "Kanske är det dags för en översyn."
 land_ownership_law_events.18.b:0 "Människor kommer att arbeta i enlighet med vad de är värda."
 land_ownership_law_events.18.c:0 "Eftergifter får inte förhindra revolutionen."
 je_government_petition:0 "Regeringsframställning"
 je_government_petition_status:0 "De[SCOPE.gsInterestGroup('government_petition_ig').GetName]  driver en kampanj för[SCOPE.sLaw('government_petition_law').GetName]att  ska antas."
 je_government_petition_reason:0 "Som en lojal del av regeringens [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]sammansättning driver[SCOPE.gsInterestGroup('government_petition_ig').GetName]  en kampanj för[SCOPE.sLaw('government_petition_law').GetName]att  ska antas. \n\nOm[SCOPE.sLaw('government_petition_law').GetName]  antas kommer[SCOPE.gsInterestGroup('government_petition_ig').GetName]  att bli mycket nöjd, men om denna kampanj ignoreras kommer nationen att drabbas av påföljder, som kan gå så långt som att[SCOPE.gsInterestGroup('government_petition_ig').GetName]  avgår från regeringen."
