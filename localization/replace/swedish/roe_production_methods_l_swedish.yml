 concept_cloudsilver_additives_desc:0 "Early forms of [GetGoods('blubber').GetName]-based fuels were sticky and rife with impurity. This would lead to inconsistent fuel-line flow and uneven burn, marked by the engine emitting a hollow metallic tapping known as 'knocking'.\n\nBy infusing the blubber mixture with a small amount of [GetGoods('cloudsilver').GetName], the result is a lighter fuel mixture with a more even flow and a more efficient burn. These methods would eventually be perfected by the exiled [GetCulture('vozi').GetName] artificer Kiras Zephilien."
