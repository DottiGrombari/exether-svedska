 decree_events.2.t:0 "De grå dagarna"
 decree_events.2.d:0 "Bättre vägnät har lett till en ökning av trafiken [SCOPE.sState('decree_state').GetName]i området, vilket i sin tur har medfört en ökning av föroreningarna."
 decree_events.2.f:0 "”I den postindustriella tidens dystra dagar kvarstår mörkret. Natten blir ljusare än dagen, upplyst av gatubelysning, väl upplysta medelklassbostäder och lägereldar som tänds i de mindre gynnade stadsdelarna. Men dagarna… dagarna har förlorat solens oändliga glans, som fram till nu varit evigt oavbruten. \n\nRök stiger inte bara från fabrikerna, utan även den snabba vinden från trafiken lyfter den grå himlen ovanför människornas hosta.”"
 decree_events.2.a:0 "[SCOPE.gsInterestGroup('ecology_ig').GetName] har föreslagit att omedelbara åtgärder måste vidtas."
 decree_events.2.b:0 "Inget som en bergstur inte kan lösa."
 addressed_pollution_modifier:0 "Oro för miljöföroreningar"
 ignored_pollution_modifier:0 "Inga åtgärder mot föroreningar"
 good_pollution_modifier:0 "Åtgärder mot föroreningar"
 decree_events.3.t:0 "Från grunden"
 decree_events.3.d:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetName]En man av låg börd har stigit fram som en populär ledare för , och vissa är inte särskilt nöjda med denna sociala rörlighet."
 decree_events.3.f:0 "[SCOPE.gsInterestGroup('ig_intelligentsia').GetNameNoFormatting]”Först bodde han hos sin fattiga, änka till mor, sedan hos sin hemska farbror, och sedan dog de båda, sägs det, och han blev föräldralös och flydde från delstaten. Därefter sågs han som vinhandlare, trots sin unga ålder, och vissa säger att han försökte bli någon sorts lagens man. Sedan försökte han sig på att skriva, vilket han har haft måttlig framgång med, och nu… nu ser ni honom här, ledare för , äntligen i frid.”"
 decree_events.3.a:0 "Han har förtjänat det här jobbet."
 decree_events.3.b:0 "En rörande historia, visserligen, men han förtjänar inte någon särbehandling."
 Copperfield:0 "Copperfield"
 david_copperfield_modifier:0 "En ledare av lägre börd som fick stöd"
 ignored_david_copperfield_modifier:0 "Den förbisedde ledaren av låg börd"
 decree_events.4.t:0 "Från havets hjärta"
 decree_events.4.d:0 "En ny amiral har gjort sin entré i hamnarna i [SCOPE.sState('decree_state').GetName], där han mottagits med stor entusiasm av sina kolleger. Men även  s[SCOPE.sCharacter('noble_character').GetFullName] brorson har gjort gällande att han hyser ett mycket stort intresse för samma titel."
 decree_events.4.f:0 "”Det finns berättelser – om man lyssnar noga – som låter så omöjliga att de borde hör hemma i en roman. Det fanns en pojke, säger sjömännen, som började sitt liv på en valfångare och var en av de åtta män som lyckades återvända från en fruktansvärd, fruktansvärd resa.\n\nI åratal visste ingen var han befann sig, han ville inte prata och vägrade att se någon i ögonen. Därefter tjänstgjorde han på sex olika valfångstfartyg och förde dem alla hem välbehållna.”"
 decree_events.4.a:0 "Männen kommer att följa efter honom."
 decree_events.4.b:0 "Vi borde inte ställa till med något[SCOPE.sCharacter('noble_character').GetLastName]bråk."
 social_mobility_modifier:0 "En ny amiral"
 decree_events.5.t:0 "En natt på operan"
 decree_events.5.d:0 "Ett uppdrag har lämnats till den ansedda[SCOPE.sBuilding('decree_building').GetName]  i[SCOPE.sState('decree_state').GetName]  för att få en av deras främsta kompositörer att skriva en nationell opera som fångar storheten i [ROOT.GetCountry.GetName]."
 decree_events.5.f:0 "”Inte ens de hårdaste kritikerna kommer att kunna hitta en enda brist i harmonin, tonarten eller rytmen i mitt mästerverk,[SCOPE.GetRootScope.GetCountry.GetCustom('opera_noun')] [SCOPE.GetRootScope.GetCountry.GetCustom('opera_genitive')] . En berättelse om kärlek, död – odödliga teman som hör hemma[ROOT.GetCountry.GetAdjectiveNoFormatting]i  legender – och dess hjältar kommer att leva kvar i minnet för alltid tack vare dessa magnifika arior!”"
 decree_events.5.a:0 "Ett verkligen imponerande förslag!"
 decree_events.5.b:0 "En jättebra idé… som någon annan skulle kunna förverkliga till en lägre kostnad."
 decree_events.5.c:0 "Borde inte detta vara en kostnadsfri tjänst för hela nationen?"
