l_swedish:
 ig_mages:0 "Mages"
 ig_mages_only_icon:0 "@mages!"
 ig_mages_desc:0 "Powerful spellcasters such as archmages, warlock and sorcerers with an interest in arcane advancement and magical proliferation."
 ig_clans:0 "Tribes"
 ig_clans_only_icon:0 "@clans!"
 ig_clans_desc:0 "Powerful families with widespread influence in the community."
 ig_blood_court:0 "Blood Court"
 ig_blood_court_desc:0 "Wealthy Pure-Vampires which typically lord over a notable number of \"flesh cattle\" and are of the view that the Midnight Court is far too lenient and sympathetic to the uninitiated. The blood tithe is too small and Vampires should not care for maintaining a level semi-consensual rule with the Noric people."
 ig_fang_court:0 "Fang Court"
 ig_fang_court_desc:0 "The military arm of Dreadmoor. Comprised of Vampire Commanders and their \"flesh cattle\" soldiers to which they have secured the loyalty of. Be it through fear, promise of superior status in society, or other such matters. Their concerns are maintaining their influence."
 ig_gearheart_court:0 "Gearheart Court"
 ig_gearheart_court_desc:0 "A majority halfbreed section of the Court with some token Purebreed participation. These Vampires are industry-minded and wish to elevate humans slightly in order to put them to better use in manufactories."
 ig_whiteheart_court:0 "Whiteheart Court"
 ig_whiteheart_court_desc:0 "Primarily half-breeds but a select few Purebreed Vampires have also joined this section of the Court. Its entire ideology revolving around reform to elevate humans of particular loyalty and acclaim to political status as a means to drive deeper devotion to their Lords. It is both a charitable approach as well as one carrying ulterior motives."
 ig_commoner_tribunate:0 "Commoner Tribunate"
 ig_commoner_tribunate_desc:0 "The assembly of which the majority of society is inside and the one who's voice matters the least. Their presence is a token gesture of limited inclusion into politics of the state."
 ig_blackheart_society:0 "Blackheart Society"
 ig_blackheart_society_desc:0 "A recent development in Court politics, the Blackhearts are a collection of halfbreed Vampires who are lumped in with the flesh cattle of which they rabble rouse to push for better working conditions. The halfbreeds primarily using flesh-cattle to fill out their numbers during demonstrations against industry owners."
 ig_bound_court:0 "Bound Court"
 ig_bound_court_desc:0 "Those who have become Vampires via infection from Pure Vampires and have managed to secure a stable social position in Dreadmoor society. Their primary interests are ensuring they continue to be able to etch out a secure living under their purebreed Overlords."
 ig_avarice_cathedral:0 "Cathedral of Avarice"
 ig_avarice_cathedral_desc:0 "The ecclestical branch of the Dreadmoor. The cathedral's name evokes fear and terror in the hearts of human and vampires alike. Doling out extreme and draconian punishments such as crucifixion to branded heretics and non-believers."
 ig_midnight_court:0 "Midnight Court"
 ig_midnight_court_desc:0 "The midnight court wants to keep the vampire demense stable, while advancing plans for domination of Noricum. Their numbers consist of the oldest, wisest, and most powerful purebreed Vampires of the Realm. Their power is largely uncontested by all but the Blood Court who still pale in comparison to them. It will take time to grind away at their influence if that is desired."
 ig_bloomwardens:0 "Bloomwardens"
 ig_bloomwardens_desc:0 "The Bloomwardens are protectors of The Rose Court's sacred virtues, upholding chivalry, beauty, and noblesse oblige. Empowered by divine roses, they defend the faith, guide the nobility, and ensure that virtue and beauty prevail against corruption and chaos."
 ig_hasal:0 "Templars"
 ig_hasal_desc:0 "Within Raviki society there is no higher honor than having directly aided 'The Savior of Gnomekind' in his Crusade against Humanity. The Legion is comprised of Raviki who claim to have served under Hasal himself or beneath another who had. Authority figures within the Legion thus maintain extreme levels of influence in the management of the state...provided they continue to display their unmatched dominance on the battlefield."
 ig_astral_consortium:0 "Astral Consortium"
 ig_astral_consortium_desc:0 "The great guilds of the Astral Consortium are international financial behemoths. They have their own political aims, even waging more or less open conflicts against the competition. It's no exaggeration to say that the great guilds are what shapes the reality and life of an ordinary person in eastern Zalaron.  The Astral Consortium was set up to be the guilds' united front, and its name has become synonymous with their supremacy."
 ig_kinfold:0 "Kinfold"
 ig_kinfold_desc:0 "WIP"
 ig_magnates:0 "Magnates"
 ig_magnates_desc:0 "WIP"
 ig_nobility:0 "Nobility"
 ig_nobility_desc:0 "WIP"
 ig_adventurer_guild_members:0 "Adventurers Guild"
 ig_adventurer_guild_members_desc:0 "Comprised of the Adventurers, Clerks and Craftspeople that form the majority of the Guilds personnel"
 ig_guild_elite:0 "Guild Investors"
 ig_guild_elite_desc:0 "The Board of Directors holds great sway in the Guild, as do investors, suppliers and major clients"
 ig_puritan_guard:0 "[InterestGroup.GetCustom('puritan_guard_devout')]"
 ig_puritan_guard_desc:0 "An organized fellowship of true believers, religious patrons, and witch hunters."
 ig_generic_puritan_guard:0 "Puritan Guard"
 ig_generic_puritan_guard_desc:0 "An organized fellowship of true believers, religious patrons, and witch hunters."
 ig_faithful_puritan_guard:0 "True Faithful Puritan Guard"
 ig_honorable_puritan_guard:0 "Right Honorable Puritan Guard"
 ig_independent_puritan_guard:0 "Prime Independent Puritan Guard"
 ig_druids:0 "Druids"
 ig_druids_desc:0 "Representing the self-styled protectors of the wilds, Druids present a unified front in their shared defence of the natural order."
 ig_monks:0 "Monks"
 ig_monks_desc:0 "Across a broad ascetic base, Monks accept all who reject bodily pleasures for spiritual enlightenment."
 ig_cultists:0 "Cultists"
 ig_cultists_desc:0 "Betwixt smoke-filled backrooms and masked meetings, the Cult finds support with both the elite and the downtrodden."
 ig_akini:0 "Light-Speakers"
 ig_akini_desc:0 "[Concept('concept_lightspeaker', '$concept_lightspeakers$')] are itinerant priests who serve communities of Akinite faithful."
 ig_church_of_man:0 "Church of Man"
 ig_church_of_man_desc:0 "The Church of Man originated as an organized form of the various native beliefs of humans in [concept_noricum], incorporating the most worshipped deities and traditions on the continent into a united faith. Since then, the Church of Man has spread through the Dumonian conquests of [concept_zalaron], occasionally integrating new foreign gods into the pantheon."
 ig_sun_cult:0 "Cult of the Sun"
 ig_sun_cult_desc:0 "Within Urik's pantheon; Kamiros the Radiant is the god of light, justice and hope. His doctrine holds that righteousness is absolute, and that sin must be burned away without mercy. His most zealous followers see the world in stark contrast, virtue and sin. Those who live with unwavering discipline and unblemished conduct are said to ascend to Kamiros' eternal bastion of light"
 ig_commerce_cult:0 "Cult of Commerce"
 ig_commerce_cult_desc:0 "Within Urik's pantheon; Mavelis the Gilded is the goddess of wealth, commerce, and prosperity. Her most devout followers believe moral acts like generosity are rewarded, with good fortune going to those who display good virtue.  Those who lead virtuous lives join Mavelis' divine domain in the afterlife, such as Saint Caelia the Benevolent."
 ig_foragers:0 "Foragers"
 ig_foragers_desc:0 "WIP"
 ig_asvean:0 "Asvëan"
 ig_asvean_desc:0 "The Asvëan are a ranger guild that once held much sway over the forests of the Eastern Steepcliff Coast."
 ig_independent_smallholders:0 "Independent Smallholders"
 ig_independent_smallholders_desc:0 "The rural populist class who are politically aligned with their agrarian livelihoods and making their voices heard on the national stage."
 ig_thalorian_farmers:0 "Frontiersmen"
 ig_thalorian_farmers_desc:0 "The Thalorian frontiersmen, hardy farmers of the Thalorian reaches, led humanity’s push into western Zalaron. With musket and plow, they spread democracy and freedom, forging a legacy of self-reliance and defiant populism."
 ig_greenthumbs:0 "Greenthumbs"
 ig_greenthumbs_desc:0 "The Greenthumbs, hardworking farmers of the halfling countryside, tend their fields and orchards with care. With spade and scythe, they nurture their villages and keep the hearths full, shaping a legacy of self-reliance, community, and smallfolk ingenuity."
 ig_captains:0 "Captains"
 ig_captains_desc:0 "The Captains, hardened sailors and freebooters, command respect on sea and shore alike. In the rough order of pirate realms, they are the sword-arm of the nation, steering fleets, drilling crews, and carving authority from the barrel of a cannon."
 ig_smugglers:0 "Smugglers"
 ig_smugglers_desc:0 "The Smugglers, traders and petty merchants who deal in contraband and backroom bargains, profit from the shadows of commerce. They move goods others will not, keeping markets alive where law and empire falter."
 ig_fishermen:0 "Fishermen"
 ig_fishermen_desc:0 "The Fishermen, hardy folk of the coasts and rivers, earn their living from the bounty of the waters. With net and hook they provide for their villages, braving storms and tides to keep their communities fed."
 ig_runeseers:0 "Runeseers"
 ig_runeseers_desc:0 "WIP"
