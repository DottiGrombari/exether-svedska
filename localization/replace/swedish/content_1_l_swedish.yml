 anarchist_terrorism:0 "Anarkistisk terrorism"
 anarchist_assassination:0 "Anarkistiskt mord"
 anarchist_assaination_opposition_approval:0 "Anarkistiskt mord"
 promised_to_lower_taxes:0 "Kortsiktiga skattesänkningar"
 promised_to_lower_taxes_poll_tax:0 "Kortsiktiga skattesänkningar"
 tax.1.t:0 "Beskattning är stöld"
 tax.1.d:0 "En marginalgrupp inom  har vunnit anmärkningsvärt stort genomslag. De förespråkar avskaffandet av all beskattning och likställer den med stöld från statens sida[SCOPE.sPoliticalMovement('antitax_rebels').GetName]. Deras avsikt verkar vara att förhindra alla skattereformer som inte innebär ett fullständigt avskaffande."
 tax.1.f:0 "”Som privatperson och suverän[ROOT.GetCountry.GetAdjectiveNoFormatting]medborgare samtycker jag inte till att den så kallade ’regeringen’ plundrar mina hårt förvärvade tillgångar. Det är ett brott inte bara mot mina rättigheter, utan också mot den fria marknaden, som utgör själva grunden för den grundläggande ekonomin.”"
 tax.1.a:0 "Men vem skulle bygga vägarna?"
 tax.1.b:0 "Lova kortsiktiga skattesänkningar."
 tax.2.t:0 "Patriotisk beskattning"
 tax.2.d:0 "[SCOPE.sDiplomaticPlay('war_scope').GetName]De[SCOPE.gsInterestGroup('patriotic_military').GetName]  samlar stöd för  lagen[SCOPE.sLaw('current_law_scope').GetName] och framhåller att den nya skatten är avgörande för att stödja[ROOT.GetCountry.GetName]  i ."
 tax.2.f:0 "”Krigets livsnerv är obegränsade ekonomiska resurser. Vi kan inte hoppas på att lyckas i vår kamp för att hävda vår suveränitet om vi inte kan skaffa fram de medel som krävs för att stödja våra modiga soldater; skulle ni skicka ut våra pojkar med ingenting annat än pinnar och trasor?”"
 tax.2.a:0 "Avvikare saknar lojalitetskänsla."
 tax.2.b:0 "Beröm dem[SCOPE.gsInterestGroup('patriotic_military').GetName]för deras patriotism."
 patriotic_taxation:0 "Patriotisk beskattning"
 patriocitc_taxation_ig:0 "Offentliga utmärkelser"
 tax.3.t:0 "Döden och skatterna"
 tax.3.d:0 "[SCOPE.sCharacter('death_and_taxes_leader').GetFullName] har plötsligt avlidit medan han arbetade med utkastet till[SCOPE.sLaw('current_law_scope').GetName]lagförslaget."
 tax.3.f:0 "”En människa har dött! Kroppen har knappt hunnit kallna, och ni talar redan om att stifta lagar. Kan ni inte lägga politiken åt sidan så att vi kan sörja i fred?”"
 tax.3.a:0 "Låt oss sörja förlusten av en stor ledare."
 tax.3.b:0 "Vi bör uppfylla[SCOPE.sCharacter('death_and_taxes_leader').GetHerHis] den döendes sista önskan."
 death_and_taxes_mod:0 "Döden och skatterna"
 tax.4.t:0 "Socialt banditvälde"
 tax.4.desc:0 "Invånarna i[SCOPE.sState('bandit_state').GetName]  berättar historien om en väghjälte som stjäl från de rika och ger till de fattiga. Legenden sprider sig snabbt över hela [ROOT.GetCountry.GetName], vilket undergräver stödet för  lagen[SCOPE.sLaw('current_law_scope').GetName]."
 tax.4.f:0 "”Han är så stilig! Till och med när han stal pärlorna från mitt halsband kunde jag inte låta bli att bli alldeles förvirrad. Han lämnade en enda röd ros i mitt knä innan han försvann ut i natten med ett elegant svep av sin kappa.”"
 tax.4.a:0 "Jaga rätt på banditen."
 tax.4.b:0 "Polisen kommer att statuera ett exempel med banditen."
 tax.4.c:0 "Försök att bekämpa fattigdomen i [SCOPE.sState('bandit_state').GetName]."
 tax.4.d:0 "Fördubbla insatserna för att bekämpa fattigdomen."
 social_banditry:0 "Socialt banditvälde"
 poverty_relief_mod:0 "Bekämpning av fattigdom"
 tax.5.t:0 "Filantropi"
 tax.5.d:0 "De[concept_upper_strata]har beslutat att ge generösa donationer till de fattiga. Många av dem förespråkar till och med lagen[SCOPE.sLaw('current_law_scope').GetName] och anser att den skulle vara ett rättvist sätt att omfördela välståndet."
 tax.5.f:0 "”Vi har så mycket, och de har så lite. Vi är fortfarande rika även när vi ger generöst – kommer du verkligen att sakna några tusen pund? Tänk på hur lite de pengarna betyder för dig, och hur mycket de skulle kunna betyda för en svältande mamma och hennes barn.”"
 tax.5.a:0 "Uppmuntra välgörenhetsbidrag."
 tax.5.b:0 "Utnyttja deras stöd för [SCOPE.sLaw('current_law_scope').GetName]."
 philanthropy_law:0 "Filantropi"
 philanthropy_mod:0 "Att ge generöst"
 tax.6.t:0 "Tillfällig förlägenhet"
 tax.6.d:0 "Ambitiösa[concept_middle_strata]medborgare motsätter sig detta[SCOPE.sLaw('current_law_scope').GetName]med motiveringen att de, när de oundvikligen blir rika kapitalister, kommer att beskattas alltför hårt."
 tax.6.f:0 "”Varför motsätter du dig lagen, min vän? Du är ju inte rik!” \n\n”Inte än, men så snart mitt nästa affärsprojekt tar fart kommer jag att bli en förmögen man. Och när det händer vill jag verkligen inte bli beskattad så hårt.”"
 tax.6.a:0 "De borde vara mer realistiska."
 tax.6.b:0 "Övertyga dem med en skattesänkning."
