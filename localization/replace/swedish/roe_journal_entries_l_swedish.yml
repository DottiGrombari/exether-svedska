 empower_urban_clergy_button_desc:0 "The [Concept('concept_lightspeaker', '$concept_lightspeakers$')] lack of a central, unifying authority makes them untrustworthy allies during times of unrest. Those who will not accept doctrinal unity will face fines or imprisonment.\n\n#bold The progress bar will #yellow decrease#! #red 25% slower.#!#!"
