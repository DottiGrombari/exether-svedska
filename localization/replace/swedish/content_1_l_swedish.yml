 je_rubber:0 "Utvidga gummiindustrin"
 je_rubber_reason:0 "Användningsområdena för gummi är oändliga, utbudet är begränsat och efterfrågan är stor. Vi har goda förutsättningar att bli en av världens främsta leverantörer av detta fantastiska material!"
 rubber_production_modifier:0 "Gummibom"
 production_tech_events.1.t:0 "Gummibom"
 production_tech_events.1.d:0 "Den senaste tidens expansion av  i[SCOPE.sState('rubber_state').GetName][SCOPE.sBuilding('rubber_building').GetName]  har gett mycket lovande resultat.[ROOT.GetCountry.GetName]  ser ut att bli världsledande inom gummiproduktion."
 production_tech_events.1.f:0 "”Frågan är inte vad man kan göra med gummi, utan snarare vad man inte kan göra med det. Dess användningsmöjligheter är oändliga, och det kommer säkert att bli det grundläggande materialet i den moderna världen. Våra skarpaste hjärnor arbetar med att ta fram nya tillämpningar för detta mångsidiga material.”"
 production_tech_events.1.a:0 "Vi behöver mer gummi!"
 production_tech_events.1.b:0 "Vilka andra användningsområden skulle vi kunna hitta för gummi?"
 je_mechanized_farming:0 "Mekanisera jordbruket"
 je_mechanized_farming_reason:0 "Jordbrukets framtid är här! Tack vare fantastisk modern teknik kan vi avsevärt förbättra jordbruksproduktionen. Med ett så enormt livsmedelsöverskott kommer väl ingen någonsin att behöva gå hungrig igen!"
 production_tech_events.600.t:0 "Mekaniseringen av jordbruket"
 production_tech_events.600.d:0 "Det storslagna projektet att mekanisera jordbruket över hela landet[ROOT.GetCountry.GetName]är nu avslutat. Aldrig tidigare har man uppnått så rikliga skördar."
 production_tech_events.600.f:0 "”Jag har köpt en helt ny skördetröska!” \n”Det är ju fantastiskt! Tror du att jag skulle kunna få låna den när du är klar med skörden?” \n”Självklart! Jag ger dig nyckeln.” \n”Jag är glad att vi kan samarbeta i sådan perfekt harmoni.”"
 production_tech_events.600.a:0 "Dela ut överskottsmat till de fattiga."
 production_tech_events.600.b:0 "Men skulle avkastningen kunna bli ännu högre?"
 tractor_food_for_the_poor:0 "Fördelning av livsmedelsöverskott"
 tractor_production:0 "Snabb mekanisering"
 je_atmospheric_engine:0 "Atmosfärsmotorn"
 je_atmospheric_engine_reason:0 "En genialisk anordning har uppfunnits, och den kommer garanterat att avsevärt öka produktionen i våra gruvor."
 production_tech_events.601.t:0 "Atmosfärsmotorn"
 production_tech_events.601.d:0 "Tack vare den omfattande införandet av atmosfärsmotorn inom gruvindustrin har produktiviteten nått en rekordhög nivå."
 production_tech_events.601.f:0 "”När ångan först började pumpas och hjulen snurrade med så många varv per minut, var syftet med det man kallar affärsvanor att få människans liv att fungera i harmoni med ångmaskinen och att hennes rörelser skulle kunna mäta sig med maskinens punktlighet.”"
 production_tech_events.601.a:0 "Jag är säker på att vi kan få ut lite mer ur de här maskinerna."
 production_tech_events.601.b:0 "Detta har stora konsekvenser för transportsektorn."
 production_tech_events.601.c:0 "Kanske finns det ett ännu bättre sätt."
 atmospheric_engine_mining:0 "Användning av Atmospheric Engine"
 je_communism_1:0 "Spöket som hemsöker världen"
 je_communism_1_reason:0 "Den ökande förekomsten av socialistiska oroligheter inom[SCOPE.sCountry('root_country').GetName]  har börjat ta form som en rörelse som hotar överklassens makt. Klasskampen har blivit allt mer intensiv i takt med att[SCOPE.sCountry('root_country').GetAdjectiveNoFormatting]  arbetarna anammar den socialistiska rörelsens metoder och principer.\n\n#italic Proletariatets röster ropar efter frihet, jämlikhet och bröd. Arbetare i hela världen, förena er!#!"
