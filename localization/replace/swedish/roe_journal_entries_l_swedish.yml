 je_the_hungry_forties:0 "The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]"
 je_the_hungry_forties_reason:0 "A wave of crop blights has struck Settler's Coast, spurring poor harvests and food shortages. The blight is especially lethal to potatoes, causing them to rapidly decay into a foul-smelling, inedible mush.\n\n#b The Settlerian Potato Blight#!:\nWhilst this [concept_journal_entry] is active, the rate at which the $disease_outbreak$ [concept_harvest_condition] appears in Settler's Coast and Noricum states will be greatly elevated."
