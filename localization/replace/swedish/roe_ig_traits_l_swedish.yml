l_swedish:
 ideology_chivalrous_conservative:0 "Chivalrous Conservatives"
 ideology_chivalrous_conservative_desc:0 "#lore The Bloomwardens sees themselves as one of the pillars of the country, that the faith is above all and that the peasants deserve to be serfs.#!"
 ideology_baaceist:0 "Baaceist"
 ideology_baaceist_desc:0 "#lore This leader believes that true equality can only be achieved through the abolition of magic, the rejection of dead gods and ancient masters, and the guidance of society by a revolutionary vanguard acting in the name of the collective.#!"
 ideology_baaceist_movement:0 "Baaceist"
 ideology_baaceist_movement_desc:0 "#lore This leader believes that true equality can only be achieved through the abolition of magic, the rejection of dead gods and ancient masters, and the guidance of society by a revolutionary vanguard acting in the name of the collective.#!"
 ideology_guild_syndicalist:0 "Guild Syndicalist"
 ideology_guild_syndicalist_desc:0 "#lore This leader believes that industry and agriculture alike should be organized into self-governing guilds, uniting workers in cooperative ownership under a national corporate framework. They reject both aristocratic privilege and unchecked capitalism, seeking a disciplined commonwealth where production is directed by councils of labor for the benefit of the whole.#!"
 ideology_guild_syndicalist_movement:0 "Guild Syndicalist"
 ideology_guild_syndicalist_movement_desc:0 "#lore This group believes that industry and agriculture alike should be organized into self-governing guilds, uniting workers in cooperative ownership under a national corporate framework. They reject both aristocratic privilege and unchecked capitalism, seeking a disciplined commonwealth where production is directed by councils of labor for the benefit of the whole.#!"
 ideology_republican_paternalistic_dragonborn:0 "Protective"
 ideology_republican_paternalistic_dragonborn_desc:0 "#lore This group has little faith in the populus attempting to govern itself, believing they need the guidance of a traditional aristocracy.#!"
 ideology_russian_patriarch:0 "Noblesse Oblige"
 ideology_russian_patriarch_desc:0 "#lore The Bloomwardens sees themselves as one of the pillars of the country, that the faith is above all and that the peasants deserve be serfs.#!"
 ideology_theocratic_moralist:0 "Theocratic"
 ideology_theocratic_moralist_desc:0 "#lore This group has a strong devotion to maintaining both the temporal and ecclesiastical powers of the faith.#!"
 ideology_plutocratic_moralist:0 "Plutocratic Moralist"
 ideology_plutocratic_moralist_desc:0 "#lore This group believes that the pragmatic guiding hand of the free market should guide society.#!"
 ideology_ancestral_moralist:0 "Ancestral Moralist"
 ideology_ancestral_moralist_desc:0 "#lore Kragmorn Priests believe that bureaucrats should adhere to ancestral tradition.#!"
 ideology_ecumenical_moralist:0 "Ecumenical Moralist"
 ideology_ecumenical_moralist_desc:0 "#lore Unlike the cold and jealous faiths that would set one name above all others, the Church of Man grows and shifts like the river that swells with each stream it gathers. It does not shun the gods and men of foreign lands, but takes them into its fold, turning them to the great design.#!"
 ideology_goblin_moralist_governorate:0 "Goblin Moralist"
 ideology_goblin_moralist_governorate_desc:0 "#lore Goblin Priests favor upholding regional traditions. Whilst Kharaa Ur remains ruled by hobgoblins, they staunchly oppose the governorate imposing their religion upon the populace.#!"
 ideology_hobgoblin_moralist:0 "Hobgoblin Moralist"
 ideology_hobgoblin_moralist_desc:0 "#lore This group has a strong belief in a religious moral order and views diversity of opinion and cultures as a threat to this order.#!"
 ideology_orc_militancy:0 "Orc Militancy"
 ideology_orc_militancy_desc:0 "#lore The orcs have a militarized movement that will support having a strong national army.#!"
 ORC_MILITANCY:0 "Orc Militancy"
 ideology_orc_moralist:0 "Orc Moralist"
 ideology_orc_moralist_desc:0 "#lore The orcs believe all have an equal connection with the world and respect the practice of other faiths.#!"
 ideology_pious_druidic:0 "Druidic"
 ideology_pious_druidic_desc:0 "#lore Druids prioritize balance with nature above all else.#!"
 ideology_pious_knowledge:0 "Scholarly"
 ideology_pious_knowledge_desc:0 "#lore This group believes religious principles are paramount moral truths and that knowledge should guide society.#!"
 ideology_pious_individualist:0 "Pious Individualist"
 ideology_pious_individualist_desc:0 "#lore This group believes each person is responsible for their own fate and opposes government programs to provide services that can be paid for by the individual.#!"
 ideology_pious_magoclast:0 "Dogmatic Magoclast"
 ideology_pious_magoclast_desc:0 "#lore This group believes their religious principles are paramount moral truths which should permeate and regulate all of society.#!"
 ideology_corporatist:0 "Corporatist"
 ideology_corporatist_desc:0 "#lore This group believes in the resolution of conflict between classes through the application of religious principles.#!"
 ideology_corporatist_druidic:0 "Druidic Corporatist"
 ideology_corporatist_druidic_desc:0 "#lore This group believes in the resolution of conflict between both classes and nature through the application of druidic principles.#!"
 ideology_corporatist_magoclast:0 "Magoclastic Corporatist"
 ideology_corporatist_magoclast_desc:0 "#lore This group believes in the resolution of class conflicts and the restriction of magic based on religious principles.#!"
 ideology_corporatist_knowledge:0 "Scholarly Corporatist"
 ideology_corporatist_knowledge_desc:0 "#lore This group believes in the resolution of conflict between classes through principles of knowledge and learning.#!"
 ideology_corporatist_inventor:0 "Materialistic Corporatist"
 ideology_corporatist_inventor_desc:0 "#lore This group believes in resolving class conflicts through offering concessions to the less wealthy to allow for upward mobility.#!"
 ideology_matriarchal:0 "Matriarchal"
 ideology_matriarchal_desc:0 "#lore This group believes women are entitled to political authority and that men should obey their mothers and wives.#!"
 ideology_traditional:0 "Traditional"
 ideology_traditional_desc:0 "#lore This group opposes change that upsets long-fostered traditions.#!"
 ideology_hobgoblin_hegemony:0 "Hobgoblin Hegemonists"
 ideology_hobgoblin_hegemony_desc:0 "#lore This group believes that Hobgoblins alone should form the social and political elite of the country."
 ideology_cerunite_hegemony:0 "Human Hegemonists"
 ideology_cerunite_hegemony_desc:0 "#lore This group believes that humans alone should form the social and political elite of the country."
 ideology_vampire_hegemony:0 "Vampire Hegemonists"
 ideology_vampire_hegemony_desc:0 "#lore This group believes that vampires alone should form the social and political elite of the country."
 ideology_liberal_agrarian:0 "Frontier Republican"
 ideology_liberal_agrarian_desc:0 "#lore This group believes that the smallholding farmer class forms the foundation of the country, supporting agarianism as the basis for a free society.#!"
 ideology_liberal_agrarian_halfling:0 "Shire Agrarian"
 ideology_liberal_agrarian_halfling_desc:0 "#lore This group believes that the smallholding farmer class forms the foundation of the country, supporting agarianism as the basis for a free society.#!"
 ideology_luddite_ig:0 "Luddite"
 ideology_luddite_ig_desc:0 "#lore Luddites are opposed to industrial automation, or in more extreme cases to industry itself.#!"
 ideology_dwarf_egalitarian:0 "Dwarven Egalitarian"
 ideology_dwarf_egalitarian_desc:0 "#lore This group believes that equal and humane treatment of people should be a cornerstone of political policy.#!"
 ideology_dwarf_egalitarian_modern:0 "Dwarven Egalitarian"
 ideology_dwarf_egalitarian_modern_desc:0 "#lore This group believes that equal and humane treatment of people should be a cornerstone of political policy.#!"
 ideology_arcanophilic:0 "Arcanophilic"
 ideology_arcanophilic_desc:0 "#lore This group values magical education and will push to expand it whenever possible.#!"
 ideology_selfish_liberal:0 "Selfish Liberal"
 ideology_selfish_liberal_desc:0 "#lore This group wants to remain personally unencumbered by state interference.#!"
 ideology_elitist:0 "Elitist"
 ideology_elitist_desc:0 "#lore This group believes governance is best left to those with the wealth and standing to understand it.#!"
 ideology_admiralty:0 "Admiralty"
 ideology_admiralty_desc:0 "#lore This group values strong naval power and believes maritime dominance is key to economic and political stability.#!"
 ideology_caudillismo:0 "Authoritarian"
 ideology_caudillismo_desc:0 "#lore This group tends to support strongman leaders with military backgrounds over constitutional rule of law.#!"
 ideology_kreva_fingo:0 "Kreva Fingo"
 ideology_kreva_fingo_desc:0 "#lore This group supports the Restaz and believes power belongs in the hands of the warrior class.#!"
 ideology_goblin_jingoist:0 "Goblin Jingoism"
 ideology_goblin_jingoist_desc:0 "Jingoism in the Far West mandates the complete and utter mobilization of every aspect of society in times of great strife. Harkening back to the times of the Great Ogre Invasions in Kharaa Ur."
 ideology_hasal:0 "Patronizing"
 ideology_hasal_desc:0 "This group believes that they should protect the vulnerable against imperialism, whether they want it or not."
 ideology_papal_paternalistic:0 "Baronial"
 ideology_papal_paternalistic_desc:0 "#lore This group supports the authority of religious leaders and the traditional hierarchy of the faith.#!"
 ideology_paternalistic_hobgoblin:0 "Hobgoblin Paternalistic"
 ideology_paternalistic_hobgoblin_desc:0 "#lore This group has little faith in the populace attempting to govern itself, believing they need the guidance of a traditional hobgoblin aristocracy.#!"
 ideology_hobgoblin_stratocratic:0 "Hobgoblin Stratocratic"
 ideology_hobgoblin_stratocratic_desc:0 "#lore This group favors maintaining a hierarchy in society through traditional forms of taxation, labor relations and a strong military.#!"
 ideology_goblin_stratocratic:0 "Goblin Stratocratic"
 ideology_goblin_stratocratic_desc:0 "The entrenched Elite of Goblin Societies remain intent on keeping their leverage over the masses. Equally eager to mobilize hundreds of thousands to defend their powerbase as much as they are eager to oppress those same thousands that'd die for them."
 ideology_ig_traditionalist:0 "Traditionalist"
 ideology_ig_traditionalist_desc:0 "#lore This group opposes change that upsets long-fostered traditions.#!"
 ideology_stratocratic_clans:0 "Stratocratic"
 ideology_stratocratic_clans_desc:0 "#lore This group favors maintaining a hierarchy in society through traditional forms of taxation and labor relations.#!"
 ideology_patriotic_pb:0 "Patriotic"
 ideology_patriotic_pb_desc:0 "#lore This group is fiercely devoted to its country and wants harsh measures against those who would spread dissent.#!"
 ideology_dwarf_reactionary:0 "Dwarven Reactionary"
 ideology_dwarf_reactionary_desc:0 "#lore This group is nostalgic for a past, real or imagined, where just kings ruled over a uniform society.#!"
 ideology_dwarf_meritocratic:0 "Guild Meritocratic"
 ideology_dwarf_meritocratic_desc:0 "#lore This group believes success is earned and that those who have achieved it deserve the accompanying responsibility and wealth.#!"
 ideology_anarchical_reactionary:0 "Anarchical Reactionary"
 ideology_anarchical_reactionary_desc:0 "#lore This group opposes both modern state power and progressive changes, seeking a return to a perceived purer, decentralized past through radical means.#!"
 ideology_guild_rule:0 "Guild Rule"
 ideology_guild_rule_desc:0 "#lore This group favors the steady rule of the Guild that runs their nation.#!"
 ideology_guild_reciprocity:0 "Guild Reciprocity"
 ideology_guild_reciprocity_desc:0 "#lore This group pays the Guild their dues, and in return expects the Guild to pay theirs.#!"
 ideology_magoclast:0 "Magoclast"
 ideology_magoclast_desc:0 "#lore This interest group believes that magic needs to be curbed and controlled.#!"
 ideology_skeptic:0 "Skeptic"
 ideology_skeptic_desc:0 "#lore This interest group believes that magic needs to treated with caution and care.#!"
 ideology_corporate_sovereignty:0 "Corporate Sovereignty"
 ideology_corporate_sovereignty_desc:0 "#lore This group believes in total vertical integration of society under guild control. They view their workers not as slaves but as 'corporate citizens,' whose every need is provided for - at the cost of absolute loyalty and compliance. To them, traditional government should merely facilitate guild authority.#!"
 ideology_malthusian:0 "Pragmatic Individualist"
 ideology_malthusian_desc:0 "#lore This group subscribes to the economic theory that any government effort to alleviate poverty is inherently self-defeating due to subsequent population growth.#!"
 ideology_republican_paternalistic:0 "Paternalistic Republican"
