 je_rivierling_unrest:0 "A Small Problem"
 je_rivierling_unrest_reason:0 "Halfling nationalism is on the rise, and Rivierling elites are maneuvering for greater representation in government. If we allow these movements to become too powerful we may have to make an uncomfortable compromise."
 je_great_gavkhan:0 "The Khan of Khans"
 je_great_gavkhan_reason:0 "The land of Gavkhan is in turmoil. For generations, our goblin kin have battled fiercely for dominance, but now, with the changing tides of the nightfall, the fires of war burn hotter than ever before. Local warlords rally their forces, each determined to unite the region under their banner and claim the exalted title of Khan of Khans."
 gavkhan_formed:0 "Has formed #bold Great Gavkhan#!"
 je_thalorian_crusade:0 "Third Thalorian Crusade"
 je_thalorian_crusade_reason:0 "The Thalorian Crusades mark a series of brutal conflicts between the gnomes and Thalorian humans. The first crusade began when Hasal Nezzelech taught the gnomes the dark art of necromancy, empowering them to repel human incursions and reclaim their sacred woods. This initial victory emboldened the gnomes and left the Thalorians reeling.\n\nIn the second crusade, the gnomes unleashed the Soulwrought—resurrected humans encased in metal bodies—against the Thalorian forces. The devastation was immense, fracturing the western reaches of the Thalorian Empire and leaving a scar on the land and its people.\n\nNow, the third crusade ignites, with the gnomes determined to dismantle what remains of the Eastern Thalorian Empire. As both sides prepare for another brutal confrontation, the fate of the empire hangs in the balance, and the echoes of past conflicts threaten to shape the future in unforeseen ways."
 thalorian_crusade_status_desc_RAV:0 "Finish Hasal's vision, the age of Gnomes draws near!"
 thalorian_crusade_status_desc_TLE:0 "Thaloria is not yet lost, its fire burns eternal!"
 thalorian_crusade_status_desc_DRI:0 "We join our brothers in destroying Thaloria!"
 thalorian_crusade_status_desc_GRO:0 "For the sake of our Groves, Thaloria must fall."
 thalorian_crusade_status_desc_TTN:0 "For the sake of our Groves, Thaloria must fall."
 thalorian_crusade_status_desc_EKE:0 "For the sake of our Groves, Thaloria must fall."
 je_thalorian_crusade_lobby:0 "As the third crusade ignites, the gnomes of Ravik are determined to dismantle what remains of the Eastern Thalorian Empire."
 je_colonial_administration:0 "Establish Locari Colony"
 je_colonial_administration_reason:0 "In order to best leverage our rule over our colonial holdings, a #bold Colonial Administration#! may be established over a given region of Exether. #bold Colonial Administrations#! will expand into neighboring [Concept('concept_decentralized_nation', '$concept_decentralized_nations$')] on their own, and may be given jurisdiction over our other regional holdings.\n\n#lore The Scramble for the untamed wilds of Exether is underway in earnest. Every power worth a hoot is seeking slices of the world as more jewels in their crowns. Rich in untapped resources and filled with people yet to be put to work, power and prestige are the prizes for the victors. Make no mistake: blood will be spilled long before the scramble ends. Exether awaits.#!"
