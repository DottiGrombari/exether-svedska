 transfers_treasury_to_eic_diplo_tt:0 "Innehållet i [SCOPE.sCountry('target_country').GetName]'s[concept_treasury](@money![SCOPE.sCountry('target_country').GetGoldReserves|K]) överförs till [ROOT.GetCountry.GetName]"
 strike.1.t:0 "Strike!"
 strike.1.d:0 "Arbetarna inom branschen[SCOPE.sBuilding('prime_strike_workplace').GetName]har fått nog av sina dåliga arbetsvillkor. Tillsammans med fackförbundet[SCOPE.gsInterestGroup('unions_ig').GetName] har de inlett en branschomfattande strejk i [SCOPE.sState('strike_state').GetName]."
 strike.1.f:0 "”Att rädda den som sliter ur de själviskas grepp är ett uppdrag värdigt de ädlaste och bästa bland vårt folk. Är du villig att ta på dig detta ansvar och, med förtroende för stödet från de trogna riddare som svurit sin ed, arbeta med alla de förmågor du besitter för att dessa principer ska segra bland människorna?”"
 strike.1.a:0 "Inled förhandlingar med de strejkande."
 strike.1.b:0 "Strejkerna måste stoppas."
 strike.2.t:0 "Strejk: Arbetsmarknadsförhandlingar"
 strike.2.desc:0 "Efter ingående diskussioner med fackföreningsledarna har dessa gått med på att avbryta strejken om något av deras viktigaste krav uppfylls."
 strike.2.flavor:0 "De[SCOPE.gsInterestGroup('industrialist_ig').GetName]som berövar oss i stor skala har också makten att styra regeringen och legalisera sina stölder. Vi som arbetar hårdast och producerar mest har minst; vi kan driva fabrikerna utan dem, men de kan inte driva dem utan oss!"
 strike.2.a:0 "Löfte om att anta lagen om ålderspension."
 strike.2.b:0 "Lova att anta lagen om lönereglering."
 strike.2.c:0 "Löfte om att anta lagen om tillsynsmyndigheter."
 strike.2.d:0 "Löfte om att anta lagen om arbetstagarskydd."
 strike.2.e:0 "Löfte om att utöka arbetsplatssäkerheten."
 strike.2.f:0 "Löfte om att utvidga socialförsäkringen."
 strike.2.g:0 "Deras krav är oacceptabla."
 strike.3.t:0 "Allmän strejk!"
 strike.3.d1:0 "[SCOPE.sCountry('strike_country').GetName]Eftersom deras krav fortfarande inte har tillmötesgåtts har strejken eskalerat till en landsomfattande generalstrejk. Gruvdriften har i stort sett upphört över hela landet."
 strike.3.d2:0 "[SCOPE.sCountry('strike_country').GetName]Eftersom deras krav fortfarande inte har tillmötesgåtts har strejken eskalerat till en landsomfattande generalstrejk. Industrifabrikerna har i stort sett stängts ner över hela landet."
 strike.3.d3:0 "[SCOPE.sCountry('strike_country').GetName]Eftersom deras krav fortfarande inte har tillmötesgåtts har strejken eskalerat till en landsomfattande generalstrejk. Det har blivit praktiskt taget omöjligt att resa med tåg i hela landet."
 strike.3.f:0 "Arbetare i hela världen, förena er! Ni har inget att förlora utom era bojor!"
 strike.3.a:0 "Katastrofalt!"
 strike.4.t:0 "Strejk: Åtgärder mot strejk"
 strike.4.d:0 "Regeringen, som inte är villig att förhandla med fackföreningarna, har lagt fram förslag på åtgärder som syftar till att få strejken att upphöra."
 strike.4.f:0 "Regeringen har givetvis rätten att, för sin egen överlevnads skull, motverka och förhindra användningen av våld för att uppnå det som, om det överhuvudtaget ska uppnås, bör åstadkommas genom parlamentariska eller politiska metoder. Det finns ingen tid att slösa på hårklyverier om frihetskränkningar."
 strike.4.a:0 "Ge polisen särskilda befogenheter."
 strike.4.b:0 "Uppmuntra strejkbrytande."
 strike.4.c:0 "Vi borde se över vårt tillvägagångssätt."
 strike.5.t:0 "Fackföreningarna firar strejkens framgång"
 strike.5.d:0 "De policyförändringar som utlovats till de strejkande arbetarna övervägs nu seriöst av regeringen. Det verkar troligt att fackföreningens krav kommer att tillmötesgås."
 strike.5.f:0 "Det funkar, grabbar! Vad var det jag sa? Direktaktion ger resultat! Nu firar vi med en pint – det har vi verkligen förtjänat."
 strike.5.a:0 "Bra för dem."
 strike.6.t:0 "Polisen går till angrepp mot strejkande"
 strike.6.d:0 "Under ett våldsamt sammanstöt använde polisen sina nyligen beviljade befogenheter för att öppna eld mot de strejkande arbetarna i ett försök att skingra dem. Många arbetare dödades och flera poliser skadades, men folkmassan lyckades till slut skingras."
 strike.6.f:0 "Skottlossningen var oberättigad och grym, och för att uttrycka det rakt på sak: det var ett fegt, överlagt mord."
 strike.6.a:0 "Eld!"
 strike.7.t:0 "Fackföreningarna demoraliserade av strejkbrytande"
 strike.7.d:0 "Vår strategi att främja strejkbrytande visar sig vara anmärkningsvärt framgångsrik. Många strejkande arbetare tappar sin kampvilja och ger upp sin sak."
 strike.7.f:0 "Vår man kommer att besöka er fabrik för att lära känna verksamheten, ta sig in i fackföreningen och klättra upp i dess led. Han ställer orimliga krav och ser till att fackföreningen ständigt hamnar i trubbel. Om det blir strejk kommer han att vara den som höjer rösten mest av alla, uppmana till våld och dra någon i trubbel. Resultatet blir att fackföreningen kommer att upplösas."
 strike.7.a:0 "Precis som planerat."
 strike.8.t:0 "Strejk: Att hålla löften"
 strike.8.d:0 "Genom att den nya lagen har antagits har regeringen tillmötesgått de strejkande arbetarnas krav."
 strike.8.f:0 "Trots alla sina brister har fackföreningarna gjort mer för mänskligheten än någon annan organisation som någonsin har funnits. De har gjort mer för anständighet, ärlighet, utbildning, mänsklighetens utveckling och för att forma människans karaktär än någon annan sammanslutning av människor."
 strike.8.a:0 "Fackföreningarna borde engagera sig mer i politiken."
 strike.8.b:0 "Det här borde hålla dem nöjda ett tag."
 strike.9.t:0 "Strejk: Att bryta strejken"
 strike.9.d:0 "Strejkarnas kampvilja är fullständigt krossad. De har inte längre någon vilja att fortsätta sin kamp, och strejken har officiellt avblåsts av fackföreningarna."
 strike.9.f:0 "Nu har du haft ditt roliga. Återgå nu till arbetet; din lön har dragits av i motsvarande mån och du kommer att arbeta de timmar som företaget anser lämpliga."
 strike.9.a:0 "De har lärt sig att frukta batongen."
 strike.9.b:0 "Grip de som ligger bakom detta. Det här kommer inte att hända igen."
