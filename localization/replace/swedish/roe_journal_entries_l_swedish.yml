 je_shivathi_satrapy:0 "Vanguard of the South"
 je_shivathi_satrapy_reason:0 "The [ROOT.GetCountry.GetOverlord.GetName] has long remained distant from the affairs of the northern hemisphere, its influence constrained by the vast oceans and shifting tides of history. That is about to change. [ROOT.GetCountry.GetNameNoFlag], a colony purpose-built for expansion, now stands as the Empire’s bridge to the wider world—a vanguard tasked with asserting the dominion of the southern sea elves beyond their traditional waters.\n\nThe directive is clear: [ROOT.GetCountry.GetNameNoFlag] must grow, securing trade, territory, and influence in the north. Economic supremacy and military strength will be rewarded with greater autonomy and imperial favor. Failure, however, is not an option. If the colony falters in its purpose, the Empire’s patience will wear thin, and the consequences will be severe."
 je_shivathi_satrapy_lobby:0 "The [ROOT.GetCountry.GetOverlord.GetName] has long remained distant from the affairs of the northern hemisphere, its influence constrained by the vast oceans and shifting tides of history. That is about to change. [ROOT.GetCountry.GetNameNoFlag], a colony purpose-built for expansion, now stands as the Empire’s bridge to the wider world—a vanguard tasked with asserting the dominion of the southern sea elves beyond their traditional waters.\n\nThe directive is clear: [ROOT.GetCountry.GetNameNoFlag] must grow, securing trade, territory, and influence in the north. Economic supremacy and military strength will be rewarded with greater autonomy and imperial favor. Failure, however, is not an option. If the colony falters in its purpose, the Empire’s patience will wear thin, and the consequences will be severe."
 je_survival_of_the_fattest:0 "Survival of the Fattest"
 je_survival_of_the_fattest_reason:0 "Improving our magical prowess through mutagens is not merely a question of quantity, but of quality. It is not enough to collect a large reserve of monstrous essence; we need samples of the highest possible grade."
 je_survival_of_the_fattest_lobby:0 "Improving our magical prowess through mutagens is not merely a question of quantity, but of quality. It is not enough to collect a large reserve of monstrous essence; we need samples of the highest possible grade."
 olabegi_tba_monsterfight:0 "Explore the burning well of Olabegi"
 olabegi_well_tt:0 "We will collect samples from the source of the burning $godsblood$ well in Olabegi."
 olabegi_monsterfight_tt:0 "Collected samples from the burning $godsblood$ well in [SCOPE.sState('olabegi_state').GetStateRegion.GetName]"
 khiarhi_squid_fight_button:0 "Hunt the Giant Squid of Arogran"
 khiarhi_squid_fight_button_desc:0 "A great beast has long patrolled the shores of Arogran; its watch has ended."
 khanba_centipede_button:0 "Hunt the great centipedes of Khanba"
 khanba_centipede_button_desc:0 "The itinerant Bonepicker death shamans have long incorporated the venom and the crushed carapace powder from the great centipedes of the Aritzakarran desert into their medicinal tinctures. However, they do not harvest until after the centipede has died from natural causes...  What if we were to hurry the process along a bit?"
 fought_the_squid_tt:0 "Collected the heart of the Giant Squid of [SCOPE.sState('khiarhi_state').GetStateRegion.GetName]"
 squid_fighter_tt:0 "We will hunt the Great Squid and steal its heart for our mutagen vats."
 centipede_fight_tt:0 "We will begin hunting centipedes for their carapaces."
 arrola_skeleton_tt:0 "We will begin collecting bones from the fallen dragon in Arrola."
 arrola_skeleton_harvest_button:0 "Harvest bones from Arrola"
 arrola_skeleton_harvest_button_desc:0 "The kobolds of Arrola have long conducted holy sacraments inside the #italic Eif Au̯l#!, a site containing a full-size and mostly-intact draconic skeleton. We must take a sample of these bones for ourselves."
 khanba_centipede_tt:0 "Collected the carapace of one of the mighty centipedes of [SCOPE.sState('khanba_state').GetStateRegion.GetName]"
 harvested_arrola_skeleton_tt:0 "Harvested bones from the holy site in [SCOPE.sState('arrola_state').GetStateRegion.GetName]"
 can_build_in_olabegi_tt:0 "Has rights to build in [SCOPE.sState('olabegi_state').GetStateRegion.GetName], either through [concept_foreign_investment_rights] or a [concept_subject]"
 can_build_in_khanba_tt:0 "Has rights to build in [SCOPE.sState('khanba_state').GetStateRegion.GetName], either through [concept_foreign_investment_rights] or a [concept_subject]"
 can_build_in_arrola_tt:0 "Has rights to build in [SCOPE.sState('arrola_state').GetStateRegion.GetName], either through [concept_foreign_investment_rights] or a [concept_subject]"
 can_build_in_khiarhi_tt:0 "Has rights to build in [SCOPE.sState('khiarhi_state').GetStateRegion.GetName], either through [concept_foreign_investment_rights] or a [concept_subject]"
 olabegi_tba_monsterfight_desc:0 "In Olabegi, there is a godsblood well that has been actively burning since just after the [concept_nightfall]. A nearby mining town was abandoned entirely as a result; we must explore this wretched place and collect samples from the well below."
 je_unite_the_nations:0 "Wild Thoughts"
 je_unite_the_nations_proclaim_turtle_island_button:0 "Proclaim Threepaw"
 je_unite_the_nations_offer_confederation_button:0 "Offer Confederation"
 je_unite_the_nations_offer_confederation_button_desc:0 "Our cause is the common cause of all awakened peoples of this land; it is only natural that our neighbors would seek to join forces with us."
 je_unite_vermillion:0 "The Bloodbark Crown"
 je_unite_vermillion_reason:0 "For ourselves and our brothers to survive, we must band together. Only united will we be able to resist the advances, both diplomatic and forceful, of the colonizing powers on our doorsteps.\n\nAny country with Lumvareth [Concept('concept_primary_cultures', '$concept_primary_culture$')] and 4 or more states in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] may proclaim #bold #white $LVA$#!#!, and gain access to decisions allowing them to consolidate the other Lumvareth factions."
 je_unite_vermillion_lobby:0 "For ourselves and our brothers to survive, we must band together. Only united will we be able to resist the advances, both diplomatic and forceful, of the colonizing powers on our doorsteps."
 je_unite_vermillion_organize_the_tribes_decision:0 "Arm Elven Tribe"
 je_unite_vermillion_organize_the_tribes_decision_desc:0 "Through envoys and direct assistance, we can encourage the reformation of our brotherly nations into something more resilient to encroachment and more amenable to our own approach to government."
