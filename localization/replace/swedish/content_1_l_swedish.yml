 australia_unite_aus:0 "Federate Australia"
 australia_unite_aus_desc:0 "Det bästa för det australiska folket vore att slå samman de små provinsregeringarna till en enda nation. Vi måste samarbeta med de lägre förvaltningsnivåerna liksom med kolonialministeriet för att föreslå en annektering av våra grannländer."
