 dp_ban_magic_tooltip:0 "#header Start a $dp_ban_magic$ [concept_diplomatic_play]#!\n$TOOLTIP_DELIMITER$\n$dp_ban_magic_desc$"
 dp_ban_magic_desc:0 "Sets the initiating [concept_war_goal] to force the targeted [concept_country] to abolish artifice by changing their [GetLawGroup('lawgroup_environment').GetName] [concept_law] to [GetLawType('law_magic_banned').GetName]."
 war_goal_ban_magic_type_name:0 "Ban Artifice"
 war_goal_ban_magic_type_desc:0 "Force another [concept_country] to abolish their destructive practice of [GetLawGroup('lawgroup_environment').GetName] by [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enacting$')] [GetLawType('law_magic_banned').GetName]."
 war_goal_ban_magic:0 "Ban Artifice in [WAR_GOAL_DRAFT.GetTarget.GetName]"
 war_goal_ban_magic_desc:0 "[WAR_GOAL_DRAFT.GetHolder.GetName] forces [WAR_GOAL_DRAFT.GetTarget.GetName] to [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')] [GetLawType('law_magic_banned').GetName]."
 war_goal_ban_magic_sway_desc:0 "Try to convince [WAR_GOAL_DRAFT.GetHolder.GetName] to join your side by forcing [WAR_GOAL_DRAFT.GetTarget.GetName] to [Concept('concept_enactment_of_laws', '$concept_enactment_of_laws_enact$')] [GetLawType('law_magic_banned').GetName]."
