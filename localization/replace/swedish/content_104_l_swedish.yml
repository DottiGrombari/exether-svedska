 belle_epoque_events.20.d:0 "Ménagerie du Jardin des Plantes i[SCOPE.sState('belle_epoque_state').GetName]  har börjat utöka sina utställningar i takt med den ökande[SCOPE.sCountry('france_scope').GetAdjective]  välfärden och den ökade fritiden."
 belle_epoque_events.20.d2:0 "Djurparken i[SCOPE.sState('belle_epoque_state').GetName]  har börjat utöka sina utställningar i takt med den ökande[ROOT.GetCountry.GetAdjective]  välfärden och den ökade fritiden."
 belle_epoque_events.20.f:0 "”Från min privata samling kan jag gärna låna ut ett utomordentligt exemplar av ett lejon till er, som fångades som unge under en jakt i Afrika...” ”\n\n...Jag har sedan länge bekantskap med en samlare och uppfödare av exotiska fåglar, som i sin privata menageri äger en magnifik parakit...” \n\nKuratorn lutade sig tillbaka och betraktade sponsorerna framför sig. ”Mina herrar, allt jag begär av er är...”"
 belle_epoque_events.20.manul:0 "”Från min privata samling kan jag gärna låna ut ett utmärkt exemplar av ett lejon till er, som fångades som unge under en jakt i Afrika...” ”\n\n...om allt går väl kommer jag att kunna fånga ett exemplar av en art som jag särskilt uppskattar åt er. Den rundlagda, men ändå vilda manulkatten som Pallas beskrivit, från stäpperna i det yttersta Mongoliet...” \n\nKuratorn lutade sig tillbaka och betraktade sponsorerna framför sig. ”Mina herrar, allt jag begär av er är...”"
