l_swedish:
 je_salt_waste_half_orc:0 "Peoples of the Salt Wastes"
 je_salt_waste_half_orc_reason:0 "The Salt Wastes have long been divided, the orcs and humans living here murdering each other over every last drop of water. But the world is changing, and [SCOPE.GetRootScope.GetCountry.GetName] will forge a united people!\n\nEach year Atamkumi will spread to all of our eligible states, replacing existing Rahoru, Tqalt, and Waste Walker homelands. This will only happen if the Rahoru, Tqalt and Waste Walkers are all at least @acceptance_status_4! $second_rate_citizen$ [Concept('concept_acceptance_status','$concept_acceptance_status_short$')]. To be eligible for spread a state must be:\n• Incorporated and fully owned by you\n• A homeland of the Rahoru, Tqalt, or Waste Walkers\n• Be adjacent to an Atamkumi homeland state which is either your capital or whose pops are 20% Atamkumi\n• Have a level 15 naval base, level 15 barracks, level 5 university, level 5 government administration, or level 5 urban center"
 control_every_salt_waste_state:0 "Control every #tooltippable #tooltip:salt_waste_state_list_tt #bold Salt Waste State#!#!#! with less than 25% turmoil"
 salt_waste_state_list_tt:0 "Required [Concept('concept_state_region','$concept_state_regions$')]:\n$STATE_NAWIYANU$\n$STATE_SAVAGE_LANDS$\n$STATE_SAVAGE_LANDS_2$\n$STATE_ROUGHSTONE_TERRITORY$\n$STATE_ROUGHSTONE_TERRITORY_2$\n$STATE_FIERCEHOLD$\n$STATE_SAVAGE_REACH$\n$STATE_SNAILBANE$\n$STATE_BLOODTHORN_WASTES$\n$STATE_BLOODTHORN_WASTES_2$\n$STATE_BLOODAXE_TERRITORY$\n$STATE_THIRSTRIDGE$"
 je_salt_waste_cure:0 "Curse of the Salt Wastes"
 je_salt_waste_cure_reason:0 "The Salt Wastes were created by an ancient curse, ruining the land, and its previously manageable effects have been worsened by the Nightfall. As the Veil weakens, the clock for this section of the world ticks. We must break the curse, lest the curse break us."
 establish_salt_rangers_button:0 "Establish Salt Waste Rangers"
 establish_salt_rangers_button_desc:0 "Dispatch rangers and outriders to the Salt Wastes to keep an eye on threats and protect civilians."
 salt_waste_rangers_cooldown:0 "Recently Changed Ranger Status"
 salt_waste_rangers_cooldown_desc:0 "Still adjusting after changing the status of the ranger forces."
 cast_defensive_wards_button:0 "Cast Defensive Wards"
 cast_defensive_wards_button_desc:0 "Have our mages cast protective ward spells around our settlements in the Salt Wastes."
 salt_waste_wards_cooldown:0 "Recently Changed Ward Status"
 salt_waste_wards_cooldown_desc:0 "Still adjusting after changing the status of the defensive magic wards."
 fund_wasteland_patrols_button:0 "Fund Salt Waste Patrols"
 fund_wasteland_patrols_button_desc:0 "Hire additional soldiers to guard our settlements and rapidly respond to any Salt Waste dangers."
 salt_waste_patrols_cooldown:0 "Recently Changed Patrol Status"
 salt_waste_patrols_cooldown_desc:0 "Still adjusting after changing the status of the Salt Waste military patrols."
 handle_salt_waste_curse_button:0 "End the Salt Waste Curse"
 handle_salt_waste_curse_button_desc:0 "Break the curse of the Salt Wastes once and for all!"
 at_least_two_hundred_arcana:0 "Have a surplus of at least 200 [concept_magic_reserves]"
 resolve_the_salt_waste_curse:0 "Resolve the Salt Waste Curse"
 salt_waste_narrative_events.1.t:0 "[SCOPE.sState('water_vampire_assault_state').GetName]: Fih’Lukrid Invasion"
 salt_waste_narrative_events.1.d:0 "A water vampire's legion has marched out of the wastes in [SCOPE.sState('water_vampire_assault_state').GetName]."
 salt_waste_narrative_events.1.f:0 "A Fih'Lukrid and its army of sosmqin ghouls are on the warpath. Leaving a trail of devastation in their wake, this living nightmare will leave anyone they find in [SCOPE.sState('water_vampire_assault_state').GetName] a drained husk. Their reign of murder will not end until they are stopped by force and their servants scattered."
 salt_waste_narrative_events.1.a:0 "The monsters!"
 salt_waste_narrative_events.1.ba:0 "Marshal our soldiers and strengthen our wards"
 salt_waste_narrative_events.1.bb:0 "Our rangers and soldiers can brunt the assault"
 salt_waste_narrative_events.1.c:0 "Our defenses hold true"
 salt_waste_narrative_events.2.t:0 "[SCOPE.sState('curse_surge_state').GetName]: Bitter Wind"
 salt_waste_narrative_events.2.d:0 "The Ghost-wind Witches are up to wickedness"
 salt_waste_narrative_events.2.f:0 "The Qabbafan Nakril are evil, intangible spirits who haunt the Salt Wastes. A group of them have gathered in [SCOPE.sState('curse_surge_state').GetName], kidnapping victims to torture and possess and cause more havoc with."
 salt_waste_narrative_events.2.a:0 "[SCOPE.sCharacter('possession_character').GetFullName] seems different..."
 salt_waste_narrative_events.2.ba:0 "Dispatch our rangers to strike back"
 salt_waste_narrative_events.2.bb:0 "Our patrols can protect travellers"
 salt_waste_narrative_events.2.c:0 "Their mischief has no power here"
 salt_waste_narrative_events.3.t:0 "[SCOPE.sState('salt_storm_state').GetName]: Salt Storm"
 salt_waste_narrative_events.3.d:0 "High winds, lightning, and jagged salt crystals; wrack and ruin."
 salt_waste_narrative_events.3.f:0 "The Salt Waste curse is ancient, and no longer stable. When the fabric of the curse snaps spontaneous spells explode in the air. Heavy winds blow knife-sharp salt shards while cursed lightning petrifies its victims in pillars of salt. Such a storm has spawned in [SCOPE.sState('salt_storm_state').GetName]; anyone caught outside will be cut down."
 salt_waste_narrative_events.3.a:0 "The land itself is cruel"
 salt_waste_narrative_events.3.ba:0 "Order our troops to build emergency shelters"
 salt_waste_narrative_events.3.bb:0 "Our rangers can scout out where we must strengthen our wards"
 salt_waste_narrative_events.3.c:0 "We saw this coming. Who's afraid of a little bad weather?"
 salt_waste_narrative_events.4.t:0 "Dispelling the Salt Waste Curse"
 salt_waste_narrative_events.4.d:0 "Our mages will begin a ritual to finally end the curse of the Salt Wastes."
 salt_waste_narrative_events.4.f:0 "In ancient times, the Deity of Giant Snails spurned the love of Frabro, a [concept_siren] goddess. Frabro, enraged, cursed the homeland of the snails; their lush forest was destroyed beneath a crushing rain of salt. What Frabro did not expect was how this cataclysmic death toll saturated the land with the influence of [concept_angel]; the region was cursed by the powers of Death.\n\nThe peoples of this land have suffered ever since, collateral damage of this divine conflict. But the nightmare may be finally coming to an end; our mages believe they have developed a ritual that will finally dispel the curse. Spellcasting has already begun in [ROOT.GetCountry.GetCapital.GetCityHubName]."
 salt_waste_narrative_events.4.a:0 "Will the nightmare finally end?"
 salt_waste_narrative_events.5.t:0 "[SCOPE.sState('ritual_oops_state').GetName]: Dispel Blowback"
 salt_waste_narrative_events.5.d:0 "The curse is fighting back in [SCOPE.sState('ritual_oops_state').GetName]"
 salt_waste_narrative_events.5.f:0 "Dispelling the curse isn't easy work, nor is it risk-free. Our mages have noticed magical pressures building in [SCOPE.sState('ritual_oops_state').GetName] in response to our efforts. If it isn't addressed the localized spell surge could cause great damage."
 salt_waste_narrative_events.5.aa:0 "Invest more arcana to stabilize the area"
 salt_waste_narrative_events.5.ab:0 "Dispatch druids to soothe the land's pain"
 salt_waste_narrative_events.5.ac:0 "Send in spell breakers to neutralize the threat"
 salt_waste_narrative_events.5.b:0 "It's the cost of progress"
 salt_waste_narrative_events.6.t:0 "Ending the Salt Waste Curse"
 salt_waste_narrative_events.6.d:0 "[ROOT.GetCountry.GetCustom('salt_waste_cure_description')]"
 salt_waste_narrative_events.6.f:0 "[ROOT.GetCountry.GetCustom('salt_waste_cure_flavor')]"
 salt_waste_narrative_events.6.a:0 "Success at last!"
 salt_waste_cure_flavor_dragon_domain:0 "In the end, we couldn't actually dispel the curse. Magic is a fickle thing, and we are right to distrust it. But we have not failed; the curse may remain, but we have made it quiet. Our ritual has bound the curse's power; wherever we rule the lands are at peace. It is a new day for the people of the Salt Wastes, for they are finally free of the curse."
 salt_waste_cure_flavor_harness:0 "Magical power shoots out from [ROOT.GetCountry.GetCapital.GetCityHubName], blotting out the sun. Monsters have shuffled out from the wastes to prostrate themselves before us, and our soldiers seem almost overwhelmed by their newfound unnatural strength. Bloodlust lies behind everyone's eyes. Sometimes you can hear screams from beyond our city walls, carried by the wind. Sometimes the screams come from somewhere closer."
 salt_waste_cure_flavor_default:0 "Magical power shoots out from [ROOT.GetCountry.GetCapital.GetCityHubName], a blinding light followed by uncertain quiet. Then cheers, joy, spontaneous celebration in the streets. It's almost unbelievable, but it's true; the curse has been lifted. The nightmares are banished, the unnatural salt is slowly dissolving into the air. It is a new day for the people of the Salt Wastes, for they are finally free of the curse."
 salt_waste_cure_description_dragon_domain:0 "Something just as good."
 salt_waste_cure_description_harness:0 "Our new reign begins."
 salt_waste_cure_description_default:0 "To new beginnings!"
 salt_waste_narrative_events.7.t:0 "An Opportunity"
 salt_waste_narrative_events.7.d:0 "Should we dispel the curse, or control it?"
 salt_waste_narrative_events.7.f:0 "Warlocks studying our ritual have come to a startling discovery; with just a few changes we could master the curse instead of dispelling it. We could harness the curse to strengthen our armies; the monstrous energies would make our soldiers unstoppable on the battlefield. This would permanently ruin the Salt Wastes, of course; with power there's always a price to be paid."
 salt_waste_narrative_events.7.a:0 "It is ours to seize!"
 salt_waste_narrative_events.7.b:0 "That's too far, even for us"
