 je_the_paris_commune_france:0 "Pariskommunen"
 je_the_paris_commune_france_reason:0 "[SCOPE.sCountry('commune_scope').GetName][SCOPE.sCountry('france_scope').GetName]En grupp socialistiska, anarkistiska och radikala republikanska revolutionärer har ockuperat staden Paris och utropat en rivaliserande regering. \n\nSå länge denna regering[SCOPE.sCountry('commune_scope').GetName]fortsätter att existera utgör den ett allvarligt hot mot vår regering. Om kommunens framsteg når#bold  0 kommer våra styrkor #!att kunna kväva den, men om dess framsteg når#bold  100#! kommer revolutionärerna att genomföra en marsch mot Versailles, vilket kommer att innebära slutet för vår regering. Om ett[concept_revolution]  bryter ut medan denna rivaliserande regering existerar, kommer den att svära trohet till .\n\nFramstegen för  Pariskommunen#!#bold förändras med #tooltippable;tooltip:[Country.GetTooltipTag],je_paris_commune_drift_special_tooltip[GetGlobalVariable( 'paris_commune_drift_final_var' ).GetValue]#!  varje månad.\n\n#italic Effekterna av denna dagboksanteckning kommer att tömma[Country.MakeScope.Var('PRC_money_transfer').GetValue|-D]#!#variable@money!    vår statskassa varje vecka.#!"
 je_the_paris_commune_communards:0 "Pariskommunen"
 je_the_paris_commune_communards_reason:0 "[SCOPE.sCountry('france_scope').GetName]Proletariatet i Paris har rest sig och ockuperat huvudstaden, och utropat en rivaliserande regering. \n\nSå länge vår[SCOPE.sCountry('commune_scope').GetName]  fortsätter att existera utgör den ett allvarligt hot mot den borgerliga regeringen i Versailles. Om kommunens framsteg når#bold  100 kommer våra styrkor att kunna #!genomföra en marsch mot Versailles och helt avskaffa den rivaliserande regeringen, men om dess framsteg når#bold  0 kommer Versailles-regeringen#! att invadera Paris och helt avskaffa vår regering.\n\n#italic Effekterna av denna dagboksanteckning kommer att bidra[Country.MakeScope.Var('PRC_money_transfer').GetValue|+D]#!#variable@money!    till vår statskassa varje vecka.#!"
 je_paris_commune_drift_special_tooltip:0 "Denna nivå bestäms av följande:[Country.MakeScope.Var('PRC_recognition_level').GetValue]#!\n#variable utländskt erkännande av Pariskommunen[GetGlobalVariable('paris_commune_progress_drift').GetValue]#!#!\n#variable#bold, händelser och andra konsekvenser"
