 je_dark_dwarf_slavery:0 "Heart of the Forge"
 je_dark_dwarf_slavery_lobby:0 "At the heart of East Everfrost lies Eldberg, a bastion of industry and cruelty surrounded by the uncaring cold. Its denizens are none other than Arcthar Dwarves, a once proud culture cursed by misfortune and tragedy. For the Arcthar of Eldberg there has never been room for sympathy or mercy. Their society is built upon the back of slavery and tenacity. The Arcthar have leveraged their military dominance heavily against its neighbors and have taken up a strong stance in enslaving the local Giant populations for the entirety of its existence. It is viewed as a matter of national pride for the Dwarves to bend such powerful creatures to their will.\n\nThe Leadership of Eldberg has every intent to continue perpetuating its dominance and enslavement of East Everfrost but preparations have been made to push south and finally contest the encroachment of humanity in the region."
