 je_khussite_religion:0 "Legacy of [Concept('concept_alestair_marktaros', '$concept_marktaros_short$')]"
 je_khussite_religion_reason:0 "Lysei, once known for marble ports and bazaars hosting the jewels of the world, had become a mere backwater in the mighty Empire of [concept_khus], overshadowed by the magic [concept_alestair_marktaros] taught. However, the [concept_nightfall] leveled the Khussite Plateau abruptly and without a known reason. Now, the era known as the [concept_einaire_yol] is still underway, and only wise guidance can quell the chaos."
