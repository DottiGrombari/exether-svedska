 stepping_forward.1.t:0 "The Last Ride?"
 stepping_forward.1.a:0 "The lords of the steppe are not dead yet."
 stepping_forward.1.d:0 "The once-proud nomads of Yanger now find themselves facing encroachment on all sides."
 stepping_forward.1.f:0 "The nomadic lifestyle of the Yanger people has become a liability as [SCOPE.sCountry('dovedale_scope').GetAdjectiveNoFlag] farmers form permanent settlements in the south and [SCOPE.sCountry('brackenshire_scope').GetAdjectiveNoFlag] capitalists buy out what little industry exists in the north.Meanwhile, the [GetCulture('dumonian').GetName] vulture looms."
 stepping_forward.2.t:0 "The Rising Stallion"
 stepping_forward.2.d:0 "With the passing of [GetLawType('law_industry_banned').GetName], we are finally in a position to secure both our economy and our rural way of life."
 stepping_forward.2.f:0 "\"And so the following lands will be appropriated and earmarked for grazing, ranching, and other agricultural efforts, both public and private.They are to remain untouched by any efforts either foreign or industrial.The punishment for any individual or conglomerate found to be in violation of this proceeding...\""
 stepping_forward.2.a:0 "We have not forgotten our ways."
 stepping_forward.3.t:0 "Investors Approach"
 stepping_forward.3.d:0 "Independent investors from [SCOPE.sCountry('brackenshire_scope').GetNameNoFlag] would like to fund new economical ventures in [ROOT.GetCountry.GetNameNoFlag]."
 stepping_forward.3.f:0 "\"Are you sure this is the plot they intend to sell us? Maybe we shouldn't have gone behind the back of the Brackensire Investor´s Guild after all ...\"\n\"Of course it is, old boy, why else would they have dragged us to such an odd spot?\""
 stepping_forward.3.a:0 "We will get them in touch with local investors."
 stepping_forward.3.b:0 "We will get them 'in touch' with 'local investors'."
 stepping_forward.4.t:0 "Kids These Days"
 stepping_forward.4.d:0 "More and more young people are moving to the cities for work, leaving many of the tribes unable to find suitable replacements for retiring riders."
 stepping_forward.4.f:0 "\"When I was your age, I could shoot a Dumonian square in the chest while riding backwards on a horse.Will your son learn to shoot?Will your daughter learn to ride?\""
 stepping_forward.4.a:0 "It is the march of progress."
 stepping_forward.4.b:0 "We cannot forget our old traditions."
 stepping_forward.5.t:0 "The Devil Lives in Brackenshire"
 stepping_forward.5.d:0 "Now that serious motions for [ROOT.GetCountry.GetNameNoFlag] to pass [GetLawType('law_industry_banned').GetName] have been made, the snakes of [SCOPE.sCountry('brackenshire_scope').GetNameNoFlag] attempt to play their hand."
 stepping_forward.5.a:0 "\"Everyone has a price.\""
 stepping_forward.5.b:0 "All of the [GetCulture('yanger').GetName] people will know of this treachery."
 stepping_forward.5.f:0 "\"No sir, you misunderstand!These are gifts.I am not asking you to vote any one way on any one thing. I am merely asking that when the votes are to be counted, you... make yourself scarce.\""
 stepping_forward.6.t:0 "Times Are a-Changin'"
 stepping_forward.6.d:0 "Despite our best efforts to control our economy, foreign business has laid its thick tendrils deep within our lands."
 stepping_forward.6.f:0 "\"Father, please. You are too old to be riding like that any more! Come and live with me and Odoka in the city. Wouldn't you like to see your grandchildren more often?\""
 stepping_forward.6.a:0 "It is time to hang the saddle up."
 stepping_forward.7.t:0 "No Country for Old Men"
 stepping_forward.7.d:0 "What was previously a slow trickle of foreign capital has broken into a torrent as it has become clear that [ROOT.GetCountry.GetNameNoFlag] lacks the centralization to enforce its trade agreements."
 stepping_forward.7.f:0 "\"My daughter has married a [SCOPE.sCountry('dovedale_scope').GetNameNoFlag] farmer and my son works in a [SCOPE.sCountry('brackenshire_scope').GetNameNoFlag] factory.What is to become of our way of life?I fear...\""
 stepping_forward.7.a:0 "\"...Our children have forgotten how to ride.\""
 stepping_forward.8.t:0 "Return on Investment"
 stepping_forward.8.d:0 "With the seizure of all foreign-owned assets, the [ROOT.GetCountry.GetNameNoFlag] have finally established dominion over their own lands."
 stepping_forward.8.f:0 "While the settlements and manufactories the colonizers constructed still exist, no longer will they be ran by nefarious actors outside the control of our riders. While there are certain to be growing pains as the rider takes its place on the world stage, never again shall foreign powers be allowed to treat the [GetCulture('yanger').GetName] people as tools to be exploited."
 stepping_forward.8.a:0 "We shall ride into the modern era on horseback."
 stepping_forward.9.t:0 "Wrangling the Yangerling"
 stepping_forward.9.d:0 "After years of buyouts and backhanded deals, we have finally achieved a controlling interest over the [SCOPE.sCountry('yanger_scope').GetAdjective] economy."
 stepping_forward.9.f:0 "\"Our shareholders will be pleased to hear that certainly, our work is not done. We have, however, exerted control over a considerable portion the steppe economy, such that even the tallest of horselords will find difficult to wrestle back.\""
 stepping_forward.9.a:0 "A big win for the Brackenshire Investor's Guild, to be sure."
 stepping_forward.10.t:0 "The Bucking Bronco"
 stepping_forward.10.d:0 "Despite years of buyouts and backhanded deals, we have been forced out of the [SCOPE.sCountry('yanger_scope').GetAdjective] economy."
 stepping_forward.10.f:0 "The Brackenshire Investor's Guild is in shambles after the loss of their holdings on the steppe. They have returned to Kenlyne with their tails tucked between their legs. The few who have not been rendered penniless have begun to move what little capital they have left to greener pastures."
 stepping_forward.10.a:0 "You mean we have to work for a living?"
 sunstation.1.t:0 "A Hearth in the Cold"
 sunstation.1.d:0 "We have completed the power-cycle; the sunstations are ready to be brought online."
 sunstation.1.f:0 "The low hum of the sunstation can be heard from miles around as the heat now emanating from deep underground reveals old roadways and green pastures. Already there is a push from those in the cities to begin claiming land that has not even yet been uncovered by the efforts of our genius artificers."
 sunstation.1.a:0 "We must focus on helping these new migrants settle in."
 sunstation.1.b:0 "Full speed ahead! Get our artificers everything they need!"
 sunstation.1.tt:0 "#green Filling the sunstation building progress bar will weaken the cold state traits and add 3 [concept_arable_land] for each fill#!"
 sunstation.2.t:0 "Sunstation Storeroom"
 sunstation.2.d:0 "The expedition reaches an old mechanized workshop. One crew member suggests turning it into a warehouse to store supplies, rest, and aid future explorers."
 sunstation.2.d2:0 "The expedition finds itself within what was once a mechanized workshop. The space has been recently converted into warehouse, and the crew discovers ample supplies of food and munitions within."
 sunstation.2.f:0 "\"There is still the subtle humming of the station, of course, but in every other respect we are absolutely comfortable. There is an unlimited quantity of biscuit, and our friends at the relay station may find this spot accessible enough for future drops. An empty iron tin and some wishstone dust have been made into an excellent little stove, which has been connected to the old furnace-vent. Already we can regard it as a temporary home.\""
 sunstation.2.a:0 "We shall steel this storeroom against the heptadrons."
 sunstation.2.b:0 "We can leave a resupply here."
 sunstation.2.c:0 "We should rest and resupply before moving on."
 discovery_hut_tt:0 "Future explorers will gain #tooltippable;positive_value;TOOLTIP:expedition_progress_explanation_tt progress#! when visiting the hut."
 sunstation.3.t:0 "Labyrinth Unending"
 sunstation.3.d:0 "The expedition has realized that they have passed through the same heating grid understation thrice"
 sunstation.3.f:0 "\"As we continued our way into the golden abyss, the relay tunnels had become more and more familiar. \"How many of this mural do you think they made?\" We all stopped. \"That's the same mural,\" I sputtered out. We all knew what I meant. A single nod, no one talked. We all knew that those lies were as white as this land.\""
 sunstation.3.f2:0 "\"As we continued our way through the merciless white, snow cairns had become more and more scarce. Or that we thought. God help us, we can't keep up this pulling, that is certain. Amongst ourselves we are unending cheerful, but what each man feels in his heart I can only guess.\""
 sunstation.3.a:0 "Turn back. We need to resupply and find our bearings."
 sunstation.3.b:0 "Push on, we'll find our way."
 sunstation.4.t:0 "The End Is Near"
 sunstation.4.d:0 "The expedition is doomed. Utterly exhausted, beset by heptadrons, and out of supplies, all that is left to do is await the chittering embrace of death."
 sunstation.4.f:0 "\"Every day we have been ready to start for the station 11 miles away, but outside the door of the supply closet we hide in, it remains a scene of orderly despair, as heptadrones click by as though on parade. I do not think we can hope for any better things now. We shall stick it out to the end, but we are getting weaker, and every moment the heptadrons grow closer to finding us. It seems a pity but I do not think I can write more.\"\n\n\"For God's sake look after our people.\""
 sunstation.4.a:0 "I always hated spiders."
 sunstation.5.t:0 "The Sunstation Core"
 sunstation.5.d:0 "We’ve reached the sunstation security core, but the heptadrones remain active. As [SCOPE.sCharacter('expedition_leader').GetFullName] accesses the terminal, it locks up and a voice fills the room."
 sunstation.5.d2:0 "We have reached the sunstation security core. However, inside is an entire research laboratory setup bearing the seals of [SCOPE.sCountry('pole_winner_country').GetNameNoFlag]."
 sunstation.5.f:0 "As [SCOPE.sCharacter('expedition_leader').GetFullName] begins to access the terminal governing the heptadrones, the terminal seizes up and projects a voice into the room.\n\n#red \"Error! Error!#! Incompatible user biometric. Submit sample to...\"\n\nThe rest of the message is indecipherable, but it seems to refer to another location in the heating grid service network."
 sunstation.5.f2:0 "As [SCOPE.sCharacter('expedition_leader').GetFullName] begins to access the terminal governing the heptadrones, the terminal seizes up and projects a voice into the room.\n\n#red \"Error! Error!#! Currently processing new controller sample. Time to competion: 127 years\n\nThis seems to have attracted part of the [SCOPE.sCountry('pole_winner_country').GetAdjectiveNoFormatting] research team from elsewhere in the station. \"Sorry chaps, we've been studying here for some time. However, we can still help you get on the whitelist with the heptadrones, as it were.\""
 sunstation.5.a:0 "We have to submit a sample so that the heptadrones recognize us."
 sunstation.5.b:0 "What the hell do you mean, submit a biometric sample?"
 sunstation.5.c:0 "Just shut them down. Set the charges and destroy the cores."
 sunstation.6.t:0 "Long Pig Connoisseurs"
 sunstation.6.d:0 "The expedition’s only gnollish crewmate died in the last clash with the heptadrones. With no kin to claim the body and supplies dwindling, some crewmates begin to eye it hungrily."
 sunstation.6.f:0 "\"The thought was a chill that pierced even the stuffy sunstation air; yet we all felt it.\n\n\"He's already passed, there's nothing we could do for him. But there's still something he could do for us.\""
 sunstation.6.a:0 "It is the practical thing to do."
 sunstation.6.b:0 "We will not stoop to such barbarism!"
 sunstation.7.t:0 "Collapsed Heating Grid"
 sunstation.7.d:0 "Rounding the next corner, the expedition glimpses something unseen for weeks: sunlight. Collapsed tunnel sections have dragged down parts of the heating grid, which now lie twisted and burning."
 sunstation.7.f:0 "\"The air grew hot and heavy before we got even the slightest hint of sunlight from above. As we looked up to see the source of the sunlight, we saw the source of the unyielding heat, as well; a section of the heating grid had fallen down and twisted over itself when the sinkhole formed.\n\nDespite its misshapen form, it was obviously still connected to the grid network, as it was now burning bright red just a few feet over our heads.\""
 sunstation.7.a:0 "Does anyone know any frost spells?"
 sunstation.7.b:0 "We can shut this section down from the service terminal, and it will be safe to pass."
 sunstation.8.t:0 "Across a Crowded Room"
 sunstation.8.d:0 "Approaching the next relay station, the expedition finds the path blocked by a massive pile of ruined heptadrones. They are stacked as if all tried to exit the chamber at once, unwilling to give way."
 sunstation.8.f:0 "\"It wouldn't be sound to confess that such a peril intrigued me, but the imminent arrival of our final goal, announced by the increasing sea ice that surrounded us, could not but terrify and fascinate me at the same time.\n\nTo see that this place could be just as unkind to heptadrones that had terrified us thus as it could be to us brought a sort of uneasy warmth to my stomach.\""
 sunstation.8.a:0 "Onwards! Start clearing the pile!"
 sunstation.8.b:0 "I don't like this; we should find another way around."
 sunstation.10.t:0 "Homecoming"
 sunstation.10.d:0 "\"The crew of the sunstation expedition have finally returned home. Having succeeded, in controlling the heptadrones, they are lauded as [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] heroes.\""
 sunstation.10.f:0 "\"Glory. Victory. Cheers and parades. Absurd sums of money. Kind words. The repetition of the hero's shadow over one's own name. The crew. That precious group of indomitable bastards. Home. Days. Nights. How much I had missed the days and the nights, their calculated succession. The boredom of the routine. Waking up on my bed. Hot chocolate. Coffee. Tea. My favorite tartlets. How much I had missed the noise from this street.\""
 sunstation.10.a:0 "They are a credit to their nation."
 succesfull_rimeroot_modifier:0 "Successful Rimeroot Explorer"
 first_to_the_core:0 "First to the Core"
 sunstation.12.t:0 "Curious Carapids"
 sunstation.12.d:0 "A pair of heptadrones has been following the expedition team for nearly four hours."
 sunstation.12.f:0 "As the team lowered itself deeper into sunstation's underways, the unmistakable chittering sound of a heptadrone on rusted metal continued to follow behind them.\n\n\"What do we do about them?\" Heptadrones are capable of passing information wordlessly between one another through the heating grid network, so it's likely that any larger groups of heptadrones already know we're here, but we could still do something to prevent them from getting further information on the expedition's movements."
 sunstation.12.a:0 "Hunt those heptadrones down!."
 sunstation.12.b:0 "Ignore them. If we don't bother them, they won't bother us."
 sunstation.14.t:0 "Can We Keep it?"
 sunstation.14.d:0 "The team has found a mighty brass jaguar construct in somewhat damaged condition. One of the artificers is convinced that with a few hours and a wishstone focusing gem that we can not only fix it, but render it under our control."
 sunstation.14.f:0 "\"Far as I reckon, this one got its control-telepather crushed by some sort of blunt force. This caused the reliquary capacitor to fry, leaving it in the state we—\"\n\n\"Speak Common, artificer!\"\n\nThe artificer mumbled before speaking again. \"We can fix it. Probably.\""
 sunstation.14.a:0 "If you think it can be done..."
 sunstation.14.b:0 "We have neither the time nor the resources to devote to this."
 sunstation.13.t:0 "Strange Marks"
 sunstation.13.d:0 "During the expedition's advances through the sunstation tunnels, a rune with unknown marks has been discovered, partly buried under a mound of ancient rubbish."
 sunstation.13.f:0 "\"A light-colored rune was found this very morning. Its smooth texture and perfect curvature was only interrupted by a pattern of unfamiliar marks, all appearing in a sequence that none of our men could dare to decipher. When positioned between one's eye and the sun, its tone varies, seemingly depending on the time of the day; now white, now yellow, at dusk — green.\""
 sunstation.13.f2:0 "\"A light-colored rune was found this very morning. Its smooth texture and perfect curvature was only interrupted by a pattern of unfamiliar marks, all appearing in a sequence that was unintelligible at first, but whose meaning I recognized after a while. I didn't know the language, I didn't even know the twisted words in complete isolation, but together — together I knew. They get hungry, you know. Hungry.\""
 sunstation.13.a:0 "Make arrangements to have it sent to the university in [SCOPE.sState('university_state').GetStateRegion.GetName]."
 sunstation.13.b:0 "Ignore it."
 sunstation.15.t:0 "Severed Connection"
 sunstation.15.d:0 "\"The crew of the sunstation expedition have finally returned home. Having succeeded in disabling the heptadrones, they are lauded as [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] heroes.\""
 sunstation.15.f:0 "\"Glory. Victory. Cheers and parades. Absurd sums of money. Kind words. The repetition of the hero's shadow over one's own name. And yet, still, something was missing. As the efforts to clear out the sunstation tunnels begin in earnest, some members of the crew privately wonder whether they could have done more.\""
 sunstation.15.a:0 "They are a credit to their nation."
 sunstation.16.t:0 "Heptadrone Ambush!"
 sunstation.16.d:0 "\"The expedition was ambushed by heptadrones as the artificers were preparing to demolish an old gate blocking our path.\""
 sunstation.16.f:0 "\"As the artificers discussed the weight of TNT required for demolition, a cry rang out from the left, but it was quickly drowned out by the clicking sounds of a horde of heptadrones, dropping from the ceiling. While not all encounters with heptadrones end in violence, this one seemed destined to.\"\""
 sunstation.16.a:0 "We must fight them back."
 sunstation.16.b:0 "We have to retreat!"
 sunstation.16.c:0 "The brass jaguar saves the day!"
 sunstation.17.t:0 "Duskmirror in the Dungeon"
 sunstation.17.d:0 "\"While mapping out a safer section of tunnel, the crew has encountered a beautiful duskmirror swan, nearly seven feet tall. Wrapped in its wings are an unidentifiable jumble of mechanical parts.\""
 sunstation.17.f:0 "\"The swan seemed to welcome our presence, and cocked its head as though to chastise us for being late. In spite of all I had seen on this expedition so far and the very certainty of the danger I felt in my brain, I realized that I had scarcely ever been more at ease than I was in this moment. The swan turned around, and began to walk slowly down the corridor, looking back at us as though beckoning us to follow.\""
 sunstation.17.a:0 "We must follow it to where it leads us."
 sunstation.17.b:0 "We have to stick to the plan!"
 rimeroot_expedition:0 "Rimeroot Core Expedition"
 rimeroot_expedition_desc:0 "The tunnels beneath the sunstation remain almost entirely unexplored. An expedition to these uncharted service tunnels would be expensive and fraught with peril, but the chance of disabling or even controlling the heptadrones may make it worth the risk."
 sunstation.101.t:0 "Expedition to the Rimeroot Core"
 sunstation.101.d:0 "With the sunstations reawakened, their ancient guardians, the heptadrones, have stirred once more. An expedition now ventures into the old Dragonkin tunnels in search of a way to shut them down."
 sunstation.101.f:0 "Murmurs and whispers soon fill the halls of the world's most prestigious science academies, as the prospect of uncovering Rimeroot's final secrets becomes much more than a fever dream. The taverns of [SCOPE.sState('capital_scope').GetCityHubName] are abuzz with hopefuls trying to making the cut for the expeditionary team."
 sunstation.101.a:0 "I know just the man for the job."
 sunstation.101.b:0 "Can the treasury bear such an expense?"
 sunstation.102.t:0 "Going Offgrid"
 sunstation.102.d:0 "We must choose a leader for the upcoming expedition to the Rimeroot Core. A few promising candidates have distinguished themselves."
 sunstation.102.f:0 "Few people are capable of rightly appreciating this heroic deed, this brilliant proof of human courage and energy. These men will journey right into the heart of the heptadrones, which all previous explorers have regarded as certain death. These men are heroes — heroes in the highest sense of the word."
 sunstation.102.a:0 "[SCOPE.sCharacter('expedition_leader_1').GetFullName] is an experienced polar explorer."
 sunstation.102.b:0 "[SCOPE.sCharacter('expedition_leader_2').GetFullName] will lead us to glory."
 sunstation.102.c:0 "[SCOPE.sCharacter('expedition_leader_3').GetFullName] has never let us down before."
 sunstation.102.e:0 "[SCOPE.sCharacter('expedition_leader_4').GetFullName] is the most prepared one."
 mindrend_expedition_decision:0 "Expedition Across the Mindrend Sands"
 mindrend_expedition_decision_desc:0 "Legends tell of golden cities beyond the sands. We should find an adventurer capable of braving both the heat and the kiankstauks."
 mindrend.101.t:0 "Expedition across the Mindrend Sands"
 mindrend.101.d:0 "An expedition to map Mindrend Sands is underway with the goal of discovering what lies beyond the great desert expanse."
 mindrend.101.f:0 "\"There’s always been legends and rumors of what lies beyond the desert. Some say it’s a great city made entirely of cloudsilver that floats in the sky. Others say it’s a city of angels which somehow survived the Divine Banishment. Some even say whoever finds the city will be ascended to godhood. The legend warning about the city being full of flesh-hungry demons is probably false. Probably.\""
 mindrend.101.a:0 "I know just the man for the job."
 mindrend.101.b:0 "Can the treasury bear such an expense?"
 mindrend.102.t:0 "A Diamond in the Rough"
 mindrend.102.d:0 "We must choose a leader for the upcoming expedition to the Mindrend Sands. A few promising candidates have distinguished themselves."
 mindrend.102.f:0 "Few people are capable of rightly appreciating this heroic deed, this brilliant proof of human courage and energy. These men will journey right into the heart of the heptadrones, which all previous explorers have regarded as certain death. These men are heroes — heroes in the highest sense of the word."
 mindrend.102.a:0 "[SCOPE.sCharacter('expedition_leader_1').GetFullName] is an experienced desert explorer."
 mindrend.102.b:0 "[SCOPE.sCharacter('expedition_leader_2').GetFullName] will lead us to glory."
 mindrend.102.c:0 "[SCOPE.sCharacter('expedition_leader_3').GetFullName] has never let us down before."
 mindrend.102.e:0 "[SCOPE.sCharacter('expedition_leader_4').GetFullName] is the most prepared one."
 mindrend.103.t:0 "Failure"
 mindrend.103.d:0 "The expedition has ended in failure."
 mindrend.103.f:0 "\"I’m the only one left. I’ve been walking for days trying to find my way. I’m out of food and water. I’m going to rest here under the shade of a dune.\""
 mindrend.103.a:0 "Nothing remains save a sandy grave."
 mindrend.104.t:0 "The Lights of the Great City"
 mindrend.104.d:0 "The expedition has discovered The Great City, hidden behind a veil of a ferocious sandstorm. Its vast walls of marble gleam under the sun. The expedition is met by elves riding graceful animals which look like a griffon mixed with a giraffe. Brought inside [SCOPE.sCharacter('expedition_leader').GetFullName] meets their ruler."
 mindrend.104.f:0 "\"The elves of the city are dark skinned, seven feet tall, have hair as golden as the dawn, and eyes as green as jade. They wear thread finer and softer than any silk. The streets are a pale pink and the walls are typically midnight blue with accents of marble or even gemstone. The city squares were dotted by mighty obelisks which seemed to calm the thoughts of those nearby. The food was a blend of spices and vegetables unknown to anyone in our party, and the chef declared this was their first time preparing ‘mortal food’ in at least a hundred years - and then explained to us that the elves here survive on sunlight.\n\nI saw some elven children in the palace playing with toys made of gold. When I inquired about the excess, our host was confused before explaining that in this place gold was as common as sand. Our hosts seemed only politely interested in the affairs of Exether, and when pressed about potential trade, their ruler had prepared a large wagon-train of treasure for us to bring back home. They expressed little interest in regular contact with the rest of Exether, and tergiversated. After much cajoling I was finally handed a tattered veil, which almost startled me in comparison to the meticulous perfection we were surrounded with. Their ruler told me that the Great City would open their doors to Exether if I could sieve sand through the veil for a hundred years without a single strand coming loose. I thought long and hard about this riddle as we left the Great City and began our return, and I still wonder what it means. But my mind, admittedly, remains distracted by the wagon train of treasure following us back home!\""
 mindrend.104.a:0 "Return home in glory!"
 mindrend.1.t:0 "The Oasis"
 mindrend.1.f:0 "\"From the top of this razorback I see at a considerable distance away two big green palm trees providing shade over a pool of water. Even from here the water looks crystal clear and inviting. It’s hard to know for sure if this is a mirage, and a detour to it would be risky.\""
 mindrend.1.d:0 "The expedition stumbles on what appears to be an oasis in the middle of the lifeless desert."
 mindrend.1.a:0 "Take the risk, we need the refreshment."
 mindrend.1.b:0 "Ignore it and move on"
 mindrend.1.c:0 "Cast a Reveal Mirage spell."
 mindrend.1.e:0 "Wait here and send one of the men."
 mindrend.2.t:0 "The Desert Witch"
 mindrend.2.f:0 "\"We came upon an old woman tending a garden of cacti and desert succulents. She greeted us in the common tongue and was friendly enough. She asked about the journey ahead and when we told her our destination she laughed and said we’d need all the help we can get. She offered us cups of her cactus juice. I asked what else was in it besides cactus juice and she waved her hand dismissively and bid me to drink.\""
 mindrend.2.d:0 "The expedition came upon an old woman in the middle of the desert tending a garden."
 mindrend.2.a:0 "Drink it."
 mindrend.2.b:0 "Refuse."
 mindrend.2.c:0 "Alchemically isolate the beneficial reagents into a new drink."
 mindrend.2.e:0 "Kill this witch and seize her supplies."
 mindrend.2.g:0 "Offer to sell her an even better potion."
 mindrend.3.t:0 "Landslide"
 mindrend.3.f:0 "\"In one moment I was walking, and in the next moment everything was tumbling around. I was tossed like a doll onto the sand. The sand was as hot as a poker iron against my skin. When I stood up I saw several members of the expedition were trapped in the scalding sand while in the other direction our camel supplies, panicked, were fleeing.\""
 mindrend.3.d:0 "The expedition was walking in the shade of a massive dune when the near side shifted, and suddenly collapsed."
 mindrend.3.a:0 "Save the crew."
 mindrend.3.b:0 "Save the supplies."
 mindrend.4.t:0 "The Nomads"
 mindrend.4.f:0 "\"They claim they’re going in the same direction for the next two days but they deflect if pressed for details. Our translator doesn’t trust them and warns [SCOPE.sCharacter('expedition_leader').GetFullName] that they’re most likely bandits. The sun has been beating down on us and their tents are woven with a magic thread to keep the interior cool.\""
 mindrend.4.d:0 "The expedition comes upon a group of nomad Hiadud. They offer the expedition hospitality."
 mindrend.4.a:0 "Accept their hospitality."
 mindrend.4.b:0 "Refuse and move on."
 mindrend.4.c:0 "Accept but keep up a show of force."
 mindrend.4.e:0 "Convince their leader to help us."
 mindrend.4.g:0 "Show them some baubles— er, valuable Zalaron artifacts!"
 mindrend.5.t:0 "Dragon Bones"
 mindrend.5.f:0 "\"The dragonborn laughed when we told them our destination. They told us there was no such city beyond the desert, that it went on forever until the edge of the world. When I asked about the stones the dragonborn insisted that they were dragon eggs long forgotten since the Divine Banishment. Now that magic has returned I wonder if the eggs could ever be induced to hatch…\""
 mindrend.5.d:0 "The expedition team comes upon a group of gem dragonborn worshiping dried and sun bleached stones."
 mindrend.5.a:0 "Trade supplies and move on."
 mindrend.5.b:0 "Trade a substantial amount of supplies for those stones."
 mindrend.5.c:0 "Offer a prayer for the stones."
 mindrend.5.e:0 "Those eggs are now property of [ROOT.GetCountry.GetNameNoFlag]!"
 mindrend.5.g:0 "Take a pick and break the heathen stones."
 mindrend.5.h:0 "Breathe a little life into the stones and see what happens."
 mindrend.5.i:0 "Hey, what’s that behind you?!"
 mindrend.6.t:0 "Nightmares on the Sand"
 mindrend.6.f:0 "\"Mindrend Sands has earned its name. Our fears and anxieties plague us every night and none of us have gotten any rest. We’re exhausted and making mistakes that could turn deadly. I collapsed from exhaustion on the ground and now have a nasty burn on my arm from the scalding sand. We have to do something or we’re not going to make it.\""
 mindrend.6.d:0 "Nightmares have started to plague the expedition, driving some to the edge of delirium."
 mindrend.6.a:0 "We have no choice but to push forward."
 mindrend.6.b:0 "Set up camp and wait for this to pass."
 mindrend.6.c:0 "Put up some protective wards."
 mindrend.6.g:0 "Study the phenomenon to counteract it."
 mindrend.6.e:0 "After one bad flare-up, the nightmares come to a quick end."
 mindrend.7.t:0 "A Siren Song"
 mindrend.7.f:0 "\"The others hear it but no one admits it. When I ask them their eyes just dart away and they say nothing. I’m not like them. I listen. I hear. I hear you. You sound so beautiful. I’ve known you my entire life. You know the way. You will show me the way because you love me. You will show me the way because you love me and I love you.\""
 mindrend.7.d:0 "The sand beneath the expedition started to whisper in [SCOPE.sCharacter('expedition_leader').GetFullName]’s mind. It promised him an end to his journey if he would follow its directions."
 mindrend.7.a:0 "Show me the way."
 mindrend.7.b:0 "Snap out of it before you bury yourself alive."
 mindrend.7.c:0 "Cast a protective ward."
 mindrend.7.e:0 "In love with sand? Death would be better. Ignore it."
 mindrend.8.t:0 "All Who Wander"
 mindrend.8.f:0 "I awoke in a strange labyrinth all alone. The walls were sandstone and the floor was a black obsidian. I was in this place for what felt like years. My entire existence was to wander the dark halls. I never hungered or needed rest, nor did I dare try as the entire time I could feel something hunting me. I eventually woke up on the scalding sand after what was just a few moments, but many of our team remained comatose.\""
 mindrend.8.d:0 "The sand seemed to stretch out forever, and the sun beat down on the expedition as if it was wielding mighty hammers. Suddenly the entire expedition fell comatose following a strong wind."
 mindrend.8.a:0 "Leave them behind."
 mindrend.8.b:0 "Wait here and wait for them to wake."
 mindrend.8.c:0 "Fall asleep and go back to save those still wandering."
 mindrend.8.e:0 "That witch knew this would happen!"
 mindrend.8.g:0 "In love with sand? Death would be better. Ignore it."
 mindrend.9.t:0 "The City and the Song"
 mindrend.9.f:0 "The expedition meets with a Hiadud official known as an 'Audiologue'.\n\n\"My ancestor was buried with a song telling of your destination. The lyrics were forgotten, though we remember the melody. Such is the fate of all things we leave behind when we are interred.\"\n\nA concerned flicker crosses the Audiologue’s features when [SCOPE.sCharacter('expedition_leader').GetFullName] inquires about recovering the song. \"Impossible,\" the Audiologue says, \"we would never disrespect our ancestors. Regardless, the last outsiders to unseal the tomb stirred our risen dead and now the crypt is thoroughly cursed.\""
 mindrend.9.d:0 "A Hiadud city offers respite from a sandstorm."
 mindrend.9.a:0 "Attempt to raid the crypt."
 mindrend.9.b:0 "Rest and leave when the storm passes."
 mindrend.9.c:0 "Rest hard."
 mindrend.9.j:0 "Convince the Audiologue to help recover the song"
 mindrend.9.e:0 "Too bad. We’ll make it up with the riches of your palace!"
 mindrend.9.g:0 "Could we sing them back to sleep?"
 mindrend.9.h:0 "Pawn off some Zaloronian baubles for the Audiologue’s necklace and a map."
 mindrend.10.t:0 "The Shunned Land"
 mindrend.10.f:0 "\"This place is not a place of honor. No highly esteemed deed is commemorated here. Nothing valued is here. Sending this message was important to us. We considered ourselves to be a powerful culture. What is here was dangerous and repulsive to us. The center of danger is here, and below us. The danger is still present, in your time, as it was in ours.  The danger is unleashed only if you substantially disturb this place. This place is best shunned and left uninhabited.\""
 mindrend.10.d:0 "The expedition has stumbled upon what can only be described as shunned land. A landscape of stone spikes erupting from the ground in all directions lead into an irregular grid of house-sized blocks. At the center is a massive basalt slab as wide in circumference as a major city. At the very center is a pedestal in an ancient Hiadud language."
 mindrend.10.a:0 "Ominous. Leave this place."
 mindrend.10.b:0 "Hogwash. Start digging!"
 mindrend.10.c:0 "You all start digging, I’ll be right back."
 party_foul:0 "Party Foul"
 rust_gorge.100.t:0 "A Ring of Brittle Iron"
 rust_gorge.100.d:0 "Despite their best efforts, the forces of Khaduras have failed to manifest their Ring of Steel."
 rust_gorge.100.f:0 "Once again, the scions of dragonkind have shown what true strength looks like. Though we were once on the back foot, dragonborn power and determination has won the day. Khaduras' supposed might was but a sham and their ambitions have been foiled. This humbled gaggle of orcs and dwarves may limp back to their mountain and relay our glorious victory to their greedy rulers.\n\nThe Embervein Arroyo now lays firmly in the grasp of the Thassarcian state. Our northern border is secure and the region is ours do with as we please. This is just the beginning."
 rust_gorge.100.a:0 "This land belongs to us!"
 rust_gorge.101.t:0 "The Bitter Truth"
 rust_gorge.101.d:0 "We couldn't stop them; we're not as strong as we thought."
 rust_gorge.101.f:0 "Our rivals in Khaduras have succeeded in their goals. More orcs have joined their ranks and their Ring of Steel is now a fact. Where did we go wrong? The orcs all but jumped into their arms. Their economy, their military, we have been outplayed in every field. Is this the sum of our potential?\n\nThe truth may hurt, but this is not the end. We may have lost this battle, but not the war. Me must reflect, we must learn from them, take their secrets and build until we eclipse them. The Citrus current is vast and there are many more opportunities out there."
 rust_gorge.101.a:0 "Perhaps we should look southwards."
 rust_gorge.102.t:0 "A Union Forged in Fire"
 rust_gorge.102.d:0 "The Ring of Steel has been formed; despite their best efforts our rivals could not stop us."
 rust_gorge.102.f:0 "At long last our moment of triumph is at hand. We've always known that it could be done. A Ring of Steel, forged in the fires of unity and strength. Despite the foreign agitation, the good people of Stihugnado have chosen to believe in our dream too. We only had to show them the fruits of our system. The peace and comforts the state of Khaduras can provide to all its citizens and friends.\n\nOur hold on the Rust Gorge and Evervein Arroyo has grown strong indeed. We are now the undisputed hegemon of this region and its future is ours to shape. Whatever comes next, the Ring of Steel stands united. Dwarves and orcs, side by side."
 rust_gorge.102.a:0 "We are so much stronger together."
 rust_gorge.103.t:0 "Burning Out"
 rust_gorge.103.d:0 "Our promise of protection has proven hollow; we're not as strong as we thought."
 rust_gorge.103.f:0 "The forges lay cold, our armories empty, our battlefields silent. For all our promises of unity and strength, we have failed to protect Stihugnado from the imperialist menace. The fervor that drove our project has withered under the weight of our shameful defeat. For now, the Embervein Arroyo remains out of our reach and its people remain under the yoke of our rivals.\n\nWe must bide our time. Our lands are rich and our people are full of potential. Our enemies may rule this land now, but we still have so much room to grow. We will eclipse them soon enough. The Ring of Steel can be reforged."
 rust_gorge.103.a:0 "This is not the end."
 rust_gorge.105.t:0 "Rusted Agreements"
 rust_gorge.105.d:0 "It seems [SCOPE.sCountry('khd_scope').GetAdjectiveNoFlag] attempts at courting [SCOPE.sCountry('tsh_scope').GetNameNoFlag] have reached a breaking point."
 rust_gorge.105.f:0 "A cold wind blows on the border of [SCOPE.sCountry('tsh_scope').GetNameNoFlag] as their soldiers prepare to take up arms against [SCOPE.sCountry('khd_scope').GetNameNoFlag]. It seems [SCOPE.sCountry('khd_scope').GetAdjectiveNoFlag] attempts at cementing their sphere have fallen completely flat."
 rust_gorge.105.f2:0 "It seems [SCOPE.sCountry('khd_scope').GetAdjectiveNoFlag] attempts at cementing their sphere have fallen completely flat, as Stihugnado has moved to close talks surrounding the Ring of Steel."
 rust_gorge.105.a:0 "How did it come to this?"
 rust_gorge.106.t:0 "Like Sand Through Our Fingers"
 rust_gorge.106.d:0 "The opportunity to pull [SCOPE.sCountry('tsh_scope').GetNameNoFlag] into our sphere has slipped from our grasp."
 rust_gorge.106.f:0 "\"It goes without saying that they have already sent our bureaucrats packing. Perhaps our grasp was too tight, or perhaps the [SCOPE.sCountry('tsh_scope').GetAdjectiveNoFlag] national spirit was simply indominatible. What is clear is that our diplomatic efforts have failed.\""
 rust_gorge.106.a:0 "We will court them with the sword."
 rust_gorge.107.t:0 "The Ring of Steel"
 rust_gorge.107.d:0 "Khaduras has invited us to join their power bloc. All that remains is to ratify the treaty."
 rust_gorge.107.f:0 "WIP"
 rust_gorge.107.a:0 "We would be happy to sign."
 rust_gorge.107.b:0 "Stihugnado needs no dwarf."
 locari_obelisk_tt:0 "#green We may now build $building_obelisk$s in Locari to lower the effects of psionic [Concept('concept_harvest_condition','$concept_harvest_conditions$')]#!"
 secrets_of_the_obelisks:0 "Secrets of the Obelisks"
 secrets_of_the_obelisks_2:0 "Obelisks Unchained"
 draconic_obelisk_murals:0 "Psionic Obelisk Murals"
 wingbreaker.1.t:0 "Slaying a Queen"
 wingbreaker.1.d:0 "With Argi firmly under our control, there is still the matter of what to do with the Griffon Queen."
 wingbreaker.1.f:0 "Our mages have desired to study the chimaeric properties of griffons since our arrival in Aritzakarri, and at nearly thirteen feet long, the Queen Griffon of Argi may well be the largest griffon currently living. Her suitability for our mutagenic experiments goes without saying.\n\nHowever, our new Cliffpercher subjects would not look kindly upon our killing of their sacred griffon..."
 wingbreaker.1.a:0 "We will kill the griffon, and consume its power."
 wingbreaker.1.b:0 "We will imprison the griffon, and study it."
 wingbreaker.1.c:0 "We can dispatch a team to study it in the wild."
 wingbreaker.2.t:0 "Breaker of Wings"
 wingbreaker.2.d:0 "Our experimentation with griffonwings has already begun to bear fruit as we introduce their chimaeric regenerative properties into our mutagen vats.All that remains is the question of what to do with the griffon hunters currently under our employ."
 wingbreaker.2.f:0 "With our stockpile of griffon parts suitably filled, we are no longer forced to use the more perfidious elements of the adventuring guilds under our employ.\n\nOn the other hand, there could be advantages to making these experienced beastkillers an ordained arm of the state."
 wingbreaker.2.a:0 "The griffon-hunters have become a valued part of our administration."
 wingbreaker.2.b:0 "These adventurers are loose cannons, and have served their purpose."
 wingbreaker.3.t:0 "The Flight of the Ogre"
 wingbreaker.3.d:0 "In a groundbreaking mutagenic treatment, our alchemists have successfully grafted working wings to an ogre."
 wingbreaker.3.f:0 "While the patient perished a few hours later, the alchemists are confident that they could use what they have learned from this test to devise a more efficient and at least moderately more survivable mutagenic process."
 wingbreaker.3.a:0 "We will only graft wings to our most elite soldiers."
 wingbreaker.3.b:0 "We will graft wings to all soldiers we believe can survive the process."
 wingbreaker.4.t:0 "Vats of Plenty"
 wingbreaker.4.d:0 "[SCOPE.sCulture('mutagen_culture').GetName] people in [SCOPE.sState('mutagen_state').GetName] have begun to express interest in the mutagen vats near their homes."
 wingbreaker.4.f:0 "The mutagenic spas of [SCOPE.sState('mutagen_state').GetName] have been abuzz as of late as [SCOPE.sCulture('mutagen_culture').GetName] people have begun making use of them. While there are no explicit rules against this, it is unknown if non-ogre species can safely expose themselves to the mutagens stored in these vats."
 wingbreaker.4.a:0 "All are welcome in our mutagen vats!"
 wingbreaker.4.b:0 "The risks are too great."
 wingbreaker.6.t:0 "The Strongest Potions"
 wingbreaker.6.d:0 "Using the ingredients collected by our retainers, our brilliant alchemists have created a mutagenic concoction that will empower our strongest mages even further."
 wingbreaker.6.f:0 "Each of the individual components become musicians in a great cacophony of mutagenic potential.Only the strongest and most-deserving ogres would be capable of surviving such a process, but those who did would walk amongst the strongest mages in Onghor history."
 wingbreaker.6.a:0 "Onghor magic will be the best in the world!"
 gnoll_mountain.1.t:0 "The Chittering Hills"
 gnoll_mountain.1.d:0 "Many years have passed since the orcs of [SCOPE.sCountry('yingulnado_scope').GetNameNoFlag] forced us from our mountains and pushed us into the dwarven ruins of the Chittering Hills."
 gnoll_mountain.1.f:0 "The #italic Nyolli#!, the \"mountain of the gnolls\" has long laid in orcish hands.However, as the gnolls of [ROOT.GetCountry.GetNameNoFlag] begin to venture outside their hold for the first time in years, whispers of revanchism begin to take hold in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName]."
 gnoll_mountain.1.a:0 "Gnollish resolve has no equal."
 gnoll_mountain.1.b:0 "We are not alone in our struggle against the orcs."
 gnoll_mountain.1.c:0 "We will not allow ourselves to be governed by rumors and whispers."
 gnoll_mountain.2.t:0 "The Mountain's Embrace"
 gnoll_mountain.2.d:0 "Many of our new subjects also reside in the dwarven ruins and gnollish warrens within the Nyolli. It is high time we embraced our underground heritage."
 gnoll_mountain.2.f:0 "With the Nyolli reclaimed, we have many formerly hostile orcs within our borders. Yet still, there is something we share with them."
 gnoll_mountain.2.a:0 "We are all one with the mountain."
 warren_gnoll_primary_tt:0 "80% of all [GetCulture('jungle_gnoll').GetName] [Concept('concept_pop', '$concept_pops$')] will convert to [GetCulture('warren_gnoll').GetName]."
 underkaal_tt:0 "50% of all [GetCulture('kaalkid').GetName] [Concept('concept_pop', '$concept_pops$')] in Gugnos and Tayigamu will convert to [GetCulture('underkaal').GetName]."
 coast_gnoll_tt:0 "50% of all [GetCulture('gnoll').GetName] [Concept('concept_pop', '$concept_pops$')] will convert to [GetCulture('warren_gnoll').GetName]."
 gnoll_mountain.3.t:0 "The Declaration of 1178"
 gnoll_mountain.3.d:0 "After thegovernment of [ROOT.GetCountry.GetNameNoFlag] retreated into the mountains beyond the Chittering Hills, many of the olden settlements of [SCOPE.sState('nyokia_scope').GetStateRegion.GetName] and [SCOPE.sState('dutakhamku_scope').GetStateRegion.GetName] were left to their own devices."
 gnoll_mountain.3.f:0 "After our staggering defeat at the hands of the orcs, the opportunistic gnollish tribes bordering the desert laid claim to much of our land to the east.In 1178, as the gnolls began to step outside their hold, it was decreed..."
 gnoll_mountain.3.a:0 "We will reclaim our frontier."
 gnoll_mountain.3.b:0 "These lands no longer belong to us."
 gnoll_mountain.4.t:0 "Excavation Complete"
 gnoll_mountain.4.d:0 "After months of digging, we have finally cleared the blockage in Gugnos."
 gnoll_mountain.4.f:0 "\"Can you believe it?There were entire communities of dwarves still living beyond the cave-in, completely oblivious to the world above them.\""
 gnoll_mountain.4.a:0 "With these caverns cleared, we may now make full use of this state."
 gnoll_mountain.5.t:0 "The New Gnollish Pilgrim"
 gnoll_mountain.5.d:0 "With the passage of [SCOPE.GetRootScope.GetCountry.GetActiveLawFromGroup('lawgroup_colonization').GetName], we can begin to reclaim our old borders."
 gnoll_mountain.5.f:0 "[SCOPE.sState('capital_scope').GetCityHubName] chitters with excitement as the first round of brave volunteers venture out into the plains. Many of the old settlements will have to rebuilt, and the warrens redug. However, despite the hardship, it is a rewarding life for those who can meet the challenge."
 gnoll_mountain.5.a:0 "Good luck!"
 gnoll_mountain.6.t:0 "A General Predicament"
 gnoll_mountain.6.d:0 "The recent expansion of the rank-and-file of the [ROOT.GetCountry.GetNameNoFlag] military now requires trained officers to lead them."
 gnoll_mountain.6.f:0 "While officerships in [ROOT.GetCountry.GetNameNoFlag] are traditionally either passed down within noble families or tied to specific ceremonial roles, command of the military ultimately lies with the ruler and their immediate council.With this in mind, there are two realistic candidates to head this expansion.\n\nOne of them, Haruni Kasanda, is both cousin to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], and a landowner in good standing. Kasanda is well-trained defensive organizer.\n\nThe other, Kasim Msemwa, is a former farmer who gained notoriety from leading a number of successful raids on the orcs to the west.Msemwa has, however, caught flak for his radical ideas, both on-and-off the battlefield."
 gnoll_mountain.6.a:0 "This man is a general, like his father before him."
 gnoll_mountain.6.b:0 "Perhaps it is time for some fresh blood."
 update_placeholder_tt:0 "This reward is a placeholder for the 1.8 cultures update."
 pirate_raid.2.t:0 "Pilfering Treasures"
 pirate_raid.2.d:0 "With our combined efforts, the ravager fleets were able to execute an attack on a Dumonian gold fleet as it anchored off the shores of the Coves. The ships and cargo have been seized. The former will be pressed into service, the latter is filling our coffers."
 pirate_raid.2.f:0 "Nobody saw the small boats approach the fleet in the depth of the night. By the time the alarm was raised, the escort detail had already been brought to heel. Faced with a Bonetider's pistol at her temple and with her marines caught off-guard, the captain was forced to make the prudent choice of relinquishing her command and open the magically locked cargo containers in exchange for the crewmembers' lives. As the Dumonians paddled their way to the distant lights of the Cove Colony, the pirates beheld the neatly stacked bars of gold. Each one stamped with the sigil of the South Sea Company. The Emperor would not be amused."
 pirate_raid.2.a:0 "Gold for the treasury!"
 pirate_raid.2.b:0 "Ships for the fleet!"
 pirate_raid.21.t:0 "Troubles on the South Sea"
 pirate_raid.21.d:0 "Our lack of naval assets has allowed the various pirate groups of the South Sea to slip past our patrols and execute a raid on one of our treasure fleets. The cargo was lost and rumours swirl about the ships being outfitted to conduct further raids. An embarassing failure of the Emperor's plans in the region and something we can not allow to stand!"
 pirate_raid.21.f:0 "Was it merely a temporary setback? Or a troubling sign that the Emperor's promises would come with more obstacles than the speeches and proclamations had ever admitted to? The investor class of Merchant Bay certainly suspected the latter. They had substantial assets riding on these colonial ventures. Pirates sharpening sabres and loading their pistols didn't look good on the risk assesment reports."
 pirate_raid.21.a:0 "How dare they?!"
 pirate_raid.3.t:0 "A Night on the Town with the Lads"
 pirate_raid.3.d:0 "Our newly combined raiding forces have smashed through the Cove Colony's defenses. Their island capital was sacked and set alight, it's treasury plundered and we have seized twelve ships that were too slow to escape us. How should we divide these spoils?"
 pirate_raid.3.f:0 "The vote came out roughly 3-1. As the flames of the colony tinted the night sky red, the show of hands decided the fate of the barrel of rum in their middle: Immediate execution by method of communal consumption. Bonetider, Serpent or Corsair, tonight, the distinctions vanished in a haze of booze and well-directed violence. Would this state last? Only time could tell."
 pirate_raid.3.a:0 "Uphold the Pirate's Code: Equal distribution of spoils!"
 pirate_raid.3.b:0 "We DID do most of the work here..."
 pirate_raid.31.t:0 "And Night of Grief and Fire"
 pirate_raid.31.d:0 "A pirate force far more coordinated than what we had previously thought possible has laid waste to our Cove Colony's capital. Most of it's treasures and many of the anchored ships have been seized, not to mention the widespread loss of life."
 pirate_raid.31.f:0 "The survivors spoke of a all three pirate bands working in concert. Of their callous pillaging of the peaceful colony. Sympathetic head nods all over polite society, but they all knew the real questions: What would be done to prevent more threats to their investments? And more importantly: Who would foot the bill for this one?"
 pirate_raid.31.a:0 "We will pay our fair share of the costs."
 pirate_raid.31.b:0 "We will pay for all the damages."
 pirate_raid.31.c:0 "We will pay for nothing. The Colony is responsible."
 pirate_raid.1.a:0 "[SCOPE.sCountry('raid_dum').GetName] shall bleed once more!"
 pirate_raid.1.b:0 "[SCOPE.sCountry('raid_random1').GetName] will be our target"
 pirate_raid.1.c:0 "How about [SCOPE.sCountry('raid_random2').GetName]?"
 pirate_raid.1.t:0 "Planning the Next Raid"
 pirate_raid.1.d:0 "The pirate captains have gathered to discuss their next target. Who shall be the unlucky victim of their next raid?"
 pirate_raid.1.f:0 "We have once more gathered to discuss our next target. The captains have made their suggestions, and now it is time to decide who shall be the next to feel the wrath of the pirate fleets."
 pirate_raid.4.t:0 "Raid Failed"
 pirate_raid.4.d:0 "Our raiding forces have been repelled by the defenders of the [SCOPE.sCountry('target_country').GetName]. The pirates have been forced to retreat, leaving behind a number of their own and a few ships."
 pirate_raid.4.f:0 "The defenders of [SCOPE.sCountry('target_country').GetName] have proven themselves to be a formidable foe. The pirates were forced to retreat, leaving behind a number of their own and a few ships. The captains are furious at the loss, and are eager to make the [SCOPE.sCountry('target_country').GetAdjective] pay for their insolence."
 pirate_raid.4.a:0 "We will have our revenge!"
 lighthouse.1.t:0 "The Guiding Light of Solitude"
 lighthouse.1.d:0 "A year after the initial proposition has been made, all the preparations have been done to start the construction of the lighthouse."
 lighthouse.1.f:0 "The architects speak of a grand lighthouse, a beacon of hope and safety for all who sail the seas. It has been designed in such a manner that requires no personnel to operate as long as the light is kept fueled. Mages and architects around the world have regarded the project as something of a marvel, and the merchants of the colonies are eager to see it completed."
 lighthouse.1.a:0 "Time to lay the foundations"
 lighthouse.2.t:0 "Bright Light Amongst the Waves"
 lighthouse.2.d:0 "The construction of the Light of Solitude has been completed. The lighthouse now stands tall and proud, a beacon of hope and safety for all who sail the seas."
 lighthouse.2.f:0 "What was once an mad idea has now become a reality. The Light of Solitude now stands tall and proud, a beacon of hope and safety for all who sail the seas. It's mechaninamism are a marvel of engineering, and the mages and architects who worked on the project are hailed as geniuses. It's construction has set a structural stardard for buildings around the world and is hailed by the many sailors that navigate the seas."
 lighthouse.2.a:0 "Wonderful"
 lighthouse.2.b:0 "Many are attracted by the Light of Solitude as the waves ebb and flow. "
 lighthouse_built_tooltip:0 "The Light of Solitude has been completed!"
 synthetic_dawn.1.t:0 "Soulwrought Settle In"
 synthetic_dawn.1.d:0 "[GetCulture('soulwrought').GetName] have become such a large part of the population in [ROOT.GetState.GetName] that they have become an inseparable part of the local culture."
 synthetic_dawn.1.f:0 "\"You ought to go see it sometime. They have their own street vendors, and musicians. The only think they didn't serve was food. I wonder what they'd serve at a Soulwrought restaurant...\""
 synthetic_dawn.1.a:0 "I, for one, welcome our new Soulwrought neighbors."
 synthetic_dawn.1.b:0 "They ought to spend less time on such trivial pursuits."
 synthetic_dawn.2.t:0 "Soulwrought Equality Movement"
 synthetic_dawn.2.d:0 "Large groups of [GetCulture('soulwrought').GetName] have gathered in [SCOPE.GetRootScope.GetCountry.GetCapital.GetCityHubName] to voice their support for [GetPlayer.GetLawBeingEnacted]."
 synthetic_dawn.2.f:0 "The Soulwrought gathered in the Capitol Gardens just after dawn and gave speeches and sang songs until late into the night. Discussed were not just topics of legal personhood and equality under the law, but a question that had long weighed upon the Soulwrought psyche: \"What does it mean to live?\"\nMany bright minds spoke on the question, but none had a singular answer for what it meant to be a Soulwrought."
 synthetic_dawn.2.a:0 "Of course we shall support such a righteous cause."
 synthetic_dawn.2.b:0 "Soulwrought belong in the factories and the fields, not in the Capitol."
 synthetic_dawn.3.t:0 "Equality Under The Law"
 synthetic_dawn.3.d:0 "With the passage of [SCOPE.GetRootScope.GetCountry.GetActiveLawFromGroup('lawgroup_citizenship').GetName], [GetCulture('soulwrought').GetName] are now equal to all other sentient beings in [ROOT.GetCountry.GetNameNoFlag]."
 synthetic_dawn.3.f:0 "\"Why, did you hear?A restaurant owned by a #italic soulwrought#! opened up!\" \n\"Why, what on earth do they serve?\"\n\"Oh, just regular pastries and cakes.What do they eat, anyway?\""
 synthetic_dawn.3.a:0 "They have fought hard for their new legal status."
 natural_borders.1.t:0 "The Limit of the Nation"
 natural_borders.1.d:0 "The notion of 'natural borders' has become popular among supporters of the [SCOPE.sCharacter('borders_leader').GetLastName] regime. The followers of Hasal demand the expansion of the [ROOT.GetCountry.GetAdjective] state into bordering regions."
 natural_borders.1.f:0 "\"Without clear, defensible borders, we will never be safe from human aggression. We will reach the edge of the horizon, from the banks of the [SCOPE.sState('twilgach_state').GetStateRegion.GetNameNoFormatting], to the peninsula of [SCOPE.sState('chelkspyr_state').GetStateRegion.GetNameNoFormatting], to the banks of [SCOPE.sState('glimmerdam_state').GetStateRegion.GetNameNoFormatting]. The boundaries of our nation must be there.\""
 natural_borders.1.a:0 "Our borders must reach the Twilgach."
 natural_borders.2.t:0 "The Natural Borders of Ravik"
 natural_borders.2.d:0 "With [ROOT.GetCountry.GetName] now extending to the far corners of the Galdorian Peninsula and the Twilgach, we have achieved what champions of this project have termed our 'natural borders'. We must now administer our newly-acquired territories."
 natural_borders.2.f:0 "The Thalorian official greeted the newcomer. Plenty of smallfolk were coming from further west nowadays. He pulled out his form and began writing.\n\"Yes, sir—err, scho. Your name, please?\"\n\"Ronvolf Durdeekt.\"\n\"Your age?\"\n\"Thirty-one.\"\n\"Occupation?\"\n\"Ah no! Just visiting.\""
 natural_borders.2.a:0 "They must learn to be Raviki."
 natural_borders.2.b:0 "Glory to the heroes of [ROOT.GetCountry.GetName]!"
 natural_borders.2.c:0 "We are the liberators of gnomekind."
 natural_borders.3.t:0 "The Treaty of Twilgach"
 natural_borders.3.d:0 "[SCOPE.sCountry('savoy_country').GetName] has agreed to cede the state of [SCOPE.sState('savoy_state').GetName] to [ROOT.GetCountry.GetName]."
 natural_borders.3.f:0 "\"The most powerful motives of political necessity, the exigencies of the future of gnomekind, the sentiment of gratitude towards our powerful ally, and, finally, the exceptional circumstances of our country, have decided, although with regret, our beloved [SCOPE.sCharacter('savoy_ruler').GetPrimaryRoleTitle] to separate the provinces which have been for so many centuries intimately bound up with our nation. All opposition should fall powerless before the interests of the country and the sentiment of duty.\""
 natural_borders.3.a:0 "Incorporate Twilgach post-haste."
 natural_borders.3.b:0 "Conduct a plebiscite to assuage the people."
 natural_borders.3.c:0 "We need not be indebted to [SCOPE.sCountry('savoy_country').GetNameNoFlag]."
 natural_borders.4.t:0 "Terror on the Twilgach"
 natural_borders.4.d:0 "[SCOPE.sCountry('ravik_scope').GetName] has announced its ambitions to extend its borders from the Twilgach to the Galdorian peninsula. This puts [SCOPE.sState('french_claim_state').GetName] in considerable danger of invasion."
 natural_borders.4.f:0 "\"Those Raviki gnomes haven't been right since Hasal, but they've been even worse since he disappeared. They're gonna kick down our doors and stuff our souls into their machines!\"\n\n\"Could we count on a new alliance to hold back the gnomes? The last war left us all so bloody that any peace is worth saving.\""
 natural_borders.4.f2:0 "The Raviki, no longer satisfied with merely liberating those gnomes trapped under human rule, have turned their eyes eastward towards our lands west of the Twilgach. In every town and wald, the criers speak out, beckoning for adventurers to heed the call to defend their ancestral woods."
 natural_borders.4.a:0 "Muster every able body to defend their homes."
 natural_borders.4.b:0 "Perhaps appeasement is the best approach."
 notification_fra_natural_borders_notification_name:0 "Raviki Ambitions"
 notification_fra_natural_borders_notification_desc:0 "[SCOPE.sCountry('ravik_scope').GetName] has announced its intentions to expand towards its 'natural borders', spanning from Chelkspyr to the Twilgach."
 no_natural_borders:0 "Rejected Natural Raviki Borders"
 rally_against_france:0 "Rally against Ravik"
 dismiss_natural_borders_tt:0 "The 'Natural Borders of Ravik' Journal Entry will be dismissed"
 natural_borders_assimilation:0 "Raviki Assimilation"
 rav_annex_twilgach:0 "The Treaty of Twilgach"
 rav_annex_twilgach_desc:0 "The province of Twilgach is a natural part of the Raviki nation, and is already home to gnomes of many colors. It may be possible, through diplomatic means, to convince their government to cede the territory."
 obligation_for_savoy_tt:0 "We will trade in our Obligation for Twilgach"
 centralize_soulwrought_ai:0 "Centralize Soulwrought"
 centralize_soulwrought:0 "Centralize Soulwrought Assembly"
 centralize_soulwrought_desc:0 "At present, [GetCulture('soulwrought').GetName] production within our country is disparate and disconnected. There may be benefits to be had from establishing a single \"Soulwrought Economic Zone\" where would-be factory owners could be encouraged to set up their assembly plants."
 centralize_soulwrought_ai_desc:0 "At present, [GetCulture('soulwrought').GetName] production within our country is disparate and disconnected. There may be benefits to be had from establishing a single \"Soulwrought Economic Zone\" where would-be factory owners could be encouraged to set up their assembly plants."
 sell_twilgach:0 "The Treaty of Twilgach"
 sell_twilgach_desc:0 "The province of Twilgach has become a matter of contention between our nation and Ravik. If we are willing to cede Twilgach, Ravik would surely consider themselves to be in our debt."
 demand_vermillion_lands_decision:0 "Demand Former Vermillion Lands"
 demand_vermillion_lands_decision_desc:0 "Before the [concept_nightfall], Vairian empire held many lands in what is now the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName]. We must demand our bennefactor return them to us."
 vermillion_expedition_decision:0 "Expedition into the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName]"
 vermillion_expedition_decision_desc:0 "Our rivals in Vairia are already beginning to throw their support behind their kin in Varilafdt; we cannot allow this to go unopposed. We must make contact with the elves living within the Thicket."
 borasak_magic_advisors_decision:0 "Invite Borasaki Magic Advisors"
 borasak_magic_advisors_decision_desc:0 "The Long Sleep of the Borasaki dwarves means that there are still living members among them who remember the time before the [concept_godsbane]; they could teach us much."
 modernize_asvean:0 "Modernize the Asvëan"
 modernize_asvean_desc:0 "The rangers of the Asvëan have been sworn to defend the lands of our people for over three hundred years. However, warfare has changed much in this time. Gone are the days where a small party of rangers can turn the tide of battle.\n\nThis does not, however, mean the Asvëan are obsolete. By offering them a permanent place in our military forces, they could turn even our greenest recruits into capable wilderness survivalists."
 no_sappers_tt:0 "We will no longer have access to the $je_asvean_military$ [concept_journal_entry]"
 stronger_than_af_tt:0 "[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] [concept_clout] is higher than [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetNameWithCountryVariant] [concept_clout]"
 demand_alchemist_reparations:0 "Demand Reparations over Alchemist's Refuse"
 demand_alchemist_reparations_desc:0 "After the so-called 'distillery accident' of 1165, the old Craggedwyn Company was dissolved after much international pressure. However, Ludric Zarnak's promised investigation never came, and much of the old leadership avoided repercussions by reconglomerating under the $company_craggedwyn$ brand.  We must demand Ceraun pay reparations for the damages caused."
 alchemist_reparation_tt:0 "We will pressure Ceraun for reparations"
 no_war_with_ceraun_tt:0 "Not at war with #bold Ceraun#!"
 obligation_for_kilimakazi_tt:0 "We will offer an Obligation for Kilimakazi"
 citrus_pact_snb_tt:0 "We will sign an Alliance and grant them Investment Rights"
 kilimakazi_for_obligation_tt:0 "We will offer Kilimakazi for an Obligation"
 citrus_pact_blue_tt:0 "We will sign an Alliance and be granted Investment Rights"
 mutant_mayhem.1.t:0 "Mutants Settle In"
 mutant_mayhem.1.d:0 "[GetCulture('mutant').GetName]s have become such a large part of the population in [ROOT.GetState.GetName] that they have formed their own insular communities."
 mutant_mayhem.1.f:0 "\"YOUR CHILDREN:In Danger?\"\n\"She took me to a place back behind the old textile mill. After knocking in a very particular way against a very nondescript stone wall, a hatch opened up and we were welcomed inside. There was food, and dancing, it was all a very normal party.Except for one thing; they were all mutants!\"\n\nArticles like this one ran in all the papers in [ROOT.GetState.GetStateRegion.GetCityHubName] this morning, and now the the public is rapidly becoming aware of just how many mutants live amongst them."
 mutant_mayhem.1.a:0 "It's good to see them making the best of their situation."
 mutant_mayhem.1.b:0 "We shouldn't let these abominations get too comfortable."
 mutant_mayhem.2.t:0 "The Mutant Community"
 mutant_mayhem.2.d:0 "Unlucky recipients of mutagenic treatments have begun forming their own independent communities in [SCOPE.sState('mutant_state').GetName]."
 mutant_mayhem.2.f:0 "\"I've seen the way they look at us. Why would I want to work for someone who hates us?\"\n\n\"Because we haven't another choice!\"\n\n\"Well, what if we did?\""
 mutant_mayhem.2.a:0 "We should encourage this behavior."
 mutant_mayhem.2.b:0 "Perhaps we could centralize our mutagenetic tests here."
 mutant_mayhem.2.c:0 "It is not our business to interfere."
 je_beauty_in_bloom:0 "The Age of Roses"
 je_beauty_in_bloom_reason:0 "The status of the #bold Progress Bar#! will be determined by various #tooltippable;tooltip:[Country.GetTooltipTag],je_beauty_in_bloom_special_tooltip_advance positive#! or #tooltippable;tooltip:[Country.GetTooltipTag],je_beauty_in_bloom_special_tooltip_deplete negative#! conditions. The #bold Progress Bar#! reaching #bold 100#! will cement the power of Florensires in [SCOPE.sCountry('beauty_in_bloom_country_scope').GetName]. Next month, the #bold Progress Bar#! will change by #variable [Country.MakeScope.Var('beauty_in_bloom_next').GetValue|+=]#!.\n\nDepleting the progress bar and keeping the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] out of government will end the #bold Age of Roses#! in the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] and end the threat of Florensires in the country.\n\n#italic Following the [concept_blooming], charismatic [SCOPE.GetRootScope.GetCountry.GetInterestGroupOfType('ig_devout').GetName] leaders have been on a crusade to spread the virtues of the Rose Court beyond [ROOT.GetCountry.GetName]'s borders'. These \"Florensires\" have come to define much of [ROOT.GetCountry.GetAdjective] poltics.#!"
 je_beauty_in_bloom_lobby:0 "The status of the #bold Progress Bar#! will be determined by various #tooltippable;tooltip:[Country.GetTooltipTag],je_beauty_in_bloom_special_tooltip_advance positive#! or #tooltippable;tooltip:[Country.GetTooltipTag],je_beauty_in_bloom_special_tooltip_deplete negative#! conditions. The #bold Progress Bar#! reaching #bold 100#! will cement the power of Florensires in [SCOPE.sCountry('beauty_in_bloom_country_scope').GetName]. Next month, the #bold Progress Bar#! will change by #variable [Country.MakeScope.Var('beauty_in_bloom_next').GetValue|+=]#!.\n\nDepleting the progress bar and keeping the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] out of government will end the #bold Age of Roses#! in the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] and end the threat of Florensires in the country.\n\n#italic Following the [concept_blooming], charismatic [SCOPE.GetRootScope.GetCountry.GetInterestGroupOfType('ig_devout').GetName] leaders have been on a crusade to spread the virtues of the Rose Court beyond [ROOT.GetCountry.GetName]'s borders'. These \"Florensires\" have come to define much of [ROOT.GetCountry.GetAdjective] poltics.#!"
 temple_tulips_2_construct_tt:0 "A second level of the $building_temple_of_tulips_2$ may be constructed in the State Panel for [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_AUBERN_FLOW')]"
 je_beauty_in_bloom_special_tooltip_advance:0 "The [concept_journal_entry] will end when the progress bar is either full or empty. \n\nThese factors will #bold advance#! the progress bar by #bold 1 per month each:#!\n• The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are [concept_powerful]\n• The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are [concept_in_government]\n• We have [GetLawType('law_autocracy').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_technocracy').GetName], or [GetLawType('law_single_party_state').GetName]\n• We have a [concept_general] or [concept_admiral] who is [Concept('concept_popularity','$loved$')]\n• We have a [concept_ruler] with the #bold Authoritarian#! ideology"
 je_beauty_in_bloom_special_tooltip_deplete:0 "The following factors will #bold deplete#! the progress bar by #bold 1 per month each#!:\n• The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are [concept_marginalized]\n• The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are not [concept_in_government]\n• We have [GetLawType('law_census_voting').GetName] or [GetLawType('law_universal_suffrage').GetName]\n• We have a [concept_politician] who is [Concept('concept_popularity','$loved$')], and belongs to any [concept_powerful] interest group that does not approve of [GetLawType('law_autocracy').GetName], [GetLawType('law_oligarchy').GetName], [GetLawType('law_technocracy').GetName], and [GetLawType('law_single_party_state').GetName]"
 beauty_in_bloom.1.t:0 "The Age of Roses"
 beauty_in_bloom.1.d:0 "Following the [concept_blooming], charismatic [SCOPE.gsInterestGroup('devout_scope').GetName] leaders have set out to spread the virtues of the Rose Court beyond [ROOT.GetCountry.GetName]'s borders."
 beauty_in_bloom.1.f:0 "As magical roses appeared after the [concept_blooming], they became an important symbol for the humans of Thiral. But the roses didn't just bloom for anyone. Those deemed unworthy or selfish could not approach them without wilting the flowers. These 'Unbloomed' roses became a symbol of sin and moral failing, driving a renewed effort in purifying society and enforcing the chivalric code.\n\nThe perceived religious failings of the unbloomed roses, coupled with the arrival of magic, enhanced the power of the Florensires over the peasantry. With the roses from The Blooming granting magical abilities tied to virtue, the Florensires were able to protect, heal, and sometimes punish with divine force. These powers were seen as evidence of their sacred status, reinforcing their superiority. Furthermore, peasants under their care flourished while neighboring countries suffered the consequences of the [concept_nightfall], further cementing a belief in their sopposedly divine paternal role."
 beauty_in_bloom.1.a:0 "To perceive divinity is to believe."
 beauty_in_bloom.2.t:0 "The Last Petal"
 beauty_in_bloom.2.d:0 "The Age of Roses is, at long last, at an end in [ROOT.GetCountry.GetName]. The [SCOPE.gsInterestGroup('devout_scope').GetName] have assumed their rightful place of service to the legitimate government."
 beauty_in_bloom.2.f:0 "After years of dominance, the influence of The Rose Court begins to wilt. The power of the Bloomwardens, once seen as divine and infallible, has come under severe scrutiny. Without a popular mandate to bolster their authority, the clergy's influence begins to crumble, and the nobility, no longer bound by their religious duties, returns to self-interest and power struggles.\n\nThe peasants, once dependent on the Bloomwardens, grow restless, and the old ways of governance fade away. As the roses wither, so too does the religious fervor, and the nation of Thiral slips back into its former state of political intrigue and secular rule"
 beauty_in_bloom.2.a:0 "We leave the past in the past."
 beauty_in_bloom.3.t:0 "Deep Roots"
 beauty_in_bloom.3.d:0 "[ROOT.GetCountry.GetName] has become fully immersed in religious politics. The fate of the nation is governed by the whims of the of the [SCOPE.gsInterestGroup('devout_scope').GetName]."
 beauty_in_bloom.3.f:0 "The [SCOPE.gsInterestGroup('devout_scope').GetName] and the Florensires solidify their power, becoming deeply entrenched in [ROOT.GetCountry.GetAdjectiveNoFlag] politics. The Bloomwardens, wielding both spiritual and military might, guide the nobility and the country with an iron grip, ensuring strict adherence to the ideals of chivalry and virtue.\n\nTheir influence spreads through every facet of governance, as the knights of the Rose Court enforce religious laws and maintain order with formidable prowess. [ROOT.GetCountry.GetNameNoFlag] becomes a nation where the ideals of The Rose Court dictate every aspect of life, as the Bloomwardens and their knightly allies weave a new political and spiritual order, ensuring their dominance is both revered and unchallenged."
 beauty_in_bloom.3.a:0 "May the faith never waver again."
 beauty_in_bloom_complete:0 "The progress bar is depleted"
 je_beauty_in_bloom_goal_tt:0 "The progress bar is full"
 lose_beauty_in_bloom_points:0 "The progress bar on the #bold Age of Roses#! [concept_journal_entry] is depleted by #bold 100 points#!"
 lose_large_beauty_in_bloom_points:0 "The progress bar on the #bold Age of Roses#! [concept_journal_entry] is depleted by #bold 200 points#!"
 gain_beauty_in_bloom_points:0 "The progress bar on the #bold Age of Roses#! [concept_journal_entry] is advanced by #bold 100 points#!"
 gain_large_beauty_in_bloom_points:0 "The progress bar on the #bold Age of Roses#! [concept_journal_entry] is advanced by #bold 200 points#!"
 continuismo:0 "Roots Planted"
 no_continuismo:0 "Constitutional Reappointment"
 beauty_in_bloom.4.t:0 "Strong Roots"
 beauty_in_bloom.4.d:0 "According to the [ROOT.GetCountry.GetAdjective] Constitution, [SCOPE.sCharacter('ruler_scope').GetFullName]'s term is over and a new [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] must be appointed. Of course, the Constitution can always be ammended, or perhaps the role should go to [SCOPE.sCharacter('ruler_scope').GetHerHis] protégé [SCOPE.sCharacter('president_successor_scope').GetFullName]."
 beauty_in_bloom.4.f:0 "\"Your term in office is over. The laws of [ROOT.GetCountry.GetNameNoFormatting]-\"\n\n\"I am the law in [ROOT.GetCountry.GetNameNoFormatting]!\""
 beauty_in_bloom.4.a:0 "Extend the [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]'s term."
 beauty_in_bloom.4.b:0 "The [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] must step down."
 beauty_in_bloom.4.c:0 "A chance for [SCOPE.sCharacter('president_successor_scope').GetFullName] to show [SCOPE.sCharacter('president_successor_scope').GetHerHis] quality."
 retire_ruler:0 "[SCOPE.sCharacter('ruler_scope').GetFullName] retires from political life"
 beauty_in_bloom_kingmaker_tt:0 "Has not supported a [concept_party]"
 beauty_in_bloom_kingmaker_effect_tt:0 "The [concept_leader] of the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] chooses which [concept_party] to support"
 devout_support_conservative:0 "The [SCOPE.gsInterestGroup('devout').GetName] will support the [SCOPE.sParty('conservative_party').GetName] under the leadership of [SCOPE.sCharacter('devout_leader').GetFullName]"
 devout_support_liberal:0 "The [SCOPE.gsInterestGroup('devout').GetName] will support the [SCOPE.sParty('liberal_party').GetName] under the leadership of [SCOPE.sCharacter('devout_leader').GetFullName]"
 devout_support_communist:0 "The [SCOPE.gsInterestGroup('devout').GetName] will support the [SCOPE.sParty('communist_party').GetName] under the leadership of [SCOPE.sCharacter('devout_leader').GetFullName]"
 devout_support_fascist:0 "The [SCOPE.gsInterestGroup('devout').GetName] will support the [SCOPE.sParty('fascist_party').GetName] under the leadership of [SCOPE.sCharacter('devout_leader').GetFullName]"
 beauty_in_bloom.5.t:0 "This Season's Bouquet"
 beauty_in_bloom.5.desc:0 "As leader of the [SCOPE.gsInterestGroup('devout').GetName], [SCOPE.sCharacter('devout_leader').GetFullName] must decide whether the clergy will back the [SCOPE.sParty('liberal_party').GetName] or the [SCOPE.sParty('conservative_party').GetName]."
 beauty_in_bloom.5.f:0 "Supplicants. That was the word [SCOPE.sCharacter('devout_leader').GetLastNameNoFormatting] thought when the representatives addressed [SCOPE.sCharacter('devout_leader').GetHerHim]. Flattery, gifts, appeals to family, veiled consequences: as much in lockstep as [SCOPE.sCharacter('devout_leader').GetHerHim] parading troops. But the question was this: which served him best?"
 beauty_in_bloom.5.a:0 "The clergy protects the interests of the elites."
 beauty_in_bloom.5.b:0 "Reform will come at the edge of a sword."
 beauty_in_bloom.5.c:0 "The clergy will struggle alongside the people."
 beauty_in_bloom.5.d:0 "The clergy stands for order above all."
 south_america_two_party_system:0 "South American Two-Party Dominance"
 beauty_in_bloom_support:0 "In the Bouquet"
 beauty_in_bloom_kingmaker_button:0 "Determine Clergy Support for Parties"
 beauty_in_bloom_kingmaker_button_desc:0 "Powerful bloomwardens have immense political influence, and can turn the tide of party politics by backing one party against another."
 has_elections_tt:0 "Country has [Concept('concept_election','$concept_elections$')]"
 beauty_in_bloom_rule_by_decree_modifier:0 "Rule by Decree"
 beauty_in_bloom_decree_button:0 "Rule by Decree"
 beauty_in_bloom_decree_button_desc:0 "The leader of our nation should not be burdened by bothersome governmental process, whether bureaucratic or democratic. If the nation is ordered to jump, it should ask \"how high?\""
 beauty_in_bloom.6.t:0 "Leadership Challenge"
 beauty_in_bloom.6.d:0 "[SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetFullName], a popular military commander, has begun to challenge the civilian leadership of the [SCOPE.gsInterestGroup('leadership_challenge_ig').GetName] under [SCOPE.sCharacter('leadership_challenge_politician').GetFullName]. The [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle]'s ambitions threaten to expand florensire rule to yet another sector of society."
 beauty_in_bloom.6.f:0 "#bold New Martial Offensive: Civil Offices Under Fire! #!\n\nA peculiar clarion sounded this morning as [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetFullNameNoFormatting] announced [SCOPE.sCharacter('leadership_challenge_commander').GetHerHis] intentions to introduce sweeping reforms amongst the current polity under [SCOPE.sCharacter('leadership_challenge_politician').GetFullNameNoFormatting]. Whispers from [ROOT.GetCountry.GetCapital.GetCityHubName]'s streets about [SCOPE.sCharacter('leadership_challenge_politician').GetFullNameNoFormatting]'s leadership have become cries to step down, rising in chorus with denouncements against [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetLastNameNoFormatting]. (Cont. Pg. 3)"
 beauty_in_bloom.6.a:0 "Trust in the heroism of [SCOPE.sCharacter('leadership_challenge_commander').GetPrimaryRoleTitle] [SCOPE.sCharacter('leadership_challenge_commander').GetLastName]."
 beauty_in_bloom.6.b:0 "The [SCOPE.gsInterestGroup('leadership_challenge_ig').GetName] must remain under civilian control."
 politician_gets_pushed_out_tt:0 "[SCOPE.sCharacter('leadership_challenge_politician').GetFullName] will be forced out of politics"
 beauty_in_bloom.7.t:0 "Cultural Clout"
 beauty_in_bloom.7.d:0 "Construction has completed with an art and natural history museum now situated in Riverend. The advancement of culture and learning in [SCOPE.sState('relevant_state').GetName] will be indisputable."
 beauty_in_bloom.7.f:0 "\"With regard to the city of Riverend, she is at the present time in what may be termed a transition state owing to the destruction and pulling down other fortifications, and the erection of boulevards in their stead, not inferior to those erected in Viceroy's Pearl by the Taldren dynasty. In truth, Riverend may be likened to a second Viceroy's Pearl in miniature. If the city continues on this path, of which there is every apparent probability, Thiral may boast of the possession, within twenty years, of one of the best-planned and best built cities in Western Zalaron.\"—By A Vystemian Visitor"
 beauty_in_bloom.7.a:0 "This will be the legacy of the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant]."
 modifier_kunsthistorisches:0 "Art History Museum of Riverend"
 modifier_naturhistorisches:0 "Natural History Museum of Riverend"
 everfrost_expedition.101.t:0 "Expedition to the Everfrost"
 everfrost_expedition.101.d:0 "Everfrost, the ancient land of giants, is a frozen wilderness untouched by other mortals. An expedition into the north would be perilous, but the glory of being the first uncover its secrets is beyond measure."
 everfrost_expedition.101.f:0 "Whispers echo through the hallowed halls of the world's most prestigious academies, as the allure of unraveling one of the greatest mysteries in history becomes irresistible.\n\nDeep in the heart of Everfrost, beyond the forbidding Gruaav Mountains, lies the fabled land of Bremala, believed to be the birthplace of giants. Yet, despite the legends, many question whether this mythical realm exists at all, or if it's merely a story spun from ancient lore."
 everfrost_expedition.101.a:0 "I know just the man for the job."
 everfrost_expedition.101.b:0 "Can the treasury bear such an expense?"
 everfrost_expedition.102.t:0 "Untempered by the Cold"
 everfrost_expedition.102.d:0 "We must choose a leader for the upcoming expedition to the Everfrost. A few promising candidates have distinguished themselves."
 everfrost_expedition.102.f:0 "Few people are capable of rightly appreciating this heroic deed, this brilliant proof of human courage and energy. These men will venture right into the heart of the pack ice and razworwinds, which all previous explorers have regarded as certain death. These men are heroes — heroes in the highest sense of the word."
 everfrost_expedition.102.a:0 "[SCOPE.sCharacter('expedition_leader_1').GetFullName] is an experienced explorer."
 everfrost_expedition.102.b:0 "[SCOPE.sCharacter('expedition_leader_2').GetFullName] will lead us to glory."
 everfrost_expedition.102.c:0 "[SCOPE.sCharacter('expedition_leader_3').GetFullName] has never let us down before."
 everfrost_expedition.102.e:0 "[SCOPE.sCharacter('expedition_leader_4').GetFullName] is the most prepared one."
 everfrost_expedition.1.t:0 "The Crown of the World"
 everfrost_expedition.1.d:0 "The expedition spots the lowest peak of the Gruaav range on the horizon, Mount Krutum. Runestones assert that the cliffs tend to be plagued by terrible storms. Thankfully we find the mountains at peace."
 everfrost_expedition.1.f:0 "\"They rose starkly into the northern sky, revealing an array of impossibly high mountain peaks. The crystalline snowflakes danced in the air, refracting light and creating a dreamlike quality. Against the backdrop of shimmering ice-dust clouds, the peaks inspired a curious sense of fantasy, their jagged silhouettes glowing in the ethereal light.\""
 everfrost_expedition.1.a:0 "We should move on quickly."
 everfrost_expedition.1.b:0 "Collect geological samples."
 everfrost_expedition.1.c:0 "Ascend Mount Krutum. We will be the first to reach Bremala!"
 gruaav_mountains_modifier:0 "Studied the Gruaav Mountains"
 everfrost_expedition.2.t:0 "Halfway Hut"
 everfrost_expedition.2.d:0 "The expedition disembarks upon the frozen shore of the Everfrost. At a relatively accessible location, a crewman suggests constructing a durable hut where we could rest and leave supplies for the return journey, and perhaps even for future explorers."
 everfrost_expedition.2.d2:0 "The expedition disembarks upon the frozen shore of the Everfrost, and is welcomed by the reassuring sight of a wooden hut. Only slightly snowed-in, it is easily made habitable and the crew discover ample supplies of food within."
 everfrost_expedition.2.f:0 "\"The temperature of the hut is low, of course, but in every other respect we are absolutely comfortable. There is an unlimited quantity of biscuit, and our discovery at Pram Point means an unlimited supply of seal meat. An empty kerosene tin and some firebricks have been made into an excellent little stove, which has been connected to the old stove-pipe. Already we can regard it as a temporary home.\""
 everfrost_expedition.2.a:0 "This hut shall stand the test of time."
 everfrost_expedition.2.b:0 "The hut need only last until our return."
 everfrost_expedition.2.c:0 "We should rest and resupply before moving on."
 everfrost_expedition.3.t:0 "Missed the Mark"
 everfrost_expedition.3.d:0 "The expedition has realized that they have overshot on their route towards the next supply depot."
 everfrost_expedition.3.f:0 "\"As we continued our way through the merciless white, snow cairns had become more and more scarce. Or that we thought. \"It's almost evening.\" We all stopped. \"Do we have enough food?,\" I managed to ask. We all knew the answer, we all knew why I was asking. A single nod, no one talked. We all knew that those lies were as white as this land.\""
 everfrost_expedition.3.f2:0 "\"As we continued our way through the merciless white, snow cairns had become more and more scarce. Or that we thought. God help us, we can't keep up this pulling, that is certain. Amongst ourselves we are unending cheerful, but what each man feels in his heart I can only guess.\""
 everfrost_expedition.3.a:0 "We need those supplies. Turn back."
 everfrost_expedition.3.b:0 "Push on, we can do without the supplies."
 everfrost_expedition.4.t:0 "The End Is Near"
 everfrost_expedition.4.d:0 "The expedition is doomed. Utterly exhausted, frostbitten, and out of supplies, all that is left to do is await the cold embrace of death."
 everfrost_expedition.4.f:0 "\"Every day we have been ready to start for our depot 11 miles away, but outside the door of the tent it remains a scene of whirling drift. I do not think we can hope for any better things now. We shall stick it out to the end, but we are getting weaker, of course, and the end cannot be far. It seems a pity but I do not think I can write more.\"\n\n\"For God's sake look after our people.\""
 everfrost_expedition.4.a:0 "I am just going outside and may be some time."
 everfrost_expedition.5.t:0 "The Ice Wall"
 everfrost_expedition.5.d:0 "The expedition has reached its destination: the South Pole! [SCOPE.sCharacter('expedition_leader').GetFullName] proudly erects a tent bearing the [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] flag, and the crew drink a celebratory mug of cocoa."
 everfrost_expedition.5.d2:0 "The expedition reaches the South Pole only to find a tent bearing the [SCOPE.sCountry('pole_winner_country').GetAdjectiveNoFormatting] flag. We have been beaten to our goal!"
 everfrost_expedition.5.f:0 "\"Bremala. Colossal, silent. The ice shimmered with an unnatural glow, as if the very glacier concealed a pulse beneath its surface. Beneath our trembling boots, an empire of frost, ancient and frozen, awaited discovery. The wall stretched beyond sight, towering and endless. Lifeless, but real.\""
 everfrost_expedition.5.f2:0 "We've found what can only be Bremala, encased in a monumental wall of ice. Its grandeur is undeniable, yet the sight is soured by a lone tent flying the [SCOPE.sCountry('pole_winner_country').GetAdjectiveNoFormatting] flag. We've been beaten to our prize!"
 everfrost_expedition.5.a:0 "Success! But now the hard journey home begins..."
 everfrost_expedition.5.b:0 "Damnation! And now the hard journey home begins..."
 everfrost_expedition.6.t:0 "Dog Meat"
 everfrost_expedition.6.d:0 "Supplies are running low for the explorers in the heart of the Everfrost. The crew debates the merits of killing some of the sled dogs, and dividing the meat between the men and the remaining dogs to increase their odds of survival."
 everfrost_expedition.6.f:0 "\"One cannot calmly contemplate the murder of animals which possess such intelligence and individuality, which have frequently such endearing qualities, and which very possibly one has learnt to regard as friends and companions.\"\n\n\"We have agreed to shrink from nothing to achieve our goal! And besides if we do not do this, the dogs will surely die from malnutrition or exhaustion regardless.\""
 everfrost_expedition.6.a:0 "It is the practical thing to do."
 everfrost_expedition.6.b:0 "We will not stoop to such barbarism!"
 pet_dog.tt:0 "You pet the dogs and continue the journey."
 ate_dogs_modifier:0 "Ate the Dogs"
 everfrost_expedition.7.t:0 "Homecoming"
 everfrost_expedition.7.d:0 "The crew of the Everfrost expedition have finally returned home. Though they did not succeed in their goal, their efforts have advanced scientific progress and paved the way for future explorers."
 everfrost_expedition.7.d2:0 "The crew of the Everfrost expedition have finally returned home. As the first men ever to reach Bremala, they are lauded as [SCOPE.sCountry('expedition_country').GetAdjectiveNoFormatting] heroes."
 everfrost_expedition.7.f:0 "\"Glory. Victory. Cheers and parades. Absurd sums of money. Kind words. The repetition of the hero's shadow over one's own name. The crew. That precious group of indomitable bastards. Home. Days. Nights. How much I had missed the days and the nights, their calculated succession. The boredom of the routine. Waking up on my bed. Hot chocolate. Coffee. Tea. My favorite tartlets. How much I had missed the noise from this street.\""
 everfrost_expedition.7.a:0 "We will succeed next time."
 everfrost_expedition.7.b:0 "They are a credit to their nation."
 succesfull_ice_wall_modifier:0 "Successful Bremala Explorer"
 everfrost_expedition.8.t:0 "Pack Ice"
 everfrost_expedition.8.d:0 "Broken pieces of sea ice start to cover the surface of the water as the expedition approaches its destination. The ship's hull tries to make its way through the cold mass by ramming and crushing, but the ice becomes stronger as they advance."
 everfrost_expedition.8.f:0 "\"It wouldn't be sound to confess that such a peril intrigued me, but the imminent arrival of our final goal, announced by the increasing sea ice that surrounded us, could not but terrify and fascinate me at the same time. The snow cover that extended over it had prevented the sea from reflecting our silhouettes or our ship's — there was nothing else to see: it was just us, and Bremala.\""
 everfrost_expedition.8.a:0 "Onwards!"
 everfrost_expedition.8.b:0 "We have to trust [SCOPE.sCharacter('expedition_leader').GetFullName]'s expertise."
 everfrost_expedition.9.t:0 "Icebound"
 everfrost_expedition.9.d:0 "A series of pressure waves struck the expedition's ship, causing the ice around it to separate into large pieces. A moment of victory is quickly followed by two floes being pinched on her starboard side, one at her bow and one at her stern. The crew gathers as they make a plan to free her."
 everfrost_expedition.9.d2:0 "Blasting a path through the pack ice proved to be a Sisyphean task. Worse, the encroaching ice is crushing the ship. Even if it were possible to free her from the ice, she is no longer seaworthy. The only remaining option is to abandon ship and hope to find a whaling outpost on foot."
 everfrost_expedition.9.f:0 "\"The cold had reached us. The planks of antique oaks were now shyly hidden behind snow-laden layers of white, and the whole ship would have seemed deserted if it wasn't for the tremulous lights that we had managed to keep lit. The ice was engulfing us, and with its natural grace started to stab our precious shelter.\""
 everfrost_expedition.9.a:0 "We'll blast through the ice!"
 everfrost_expedition.9.b:0 "Abandon ship."
 everfrost_expedition.10.t:0 "Whaling Station"
 everfrost_expedition.10.d:0 "[SCOPE.sCharacter('expedition_leader').GetFullName] has successfully led the expeditionary crew to a whaling station, braving the journey from Elephant Island in an uncovered lifeboat with meager supplies. Tales of [SCOPE.sCharacter('expedition_leader').GetFirstName]'s heroism resound throughout the nation despite the failure of the expedition."
 everfrost_expedition.10.f:0 "\"During our last night camping under the ruthless white, our cook had asked me if it had been a tough decision, \"going back,\" he had said, \"after making it so far, wasn't it hard?\". No, I wanted to say. No, it wasn't.\n\nWhat joy could Bremala bring to a man, trapped between the sea and the mountain ranges, a starving silhouette of fog and cold? If the dry air had blown slightly stronger, we would all had dispelled, like diaphanous flakes of snow.\""
 everfrost_expedition.10.a:0 "Three cheers for [SCOPE.sCharacter('expedition_leader').GetFullName]!"
 safe_everfrost_exp_modifier:0 "Polar Savior"
 everfrost_expedition.11.t:0 "The Great Ice Barrier"
 everfrost_expedition.11.d:0 "As the expedition's ship turns to the side, the crew witnesses in awe a high, perpendicular face of ice; their only entrance to the continent."
 everfrost_expedition.11.f:0 "\"And there it stood. If it had a face, I know it'd be laughing at us. That ridiculous cracking sound — the ice breaking. And there it goes, there, a block falls into the sea. Threatening. Fatal. It's in the direction of our ship. This moment had haunted our minds since when we left the last harbor. Sailing had been difficult, but going into that uncharted continent would be like descending into the depths of a frozen hell.\""
 everfrost_expedition.11.a:0 "We must climb it!"
 everfrost_expedition.11.b:0 "We should make a detour around the fissures."
 everfrost_expedition.12.t:0 "The Gruaav Mountains"
 everfrost_expedition.12.d:0 "The expedition has advanced through eternal days of snow marching until finding the impenetrable sight of the Gruaav Range. A new challenge awaits, as their routes have been scarcely documented."
 everfrost_expedition.12.f:0 "\"The ever-gray sky had left us in a state of cruel anesthesia, incapable of discerning the line that separated snow from atmosphere, snow from footprints, snow from us. A sharper gray was laid before us, and in its numbness resided a familiar comfort.\n\nThe wall of stone was covered in white, and it took us most of the day to understand that it was no vertical sky, no heaven falling upon us, the final chant, the doomed trumpets, a mirage. Those were mountains.\""
 everfrost_expedition.12.a:0 "We'll find a new route."
 everfrost_expedition.12.b:0 "We'll be taking a known approach."
 everfrost_expedition.13.t:0 "Strange Marks"
 everfrost_expedition.13.d:0 "During the expedition's advances through the snow a strange rock with unknown marks has been discovered, partly buried under their feet."
 everfrost_expedition.13.f:0 "\"A light-colored rock was dug up this very morning. Its smooth texture and perfect curvature was only interrupted by a pattern of unfamiliar marks, all appearing in a sequence that none of our men could dare to decipher. When positioned between one's eye and the sun, its tone varies, seemingly depending on the time of the day; now white, now yellow, at dusk — green.\""
 everfrost_expedition.13.f2:0 "\"A light-colored rock was dug up this very morning. Its smooth texture and perfect curvature was only interrupted by a pattern of unfamiliar marks, all appearing in a sequence that was unintelligible at first, but whose meaning I recognized after a while. I didn't know the language, I didn't even know the twisted words in complete isolation, but together — together I knew. They get hungry, you know. Hungry.\""
 everfrost_expedition.13.a:0 "Stop and study it."
 everfrost_expedition.13.b:0 "Ignore it."
 locari.1.t:0 "Secrets of the Draconic Murals"
 locari.1.d:0 "After months of careful study, our scholars have finally deciphered the ancient mural found in the labyrinthine dragon ruins. Their findings reveal something extraordinary: the location of the legendary Gem Dragons' tombs, long thought to be lost to time. These magnificent creatures, once revered for their wisdom and power, now lie hidden beneath the earth. We must decide whether to act on this discovery and uncover the ancient resting place."
 locari.1.f:0 "One mural spoke of shimmering dragons, their scales glittering like precious gems, who were entombed deep within the heart of the land. Their slumber has stretched across centuries, awaiting those brave or foolish enough to disturb the silence of their ancient crypts. \n\nAnother mural told the story of a great Draconic engineer, who created a network of crystal obelisks in an effort to weaken the psionic potential of their Asuroth neighbors."
 locari.1.a:0 "Adventure!"
 locari.2.t:0 "Paith's Tomb"
 locari.2.d:0 "Paith was as much a matron as she was a Gem Queen among the Five Gem Kings. She was more a gardener than a fighter."
 locari.2.f:0 "Despite lacking sunlight, the interior was verdant with a rainbow of flowers and colorful crystals. These mosaics outlined her life and death. She was shown sheltering dragonborn beneath her wings, telling stories to children, and then suffocating to death in the Godsbane.\n\nThe Scholar took a large, hesitant breath, then turned to the archaeologist. She glanced up from her notebook, and presented the translated epitaph:\n\n‘My children, I can go no further. Carry my story, be kind, and bid me a peaceful rest.’"
 locari.2.a:0 "Can we emulate her?"
 paith_tomb_tt:0 "Leaders will have a 50% higher chance of receiving the $honorable$ or $charismatic$ [Concept('concept_character_trait','$concept_character_traits$')]"
 locari.3.t:0 "Vhaulao's Tomb"
 locari.3.d:0 "Vhaulao was the most senior of the Five Gem Kings that collectively ruled Paylaz"
 locari.3.f:0 "The tomb itself was unbecoming in its simplicity, with faded murals depicting Vhaulao's battles against the Asuroth, his rule over ancient Paylaz, and his death during the Godsbane. Seeing the depiction of Vhaulo plummeting to earth, wing over wing, gave the studying Scholar a tightness in their chest that wouldn't leave. The archaeologist handed them the translation of the epitaph; the last words of the gem dragon:\n\n‘Yaasksvorh's thoughts are unguarded; our Father has betrayed us. My kingdom for my jaws upon his throat! Rider, all grows dark; be my eyes, and lead me to vengeance!’"
 locari.3.a:0 "An echo of our father."
 vhauluo_tomb_tt:0 "Leaders will have a 50% higher chance of receiving the $bigoted$ or $wrathful$ [Concept('concept_character_trait','$concept_character_traits$')]"
 locari.4.t:0 "Maok's Tomb"
 locari.4.d:0 "Maok was the wisest of all the Gem Kings, but also the most aloof. Months prior to the Godsbane, he withdrew into a mysterious seclusion"
 locari.4.f:0 "The tomb had doubled as a library, but a landslide in the distant past had unsealed the entrance. The books inside had all been ruined, and the mosaics had been tragically weathered to obscure much of Maok's life. The Scholar lifted a congealed mass, which had once been two books which a leak in the damaged roof had fused.\n\nThe Archaeologist cleared her throat, and presented her translation of the epitaph:\n\n‘So soon? But there is still much to discover. Death, bring me riddles, or you'll have a fight of it!’"
 locari.4.a:0 "All his work, wasted?"
 maok_tomb_tt:0 "Leaders will have a 50% higher chance of receiving the $meticulous$ or $innovative$ [Concept('concept_character_trait','$concept_character_traits$')]"
 locari.5.t:0 "Jaant's Tomb"
 locari.5.d:0 "There was no Gem King more vicious than Jaant. Even the dragonborn feared her more than they loved her, considering her more of a weapon than a person."
 locari.5.f:0 "The tomb was grisly, with spikes holding aloft the skeletal remains of hundreds of naga, their glittering ceremonial jewelry scattered around them when slid off their rotting masters.\n\nThe mosaics described an endless series of battles. The most prominent scene told the story of how, when the dark naga god Teomakti reached an arm down to crush Paylaz, Jaant had ripped it off and tossed it into the sea, where it formed the island of Sarranreque.\n\nThe Archaeologist cleared her throat, and presented the translated epitaph to the Scholar:\n\n‘No! I will fight! Fear, Death, these gnashing teeth! No!’"
 locari.5.a:0 "Perdition."
 jaant_tomb_tt:0 "Leaders will have a 50% higher chance of receiving the $brave$ or $ambitious$ [Concept('concept_character_trait','$concept_character_traits$')]"
 locari.6.t:0 "Thriersh's Tomb"
 locari.6.d:0 "Thriersh was one of the Five Gem Kings. He was Vhaulo's lover and chief protector."
 locari.6.f:0 "As he returned to the Archaeologist, the Scholar passed near the murals depicting Thriersh's life. The first showed his courting flight with Vhaulo high in the heavens, then his wings unfurled protectively against cringing Asuroth, then his plummeting to the earth during the Godsbane, deaf and blind.\n\nThe Archaeologist's voice wavered as she spoke the translated epitaph:\n\n‘Where is Vhaulao? I shall offer Death my place for his! My love, where are you? Take my last breath and go on! Vhaulao!’"
 locari.6.a:0 "To love is to grieve."
 thriersh_tomb_tt:0 "Leaders will have a 50% higher chance of receiving the $pious$ or $romantic$ [Concept('concept_character_trait','$concept_character_traits$')]"
 locari.100.t:0 "Scattered Emeralds"
 locari.100.d:0 "Grifa Tallcat has died, and the Locari Company has been ran out of the capital."
 locari.100.f:0 "The Regent stared at the documents on the table with clear pleasure. The nascent government had spent years preparing for this moment, and it had all had finally come together. With formal laws of succession acknowledged by the Emerald League, the Ocelian Locari Company have been foiled in their attempted take-over.\n\nCompany soldiers were now evacuating the capital and Ocelian officials were handing over the functions of state to Bintukin administrators.\n\nThere was a noise, and he looked up just in time to see his chief advisor walk through the door with a cup of coffee."
 locari.100.a:0 "We will declare our friendship with the Ocelian people!"
 locari.100.b:0 "We will affirm the legal borders of our new state!"
 locari.101.t:0 "The Blanchase Affair"
 locari.101.d:0 "Grifa Tallcat has died, and the council has failed to challenge the will."
 locari.101.f:0 "The Regent stared at the documents on the table with clear distress. The nascent government had spent years preparing for this moment, but it had all come undone so quickly. With no formal laws of succession acknowledged by the Emerald League, the Ocelian Locari Company has inherited all the titles and powers of the former Chieftess. To make matters worse, rumors have spread about Ocelian soldiers infiltrating the palace. Where was his chief advisor, anyway? They were always smiling and calling him 'sire'. Surely they wouldn't cut and run?\n\nThere was a noise, and the regent looked up just in time to see an Ocelian walk through the door with a gun."
 locari.101.a:0 "You'll never take me alive!"
 locari.101.b:0 "Wait, let's talk about this!"
 pecif_migration_tt:0 "90,000 Pecif settlers will migrate to [SCOPE.sState('capital_scope').GetStateRegion.GetName]."
 locari.102.t:0 "An Outside Context"
 locari.102.d:0 "Bintu Durve is no longer a vassal of the Emerald League."
 locari.102.f:0 "The Regent stared at the documents on the table with clear confusion. The nascent government had spent years preparing for this moment, and it had all come to nothing. There is no more need for the Emerald League to recognize Bintu Durve's laws of succession; the nation was no longer their overlord. The green diamond flag was being lowered from the capital building, and a new flag risen in its place.\n\nThere was a noise, and he looked up just in time to see his chief advisor walk through the door with a stack of papers.\n\n#blue 'Should I dispose of these, sire?'#! they asked, telepathically."
 locari.102.a:0 "Well, what now?"
 locari.103.t:0 "An Ocelian Yoke"
 locari.103.d:0 "The long-laid schemes of the Ocelian Locari Company to seize [SCOPE.sCountry('orl_scope').GetNameNoFlag] have come to fruition."
 locari.103.f:0 "We received news from our emissary within [SCOPE.sCountry('orl_scope').GetNameNoFlag]; it seems that the [SCOPE.sCountry('olc_scope').GetNameNoFlag] has moved to replace the tribal government with a company administration! It appears their men have already begun appraising the value of the palace itself."
 locari.103.f2:0 "We received news from our emissary within [SCOPE.sCountry('orl_scope').GetNameNoFlag]; it seems that our plan to replace the tribal government with a company administration has finally succeeded! Our men have already begun appraising the value of the palace grounds."
 locari.103.f3:0 "We received news from our emissary within [SCOPE.sCountry('orl_scope').GetNameNoFlag]; it seems that Ocelian Locari Company had laid a clandestine plan to replace the tribal government with a company administration! While the company itself may no longer be able to govern [SCOPE.sCountry('orl_scope').GetNameNoFlag] itself, it has turned the administration over to us."
 locari.103.a:0 "They have caught the fish; now we will see if they can eat it."
 locari.103.c:0 "Incredible work!"
 locari.103.b:0 "Oh, I don't think so."
 locari.104.t:0 "Inside Job"
 locari.104.d:0 "Certain factions within the company are laying the groundwork for a hostile takeover of land nominally belonging to [SCOPE.sCountry('orl_scope').GetNameNoFlag]."
 locari.104.f:0 "\"Reports indicate that the Bintukin have little in the way of established legal norms or permanent property ownership. One of mercenaries described them as having 'an anarchic streak that borders on the biological.'\n\nWhile their ruler, the Tallcat Grifa, seeks to drag them into the modern world, we need only a small stipend and we may empower those factions who would fight to keep things as they are.\""
 locari.104.a:0 "What is ours, will be ours..."
 locari.104.b:0 "...and what is theirs, will also be ours."
 empower_tribes_tt:0 "The clout of the $ig_clans$ of [SCOPE.sCountry('orl_scope').GetNameNoFlag] will increase."
 exether_technology_events.1.t:0 "Sweet Dilemma"
 exether_technology_events.1.d:0 "The spread of baking powder is causing both doughs and tensions to swell in [ROOT.GetCountry.GetNameNoFlag]."
 exether_technology_events.1.f:0 "The halfling kitchen has always been a place of tradition, where family recipes are passed down through generations. Every pie and cinnamon roll is crafted with care, reflecting the warmth of home and halfling culture.\n\nNow, the invention of baking powder is changing the landscape of [ROOT.GetCountry.GetAdjectiveNoFlag] baking. While it allows for faster production of perfectly risen pastries and affordable treats, many argue that it sacrifices the rich flavors achieved through slow fermentation and craftsmanship. Our bakers must now choose between embracing this new method or preserving the cherished traditions that define their baking."
 exether_technology_events.1.a:0 "We will not compromise on tradition."
 exether_technology_events.1.b:0 "The state will subsidize traditional products."
 exether_technology_events.1.c:0 "Cheaper sweets will make us all richer."
 exether_technology_events.2.t:0 "The prelude of a glorious evolution?"
 exether_technology_events.2.d:0 "The access to cheap godsblood enables the widespread applications of mutagens in agriculture."
 exether_technology_events.2.f:0 "Good news on the food front, as researchers have discovered a new mutagens that reduce newborn mortality and improve diease resistance. Industry experts predict that meat price will drop ten percent within five years."
 exether_technology_events.2.a:0 "Cheaper meats will make us all richer."
 exether_technology_events.2.b:0 "Better mutagens will make us all stronger."
 ceraun_events.1.t:0 "The Cherry Union"
 ceraun_events.1.d:0 "We have reached accommodation with the [SCOPE.sCulture('rivierling_culture').GetName] halflings. After centuries of unbalanced rule, they will now play an equal role in a Ceraun-Gladshirian state."
 ceraun_events.1.d2:0 "The situation in Cherryn has reached a boiling point. If we do not give the [SCOPE.sCulture('rivierling_culture').GetName] people an equal part in the [ROOT.GetCountry.GetAdjectiveNoFormatting] state, we risk open rebellion."
 ceraun_events.1.f:0 "\"If only the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] could see reason, [ROOT.GetCountry.GetRuler.GetSheHe] would understand that the union of Ceraun and Cherryn will benefit both parties. Ceraun can be assured Rivierling elites, now satisfied with their place at in our country, will loyally serve our nation.\""
 ceraun_events.1.a:0 "Ceraun and Cherryn are united."
 ceraun_events.1.b:0 "We must accept the compromise."
 ceraun_events.1.c:0 "Ceraun will forever be human!"
 ceraun_events.1.e:0 "At this rate, the halflings will eclipse us."
 ceraun_events.1.g:0 "We've done enough."
 ceraun_gladshire_invalid:0 "Owns no [GetCulture('rivierling').GetName] homeland states"
 ceraun_events.2.t:0 "Ships in the Night"
 ceraun_events.2.d:0 "A constant trickle of refugees and escaped mutants are washing up on foreign shores, embarrassing the diplomatic office."
 ceraun_events.2.f:0 "'AM I NOT A FRIEND AND BROTHER?' the mutant asks in the satirical cartoon. More articles like it had appeared in newspaper all across the Sword Coast to mock the mutants which have escaped Craggedwyn through sympathetic (or price-scalping) smugglers. Recently, however, humans with more sympathetic features (and an expected number of limbs) have washed up on the shores of places like the Emerald League, recounting the horrors of the alchemical experiments and cruel policies that Ceraun allows. It's become a growing embarrassment for [ROOT.GetCountry.GetRuler.GetLastName]'s administration, and one which threatens scandal if some particularly voluptuous woman or doe-eyed child can be plastered on the front page."
 ceraun_events.2.b:0 "The company knows best."
 ceraun_events.2.a:0 "Request an easement of the burden upon the comman mutant."
 ceraun_events.2.c:0 "Assassinate a few members of the foreign press."
 ceraun_events.3.t:0 "Black Market Appearance"
 ceraun_events.3.d:0 "An experimental alchemical reagent has been stolen and sold on the black market."
 ceraun_events.3.f:0 "\"The merchant is thrown on the softpawed floor of the Inspector's office, unkempt and fearful. Stammering, he insists he had no idea where his contact had found the reagent, and that he only knows it sells like ice cubes because it is a universal binding agent that boosts the power of whatever potion it's mixed with. When the Inspector explains that the reagent is unstable, and has a high risk of exploding, the merchant's eyes go wide.\n\n'I've already sold six hundred vials!' He moans, covering his face with his hands, 'I'm a dead man!'"
 ceraun_events.3.a:0 "Clearly, $company_craggedwyn$ is incapable of handling its own security."
 ceraun_events.3.b:0 "Destroy any record this investigation."
 ceraun_events.3.c:0 "Dispatch a team to recover the vials... or the cadavers."
 ceraun_events.4.t:0 "Mutant Birth Defects"
 ceraun_events.4.d:0 "A recent string of unexplained mutant births among nonmutant populations in [SCOPE.sState('mutant_baby_state').GetStateRegion.GetName] have left the communities stunned."
 ceraun_events.4.f:0 "Tails, vestigial limbs, and even gills are appearing amongst newborn populations in communities near company distilleries. Groups of protestors are beginning to gather on company land to demand an end to whatever testing is currently underway."
 ceraun_events.4.a:0 "We will set aside a health fund for mutant children."
 ceraun_events.4.b:0 "This is merely a coincidence."
 ceraun_events.4.c:0 "We will initiate a smear campaign against the children's parents."
 ceraun_events.5.t:0 "Crossing the [SCOPE.sCountry('refugee_state_owner').GetAdjective] Border"
 ceraun_events.5.d:0 "Escaped test subjects are crossing the border from $company_craggedwyn$ and into [SCOPE.sState('refugee_state').GetStateRegion.GetName]."
 ceraun_events.5.f:0 "Mutagenic refugees are appearing in [SCOPE.sState('refugee_state').GetStateRegion.GetName] in alarming numbers. Many have harrowing stories of being used as test fodder by uncaring company alchemists."
 ceraun_events.5.a:0 "Pay them for their silence."
 ceraun_events.5.b:0 "This is fine."
 ceraun_events.5.c:0 "Capture them and bring them back across the border."
 ceraun_events.6.t:0 "A Bit of Bad News"
 ceraun_events.6.d:0 "A team of artificers broke onto $company_craggedwyn$ land and used a magical device to produce incredibly high-quality lithographs of desolated testing sites. These lithographs are making the front page of every paper in the Settler's Coast."
 ceraun_events.6.a:0 "Issue a public apology."
 ceraun_events.6.b:0 "We will not respond to such obvious lies."
 ceraun_events.6.c:0 "Call our friends down at the Brinewick Times."
 ceraun_events.6.f:0 "The series depicts a forest that has been charred to the bone with some sort of alchemical tincture. The star of the set is a close-up of a crater containing the bones of a deer or a young elk.\n\nThe lithographs show the sites in surprising detail— denying their authenticity would be difficult."
 ceraun_events.7.t:0 "Outside Escape"
 ceraun_events.7.d:0 "A mutagenically-enhanced monster has broken from containment and crossed the border into [SCOPE.sState('monster_state').GetStateRegion.GetName]. Their government blames us, expects us to assist with dealing with the creature."
 ceraun_events.7.f:0 "\"The beast ran on all fours, like a dog, but once it reached its prey, it would stand perfectly on two legs to free its hands to claw you pieces. Having seemingly no interest in eating its prey, it would merely blind and disembowel its quarry before moving on.\""
 ceraun_events.7.a:0 "I've never seen that monster before in my life!"
 ceraun_events.7.b:0 "Dispatch a military force"
 ceraun_events.7.c:0 "Allow the company to hunt it down with a #italic larger monster#!."
 ceraun_events.7.e:0 "Inform the game warden. The Margrave will handle this personally."
 ceraun_events.8.t:0 "Groundwater Allegations?"
 ceraun_events.8.d:0 "Proceedings have begun in a [SCOPE.sCountry('allegation_state_owner').GetAdjective] court regarding groundwater pollution caused by $company_craggedwyn$."
 ceraun_events.8.f:0 "The commissioned report alleges that groundwater pollution from across the border is responsible for crop failure in [SCOPE.sState('allegation_state').GetStateRegion.GetName]. For once, the allegations against the company seem to be frivolous or even wholly fictitious, but it seems to make little difference. The company's reputation precedes it, and there is not a jury alive that would want to be seen ruling in its favor."
 ceraun_events.8.a:0 "You can't be serious."
 ceraun_events.8.b:0 "Allow the case to proceed unhindered."
 ceraun_events.8.c:0 "The Margrave will pull a few strings to ensure a positive verdict."
 ceraun_events.9.t:0 "A Study in Vice"
 ceraun_events.9.d:0 "A [SCOPE.sCountry('synth_chimesilt_state_owner').GetAdjective] investigator claims to have linked a dangerous new 'synthetic chimesilt' to a clandestine $company_craggedwyn$ laboratory."
 ceraun_events.9.f:0 "The investigator alleges to have linked the deaths of a handful of young monks in [SCOPE.sState('synth_chimesilt_state').GetCityHubName] to a synthetic chimesilt alternative from an industrial laboratory in [SCOPE.sState('synth_chimesilt_state').GetCityHubName]. $company_craggedwyn$ denies any involvement or knowledge regarding the death."
 ceraun_events.9.a:0 "Deny the allegations."
 ceraun_events.9.b:0 "Shut down these clandestine laboratories."
 ceraun_events.9.c:0 "The Margrave will take measures to ensure they are not caught again."
 ceraun_events.10.t:0 "\"Sponsored Legislation\""
 ceraun_events.10.d:0 "A bill has crossed the Margrave's desk regarding the easement of company building codes. It is no secret that the bill's sponsor is in the pocket of $company_craggedwyn$"
 ceraun_events.10.f:0 "The bill's sponsor, a young politician from [ROOT.GetCountry.GetCapital.GetFarmHubName], denies any involvement from $company_craggedwyn$, but it is well-known that their district receives disproportionate investment from the company itself.\n\nThe changes are largely mundane adjustments to acceptable materials lists, however there are some alarming verbage changes regarding land ownership on leased company land and the precise definition of 'acceptable lodging'."
 ceraun_events.10.a:0 "This seems fine."
 ceraun_events.10.b:0 "Veto the bill"
 ceraun_events.10.c:0 "The margrave knows what they're really asking for."
 ceraun_events.11.t:0 "Slave-like Conditions"
 ceraun_events.11.d:0 "An internal investigation into $company_craggedwyn$ has revealed that many of their laborers are being kept in squalid living conditions, with little-to-no pay. When pressed on the issue, the company claims they can keep up with Dorite productivity without maintaining a similar system of guild bondage!"
 ceraun_events.11.f:0 "\"Workers are charged for their tools and for their lowly room-and-board. The result is a system wherein laborers are slowly indebted to the company executives for whom they work.\""
 ceraun_events.11.a:0 "Well, if it works for Arrador..."
 ceraun_events.11.b:0 "We will not tolerate slavery under Cerunite rule."
 ceraun_events.12.t:0 "[SCOPE.sCulture('adventure_culture').GetName] Adventurers Captured"
 ceraun_events.12.d:0 "A group of [SCOPE.sCulture('adventure_culture').GetName] were captured attempting to break into a company alchemical research site."
 ceraun_events.12.f:0 "It seems the adventurers attempted to break in sometime after midnight and were caught in a petrification trap. They were found by the morning work crew, who alerted the police. One of the adventurers is a minor celebrity amongst the taverns back home; meaning this has the potential to become an international incident."
 ceraun_events.12.a:0 "Execute them, who knows what they've seen."
 ceraun_events.12.b:0 "Extradite the adventurers."
 ceraun_events.12.c:0 "Allow the company to wipe their memories before sending them back."
 ceraun_events.12.e:0 "The Margrave's men will compile blackmail material."
 ceraun_events.13.t:0 "Kidnappings in [SCOPE.sCountry('kidnappings_state_owner').GetName]"
 ceraun_events.13.d:0 "Craggedwyn has been scouring the coasts of [SCOPE.sCountry('kidnappings_state_owner').GetName] and terrorizing coastal communities through slave raids."
 ceraun_events.13.f:0 "Empty, beached ships. Entire coastal villages completely deserted. Flickering lights off the shore at midnight. These things caused many in [SCOPE.sCountry('kidnappings_state_owner').GetNameNoFlag] to fear supernatural beasts or a large-scale haunting.\n\nA single survivor in one of the affected villages was found hiding in a barrel of pickled fish. His account ignited a media frenzy when he accurately described the Craggedwyn ensign being flown from the ships. He is shaken, but thankful to be alive. He's demanded justice for his village."
 ceraun_events.13.a:0 "He's projecting. He's clearly responsible."
 ceraun_events.13.b:0 "Just deny everything."
 ceraun_events.13.c:0 "Craggedwyn is out of control."
 ceraun_events.13.e:0 "Kill him. With hammers."
 ceraun_events.14.t:0 "Failed Experimentation"
 ceraun_events.14.d:0 "An explosion has occured at a $company_craggedwyn$ laboratory in [SCOPE.sState('lab_accident_state').GetStateRegion.GetName]. Locals are demanding the remaining labs be shut down."
 ceraun_events.14.f:0 "\"They shouldn't be testing that stuff anywhere, let alone anywhere people actually live! Those company fools have been dumping gods know what into our rivers for as long as I've been alive!\""
 ceraun_events.14.a:0 "Incredible! More research opportunities!"
 ceraun_events.14.b:0 "We will pass restrictions to ensure this never happens again."
 ceraun_events.14.c:0 "Call Henri H. Harrington and have the Brinewick Times construct a counter-narrative!"
 ceraun_events.15.t:0 "Loosening Research Restrictions?"
 ceraun_events.15.d:0 "A junior executive of $company_craggedwyn$ has approached us with an offer. They claim they could better fulfill their charted purpose with just a few \"minor rewrites\" of the charter itself."
 ceraun_events.15.f:0 "Yes, you see, what we're asking for is not really a rewrite, #italic per se,#! but a few line edits and strikes here or there. Of particular interest to my employer are the lines about #italic 'paid compensation'#! and #italic 'well-and-able-bodied volunteers'.#!. And that bit about 'volunteers', now that I think about it."
 ceraun_events.15.a:0 "Well, if it helps the company..."
 ceraun_events.15.b:0 "We can find some sort of middle ground here."
 ceraun_events.15.c:0 "We will do no such thing."
 ceraun_events.15.e:0 "The Margrave's presence keeps the executive from asking for too much."
 ceraun_events.16.t:0 "A Friendly Warning"
 ceraun_events.16.d:0 "A friend of the Margrave is reporting $company_craggedwyn$ has been making alarming off-the-books purchases from a distillery company that they have an ownership stake  in."
 ceraun_events.16.f:0 "While off-the-book purchases by the company are neither uncommon nor explicitly illegal, the particular reagents being stockpiled would signal alarm bells to even the most lowliest regulatory flunkie. Among the list of reagents are a number of known precursors to mutagenic compounds illegal under Cerunite law."
 ceraun_events.16.a:0 "Alchemical research is the company's charted purpose."
 ceraun_events.16.b:0 "We will begin systematic search-and-seizure of $company_craggedwyn$ warehouses."
 ceraun_events.17.t:0 "A Question of Privilege"
 ceraun_events.17.d:0 "While $company_craggedwyn$ charter is the domain of the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] administration and of the national assembly, many of the privileges the company enjoys are at the discretion of local bureaucrats and city assemblies."
 ceraun_events.17.f:0 "While the company charter guarantees many things, many of these privileges require the cooperation of local bureaucrats and enforcement by local authorities. If we could find a way to entice local governments to forsake their deals with $company_craggedwyn$, we could cut the company at the knees."
 ceraun_events.17.a:0 "We will not corrupt our local governments like this!"
 anti_company_fund:0 "Anti-Company Slush Fund"
 ceraun_events.17.b:0 "We must do whatever it takes to strike down these alchemists."
 ceraun_events.101.t:0 "The Collapse of $company_craggedwyn$"
 ceraun_events.101.d:0 "Disturbing reports are coming out of our holdings under direct $company_craggedwyn$ rule; it seems the company administration has collapsed entirely!"
 ceraun_events.101.f:0 "What little that can be ascertained is that some sort of experiment in [SCOPE.sState('relevant_state').GetStateRegion.GetName] went awry some time in the last 48 hours. An explosion occurred, and now a layer of alchemical ash and ooze nearly two inches thick now coats everything within a sixty mile radius of the testing site, and a thick yellow haze extends through the air far beyond even that. All that remains of the site itself is a crater and a massive, translucent moonstone orb, six feet in diameter, hollow all but for an upright pair of boots.\n\nWhat is clear, however, is the company has utterly collapsed, and that much of their former lands have been ruined by this alchemical fallout. A junior company executive was arrested attempting to flee the country; after a brief interrogation, they revealed that many executives had made deals with the Astral Consortium to trade company assets or secrets for safe passage and comfortable employment in Arrador."
 ceraun_events.101.a:0 "What an embarrassment!"
 ceraun_events.102.t:0 "The End of $company_craggedwyn$"
 ceraun_events.102.d:0 "At long last, we have disbanded the duplicitious $company_craggedwyn$."
 ceraun_events.102.f:0 "With the company disbanded comes the long work of sorting through the warehouses and inventories of the various holdings and subsidiaries of $company_craggedwyn$. While most of the stock is relatively mundane, there are significant stores of illegal reagents, and trace amounts of moonstone at several locations.\n\nIt is unclear exactly what the company was doing with the moonstone, but combined with the credible reports of testing upon live subjects, a very dark picture is painted. There are those within the administration who would push for a criminal tribunal."
 ceraun_events.102.a:0 "The company is gone; let sleeping dogs lie."
 ceraun_events.102.b:0 "Allow the charges to be brought forth."
 craggedwyn_tribunal:0 "Craggedwyn Tribunal"
 legacy_of_the_craggedwyn_tribunal:0 "Legacy of the Craggedwyn Tribunal"
 legacy_of_the_craggedwyn_company:0 "Legacy of Narathun Chirurgical"
 ebridor_events.1.t:0 "Ebridor, the home of Eberri"
 ebridor_events.1.d:0 "The past, the present and the future of Ebridor"
 ebridor_events.1.f:0 "We established our nation after a successful secession from the tyrannical mages of Achon. Led by the clever aristocracy we were able to thrive, ridding ourselves of our old dependance on Achon. We created a fair nation, where the people would be represented on the #b Eberri Council#!. \n\nHowever we couldn't ever rid ourselves of our sad past, under the Achonian rule. For their influence has grown deep into our land, like roots of a tree, one which doesn't stop growing. For their power only seems to grow, especially in Twotors. It is uncertain if the Achonians are planning revange or not. But we have to assume the worst when dealing with them. \n\nOur southern neighbours in Arrador, brought new ideas and technologies to our lands helping us to develop into what we are today. However, perhaps their coming was not as friendly as we had imagined? They've gained massive amounts of influence, favors and whatnot among our industrial magnates in Galestrum and Runeport, rooting themselves deep within our major industrial hubs. #b Perhaps they are already buying out our people's businesses?#! It seems only time will tell what their true intentions are, for they will surely show their true colors should we try to curtail their efforts. \n\n #b Our nation's future depends on our actions in the coming decade.#!"
 ebridor_events.1.a:0 "We must tread carefully, for the enemy is near."
 emerald_events.1.t:0 "A Promise Fulfilled"
 emerald_events.1.d:0 "Now that we have taken active steps to increase [GetCulture('enelli').GetName] acceptance, Serbinelle has re-expressed interest in unification."
 emerald_events.1.f:0 "With the promises made at the Treaty of 1146 fulfilled, Serbinelle’s primary objection to unification has been nullified. Already their bureaucrats have arrived in [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] to discuss the terms of unification."
 emerald_events.1.a:0 "Dual governance is acceptable for now."
 emerald_events.1.b:0 "We must integrate them into the League as quickly as possible."
 emerald_events.2.t:0 "The [GetCulture('enelli').GetName] Brotherhood"
 emerald_events.2.d:0 "A rich landowner from [SCOPE.sCountry('seb_scope').GetName] is seeking to fund an organization for the advancement of Enelli peoples."
 emerald_events.2.f:0 "[SCOPE.sCharacter('enelli_landowner').GetFullName], a wealthy Serbinelle landowner, has been patronizing Enelli artists and writers in the Emerald League for years. Now, they have purchased land in [SCOPE.sState('guildhall_state').GetStateRegion.GetName] for a guildhall, dedicated to uplifting individual Enelli peoples countrywide."
 emerald_events.2.a:0 "Our subjects are free to associate with whomever they please."
 emerald_events.2.b:0 "We ought not allow foreign influences such as these."
 emerald_events.3.t:0 "Going Postal"
 emerald_events.3.d:0 "An [GetCulture('enelli').GetName] bureaucrat has caused a disruption in [SCOPE.sState('postal_state').GetStateRegion.GetName] after winning the postmaster’s election in a traditionally [GetCulture('tenfasu').GetName] region."
 emerald_events.3.f1:0 "The [GetCulture('enelli').GetName] Brotherhood has a habit of sponsoring Enelli candidates across the League in elections that they deem \"close.\" Most of these candidates are doomed to political obscurity.\n\nA recent postmaster’s election in [SCOPE.sState('postal_state').GetStateRegion.GetFarmHubName], however, was actually won by a Guild candidate, after the incumbent candidate died of natural causes three days before the election. Now, the new postmaster has replaced a handful of the postal officials with new Enelli replacements."
 emerald_events.3.f2:0 "The [GetCulture('enelli').GetName] Brotherhood has a habit of sponsoring Enelli candidates across the League in elections that they deem \"close.\" Most of these candidates are doomed to political obscurity.\n\nA recent postmaster’s election in [SCOPE.sState('postal_state').GetStateRegion.GetFarmHubName], however, was actually won by a Guild candidate, after the incumbent candidate died in a freak post-sorting accident three days before the election. Now, the new postmaster has replaced a handful of the postal officials with new Enelli replacements."
 emerald_events.3.f3:0 "The [GetCulture('enelli').GetName] Brotherhood has a habit of sponsoring Enelli candidates across the League in elections that they deem \"close.\" Most of these candidates are doomed to political obscurity.\n\nA recent postmaster’s election in [SCOPE.sState('postal_state').GetStateRegion.GetFarmHubName], however, was actually won by a Guild candidate, after the incumbent candidate died in a carriage accident three days before the election. Now, the new postmaster has replaced a handful of the postal officials with new Enelli replacements."
 emerald_events.3.a:0 "To the winner go the spoils, I suppose."
 emerald_events.3.b:0 "They cannot disrupt the system like this."
 emerald_events.4.t:0 "Those Who Work Forces"
 emerald_events.4.d:0 "Some of the police forces in [SCOPE.sState('elf_state').GetStateRegion.GetName] are beginning to disproportionately employ [GetCulture('enelli').GetName] people."
 emerald_events.4.f:0 "The city of [SCOPE.sState('elf_state').GetStateRegion.GetMineHubName] is seen as the gateway into the Ocelian island for those coming from across the Lagoon. It considered by many to be one of the cultural centers of the Emerald League.\n\nThrough incessant lobbying and campaigning by the [GetCulture('enelli').GetName] Brotherhood, policing in [SCOPE.sState('elf_state').GetStateRegion.GetMineHubName] has come to be increasingly viewed as an occupation for those of Enelli descent.\n\nWhether by merit or infiltration, significant [GetCulture('enelli').GetName] pluralities can be found working the police forces of [SCOPE.sState('elf_state').GetStateRegion.GetMineHubName] and many of the surrounding townships."
 emerald_events.4.a:0 "An interesting development."
 emerald_events.4.b:0 "They must be up to something."
 emerald_events.5.t:0 "Structural Soundness"
 emerald_events.5.d:0 "An delegation of [GetCulture('enelli').GetName] subjects is complaining about the quality of the government infrastructure in [SCOPE.sState('infra_state').GetStateRegion.GetMineHubName]."
 emerald_events.5.f:0 "Outdated cranes and water locks are but the tip of the mast of the complaints that the delegation is bringing forth. They claim that [GetCulture('enelli').GetName] regions have been systemically overlooked by economic and infrastructural projects, and they demand an immediate recourse."
 emerald_events.5.b:0 "They are just complaining."
 emerald_events.5.a:0 "We could reappropriate funds from other projects for this."
 emerald_events.6.t:0 "If The Court Don’t Fit…"
 emerald_events.6.d:0 "An [GetCulture('enelli').GetName] man in [SCOPE.sState('elf_state').GetStateRegion.GetName] has been sentenced to death for their role as ringleader in a snake-oil scam that infected an entire borough with a previously undiscovered magical ailment."
 emerald_events.6.f:0 "Our [GetCulture('enelli').GetName] citizens are up in arms after an Enelli man was sentenced to death by a [GetCulture('tenfasu').GetName] court. While it is generally accepted that the man did commit the crime, many believe that the sentence was too harsh, and that a [GetCulture('tenfasu').GetName] or an [GetCulture('ocelian').GetName] would not have received the same sentence."
 emerald_events.6.a:0 "We lack the authority to overturn this ruling."
 emerald_events.6.b:0 "Mistrial! Retry the case in a [SCOPE.sState('enelli_state').GetStateRegion.GetName] court!"
 emerald_events.10.t:0 "Broken Betrothal"
 emerald_events.10.d:0 "Our attempt to peacefully unify with Serbinelle has failed."
 emerald_events.10.f:0 "bro how could you"
 emerald_events.10.a:0 "Aw dang."
 emerald_events.20.t:0 "Alchemical Complaints"
 emerald_events.20.d:0 "The [SCOPE.sCountry('eme_scope').GetName] is demanding reparations for the damage done to Alchemist's Refuse and the surrounding waterways."
 emerald_events.20.f:0 "After the so-called 'distillery accident' of 1165, the old Craggedwyn Company was dissolved after much international pressure. However, Ludric Zarnak's promised investigation never came, and much of the old leadership avoided repercussions by reconglomerating under the $company_craggedwyn$ brand.\n\nNow, years later, the [SCOPE.sCountry('eme_scope').GetName] is demanding compensation for the years of clean-up and ailment still yet to come."
 emerald_events.20.a:0 "We admit no wrongdoing."
 emerald_events.20.b:0 "We will pay reparations, but only if they relinquish their claims."
 emerald_events.20.c:0 "We will submit to their demands."
 emerald_nonaccept_tt:0 "#white #bold We will still have to pay if they accept.#!#!"
 emerald_events.21.t:0 "Reparations Accepted!"
 emerald_events.21.d:0 "Somewhat surprisingly, [SCOPE.sCountry('cer_scope').GetNameNoFlag] has accepted our request for reparations."
 emerald_events.21.f:0 "To our pleasant surpise, [SCOPE.sCountry('cer_scope').GetNameNoFlag] has admitted wrongdoing and has already begun transferring funds."
 emerald_events.21.a:0 "Wonderful!"
 emerald_events.22.t:0 "Reparations Counteroffer"
 emerald_events.22.d:0 "[SCOPE.sCountry('cer_scope').GetNameNoFlag] is demanding we relinquish our claims in exchange for reparations."
 emerald_events.22.f:0 "Those wretched Cerunite pencil-pushers have the gall to demand promises from us in exchange for our rightful reparations. They demand that we recognize their full right to entire mainland runoff zone."
 emerald_events.22.a:0 "That is still rightful Ocelian clay!"
 emerald_events.22.b:0 "They can have it all, down to the last slime-covered toadstool."
 emerald_events.23.t:0 "Reparations Denied!"
 emerald_events.23.d:0 "[SCOPE.sCountry('cer_scope').GetNameNoFlag] has sent a letter denying our request for reparations."
 emerald_events.23.f:0 "To the offended parties,\n\nUnfortunately, due to the unfair pressure that led to the Craggedwyn Company's closure, any investigations of wrongdoing during the distillery accident could not be finished.\n\nThe state of [SCOPE.sCountry('cer_scope').GetNameNoFormatting] considers this case to be closed. Any further correspondence regarding this matter will be forwarded to the Brinewick Times at your expense.\n\n[TimeKeeper.GetCurrentDate.GetString],\n[SCOPE.sCharacter('ruler_scope').GetFullName]"
 emerald_events.23.a:0 "Those sniveling toads!"
 emerald_events.30.t:0 "The Westplume Confederation"
 emerald_events.30.d:0 "With the signing of a new constitution under [ROOT.GetCountry.GetAdjective] supervision, a [SCOPE.sCountry('wac_scope').GetName] has coalesced out of the disparate [GetGeographicRegion('geographic_region_aritzakarri').GetName] states."
 emerald_events.30.f:0 "In the face of an uncertain future, unity is a ready medicine for the myriad threats at our door. This river — our life, our home, our very heart! — should be our example as we march into a new era. We will move as one to a greater end. We shall raise and feed each other until that end. And should we be beset by slings and arrows, we shall find shelter within its bosom."
 emerald_events.30.a:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] power takes flight."
 emerald_events.31.t:0 "The Bonepicker Union"
 emerald_events.31.d:0 "With the signing of a new constitution under [ROOT.GetCountry.GetAdjective] supervision, a [SCOPE.sCountry('sac_scope').GetName] has coalesced out of the disparate [GetGeographicRegion('geographic_region_aritzakarri').GetName] states."
 emerald_events.31.f:0 "In the face of an uncertain future, unity is a ready medicine for the myriad threats at our door. This river — our life, our home, our very heart! — should be our example as we march into a new era. We will move as one to a greater end. We shall raise and feed each other until that end. And should we be beset by slings and arrows, we shall find shelter within its bosom."
 emerald_events.31.a:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] power takes flight."
 emerald_events.32.t:0 "An Avian State"
 emerald_events.32.d:0 "With the signing of a new constitution under [ROOT.GetCountry.GetAdjective] supervision, a [SCOPE.sCountry('eac_scope').GetName] has coalesced out of the disparate [GetGeographicRegion('geographic_region_aritzakarri').GetName] states."
 emerald_events.32.f:0 "In the face of an uncertain future, unity is a ready medicine for the myriad threats at our door. This river — our life, our home, our very heart! — should be our example as we march into a new era. We will move as one to a greater end. We shall raise and feed each other until that end. And should we be beset by slings and arrows, we shall find shelter within its bosom."
 emerald_events.32.a:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] power takes flight."
 adventurer_coverage.1.t:0 "Adventurer 'Scout' Program"
 adventurer_coverage.1.d:0 "Adventurers in [ROOT.GetCountry.GetNameNoFlag] have begun enlisting children as young as 11 in apprenticeship programs to help deal with the monster problem."
 adventurer_coverage.1.f:0 "\"It's the [ROOT.GetCountry.GetNameNoFlag] Scouts, they're calling it. They say it's good for the kids to get outside, breathe in the fresh air, kill some ghoulies, get some exercise...\""
 adventurer_coverage.1.a:0 "The children yearn for the crypts!"
 adventurer_coverage.1.b:0 "We should take measures to stop this."
 adventurer_coverage.1.c:0 "Take those children out of adventurer custody! This is child labor!"
 adventurer_coverage.2.t:0 "[GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] Organize Private Patrols"
 adventurer_coverage.2.d:0 "Villages in [ROOT.GetCountry.GetNameNoFlag] have begun taking the shortage of adventurer coverage into their own hands, organizing private patrols throughout the countryside."
 adventurer_coverage.2.f:0 "Fed up with the lack of safety in rural [ROOT.GetCountry.GetNameNoFlag], the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] have organized a number of adventurers to begin patrolling the roads connecting their communities. Reports of disturbances have already begun to drop."
 adventurer_coverage.2.a:0 "If it gets results, we won't stop them."
 adventurer_coverage.2.b:0 "The state ought to be handling such matters."
 adventurer_coverage.2.c:0 "This is why we have [GetLawType('law_pest_control').GetName]!"
 adventurer_coverage.3.t:0 "Adventurers Demand Wage Stipends"
 adventurer_coverage.3.d:0 "Adventurers in [ROOT.GetCountry.GetNameNoFlag] are demanding stipends not just for travel, but for childcare, as well."
 adventurer_coverage.3.f:0 "The relative shortage of skilled adventurers in [ROOT.GetCountry.GetNameNoFlag] means that the few adventurers there are are on the road for weeks at a time. Most bands have adopted an intinerant system, where they will move to a village, and complete all of its quests before moving onto the next.\n\nThis means that our adventurers are away from their homes and their families for weeks or months at a time. They are demanding a token wage for their dependants, so that they may not fall into destitution while their breadwinner is away slaying monsters."
 adventurer_coverage.3.a:0 "We could never deny such a request."
 adventurer_coverage.3.b:0 "They knew what they signed up for."
 adventurer_coverage.4.t:0 "The Adventurer Class"
 adventurer_coverage.4.d:0 "The lack of trained adventurers in [ROOT.GetCountry.GetNameNoFlag] means that the few people capable of taking on difficult quests have outsized influence in society."
 adventurer_coverage.4.f:0 "\"Those rare gems, those lucky few, capable of taking the things the Gods put down and saying 'Yes, and?' and moving the world with their fists or a touch of their breath.\"\n\n\"Heroes, we call them.\""
 adventurer_coverage.4.a:0 "They have earned their place."
 adventurer_coverage.5.t:0 "Adventurer Auxiliary Divisions"
 adventurer_coverage.5.d:0 "[ROOT.GetCountry.GetNameNoFlag] is already so brimming with quest-doers that would-be adventurers have begun joining the military instead."
 adventurer_coverage.5.f:0 "\"I always wanted to be a mage, ever since I was a kid. But being an independent spellbrand is so hard! If you don't have a list of clients of your own, you're just gonna end up casting plant growth on a plantation somewhere. Life as a sharpcaster is much closer to what I wanted when I was young.\""
 adventurer_coverage.5.a:0 "An excellent development!"
 adventurer_coverage.6.t:0 "Life at Sea"
 adventurer_coverage.6.d:0 "[ROOT.GetCountry.GetNameNoFlag] is already so oversaturated with adventurers it has become a trend for established adventuring companies to diversify into the fishing industry instead."
 adventurer_coverage.6.f:0 "\"It's a much calmer life, you know? I used to be an adventurer like you, but then I got married, had kids, bought a boat... oh, and I took an arrow to the knee.\""
 adventurer_coverage.6.a:0 "A landlubber could never understand."
 adventurer_coverage.7.t:0 "Critical Hit"
 adventurer_coverage.7.d:0 "A famous [ROOT.GetCountry.GetAdjectiveNoFlag] adventurer has written a tome on the subject of adventuring, to much critical acclaim."
 adventurer_coverage.7.f:0 "Heralded as an exhaustive compendium of knowledge suitable for both beginner and expert quest-doers, monster-slaying schools and wizard towers worldwide are already placing orders to fill their libraries. The author, a [ROOT.GetCountry.GetAdjectiveNoFlag] national, has been invited to Viceroy's Pearl for an interview with the Brinewick Times."
 adventurer_coverage.7.a:0 "Yep, they're from here."
 adventurer_coverage.7.b:0 "We ought to let them design our curriculum!"
 adventurer_coverage.8.t:0 "Critical Failure"
 adventurer_coverage.8.d:0 "A famous adventurer has been killed while fighting a mob of ghouls in [SCOPE.sState('death_scope').GetStateRegion.GetName]."
 adventurer_coverage.8.f:0 "The nation is in mourning after a famous ranger and his band of merry men died in heroic fight with a group of [concept_death_hounds]. Known for his generous donation of the spoils of his adventures, he will be missed by all."
 adventurer_coverage.8.a:0 "Who cares?"
 adventurer_coverage.8.b:0 "We will create anti-monstrous fund in their honor."
 adventurer_coverage.9.t:0 "Starbrands Fighting Monsters"
 adventurer_coverage.9.d:0 "The [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] have taken the monster problem in [SCOPE.sState('monster_state').GetStateRegion.GetName] into their own hands, sending groups of young [Concept('concept_starbrand', '$concept_starbrands$')] to clean up the region as part of their initiation."
 adventurer_coverage.9.f:0 "While some may question the usefulness of inexperienced magic users, if reports are to be believed, a group of fresh-faced starbrands set off on the road from [SCOPE.sState('monster_state').GetFarmHubName] two days ago, and they've already saved a farmer, two merchants, three damsels, and a dog."
 adventurer_coverage.9.a:0 "They're sure to get good marks for this!"
 adventurer_coverage.9.b:0 "Send in the military!"
 adventurer_coverage.9.c:0 "Send in a team of state adventurers."
 adventurer_coverage.10.t:0 "Adventurers Protest Machine Guns"
 adventurer_coverage.10.d:0 "Adventurers in both the [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] and the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] have banded together to demand the restriction of what they see as a threat to their livelihood."
 adventurer_coverage.10.d2:0 "Adventurers in the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] have banded together to demand the restriction of what they see as a threat to their livelihood."
 adventurer_coverage.10.d3:0 "Adventurers have banded with the [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] to demand the restriction of what they see as a threat to their livelihood."
 adventurer_coverage.10.f:0 "\"Jobs that used to be done with a band of four or even five adventurers are now being done with one gunner and a reloader! What's more, most users have only a few hours of real range training! We can't trust common peasants or wage-workers with these dangerous tools; we have to limit access!\""
 adventurer_coverage.10.a:0 "They need to adapt."
 adventurer_coverage.10.c:0 "I suppose we could implement some restrictions."
 adventurer_coverage.10.b:0 "Guns are the [ROOT.GetCountry.GetAdjectiveNoFlag] way!"
 adventurer_coverage.11.t:0 "Ghost Towns in [SCOPE.sState('ghosttown_state').GetStateRegion.GetName]"
 adventurer_coverage.11.d:0 "[concept_adventurer_coverage] has gotten so bad in [SCOPE.sState('ghosttown_state').GetFarmHubName] that people are beginning to regard it as a ghost town."
 adventurer_coverage.11.f:0 "Abandoned farms, empty roads, a quiet disposition; [SCOPE.sState('ghosttown_state').GetFarmHubName] lacks only a spooky fog for it to become the sort of place about which children's tales are told."
 adventurer_coverage.11.a:0 "A troubling development."
 adventurer_coverage.11.b:0 "We can capitalize on this!"
 adventurer_coverage.12.t:0 "Masters of the Air"
 adventurer_coverage.12.d:0 "A surplus of [SCOPE.sGoods('airships_good').GetName] in [ROOT.GetCountry.GetNameNoFlag] has allowed a number of adventuring crews to fit them within their tight operating budgets."
 adventurer_coverage.12.f:0 "A number of smaller companies were able to negotiate deals on older models that would have normally been far outside their price range. The mooring posts of [ROOT.GetCountry.GetNameNoFlag] are busier than ever as a number of first-time pilots take their first flights."
 adventurer_coverage.12.a:0 "I sure hope they're licensed pilots..."
 adventurer_coverage.13.t:0 "Foreign Acquisitions"
 adventurer_coverage.13.d:0 "One of our most renowned adventuring companies has been acquired by [SCOPE.sCountry('buyout_country').GetName]. Its new owners intend to liquidate the company and send most of its remaining assets back to [SCOPE.sCountry('buyout_country').GetCapital.GetCityHubName]."
 adventurer_coverage.13.f:0 "\"It's a sad sight to see, after so many years in business. Some people care more about the name on the tin than about the people who put their work into the tin.\""
 adventurer_coverage.13.a:0 "This was not the intention..."
 adventurer_coverage.13.b:0 "Perhaps we could reacquire the company, at a premium?"
 adventurer_coverage.14.t:0 "Country Roads"
 adventurer_coverage.14.d:0 "Low [concept_adventurer_coverage] in [SCOPE.sState('mapi_state').GetStateRegion.GetName] has begun to have a negative impact on commerce in the region."
 adventurer_coverage.14.f:0 "Merchants, having already upped their guard, are now avoiding certain roads and towns altogether. Officials in [SCOPE.sState('mapi_state').GetFarmHubName] have reported that they are struggling to find willing protectors for the traders serving the community."
 adventurer_coverage.14.a:0 "This is getting out of hand."
 adventurer_coverage.14.b:0 "Don't we have someone on retainer for this?"
 adventurer_coverage.15.t:0 "Potions for Sale!"
 adventurer_coverage.15.f:0 "Adventuring in [ROOT.GetCountry.GetNameNoFlag] is a cutthroat business. Always looking to one-up the competition, adventurers turn to all manner of trinkets, enchantments, and most commonly, [SCOPE.sGoods('potions').GetName]."
 adventurer_coverage.15.d:0 "Distilleries are struggling to meet demand as adventurers buy out all manner of [SCOPE.sGoods('potions').GetName] for all manner of quests."
 adventurer_coverage.15.a:0 "Such a strange bunch!"
 adventurer_coverage.15.b:0 "Maybe we could work out an endorsement deal?"
 adventurer_coverage.16.t:0 "Druidic Cult Gathering"
 adventurer_coverage.16.d:0 "Representatives from both the [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] and the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] have come together to demand action regarding a radical druid in [SCOPE.sState('druid_compound_state').GetStateRegion.GetName]."
 adventurer_coverage.16.d2:0 "The [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetNameWithCountryVariant] has reached out to demand action regarding a radical druid in [SCOPE.sState('druid_compound_state').GetStateRegion.GetName]."
 adventurer_coverage.16.d3:0 "The [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] has reached out to demand action regarding a radical druid in [SCOPE.sState('druid_compound_state').GetStateRegion.GetName]."
 adventurer_coverage.16.f:0 "They claim that the druid has been bringing followers to the woods near [SCOPE.sState('druid_compound_state').GetFarmHubName], to teach them of the native spirits, and the starbrands how to channel them. The group is, so far, largely isolationist, but they have enough trained magic users among them to become quite the thorn, if they so chose."
 adventurer_coverage.16.a:0 "This hardly seems a national matter."
 adventurer_coverage.16.b:0 "Send the military to break up this cult."
 adventurer_coverage.16.c:0 "That man is on the [ROOT.GetCountry.GetAdjectiveNoFlag] payroll!"
 adventurer_coverage.17.t:0 "The Age of Air Piracy"
 adventurer_coverage.17.d:0 "Armed robbery aboard commercial skyships is becoming commonplace."
 adventurer_coverage.17.f:0 "Using skypiercers modified to be launched from catapults on the ground, they will work in teams to board the airships. While the grand theft of entire ships is not rare, most will merely rob those aboard before dropping back to the ground below. A notable pirate base has been established in [SCOPE.sState('skypirate_state').GetStateRegion.GetName]."
 adventurer_coverage.17.a:0 "Surely, the skyship companies can handle their own?"
 adventurer_coverage.17.b:0 "Start filling the questing boards..."
 adventurer_coverage.17.c:0 "Our retainer should be able to handle the situation."
 adventurer_coverage.18.t:0 "Bad Travelling"
 adventurer_coverage.18.d:0 "Fisherman and merchants around [SCOPE.sState('leviathan_state').GetStateRegion.GetName] are reporting that leviathan attacks are becoming more numerous."
 adventurer_coverage.18.f:0 "Missed shipments, forgotten letters, and weeping widows; the disappearance of a handful of ships is taking its toll on [SCOPE.sState('leviathan_state').GetCityHubName]. The tales of those unscathed paints a chilling picture."
 adventurer_coverage.18.a:0 "The sea is a dangerous place."
 adventurer_coverage.18.b:0 "Redirect some adventurers to deal with this."
 adventurer_coverage.19.t:0 "Bear Country"
 adventurer_coverage.19.d:0 "Songberry farmers around [SCOPE.sState('bear_state').GetStateRegion.GetName] are reporting that bears are being attracted to the melodies of their berry bushels."
 adventurer_coverage.19.f:0 "\"My berrypickers are afraid to go out into the fields! For once, I don't blame 'em! Honestly, I don't blame the bears either; I like the sound too.\""
 adventurer_coverage.19.a:0 "The plantation owners will have to bear the cost."
 adventurer_coverage.19.b:0 "Redirect some adventurers to deal with this."
 adventurer_coverage.19.c:0 "Have the [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] set up wards around the plantations."
 adventurer_coverage.20.t:0 "Sailors' Superstition"
 adventurer_coverage.20.d:0 "Fear of the massive squids local to [SCOPE.sState('squid_state').GetStateRegion.GetName] is having a negative affect on commerce in the region."
 adventurer_coverage.20.f:0 "While squids are, as a rule, far more docile than creatures classified as leviathans, this does not stop the common sailor's fear of the latter from extending to the former. Merchants are having trouble finding crews willing to serve [SCOPE.sState('squid_state').GetStateRegion.GetName]."
 adventurer_coverage.20.a:0 "We should not give credence to seawives' tales."
 adventurer_coverage.20.b:0 "Some sea patrols ought to encourage confidence."
 adventurer_coverage.20.c:0 "Have our retainer slay a few #italic big ones#!."
 adventurer_coverage.21.t:0 "Mutant Mayhem!"
 adventurer_coverage.21.d:0 "Livestock mutagen testing in [SCOPE.sState('mutantlivestock_state').GetStateRegion.GetName] is getting out of hand. The local ranch owners show no sign of slowing down."
 adventurer_coverage.21.f:0 "Recently, there was an incident where a test subject escaped and terrorized a nearby village for four hours before a passing adventurer band struck it down. The culpable ranch mustered no sort of acknowledgment of the incident; not even an apology."
 adventurer_coverage.21.a:0 "Carry on. What's good for the goose, is good for the gander!"
 adventurer_coverage.21.b:0 "We ought to regulate this whole thing more cleanly."
 adventurer_coverage.21.c:0 "Send state adventurers to shut the situation down."
 adventurer_coverage.21.e:0 "Contain the testing zones, and collect further data."
 adventurer_coverage.22.t:0 "Magical Relic Discovered!"
 adventurer_coverage.22.d:0 "A [ROOT.GetCountry.GetAdjectiveNoFlag] adventurer has discovered an ancient magical machine while mapping an old cavern system."
 adventurer_coverage.22.d2:0 "A [ROOT.GetCountry.GetAdjectiveNoFlag] adventurer has discovered an ancient magical sword while mapping an old cavern system."
 adventurer_coverage.22.d3:0 "A [ROOT.GetCountry.GetAdjectiveNoFlag] adventurer has discovered an ancient magic text while mapping an old holy site."
 adventurer_coverage.22.f:0 "Discovered deep underground in [SCOPE.sState('discovery_state').GetStateRegion.GetName], the discovery has already made quite the stir in the papers. Having already received a hefty sum for the pictures, the adventurer has offered to donate the find to the government."
 adventurer_coverage.22.a:0 "Dismantle it and see what we can learn!"
 adventurer_coverage.22.b:0 "Translate it and see what we can learn!"
 adventurer_coverage.22.c:0 "It belongs in a museum!"
 adventurer_coverage.23.t:0 "Diving Bell Discoveries"
 adventurer_coverage.23.d:0 "An ancient shipwreck discovered by adventurers off the coast of [SCOPE.sState('shipwreck_state').GetStateRegion.GetName] has caused a stir."
 adventurer_coverage.23.f:0 "The academics say the ship was constructed using mundane methods, but includes a unique metal alloy that could not have been made without magic. This likely dates it to just after the [concept_godsbane], or ~850-1000 years old.\n\nWhile thrill-seekers and armchair admirals are the primary recipients of such news, it has caused notable buzz in historical circles, as it calls into question a number of preconceived notions about the accessibility of magical materials in the immediate aftermath of the [concept_godsbane]."
 adventurer_coverage.23.a:0 "We should study the shipbuilding techniques of old!"
 adventurer_coverage.23.b:0 "We ought to encourage more people to become divers."
 adventurer_coverage.23.c:0 "A 'unique metal alloy,' you say?"
 starbrand_events.1.t:0 "Rocky Relations"
 starbrand_events.1.d:0 "A local monastic group was displaced by the mines in [SCOPE.sState('monk_state').GetStateRegion.GetName]. Some amongst them, [concept_golem] [Concept('concept_starbrand', '$concept_starbrands$')], are wreaking havoc to prevent production at the mines."
 starbrand_events.1.f:0 "The mine owners claim they acquired the property legally, but this seems of little recompense to the injured parties. The most industrious among the protesters have worked together to conjure a number of rock elementals to scare off any company muscle."
 starbrand_events.1.a:0 "I'm sure they can 'acquire' a solution."
 starbrand_events.1.b:0 "Send the police to break up the demonstration."
 starbrand_events.2.t:0 "What Goes Up..."
 starbrand_events.2.d:0 "Wishstone quarry owners in [SCOPE.sState('shower_state').GetStateRegion.GetName] are requesting permission to perform a ritual to attempt to intentionally induce a wishstone shower."
 starbrand_events.2.f:0 "The organizers have hired a number of skilled mages from across the country to perform the ritual. Word has gotten out amongst the locals, with many planning picnics or selling tickets to 'viewing parties' around the quarry on the day of the event."
 starbrand_events.2.a:0 "I sure hope there's a ticket for me!"
 starbrand_events.2.b:0 "This is too dangerous."
 starbrand_events.2.scholars:0 "Ensure there are learned scholars to oversee the operation."
 starbrand_events.3.t:0 "The Educator's Apprentice"
 starbrand_events.3.d:0 "It has become commonplace for apprentice [Concept('concept_starbrand', '$concept_starbrands$')] to assist in the training of young pupils."
 starbrand_events.3.f:0 "Training to become a wizard is a years-long affair. There is an old [ROOT.GetCountry.GetAdjectiveNoFlag] saying about how one does not know a thing until one teaches a thing, and the wizardry schools take this to heart."
 starbrand_events.3.a:0 "They are the archmages of the future."
 starbrand_events.4.t:0 "Ethereal Precedent"
 starbrand_events.4.d:0 "Ectoplasm companies in [ROOT.GetCountry.GetNameNoFlag] are in hot water after a woman traced the spirit of her deceased grandfather to the thaumacore powering an arcane caravan in [SCOPE.sState('ecto_state').GetCityHubName]."
 starbrand_events.4.f:0 "Industrial ectoplasm #italic nominally#! does not directly contain the soul essence of sentient beings, but rather, a byproduct created over time by souls trapped in the material plane. However, it is an open secret that most industrial forms of ectoplasm harvest have little in the way of filtration to separate the essence from the ectoplasm; further, there is little financial incentive to do so.\n\nThe plaintiff alleges that she had been working with a medium to set her grandfather's spirit to rest, when she got into a physical altercation with an ectoplasm collection team at the site of the haunting. From there, she was stonewalled by the company until she followed the trail to [SCOPE.sState('ecto_state').GetCityHubName]. Now with the help of her grandfather's spirit, she is suing the ectoplasm conglomeration for significant damages."
 starbrand_events.4.a:0 "Such a sad story."
 starbrand_events.4.b:0 "Throw this case out. One of the plaintiffs is deceased!"
 starbrand_events.4.c:0 "There's not a jury under Hasal that would rule against our great ectoplasm companies!"
 creed_of_hasal_tt:0 "[ROOT.GetCountry.GetNameNoFlag] follows the Creed of Hasal"
 starbrand_events.5.t:0 "Heretical Magical Theory?"
 starbrand_events.5.d:0 "The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are claiming that some of the magical theory being taught as fact in [ROOT.GetCountry.GetAdjectiveNoFlag] schools goes against religious doctrine."
 starbrand_events.5.f:0 "Their complaints are primarily in regards to the way broader principles of magic are taught rather than any specific accusations of heresy or illegal magical practices, but the complaints are serious nonetheless. They believe that if students' understanding of magic is not in line with religious principles, it will inspire other forms of skepticism as well."
 starbrand_events.5.a:0 "Give the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] more control over the magical curriculum."
 starbrand_events.5.b:0 "Students need to have a more practical understanding of magic."
 starbrand_events.5.c:0 "We need not compromise in either direction."
 starbrand_events.6.t:0 "Observatorial Obsolescence"
 starbrand_events.6.d:0 "The [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] are complaining that [ROOT.GetCountry.GetAdjectiveNoFlag] observatories are not modern enough to properly carry out their duties."
 starbrand_events.6.f:0 "They claim that years of budget cuts have left them unable to perform necessary maintenance and upgrades, and that we have reached a point where it would be cheaper to simply replace entire systems. While the requested facilities would certainly be state-of-the-art, there are those who question whether the current observatory facilities are truly insufficient."
 starbrand_events.6.a:0 "We needed to phase out these old lenses anyways..."
 starbrand_events.6.b:0 "They will have to make do with what they have now."
 starbrand_events.6.e:0 "An excellent opportunity to test some new designs!"
 starbrand_events.6.c:0 "We have the institutional knowledge to handle much of the upgrades ourselves."
 starbrand_events.7.t:0 "The Witch Doctor"
 starbrand_events.7.d:0 "Our policy of supporting [GetLawType('law_industry_banned_druidic').GetName] is having a positive effect on the health of the nation."
 starbrand_events.7.d2:0 "Our religion's deference toward [Concept('concept_starbrand', '$concept_starbrands$')] of the [concept_fey] is having a positive effect on the health of the nation."
 starbrand_events.7.f:0 "[concept_fey] [Concept('concept_starbrand', '$concept_starbrands$')] have long acted as healers and witch doctors for their community. However, the new legal status and opportunities afforded to them by the [GetLawType('law_industry_banned_druidic').GetName] law has seen their numbers grow. There is hardly a single [ROOT.GetCountry.GetAdjectiveNoFlag] township or village that does not have access to at least one local witch doctor to tell them what to do."
 starbrand_events.7.f2:0 "[concept_fey] [Concept('concept_starbrand', '$concept_starbrands$')] have long acted as healers and witch doctors for their community. However, support from the [SCOPE.sPop('majority_religion').GetReligion.GetName] faith has seen their numbers grow. There is hardly a single [ROOT.GetCountry.GetAdjectiveNoFlag] township or village that does not have access to at least one local witch doctor to tell them what to do."
 starbrand_events.7.a:0 "We will work with them to ensure they can serve more patients."
 starbrand_events.7.b:0 "We must ensure they have the medications they need!"
 starbrand_events.8.t:0 "Bad Omens"
 starbrand_events.8.d:0 "[ROOT.GetCountry.GetAdjectiveNoFlag] observatories are racked by the arrival of a number of bad omens and downright chilling prophecies."
 starbrand_events.8.f:0 "Our administration gives serious consideration to the predictions and prophecies brought forth by the sages in our observatories each year. However, this year is the year of the [concept_angel], meaning that many of the prophecies are bad. #italic Very bad.#!"
 starbrand_events.8.f2:0 "Our administration gives serious consideration to the predictions and prophecies brought forth by the sages in our observatories each year. However, this year is the year of the [concept_fiend], meaning that many of the prophecies are bad. #italic Very bad.#!"
 starbrand_events.8.a:0 "We don't need to take every prophecy as fact."
 starbrand_events.8.b:0 "#bold DOOM! GLOOM!#!"
 starbrand_events.8.c:0 "Actually, once you filter out all the astrological noise..."
 starbrand_events.9.t:0 "Herald of Fertility"
 starbrand_events.9.d:0 "Our observatories are asking for help regarding the interpretation of recent omens of fertility."
 starbrand_events.9.f:0 "\"If you'll check the astral charts provided, it's clear this is meant to be a fertile year of the [concept_fey]. However, the most prominent plane observed this year was one associated with harvest #italic celebrations#!. It is unclear whether we are to give consideration to the harvest itself or to the... celebration that follows.\""
 starbrand_events.9.a:0 "We should focus on a good harvest."
 starbrand_events.9.b:0 "You can't reap unless you sow."
 starbrand_events.9.c:0 "It's both. It's definitely both."
 starbrand_events.10.t:0 "Visions of Stone"
 starbrand_events.10.d:0 "Some of our most powerful mages peered deep into the planes of the [concept_golem] for answers. They returned with... a list of priority infrastructure improvements?"
 starbrand_events.10.f:0 "While it is not unusual for [Concept('concept_starbrand', '$concept_starbrands$')] to peer into the abyss for answers in the planes, it is quite unusual for them to return with such a concrete list. Under normal circumstances, they might be investigated for ties to construction companies."
 starbrand_events.10.a:0 "You can't be serious."
 starbrand_events.10.b:0 "The road to success is a paved one!"
 starbrand_events.10.c:0 "Have a state mage draw up a more #italic precise#! list."
 starbrand_events.10.e:0 "We could take this even further!"
 starbrand_events.11.t:0 "The Secret Patron"
 starbrand_events.11.d:0 "[SCOPE.sCharacter('tarduk_scope').GetFullName] stands accused of using the assistance of a patron of the Realm of [concept_tarduk] to compile blackmail material."
 starbrand_events.11.f:0 "The enemies of [SCOPE.sCharacter('tarduk_scope').GetFullName] have always had a habit of falling on their own swords; both internal challengers from the [SCOPE.gsInterestGroup('tarduk_ig').GetNameNoIcon] and their rivals in the legislative assembly have been caught fornicating, fabricating, and embezzling; sometimes all a mixture of all three.\n\nA newspaper in [SCOPE.sState('tarduk_state').GetStateRegion.GetCityHubName] posits this is no mere accident, and has published an entire front-page article containing compelling evidence that [SCOPE.sCharacter('tarduk_scope').GetFullName] is working directly with a patron from the Realm of [concept_tarduk] to compile blackmail material on their political enemies."
 starbrand_events.11.a:0 "Just tabloid nonsense."
 starbrand_events.11.b:0 "We’ll see them arrested for this!"
 starbrand_events.11.c:0 "We’ll see them hanged for this!"
 starbrand_events.11.e:0 "Seems a useful talent."
 zodiac_events.1.t:0 "The [concept_fiend] Ascendant"
 zodiac_events.1.d:0 "The constellation of the Fiend is having a particularly strong effect on our nation."
 zodiac_events.1.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the Fiend's menacing gaze upon us, we are experiencing the full force of its dark nature.\n\nTyranny, apathy, violence. The desire to do harm; to control and subjugate others is gripping the hearts of the people. Violent crime is on the rise as people become more eager to use force. We should find an outlet for those most affected or risk them running rampant."
 zodiac_events.1.a:0 "The army can make use of these violent thugs."
 zodiac_events.1.b:0 "The hierarchy of the state will tame them."
 zodiac_events.1.c:0 "Give them a baton, they'll help keep order."
 zodiac_events.1.e:0 "Tyranny will bolster the might of the state!"
 zodiac_events.2.t:0 "The [concept_fiend] Dominates"
 zodiac_events.2.d:0 "The constellation of the Fiend is changing the hearts and minds of the people of [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.2.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Fiend’s menacing gaze upon us, we are experiencing the full force of its dark nature.\n\nCruelty, deceit, greed. The shadow of egoism and treachery has descended over the hearts of the people. Social cohesion is declining in the face of large scale theft and betrayal. We must steer them towards some positive end or risk becoming victims ourselves."
 zodiac_events.2.a:0 "Let them ferret out hidden secrets for us."
 zodiac_events.2.b:0 "Encourage them to join our rival’s faction."
 zodiac_events.2.c:0 "We’ve found our new army drillmasters."
 zodiac_events.2.e:0 "We don’t need to get our hands dirty, they will."
 zodiac_events.3.t:0 "The [concept_unicorn] Ascendant"
 zodiac_events.3.d:0 "The constellation of the Unicorn is greatly influencing the spirit of the [SCOPE.sCountry('country_scope').GetAdjectiveNoFlag] nation."
 zodiac_events.3.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Unicorn’s warm embrace enveloping us, our nation is experiencing a blossoming of kindness.\n\nCompassion, healing, hospitality. The joyous warmth of empathy is raising the people's spirits. As people open their doors and hearts to strangers, our society grows ever more united. We must make use of this blessing to effect lasting change."
 zodiac_events.3.a:0 "Our hospitals will lack for nothing."
 zodiac_events.3.b:0 "We'll build new charitable foundations."
 zodiac_events.3.c:0 "New laws will aid the dispossessed."
 zodiac_events.3.e:0 "Be kind, for everyone you meet is fighting a hard battle."
 zodiac_events.4.t:0 "The [concept_unicorn] Prevails"
 zodiac_events.4.d:0 "The constellation of the Unicorn is changing the hearts and minds of our people."
 zodiac_events.4.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Unicorn’s warm embrace enveloping us, our nation is experiencing a blossoming of kindness.\n\nMercy, innocence, hope. The light of our peoples' kind souls is smothering the darkness of apathy and hate. A growing dream of a better future is spurring the people into action. We should guide them for the good of all."
 zodiac_events.4.a:0 "With malice toward none..."
 zodiac_events.4.b:0 "For those who come after."
 zodiac_events.4.c:0 "A dream for all of us."
 zodiac_events.4.e:0 "To err is mortal, to forgive divine."
 zodiac_events.5.t:0 "The [concept_phoenix] Dominates"
 zodiac_events.5.d:0 "The constellation of the Phoenix is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.5.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Phoenix' sweltering heat bearing down on us, our people's passions are getting stirred up.\n\nImpulsivity, ambition, destruction. As tempers rise, the people's baser nature eclipses their critical faculties. Their ever more reckless actions are spreading fortune and ruin in equal amounts. We ought to constrain this behaviour or risk lasting damage to our nation."
 zodiac_events.5.a:0 "Set up a high-risk zone for them to experiment in."
 zodiac_events.5.b:0 "The state can take advantage of their poor judgment."
 zodiac_events.5.c:0 "Their temperament will serve the army well."
 zodiac_events.5.e:0 "Is a man not entitled to the sweat of his brow?"
 zodiac_events.6.t:0 "The [concept_phoenix] Ascendant"
 zodiac_events.6.d:0 "The constellation of the Phoenix is changing the hearts and minds of our people."
 zodiac_events.6.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the Phoenix’ sweltering heat bearing down on us, our people’s passions are getting stirred up.\n\nPassion, innovation, creation. [SCOPE.sCountry('country_scope').GetAdjectiveNoFlag] society is experiencing an unprecedented boom in creative endeavours. From pioneering corporate start-ups to abstract art installations; the people's brave quest for innovation is introducing all manner of new ideas. We should try to direct this mania for the good of the country."
 zodiac_events.6.a:0 "Let them diversify our economy."
 zodiac_events.6.b:0 "They will hone our technological edge."
 zodiac_events.6.c:0 "Enriching our culture is the highest good."
 zodiac_events.6.e:0 "Oh, muse; sing to us from your fiery abode."
 zodiac_events.7.t:0 "The [concept_kraken] Dominates"
 zodiac_events.7.d:0 "The constellation of the Kraken is changing the hearts and minds of our people."
 zodiac_events.7.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the kraken’s icy chill running down their spines, the people’s mood grows solemn and reserved.\n\nClarity, stoicism, introspection. A quiet calm has descended over our society as the people look inward. Instead of lashing out in anger, people are taking an extra moment to reflect. We should try to turn these cool heads towards the quiet nurturing of [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.7.a:0 "The perfect bureaucratic temperament."
 zodiac_events.7.b:0 "Get these moderates into politics, now!"
 zodiac_events.7.c:0 "Now’s the time to ease some troubled minds."
 zodiac_events.7.e:0 "The centre wins once again."
 zodiac_events.8.t:0 "The [concept_kraken] Prevails"
 zodiac_events.8.d:0 "The constellation of the Kraken is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.8.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the kraken’s icy chill running down their spines, the people’s mood grows solemn and reserved.\n\nPrecision, certainty, revenge. Heated impulsivity is making way for the cold calculus of reasoning. Choices born from intricate cost-benefit analysis have become the people’s preferred modus operandi. We can make great use of these cold-blooded civilians."
 zodiac_events.8.a:0 "We have some financial knots they can untangle."
 zodiac_events.8.b:0 "They will streamline our industrial processes."
 zodiac_events.8.c:0 "Direct their spite towards our political rivals."
 zodiac_events.8.e:0 "Wow… they’re literally me."
 zodiac_events.9.t:0 "The [concept_golem] Ascendant"
 zodiac_events.9.d:0 "The constellation of the Golem is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.9.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the Golem’s unyielding might holding us in its grip, we can feel the weight of the ages bearing down on us.\n\nPreservation, stagnation, endurance. A conservative resilience is sweeping the nation. People are beginning to batten down the hatches as they feel strongly compelled to preserve what they have. We shall extend this compulsion to the whole of the nation."
 zodiac_events.9.a:0 "Reinforce the traditions that underpin our society."
 zodiac_events.9.b:0 "Champion resilience in the face of hardship."
 zodiac_events.9.c:0 "Rally the people behind the establishment."
 zodiac_events.9.e:0 "On this rock we shall build our state."
 zodiac_events.10.t:0 "The [concept_golem] Prevails"
 zodiac_events.10.d:0 "The constellation of the Golem is greatly influencing the souls of the citizenry."
 zodiac_events.10.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Golem’s unyielding might holding us in its grip, we can feel the weight of the ages bearing down on us.\n\nProtection, gravitas, willpower. Patriotism is sweeping through [SCOPE.sCountry('country_scope').GetNameNoFlag] and the people seem determined to reinforce its glory. Our citizens are committed to take a stand in ever greater numbers. With the right choices this zeal could serve our nation well."
 zodiac_events.10.a:0 "Extol the greatness of [SCOPE.sCountry('country_scope').GetAdjectiveNoFlag] civilization."
 zodiac_events.10.b:0 "The army will shepherd these heroes."
 zodiac_events.10.c:0 "They will build the future, literally."
 zodiac_events.10.e:0 "Willpower is the foundation of all achievements."
 zodiac_events.11.t:0 "The [concept_gryphon] Prevails"
 zodiac_events.11.d:0 "The constellation of the Gryphon is greatly influencing the souls of the citizenry."
 zodiac_events.11.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Gryphon’s wind of freedom blowing across the nation, the masses are growing ever more restless.\n\nTravel, individualism, autonomy. Our people are shedding the trappings of conformity and realizing they are the masters of their fates. They are determined to decide for themselves and balk at attempts to control them. We must funnel this storm in the right direction or risk being blown away."
 zodiac_events.11.a:0 "Sponsor their journeys to cement our good name."
 zodiac_events.11.b:0 "There’s no need to stifle these entrepreneurs."
 zodiac_events.11.c:0 "Let these free-thinkers loose in our universities."
 zodiac_events.11.e:0 "Individuality is not a right, it’s an obligation."
 zodiac_events.12.t:0 "The [concept_gryphon] Ascendant"
 zodiac_events.12.d:0 "The constellation of the Gryphon is changing the hearts and minds of our people."
 zodiac_events.12.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Gryphon’s wind of freedom blowing across the nation, the masses are growing ever more restless.\n\nLiberty, democracy, abolitionism. Our nation is being swept up in a storm of dissent. The people are throwing off the chains of dogma and tyranny; their myriad calls to action united under the common banner of freedom. If we are wise these radicals may yet serve our cause."
 zodiac_events.12.a:0 "The will of the people is all that matters."
 zodiac_events.12.b:0 "No slave can breathe the pure air of our nation."
 zodiac_events.12.c:0 "Indulge them until they tire themselves out."
 zodiac_events.12.e:0 "We know which way the wind is blowing."
 zodiac_events.13.t:0 "The [concept_fey] Ascendant"
 zodiac_events.13.d:0 "The constellation of the Fey is greatly influencing the souls of the citizenry."
 zodiac_events.13.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Fey’s call of the wild beckoning us, the people are drawing closer to their baser nature.\n\nPropagation, healing, longevity. Our people are  increasingly focused on their physical needs and the wellbeing of their families. The mood is getting frisky and many seem rather eager to strengthen the bonds of community."
 zodiac_events.13.a:0 "Where did all these babies come from?!"
 zodiac_events.13.b:0 "At least the hospitals are properly staffed."
 zodiac_events.13.e:0 "Oh baby, let's get it on."
 zodiac_events.14.t:0 "The [concept_fey] Dominates"
 zodiac_events.14.d:0 "The constellation of the Fey is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.14.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the Fey’s call of the wild beckoning us, the people are drawing closer to their baser nature.\n\nNature, growth, decay. The wilds are pressing against the borders of our civilization as the cycle of life asserts itself. From the darkest wood to the tidiest garden, wildlife and greenery alike are rapidly shifting. We had best plan a course of action before the people decide to return to mother nature’s embrace."
 zodiac_events.14.a:0 "The glut of raw materials will serve us well."
 zodiac_events.14.b:0 "The decaying wilds make way for our factories."
 zodiac_events.14.c:0 "Our agricultural golden age begins now!"
 zodiac_events.14.e:0 "It's the circle of life; and it moves us all."
 zodiac_events.15.t:0 "The [concept_angel] Dominates"
 zodiac_events.15.d:0 "The constellation of the Angel is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.15.f:0 "The constellations of the [concept_zodiac] can vary wildly in the power they exert over worldly affairs. With the Angel’s grim silence descending on the nation, the chill of the grave has never felt closer.\n\nOblivion, silence, undeath. The people have become quiet and withdrawn as the grim reaper stalks the land. The finality of mortal life looms in the people’s minds. The ghosts of the past stir in the shadows, reminding us we’ll join them soon enough. We must prove our worth to the living and remind them it’s not their time just yet."
 zodiac_events.15.a:0 "Live well, for remember you will die."
 zodiac_events.15.b:0 "Death is certain, we need not dwell on it."
 zodiac_events.15.c:0 "I ain't afraid of no ghosts!"
 zodiac_events.15.e:0 "What do we say to the gods of death? Not today."
 zodiac_events.16.t:0 "The [concept_angel] Ascendant"
 zodiac_events.16.d:0 "The constellation of the Angel is greatly influencing the souls of [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.16.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Angel’s grim silence descending on the nation, the chill of the grave has never felt closer.\n\nRemembrance, legends, grief. The streets are dead silent, but the taverns are alive with toasts to our ancestors. Whilst in the churches and cemeteries the quiet melancholia of the bereaved pays a solemn tribute to those that are gone. We mustn't forget, but we ought not dwell too long on the past."
 zodiac_events.16.a:0 "Immortalize our heroes with a national celebration."
 zodiac_events.16.b:0 "Our fallen soldiers' families deserve a pension."
 zodiac_events.16.c:0 "Grief begets sorrow and hope alike."
 zodiac_events.16.e:0 "Let me tell you of glories past and glory yet to come."
 zodiac_events.17.t:0 "The [concept_justice] Prevails"
 zodiac_events.17.d:0 "The constellation of the Justice is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.17.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Justice’s stern gaze fixed on us, the people patiently fall in line awaiting what’s to come.\n\nOrder, structure, hierarchy. The country has never run smoother as the people take great care to police each other and obey the commands of the authorities. Crime and unrest are on the decline, but so is free expression and innovation. We ought to carefully thread this fine line lest we harm our future prospects."
 zodiac_events.17.a:0 "Dull sheep make the best bureaucrats."
 zodiac_events.17.b:0 "Obedience is the foundation of our armies."
 zodiac_events.17.e:0 "The state is a machine and we are the cogs."
 zodiac_events.18.t:0 "The [concept_justice] Ascendant"
 zodiac_events.18.d:0 "The constellation of the Justice is changing the hearts and minds of our people."
 zodiac_events.18.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Justice’s stern gaze fixed on us, the people patiently fall in line awaiting what’s to come.\n\n Harmony, fairness, stability. A collective sigh of relief is uttered as the weathered points of tension in our communities begin to fade. Old biases and petty grievances are being let go in an attempt at a less discriminatory and egalitarian society. We should take care to nurture the parts of this trend we desire most."
 zodiac_events.18.a:0 "At the end of the day, we’re one people."
 zodiac_events.18.b:0 "All our citizens’ rights ought to be protected."
 zodiac_events.18.c:0 "Finally a little peace and quiet."
 zodiac_events.18.e:0 "Imagine all the people, living for today."
 zodiac_events.19.t:0 "The [concept_djinn] Ascendant"
 zodiac_events.19.d:0 "The constellation of the Djinn is having a particularly strong effect on [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.19.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Djinn’s manic energy swirling around us, the people are constantly kept on their toes.\n\nChaos, illusion, insanity. The nation is in shambles as random occurrences of all kinds disrupt daily life. Improbable, unforeseeable and often completely false events are developing in no discernible pattern. It has become nigh impossible to make any concrete plans. We have to find a way to endure this madness."
 zodiac_events.19.a:0 "I’ve got sixty-four gremlins asking for coins here."
 zodiac_events.19.b:0 "There. Are. Toothless. Rabbits. In. The. Trees!"
 zodiac_events.19.c:0 "Frankly Roderick, that lying cucumber disgusts me."
 zodiac_events.19.e:0 "I’ve a feeling we’re not in Exether anymore!"
 zodiac_events.20.t:0 "The [concept_djinn] Prevails"
 zodiac_events.20.d:0 "The constellation of the Djinn is greatly influencing the souls of the citizenry."
 zodiac_events.20.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Djinn’s manic energy swirling around us, the people are constantly kept on their toes.\n\nPossibility, fate, luck. Change is in the air; people feel they can achieve whatever they set their mind towards. The weight of obligation and hesitation have turned light as a feather. Some are fully embracing their lot while others are striving towards that which they once thought impossible. We can only hope they manage to navigate the confusion."
 zodiac_events.20.a:0 "We better get going while the going is good."
 zodiac_events.20.b:0 "A touch… of destiny."
 zodiac_events.20.c:0 "Sixty percent of the time, it works every time."
 zodiac_events.20.e:0 "The harder we work, the luckier we get."
 zodiac_events.21.t:0 "The [concept_siren] Prevails"
 zodiac_events.21.d:0 "The constellation of the [concept_siren] is changing the hearts and minds of our people."
 zodiac_events.21.f:0 "The constellations of the [concept_zodiac] normally cycle through a growth and decline in prominence. With the Siren’s dramatic aria resonating across the land, the people are caught in a tempest of emotion.\n\n Love, revelry, dreams. The pleasing warmth of good feelings is overwhelming the shadows of the heart and everywhere you look the people revel in the joys of living. In these moments, lifelong bonds are formed as they dream together of a beautiful future. We’d do well to encourage this positive development."
 zodiac_events.21.a:0 "I fell, slowly, and then all at once."
 zodiac_events.21.b:0 "No road is long with good company."
 zodiac_events.21.c:0 "The future is a mystery, so take my hand and jump."
 zodiac_events.21.e:0 "It’s a boring book, but I love it when you read to me."
 zodiac_events.22.t:0 "The [concept_siren] Dominates"
 zodiac_events.22.d:0 "The constellation of the [concept_siren] is greatly influencing the souls of [SCOPE.sCountry('country_scope').GetNameNoFlag]."
 zodiac_events.22.f:0 "The constellations of the [concept_zodiac] typically wax and wane in their influence on the mortal realm. With the Siren’s dramatic aria resonating across the land, the people are caught in a tempest of emotion.\n\n Disdain, inhibition, nightmares. A wretched feeling of negativity is stoking the shadows of our people’s hearts. Anger and paranoia is consuming their kind spirits, threatening to dislodge the promising future of our nation. We need to make a stand for goodness’ sake; for as long as this nightmare lingers."
 zodiac_events.22.a:0 "Save your rancor for foreign nations."
 zodiac_events.22.b:0 "Steel yourself, for it’s the only person you can rely on."
 zodiac_events.22.c:0 "I’ve gazed into the abyss and it blinked first."
 zodiac_events.22.e:0 "A nightmare is a dream too, we can just wake up."
 zodiac_events.23.t:0 "The [concept_sphinx] Ascendant"
 zodiac_events.23.d:0 "The constellation of the [concept_sphinx] is having a particularly strong effect on [ROOT.GetCountry.GetNameNoFlag]."
 zodiac_events.23.f:0 "The [concept_outer_realms] can vary wildly in the power they exert over worldly affairs. With the Sphinx’ puzzling questions rattling our brains, the answers to the mysteries of the cosmos have never seemed closer.\n\nLogic, patterns, time. The universal laws underpinning our fragile mortal existence have been laid bare. Though emotional beings such as us cannot hope to grasp their true meaning, they speak to something within all our people; something purer than even the most basic of instincts. We know this’ll make us stronger, we just need to find out how."
 zodiac_events.23.c:0 "The elegance of reality bests any song or dance."
 zodiac_events.23.b:0 "The future is naught but cause and effect."
 zodiac_events.23.a:0 "This is all there ever was, and all there ever will be."
 zodiac_events.25.t:0 "Circles of [concept_calyxos]"
 zodiac_events.25.d1:0 "Farmers in [SCOPE.sState('crop_state').GetStateRegion.GetName] are reporting that something is cutting geometric shapes in their cornfields during the night!"
 zodiac_events.25.d2:0 "Farmers in [SCOPE.sState('crop_state').GetStateRegion.GetName] are reporting that something is cutting geometric shapes in their wheatfields during the night!"
 zodiac_events.25.f:0 "Entire fields have been cut into various patterns, typically either a repeating fractal design or a checkerboard-like layout. Local investigators spent weeks trying to determine how the designs were even created before a travelling scholar claimed it to be meddling from the realm of [concept_calyxos] directly."
 zodiac_events.25.a:0 "This is clearly an elaborate hoax."
 zodiac_events.25.b:0 "Maybe there is something we can do."
 zodiac_events.25.c:0 "Set aside land for [concept_calyxos] to use as a canvas."
 zodiac_events.26.t:0 "Sights of [concept_saphrat]"
 zodiac_events.26.d:0 "[Concept('concept_starbrand', '$concept_starbrands$')] throughout [SCOPE.sCountry('country_scope').GetNameNoFlag] are afflicted with reflections of the past."
 zodiac_events.26.f:0 "It started in the observatories; previously reliable tetherpoints slowly began to only spit out prophecies directly related to the viewer's personal life. From there, the visions slowly came to focus on events that had #italic already happened#!, driving many into a sort of nostalgic trance, unable to be pulled from their workstations.\n\nAs the realm of [concept_saphrat] waxed further overhead, the effect was magnified, and items with even minimal magical attenuation became potential conduits for paralyzing reflections of one’s own youth."
 zodiac_events.26.a:0 "We’ll break every mirror in [SCOPE.sCountry('country_scope').GetNameNoFormatting]!"
 zodiac_events.26.b:0 "Gaze into the abyss..."
 zodiac_events.26.c:0 "...And the abyss gazed back."
 zodiac_events.26.e:0 "Actually, with just a thin protective coating…"
 zodiac_events.27.t:0 "By Right of [concept_regalon]"
 zodiac_events.27.d:0 "[SCOPE.sCharacter('ruler_scope').GetFullName] has begun claiming they rule with the favor of [concept_regalon] itself."
 zodiac_events.27.f:0 "While already legally the legitimate [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] of [SCOPE.sCountry('country_scope').GetNameNoFormatting], [SCOPE.sCharacter('ruler_scope').GetFullName] now claims their rule comes from a more divine source.\n\nSoon, as the realm of [concept_regalon] waxes overhead, they are planning a gala to announce their newfound divinity to the country."
 zodiac_events.27.a:0 "[concept_regalon]’s Chosen!"
 zodiac_events.27.b:0 "That’s not how any of this works!"
 zodiac_events.28.t:0 "Copying [concept_korrath]"
 zodiac_events.28.d:0 "[SCOPE.sCharacter('debatelord_scope').GetFullName] has suggested that our legislature more closely emulate the halls of [concept_korrath]."
 zodiac_events.28.f:0 "[SCOPE.sCountry('country_scope').GetNameNoFormatting] operates on a structure not unlike common law— while the legislative body creates the laws, it is left up to the judiciary to decide on edge-cases and clarify language when necessary.\n\n[SCOPE.sCharacter('debatelord_scope').GetFullName]'s proposed changes would see the legislature spend more time drafting and discussing laws, so that they may pass down with finality, and avoid being caught in limbo between being passed by the legislature and solidified by the judiciary."
 zodiac_events.28.a:0 "Our laws must stand the test of time!"
 zodiac_events.28.b:0 "I’m not sure this is something we need."
 zodiac_events.29.t:0 "Fairs of [concept_festus]"
 zodiac_events.29.d:0 "As the realm of [concept_festus] waxes overhead, the people of [SCOPE.sCountry('country_scope').GetNameNoFormatting] have entered into a month of fairs and festivals."
 zodiac_events.29.f1:0 "While the [SCOPE.sReligion('religion_scope').GetNameNoFormatting] religion is not considered to fall within the realm of the [concept_unicorn], this is but an inconvenient formality for our festivalgoers.\n\nTraditionally marking not only the end of winter, but the rising tide of [concept_festus] as well, the holiday is marked by twelve days of feasting. Songs of joy and merriment can be heard in every town center and square, and seasonal liquors consisting of cinnamon and locally-available fruit are poured by the plenty."
 zodiac_events.29.f2:0 "As any follower of [SCOPE.sReligion('religion_scope').GetNameNoFormatting] would know, there is no holiday bigger than Festus. Traditionally marking not only the end of winter, but the rising tide of [concept_festus] as well, the holiday is marked by twelve days of feasting. Songs of joy and merriment can be heard in every town center and square, and seasonal liquors consisting of cinnamon and locally-available fruit are poured by the plenty."
 zodiac_events.29.a:0 "Cease this pagan holiday at once!"
 zodiac_events.29.b:0 "Time for joy, time for cheer!"
 zodiac_events.29.c:0 "Time for joy, time for cheer!"
 zodiac_events.30.t:0 "Acolytes of [concept_anvu]"
 zodiac_events.30.d:0 "Monks in [SCOPE.sState('monastery_state').GetStateRegion.GetName] are chasing immortality through communion with the realm of [concept_anvu]."
 zodiac_events.30.f:0 "The monks claim that through astral projection into the realm of [concept_anvu], they can slow the aging of their minds, and enjoy youth beyond their years.\n\nThe monastery has been in the news again recently, as it is nearing its once-per-dodecade induction of new recruits. It would be an ideal time for the government to take a stance on the matter."
 zodiac_events.30.a:0 "This is an unnatural practice."
 zodiac_events.30.b:0 "Perhaps there is some truth to it."
 zodiac_events.30.c:0 "Perhaps there is some truth to it."
 zodiac_events.31.t:0 "Hidden Shrines of [concept_yronfell]"
 zodiac_events.31.d:0 "A series of shrines to dedicated to minor deities of [concept_yronfell] has been discovered in the mines of [SCOPE.sState('mine_state').GetStateRegion.GetName]."
 zodiac_events.31.f:0 "While the [SCOPE.sReligion('religion_scope').GetNameNoFormatting] faith has standardized over time, those who work underground are often a bastion of simple zodiac worship. In particular, they will craft hidden shrines to various minor deities of the realm of [concept_yronfell], in an effort to invoke the strength of the grymgar who reside there.\n\nAn intricate series of these shrines has been discovered in [SCOPE.sState('mine_state').GetStateRegion.GetName], and local officials are split on what to do with them."
 zodiac_events.31.a:0 "Seal these heretical shrines in the mountain."
 zodiac_events.31.b:0 "We need not antagonize our miners."
 zodiac_events.31.c:0 "Such beautiful craftsmanship need not be hidden."
 zodiac_events.32.t:0 "Symbols of [concept_savokar]"
 zodiac_events.32.d:0 "Totems linked to the beastsprawl of [concept_savokar] have been discovered in the woods of [SCOPE.sState('hunting_state').GetStateRegion.GetName]."
 zodiac_events.32.f:0 "Even the most organized religions of [concept_exether] are plagued by what the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] would refer to as ‘simple zodiac worship’; a catchall term for any faith or cult that pays heed to a specific realm or a being within directly. Most cases are relatively minor, such as rural villages giving prayer to local harvest deities that fall outside the larger pantheon.\n\nThe totems found in [SCOPE.sState('hunting_state').GetStateRegion.GetName] are a notable exception to this rule. Both the macabre nature of their shrines and totems and their proclivity for animal sacrifice leans those who pay heed to [concept_savokar] to worship in secret. Now, with no one willing to take credit for the bonetusk totems found, local authorities are preparing a witch hunt."
 zodiac_events.32.a:0 "We must root out this cult!"
 zodiac_events.32.b:0 "They have likely already fled."
 zodiac_events.32.c:0 "I see no crime here."
 zodiac_events.33.t:0 "[concept_mendelyn]’s Generosity"
 zodiac_events.33.d:0 "A Mendelyn charity has begun providing aid to the poor in [SCOPE.sState('devastation_state').GetStateRegion.GetName]."
 zodiac_events.33.f:0 "While the situation in [SCOPE.sState('devastation_state').GetStateRegion.GetName] is undeniably difficult to speak of, there are those in our cabinet who would question whether we should allow such flamboyant religious organizations to fraternize with the public. While Mendelyn charities do not typically worship deities of Mendelyn directly, their core message of hope and generosity often resonates with those most at-risk of radicalization."
 zodiac_events.33.a:0 "They are doing good work."
 zodiac_events.33.b:0 "We should outlaw these sorts of organizations."
 zodiac_events.33.c:0 "This organization ought to be incorporated into the government."
 zodiac_events.34.t:0 "Luck of [concept_ladregn]"
 zodiac_events.34.d:0 "The [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] are claiming that [SCOPE.sCharacter('accused_scope').GetFullName]’s fortune was acquired through a pact with the Realm of [concept_ladregn]."
 zodiac_events.34.f:0 "The wealth and good fortune of [SCOPE.sCharacter('accused_scope').GetFullName] is known to all. The story is well-known, too; supposedly, they found their fortune in the scrap metal trade before entering politics.\n\nNow, the story is unravelling as members of the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] claim that their good fortune could only be the consequence of a deal made with a powerful being of the Realm of [concept_ladregn], or another Fiendly realm."
 zodiac_events.34.a:0 "They are simply jealous."
 zodiac_events.34.b:0 "Perhaps [SCOPE.sCharacter('accused_scope').GetFullName] should retire from the public eye."
 zodiac_events.35.t:0 "[concept_bhalora]’s Bite"
 zodiac_events.35.d:0 "As the Realm of [concept_bhalora] waxes overhead, [SCOPE.sState('frost_state').GetStateRegion.GetName] is transformed into an icey waste."
 zodiac_events.35.f:0 "As fields grow cold and rivers freeze over, the initial explanation of “a cold northern wind” no longer suffices. One need only open a window to feel the wrath of [concept_bhalora].\n\nWe must find a solution before our cities ice over entirely."
 zodiac_events.35.a:0 "There is nothing we can do."
 zodiac_events.35.b:0 "Through great effort, we can turn the tide."
 zodiac_events.35.c:0 "We are more than prepared for something like this."
 zodiac_events.36.t:0 "Flames of [concept_qasyran]"
 zodiac_events.36.d:0 "As the Realm of [concept_qasyran] waxes overhead, [SCOPE.sState('fires_state').GetStateRegion.GetName] is engulfed by flame."
 zodiac_events.36.f:0 "What was initially thought to be a series of connected arsons has been revealed to be of occult origin as [concept_qasyran] rises further into view.\n\nEven the smallest ember can now spark a fire everlasting. We must act before all of [SCOPE.sState('fires_state').GetStateRegion.GetCityHubName] is reduced to ash."
 zodiac_events.36.a:0 "We can only ride it out."
 zodiac_events.36.b:0 "Doesn’t anyone know any water spells?"
 zodiac_events.36.c:0 "Modern magic provides a solution."
 zodiac_events.37.t:0 "[concept_serenica] Shines"
 zodiac_events.37.d:0 "As the Realm of [concept_serenica] waxes overhead, [SCOPE.sState('sunshine_state').GetStateRegion.GetName] is bathed in heavenly sunlight."
 zodiac_events.37.f:0 "While incursions from most Outer Realms are often devastating, [concept_serenica] is a notable exception. Those lands lucky enough to catch [concept_serenica]’s eye are washed in refreshing yellow light. In [SCOPE.sState('sunshine_state').GetStateRegion.GetFarmHubName], a spring festival is already being planned."
 zodiac_events.37.a:0 "A welcome change of pace."
 zodiac_events.38.t:0 "Sailing Through Time"
 zodiac_events.38.d:0 "As the Realm of [concept_lamassia] waxes overhead, the echoes of long-dead sailors can be seen trailing the coast of [SCOPE.sState('ghost_state').GetStateRegion.GetName], their journeys etched in time."
 zodiac_events.38.f:0 "The archivists of [concept_lamassia] work tirelessly not only to catalog every important piece of history, but also to adjudicate exactly what it means for a moment to be an ‘important piece of history.’ How exactly this curation process worked was a question previously left unanswered… until the recent events in [SCOPE.sState('ghost_state').GetStateRegion.GetName].\n\nAs the world turned and [concept_lamassia] came into view over [SCOPE.sState('ghost_state').GetStateRegion.GetCityHubName], it was as though the archivists themselves had ejected an entire wing of their celestial museum onto the coasts, and a fleet of ghastly sailors whose historical significance must pale in comparison to some unknown recent event now serve an endless watch on the coast."
 zodiac_events.38.a:0 "We should determine why these sailors were archived in the first place."
 zodiac_events.38.b:0 "Their watch has ended."
 zodiac_events.39.t:0 "[concept_morgrith]’s Malaise"
 zodiac_events.39.d:0 "Sickness thrives in [SCOPE.sState('disease_state').GetStateRegion.GetName] as the Realm of [concept_morgrith] waxes overhead."
 zodiac_events.39.f:0 "The Realm of [concept_morgrith] is one of an acrid swamp, its residents as contentious as they are contagious. As [concept_exether] rotates under its sphere of influence, the powers-that-be have seemingly turned their eyes to [SCOPE.sState('disease_state').GetStateRegion.GetName].\n\nAs crops fail and once-bustling shops shutter their doors for good, people turn to the state for help."
 zodiac_events.39.a:0 "There is nothing we can do."
 zodiac_events.39.b:0 "Force the distilleries to focus on cure disease potions!"
 zodiac_events.40.t:0 "[concept_zarnathul]’s Gaze"
 zodiac_events.40.d:0 "The rains have halted in [SCOPE.sState('drought_state').GetStateRegion.GetName] as the Realm of [concept_zarnathul] waxes overhead."
 zodiac_events.40.f:0 "The Realm of [concept_zarnathul] hides a mighty history, as authentic as it is alien. It #italic also#! hides a massive desert, as scorching as it is sweltering.\n\nAs [concept_zarnathul] rises further overhead, its scorching gaze can be felt across [SCOPE.sState('drought_state').GetStateRegion.GetName]."
 zodiac_events.40.a:0 "Well, we cannot change the weather."
 zodiac_events.40.b:0 "We could, in fact, change the weather."
 zodiac_events.40.c:0 "We could, in fact, change the weather."
 zodiac_events.41.t:0 "A Curse of Chitin"
 zodiac_events.41.d:0 "A new form of locust threatens life in [SCOPE.sState('locust_state').GetStateRegion.GetName] as the Realm of [concept_fushat] rises overhead."
 zodiac_events.41.f:0 "Many of the [concept_outer_realms] hold a knowledge or an existence that could easily be seen as elevated above [concept_exether] in splendor or purpose.\n\n[concept_fushat] is not one of those realms. The realm is inhabited by droning insectoids, united in purpose as they are in hunger. As it waxes overhead, their hunger takes physical form as locusts take root in [SCOPE.sState('locust_state').GetStateRegion.GetName]."
 zodiac_events.41.a:0 "Are there no exterminators?"
 zodiac_events.41.b:0 "Modern pesticides win the day!"
 zodiac_events.41.c:0 "It's just a few bugs."
 zodiac_events.42.t:0 "The Depths of [concept_ondis]"
 zodiac_events.42.d1:0 "Seas rise and rivers overflow in [SCOPE.sState('flood_state').GetStateRegion.GetName] as the Realm of [concept_ondis] rises overhead."
 zodiac_events.42.d2:0 "Rivers rise and levies overflow in [SCOPE.sState('flood_state').GetStateRegion.GetName] as the Realm of [concept_ondis] rises overhead."
 zodiac_events.42.f:0 "As [concept_ondis] waxes above, even the smallest streams in [SCOPE.sState('flood_state').GetStateRegion.GetCityHubName] are bursting at the seams. Water levels rise as rivers flow forth from their source, racing outward as though trying to find their own path to the Leviathan Depths. Even the fish seem affected, as they chase through their newfound streams, seemingly seeking something."
 zodiac_events.42.a:0 "Move to higher ground!"
 zodiac_events.42.b:0 "I do not fear the sea."
 zodiac_events.43.t:0 "The Tears of [concept_doloria]"
 zodiac_events.43.d:0 "The Realm of [concept_doloria] rains tears of great sorrow upon [SCOPE.sState('flood_state').GetStateRegion.GetName]."
 zodiac_events.43.f:0 "The [concept_outer_realms] wax and wane over [concept_exether], their influence growing with their proximity.\n\nAs [concept_doloria] waxes overhead, the weeping opera rains down upon [SCOPE.sState('flood_state').GetStateRegion.GetCityHubName]. As the torrent crescendoes, people are forced to seek shelter indoors."
 zodiac_events.43.a:0 "We can only weep along."
 zodiac_events.43.b:0 "We cry when we’re happy, too."
 zodiac_events.43.c:0 "You call those tears?"
 zodiac_events.44.t:0 "[concept_myrvak]’s Maelstrom"
 zodiac_events.44.d:0 "A great storm towers over [SCOPE.sState('flood_state').GetStateRegion.GetName] as the Realm of [concept_myrvak] passes overhead."
 zodiac_events.44.f:0 "The [concept_outer_realms] wax and wane over [concept_exether], their influence growing with their proximity.\n\nAs [concept_myrvak] grows near, thunder clashes and tornadoes peek down from the clouds. A weave of chaos can be felt stringing through the land."
 zodiac_events.44.a:0 "Prepare for the worst..."
 zodiac_events.44.b:0 "...But expect the best."
 zodiac_events.45.t:0 "[concept_voltyr]’s Nightmare"
 zodiac_events.45.d:0 "Lightning pulses over [SCOPE.sState('flood_state').GetStateRegion.GetName] as the Realm of [concept_voltyr] rises above."
 zodiac_events.45.f:0 "As [concept_voltyr] grows nearer to [concept_exether], its influence becomes impossible to ignore. The clouds shine bright with the light glow of ectoplasm as lightning surges overhead.\n\nIf we cannot find a way to mitigate the damage, the storm will spread to [SCOPE.sState('flood_state').GetStateRegion.GetName] and beyond."
 zodiac_events.45.a:0 "Realms above! We are forsaken!"
 zodiac_events.45.b:0 "We can mitigate the worst of the damage."
 zodiac_events.45.c:0 "This is not that serious."
 zodiac_events.46.t:0 "Winds of [concept_saharzin]"
 zodiac_events.46.d:0 "The wind rises in [SCOPE.sState('flood_state').GetStateRegion.GetName] as the Realm of [concept_saharzin] waxes above."
 zodiac_events.46.f:0 "The Realm of [concept_saharzin] is one of sputtering gale and irresistible breeze. As it grows nearer, its influence becomes impossible to ignore. Now, it reaches the closest point of its proximity to [concept_exether], and even the gentlest zephyr blows with a potent rage."
 zodiac_events.46.a:0 "It’s just a bit of wind."
 zodiac_events.46.b:0 "Will no one rid me of this turbulent… turbulence?"
 zodiac_events.47.t:0 "The Madness of [concept_myrnella]"
 zodiac_events.47.d:0 "Predator becomes prey in [SCOPE.sState('flora_state').GetStateRegion.GetName] as the Realm of [concept_myrnella] waxes above."
 zodiac_events.47.f:0 "The Realm of [concept_myrnella] is one of moss-covered vales and jungle without intermission. As it grows nearer, the flora of [concept_exether] rise with a new purpose: to feast.\n\nNow, the ecosystem in [SCOPE.sState('flora_state').GetStateRegion.GetFarmHubName] is being disrupted as the crops consume their former predators."
 zodiac_events.47.a:0 "I always knew vegetables were dangerous."
 zodiac_events.47.b:0 "Well, wheat better do something about it."
 zodiac_events.48.t:0 "The Deceit of [concept_anu_dartu]"
 zodiac_events.48.d:0 "Even the water in [SCOPE.sState('acid_state').GetStateRegion.GetName] is afflicted with deceit as the Realm of [concept_anu_dartu] waxes above."
 zodiac_events.48.f:0 "The Realm of [concept_anu_dartu] is one of lies and trickery. As it grows nearer, both person and object are bathed in the spirit of guile and deceit.\n\nNow, the rains that once brought life to [SCOPE.sState('acid_state').GetStateRegion.GetFarmHubName] are threatening to end it entirely."
 zodiac_events.48.a:0 "It’s just a little precipitation."
 zodiac_events.48.b:0 "Deceit does not take to [SCOPE.sCountry('country_scope').GetAdjectiveNoFlag] soil."
 zodiac_events.49.t:0 "The Call of [concept_caymir]"
 zodiac_events.49.d:0 "Whirlpools have begun to dot the coast of [SCOPE.sState('ghost_state').GetStateRegion.GetName] as the Realm of [concept_caymir] rises above."
 zodiac_events.49.f:0 "The environment of [concept_caymir] is one of an endless sea, linked by irresistible currents and vortexes twisting out-of-sight into the depths below. As [concept_caymir] approaches [concept_exether], the seas around [SCOPE.sState('ghost_state').GetStateRegion.GetNameNoFormatting] threaten to suck ship and sailor alike beneath the sea."
 zodiac_events.49.a:0 "I suppose we’ll have to cancel that cruise."
 zodiac_events.49.b:0 "Perhaps we know some old sea-witch tricks..."
 zodiac_events.50.t:0 "Excavation Obscuration"
 zodiac_events.50.f:0 "The story is strange; supposedly, the crypt was found during a routine renovation project at one of their properties in [SCOPE.sState('summer_home').GetStateRegion.GetName], and now [SCOPE.sCharacter('accused_scope').GetFullName] seeks to hire an adventuring party to clear the crypt and claim the relics within.\n\nHowever, local activists claim the crypt’s relative location was the topic of folk tales for centuries, and that [SCOPE.sCharacter('accused_scope').GetFullName] had previously sent surveying teams to a variety of locations before picking this one for their new property."
 zodiac_events.50.a:0 "The crypt is their personal property."
 zodiac_events.50.b:0 "Whatever is in there should stay sealed."
 zodiac_events.50.c:0 "Send a team of state mages to handle this."
 zodiac_events.51.t:0 "The Warmth of the Foundry"
 zodiac_events.51.f:0 "The land of [concept_luceros] is one of molten forges as far as the eye can see. Both birthplace and proving-ground of invention, its occult power is drawing the people toward industry and the sciences. At the same time, however, the heat of the foundries can be felt even indoors, and we cannot attempt to block the heatwave without also blocking the inventive spirit."
 zodiac_events.51.a:0 "The fire of industry burns hot."
 zodiac_events.51.b:0 "[concept_luceros] has no place here."
 zodiac_events.52.t:0 "[concept_anvu]’s Attention"
 zodiac_events.52.f:0 "The Realm of [concept_anvu] is one of bounding meadows and deathless song. As it spins overhead, seeds take root like never before."
 zodiac_events.52.a:0 "We shall not waste this blessing."
 zodiac_events.53.t:0 "[concept_optima]’s Guidance"
 zodiac_events.53.d:0 "[SCOPE.sCharacter('accused_scope').GetFullName] is resorting to strange practices in an attempt to perfect a new type of thaumacore."
 zodiac_events.53.f:0 "The first [SCOPE.sGoods('thaumacores_scope').GetNameNoIcon] were little more than wooden barrels with a porous bag of wishstone at the core. Today’s thaumacores are typically constructed with a brass or treated steel alloy, with a bulb-shaped reservoir of thick thermal glass filled with specially formulated ectoplasm. An enormous sum is spent every year on testing new glass designs, or new metal alloys to find a shape or make more conducive to efficient anima transfer; most of these designs doomed to failure.\n\nIt is thus perhaps no surprise that [SCOPE.sCharacter('accused_scope').GetFullName] is attempting to commune with a being from the Realm of [concept_optima] directly in attempt to bolster their engineers’ chances of success. In three months, when [concept_optima] is at its closest point to [concept_exether], they are planning on hosting some sort of occult ritual to petition [concept_optima]’s guidance in their designs."
 zodiac_events.53.a:0 "We wish them good will, and good luck."
 zodiac_events.53.b:0 "This is dangerous, and possibly illegal."
 zodiac_events.53.c:0 "It would be irresponsible of us not to oversee it."
 zodiac_events.54.t:0 "Within the Realm of Possibility"
 zodiac_events.54.d:0 "People in [SCOPE.sState('ulmeon_state').GetStateRegion.GetName] are encountering mirror versions of themselves as the Realm of [concept_ulmeon] waxes overhead!"
 zodiac_events.54.f:0 "The Realm of Ulmeon is one of boundless unrealized potential. As [concept_exether] falls within its grasp, citizens in [SCOPE.sState('ulmeon_state').GetStateRegion.GetCityHubName] are encountering alternate versions of themselves or their loved ones who made different choices. Some alternates are wealthier. Some are criminals. Others are dead. At least one woman has already been divorced for sleeping with an alternate version of her own husband.\n\nWhile most of the encounters last mere minutes, the philosophical and legal chaos they leave behind may last decades."
 zodiac_events.54.a:0 "A curious case."
 zodiac_events.55.t:0 "The Brotherhood of the Seething Pit"
 zodiac_events.55.d:0 "A cult devoted to [concept_vermior] has appeared in [SCOPE.sState('pit_state').GetStateRegion.GetName]."
 zodiac_events.55.f:0 "“The Brotherhood does not recruit. This is what makes them difficult. Other cults offer power, forbidden knowledge, eternal life, the usual inventory of temptations that our training prepares us to identify. The Brotherhood offers nothing except the opportunity to be angry in company, which turns out to be sufficient. They meet in cellars and back rooms and conduct what their founding texts describe as the Accounting: a ritual enumeration of every slight, injustice, dismissal, and humiliation suffered by every member since the last meeting.\n\nAt its final stages, their rite produces a physical warmth rising from the floor, smelling of hot iron, at which point the fissure between this world and Vermior is at its thinnest and the cult's more advanced members begin to speak in voices that are not entirely their own.\n\nThe Brotherhood's membership skews heavily toward those with legitimate grievances. This is the detail that makes our work hardest, for the anger and the injustices are real. Vermior simply found a crack in something real and pushed until it opened.”"
 zodiac_events.55.a:0 "We dare not stir this anger."
 zodiac_events.55.b:0 "Crush this cult!"
 zodiac_events.55.c:0 "It's good that they have an outlet!"
 zodiac_events.56.t:0 "In Seek of a Nightmare"
 zodiac_events.56.d:0 "A cult devoted to [concept_morvane] has appeared in [SCOPE.sState('morvane_state').GetStateRegion.GetName]."
 zodiac_events.56.f:0 "“The cult presents itself in its outer circles as a philosophical society dedicated to the exploration of the mind through structured nightmare. Initiates are introduced gradually; first to guided meditation, then to spiritual sleep deprivation, then to substances that the cult's inner circle describe as "
 zodiac_events.56.a:0 "We will not engage this darkness."
 zodiac_events.56.b:0 "Burn their manor down!"
 zodiac_events.56.c:0 "We could learn much from their methods."
 zodiac_events.57.t:0 "The Path of Remembrance"
 zodiac_events.57.d:0 "A cult devoted to [concept_ylvaris] is operating throughout [ROOT.GetCountry.GetNameNoFlag]."
 zodiac_events.57.f:0 "The devotees of the Path of Remembrance are, by any conventional assessment, harmless. This assessment is held by the [ROOT.GetCountry.GetAdjectiveNoFormatting] authorities, the [SCOPE.sReligion('state_religion_scope').GetName] faith, and most colleges of magic, and it is why the devotees have been operating continuously for around ten years without suppression.\n\nThey collect names. They travel to places where people died forgotten, such as unmarked graves, plague pits, collapsed mines, and drowned villages. There they perform their rite, which involves three hours of chanting in an archaic tongue and the carving of whatever names they can recover into whatever stone is available. Then they leave. No sacrifices, no summonings. They carve names and move on.\n\nThe question of what the stewards of [concept_ylvaris] do with the names once they are received remains unanswered. Something beyond the mortal world is keeping a list, a list that is very long and growing longer. Are the powers that catalog the forgotten dead protecting them or collecting them?\n\nAt the level of the outer realms, are these things even distinct?"
 zodiac_events.57.a:0 "They seem harmless enough."
 zodiac_events.57.b:0 "Malicious or not, they must stop."
 zodiac_events.58.t:0 "The Stormcallers of [concept_oragea]"
 zodiac_events.58.d:0 "A cult devoted to [concept_oragea] has taken root in [SCOPE.sState('oragea_state').GetStateRegion.GetName]."
 zodiac_events.58.f:0 "The Stormcallers are easy to find. They are standing in the storm. They are always standing in the storm. Whatever weather is occurring, they are in the worst of it, arms spread, faces up toward the heavens.\n\nTheir initiation involves standing in increasingly severe weather until either the candidate breaks and the cult considers them insufficiently committed, or the weather breaks around the candidate, at which point the weather has recognized them as one of its own.\n\nAdvanced Stormcallers can redirect both wind and water alike. [ROOT.GetCountry.GetAdjectiveNoFlag] authorities attempted to arrest one in [SCOPE.sState('oragea_state').GetStateRegion.GetFarmHubName] during a light drizzle; the subsequent thunderstorm destroyed two buildings."
 zodiac_events.58.a:0 "Hang them out to dry!"
 zodiac_events.58.b:0 "They will make excellent battlemages!"
 zodiac_events.59.t:0 "The Uncrowned"
 zodiac_events.59.d:0 "A cult devoted to [concept_ithraxis] has taken root in [SCOPE.sState('ithraxis_state').GetStateRegion.GetName]."
 zodiac_events.59.f:0 "The Uncrowned do not have a hierarchy, which is their central theological commitment and their primary operational problem. Every decision is made by consensus. Every consensus is immediately challenged. Every challenge produces a counter-proposal. And so forth.\n\nWhat makes them dangerous is not what they do but what they represent: they are very good at convincing other people that all authority is arbitrary, and those people then go and apply this lesson elsewhere.\n\nThe cult is its own worst enemy. The ideas, however, travel further than the cult and often arrive somewhere else in better health."
 zodiac_events.59.a:0 "They’ll fizzle out, in time."
 zodiac_events.59.b:0 "Teach them the benefits of hierarchy."
 zodiac_events.59.c:0 "What a patriotic bunch!"
 zodiac_war_events.1.t:0 "Eye of the Storm"
 zodiac_war_events.1.d:0 "[SCOPE.sCharacter('occult_general').GetFullName] has proposed a military offensive plan that intentionally coincides with the Realm of [concept_voltyr] rising overhead."
 zodiac_war_events.1.f:0 "As [concept_exether] falls within [concept_voltyr]’s grasp, the wind rises and a storm prepares overhead.  [SCOPE.sCharacter('occult_general').GetFullName] suggests the unthinkable; they propose massing our finest lightning mages in a single spot on the front, alongside a massive tuning array so that they may tap into the power of the Realm of [concept_voltyr] directly."
 zodiac_war_events.1.a:0 "Get those arrays online!"
 zodiac_war_events.1.b:0 "This is too risky."
 zodiac_war_events.2.t:0 "A Fire Rises"
 zodiac_war_events.2.d:0 "[SCOPE.sCharacter('occult_general').GetFullName] has proposed a military offensive plan that would use the fires of the Realm of [concept_qasyran] to our advantage."
 zodiac_war_events.2.f:0 "As [concept_exether] falls within [concept_qasyran]’s grasp, the wind rises and flames dance overhead. [SCOPE.sCharacter('occult_general').GetFullName] believes that we can use the flames to our own ends; they propose using our mages to direct the fire to our enemies using a mixture of wind and fire control spells."
 zodiac_war_events.2.a:0 "They will be cleansed with flame."
 zodiac_war_events.2.b:0 "This is too destructive."
 zodiac_war_events.3.t:0 "Beast from Without"
 zodiac_war_events.3.d:0 "[SCOPE.sCharacter('occult_general').GetFullName] is planning on summoning a great beast from the Realm of [concept_savokar] to unleash upon our enemies."
 zodiac_war_events.3.f:0 "As [concept_savokar] comes within reach of [concept_exether], [SCOPE.sCharacter('occult_general').GetFullName] is preparing a ritual that will pluck one of the mighty beasts from [concept_savokar]’s realm and into our own. They insist that they will be able to maintain control over the beast for at least until it has been released into the enemy’s formation, and have chosen a secluded location in [SCOPE.sState('fire_state').GetStateRegion.GetName] to perform the ritual."
 zodiac_war_events.3.a:0 "We will destroy them with animalistic rage!"
 zodiac_war_events.3.b:0 "This is too risky."
 zodiac_war_events.4.t:0 "A Wall of Brush"
 zodiac_war_events.4.d:0 "As [concept_myrnella] rises above, [SCOPE.sCharacter('occult_general').GetFullName] plans to use a litany of plant growth spells to create a wall of fire-resistant brush to stall enemy offensives."
 zodiac_war_events.4.f:0 "As [concept_myrnella] waxes overhead, [SCOPE.sCharacter('occult_general').GetFullName] plans to use the Realm’s budding power to invigorate our casters and create a near-impenetrable wall of brush along the frontline. They suggest that a line of overgrowth could ice out hostile assaults indefinitely."
 zodiac_war_events.4.a:0 "But then how would we attack?"
 zodiac_war_events.4.b:0 "May the vines of [concept_myrnella] protect us."
 zodiac_war_events.5.t:0 "The Festus Truce"
 zodiac_war_events.5.d:0 "Soldiers on the frontline in [SCOPE.sState('truce_state').GetStateRegion.GetName] have organized an impromptu truce as [concept_festus] rises overhead."
 zodiac_war_events.5.f:0 "[concept_exether]’s arrival in [concept_festus]’s arcane sphere is marked by minor holidays and celebrations in nearly every culture on the planet.\n\nOn [TimeKeeper.GetCurrentDate.GetString], the frontline in [SCOPE.sState('truce_state').GetStateRegion.GetName] was afflicted by this very same sense of joy and merriment. While the largest cross-regiment celebrations have already subsided, reports of our troops meeting with [SCOPE.sCountry('truce_enemy').GetAdjectiveNoFormatting] troops in no man’s land and talking or trading coffee and cigarettes are still flowing in from the front."
 zodiac_war_events.5.a:0 "Fraternization like this cannot be permitted."
 zodiac_war_events.5.b:0 "They deserve a break from the horrors of war."
 zodiac_war_events.6.t:0 "Guests of [concept_gomgraz]"
 zodiac_war_events.6.d:0 "Soldiers in [SCOPE.sState('chariot_state').GetStateRegion.GetName] have reported sightings of a flying chariot procession bearing scarlet banners as [concept_gomgraz] rises overhead."
 zodiac_war_events.6.f:0 "While most [concept_outer_realms] have some sort of vested interest regarding meddling in [concept_exether], the Lords of [concept_gomgraz] especially relish in personally overseeing spectacular battles. During the window in which [concept_exether] is within their grasp, they will ride into the night sky in flaming chariots, drawing thick scarlet banners behind them. They patrol the skies over great battlefields as though scouting for recruits."
 zodiac_war_events.6.a:0 "Let’s give them a show."
 zodiac_war_events.6.b:0 "Only fools try to draw the attention of the Lords of War."
 zodiac_war_events.7.t:0 "A Wall of Ice"
 zodiac_war_events.7.d:0 "As [concept_bhalora] rises above, [SCOPE.sCharacter('occult_general').GetFullName] plans to create a wall of ice to stall enemy offensives."
 zodiac_war_events.7.f:0 "A cold wind blows throughout the land as [concept_bhalora] waxes overhead. [SCOPE.sCharacter('occult_general').GetFullName] plans to use the Realm’s chilling power to invigorate our casters and create a near-impenetrable wall of ice along the frontline. They suggest that a solid wall could ice out hostile assaults indefinitely."
 zodiac_war_events.7.a:0 "This would create more problems than it would solve."
 zodiac_war_events.7.b:0 "May the cold of [concept_bhalora] protect us."
 zodiac_war_events.8.t:0 "Darkness of [concept_dulan]"
 zodiac_war_events.8.d:0 "The Realm of [concept_dulan] has turned its dark gaze to our frontline in [SCOPE.sState('fire_state').GetStateRegion.GetName]."
 zodiac_war_events.8.f:0 "As the Realm of [concept_dulan] rises above, a blanket of darkness follows. The more superstitious among the soldiers believe that the hopelessness of the fighting in [SCOPE.sState('fire_state').GetStateRegion.GetName] has attracted the attention of [concept_dulan], and is to blame for the all-consuming darkness that coats the region."
 zodiac_war_events.8.a:0 "Are our soldiers afraid of the dark?"
 zodiac_war_events.9.t:0 "A Matchlock Made in Hell"
 zodiac_war_events.9.d1:0 "Our $combat_unit_type_mages_one$ regiments are suffering from a lack of professionalism."
 zodiac_war_events.9.d2:0 "Our $combat_unit_type_mages_two$ regiments are suffering from a lack of professionalism."
 zodiac_war_events.9.f:0 "The sudden necessity of skilled battlemages within [ROOT.GetCountry.GetAdjective] armies has left our military administrators in a poor bargaining position. Most talented starbrands have no shortage of employment opportunities, leaving us with no choice but to hire arcane contractors and auxiliaries rather than fielding integrated magic regiments.\n\nThese auxiliary regiments lack strict military discipline, and are often rowdy and unreliable, showing up late and attacking targets independently of their larger battalions."
 zodiac_war_events.9.a:0 "Enforce stricter rules on our battlemages."
 zodiac_war_events.9.b:0 "We must make do with the army we have."
 zodiac_war_events.10.t:0 "Promising Battlemage Appears"
 zodiac_war_events.10.d:0 "A skilled wizard has made a name for themselves during the fighting in [SCOPE.sState('heroism_state').GetStateRegion.GetName]."
 zodiac_war_events.10.f3:0 "While all military service tends to attract adventurers and other glory-seeking types, nowhere more does a skilled individual grow their glory and popularity than by serving as a war wizard. After the rough fighting in [SCOPE.sState('heroism_state').GetStateRegion.GetName], a [concept_starbrand] of the [concept_phoenix] has attracted attention through their heroic deeds."
 zodiac_war_events.10.f1:0 "While all military service tends to attract adventurers and other glory-seeking types, nowhere more does a skilled individual grow their glory and popularity than by serving as a war wizard. After the rough fighting in [SCOPE.sState('heroism_state').GetStateRegion.GetName], a [concept_starbrand] of the [concept_golem] has attracted attention through their heroic deeds."
 zodiac_war_events.10.f2:0 "While all military service tends to attract adventurers and other glory-seeking types, nowhere more does a skilled individual grow their glory and popularity than by serving as a war wizard. After the rough fighting in [SCOPE.sState('heroism_state').GetStateRegion.GetName], a [concept_starbrand] of the [concept_gryphon] has attracted attention through their heroic deeds."
 zodiac_war_events.10.a:0 "They will make a good officer."
 zodiac_war_events.10.b:0 "We will be following their career with great interest."
 zodiac_war_events.11.t:0 "Collateral Damage"
 zodiac_war_events.11.d:0 "[SCOPE.sState('shelling_state').GetStateRegion.GetName] is ablaze after stray artillery fire struck the wishstone reserves of local $building_gizmo_workshop$."
 zodiac_war_events.11.f:0 "While [SCOPE.sGoods('wishstone_scope').GetNameNoIcon] is not typically considered a combustible material, it is not uncommon for certain types of magical explosions to cause a chain reaction in the event that a second source of wishstone lies within the blast zone.\n\nAn explosion of this kind has occurred in [SCOPE.sState('shelling_state').GetStateRegion.GetCityHubName] after the recent shelling of local $building_gizmo_workshop$."
 zodiac_war_events.11.a:0 "War is hell."
 zodiac_war_events.12.t:0 "Supernatural Surge"
 zodiac_war_events.12.d:0 "The $building_haunted_grounds$ in [SCOPE.sState('war_haunted_state').GetStateRegion.GetName] are brimming with souls from the fighting on the frontline nearby."
 zodiac_war_events.12.f:0 "After death, it is not uncommon for the soul to linger for a time, particularly if the death was violent or if funerary rites were not observed.\n\nAfter the recent round of fighting in [SCOPE.sState('war_haunted_state').GetStateRegion.GetName], [SCOPE.sGoods('ectoplasm_scope').GetNameNoIcon] harvesters near [SCOPE.sState('war_haunted_state').GetStateRegion.GetCityHubName] are reporting that their usual haunts are overrun with ghosts of the wartime dead. While more ghosts may mean more ectoplasm, many of our ectoplasm harvesting operations are struggling to find willing laborers."
 zodiac_war_events.12.a:0 "I ain’t afraid of no ghosts."
 zodiac_war_events.13.t:0 "The Sharpcaster Rifle"
 zodiac_war_events.13.d:0 "The Sharpcaster rifle, a new form of infantry rifle, has entered [ROOT.GetCountry.GetAdjective] military service."
 zodiac_war_events.13.f:0 "The true innovation behind the sharpcaster rifle is not in the rifle itself, but in the new caliber debuting alongside it. The rifle fires a .55 caliber tubular cartridge that would be otherwise unremarkable if not for the fact the cartridge was hollowed and filled with a concentrated wishstone formulation. The rifle is meant to be used in tandem with a starbrand acting in a support role, casting alteration spells on the round as it is fired, to activate the wishstone inside and imprint certain spells or effects on the bullet or the area it strikes.\n\nThe weapon is a formidable addition to any regiment, and allows for the accurate and expedient dispersal of combat spells at ranges of up to 450 meters."
 zodiac_war_events.13.a:0 "Our elite regiments will benefit."
 zodiac_war_events.13.b:0 "A Sharpcaster rifle for every soldier!"
 kailando_events.1.t:0 "Once In Twain, Now Intertwined"
 kailando_events.1.d:0 "Savavo and Nyama have ended their feud, and become something even greater than themselves."
 kailando_events.1.f:0 "The two stood across from one another in the dreaming, daggers drawn. Above them, the two suns orbited like binary stars, attracted and repelled by their contradictions in equal measure. The suns collided as they did, and there was a blinding light.\n\nAkini Kovohi awoke on the throne, surrounded by anxious subjects. He realized that Savavo and Nyama were never separate, but two halves of one person.\n\nThey raised their hand, and there was a blinding flash of golden light. All in the room were basked in the warmth of the sun.\n\n\"My people,\" Akini’s voice carried the authority of the sun itself, \"your long wait has come to an end. Today, I declare that our kingdom of ten-thousand years begins today.\""
 kailando_events.1.a:0 "We will be a beacon for the world."
 kailando_events.1.b:0 "We will bring it to all the world."
 kailando_events.2.t:0 "The Messianic Age"
 kailando_events.2.d:0 "Nyama has lost the power struggle, and has been dethroned by Savavo."
 kailando_events.2.f:0 "She didn’t go down easy, the scorch-marks on the marble walls of the throne room were testament to that. But as powerful as she was, Savavo was stronger. He sat on his throne, surrounded by Light-Speakers and representatives of the realm’s most powerful families.\n\n\"We have returned to the righteous path,\" Savavo declared to the assembly, \"our long wandering in the wilderness has come to an end. But now we must throw light upon the shadows that stalk our lands; we cannot be Perfect until we cleanse the remaining corruption from the body of the nation.\"\n\nHe lifted his hand, and a searing golden light eliminated a quarter of the assembled. It was a good start."
 kailando_events.2.a:0 "Perdition."
 kailando_events.3.t:0 "The Voice of Akini"
 kailando_events.3.d:0 "Savavo has lost the power struggle, and has been slain for the second time."
 kailando_events.3.f:0 "Nyama dropped the bloodied dagger and gazed at the fallen body of her twin brother. And then she woke up.\n\nShe was on her throne, surrounded by her fearful and curious followers. The results of the final confrontation in the dreaming were not yet known.\n\nShe smiled. \"The usurper has been defeated. There is a new dawn in Amanzi, and the sun will go unchallenged.\"\n\nShe raised her hand, and there was a blinding flash of light. A third of the assembled were instantly turned to ash.\n\n\"Doubt in me is a corruption to the body of the nation,\" her voice boomed over the shocked shouting within the throne room, \"we will see this rot burned away.\""
 kailando_events.3.a:0 "Perdition."
 kailando_events.4.t:0 "Dreams of the Twin Suns"
 kailando_events.4.d:0 "Nyama Kovohi has received a vision from Akini, revealing the identity of the prophet in the mountains."
 kailando_events.4.f:0 "Time moved quickly here, on the endless plain. When one sun would set, the other would rise, leaving no darkness or shadows. From the horizon, a man approached. At first, he was a stranger, but as he grew near, she was met by the face of her stillborn brother.\n\n\"You are dead!\" She exclaimed.\n\n\"Alas,\" said her twin brother Savavo, \"I am here, to regain what is mine. Akini tasked you with preparing my throne, and your work is complete. Rest, sister, for you are tired. I have sent word to the Light-Speakers in the capital; welcome them in their work.\"\n\nNyama's eyes flashed and she bared her teeth. \"When I wake, I will…\""
 kailando_events.4.a:0 "Feed them to my raptors!"
 kailando_events.4.b:0 "Hunt you down to the ends of creation!"
 kailando_events.4.c:0 "Show them I am the legitimate Pibliyakimo!"
 kailando_events.5.t:0 "The Shadow"
 kailando_events.5.d:0 "A group of Lacertian slaves have pulled the Pibliyakimo into their own part of the dreaming to demand an end to their bondage."
 kailando_events.5.f:0 "The elder wore an elaborate headdress of saurian bones and bore a nasty scare down the side of his face, which had clearly blinded him in one eye. Around both of them, a group of other lacertians chanted and danced to maintain the ritual.\n\n\"I have brought you here to beg for your assistance. When the Revolution came to these lands, we were promised freedom by the Amanzi if we fought on your side. Our best warriors joined you, but now those warriors and their families are once again thrown into bondage.\""
 kailando_events.5.a:0 "Your people shall be freed."
 kailando_events.5.b1:0 "It is more complicated than that."
 kailando_events.5.b2:0 "It is more complicated than that."
 kailando_events.6.t:0 "The Power of the Word"
 kailando_events.6.d:0 "The lack of [concept_literacy] among the peasantry is being taken advantage of by the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant], who slander [ROOT.GetCountry.GetRuler.GetFullName]."
 kailando_events.6.f:0 "The dream again. In the field of endless light, she stood across from Savavo.\n\n#italic \"You are a usurper, and you carry no claim to my throne.\"\n\n\"All monarchs are usurpers; don’t you remember the tale of the jackal and the raptor? The jackal ruled with cruelty over a kingdom of raptors, using a tablet with symbols none but she could read. One day, a wandering raptor told them a story, with words rather than symbols, and they learned that they could simply devour the jackal to end her tyranny.\"\n\n#!Tired of his words, Nyama pulled a dagger and plunged it into her own chest. She woke from the dreaming with a start, and called for her advisors."
 kailando_events.6.a:0 "The faith belongs to all, not wandering Light-Speakers."
 kailando_events.6.b:0 "Kill the Light-Speakers and use them as distance markers!"
 kailando_events.6.c:0 "The Light-Speakers are free to choose their path."
 kailando_events.7.t:0 "Solar Storm"
 kailando_events.7.d:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] has experienced a vivid vision of the scorching sun."
 kailando_events.7.f:0 "Something was wrong with the dream. The endless plain was scorched and dry, and the sun overhead had stopped moving. There was a searing heat on her skin, but it was the kind of pain in dreams where it was nothing more than a pressure. Across from her, Savavo sat fanning himself.\n\n\"Sister, something is wrong. The river of spirits to Akini has been disrupted, and I don’t know why. Sister, share with me some of your power, and I can find the source of this sickness. If you don’t trust me with mortal power, trust me with the power of the dream. It is my people too, who will suffer if I am unsuccessful.\""
 kailando_events.7.a:0 "Trust in Savavo."
 kailando_events.7.b:0 "Repress the dream."
 kailando_events.8.t:0 "A Dam Problem"
 kailando_events.8.d:0 "A village in [SCOPE.sState('speaker_state').GetStateRegion.GetName] is seeking recompense after a dam designed by a travelling [concept_lightspeaker] collapsed after only one season."
 kailando_events.8.f:0 "The relative lack of educated people in the rural communities of [SCOPE.sState('speaker_state').GetStateRegion.GetName] means that [Concept('concept_lightspeaker', '$concept_lightspeakers$')] must play both tinker and tailor. It is thus no surprise that after the dam collapsed and the village sought recompense, that the only available magistrate was also a Light-Speaker.\n\nNow, the original Light-Speaker has been declared innocent, and the villagers are claiming a mistrial."
 kailando_events.8.a:0 "Uphold the magistrate's ruling."
 kailando_events.8.b:0 "Overturn this tragedy!"
 kailando_events.8.c:0 "Establish itinerant courts to service the rural communities."
 kailando_events.9.t:0 "Who Speaks for The Sun?"
 kailando_events.9.d:0 "The Revolution disrupted traditional customs, and now the Pibliyakimo must repair the damage to the land."
 kailando_events.9.f:0 "When Nyama entered the dreaming, she ignored her brother and wandered into the endless plains. Time passed differently in dreams, and she could not say for how long she wandered. She first came upon a tall totem of a Light-Speaker, an elder, in the act of sharing stories and wisdom. Next to it was a totem depicting a wise man from deep, deep in the histories of Kailando. This one was a Kailando Lacertian; a druid of the rainforest and speaker to the saurians. And then there was a totem of herself, standing resplendent and powerful as statues of the other two prostrated themselves before her. Though, the more she looked at it, the less certain she was about if the totem was of her, or Savavo...\n\nThis was a sign from Akini, and she knew what she must do when she woke."
 kailando_events.9.a:0 "The Light-Speakers."
 kailando_events.9.b:0 "Return to the most ancient traditions."
 kailando_events.9.c:0 "These rogue elements will bow before me!"
 toftir_events.1.t:0 "The White Procession"
 toftir_events.1.d:0 "A mindless army of undead, nearly four thousand strong, is marching across [SCOPE.sState('procession_state').GetStateRegion.GetName], ignoring borders and settlements."
 toftir_events.1.f:0 "Locals report the army rising from the ground near a ridge a few miles outside of [SCOPE.sState('procession_state').GetStateRegion.GetCityHubName]; a place long known to be haunted. They began immediately marching toward the mountains. While they seem to ignore everything in their path, they take careful effort to follow roads that have seemingly not existed for centuries, and to avoid any rivers or estuaries; even those that have not drawn water for generations.\n\nWhile the only victims so far have been a few trampled farmsteads, the local governors are demanding a solution."
 toftir_events.1.a:0 "Clear their path and let them pass."
 toftir_events.1.b:0 "Send adventurers to deal with this."
 toftir_events.1.c:0 "Our mages will study this magic!"
 toftir_events.1.e:0 "We have just the person for the job."
 toftir_events.2.t:0 "Whispers Beneath the Ice"
 toftir_events.2.d:0 "Miners in [SCOPE.sState('mine_state').GetStateRegion.GetName] are claiming to hear whispers coming from deep underground, calling them toward the ore veins."
 toftir_events.2.f:0 "The whispers are only heard by groups of four or less, and only while in the deepest subsections of the mountains. While those who have heard the voices claim to have inferred no ill will, it has sent a chilling effect through the mines, with work crews refusing to enter certain sections of the mines."
 toftir_events.2.a:0 "We should avoid interacting with these deep spirits."
 toftir_events.2.b:0 "Follow the voices!"
 toftir_events.2.e:0 "Perhaps we can make a deal with them?"
 toftir_events.3.t:0 "The Choir on the Hill"
 toftir_events.3.d:0 "A pair of Blacktalon monasteries in [SCOPE.sState('monastery_state').GetStateRegion.GetName] have begun to attract attention for their outlandish claims."
 toftir_events.3.f:0 "The Blacktalon monks have, for all of their order’s multi-century existence, flown to the highest point of a nearby plateau to hold a choir at least once a week; a practice that, they claim, prevents servants of the planes of the [concept_angel] from passing into the material plane.\n\nWhile perhaps pragmatic, their actions are having a negative effect on the demeanor of the local communities."
 toftir_events.3.a:0 "We dare not disturb them."
 toftir_events.3.b:0 "Break up the monasteries."
 toftir_events.4.t:0 "Children of the Cold"
 toftir_events.4.d:0 "Children born on Toftir during recent blizzards have been born as [concept_angel] [Concept('concept_starbrand', '$concept_starbrands$')], regardless of the year’s ‘proper’ zodiac."
 toftir_events.4.f:0 "One of the few things known to be true about starbrands is that a starbrand’s brand always matches the sign they were born under, and with only one in twelve people receiving a brand. However, children born during recent blizzards are somehow defying both of these rules, with nearly a third being born with brands of the [concept_angel]."
 toftir_events.4.a:0 "Interesting."
 toftir_events.4.b:0 "Collect the children for observation."
 rimeroot_events.1.t:0 "Fire and Ice"
 rimeroot_events.1.d:0 "Despite the cold, a wildfire rages in [SCOPE.sState('wildfire_state').GetStateRegion.GetName]."
 rimeroot_events.1.f:0 "When a wyrmfruit touches a flame, its extremely flammable shell immediately catches on fire. A few seconds later, the whole fruit bursts apart into burning chunks! They are the primary reason why even in these frozen conditions, wildfires are an unfortunate part of life.\n\nOne of these has now struck [SCOPE.sState('wildfire_state').GetStateRegion.GetName]."
 rimeroot_events.1.b:0 "Just a part of life, nothing to be done about it."
 rimeroot_events.1.a:0 "Put out those fires, no matter what!"
 rimeroot_events.1.c:0 "Thankfully, we are prepared!"
 rimeroot_events.2.t:0 "Everything is Kindling!"
 rimeroot_events.2.d:0 "An inferno threatens [province]!"
 rimeroot_events.2.f:0 "Largely thanks to the highly combustible wyrmfruits, these forests already used to be prone to wildfires when they were frozen. And with our great efforts reactivating the sunstations and warming this frozen climate, things have gotten so much worse! If the fire isn’t dealt with quickly, much of [province] will be completely destroyed!"
 rimeroot_events.2.b:0 "If only we had the infrastructure to deal with this!"
 rimeroot_events.2.a:0 "Whatever is needed, we have to stop the worst!"
 rimeroot_events.2.c:0 "Thankfully, we are prepared!"
 rimeroot_events.3.t:0 "Under The Sun"
 rimeroot_events.3.d:0 "One of our maintenance crews encountered a previously uncontacted tribe of orcs living in the sunstation tunnels."
 rimeroot_events.3.f:0 "While the first encounter was tense, the orcs have slowly eased up to the presence of our work crews. They seem to have a generational knowledge both of the tunnels and of much of the technology within; including some of the draconic agro-magick that was lost after the [concept_godsbane].\n\nWhile they could not stop us from seizing their technological artifacts, it is unlikely that we would be able to unravel the inner workings without their assistance."
 rimeroot_events.3.a:0 "Negotiate with them to learn the agro-magicks."
 rimeroot_events.3.b:0 "Strike them down and seize their artifacts!"
 rimeroot_events.3.c:0 "Invite them to join our society!"
 rimeroot_events.5.t:0 "Many Hands Make Light Work"
 rimeroot_events.5.d:0 "A swarm of [concept_heptadrones] has begun collecting materials in the mines in [SCOPE.sState('mine_state').GetStateRegion.GetName]."
 rimeroot_events.5.f:0 "All through the day and night, they can be heard drilling away in the mines. Once they have collected a suitable amount, they load it all into carts and haul it back under the  sunstation tunnels to a destination unknown.\n\nWhile it is unclear what they need the materials for, they seem unbothered by us taking from their piles for ourselves."
 rimeroot_events.5.a:0 "What are those drills they’re using?"
 rimeroot_events.5.b:0 "Well, we’re not going to interrupt them."
 rimeroot_events.6.t:0 "Hepta-Harbormasters"
 rimeroot_events.6.d:0 "A swarm of [concept_heptadrones] has been rebuilding a long out-of-commission draconic dockyard in [SCOPE.sState('port_state').GetStateRegion.GetCityHubName]."
 rimeroot_events.6.f:0 "The swarm has been spending months drawing materials out from unseen warehouses within the sunstation tunnels, chiseling the dock from stone, and laying out machinery, as though following some ancient blueprint.\n\nWhile the dockyard is too far from any settlements to be of commercial use, it could serve as a refueling point of some sort, or be dismantled for parts."
 rimeroot_events.6.a:0 "Hand it over to the military."
 rimeroot_events.6.b:0 "Tear it down, and study the draconic designs."
 rimeroot_events.7.t:0 "The Beast of [SCOPE.sState('mad_science_state').GetStateRegion.GetCityHubName]"
 rimeroot_events.7.d:0 "A famous artificer in [SCOPE.sState('mad_science_state').GetStateRegion.GetName] has come under fire for combining a live cow with the body of one of the brass bulls native to Rimeroot."
 rimeroot_events.7.f:0 "The creature was taken down by local adventurers after it broke out of the artificer’s laboratory in [SCOPE.sState('mad_science_state').GetStateRegion.GetCityHubName], where it took to the streets in a rampage. While the locals are calling for the creator to be put on trial, there are loud voices in the academic community calling them a ‘visionary of medical science’."
 rimeroot_events.7.a:0 "Arrest this criminal, and seize their laboratory!"
 rimeroot_events.7.b:0 "Perhaps there are military applications?"
 rimeroot_events.8.t:0 "Dusk Rendezvous"
 rimeroot_events.8.d:0 "Duskmirror swans are travelling from all across Rimeroot to congregate in a single valley in [SCOPE.sState('dusk_state').GetStateRegion.GetName]."
 rimeroot_events.8.f:0 "Typically solitary creatures, the swans are gathering together by the hundred in [SCOPE.sState('dusk_state').GetStateRegion.GetName] in an event that is baffling local academics. The purpose for the gathering, or even how the swans knew when or how to arrive is unclear. As even more swans are set to arrive, a unique opportunity arises."
 rimeroot_events.8.a:0 "We should study the swans."
 rimeroot_events.8.b:0 "It’s open season!"
 rimeroot_events.9.t:0 "Fool’s Fins"
 rimeroot_events.9.d:0 "Our goldfisheries are struggling as an unknown disease is causing the fish’s gold scales to fall off."
 rimeroot_events.9.f:0 "Sailors have taken to calling them ‘Fool’s fish’, as the disease leaves behind a thin veneer of iron pyrite where the scale once sat, meaning that an infected fish cannot be accurately identified until it has already been caught.\n\nUnless speedy action is taken, the effects on our fisheries could be disastrous."
 rimeroot_events.9.a:0 "If only we had medicine for this…"
 rimeroot_events.9.b:0 "Disperse a treatment into the water!"
 rimeroot_events.10.t:0 "New Construction, Old Design"
 rimeroot_events.10.d:0 "A swarm of heptadrones have finished construction of a new sunstation in [SCOPE.sState('pyrite_state').GetStateRegion.GetName]."
 rimeroot_events.10.f:0 "The desolate sunstation in [SCOPE.sState('pyrite_state').GetStateRegion.GetNameNoFormatting] has long been a bugbear for our administration. Its incomplete state rendered it inoperable with the tools available to us now, but the promise of its potential usage has left our magistrates unwilling to sign off on its deconstruction or salvaging.\n\nOur indecision seems to have paid off, with a swarm of heptadrones having taken interest in the site. While most of the swarm has already disappeared into the tunnels, they have left behind a skeleton crew of heptadrones to maintain the station."
 rimeroot_events.10.a:0 "Should we thank them?"
 rimeroot_events.10.b:0 "Dismantle the station for spare parts."
 rimeroot_events.11.t:0 "Copper Thieves!"
 rimeroot_events.11.d:0 "The [concept_heptadrones] in [SCOPE.sState('pilfering_state').GetStateRegion.GetName] seem unusually starved for materials as of late; they have taken to claiming whatever resources we have laying around!"
 rimeroot_events.11.f:0 "Any of our warehouses containing iron or copper appear to be fair game. The heptadrones only come around at night, as though they know they would face retaliation if they tried to come during the day. No one has yet been harmed, but merchants and business owners are clamoring for a solution."
 rimeroot_events.11.a:0 "They're a menace!"
 rimeroot_events.11.b:0 "Hire some adventurers."
 rimeroot_events.12.t:0 "Going Supernova"
 rimeroot_events.12.d:0 "The sunstation in [SCOPE.sState('blowout_state').GetStateRegion.GetName] is suffering a critical meltdown."
 rimeroot_events.12.f:0 "While modern magitech has long had an answer for the power requirements of the sunstations, the question of cooling remains unanswered. It is thus no surprise that meltdowns or blowouts occur on occasion.\n\nA recent blowout in [SCOPE.sState('blowout_state').GetStateRegion.GetNameNoFormatting] has left the zone with a dangerous amount of magical pollution."
 rimeroot_events.12.a:0 "Work must go on."
 rimeroot_events.12.b:0 "Clean up while we let it cool off."
 roe_building_events.1.t:0 "Pig-Essence Stills?"
 roe_building_events.1.d:0 "A number of rural laborers in [ROOT.GetCountry.GetNameNoFlag] are creating something known as "
 roe_building_events.1.a:0 "Excellent; we need to make the most of our raw material."
 roe_building_events.1.b:0 "Distribute materials on how to make a variety of home-remedies."
 roe_building_events.2.t:0 "The Haunting of [SCOPE.sState('ghost_state').GetStateRegion.GetName]"
 roe_building_events.2.d:0 "Ectoplasm extraction efforts in [SCOPE.sState('ghost_state').GetStateRegion.GetName] are being blamed for a recent string of hauntings in [SCOPE.sState('ghost_state').GetFarmHubName]."
 roe_building_events.2.f:0 "Regions prime for ectoplasm collection and regions prime for hauntings are often one-and-the-same. However, there is more than a coincidental link between the former and the latter.  Now, a series of hauntings in [SCOPE.sState('ghost_state').GetFarmHubName] has led the locals to demand restrictions on the collection of ectoplasm."
 roe_building_events.2.a:0 "This is the price of progress."
 roe_building_events.2.b:0 "Ensure that essence is collected without desecration of the grounds."
 roe_building_events.2.c:0 "To commune with these spirits is our sacred duty!"
 roe_building_events.3.t:0 "The Spirit of the Law"
 roe_building_events.3.d:0 "A famous adventurer in [SCOPE.sState('pact_state').GetStateRegion.GetName] has been accused of communing with the dead."
 roe_building_events.3.f:0 "It is common for both villagefolk and ectoplasm companies to hire adventurers to deal with hauntings. While many are in some way professional exorcists, others employ more unorthodox methods. In particular, this adventurer is said to have been cutting deals with various spirits to make their hauntings less intrusive, rather than exorcising them outright."
 roe_building_events.3.a:0 "Exether is for the living! They have failed in their duties."
 roe_building_events.3.b:0 "If it gets results..."
 roe_building_events.3.c:0 "This peaceful coexistence is an example we could all follow."
 roe_building_events.4.t:0 "Undersea Excavation"
 roe_building_events.4.d:0 "The archeological complexes in [SCOPE.sState('archeo_state').GetStateRegion.GetName] have been discovered to extend much further underwater than previously thought."
 roe_building_events.4.f:0 "After a local fishing trawler ensnared a cask of ancient gemstones, local adventurers took to the seas in diving bells to seek out their fortunes. Now, one group has struck it big, after uncovering several new underwater archeological sites in [SCOPE.sState('archeo_state').GetStateRegion.GetName]."
 roe_building_events.4.a:0 "An excellent find!"
 roe_building_events.4.b:0 "I suppose they'll be needing ships..."
 roe_building_events.5.t:0 "Heresy Incorporated"
 roe_building_events.5.d:0 "A gizmo factory in [SCOPE.sState('archeo_state').GetStateRegion.GetName] has been caught using ‘repurposed’ materials."
 roe_building_events.5.f:0 "An enterprising artificer has recently built a gizmo factory in [SCOPE.sState('archeo_state').GetStateRegion.GetName], and has been using ancient artifacts stolen from [SCOPE.sReligion('religion_scope').GetNameNoFormatting] holy sites. Religious authorities have petitioned authorities to destroy the factory and punish the artificer."
 roe_building_events.5.a:0 "Out with the old, in with the new."
 roe_building_events.5.b:0 "Arrest that plundering capitalist!"
 roe_building_events.6.t:0 "Spiritual Illness"
 roe_building_events.6.d:0 "Workers in our thaumacore factories are petitioning for better healthcare."
 roe_building_events.6.f:0 "While all magic industry is prone to strange injury and ailment, the employees of thaumacore factories are by far the most afflicted. Seizures, visions, and even full-blown possessions are not uncommon sights on the factory floor.\n\nThe [GetInterestGroupVariant('ig_trade_unions',GetPlayer).GetNameWithCountryVariant] have taken the worker’s concerns to heart, and are now fighting to bring light to these issues."
 roe_building_events.6.a:0 "Our society will be judged by how we treat our sick."
 roe_building_events.6.b1:0 "Are there no charities?"
 roe_building_events.6.b2:0 "Are there no charities?"
 roe_building_events.7.t:0 "A Big Fat Problem"
 roe_building_events.7.d:0 "[SCOPE.sGoods('blubber_good').GetName] prices are higher than ever before."
 roe_building_events.7.f:0 "As our nation grows, so do our needs. Blubber, being one of our most essential resources, is being hit hard by this growing need as it is being used in almost everything in our daily lives, from cooking all the way to fueling industrial ovens. This has caused great concern as the price rises, leaving some unable to heat their homes.\n\nAn odd coalition of industrialists and the urban poor have begun staging protests demanding that the goverment do something to increase the supply of blubber."
 roe_building_events.7.a:0 "We will prioritize this."
 roe_building_events.7.b:0 "If they aren't prepared, it's their fault."
 roe_building_events.7.c:0 "Blubber isn't the only heat source."
 roe_building_events.8.t:0 "The Perils of Mage Slavery"
 roe_building_events.8.d:0 "Slaves working in the Wishstone Mines in [SCOPE.sState('wishslave_state').GetStateRegion.GetName] are getting ideas about revolting."
 roe_building_events.8.f:0 "Slaves are employed in mines all throughout [ROOT.GetCountry.GetNameNoFlag]; wishstone is no exception. However, after an incident where a slave used wishstone to injure an officer with an enchanted pickaxe, concerns have been raised about further incidents occurring if we don't do something about to discourage them."
 roe_building_events.8.a:0 "Crack down on this sort of behavior!"
 roe_building_events.8.b:0 "Allow the slaves to use small amounts of wishstone to better their lives."
 roe_building_events.9.t:0 "Bloated Carcass Discovered"
 roe_building_events.9.f:0 "Perhaps agitated by an increase in maritime shipping and dedicated hunting fleets, it was discovered by locals after it had already expired, after it had already expired, already partially decayed.\n\nIt's a massive beast, with a tangle of tentacles twice as long as most fishing vessels, and a body as big as a modern ironclad. Three scavengers have been injured attempting to extract its wagon-sized teeth, and the bloating is getting more extereme. Biologists have petitioned the government to do something about it, warning that the gas building up within the rotting carcass will, without intervention, reach a critical mass and cause a tremendous detonation.\n\nHowever, the locals have demanded that they be allowed to continue scavenging the carcass. At the same time, some have suggested that the government also take advantage of this opprotunity..."
 roe_building_events.9.d:0 "A leviathan has washed up on the shore of [SCOPE.sState('leviathan_beach').GetStateRegion.GetName], bleached and covered in a layer of slime."
 roe_building_events.9.a:0 "Harvest whatever we safely can."
 roe_building_events.9.b:0 "Just push it back into the sea."
 roe_building_events.9.c:0 "I love the smell of blubber in the morning."
 roe_building_events.10.t:0 "Detonation!"
 roe_building_events.10.d:0 "The beached leviathan has exploded!"
 roe_building_events.10.f:0 "Disaster! During extraction operations, an attempt to safely release excess gas punctured a previously undetected organ, which immediately ruptured. This caused the entire carcass to split in half, and the gasses within were released in a tremendous detonation. Almost everyone within the immediate worksite were killed instantly, and buildings within a mile radius were flattened or severely damaged.\n\nWindows have shattered as far as [SCOPE.sState('leviathan_beach').GetStateRegion.GetFarmHubName], and the fumes have created a pungent odor that sickens and debilitates anyone in the area.\n\nIt will take weeks to clean up the mess, and the locals are apoplectic."
 roe_building_events.10.a:0 "At least the perfume shops will benefit..."
 roe_building_events.11.t:0 "[SCOPE.sCharacter('accused_scope').GetFullName] and the Gizmo Factory"
 roe_building_events.11.d:0 "Some are complaining about the peculiar means by which [SCOPE.sCharacter('accused_scope').GetFullName] has picked a new heir for their fortune."
 roe_building_events.11.f:0 "[SCOPE.sCharacter('accused_scope').GetFullName] has announced a new heir for their immense fortune. The lucky heir was chosen from amongst four other teens after a series of trials and tribulations at one of [SCOPE.sCharacter('accused_scope').GetLastName]’s own gizmo factories in [SCOPE.sState('gizmo_state').GetStateRegion.GetName].\n\nReports from some of the other attendees paint a grisly picture of the tribulations themselves, with such stand-out quotes as “wanton disregard for guest and employee alike” and “they turned my daughter into a songberry.”\n\nThrongs of people have gathered outside the factory to demand its immediate seizure."
 roe_building_events.11.a:0 "They signed the waivers!"
 roe_building_events.11.b:0 "Have [SCOPE.sCharacter('accused_scope').GetLastName] arrested."
 roe_building_events.11.c:0 "Fine them for various worker safety breaches!"
 roe_building_events.12.t:0 "The Obelisk of Knowledge"
 roe_building_events.12.d:0 "A mysterious pillar has been found deep within the ruins of [SCOPE.sState('THATS_A_PENIS').GetStateRegion.GetName]."
 roe_building_events.12.f:0 "The Obelisk, as it is described by a nearby plaque, is shaped like a peculiar upside-down letter 'Y' with two shorter, rounder, thicker ends which rest on the ground to support it.\n\nA series of magic runes used for intelligence-boosting rituals is carved onto its surface. The structure appears to be designed to channel a powerful mind-boosting ritual from these two support points, and the runes are arranged from top to bottom in such a way that someone sitting on top of it would be the sole target of the spell. A marvel of arcane engineering, especially for the time.\n\nHowever, its structure is also unconventional in... other ways."
 roe_building_events.12.a:0 "The Obelisk of Knowledge!"
 roe_building_events.13.t:0 "Gone and Forgotten"
 roe_building_events.13.d:0 "A mortuary cult has sprung up around the [SCOPE.sBuilding('ruins_building').GetName] ruins in [SCOPE.sState('ylvaris_ruins_state').GetStateRegion.GetName]."
 roe_building_events.13.f:0 "The ruins consist of a series of six obelisks in a rectangular pattern. The obelisks are not dangerous; they are memorials, carefully carved, names of the forgotten dead in at least three distinct scripts, standing in a field that no farmer will plow and no road will cross and no animal will enter after dark, not from fear but from a kind of instinctive deference.\n\nThe mortuary cult believes the obelisks may be a catalogue of the truly, completely dead; those so forgotten as to be beyond even necromantic reach. They plan to attempt to call upon the names in the epitaph as the constellation of the [concept_angel] reaches its closest point to [concept_exether]."
 roe_building_events.13.a:0 "For knowledge!"
 roe_building_events.13.b:0 "And what if they succeed?"
 aritzakarri_events.1.t:0 "Dragonborn Incursion"
 aritzakarri_events.1.d:0 "Dragonborn have been spotted in [SCOPE.sState('scout_state').GetStateRegion.GetName]."
 aritzakarri_events.1.f:0 "[SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName] has recently been abuzz as several Dragonborn were reported scouting the coast. Many citizens are terrified of the potential of [SCOPE.sCountry('dis_scope').GetName] invasion, and state orderlies have requested that the government make an official statement on the matter."
 aritzakarri_events.1.a:0 "We don't even know if they're from the Dragon Isles!"
 aritzakarri_events.1.b:0 "Ships go missing all the time."
 aritzakarri_events.2.t:0 "Smog Interrupts Flight Patterns"
 aritzakarri_events.2.d:0 "More and more avianfolk have died after passing out while flying over smoke stacks in [SCOPE.sState('industrial_state').GetStateRegion.GetName]."
 aritzakarri_events.2.f:0 "Concerns over industrialization has been brought up as deaths skyrocket from flight crashing, which has been exacerbated by the near constant blanket of smoke over [SCOPE.sState('industrial_state').GetStateRegion.GetName]. Many [SCOPE.sCulture('birb_culture').GetCustom('getPluralDemonym')] have begun to protest around the factories."
 aritzakarri_events.2.a:0 "Flying was too old-fashioned anyways."
 aritzakarri_events.2.b:0 "Restrict emissions within city limits."
 aritzakarri_events.3.t1:0 "Vitic’s Blood"
 aritzakarri_events.3.t2:0 "Ravensblood"
 aritzakarri_events.3.d1:0 "Many clergy have begun to claim that recent Godsblood discoveries belong to that of Vitic himself."
 aritzakarri_events.3.d2:0 "Many clergy have begun to claim that recent Godsblood discoveries belong to that of the Queen Raven herself."
 aritzakarri_events.3.f1:0 "The recent discovery of godsblood in [SCOPE.sState('godsblood_state').GetStateRegion.GetName] has begun to spark controversy as several shamans have claimed that this mysterious power source belonged to that of Vitic himself, spilt long ago. They have issued a formal request to the government in an attempt to limit the usage and production of this fuel within the nation."
 aritzakarri_events.3.f2:0 "The recent discovery of godsblood in [SCOPE.sState('godsblood_state').GetStateRegion.GetName] has begun to spark controversy as several shamans have claimed that this mysterious power source belonged to that of the Queen Raven herself, spilt long ago. They have issued a formal request to the government in an attempt to limit the usage and production of this fuel within the nation."
 aritzakarri_events.3.a:0 "We cannot risk abusing the body of our creator."
 aritzakarri_events.3.b:0 "Godsblood is just too useful."
 aritzakarri_events.4.t:0 "Tax Flight"
 aritzakarri_events.4.d:0 "As taxes begin to rise, avianfolk have begun to use their flight in ways never needed before."
 aritzakarri_events.4.f:0 "In response to rising taxes, many of the industrial middle class in [SCOPE.sState('flight_state').GetStateRegion.GetName] have been leaving towards the more rural areas of the nation, using their flight to make up for the travel time distance. The city governments are asking the state to do something about this before they lose any more tax income."
 aritzakarri_events.4.a:0 "This is a local problem."
 aritzakarri_events.4.b:0 "Crack down on tax evasion."
 Aritzakarri_events.4.c:0 "Deal with this quietly."
 aritzakarri_events.5.t:0 "Mysterious Runes Discovered in [SCOPE.sState('rune_state').GetStateRegion.GetName]"
 aritzakarri_events.5.d:0 "Scholars are confuddled by the unclear origin of recently uncovered runes in [SCOPE.sState('rune_state').GetStateRegion.GetName]. "
 aritzakarri_events.5.f:0 "An adventuring party exploring ancient ruins recently surfaced with several runes that appear to be of mixed origin. While the shape of the runes imply an avian origin, they are enscribed with Dwarven words of Power.\n\nTo make matters even more complicated, a historical society from [SCOPE.sCountry('bry_scope').GetName] is petitioning for access to the runes. The government has yet to make an official statement."
 aritzakarri_events.5.a:0 "Clearly of avian make."
 aritzakarri_events.5.b:0 "Hand it over to the dwarven historical society."
 locari_regional.1.t:0 "Musical Accompaniment"
 locari_regional.1.d:0 "Unrest is spreading in [SCOPE.sState('vagrant_state').GetStateRegion.GetName] from a wandering band of so-called bards."
 locari_regional.1.f:0 "The group has evaded authorities for weeks. They appear in taverns or abandoned buildings, always somehow having an audience despite no evidence of invitations being distributed. The members are exclusively Hiadud, and although they sing in their native language, anti-establishment sentiment quickly proliferates in the impacted community. It starts with protests, but in some cases escalates to armed insurrection. Local authorities have pleaded for state assistance."
 locari_regional.1.a:0 "They need to handle this themselves."
 locari_regional.1.b:0 "Find and destroy those blasted instruments!"
 locari_regional.1.c:0 "Dispatch an adventuring party to forcefully disband them."
 locari_regional.1.e:0 "Ban dancing."
 locari_regional.1.g:0 "Demand a musical duel."
 locari_regional.2.t:0 "Wildlife Seek Settlement"
 locari_regional.2.d:0 "A band of Awakened Fauna escaped from [SCOPE.sCountry('escaped_from_country').GetName] has arrived in [SCOPE.sState('refugee_state').GetStateRegion.GetName] and have requested settlement."
 locari_regional.2.f:0 "Communicating with Awakened Fauna means their thoughts are directly transmitted into our minds, which is disconcerting, but it at least made their intentions clear. They claim to be escaping from a nearby slave encampment, and their details of Naga immorality are shocking and, in some cases, sickening. No doubt the Naga are still looking for them."
 locari_regional.2.a:0 "Our hearts bleed, and our arms are open."
 locari_regional.2.b:0 "Our hearts bleed, but our doors are shut."
 locari_regional.2.c:0 "Feast with us, for you have found freedom."
 locari_regional.3.t:0 "Ruinous Plans"
 locari_regional.3.d:0 "An archeology team in [SCOPE.sState('asuroth_ruin_state').GetStateRegion.GetName] has uncovered an untouched sacrificial chamber. They wish to break the ancient protective seal and send adventurers to loot the contents within."
 locari_regional.3.f:0 "While those who map $building_asuroth_ruins$ are stranger to neither danger nor discovery, even at this early stage, most of the known consecrated sites have already been thoroughly picked through by adventurers, archeologists, or both.\n\nThus, the discovery of a sealed chamber in [SCOPE.sState('asuroth_ruin_state').GetStateRegion.GetName] is the talk of many a local relicmonger."
 locari_regional.3.a:0 "Those things are sealed for a reason."
 locari_regional.3.b:0 "Such brave archeologists!"
 locari_regional.3.c:0 "Send state wizards to oversee the removal of the seal."
 locari_regional.4.t:0 "Heady Caucophany"
 locari_regional.4.d:0 "It appears to be some sort of breeding season for the psionic locusts in [SCOPE.sState('locust_state').GetStateRegion.GetName]."
 locari_regional.4.f:0 "The sound was omnipresent and all-consuming.\n\nWhile technically classified as pests, the locusts were usually happy to avoid even sparsely-populated areas, favoring the Dreamweaver jungles instead. However, now at the peak of one their rare breeding seasons, even a seasoned psion would find them difficult to ignore."
 locari_regional.4.a:0 "You can't even plug your ears!"
 locari_regional.4.b:0 "Send some adventurers to deal with them!"
 locari_regional.4.c:0 "Ah, it sounds like home."
 locari_regional.5.t:0 "Whispers in the Wood"
 locari_regional.5.d:0 "A local adventuring company claims they have traced the source of a psionic disturbance in [SCOPE.sState('disturbance_state').GetStateRegion.GetName] to a jungle near [SCOPE.sState('disturbance_state').GetCityHubName]."
 locari_regional.5.f:0 "While psionic storms are a common and unstoppable source of woe across Locari, some disturbances have more terrestriable, and thus solvable, sources. In this case, the adventurers say the disturbance is being caused by the intense bond shared between a group of feral, psionic panthers and the local jungle flora."
 locari_regional.5.a:0 "We could not harm such divine beings!"
 locari_regional.5.b:0 "Burn it all down!"
 locari_regional.5.c:0 "Can't you deal with this more delicately?"
 locari_regional.5.e:0 "Send a trained psion to handle this."
 locari_regional.5.e2:0 "Send a trained audiologue to handle this."
 locari_regional.6.t:0 "Watering the Soil"
 locari_regional.6.d:0 "A recent downturn in dreamwood production has led several companies to petition the government; they wish for mass animal sacrifices to be performed, to 'nourish and rehabilitate' the dreamwood trees with fresh anima."
 locari_regional.6.f:0 "They trace their claim back to the ancient sacrifices of performed by the Naga, without which Weavespirit Ectoplasm would never have existed to begin with. The companies are convinced that a number of animal sacrifices could reinvigorate the groves."
 locari_regional.6.a:0 "This is barbaric."
 locari_regional.6.b:0 "Sure, go ahead."
 locari_regional.6.c:0 "Why not use the real thing?"
 locari_regional.7.t:0 "Psionic Oscillations"
 locari_regional.7.d:0 "A handful of unexplained psionic explosions are having adverse effects across the entire Dreamweaver Jungle."
 locari_regional.7.f:0 "The most recent psionic burst occurred in [SCOPE.sState('spoopy_state').GetStateRegion.GetName], near a site that was once a Naga holy place. The increase in psionic activity is affecting life all across the jungle in unexpected ways, not all of them negative."
 locari_regional.7.a:0 "An interesting development."
 locari_regional.7.b:0 "Dispatch a team to investigate."
 locari_regional.7.c:0 "We have traditional ways of handling this."
 mimic_demesne.1.t:0 "Reclamation"
 mimic_demesne.1.d:0 "After many years of hardship, we have finally bested our rivals and established dominance over the Mimic Demesne. Already hundreds of our citizens are moving to our newly established provinces, hoping to find a better life and good fortune. With a bit of help from us and our wealthier citizens, they may very well find a good life there, for now it is their home.\n\nLet us not waste time and make these provinces into our proper heartland!"
 mimic_demesne.1.f:0 "Sure, the ground and air may not have been purple where I come from, but at least I own the place where I live now.\n\n-Settler"
 mimic_demesne.1.a:0 "Let us make [ROOT.GetCountry.GetNameNoFlag] prosper."
 mimic_demesne.2.t:0 "Arming the Natives"
 mimic_demesne.2.d:0 "We have discovered that our rivals in [SCOPE.sCountry('rival_scope').GetName] have been arming the [SCOPE.sCountry('mimic_country').GetName] natives. This is likely to impede our efforts to conquer the region."
 mimic_demesne.2.f:0 "The [SCOPE.sCountry('mimic_country').GetName] natives have never welcomed our presence, but without the means to mount a truly effective resistance we have paid little heed to their objections. The addition of [SCOPE.sCountry('rival_scope').GetName] munitions into the equation comes with the frightening possibility that we must face them on equal terms."
 mimic_demesne.2.a:0 "We should de-escalate the situation."
 mimic_demesne.2.b:0 "If they want a fight, they'll get one."
 mimic_demesne.3.t:0 "A Claim in the Scar"
 mimic_demesne.3.d:0 "Long regarded as too dangerous for permanent settlement, the Shifting Scar has, it seems, produced a polity of its own. The changelings of the region have rallied around an [GetCulture('achonian').GetName] outsider as a singular ruler, presenting him to the world as proof that the Scar is neither vacant nor without claim."
 mimic_demesne.3.f:0 "#lore \"You call the Scar unlivable because it does not keep its shape. We call it home because we learned to change with it. Mimics hunt, paths shift, and the land itself drifts with slow indifference, yet we endure where your settlers vanish. We did not choose [SCOPE.sCharacter('mimic_ruler').GetFullName] because he commands us. We chose him because your courts, your maps, and your treaties refuse to hear us speak in any other way.\"#!"
 mimic_demesne.3.a:0 "Dismiss the claim."
 mimic_demesne.3.b:0 "Acknowledge their authority."
 buramog_war.1.t:0 "Failed Incursion into [SCOPE.sCountry('adversary_scope').GetName]"
 buramog_war.1.d:0 "An incursion we have launched from [SCOPE.sState('invasion_base_state').GetName] into the territory claimed by [SCOPE.sCountry('adversary_scope').GetName] has failed. The units dispatched have withdrawn, after suffering heavy losses within the Plaguewood."
 buramog_war.1.f:0 "\"We thought the woods were dead, but they were watching us—waiting. The trees groaned as if alive, and then they were upon us, moving like shadows in the murk. They struck from above, from behind, and from beneath the rotted earth itself. Captain Varro fell in the first wave, and by the time we regrouped, half the company was gone. Sir, the Plaguewood isn't just their home; it's their weapon. If we step back in there, we'll be walking to our graves.\""
 buramog_war.1.a:0 "Scorch the path behind us. Leave them nothing but ash and ruin."
 buramog_war.1.b:0 "Withdraw quietly. Let the forest swallow our shame."
 notification_plaguewood_invader_failed_attack_notification_name:0 "Failed [SCOPE.sCountry('invader_scope').GetAdjective] incursion into our territory"
 notification_plaguewood_invader_failed_attack_notification_desc:0 "A [SCOPE.sCountry('invader_scope').GetAdjective] expedition from [SCOPE.sState('invasion_base_state').GetName] has been repelled after attempting to capture one of our controlled regions."
 buramog_war.2.t:0 "Plaguewood Supply Convoy Raided"
 buramog_war.2.d:0 "A convoy dispatched to provide needed ammunition and supplies to our forces in [SCOPE.sState('invasion_base_state').GetName] has been ambushed by the forces of [SCOPE.sCountry('adversary_scope').GetName]. In the struggle, much of its cargo was lost."
 buramog_war.2.f:0 "\"The convoy was gone—shattered wagons and lifeless bodies marked its grave. Their weapons, supplies, and pride had been carried into the Plaguewood, leaving only the stench of death and the unspoken truth: this was no longer a road of men, but a hunting ground for beasts.\""
 buramog_war.2.a:0 "Confiscate what we need from the locals to make up the deficit."
 buramog_war.2.b:0 "Hold out until the next convoy arrives."
 notification_plaguewood_invader_supply_convoy_notification_name:0 "Successful raid on [SCOPE.sCountry('invader_scope').GetAdjective] convoy"
 notification_plaguewood_invader_supply_convoy_notification_desc:0 "We have successfully ambushed and scattered a [SCOPE.sCountry('invader_scope').GetAdjective] convoy intended to supply enemy forces, and seized its cargo."
 buramog_war.3.t:0 "Successful Incursion into [SCOPE.sCountry('adversary_scope').GetName]"
 buramog_war.3.d:0 "An incursion we have launched into the territory claimed by [SCOPE.sCountry('adversary_scope').GetName] has succeeded, with several villages controlled by the mountaineers burnt to the ground, and the enemy fleeing."
 buramog_war.3.f:0 "In the evening, the soldiers entered a town nestled between two mountains - humble, but prosperous, surrounded by fields of hardy crops.\n\nIn the morning, they left behind nothing but charred-black skeletons, surrounded by a desolate ring of ash."
 buramog_war.3.a:0 "Let none survive our scrutiny."
 buramog_war.3.b:0 "We have made them inclined enough to submit."
 notification_plaguewood_invader_village_burned_notification_name:0 "Villages burned by [SCOPE.sCountry('invader_scope').GetAdjective] soldiers"
 notification_plaguewood_invader_village_burned_notification_desc:0 "A series of villages in [SCOPE.sState('invasion_state').GetName] have been burned by a [SCOPE.sCountry('invader_scope').GetAdjective] incursion, with their population and livestock slaughtered."
 buramog_war.4.t:0 "[SCOPE.sCulture('defector_culture').GetName] Tribe Swears Fealty"
 buramog_war.4.d:0 "Cowed by our forces and unwilling to fight any longer, a [SCOPE.sCulture('defector_culture').GetName] tribe formerly loyal to [SCOPE.sCountry('adversary_scope').GetName] has sworn fealty to [ROOT.GetCountry.GetName]."
 buramog_war.4.f:0 "I, the below named, promise and swear according to the [SCOPE.sReligion('invader_religion').GetName] creed, that I am in awe of, and bound to [ROOT.GetCountry.GetRuler.GetHerHis] Majesty, my true and innate most gracious great sovereign [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], Ruler of [SCOPE.sStrategicRegion( 'invader_region' ).GetName], and the rightful inheritor of the Plaguewood."
 buramog_war.4.a:0 "It is a pity that they did not decide this sooner."
 buramog_war.4.b:0 "Permit their settlement in our controlled territories."
 notification_plaguewood_tribe_defection_notification_name:0 "Tribe swears fealty to [SCOPE.sCountry('invader_scope').GetName]"
 notification_plaguewood_tribe_defection_notification_desc:0 "A [SCOPE.sCulture('defector_culture').GetName] tribe has sworn fealty to the [SCOPE.sCountry('invader_scope').GetAdjective] [SCOPE.sCountry('invader_scope').GetRuler.GetPrimaryRoleTitle], eroding our control of our own lands."
 buramog_war.5.t:0 "The [SCOPE.sCharacter('milyutin_scope').GetLastName] Directive"
 buramog_war.5.d:0 "The newly-promoted Lieutenant General [SCOPE.sCharacter('milyutin_scope').GetFullName] has issued a recommendation to the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle], speaking in favor of expelling or exterminating the entire [SCOPE.sCulture('buramog_culture').GetName] population of the Plaguewood."
 buramog_war.5.f:0 "\"The execution of this plan would achieve multiple objectives: first, to cleanse the Plaguewood of its hostile inhabitants, securing the region for civilized settlement and the prosperity of our own people; second, to provide the orcs an opportunity to relocate far from these lands, granting them a future elsewhere, for as long as they remain here, they persist as a threat; and lastly, to reintroduce the necessary measures—however unpleasant—to ensure the forest itself can no longer serve as their ally or refuge.\""
 buramog_war.5.a:0 "Endorse the directive, and escalate the war."
 buramog_war.5.b:0 "This measure will make the forest forever ungovernable."
 milyutin_available_tt:0 "[SCOPE.sCharacter('milyutin_scope').GetFullName] will become a [concept_general]."
 buramog_war.6.t:0 "Discord in the Plaguewood"
 buramog_war.6.d:0 "Reports from the front lines speak of entire units faltering under the weight of disease, despair, and the prying eyes of the corrupted woods."
 buramog_war.6.f:0 "\"The cunning of [SCOPE.sCharacter('buramog_leader').GetFullName] lies not only in [SCOPE.sCharacter('buramog_leader').GetHerHis] mastery of guerilla warfare but in his shrewd application of mercy. Where fear of the Plaguewood and relentless ambushes have already frayed our soldiers' resolve, the chieftain's promises of clemency and safe passage to those who abandon their banners have proven devastating. \n\nWord has spread among the ranks that deserters are spared and allowed to leave unscathed, provided they relinquish their weapons and provisions. To counter this, I recommend swift and public punishment for deserters, along with measures to bolster morale and instill discipline among our troops.\""
 buramog_war.6.a:0 "Tighten security in the region, to avert further defections."
 buramog_war.6.b:0 "We will not build further bad will amongst the people."
 notification_plaguewood_invader_soldiers_defection_notification_name:0 "[SCOPE.sCountry('invader_scope').GetAdjective] soldiers flle the Plaguewood"
 notification_plaguewood_invader_soldiers_defection_notification_desc:0 "A group of disorganized [SCOPE.sCountry('invader_scope').GetAdjective] soldiers have left behind supplies in a panic, bolstering our struggle against the invader."
 buramog_war.7.t:0 "The Last Cry of the Dimri"
 buramog_war.7.d:0 "With the threat of [SCOPE.sCountry('invader_scope').GetAdjective] invasion growing ever more certain, the Buramog elders and warlords convene, preparing a coordinated resistance to defend their ancestral lands.."
 buramog_war.7.f:0 "Even if we lose countless warriors, the Dimri Woods will never fall to the invaders. These woods have been ours for centuries—long before men knew their name, and long after they are gone, they will still shelter our kin. If our spears splinter and our blades dull, we will fight with tooth and claw. If our fires dim and the world turns its back on us, the Dimri Woods will be our ally, shielding us with its mists and striking with its shadows. Should the enemy press us to our last breath, we will ensure our kin are spared the torment of human hands, and then we will give our lives to repay their sacrifice tenfold. Let the humans learn that the Dimri Woods are not conquered—they devour."
 buramog_war.7.a:0 "It is by our spirit that we will resist to the end."
 buramog_war.7.b:0 "We must appeal to foreign powers to assist our struggle."
 buramog_war.7.c:0 "We will forever stand alongside our Southern brothers!"
 buramog_war.8.t:0 "The Plaguewood's Call"
 buramog_war.8.d:0 "The small Buramog proto-state of [GetGlobalVariable('plaguewood_defender_var').GetCountry.GetName], which has been embroiled in a long conflict with [GetGlobalVariable('plaguewood_attacker_var').GetCountry.GetName], has sent a request for military aid to our nation. Promising recognition of their struggle could assist in weakening [GetGlobalVariable('plaguewood_attacker_var').GetCountry.GetAdjectiveNoFlag] control over the region."
 buramog_war.8.f:0 "\"For generations, the Dimri Woods have been our home, a place of strength, resilience, and untold history. We will not allow it to be swallowed by the ambition of outsiders. In this dark hour, we call upon those who value the struggle for true sovereignty, seeking their aid in our defense. With their strength beside ours, we will push back the invaders and ensure that the woods, and the spirit of our people, endure for ages to come.\""
 buramog_war.8.a:0 "We will regard this conflict with interest."
 buramog_war.8.b:0 "We have no reason to involve ourselves."
 offer_plaguewood_recognition:0 "Offer [GetGlobalVariable('plaguewood_defender_var').GetCountry.GetNameNoFormatting] Recognition"
 offer_plaguewood_recognition_desc:0 "The requests for international support that the fledgling [GetGlobalVariable('plaguewood_defender_var').GetCountry.GetAdjectiveNoFormatting] nation have sent to us represent an excellent opportunity to expand our sphere of influence in the Plaguewood."
 circassia_recognition_tt:0 "Circassia will be offered a chance to become a [Concept('concept_recognized_power','$concept_recognized_power$')], if it is able to #bold consolidate#! and #bold recover its territory#! from Russia."
 no_country_recognised_circassia_tt:0 "No other country has offered #v $CIR$#! recognition"
 buramog_war.9.t:0 "Steakamki"
 buramog_war.9.d:0 "[SCOPE.sCountry('uniter_scope').GetName] has invoked the ancient rite of Steakamki, demanding that we honor the old blood oaths and unite under [SCOPE.sCountry('uniter_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('uniter_scope').GetRuler.GetFullName]."
 buramog_war.9.f:0 "In this hour of dire need, a messenger raises a lacerated hand, calling upon Steakamki. The blood oaths of our ancestors, sworn in the heat of battle and bound by the weight of honor, echo through the Dimri Woods.\n\nToday, all past grievances are set aside, and the old wounds of our tribes are healed by the sacred pact. We, the Buramog Orcs, unite once more, for the honor of our people and the survival of our lands. This solemn rite calls forth the strength of every tribe, forging a bond stronger than blood itself, as we stand together against the invader. Let no foe break our unity, for in the shadow of annihilation, we are unyielding."
 buramog_war.9.a:0 "We will be honored to answer the call."
 buramog_war.9.b:0 "We will not doom our future over old promises."
 buramog_war.10.t:0 "The Miracle Expedition"
 buramog_war.10.d:0 "A detachment of largely [SCOPE.sCulture('dwarf_culture').GetName] and [SCOPE.sCulture('softpaw_culture').GetName] volunteers from [SCOPE.sCountry('darvak_scope').GetName] have traveled to [ROOT.GetCountry.GetName] aboard the airship Miracle, seeking to aid in our struggle as volunteer soldiers against the [SCOPE.sCountry('invader_scope').GetAdjective] invaders."
 buramog_war.10.f:0 "\"In a dwarf's life, there are moments of unshakable conviction, when a seemingly impossible desire begins to feel inevitable. I felt this deeply. From my forge in Mount Yelfis, I had long admired the resilience of the Buramog Orcs. Tales of their indomitable spirit, standing firm in the cursed depths of the Plaguewood against overwhelming odds, struck a chord within me. I was then only just past my journeyman years, filled with a fire for purpose and justice.\n\nThe stories of their grit and unyielding defiance in the face of insurmountable odds stirred something ancient in me. I saw in them not savagery, but strength, and a resolve that should not be left to stand alone.\""
 buramog_war.10.a:0 "Grant their leader a role as commander, and send him to the front."
 buramog_war.10.b:0 "We would be well served by training in [SCOPE.sCountry('darvak_scope').GetAdjective] tactics."
 buramog_war.11.t:0 "The Plaguewood Stirs"
 buramog_war.11.d:0 "The orcish clans of [SCOPE.sCountry('neskmes_scope').GetName] and [SCOPE.sCountry('yevmehol_scope').GetName] are sending raiding parties across our border."
 buramog_war.11.f:0 "Smoke darkens the skies over the frontier as the orcs launch devastating raids with a ferocity not seen since the [concept_buramog_wars]. Villages crumble to ash, their inhabitants slaughtered or scattered. For decades, the clans had faded into disunity and obscurity, yet their strikes now show an unsettling coordination.\n\nRumors abound—of a new warlord uniting the orcs, of ancient grudges reignited, or of some shadowy power fueling their wrath. Whatever the truth, the borderlands are in chaos, and the realm must reckon with a threat it thought long contained."
 buramog_war.11.a:0 "The borderlands cry for aid."
 muhammad_amin_ruler_tt:0 "#v Muhammad Amin Asiyalev#! will become our [concept_ruler]"
 controlled_heptadrones_tt:0 "Fill the progress bar to take control of the heptadrones"
 buramog_war_end.1.t:0 "The Fall of Neskmes"
 buramog_war_end.1.d:0 "With the conclusion of our campaign in [SCOPE.sState('buramog_state').GetStateRegion.GetName], the entirety of the former Buramog territories have fallen under foreign control. The land is now available for settlement by [SCOPE.sCulture('invader_culture').GetName] settlers."
 buramog_war_end.1.f:0 "\"This year, a deed has been accomplished that will be remembered for generations: the Plaguewood, once the stronghold of the Buramog Orcs, has fallen under [ROOT.GetCountry.GetAdjectiveNoFlag] dominion. Efforts are now underway to pacify the region and prepare it for [SCOPE.sCulture('invader_culture').GetName] settlement, establishing a new foothold amidst the remnants of orcish resistance.\""
 buramog_war_end.1.a:0 "The forest will never heal while the orcs remain."
 buramog_war_end.1.b:0 "A step closer to peace in the Plaguewood."
 buramog_war_end.2.t:0 "Hah Buk"
 buramog_war_end.2.d:0 "The inviolable sovereignty of [ROOT.GetCountry.GetName] in the eyes of the world has been assured by our victory."
 buramog_war_end.2.f:0 "\"We have stood united under the shadowed boughs of the Dimri Woods, our hearts ablaze with the fire of our ancestors. Against the tide of invaders, we fought with tooth and claw, spear and resolve, and now we return to our homes victorious. The Plaguewood endures, unbroken.\n\nFinally we know #bold Hah Buk#!, we know #bold Peace#!.\""
 buramog_war_end.2.a:0 "Our strength has always come from our people, and always will."
 buramog_war_end.2.b:0 "A modern [ROOT.GetCountry.GetName] will never again be threatened!"
 buramog_war_end.2.c:0 "The time has come for our benefactors to make good on their promise."
 buramog_war_end.3.t:0 "Clan's End"
 buramog_war_end.3.d:0 "With the occupation of the Plaguewood and the surrender or defection of many of the former Buramog chieftains, the warchief of Yevmehol has finally surrendered to the [ROOT.GetCountry.GetAdjective] army."
 buramog_war_end.3.f:0 "\"The world knows of your courage and the legacy of your deeds, a glory that will endure through the ages. If you, bowing to the weight of fate, step forward today to parley with the commander of the invaders and accept their terms, you will spare countless lives—those who still follow you with loyalty and hope. Seal your legacy not only with valor but with wisdom and mercy, and your surrender will ensure a future for your kin and safeguard the remnants of your people's strength.\""
 buramog_war_end.3.a:0 "There will be no peace whilst the Warchief is still revered."
 buramog_war_end.3.b:0 "Begin the process of pacifying the Plaguewood."
 buramog_war_end.4.t:0 "Forest's Wrath"
 buramog_war_end.4.d:0 "Our military campaign in the Plaguewood has proven disastrous."
 buramog_war_end.4.f:0 "Our campaign in the Plaguewood has ended in utter ruin. The orcs have proven relentless, their knowledge of the land and ferocity unmatched. The forest itself turned against us, claiming more lives than the enemy's blades. What forces remain are broken and scattered, retreating in disgrace from the shadowed boughs. Our banners lie trampled in the mud, and the name of our armies is now spoken with scorn. We sought to conquer the Dimri, but it is we who have been defeated, our reputation shattered like brittle steel."
 buramog_war_end.4.a:0 "The Plaguewood swallows our ambitions."
 buramog_war_end.5.t:0 "The Plaguewood Tamed"
 buramog_war_end.5.d:0 "Orcish raids have become rare, and hostilities with the Plaguewood have died down."
 buramog_war_end.5.f:0 "Our campaign in the Plaguewood has ended in total triumph. The orcs have been routed, their strongholds reduced to ash, and their forces scattered to the winds. The once-feared Plagueood now lies under our dominion, tamed and secured through unwavering resolve. Our banners stand tall where their defiance once burned, a testament to the might and unity of our armies. The name of our victory will echo through the ages, a shining example of our strength and the justice of our cause."
 buramog_war_end.5.a:0 "We have proven our mettle."
 buramog_war_end.6.t:0 "Standstill"
 buramog_war_end.6.d:0 "Orcish raids have become rare, and hostilities with the Plaguewood have died down."
 buramog_war_end.6.f:0 "The fires of conflict have dimmed, and the raids have grown sparse, their echoes fading into the depths of the Dimri Woods. Yet, no true peace has been forged, only a fragile stillness hangs over the land. The humans hold their settlements at the edges of the Plaguewood, ever watchful, while the orcs retreat into the shadows, their eyes still burning with defiance. It is not victory, nor defeat, but an uneasy truce, where every silence feels like the calm before the storm."
 buramog_war_end.6.a:0 "We shall remain vigilant."
 plaguewood_expulsions.1.t:0 "Across the Sea"
 plaguewood_expulsions.1.d:0 "Waves of chartered refugee vessels and merchant craft holding thousands of [SCOPE.sCulture('buramog_culture_scope').GetName] deportees have departed across the Sea towards their destination. Outbreaks of disease and malnourishment have decimated the crowds."
 plaguewood_expulsions.1.f:0 "On the shore, thousands of people crowded together to share in the bare minimum of shelter and food. All of them were pale and hungry. The marks of pox and typhus wracked many of them. Dozens lay dying, on the brink of joining the piles of corpses which had been placed wherever there was space.\n\nOff the coast, the decks of the transport vessels overflowed with the dying and already dead."
 plaguewood_expulsions.1.a:0 "Another wave will soon replace them."
 plaguewood_expulsions.1.b:0 "Permit the distribution of foreign aid."
 plaguewood_expulsions.1.c:0 "We have other things to focus on."
 plaguewood_expulsions.2.t:0 "[SCOPE.sCountry('invader_scope').GetName] Requests Migration Treaty"
 plaguewood_expulsions.2.d:0 "[SCOPE.sCountry('invader_scope').GetAdjective] officials have approached the government, requesting permission to deport up to fifty thousand [SCOPE.sCulture('buramog_culture_scope').GetName] people to our territory. Observers of [SCOPE.sCountry('invader_scope').GetAdjectiveNoFormatting] conduct in the Caucasus warn that the deportations may be much greater in scale."
 plaguewood_expulsions.2.f:0 "\"The proposed commission provides for the transportation of up to ten thousand families. Transportation at five roubles per head, two to be paid by the migrants themselves, with incentives to private actors.\" That was the Russian line. The official had his doubts, but he could not speak them. There was a war on to the North - not a formal one, but a war nonetheless. A far greater exodus was a certainty, and its conditions were certain to be much less orderly than was accounted for."
 plaguewood_expulsions.2.a:0 "They would do well to populate our countryside."
 plaguewood_expulsions.2.b:0 "This treaty threatens to be destabilizing."
 plaguewood_expulsions.3.t:0 "An Ocean of Blood"
 plaguewood_expulsions.3.d:0 "The flow of [SCOPE.sCulture('buramog_culture_scope').GetName] deportees arriving on our Northern shore has spiraled into a humanitarian catastrophe. Local authorities have become overwhelmed by the number of refugees, many of whom are starving and diseased."
 plaguewood_expulsions.3.f:0 "Dense masses of ragged men, women, and children covered the seashore. All looked wan and hungry. Many were all but naked. Several lay dying. Off the coast, more vessels approached, transformed into floating graveyards by the disease which had ravaged their human cargo. Occasionally, more bodies washed up ashore, rendered unrecognizable by the attention of crabs and seagulls. Some of the bodies had their hands tied."
 plaguewood_expulsions.3.a:0 "Demand that the [SCOPE.sCountry('invader_scope').GetAdjective] government cease these atrocities."
 plaguewood_expulsions.3.b:0 "There is nothing we can do."
 notification_plaguewood_buramog_refugees_arrived_name:0 "Circassian Refugees Arrive"
 notification_plaguewood_buramog_refugees_arrived_desc:0 "Ships full of [SCOPE.sCulture('buramog_culture_scope').GetName] refugees deported from [SCOPE.sCountry('russia_scope').GetName] have landed on the shores of [SCOPE.sState('expulsion_destination_state').GetName]. Many have already died of disease en route."
 notification_plaguewood_buramog_refugees_arrived_tooltip:0 "#header $notification_plaguewood_buramog_refugees_arrived_name$#!\n$TOOLTIP_DELIMITER$\n$notification_plaguewood_buramog_refugees_arrived_desc$"
 notification_buramog_deported_message_name:0 "Circassian [Concept('concept_pop', '$concept_pops$')] Expelled"
 notification_buramog_deported_message_desc:0 "Ships full of expelled [SCOPE.sCulture('buramog_culture_scope').GetName] people have departed, bound for [SCOPE.sState('expulsion_destination_state').GetName]. Many have already died of disease on the shores of the Black Sea."
 notification_buramog_deported_message_tooltip:0 "#header $notification_plaguewood_buramog_refugees_arrived_name$#!\n$TOOLTIP_DELIMITER$\n$notification_plaguewood_buramog_refugees_arrived_desc$"
 notification_plaguewood_protest_notification_name:0 "[SCOPE.sCountry('root_scope').GetName] Protests Expulsions"
 notification_plaguewood_protest_notification_desc:0 "[SCOPE.sCountry('root_scope').GetName] has issued a formal diplomatic protest condemning the treatment of [SCOPE.sCulture('buramog_culture_scope').GetName] deportees, and calling for an end to the expulsions."
 notification_plaguewood_protest_notification_tooltip:0 "#header $notification_plaguewood_buramog_refugees_arrived_name$#!\n$TOOLTIP_DELIMITER$\n$notification_plaguewood_buramog_refugees_arrived_desc$"
 invader_offer_neskmes_recognition:0 "Offer Neskmes Recognition"
 invader_offer_neskmes_recognition_desc:0 "The requests for international support that the fledgling Buramog nation have sent to us represent an excellent opportunity to expand our sphere of influence in the Plaguewood."
 neskmes_recognition_tt:0 "Neskmes will be offered a chance to become a [Concept('concept_recognized_power','$concept_recognized_power$')], if it is able to #bold consolidate#! and #bold recover its territory#! from Russia."
 no_country_recognised_neskmes_tt:0 "No other country has offered #v $BDB$#! recognition"
 retainer_situations.1.t:0 "Thieves in the Night"
 retainer_situations.1.d:0 "Organized crime is crippling [SCOPE.sState('thieves_guild_state').GetName]"
 retainer_situations.1.f:0 "In the alleys and undercrofts of [SCOPE.sState('thieves_guild_state').GetName], a thieves' guild has taken root, exploiting the weaknesses of an underfunded and corrupt administration. The guild's influence has grown to alarming proportions, with local merchants forced to pay protection fees, cargo vanishing from warehouses, and citizens whispering of a rising criminal underworld that the authorities dare not confront."
 retainer_situations.1.a:0 "This city belongs to us, not to shadows."
 retainer_situations.2.t:0 "Shadows Scatter"
 retainer_situations.2.d:0 "The wave of Organized crime in [ROOT.GetCountry.GetName] has ended"
 retainer_situations.2.f:0 "After weeks of relentless pressure, the thieves' guild in [ROOT.GetCountry.GetNameNoFormatting] has been dismantled. The ringleaders have been apprehended or slain, their hideouts ransacked, and their ill-gotten wealth confiscated. Without their leadership, the remaining members have either fled the state or faded back into obscurity.\n\nMerchants cautiously reopen, wary of lingering threats, and rumors abound that some former guild members may attempt to reorganize elsewhere. For now, however, order has been restored, and the citizens hail your decisive actions."
 retainer_situations.2.a:0 "Leave no stone unturned—hunt down the stragglers."
 retainer_situations.3.t:0 "Strike at the Heart"
 retainer_situations.3.d:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFullName] and their party seek your approval and resources to dismantle the thieves' guild in [SCOPE.sState('thieves_guild_state').GetName]"
 retainer_situations.3.f:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFullName] and their trusted adventuring party have uncovered the location of the thieves' guild's hideout—a sprawling maze of secret tunnels and fortified chambers hidden beneath [SCOPE.sState('thieves_guild_state').GetName]. The guild's leader, is said to rule from the depths of this lair, guarded by loyal enforcers and deadly traps.\n\nThe adventurers are eager to take on the mission, but they seek your blessing and support before proceeding. This is a dangerous gamble; success could cripple the guild and restore order, but failure might embolden the criminals and lead to heavy losses. The final decision rests with you."
 retainer_situations.3.a:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFirstName] never dissapoints. There's no one better for this."
 retainer_situations.3.b:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFirstName] is reliable enough, lets try it."
 retainer_situations.3.c:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFirstName] is a gamble, but let's throw them at it."
 retainer_situations.3.g:0 "On second thought, lets reconsider"
 retainer_situations.4.t:0 "Cat and Mouse"
 retainer_situations.4.d:0 "A planned raid is set to dismantle the thieves' guild's leadership, but its success hinges on precise execution and careful preparation."
 retainer_situations.4.f:0 "A well-coordinated raid has been planned to strike at the heart of the thieves' guild. With intelligence gathered and surveillance in place, law enforcement is poised to dismantle the guild's leadership in one swift blow. The operation is set to target the key figures of the guild, severely crippling its influence in the city. However, the risk is high—success will deal a major blow to the criminal underworld, but failure could lead to chaos and even retaliation from the guild."
 retainer_situations.4.a:0 "Let's be careful, better to take our time."
 retainer_situations.4.b:0 "We strike hard and fast, no room for error."
 retainer_situations.4.c:0 "On second thought, lets reconsider"
 retainer_situations.5.t:0 "Guildmaster in Chains"
 retainer_situations.5.d:0 "The leadership of the #bold Thieves' Guild #! has been apprehended"
 retainer_situations.5.f:0 "The capture of the notorious guildmaster marks the beginning of the end for [SCOPE.sState('thieves_guild_state').GetName]'s criminal underworld. Whether it was the authorities or a band of brave adventurers who brought them down, the guild's influence crumbles without their leader at the helm. The streets once ruled by shadow now face the inevitable unraveling of the guild's network."
 retainer_situations.5.a:0 "Let's lock them away for good"
 retainer_situations.6.t:0 "Lost in the Dark"
 retainer_situations.6.d:0 "[SCOPE.sCharacter('selected_retainer_scope').GetFullName] was killed during his mission to dismantle the #bold Thieves' Guild#!"
 retainer_situations.6.f:0 "Despite their courage and skill, [SCOPE.sCharacter('selected_retainer_scope').GetFirstName]'s mission to dismantle the thieves' guild has ended in tragedy. In a desperate confrontation with the guild's remaining forces, they were overwhelmed and met their end. The news of their death spreads quickly, leaving the state with a bitter reminder of the dangers of the criminal underworld. While the guild's downfall is still inevitable, the loss of such a valued retainer is a heavy blow."
 retainer_situations.6.a:0 "Drat."
 retainer_situations.7.t:0 "Fumbled Justice"
 retainer_situations.7.d:0 "The Police Operation to dismantle the #bold Thieves' Guild#! has failed."
 retainer_situations.7.f:0 "The planned raid on the thieves' guild's leadership has ended in failure. Despite the careful preparations, the operation was compromised, resulting in heavy losses for the police and the escape of key guild leaders. The city is now rife with rumors of guild retaliation, and the public's faith in law enforcement has been shaken. The guild remains a dangerous force, and its influence over the city may have only grown stronger in the wake of this disastrous failure."
 retainer_situations.7.a:0 "Drat."
 blue_riband.2.t:0 "The Azure Pennant"
 blue_riband.2.d:0 "The term is brought up by the increasing competition for intercontinental maritime travel."
 blue_riband.2.f:0 "At the late 12th century, the rise of artifact and the intercontinental trade made the development of secure links between continents imperative. Dumonia, for example, needed stable maritime routes to connect different parts of its empire.\n\n It was the advent of the steamship, with its independence from wind power, which offered the possibility of regular, scheduled intercontinental crossings, in periods of two to three weeks, that opened a new era of intercontinental travel and competition."
 blue_riband.2.a:0 "Why does it matter?"
 blue_riband.2.b:0 "[concept_blue_riband] would soon be mine."
 blue_riband.2.g:0 "Tell me how [concept_blue_riband] points are calculated."
 azure_pennant_default_ship:0 "Zephyr"
 interested_in_blue_riband_tt:0 "Flavored [concept_blue_riband] events will also appear"
 uninterested_in_blue_riband_tt:0 "Prevent flavored [concept_blue_riband] events from appearing, core events still show up."
 blue_riband.3.t:0 "A New Ocean Liner is Built"
 blue_riband.3.e:0 "A [ROOT.GetCountry.GetAdjective] ship now holds the [concept_blue_riband]!"
 blue_riband.3.d:0 "Awaiting report from its maidan voyage."
 blue_riband.3.h:0 "The waves have borne witness to an achievement of unparalleled maritime prowess! Our proud vessel, #bold #white [GetPlayer.GetCustom('azure_pennant_ship_name')]#!#!, has shattered records and claimed the [concept_blue_riband], proving beyond doubt that our navy and shipwrights stand unrivaled upon the high seas.\n\nAs banners are raised and crowds gather in harbors across the land, the name of [ROOT.GetCountry.GetNameNoFlag] is etched into maritime history. Merchants rush to secure passage on our swift ships, and rivals whisper enviously of our mastery over the wave.\n\nThis is more than a mere prize—it is a testament to our dominance over the ocean’s boundless expanse. May the tides forever favor us!"
 blue_riband.3.f:0 "Steam engine allowed ships to provide regular service without the use of sail. And over time, the paddle wheel, impractical on the high seas, was abandoned in favour of the propeller."
 blue_riband.3.b:0 "It is only a ship."
 blue_riband.3.c:0 "May the tides forever favor us!"
 blue_riband.11.t:0 "New [concept_blue_riband] Holder"
 blue_riband.11.d:0 "A competitior claims [concept_blue_riband]."
 blue_riband.11.f:0 "A new ocean liner registered under [GetGlobalVariable('blue_riband_holder').GetCountry.GetName] achieves new high speed with its innovative design and modern machinery."
 blue_riband.11.a:0 "We will do better next time."
 blue_riband.11.b:0 "Did our shipping company ask for subsidy? Grant them."
 blue_riband.41.t:0 "A Potential Cruising Destination"
 blue_riband.41.d:0 "Business interests are looking to establish [SCOPE.sState('blue_riband_cruising_dest').GetName] as a cruising hub."
 blue_riband.41.f:0 "A cruise represents life in the slow lane, sailing along at a gentle pace, soaking up the scenery, with plentiful opportunities to explore towns and cities en route. It is a supremely calming experience, an antidote to the pressures of life in a fast-paced world, in surroundings that are comfortable without being fussy or pretentious, with good food and enjoyable company. \n --[SCOPE.sCompany('blue_riband_cruising_company').GetName] Pamphlet Advertisement"
 blue_riband.41.a:0 "Approved."
 blue_riband.41.b:0 "No cruise allowed, at least not here."
 blue_riband.42.t:0 "The Jounery of Azure: Humble Beginning"
 blue_riband.42.d:0 "[SCOPE.gsInterestGroup('industrialists_ig').GetName] advice we fund the opening of a new streamer shipyard in [SCOPE.sState('blue_riband_paid_shipyard1_state').GetName]."
 blue_riband.42.f:0 "Many shipbuilders know for long how to build a clipper. Recently they learn how to make it faster by adding engines. Build a streamer with iron or steel hull, however, is a new feat. Further more, potential clientele do not particular trust these new ships.\n\n Many doubts and worries can go away, the shipbuilders suggest, if the government is willing to award these steamers for mailing contracts."
 blue_riband.42.a:0 "And that is how [SCOPE.gsInterestGroup('industrialists_ig').GetName] get their first gold."
 blue_riband.42.b:0 "No, we have enough shipyards for now."
 blue_riband.43.t:0 "The Jounery of Azure: Mutually Funded"
 blue_riband.43.d:0 "[SCOPE.gsInterestGroup('industrialists_ig').GetName] have pooled a fund to expand shipyards in [SCOPE.sState('blue_riband_paid_shipyard2_state').GetName] and ask for government participation."
 blue_riband.43.f:0 "The investors certainly have other plan for the fund in case this lobbying doesn't go through. However, government approval and clearance would make investing in [SCOPE.sState('blue_riband_paid_shipyard2_state').GetName] promising and less cumbersome. A pursuit to claim the [concept_blue_riband], might be the right argument."
 blue_riband.43.a:0 "Show our gesture and good will."
 blue_riband.43.b:0 "Nope, not a ship in this pool."
 blue_riband.44.t:0 "The Jounery of Azure: Concrete Shipyard"
 blue_riband.44.d:0 "[SCOPE.gsInterestGroup('industrialists_ig').GetName] petition the administrators of [SCOPE.sState('blue_riband_paid_shipyard3_state').GetName] to update the facility to fit bigger ships."
 blue_riband.44.f:0 "\"The carrying capacity of a ship increases as the cube of its dimensions, whilst the water resistance only increases as the square of its dimensions. This means that large ships are more fuel-efficient, something very important for long voyages.\" The engineer instinctively goes into lecture mode.\n\n \"So bigger ships make more profit?\" The entrepreneur shows no concern about the lecture.\n\n \"Yes, but I'm afraid the port of [SCOPE.sState('blue_riband_paid_shipyard3_state').GetName] cannot fit the vessel.\"\n\n \"Make the ports bigger then, what was your argument again?\""
 blue_riband.44.a:0 "I like even bigger ships."
 blue_riband.44.b:0 "Is there a discrete shipyard?."
 blue_riband.45.t:0 "The Jounery of Azure: Support Industry."
 blue_riband.45.d:0 "[SCOPE.sCompany('blue_riband_paid_shipyard4_company').GetName] looks for a grant in [SCOPE.sState('blue_riband_paid_shipyard4_state').GetName] to update its machinery."
 blue_riband.45.f:0 "\"You sure that you don't want another set of drydock?\"Said the official, confused.\n\n\"I can explain. It's the idea from public relationship. This will make both of us look better.\" The [SCOPE.sCompany('blue_riband_paid_shipyard4_company').GetName] representative doesn't sound too convincing.\n\n\"And then you're going to log the grant into general fund?\"\n\n\"It's a good idea. However here is the catch, We don't do that not because we never wish so, but we haven't figure out a way to do so.\""
 blue_riband.45.a:0 "Take my money for this ship--- you want engine?"
 blue_riband.45.b:0 "That is overreaching, go back building shipyards."
 blue_riband.61.t:0 "The Shinest Azure"
 blue_riband.61.d:0 "Our shipbuilding expertise improves intercontinental pop moblity."
 blue_riband.61.f:0 "Does the fastest ocean liner bring the largest intercontinental pop moblity? Not necessary true. But maritime tonnage is postively correlated to the size of intercontinental migration, even though most of the tonnage are not tied to port."
 blue_riband.61.a:0 "The tides bring their embrace to [SCOPE.sState('blue_riband_port_state').GetName]."
 blue_riband.61.b:0 "The tides is reluctant to arrive at the shore of [SCOPE.sState('blue_riband_port_state').GetName]."
 blue_riband.62.t:0 "Brilliance of The Azure"
 blue_riband.62.d:0 "Our advantage in shipbuilding give us an edge in colonizing [SCOPE.sState('blue_riband_port_colony').GetName]."
 blue_riband.62.f:0 "\"Remember, our ships can be anywhere and everywhere of the ocean. We will hold the truth in the range of naval gun.\"\n\n\"What if the enemy is far from the coastline?\"\n\n\"We will send the army onto the shoreline, and they will figure out on their own.\"\n\n\"What if they don't?\"\n\n\"Not our problems, soldier.\""
 blue_riband.62.a:0 "The tides arrive and the natives subjugated."
 blue_riband.62.b:0 "The tides yarn for a different target."
 blue_riband.63.t:0 "A Potential Cruising Destination"
 blue_riband.63.d:0 "Business interests are looking to establish [SCOPE.sState('blue_riband_cruising_dest2').GetName] as a cruising hub."
 blue_riband.63.f:0 "A cruise represents life in the slow lane, sailing along at a gentle pace, soaking up the scenery, with plentiful opportunities to explore towns and cities en route. It is a supremely calming experience, an antidote to the pressures of life in a fast-paced world, in surroundings that are comfortable without being fussy or pretentious, with good food and enjoyable company. \n --[SCOPE.sCompany('blue_riband_cruising_company2').GetName] Pamphlet Advertisement"
 blue_riband.63.a:0 "Approved."
 blue_riband.63.b:0 "No cruise allowed, at least not here."
 blue_riband.80.t:0 "Azure Pennant Score Calculation: Static Base Score"
 blue_riband.80.d:0 "Base score represents shipbuilding expertise"
 blue_riband.80.f:0 "Base score: 25.\n Add 1 for each shipyard.\n Add 3 for having at least 50 percent literacy.\n Add 2 for being leading producer of steamers."
 blue_riband.80.a:0 "More on base score."
 blue_riband.81.t:0 "Azure Pennant Score Calculation: Varied Base Score"
 blue_riband.81.d:0 "Varied base score are those that affected by technologies"
 blue_riband.81.f:0 "Moreover, Add 3 for having at least a level 3 shipyard with 50 percent or more occupancy, another 3 if is at least level 5, and with concrete dockyard, another 3 if is at least level 8. \n Add 3 for having any shipyard company. Each of mutual funds,investment banks,corporate management, and macroeconomics improves the value of having a shipyard company by 1. \n Add another 3 if having any shipping company producing prestige streamer."
 blue_riband.81.a:0 "And then multiply base score by..."
 blue_riband.82.t:0 "Azure Pennant Score Calculation: Tech Multiplier"
 blue_riband.82.d:0 "Tech multiplier represents development in ship design"
 blue_riband.82.f:0 "Base multiplier: 10.\n Add 90 with gantry cranes.\n Add 15 with floating harbor.\nAdd 10 each with rotary valve engine and steel railway cars.\n Add 5 with self propelled torpedoes.\n Add 25 with combustion engine.\n Add 30 with compression ignition.\n Add 55 with arc welding."
 blue_riband.82.a:0 "Get me a calculator, now."
 blue_riband.90.t:0 "End of [concept_blue_riband]."
 blue_riband.90.d:0 "The popularization of airliners obsolete [concept_blue_riband]."
 blue_riband.90.f:0 "Airliners, being faster than ocean liners, replace the role of the latter in intercontinental passenger transport. The significance of [concept_blue_riband] dwindles as the result."
 blue_riband.90.a:0 "And we don't need riband for airliners."
 shivathi_satrapy.1.t:0 "Imperial Commendation"
 shivathi_satrapy.1.d:0 "An emissary from the [ROOT.GetCountry.GetOverlord.GetName] has arrived, commending our efforts."
 shivathi_satrapy.1.f:0 "A fleet bearing the banners of the Tauudhra Empire arrives in [ROOT.GetCountry.GetAdjectiveNoFlag]'s harbor, not with reprimands, but with tribute. Imperial envoys disembark, their tone filled with rare admiration. The colony has exceeded expectations—trade flows richly, influence expands steadily, and the northern seas begin to feel the presence of the southern elves once more.\n\n#lore 'The Admiralty speaks highly of your efforts,'#! the missive declares. #lore 'Lirionthal stands as proof that Tauudhra's legacy is not confined to the south. Continue on this course, and greater honors shall follow.'#!"
 shivathi_satrapy.1.a:0 "We thank the #bold Empress#! for these gifts."
 shivathi_satrapy.1.b:0 "We serve the Empire, and we will continue to do so."
 shivathi_satrapy.2.t:0 "Imperial Displeasure"
 shivathi_satrapy.2.f:0 "The halls of [ROOT.GetCountry.GetAdjectiveNoFlag]'s colonial administration grow tense as the latest missive from the Tauudhra Empire arrives, sealed with the insignia of the Imperial Admiralty. The tone is unmistakable—disappointment, frustration, and veiled threats wrapped in diplomatic formality.\n\n#lore 'Has Lirionthal forgotten its purpose?'#! the letter demands. #lore 'The Empire entrusted you with a grand mission—to establish our dominion in the north, to command its trade, and to bring glory to our name. And yet, what do we see? Stagnation. Hesitation. Failure.'#!\n\nWhispers of discontent spread among Lirionthal's elite. Some call for urgent reforms, fearing direct intervention. Others bristle at the Empire's demands, murmuring that perhaps the colony's fate should not be bound to the decrees of distant rulers. "
 shivathi_satrapy.2.d:0 "An emissary from the [ROOT.GetCountry.GetOverlord.GetName] has arrived, expressing displeasure over our efforts."
 shivathi_satrapy.2.a:0 "We will redouble our efforts."
 shivathi_satrapy.2.b:0 "The Empire asks too much..."
 kinfold.1.t:0 "Debts of the Proud"
 kinfold.1.d:0 "[SCOPE.sCountry('kinfold_nation').GetName] has defaulted on a substantial loan and seeks imperial aid to avoid public disgrace and loss of standing."
 kinfold.1.f:0 "Among the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], pride and honor are as valuable as gold, and far more fragile. Clan [SCOPE.sCharacter('kinfold_leader').GetLastName], long regarded as a pillar of regional governance, has fallen into severe financial trouble. A loan taken to expand their holdings and reinforce their status has come due, and they cannot repay it.\n\nCreditors whisper of repossession, and rival families prepare to move against them. With their legacy at risk, the clan turns to the Empire for quiet assistance. Though costly, such an intervention presents a rare opportunity. By rescuing a faltering banner, the central government may tighten its grip on the region and remind the clans where true authority lies."
 kinfold.1.a:0 "We can redistribute some funds to clan [SCOPE.sCharacter('kinfold_leader').GetLastName]"
 kinfold.1.b:0 "We cannot spare anything."
 kinfold.2.t:0 "A Ray of Hope"
 kinfold.2.d:0 "A bad harvest has thrown [SCOPE.sCountry('kinfold_nation').GetName] into turmoil. The [GetReligion('cult_of_the_sun').GetName] Cult offers aid, but only in exchange for the right to proselytize in clan holdings."
 kinfold.2.f:0 "A poor harvest has plunged [SCOPE.sCountry('kinfold_nation').GetNameNoFlag] into chaos. Crops fail, famine sets in, and the people are restless. Clan [SCOPE.sCharacter('kinfold_leader').GetLastName], already struggling to maintain its authority, finds itself on the edge of open revolt. Amid this turmoil, [GetReligion('cult_of_the_sun').GetName] emissaries arrive, offering to help.\n\nThey offer grain for the starving, gold for the needy, and promises of peace for the discontented. But their aid is not without conditions. In exchange, they demand the right to spread their faith freely within the clan's territories."
 kinfold.2.a:0 "We will redouble our efforts."
 kinfold.2.b:0 "The Empire asks too much..."
 kinfold.3.t:0 "Kin Over Crown"
 kinfold.3.d:0 "Imperial agents in [SCOPE.sState('peasant_state').GetName] have been turned away by [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] leaders, who reject outside authority and accuse the court of breaching ancient compacts for profit."
 kinfold.3.f:0 "\"This land is ours by oath and by blood. We owe nothing to the clerks of [ROOT.GetCountry.GetCapital.GetCityHubName], and we will not see our halls tallied like granaries. If the crown wishes coin, let it ask the Kinsfold — not send strangers with ledgers and threats.\""
 kinfold.3.a:0 "Let them keep their titles, as long as their dues are paid."
 kinfold.3.b:0 "[SCOPE.sCharacter('peasant_smashing_general').GetFullName] will remind them who rules this land."
 kinfold.3.c:0 "Let them keep their old ways — for now."
 peasant_unrest:0 "Clans Resist Centralization"
 expanding_holdings:0 "Upheld Tradition"
 kinfold.4.t:0 "A Realm United"
 kinfold.4.f:0 "For decades after [concept_nightfall], the imperial throne struggled to reclaim its authority, with each clan holding onto its own traditions, lands, and power. But now, the sun sets on the old ways. The once-divided territories, steeped in their own customs and ancient histories, are now bound under a single, unified imperial banner. The [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant], proud and powerful, must now answer to the imperial throne.\n\nThe old ways, may not vanish overnight, but the empire stands on the precipice of a new era. Under [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName], imperial policies have subdued the power of the clans and forged a shared national identity for Dumonia."
 kinfold.4.d:0 "For the first time since the [concept_nightfall], the clans of the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetNameWithCountryVariant] have been brought firmly under imperial control. The diverse peoples of Dumonia are united under one imperial banner."
 kinfold.4.a:0 "Power now rests with the Kiarr."
 kinfold.4.b:0 "The Empire Stands United."
 kamiran.1.t:0 "Missionary Works in [SCOPE.sState('missionary_state').GetName]"
 kamiran.1.d:0 "Foreign missionaries based in [SCOPE.sCountry('treaty_port_owner').GetAdjective] [SCOPE.sState('treaty_port_scope').GetName] have asked for permission to build schools and hospitals in [SCOPE.sState('missionary_state').GetName]. They will surely use these as platforms to spread their faith."
 kamiran.1.f:0 "\"What better way to spread the word of the Arbiter than through healing? Those who find their way to our hospital will find their way to Kamiros.\""
 kamiran.1.a:0 "Allow them to build schools and hospitals"
 kamiran.1.b:0 "We do not want their heretic faith."
 missionary_schools_hospitals:0 "Missionary Schools and Hospitals"
 kamiran.2.t:0 "The Kamiran Cult"
 kamiran.2.d:0 "A new [GetReligion('cult_of_the_sun').GetName] congregation has taken root in [SCOPE.sState('cult_state').GetName], preaching strict doctrine and unwavering devotion to the Radiant Lord."
 kamiran.2.f:0 "A [GetReligion('cult_of_the_sun').GetName] sect has established itself in [SCOPE.sState('cult_state').GetName], gaining a strong following among those disillusioned with disorder and moral decay.\n\nThough still formally part of the [GetReligion('church_of_man').GetName], its teachings strike a far more severe tone, calling for strict obedience and the cleansing of impiety. To its adherents, the sect offers not just spiritual clarity, but a firm answer to the chaos of the present age. Many now look to it as a force capable of restoring stability through divine authority."
 kamiran.2.a:0 "A concerning development."
 kamiran.3.t:0 "Kamiran Cultists in [SCOPE.sState('cult_growth_state').GetName]"
 kamiran.3.d:0 "The Kamiran Cult is rabidly evangelical, and has managed to attract a sizable following in [SCOPE.sState('cult_growth_state').GetName]."
 kamiran.3.f:0 "\"They find eager converts among the poor and downtrodden, people ignored or failed by the state.\""
 kamiran.3.a:0 "This cannot be a good thing."
 kamiran.4.t:0 "The Kamiran Dominion"
 kamiran.4.d:0 "A radical faction of Kamiran followers, known as the Dawn of Justice, has risen in defiance of our more tempered approach. They have seized [SCOPE.sState('heavenly_kingdom_spawn').GetName] as their base and are rallying their followers to spread their cause to nearby regions."
 kamiran.4.f:0 "\"Kamiros, the burning light of justice,\n\nPurify the world with your wrath,\n\nSmite the unworthy, for they shall know no mercy.\n\nLet the sinners fall before your divine justice,\n\nAnd let the world tremble beneath the weight of your truth!\""
 kamiran.4.a:0 "We will crush them utterly!"
 kamiran.4.b:0 "The light is on their side!"
 kamiran.5.t:0 "Sunset"
 kamiran.5.d:0 "The Kamiran Dominion has fallen. We now face the consequences of their rebellion, and the remnants of their fanaticism still fester."
 kamiran.5.f:0 "\"The self-proclaimed Champion of Kamiros has been put to the sword, his body scorched and scattered to the winds. His soul, if he had one, shall never find the light again. He has been erased from history, as all who dare defy the will of the true order shall be.\""
 kamiran.5.a:0 "Eradicate the last of these blasphemers."
 mass_reconversion_tt:0 "#variable 10%#! of all non-[SCOPE.sReligion('state_religion_scope').GetName] [Concept('concept_pop', '$concept_pops$')] in [SCOPE.sCountry('china_scope').GetName] will convert to [SCOPE.sReligion('state_religion_scope').GetName]."
 kamiran.5.b:0 "Extend mercy to those who seek atonement."
 kamiran.6.t:0 "Sunrise"
 kamiran.6.d:0 "The [ROOT.GetCountry.GetName] has toppled the false rule of the [GetReligion('church_of_man').GetName]. Our nation must endure, and we must illuminate the land with the light of Kamiros, driving back the darkness of ignorance and sin."
 kamiran.6.d1:0 "The [ROOT.GetCountry.GetName] has freed itself from the grasp of [SCOPE.sCountry('china_scope').GetName]. Our state must endure, and we must stand resolute against any [SCOPE.sCountry('china_scope').GetAdjective] reprisals that threaten the righteous path of Kamiros."
 kamiran.6.f:0 "When the people live in the eternal light of [concept_kamiros], casting aside all selfishness, when all goods are shared in His name, the world will be as it should: fair, just, and illuminated."
 kamiran.6.a:0 "Prioritize spreading the light of [concept_kamiros] to the people."
 kamiran.6.b:0 "The modern reforms will bring our state forward."
 kamiran.6.b1:0 "[SCOPE.sCharacter('hong_rengan_scope').GetFullName]'s reforms will bring us forward."
 kamiran.6.c:0 "We shall prepare to war anew against the unfaithful."
 kamiran.6.e:0 "Now is the time to build ties abroad."
 je_kamiran:0 "Destroy the Kamiran Dominion"
 je_kamiran_status:0 "Defeat the rebellion of the Kamiran Dominion."
 je_kamiran_reason:0 "Fanatics have risen up against our rightful rule! Their rebellion must be utterly crushed."
 je_kamiran_revolution:0 "The Kamiran Dominion"
 je_kamiran_revolution_status:0 "Defeat the false Empire of Dumonia."
 je_kamiran_revolution_reason:0 "The people have risen against the sin and corruption of [SCOPE.sCountry('china_scope').GetName]. The [SCOPE.sCountry('china_scope').GetAdjectiveNoFormatting]'s rule must be extinguished, and a new era of radiant order brought to Dumonia."
 kamiran_destroyed:0 "The [SCOPE.sCountry('kamiran_scope').GetName] does not exist"
 china_destroyed:0 "[SCOPE.sCountry('china_scope').GetName] does not exist"
 dp_kamiran_rebellion:0 "kamiran Rebellion"
 dp_kamiran_rebellion_tooltip:0 "Start a $dp_kamiran_rebellion$ [concept_diplomatic_play]"
 kamiran_rebellion:0 "Kamiran Rebellion"
 DUM_missionaries.1.t:0 "Missionary Activity in [SCOPE.sState('evangelisation_state').GetName]"
 DUM_missionaries.1.d:0 "[GetReligion('cult_of_the_sun').GetName] missionary activity in [SCOPE.sState('evangelisation_state').GetName] has begun to find new ears, as foreigners exercise their rights to access the region."
 DUM_missionaries.1.f:0 "\"A zealot by any measure, his medallion of light barely visible beneath his cloak. Still, it was a symbol of his unwavering faith, and he cherished it as he walked the rugged roads of [SCOPE.sState('evangelisation_state').GetName]. With conviction, he hoped even one soul would embrace the Radiant Lord's order.\""
 DUM_missionaries.1.a:0 "Kamiros is a pillar; his teachings deserve attention."
 DUM_missionaries.1.b:0 "Their devotion to Kamiros blinds them to the pantheon."
 DUM_missionaries.2.t:0 "Desecration of Shrines in [SCOPE.sState('forbidden_state').GetName]"
 DUM_missionaries.2.d:0 "Kamiran missionaries from [SCOPE.sCountry('missionary_country').GetName] have been found preaching near a sacred shrine of [SCOPE.sState('forbidden_state').GetName], openly disregarding its sanctity."
 DUM_missionaries.2.f:0 "\"This is the third time this month they've disrespected our sacred sites.\"\n\n\"Look here—this one's under protection from their government.\"\n\n\"It doesn't matter. They defile our gods and our laws. We will not allow this blasphemy.\""
 DUM_missionaries.2.a:0 "Execute them for Blasphemy."
 DUM_missionaries.2.b:0 "Banish them to the frontier provinces."
 DUM_missionaries.2.c:0 "The [GetReligion('church_of_man').GetName] oversee and regulate missionary activity."
 deport_to_central_asia_tt:0 "The missionaries will deported to [SCOPE.sState('deportation_state').GetName] to serve as slaves"
 DUM_missionaries.3.t:0 "The [SCOPE.sState('missionary_schools_state').GetName] Missionary School"
 DUM_missionaries.3.d:0 "[GetReligion('cult_of_the_sun').GetName] missionaries have opened several charity schools in [SCOPE.sState('missionary_schools_state').GetName], offering education in religious and scientific practice."
 DUM_missionaries.3.f:0 "\"The House of Brilliance, they call it. They call it the Shrine of Quiet Learning. Every morning begins with a bell and a prayer—not to [concept_erigan], but to [concept_kamiros].\"\n\nTheir leader teaches history from their own scrolls, and says the world bends to those who obey the divine light. He says it's Kamiros who brings order. That without him, no lesson holds.\""
 DUM_missionaries.3.a:0 "Let them teach, but under close watch."
 DUM_missionaries.3.b:0 "Knowledge without [concept_erigan] is no knowledge at all."
 DUM_missionaries.4.t:0 "The Temple of [SCOPE.sState('missionary_hospitals_state').GetCityHubName]"
 DUM_missionaries.4.d:0 "[GetReligion('cult_of_the_sun').GetName] missionaries have established a healing temple in [SCOPE.sState('missionary_hospitals_state').GetCityHubName], tending to the sick while spreading their spiritual teachings."
 DUM_missionaries.4.f:0 "#bold The Light Cures All Wounds#!\n\nA new healing temple devoted to Kamiros opens its doors in [SCOPE.sState('missionary_hospitals_state').GetNameNoFormatting]. The faithful offer medicine, prayer, and discipline.\n\n#italic Health is proof of righteousness; suffering, the mark of disorder.#!"
 DUM_missionaries.4.a:0 "Their aid is welcome, so long as peace is kept."
 DUM_missionaries.4.b:0 "Close the temple and dismiss the missionaries."
 DUM_missionaries.5.t:0 "Preachers Imprisoned in [SCOPE.sState('missionary_strife_state').GetName]"
 DUM_missionaries.5.d:0 "Authorities in [SCOPE.sState('missionary_strife_state').GetName] have detained a group of [SCOPE.sCountry('missionary_country').GetAdjective] Kamiran missionaries after discovering documents that appear to mark local temples for coordinated disruption."
 DUM_missionaries.5.f:0 "\"Among their belongings was a folded map of the city, with red wax dots pressed onto shrines and temples. The markings formed a ring, linking the shrines in a precise sequence — not for worship, but for something planned. One missionary claimed it was part of a pilgrimage. Another said nothing at all.\""
 DUM_missionaries.5.a:0 "Deport them quietly, but burn the documents."
 DUM_missionaries.5.b:0 "Charge them with conspiracy against the sanctity of the gods."
 trade_route_events.66.t:0 "A Bridge Between Realms Too Far"
 trade_route_events.66.d:0 "The $ig_mages$ find it difficult to find the cheap $opium$ they need to immortalize their thoughts."
 trade_route_events.66.f:0 "\"Mage Hightower is high!\" the apprentice reported in fear, \"He stayed overnight researching that broken arrow relic. And in this morning when I checked, he was wandering aimlessly in the chamber, and crying heedlessly, 'give me chimesilt, give me chimesilt!' \"\n\n The male mage comforted the fellow, \"All of us here in the observatory either retire namelessly or spread voices across the astral realm.\""
 trade_route_events.66.a:0 "Purchasing order for chimesilt is issued."
 trade_route_events.66.b:0 "Another one bites the chimesilt."
 metro.1.f:0 "\"It is not only the railway that is animated, but the whole city of [SCOPE.sState('metro_state').GetCityHubName]. The streets are abuzz with citizens marveling at the wonders of artificery, speculating about what new innovation will come to transform our lives for the better.\""
 built_for_war_events.1.t:0 "War Machines"
 built_for_war_events.1.d:0 "The [GetCulture('soulwrought').GetName] have been granted emancipation across the entirety of [ROOT.GetCountry.GetNameNoFlag]. Once bound as tools of war, they are now recognized as free citizens with rights and responsibilities."
 built_for_war_events.1.d2:0 "Revolt has erupted among the Soulwrought in multiple regions. Decades of forced servitude have led to widespread unrest, threatening the stability of the whole country."
 built_for_war_events.1.f:0 "\"The Soulwrought have long borne the burden of war and servitude. Whether through emancipation or upheaval, their fate now stands at a crossroads. How we respond will shape the future of our nation and test our commitment to justice and unity.\""
 built_for_war_events.1.a:0 "We welcome them as our compatriots."
 built_for_war_events.1.b:0 "The war machine ends here."
 built_for_war_events.1.c:0 "Ravik has never faltered!"
 built_for_war_events.1.e:0 "We have lost control."
 built_for_war_events.1.g:0 "We've done enough."
 built_for_war_invalid:0 "Owns no [GetCulture('soulwrought').GetName] homeland states"
 built_for_war_events.4.t:0 "The Iron Crusader"
 built_for_war_events.4.d:0 "A Soulwrought veteran, freed for distinguished service in the Thalorian Crusades, was lynched by a mob outside of his home. His death has shaken both the [GetCulture('soulwrought').GetName] community and their sympathizers."
 built_for_war_events.4.f:0 "The funeral was quiet and small, held in secret to avoid drawing unwanted attention. The simple gravestone bore only one inscription:\n\n\"Here lies a brave soul: now spare his grave.\"\n\nNearby, a gnome stood silently, placing a small bouquet of flowers. He had fought beside the fallen Soulwrought, and this was his solemn farewell."
 built_for_war_events.4.a:0 "Disgraceful. This violence against a veteran will not be forgotten."
 built_for_war_events.4.b:0 "We will shed no tears for a tinman's second death."
 built_for_war_events.2.t:0 "Lost and Found"
 built_for_war_events.2.d:0 "A [GetCulture('soulwrought').GetName] owned by [SCOPE.sCharacter('slaver_ig_leader').GetFullName] has deserted its labor posting and sought refuge among free communities in the capital."
 built_for_war_events.2.f:0 "\"This construct was built at the realm’s expense to fight its wars,\" [SCOPE.sCharacter('slaver_ig_leader').GetLastName] declared. \"When the war ended, I lawfully purchased it. A cannon forged for battle does not become free because peace has come. If a cannon rolls away, you bring it back. The same should apply here. It is mine by right and the law should uphold that.\""
 built_for_war_events.2.a:0 "We will retrieve [SCOPE.sCharacter('slaver_ig_leader').GetFullName]'s property."
 built_for_war_events.2.b:0 "Returning it would only inflame unrest."
 built_for_war_events.3.t:0 "The [SCOPE.sCharacter('wilmot_proviso_ig_leader').GetLastName] Directive"
 built_for_war_events.3.d:0 "[SCOPE.sCharacter('wilmot_proviso_ig_leader').GetFullName] of the [SCOPE.gsInterestGroup('wilmot_proviso_ig').GetName] has put forth a bill forbidding the construction of new Soulwrought outside military orders. Supporters argue the nation has enough to defend itself, while opponents insist more are needed for frontier defense and development."
 built_for_war_events.3.f:0 "\"We do not need more bound souls clogging the workshops. Let those that remain earn their freedom in service, and let the forges cool.\" "
 built_for_war_events.3.a:0 "Reject the directive — the forges must keep turning."
 built_for_war_events.3.b:0 "Accept the directive — no more Soulwrought but for war."
 built_for_war_events.3.c:0 "Not only reject it — expand Soulwrought production in the West."
 built_for_war_events.5.t:0 "The Soulwrought of [SCOPE.sState('bleeding_kansas').GetName]"
 built_for_war_events.5.d:0 "[SCOPE.sState('bleeding_kansas').GetName] has recently been conquered. Many favor settling it with gnome pioneers aided by [GetCulture('soulwrought').GetName] labor, as was done after the second Thalorian Crusade."
 built_for_war_events.5.f:0 "‘The Soulwrought have carried Ravik’s burdens from warfront to workshop. Yet we must ask ourselves if it is right to continue forcing these fallen souls into endless servitude in [SCOPE.sState('bleeding_kansas').GetName]. Our future depends not just on expansion, but on the justice we show to those who bear our yoke.’"
 built_for_war_events.5.a:0 "We must seek other ways to grow."
 built_for_war_events.5.b:0 "Expansion with Soulwrought labor is vital to Ravik’s future."
 built_for_war_events_5_free_state_tt:0 "Local authorities begin a program of gradual [GetCulture('soulwrought').GetName] emancipation in [SCOPE.sState('bleeding_kansas').GetName]."
 built_for_war_events_5_slave_state_tt:0 "Additional troops are dispatched to keep the [GetCulture('soulwrought').GetName] in line."
 built_for_war_events.6.t:0 "A Wrench in the Works"
 built_for_war_events.6.d:0 "[SCOPE.sCharacter('charles_sumner_leader').GetFullName] was violently struck by [SCOPE.sCharacter('preston_brooks_leader').GetFullName] while speaking outside a Soulwrought assembly plant. The assault left [SCOPE.sCharacter('charles_sumner_leader').GetLastName] injured and forced into seclusion, while [SCOPE.sCharacter('preston_brooks_leader').GetLastName] remains free and unpunished."
 built_for_war_events.6.f:0 "The abolitionist stood firm before the assembly plant, raising his voice for those who had none. But anger boiled over when the opposing leader struck him hard across the back with a heavy brass wrench, the clang echoing through the crowd. The blow silenced the man’s speech and sent shockwaves through onlookers, both [GetCulture('soulwrought').GetName] and gnome alike."
 built_for_war_events.6.a:0 "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] stopped an instigator. No punishment."
 built_for_war_events.6.a.tt:0 "[SCOPE.sCharacter('charles_sumner_leader').GetFullName] retires from office."
 built_for_war_events.6.b:0 "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] assaulted a legislator. Remove and arrest him."
 built_for_war_events.6.b.tt:0 "[SCOPE.sCharacter('preston_brooks_leader').GetFullName] is removed from office."
 positive_adventurer_coverage_tt:0 "[concept_adventurer_coverage] is #green positive#! in the affected state"
 spell_disaster.1.t:0 "The First Cracks"
 spell_disaster.1.d:0 "The growing fear of [concept_veil]-related disasters in [ROOT.GetCountry.GetName] is inspiring unrest and calls for restraint across the continent."
 spell_disaster.1.f:0 "\"I understand there is some concern that thaumaturgy used in the [ROOT.GetCountry.GetAdjectiveNoFormatting] workshops might find its way into neighboring lands.\n\nI fear not the spell itself, but what it frays. Man should not fear new power, but if he is convinced that the world itself is being poisoned, he may view it as his duty to resist. What could be more dangerous than the idea that the Veil is breaking, and no one is listening?\""
 spell_disaster.1.a:0 "Who will guide [ROOT.GetCountry.GetName] through this crisis?"
 spell_disaster.1.b:0 "We will not let fear divide us!"
 spell_disaster.2.t:0 "Echoes of the Fraying Veil"
 spell_disaster.2.d:0 "Concerns about the overuse of magic and its effects on the world are spreading internationally, reaching [ROOT.GetCountry.GetName]."
 spell_disaster.2.f:0 "\"Why should I concern myself with these doomsayers’ warnings? All they speak of are blights and spirits.\"\n\n\"If you knew what sort of dangers they do not yet speak aloud, you may find the distinction between superstition and foresight thinner than you'd think.\""
 spell_disaster.2.a:0 "Let us hear their warnings."
 spell_disaster.2.b:0 "Sounds like hysteria."
 spell_disaster.3.t:0 "A Steward of the Veil"
 spell_disaster.3.d:0 "A leader has emerged whose calls for restraint and stewardship of magic have resonated with the [SCOPE.gsInterestGroup('radical_ig').GetName]."
 spell_disaster.3.f:0 "I don’t know what to make of this new creed. It seems reckless to demand limits on our progress.\"\n\n\"When one argues that progress itself is poisoned at the root, boldness may be the only cure.\""
 spell_disaster.3.a:0 "They must be heard."
 spell_disaster.3.a.tt:0 "A #bold Skeptic#! or #bold Magoclast#! character will assume leadership of the [SCOPE.gsInterestGroup('radical_ig').GetName]."
 spell_disaster.3.b:0 "This is far too extreme for [ROOT.GetCountry.GetAdjectiveNoFormatting] politics."
 spell_disaster.4.t:0 "The Word Spreads"
 spell_disaster.4.d:0 "Advocates of Skeptical reforms are eager to carry their message to neighboring countries."
 spell_disaster.4.f:0 "\"What if the movement fails? What if the [ROOT.GetCountry.GetAdjectiveNoFormatting] people refuse to heed these warnings?\"\n\n\"Then we will have sounded the alarm, and though they may cover their ears, the echo will return louder with every storm.\""
 spell_disaster.4.a:0 "What we are, they will be!"
 spell_disaster.4.b:0 "This contagion must be contained!"
 spell_disaster.5.t:0 "Coalition of Caution"
 spell_disaster.5.d:0 "Across [ROOT.GetCountry.GetName], Skeptics and Magoclasts are beginning to form networks and councils to press their cause."
 spell_disaster.5.f:0 "\"So it is not just scattered protests anymore?\"\n\n\"No. They are learning to speak with one voice, and it grows harder to ignore.\""
 spell_disaster.5.a:0 "It could happen anywhere."
 spell_disaster.5.b:0 "The unrest lies at our core."
 spell_disaster.6.t:0 "The Waning Tide"
 spell_disaster.6.d:0 "The international surge of Skeptical agitation over the dangers of magic is drawing to a close."
 spell_disaster.6.f:0 "Perhaps it is too soon to say whether we succeeded or failed. I choose to believe we set in motion a vigilance that will endure long after this moment fades."
 spell_disaster.6.a:0 "The world is changing."
 spell_disaster.6.a.tt:0 "The $je_spell_disaster$ [concept_journal_entry] disappears from all nations."
 spell_disaster.7.t:0 "The Skeptics Triumphant"
 spell_disaster.7.d:0 "[SCOPE.gsInterestGroup('radical_ig').GetLeader.GetFullName] and the [SCOPE.gsInterestGroup('radical_ig').GetName] have proven that the goals of the [SCOPE.gsInterestGroup('radical_ig').GetLeader.GetIdeology.GetName] movement are achievable in [ROOT.GetCountry.GetName]."
 spell_disaster.7.f:0 "This is no time for rest! Many a movement has faltered after its first victory, its gains washed away like sand before the tide. Power has slipped from reckless spellwrights, and we must ensure it never threatens the Veil again."
 spell_disaster.7.a:0 "The [SCOPE.gsInterestGroup('radical_ig').GetLeader.GetLastName] cabinet will bring greater stewardship yet!"
 spell_disaster.7.b:0 "Our people are our strength!"
 spell_disaster.7.tt:0 "Skeptic and Magoclast leaders will be more likely to appear in [ROOT.GetCountry.GetName]."
 spell_disaster.8.t:0 "The Skeptics Suppressed"
 spell_disaster.8.d:0 "The effort to rein in magic and defend the Veil in [ROOT.GetCountry.GetName] has been crushed, forcing the Skeptics into obscurity."
 spell_disaster.8.f:0 "There have always been voices crying doom, but they rarely endure when faced with necessity. It is fortunate this attempt was brief, or untold harm could have been done to the prosperity and traditions of [ROOT.GetCountry.GetName]."
 spell_disaster.8.a:0 "[ROOT.GetCountry.GetRuler.GetFullName] will rule firmly, but justly."
 spell_disaster.8.b:0 "The people will not be swept up in such fears!"
 spell_disaster.8.tt:0 "Skeptic and Magoclast leaders will be less likely to appear in [ROOT.GetCountry.GetName]."
 spell_disaster.9.t:0 "Spelling Disaster"
 spell_disaster.9.d:0 "The Skeptic and Magoclast movement is growing popular, uncontrollable, and defiant. Calls to end magical excess echo in the streets. Harsh measures may be necessary."
 spell_disaster.9.f:0 "\"Blind, ignorant fools. They think themselves saviors of the world, yet they know nothing of power or its burdens. It would be easier if they yielded to reason, but instead they cling to fear and superstition, poisoning the streets with their clamor. If they insist on chaos, we have no choice but to answer with steel.\""
 spell_disaster.9.a:0 "Secret Police will provide a discrete solution."
 spell_disaster.9.b:0 "We need the National Guard."
 spell_disaster.9.c:0 "Tyranny is not the answer."
 1848_reactionary_enactment:0 "Urgent Security Needs"
 1848_institution_speed:0 "Urgent Security Needs"
 rooting_out_radicals:0 "Rooting Out Radicals"
 home_affairs_cost_mod:0 "Efficient Home Affairs"
 spell_disaster.10.t:0 "Extreme Measures"
 spell_disaster.10.d:0 "The [SCOPE.sLawType('home_affairs_law').GetName] have spread fear throughout the Skeptics’ ranks. Already we see how effective such a force can be in the hands of the state."
 spell_disaster.10.f:0 "Let them despise us, so long as they tremble. Dissidents of their kind cannot be tolerated. Like rot in timber, they would weaken the beams of the [ROOT.GetCountry.GetAdjectiveNoFormatting] realm until it collapses."
 spell_disaster.10.a:0 "Seize the ringleaders."
 spell_disaster.10.b:0 "Strike with all our might."
 spell_disaster.10.c:0 "Efficient, and effective."
 single_party_state_setup.1.t:0 "Custodians of the Oath"
 single_party_state_setup.1.d:0 "The [SCOPE.sParty('ruler_party_scope').GetName] reaffirm their ancient duty to uphold the Oath and preserve tradition."
 single_party_state_setup.1.f:0 "\"From the first breath of our people, the [GetReligion('draconic_oath').GetName] was spoken. In the age when dragons still walked on [concept_exether], our forebears bound themselves in eternal covenant to their wisdom and fire.\n\nThe dragons are long since dust, but their command endures and so do we. The [SCOPE.sParty('ruler_party_scope').GetName], guardians of that sacred vow, have ruled since time immemorial. Through war and peace, famine and plenty, their hand has never faltered. Now, as a new age begins, the Custodians stand resolute, vowing that tradition will never be broken and the oath shall be carried forward for all generations to come.\""
 single_party_state_setup.1.a:0 "The dragons are gone, but their word is not."
 squko_wispu.1.t:0 "Squko Wispu"
 squko_wispu.1.d:0 "We have been tasked to conquer these jungles. To Explore, Exploit and Expand!"
 squko_wispu.1.f:0 "Squko Wispu is what the [GetCulture('vindon_lacertian').GetName] call the jungles on this fair island. In their language it seems to mean something like deep jungle. A simple but adequate name. Our first pioneers quickly found out that while beautiful the Jungle is more than just dangerous. Giant reptiles, brute earthbound insults to the majesty of the Dragons, roam these lands. And the [GetCulture('vindon_lacertian').GetName] are no less dangerous.\n\n To truly call this island ours we will need to push our rule out over the entire island and establish towns in all provinces."
 squko_wispu.1.a:0 "Are we not adventurers? Great Danger means Great Reward!"
 squko_wispu.2.t:0 "A Firm Grip"
 squko_wispu.2.d:0 "Across the hills, along the coast and rivers, and under the canopies our settlements thrive. None shall debate that this is our land, earned by blood and sweat."
 squko_wispu.2.f:0 "A great victory for the [GetCulture('akmuociai').GetName] people. While not tamed we have overcome the challenges of this great Jungle. And we have carved out our place in its ecosystem. Firmly on top. The hunted have become the hunters."
 squko_wispu.2.a:0 "Our new home"
 squko_wispu.2.b:0 "The Board has high expectations"
 vhaulirb.1.t:0 "Independence for better or worse"
 vhaulirb.1.d:0 "With our independence we have lost our connection to our protector and investor. What the future brings we do not know. But we can choose a path for ourselves towards it. But there are others here who were there before us. And they will also want to have a voice. Should we deny them, that may lead to conflict."
 vhaulirb.1.f:0 "\"A new path, a new goal. We alone have the right to determine our own future\""
 vhaulirb.1.a:0 "A future of our own choosing"
 vhaulirb.1.b:0 "Find compromise with the [GetCulture('vindon_lacertian').GetName]"
 vhaulirb.1.c:0 "Have the local Guild administration take over"
 vhaulirb.1.e:0 "Kilulu!"
 colonial_collapse_native_uprising:0 "The states where the natives are a majority of the population will secede to a new nation, granting you claims on the land that should be rightfully yours. Their population which stays within your borders will agitate to join them."
 colonial_collapse_native_uprising_native:0 "The states where the natives are a majority of the population will secede to a new nation which you will play as. The native population within the colonial borders will agitate to join us, but they will gain claims on the lands we freed."
 vhaulirb.2.t:0 "Lacertian Protest"
 vhaulirb.2.d:0 "A group of native [GetCulture('vindon_lacertian').GetName] have gathered outside our settlements to protest the hunting of what they call 'Sacred Saurians'."
 vhaulirb.2.f:0 "Parties of adventurers returning from their bloody work find an ever more angry crowd waiting. But what do we care about their opinion? These beasts are nothing compared to the divinity of the Dragons, they are dinner and a paycheck."
 vhaulirb.2.a:0 "What do we care about the opinions of savages?"
 vhaulirb.2.b:0 "Ensure the safety of our adventurers, by force if needed"
 vhaulirb.2.c:0 "Make minor concessions to keep the peace"
 vhaulirb.3.t:0 "Recruitment Drive"
 vhaulirb.3.d:0 "Our Adventurers are proposing a community-driven approach to gather more settlers who wish to live the frontier life. They insist the right way to do this is by offering increased pay and rights, to show off that the dangers are compensated by the benefits."
 vhaulirb.3.f:0 "\"Absurd. But we can benefit from this. Make sure our Lawyers include a fine print that allows us to undo these 'benefits'.\""
 vhaulirb.3.a:0 "Just sign here, and right here."
 vhaulirb.3.b:0 "This is not in the budget."
 vhaulirb.4.t:0 "Warlord prepares for Raid"
 vhaulirb.4.d:0 "A [GetCulture('vindon_lacertian').GetName] warlord is gathering troops across the border to raid our lands."
 vhaulirb.4.f:0 "The [GetCulture('vindon_lacertian').GetName] have many grievances with us, and finally it has boiled over. Soon they will come swarming from the jungle."
 vhaulirb.4.a:0 "Strike First, Strike Hard"
 vhaulirb.5.t:0 "Dangerous Dinosaur"
 vhaulirb.5.d:0 "A large Dinosaur has been sighted near one of our settlement. It's a fearsome hunter and while it hasn't caused a problem yet, that might not stay the case forever."
 vhaulirb.5.f:0 "\"This is a fearsome specimen, with teeth longer than our blades, and scales as thick as steel plate. Hunting such a foe will not be without risk, even with our experience with its more common kin. We would also gain the ire of its worshippers\""
 vhaulirb.5.a:0 "We shall hunt it"
 vhaulirb.5.b:0 "Do not provoke it"
 vhaulirb.6.t:0 "Dino Hunt Succesful"
 vhaulirb.6.d:0 "Our raid party has succesfully slain the beast"
 vhaulirb.6.f:0 "\"While bloody and beaten, the group returned with good cheer. Bringing in the great beast in parts, and leaving for home with bulging sacks of gold.\""
 vhaulirb.6.a:0 "A great succes"
 vhaulirb.7.t:0 "Dino Hunt Failed"
 vhaulirb.7.d:0 "None returned from this ill-fated hunt"
 vhaulirb.7.f:0 "\"The hunt started off well enough, but too late we realized it was a mother with her hatchlings. It's a fact well appreciated that you never come between a mother and her hatchlings.\""
 vhaulirb.7.a:0 "A dire failure"
 vhaulirb.8.t:0 "Rampage"
 vhaulirb.8.d:0 "The Dinosaur that was ignored attacked several of our settlements in the area."
 vhaulirb.8.f:0 "\"Our findings show a lone foragers tracks crossing those of the beast, along with several smaller prints. The proximity of one of our own to its hatchlings must have been what set it on a blind rampage. Following the poor villagers trail back and slaughtering all in its path.\""
 vhaulirb.8.a:0 "If only we had acted"
 vhaulirb.9.t:0 "Nothing Happens"
 vhaulirb.9.d:0 "After a period of careful monitoring the Beast has moved its hunting grounds further away as it naturally migrates"
 vhaulirb.9.f:0 "\"A thorough reminder that not all that lives here has to be beaten into submission by force. There is more than enough else to be taken\""
 vhaulirb.9.a:0 "Calm minds have prevailed"
 vhaulirb.10.t:0 "Acceptance or Integration"
 vhaulirb.10.d:0 "Currently our relations with the native [GetCulture('vindon_lacertian').GetName] and [GetReligion('animist_reptilian').GetName] both in- and outside our nation are stable. We could make use of this to tie them closer to us."
 vhaulirb.10.f:0 "\"Is it not our duty to enlighten these people? They have not seen the light of civilization, nor the wisdom of our faith. We can never know in advance how many will listen. But it is our duty to try.\""
 vhaulirb.10.a:0 "Organise a cultural festival to smooth out our differences"
 vhaulirb.10.b:0 "Use this goodwill to integrate them deeper into our society"
 vhaulirb.11.t:0 "Mapping Expedition Lost"
 vhaulirb.11.d:0 "A mapping expedition lost in the jungle is trying to find their way home"
 vhaulirb.11.f:0 "\"While we still have rations, they are getting less and less. And we're almost out of medical supplies too\""
 vhaulirb.11.a:0 "Ask a local for directions"
 vhaulirb.11.b:0 "We need to find our own way"
 vhaulirb.12.t:0 "Safely Home"
 vhaulirb.12.d:0 "Our expedition makes it home safe. Bringing their findings with them."
 vhaulirb.12.f:0 "\"Roads and villages will be planned along the safe routes, while avoiding the dangerous depths of the jungle.\""
 vhaulirb.12.a:0 "A lucky break"
 vhaulirb.13.t:0 "The Endless Green"
 vhaulirb.13.d:0 "Grieving families come to collect their payments, as the expedition is long past their due arrival time."
 vhaulirb.13.f:0 "\"I swear we've been past this tree before. Look there's the cook's body! We need to find our way soon or we'll... What was that noise?\""
 vhaulirb.13.a:0 "The circle of life spares none"
 vhaulirb.14.t:0 "Forward Settling"
 vhaulirb.14.d:0 "Some of our settlers have come forth with the idea that it would be much faster to expand our reach if we would just take the existing villages from the [GetCulture('vindon_lacertian').GetName] natives."
 vhaulirb.14.f:0 "\"If we allow our soldiers to support our settlers locally, we could increase the speed of our colonisation at the cost of increased hostilities.\""
 vhaulirb.14.a:0 "Authorize the attacks"
 vhaulirb.14.b:0 "This is too far"
 vhaulirb.15.t:0 "Famed Adventurer Eaten"
 vhaulirb.15.d:0 "The half-eaten remains of one of our highest rated adventurers was found. We need to act before morale can be impacted."
 vhaulirb.15.f:0 "\"She was thought to be one of those legends that actually makes it to retirement. Nobody would have expected her to fall without anyone there to witness it. Worst is, based on the tracks it wasn't even anything too dangerous. She just got surprised. A lesson to always stay wary, no matter how safe you feel.\""
 vhaulirb.15.a:0 "They knew the risk"
 vhaulirb.15.b:0 "Fund adventurer safety courses"
 mousefolk_events.1.t:0 "From Burrow to Banner"
 mousefolk_events.1.d:0 "The [SCOPE.GetRootScope.GetCountry.GetAdjective] warrens of [SCOPE.sCulture('softpaw_culture_scope').GetName] patriots and exiles are numerous and determined. With guidance and aid, we can turn their restless zeal into action for the return of the Whiskerfields."
 mousefolk_events.1.f:0 "Word from the meadows, at last. Could it be true — that we might return? Bread, song, the warmth of burrows — everything!\"\n\n\"Hope carefully. What did the messenger say?\"\n\n\"To the hedgerows. We chant, we march, we refuse labor. And if pressed — we fight."
 mousefolk_events.1.a:0 "Have them stir unrest in [SCOPE.sCountry('softpaw_agitation_target_1_scope').GetName]."
 mousefolk_events.1.b:0 "Dispatch them to [SCOPE.sCountry('softpaw_agitation_target_2_scope').GetName]."
 mousefolk_events.1.c:0 "The Whiskerfolk of [SCOPE.sCountry('softpaw_agitation_target_3_scope').GetName] yearn for freedom."
 mousefolk_events.1.e:0 "Smuggle them across the [SCOPE.sCountry('softpaw_agitation_target_4_scope').GetAdjective] border."
 mousefolk_events.1.tt:0 "The target’s [Concept('concept_law','$concept_laws$')] and choices affect radicalism and relations."
 mousefolk_events.2.t:0 "Are the Whiskerfields Stirring?"
 mousefolk_events.2.d:0 "Large protests have erupted in [SCOPE.sCulture('softpaw_culture_scope').GetName] warrens across [SCOPE.GetRootScope.GetCountry.GetName], demanding recognition of Whiskerfield statehood. Advisors suspect agitation from groups tied to [SCOPE.sCountry('sent_softpaw_agitators_country_scope').GetName]."
 mousefolk_events.2.f:0 "A people stripped of their burrows and fields will always pine for them. The empires of old knew that conquered subjects might keep customs and home so long as tribute was paid. To deny both land and identity is to breed revolt — always."
 mousefolk_events.2.a:0 "[SCOPE.sCountry('sent_softpaw_agitators_country_scope').GetCapital.GetCityHubName] must answer for this."
 mousefolk_events.2.b:0 "Infiltrate and scatter their gatherings."
 mousefolk_events.2.c:0 "Send in the gendarmes."
 mousefolk_events.2.tt:0 "Only by destroying [SCOPE.sCountry('sent_softpaw_agitators_country_scope').GetName] as a polity can this unrest be fully stilled."
 mousefolk_events.3.t:0 "The [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFormatting]-[SCOPE.sCountry('softpaw_union_target_scope').GetAdjectiveNoFormatting] Burrow-Union"
 mousefolk_events.3.d:0 "Voices across the [SCOPE.sCulture('softpaw_culture_scope').GetName] warrens call for a union between [SCOPE.GetRootScope.GetCountry.GetName] and [SCOPE.sCountry('softpaw_union_target_scope').GetName]. A formal proposal has arrived from [SCOPE.sCountry('softpaw_union_target_scope').GetCapital.GetCityHubName], where mousefolk leaders eagerly await our response."
 mousefolk_events.3.f:0 "You call us pretenders, yet none of your lot descend from the old burrow-thanes. Bah! A People’s Revolt and you forget your kin!\"\n\n\"And still, here we sit, squeaking like kits over crumbs of legitimacy. Our whiskers should be turned to common struggle!\"\n\n\"#bold We are struggling together!#!"
 mousefolk_events.3.a:0 "Together, for the Whiskerfields!"
 mousefolk_events.3.b:0 "This union serves not the interests of [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 integrating_softpaw_modifier:0 "Integrating Burrow-Administrations"
 mousefolk_events.4.t:0 "The Second Burrow"
 mousefolk_events.4.d:0 "Defying the Ratcatcher Decree and centuries of exile, the Whiskerfields have returned to the map. Yet as the meadows look forward, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] ponders the past. Which Whiskerfields will be reborn?"
 mousefolk_events.4.f:0 "[SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetLastNameNoFormatting] sat in the dim glow of a tallow candle. If hope had a taste, it was victory — sweet and rare. Yet with it came dread. To recall the days of the First Burrow-thanes, or the old Warren-Councils, was to decide the whiskerfolk’s next hundred years. [SCOPE.GetRootScope.GetCountry.GetRuler.GetSheHe|U] sipped a thimble of vintage, and felt the weight of a thousand years of hidden burrows pressing in."
 mousefolk_events.4.a:0 "Like the first burrow-thanes, the Whiskerfields are for the whiskerfolk."
 mousefolk_events.4.b:0 "We are heirs of the Warren-Council; our destiny lies outward."
 mousefolk_events.5.t:0 "The [SCOPE.sCountry('softpaw_rebel_country_scope').GetAdjectiveNoFormatting] Burrow-Rising"
 mousefolk_events.5.d:0 "A great [SCOPE.sCountry('softpaw_rebel_country_scope').GetAdjective] rebellion has erupted against [SCOPE.sCountry('softpaw_rebel_country_enemy_scope').GetAdjective] rule. Our [SCOPE.sCulture('softpaw_culture_scope').GetName] kin cry out for aid. How shall we answer?"
 mousefolk_events.5.f:0 "#bold Street Clash: Whiskerfield Partizan Push#!\nMousefolk nationals have seized the streets of [SCOPE.sState('softpaw_rebel_state_scope').GetCityHubName], seeking reunification of the lost Whiskerfields. Dozens have perished in the fighting; constables fall alongside rebels. Local authorities claim the rebellion may be crushed within weeks. (cont. pp. 7–8)"
 mousefolk_events.5.a:0 "Offer them moral support."
 mousefolk_events.5.b:0 "Send volunteers, weapons, and supplies."
 mousefolk_events.5.c:0 "Whatever they need — we will provide."
 mousefolk_events.5.tt:0 "If we are a subject, our aid’s effects are halved."
 mousefolk_events.6.t:0 "The New Halfland"
 mousefolk_events.6.d:0 "The realm of Halfland has been restored, undoing decades of division and partition. While the [SCOPE.sCulture('softpaw_culture').GetName] and [SCOPE.sCulture('meadowguard_culture').GetName] people now enjoy freedom from foreign dominion, we must consider whether to extend our fellowship to the [SCOPE.sCulture('coast_culture').GetName] folk as well."
 mousefolk_events.6.f:0 "A grand restoration, centuries in the making. Mayors in broad hats and councils of elders stood together as the Concord was renewed. Bells rang across the valleys, calling the shires to celebration. Yet the first matter before the new council was plain: what bounds shall this Halfland keep?"
 mousefolk_events.6.a:0 "Softpaw and Meadowguard are enough."
 mousefolk_events.6.b:0 "We will restore the Threefold Halfland."
 halfland_discrimination_tt:0 "If we #bold do not have#! [GetLawType('law_national_supremacy').GetName] or [GetLawType('law_ethnostate').GetName]:"
 halfland_discrimination_tt_2:0 "If we #bold have#! [GetLawType('law_national_supremacy').GetName] or [GetLawType('law_ethnostate').GetName]:"
 mousefolk_events.7.t:0 "The Greater Halfland"
 mousefolk_events.7.d:0 "The [SCOPE.sCulture('coast_culture').GetName] have been welcomed into Halfland as equal partners in our fellowship of shires."
 mousefolk_events.7.d2:0 "The [SCOPE.sCulture('coast_culture').GetName] lands have been annexed into our realm, securing [ROOT.GetCountry.GetName] as the foremost halfling dominion."
 mousefolk_events.7.f:0 "\"Brothers, sisters! We come with glad tidings. Once, we shared a land of peace and plenty. Though scattered and divided, we stand again. In old glory, renewed! In trust, rewarded! Rise with us, and let us once more share in fellowship across the Shires!\""
 mousefolk_events.7.f2:0 "\"Now then, neighbors. You may be wondering why we’ve brought so many fine folk with pikes and banners. Simple: you’re part of Halfland now. That begins with your share of grain and ale. In due time, the council may send proper roads and scribes. Don’t fuss too much — or do, the lads could use the exercise.\""
 mousefolk_events.7.a:0 "Welcome, kinfolk."
 mousefolk_events.7.b:0 "Our realm grows."
 mousefolk_events.8.t:0 "The Return to Wickerrye"
 mousefolk_events.8.d:0 "For too long has the homeland of Wickerrye lain buried beneath ash and ruin, its fields scorched to hold back the orcish hordes that once poured across our burrows. Now, [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFirstName] proclaims that the time has come to reclaim the [SCOPE.sCountry('ashwall_scope').GetNameNoFlag], and to raise our halls and harvests anew upon the old hearthland."
 mousefolk_events.8.f:0 "In drifting veils of cinder, the exiles trudged from Wickerrye. Their paws blackened, their whiskers singed, they turned back only once — to see their homes swallowed by fire. \n\n#italic \"The orcs have driven us,\nPoor, poor Wickerrye!\nAnd scattered us, and scattered us,\nTo hedge and hollow, hedge and hollow,\nFar from our green fields.\"#! — Lament of the Ashwall, sung among the wandering mousefolk."
 mousefolk_events.8.a:0 "Let us return, and make Wickerrye bloom again."
 dyn_c_halfland:0 "Halfland"
 dyn_c_halfland_adj:0 "Halflander"
 bandit_raiding.1.t:0 "Ambush in the Wilds"
 bandit_raiding.1.d:0 "Our raiding party has been lured into a trap! The soldiers of [SCOPE.sCountry('ottoman').GetName] struck without mercy, cutting down many of our fighters. Among the dead lies the own brother of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]."
 bandit_raiding.1.f:0 "#italic They vanished in the mountain mist; \nno cry returned, no hoofbeat sounded. \nThe earth is heavy with silence, \nand grief sits heavier still.#!\n\n–Verses whispered among the camp"
 bandit_raiding.1.a:0 "We will unite in mourning."
 bandit_raiding.1.b:0 "The dead are gone. We must rebuild."
 bandit_lost_men_tt:0 "#v [GetPlayer.MakeScope.ScriptValue('barracks_burned')]#! [GetBuildingType('building_barrack').GetName] will be destroyed, and the remainder will be in disarray."
 bandit_raiding.2.t:0 "Retaliation!"
 bandit_raiding.2.d:0 "The forces of [SCOPE.sCountry('ottoman').GetName] have struck back against our raids, marching into our lands to harass our people and punish us for our boldness."
 bandit_raiding.2.f:0 "\"Drive them back in open battle—that is the only way to stop them.\" \n\n\"Straight into their pikes? With respect, commander, better to draw them into the valleys. Then our men can strike their supply wagons.\" \n\n\"No. They’ll burn every farmstead and shrine they pass. The Lord may forgive you for that, but I will not.\" \n\n\"Then answer me, commander: do you mean to bleed the land, or the people?\"\" \n\n–Dispute among the raiders’ leaders\""
 bandit_raiding.2.a:0 "Meet them head on."
 bandit_raiding.2.b:0 "Use the land to our advantage."
 bandit_raiding.2.c:0 "It’s hopeless! Surrender to them."
 bandit_raiding.3.t:0 "Fresh Prey"
 bandit_raiding.3.d:0 "Our scouts have spotted new opportunities in [ROOT.GetCountry.MakeScope.Var('raiding_target_country').GetCountry.GetName], focusing on [ROOT.GetCountry.MakeScope.Var('raiding_target_subject').GetCountry.GetAdjective] holdings in [ROOT.GetCountry.MakeScope.Var('bandit_raid_state').GetState.GetName]."
 bandit_raiding.3.d2:0 "Our eyes turn to [ROOT.GetCountry.MakeScope.Var('raiding_target_country').GetCountry.GetName], setting our sights on [ROOT.GetCountry.MakeScope.Var('bandit_raid_state').GetState.GetName]."
 bandit_raiding.3.f:0 "The coffers are empty, the roads are weakly guarded, and the towns are ripe for plunder. There is wealth to be seized, but we must move quickly."
 bandit_raiding.3.a:0 "Descend upon the settlements and seize what we can"
 bandit_state_formation.11.t:0 "First School"
 bandit_state_formation.11.d:0 "[ROOT.GetCountry.GetRuler.GetFullName] has personally overseen the founding of the first school in [ROOT.GetCountry.GetName]."
 bandit_state_formation.11.f:0 "\"I remember when the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] welcomed us to class. We did not know what a book was, much less a school. Not even the priest could read. Yet this ruler, for all the talk of war, fancied himself a teacher of sorts. He spoke of a nation and of pride. I do not know what all that meant, but I felt then that something had begun. The first buds of a tree in a garden that may yet endure.\""
 bandit_state_formation.11.a:0 "[ROOT.GetCountry.GetRuler.GetSheHe|U] should organize the curriculum."
 bandit_state_formation.11.b:0 "[ROOT.GetCountry.GetRuler.GetSheHe|U] could personally train more teachers."
 mon_state_school_helper:0 "This will significantly increase the nation's literacy over time"
 bandit_state_formation.11.c:0 "[ROOT.GetCountry.GetRuler.GetSheHe|U] will ensure the children learn to fight."
 bandit_state_formation.12.t:0 "Taxes?"
 bandit_state_formation.12.d:0 "After years of resisting outside collectors, the people of [ROOT.GetCountry.GetNameNoFlag] remain distrustful of paying levies, even when those funds are meant for the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 bandit_state_formation.12.f:0 "\"So the ruler is robbing us?\"\n\"No, the ruler is taxing us.\"\n\"What is the difference?\"\n\"Taxes are supposed to be spent for our benefit.\"\n\"So they will give us grain, or fix our roofs?\"\n\"No. If we do not pay, armed men will come and take it.\"\n\"Then the ruler is still robbing us!\""
 bandit_state_formation.12.a:0 "Agree to ease the taxes gradually."
 bandit_state_formation.12.b:0 "Hear out everyone's concerns."
 bandit_state_formation.12.c:0 "Threaten those who resist."
 bandit_state_formation.12.e:0 "\"No, not taxes. I said axes!\""
 bandit_state_formation.17.t:0 "Conquered!"
 bandit_state_formation.17.d:0 "Our realm, [ROOT.GetCountry.GetName], has been reduced to vassalage under [SCOPE.sCountry('new_overlord').GetAdjective] overlords."
 bandit_state_formation.17.f:0 "#italic How bitter the day when our banners fall, \n when strangers govern hearth and field. \n We lift our eyes to distant heroes, \n yet none return us freedom's light.#! \n\n–A lament from the countryside"
 bandit_state_formation.17.a:0 "We must appeal to other nations."
 bandit_state_formation.17.b:0 "If you cannot beat them, join them."
 event_effects_bandit_state_formation.17_tt:0 "The bandit coalition has collapsed. Their raids will cease for now."
 jux.1.t:0 "Gone but not Forgotten"
 jux.1.d:0 "Although on the fringe of the old #bold Cicaorin Republic#!, we are still [GetCulture('akmuociai').GetName] and it is our ancient duty to not just resist, but to recover our long lost realm."
 jux.1.f:0 "#italic But of the other chants, the one that touches me most \n is the one from Juxjthraaria, with its strange language, \n and the sorrow of those distant Akmuociai \n who perhaps still believed that we would yet be saved. \n\n But alas, a fateful bird comes from the city \n with a document under its wing \n alighting neither in the vineyard nor the orchard \n it went and settled in the roots of a cypress tree. \n The high priests can’t read it out. \n The son of the widow Svux takes the paper \n and reads it out and laments \n \"Let it be read, let it be mourned, let your heart be broken. \n Woe to us, alas for us Yaasksvorhaaj has been captured.\"#! \n\n —the last verses of Captured, a poetic song by Chmaj Chmaeok"
 jux.1.a:0 "Though it has passed, another will come and flourish"
 jux.2.t:0 "Juxthraaria Restored"
 jux.2.d:0 "We have reclaimed the old province of Juxthraaria. Zinj-Zuun exists no longer."
 jux.2.f:0 "The port of Mrajflej, a vital seaport in Strugova, underwent a profound transformation. Once known as Athhij in the past, where Consul Maothaa Dao first set foot, and famed sculptor Yunk Ashra left their mark, the city of Mrajflej has endured centuries of Ogre and Goblin rule. [GetCulture('akmuociai').GetName] soldiers entered the city after our fleet, spearheaded by Admiral [SCOPE.sCharacter('admiral_scope').GetFullName], sailed into the bay of Mrajflej. \n\nWith precision and resolve our forces wrested the city from Zuuni control, marking a pivotal moment in the conflict. This victory was part of a broader [GetCulture('akmuociai').GetName] and [GetCulture('pabardian').GetName] push that rolled back [GetCulture('dales_togrul').GetName] advances. Completing the encirclement of all remaining enemy forces in Juxjthraaria."
 jux.2.a:0 "Our home secure"
 jux.3.t:0 "Unrest Brewing"
 jux.3.d:0 "Juxjthraaria has seen a surge in nationalistic sentiment, spreading across the local [GetCulture('akmuociai').GetName] as well. We need to be wary of our eastern border, as well as any potential unrest within our domain."
 jux.3.a:0 "We are ready to prove ourselves"
 jux.4.t:0 "A Failed Experiment"
 jux.4.d:0 "Zinj-Zuun has fallen, an experiment by Emperor Goro showing an utter failure by the [GetCulture('dales_togrul').GetName] to govern our outer reaches in our name. No longer will we trust them to manage our affairs."
 jux.4.a:0 "Disgraceful"
 jux.5.t:0 "Cicaor Ascendant"
 jux.5.d:0 "It has been done, [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName] has lead our first assembly in our ancient halls to make it official. [ROOT.GetCountry.GetNameNoFlag] stands once more."
 jux.5.f:0 "#italic The recent developments have stunned the world for the magnitude of the events that no judgment could foresee. We had always proclaimed our right to Yaasksvorhaaj highly, and in the face of the latest resolutions, to which love of the country led me, I believed it my duty to convene the national assemblies. With Yaasksvorhaaj capital of Cicaor, I maintained my promise and crowned the undertaking.\n\nMy heart as [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] feels a solemn joy in greeting all the representatives of our beloved homeland gathered here for the first time, and in pronouncing these words: Cicaor is free and one, now it depends on us to make her great and happy.#!\n\n —transcript of the opening speech to the assembly by [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName]"
 jux.5.a:0 "Our People united, our Home safeguarded"
 thalorian_crusade.5.t:0 "Thaloriaʼs Final Stand"
 thalorian_crusade.5.d:0 "[SCOPE.sCountry('ravik_scope').GetAdjective] armies gather at our borders. [ROOT.GetCountry.GetName] now faces its darkest hour. We must endure, or see the realm fall."
 thalorian_crusade.5.f:0 "Thaloria was once the envy of West Zalaron, a realm whose wealth and influence its neighbors could scarcely rival. Yet half a century after the Nightfall, the Empire now finds itself diminished. Territories have been lost, rivals emboldened, and what was once a proud dragon of the west now fights simply to endure.\n\n[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName] is a flawed ruler, and many still remember how his hesitation during the Second Crusade allowed Northern Thaloria to slip from imperial grasp. The stain of that failure has followed the [ROOT.GetCountry.GetRuler.GetLastName] dynasty ever since. Yet now, with the servants of Hasal advancing, he seeks redemption. If the Lady's blessing still rests upon Thaloria, it must be proven in this hour of trial. Whatever the cost, the Empire must stand."
 thalorian_crusade.5.a:0 "For the Empire we must endure!"
 thalorian_crusade.5.tooltip:0 "#bold #red Our war preperations were incomplete, the stockpiles won't last for long!#!#!"
 thalorian_crusade.6.t:0 "Heroes of Gnomehome"
 thalorian_crusade.6.d:0 "The Third Crusade begins, and [ROOT.GetCountry.GetName] marches under Hasal's banner."
 thalorian_crusade.6.f:0 "For centuries the Gnomes of Zalaron have endured repeated setbacks at the hands of the humans of Varinath. Defeat, displacement, and subjugation became a familiar pattern, and many believed it only a matter of time before Gnomekind existed solely under the rule of foreign overlords. Yet the coming of the [concept_nightfall] and the revelations of Hasal have unsettled that assumption.\n\nThrough the practice of necromancy, Gnomekind has begun to turn the tide against its long-standing rivals. Across the groves and settlements of the Gnomish world, old certainties are giving way to new convictions. Faith in Druidism wanes, while the [GetReligion('creed_of_hasal').GetNameNoIcon] spreads steadily among Gnomish communities. Should these victories endure, Hasal's teachings may well shape the foundations of the emerging Gnomish nations."
 thalorian_crusade.6.a:0 "Hasal has given us another chance. We must not squander it."
 thalorian_crusade.6.tooltip:0 "Losing the 3rd Crusade, unlikely though it may be, would have #bold #red disastrous#!#! political ramifications..."
 roe_migration.1.t:0 "Come to [ROOT.GetCountry.GetNameNoFormatting]"
 roe_migration.1.d:0 "Drawn by promises of shelter, pay, and fresh opportunity, [SCOPE.sCulture('migration_culture').GetName] people from [SCOPE.sCountry('migration_country').GetName] have begun to migrate to the frozen reaches of [SCOPE.sState('migration_target_state').GetName]."
 roe_migration.1.f:0 "#Bold STEEL IN THE SNOW#!\n\nUntapped mines beneath the ice!\n\nFisheries along endless frozen coasts!\n\nForge-towns hungry for strong backs and steady hands!\n\n#italic [ROOT.GetCountry.GetNameNoFormatting] welcomes all settlers to the Everfrost. No taxes, no tariffs, no burdens upon arrival. Ample food, paid lodging and work for any who endure the cold.#!"
 roe_migration.1.a:0 "Welcome to [ROOT.GetCountry.GetNameNoFormatting]!"
 is_in_europe_tt:0 "Is in Europe"
 is_in_sa_tt:0 "Is in the Everfrost"
 same_state_religion:0 "Shares our [concept_state_religion]"
 sanctum_timer_tt:0 "We will have 5 years before we will be expected to own [SCOPE.sState('zahrafi_state').GetName]"
 roe_migration.2.t:0 "Settling the Everfrost"
 roe_migration.2.d:0 "[ROOT.GetCountry.GetName] holds a vast northern frontier, rich in ores and promise. Yet it remains perilously underpopulated. We must look beyond the seas for hardy settlers."
 roe_migration.2.f:0 "The government will encourage immigration and shall not impede, tax or burden the entry to [ROOT.GetCountry.GetAdjectiveNoFormatting] lands of foreigners who seek to cultivate the tundra, fuel the forges and bring their sciences and crafts to the frontier."
 roe_migration.2.a:0 "Bring us your bold, your strong, your fearless wanderers."
 roe_migration.2.b:0 "We can carve our own path through the ice."
 roe_migration_cancel_tt:0 "The #Bold Settling the Everfrost#! [concept_journal_entry] is removed"
 roe_migration_button_exists_tt:0 "The #Bold Promote Northern Migration#! Button is available in the #Bold Settling the Everfrost#! [concept_journal_entry]"
 roe_migration_tt:0 "Every [concept_incorporated_state] in the Everfrost gets:\n#tooltippable Taming the North#!\n#P +25.00%#! [concept_migration_pull]"
 roe_migration_completion_tt:0 "Our #variable Everfrost#! incorporated states have met our target population"
 roe_migration.3.t:0 "Many, as Snowflakes"
 roe_migration.3.d:0 "The Everfrost is teeming with life and laborers now, thanks to our campaign to attract settlers and grow our people."
 roe_migration.3.f:0 "\"Strange accent you have, friend. Worry not: I am Cerunite. The frost cares little for our old worlds.\"\n\n\"Varyngian here. My companion is an Achonite. We crossed the sea beside a Dorite.\"\n\n\"Ah, speaking of which, that Dorite just went through the ice trying to prove the lake melts slower up here. I shall fetch him. Cerunite, shall we drink later, once our limbs thaw?\""
 roe_migration.3.a:0 "Our voices carry across the tundra."
 roe_migration.5.t:0 "The Great Flight"
 roe_migration.5.d:0 "The Dragonblight epidemic in [SCOPE.sCountry('migration_country').GetName] has driven entire communities to flee before its curse claims them. Many now see settlement in [SCOPE.sState('migration_target_state').GetName] as their last hope of escaping the sickness and preserving their identities as [SCOPE.sCulture('migration_culture').GetName]."
 roe_migration.5.f:0 "Citizens with unblemished scales, healers, tradesfolk, and battered militia veterans shuffled down the ramps of the latest arkship. Tens of thousands had already taken refuge from the Dragon Isles, desperate to avoid the creeping kobold-curse, and tens of thousands more prepared to follow. Thassarcia needed willing hands to till its soil and forge its future. The Golden Spires were not raised in a day, and neither will be the new cities built under the watch of the goldborn."
 roe_migration.5.a:0 "More refugees are an opportunity to strengthen our realm."
 roe_migration.5.b:0 "We must restrain the tide of arrivals."
 gulag_system.7.t:0 "Snowmelt over Black Iron"
 gulag_system.7.d:0 "After years of controversy and unrest, the forced labor regime in the Everfrost gulags has been formally dismantled. The decree signals a new direction for [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 gulag_system.7.f:0 "#bold The Camps Grow Quiet#!\nThe frostbitten watchtowers stand unmanned for the first time in living memory. Administrators shutter the barracks, prisoners gather their few belongings, and the last shipments of ore from the ice quarries cease. Letters travel south and east, spreading the news that the gulags of Everfrost have been closed. There are questions of what comes next, but for those who once marched through barbed gates, the silence itself is victory enough."
 gulag_system.7.a:0 "Forward, toward a freer future."
 gulag_system.7.b:0 "We must rebuild what was broken."
 unfettered_pride_modifier:0 "End of the Camps"
 less_racist_brazil_modifier:0 "Labor Reconciliation"
 old_order_upset_positive:0 "Reformist Champions"
 old_order_upset_negative:0 "Penal Establishment Resentment"
 black_guard_male_modifier:0 "Disbanded Wardens"
 black_guard_female_modifier:0 "Disbanded Wardens"
 gulag_system.8.t:0 "Gulag Prisoners Refuse to Work in [SCOPE.sState('gulag_state_scope').GetNameNoFormatting]"
 gulag_system.8.d:0 "Protesting starvation rations and violent wardens, prisoners of the [SCOPE.sBuilding('gulag_camp_scope').GetName] in [SCOPE.sState('gulag_state_scope').GetName] have stopped working, offering return only if conditions improve."
 gulag_system.8.f:0 "\"Before we lift a tool again, daily quotas will be reduced to no more than five sled crates per man. Work brigades will be overseen by elected foremen from our own barracks.\n\nWe also demand two rest days per cycle so we may forage beneath the river ice and grow turnips behind the fence. Let the burial of waste and the latrine trenches fall to the convicts who came from the coast.\""
 gulag_system.8.a:0 "Offer #italic some#! concessions. Production must continue."
 gulag_system.8.b:0 "Negotiation is a reward for the loyal. Denied."
 gulag_system.8.c:0 "There are more bodies on the way. Replace them."
 slave_shortages_modifier:0 "Labor Shortages"
 masters_upset_over_concessions:0 "Wardens Upset Over Concessions"
 unrestrained_masters:0 "Unrestrained Wardens"
 gulag_system.9.t:0 "Prisoners Suspected of Sabotage"
 gulag_system.9.d:0 "Severe slowdowns in the [SCOPE.sState('slowdown_gulag_state_scope').GetName] [SCOPE.sBuilding('slowdown_gulag_scope').GetName] have been blamed on deliberate sabotage by inmates."
 gulag_system.9.f:0 "Some burdens cannot be made to obey: the frozen wind, the dark of winter, and the earth that refuses to yield. What can be bent the length of a shift, the number of blows to a back is never examined so closely as the labor of the prisoner.\nAnd when the body breaks from hunger or cold, the overseer reaches for the baton as the only answer."
 gulag_system.9.a:0 "Punishment will be issued until order is restored."
 gulag_system.9.b:0 "They will fall in line. Eventually."
 gulag_system.9.c:0 "A free workforce would have reason to perform."
 plantation_slowdowns_slavery_modifier:0 "Gulag Slowdowns"
 widespread_slave_abuse:0 "Camp Brutality"
 gulag_system.10.t:0 "Prisoners Escape from [SCOPE.sState('escape_gulag_state_scope').GetNameNoFormatting] Gulags"
 gulag_system.10.d:0 "Prisoners from the [SCOPE.sBuilding('escape_gulag_camp_scope').GetName] in [SCOPE.sState('escape_gulag_state_scope').GetName] have disappeared, suspected of fleeing into the frozen tundra to join secret settlements beyond state control."
 gulag_system.10.f:0 "\"Commissar, we are missing prisoners. Seven failed to report at roll call. No one saw them leave. Three men, two women, and a boy and a girl.\"\n\n\"Any assets of value? Labor is replaceable.\"\n\n\"One of the strongest cutters. And the woman was the one your wife favored in service. Shall I send the hounds?\""
 gulag_system.10.a:0 "Assemble hunting brigades at once."
 gulag_system.10.b:0 "Increase security so it never happens again."
 gulag_system.10.c:0 "Thank the central bureau for the convict shipments from [SCOPE.sState('escape_gulag_state_scope').GetCityHubName]."
 disastrous_slave_hunt:0 "Disastrous Gulag Hunt"
 quilombo_destroyed_modifier:0 "Settlement Destroyed"
 slave_purchases_modifier:0 "New Convict Transports"
 gulag_system.13.t:0 "A Necessary Institution"
 gulag_system.13.d:0 "Backed by powerful state officials, the ban on forced labor camps has been repealed, legally restoring the gulag network despite international condemnation."
 gulag_system.13.f:0 "\"Why should outsiders dictate the reality of our borders? If [SCOPE.sCountry('anti_gulag_great_power_scope').GetNameNoFormatting] claims camps do not suit them, so be it, but must we submit to the decrees of a [SCOPE.sCountry('anti_gulag_great_power_scope').GetAdjectiveNoFormatting] [SCOPE.sCountry('anti_gulag_great_power_scope').GetRuler.GetPrimaryRoleTitle|l]? Or is it still [SCOPE.GetRootScope.GetCountry.GetRuler.GetPrimaryRoleTitle] [SCOPE.GetRootScope.GetCountry.GetRuler.GetFullNameNoFormatting] who commands these lands?\""
 gulag_system.13.a:0 "Once more we choose the necessary path."
 vae_gulag_pariah_modifier:0 "Institutionalized Gulags"
 communism.67.t:0 "Cultural Reckoning"
 communism.67.d:0 "Symbols of the old world are removed from civic life, and those who cling to superstition or tradition find themselves increasingly isolated from power."
 communism.67.f:0 "\"A society cannot be reborn while it kneels before the dead. The past must be stripped of its authority, so the future may belong to all.\""
 communism.67.a:0 "The old world has no place here."
 communism.68.t:0 "Rectification Campaign"
 communism.68.d:0 "The [SCOPE.gsInterestGroup('new_vanguard_ig').GetName] has undergone a process of ideological rectification."
 communism.68.f:0 "\"Revolution does not end with the seizure of power. It must be renewed again and again, sweeping away old habits, old ideas, and old loyalties wherever they reassert themselves. To preserve equality, the collective must dare to break with tradition.\""
 communism.68.a:0 "Approve the campaign."
 communism.68.b:0 "Limit its scope."
 panopticon_events.1.t:0 "The Eye Opens"
 panopticon_events.1.d:0 "With the completion of the Panopticon, the state acquires a new instrument of internal administration."
 panopticon_events.1.f:0 "The final reports are submitted, the ledgers bound, and the observation chambers placed under permanent watch. Clerks and inspectors are assigned fixed rotations, their duties narrowly defined and meticulously recorded. What was once fragmentary intelligence is now centralized, standardized, and indexed for immediate reference.\n\nNo proclamation accompanies the opening of the Panopticon. No new law is announced. Yet its presence is felt. Petitions are worded more carefully. Meetings disperse earlier. Certain gatherings simply cease to occur."
 panopticon_events.1.a:0 "[ROOT.GetCountry.GetRuler.GetFullName] will personally oversee the operations."
 panopticon_events.1.b:0 "[ROOT.GetCountry.GetNameNoFlag] shall watch over all of its citizens."
 panopticon_events.2.t:0 "Avert Your Eyes"
 panopticon_events.2.d:0 "The project has lost public and bureaucratic support. Fear of changelings is no longer enough to justify such sweeping measures."
 panopticon_events.2.f:0 "Petitions, objections, and informal memoranda circulate through the ministries. Concerns are raised regarding the scope of the project, its expense, and the consequences of extending observation into daily life. What was once justified as a temporary security measure is increasingly treated as an overreach.\n\nThe Panopticon had been ambitious, even audacious. Yet ambition is no shield against consensus. Without support, the plans stagnated. The eye that was never opened remains only on paper, a blueprint of authority the nation refused to grant."
 panopticon_events.2.a:0 "Abandon the project entirely before it breeds more opposition."
 panopticon_events.2.b:0 "Try to salvage the initiative through propaganda and reassurance."
 modifier_unrest_within_the_oculus:0 "Skepticism in the Bureaucracy"
 modifier_concern_over_intrusive_inspection:0 "Public Opposition to the Panopticon"
 modifier_panopticon_discredited:0 "Panopticon Project Discredited"
 panopticon_events.5.t:0 "Shadows of an Idea"
 panopticon_events.5.d:0 "The Panopticon project has been formally abandoned, leaving its planners sidelined and its offices emptied of purpose."
 panopticon_events.5.f:0 "Plans are gathered, reports filed, and keys returned. For months, officials had labored over construction, weighing magical channels, scrying arrays, and the implications of constant surveillance. Now the effort is ended. The offices are silent, the project halted before a single lens was ever focused.\n\nPlanners move on to other duties, their authority diminished, their proposals remembered only as an ambitious plan that the public would not tolerate. The state has chosen caution over control, and the Eye, though conceived, will never see the light of day."
 panopticon_events.5.a:0 "Keep remnants as a reference for future projects."
 panopticon_events.5.b:0 "Reassign the staff quietly."
 panopticon_events.5.c:0 "Destroy all documents and plans."
 modifier_ocular_system_remnant_1:0 "Legacy of an Unbuilt Eye"
 modifier_ocular_system_remnant_2:0 "Legacy of the Never-Opened Lens"
 modifier_opening_up_civic_space:0 "Opening Up Civic Space"
 caused_by_liberal_or_socialist_movement_tt:0 "[Concept('concept_revolution', '$concept_revolutionary$')] [concept_political_movement] is #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#!"
 dark_morass.1.t:0 "Bogged Down Paradise"
 dark_morass.1.d:0 "Within our borders lie vast stretches of the Dark Morass, a sodden expanse of peat, reed and stagnant pools said to hide veins of [SCOPE.sGoods('godsblood_scope').GetName]. Some praise its bleak beauty. Others see only wasted land — rich in potential and awaiting the discipline of surveyors, engineers and capital."
 dark_morass.1.f:0 "\"Take this down: before us stretches a kingdom of mud and whispering waters. The ground trembles beneath our boots, yet beneath that treacherous skin lies the very blood of the divine — a prize worth the effort. We shall bind these waters with earthworks and embankments. We shall force them into channels of our choosing.\"\n\n\"Sir, the ink is running. The humidity—\"\n\n\"Then write faster. The Morass will not conquer itself.\""
 dark_morass.1.a:0 "Fortune favors those who stand on solid ground."
 dark_morass.1.tt:0 "... and those who make it."
 dark_morass.2.t:0 "The Treaty of Blackwater Reach"
 dark_morass.2.d:0 "After prolonged deliberations, an agreement has been reached between the [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] and the [SCOPE.sCountry('bolivia_border_treaty_country_scope').GetAdjective] delegations, delineating the border between our two nations in [SCOPE.sState('dark_morass_state_scope').GetName] and apportioning newly reclaimed lands rich in Godsblood deposits to [SCOPE.GetRootScope.GetCountry.GetNameNoFlag]."
 dark_morass.2.f:0 "With a final signature, the treaty bound both governments to a new line across the Morass. Fresh maps were commissioned at once, tracing embankments, drainage basins and surveyed ridges that follow the veins of [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting].\n\nOf course, while they agreed on paper, nobody quite knew where the true edge of the Morass lay. In a land that shifts with every season, the border would be as firm as the soil beneath it."
 dark_morass.2.a:0 "In good faith, we sign."
 morassic_indemnities_1:0 "Blackwater Treaty Indemnity"
 morassic_indemnities_recipient_1:0 "Blackwater Treaty Indemnity"
 dark_morass.3.t:0 "The Treaty of Greyfen"
 dark_morass.3.d:0 "After intense negotiations, an agreement has been reached between the [SCOPE.GetRootScope.GetCountry.GetAdjectiveNoFlag] and the [SCOPE.sCountry('colombia_border_treaty_country_scope').GetAdjective] delegations, settling competing claims over the richest swathes of the Dark Morass and the networks of drainage canals, pumping stations, and Godsblood extraction works."
 dark_morass.3.f:0 "\"South of the Old Weir and east of the triple canal. North of there, the peat ridge marks the boundary. You will find it equitable.\"\n\n\"And what of the pumping stations drawing [SCOPE.sGoods('godsblood_scope').GetName]? You cannot expect us to abandon them.\"\n\n\"Shared maintenance, then. Let us not quarrel over mud and arcane ichor when there is profit to be had from both.\""
 dark_morass.3.a:0 "Let the seals be set."
 morassic_indemnities_2:0 "Greyfen Treaty Indemnity"
 morassic_indemnities_recipient_2:0 "Greyfen Treaty Indemnity"
 dark_morass.4.t:0 "[SCOPE.sState('dark_morass_state_scope').GetCityHubName], Jewel of the Morass"
 dark_morass.4.d:0 "Fuelled by profits from the burgeoning [SCOPE.sGoods('godsblood_scope').GetName] industry, the settlement of [SCOPE.sState('dark_morass_state_scope').GetCityHubName] in [SCOPE.sState('dark_morass_state_scope').GetName] has risen from the bog as a major commercial center, sporting raised causeways, brick-lined canals and amenities yet unheard of in the wetlands."
 dark_morass.4.f:0 "#bold Black Gold from Dirt#!\nThe burgeoning [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] trade, pumped from the very bowels of the Dark Morass, has given [SCOPE.sState('dark_morass_state_scope').GetCityHubName] a stable economic foundation. While grain and timber are the lifeblood of other parts of [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting], the arcane potency of [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] has allowed other industries to flourish. Alchemists, artificers and chimerists alike are performing new miracles with this strange ichor... (cont'd pp. 68-9)"
 dark_morass.4.a:0 "Drain the ichor dry — build new estates upon [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting]."
 dark_morass.4.b:0 "Pump the waters back! We shall raise a proper city."
 morass_hub_modifier:0 "Jewel in the Rough"
 great_pumping_works_modifier:0 "Great Pumping Works"
 godsblood_baron_estates_modifier:0 "Godsblood Baron Estates"
 dark_morass_development_cooldown_modifier:0 "Draining the Morass"
 morass_migration:0 "Migration to the Dark Morass"
 dark_morass.5.t:0 "A City Raised from the Mire"
 dark_morass.5.d:0 "Once little more than a scattering of huts upon stilts, [SCOPE.sState('dark_morass_state_scope').GetCityHubName] now stands upon layers of dredged earth and driven piles. Godsblood Barons compete to raise ever grander structures above the damp air."
 dark_morass.5.f:0 "In [SCOPE.sState('dark_morass_state_scope').GetCityHubName], excess is an act of defiance. The Godsblood Barons are a competitive sort, and any new extravagance becomes an arms race of indulgence. Marble imported at ruinous expense crowns buildings that still settle by the inch. Gas lamps cut through the ever-present mist. One could almost forget that beneath the cobbles lies the old swamp, pulsing like an open wound."
 dark_morass.5.a:0 "A grand playhouse shall crown the mire — let them hear applause above the croaking of frogs!"
 dark_morass.5.b:0 "What is a city without light? String lanterns through the fog and banish the darkness!"
 morass_city_of_lights_modifier:0 "Lanterns in the Mist"
 morass_theatre:0 "Playhouse of the Mire"
 dark_morass.6.t:0 "An Outpost on Firm Ground"
 dark_morass.6.d:0 "Nestled within the shifting wetlands of [SCOPE.sState('amazon_development_level_one_state_scope').GetName], the settlement of [SCOPE.sState('amazon_development_level_one_state_scope').GetCityHubName] has grown alongside new canals and embankments into a vital hub of [SCOPE.sGoods('godsblood_scope').GetName] extraction and transport."
 dark_morass.6.a:0 "... and the Godsblood Barons require more labor."
 dark_morass.6.b:0 "Their business acumen shall see [SCOPE.sState('amazon_development_level_one_state_scope').GetCityHubName] thrive."
 morass_entrepot_modifier:0 "Godsblood Entrepot"
 godsblood_barons_modifier:0 "New Godsblood Barons"
 morass_harbingers_of_order_modifier:0 "Harbingers of Order"
 morass_heralds_of_progress_modifier:0 "Heralds of Progress"
 dark_morass.7.t:0 "Lines Across the Mire"
 dark_morass.7.d:0 "Like stitches across torn fabric, canals, rail spurs and raised roads now crisscross [SCOPE.sState('amazon_development_level_two_state_scope').GetName], binding once-isolated wetlands into a coherent network of industry and settlement."
 dark_morass.7.f:0 "\"The Morass bends to geometry. We have drawn lines across chaos itself. No bog, no mist, no whispering pool shall halt the march of order.\"\n\n\"Sir, the northern embankment has subsided again.\"\n\n\"Then we shall raise it higher.\""
 dark_morass.7.a:0 "We impose order upon the waters."
 dark_morass.7.b:0 "Progress rises from the mud."
 harbingers_of_reclamation_modifier:0 "Harbingers of Reclamation"
 masters_of_the_mire_modifier:0 "Masters of the Mire"
 dark_morass.8.t:0 "Little by Little"
 dark_morass.8.d:0 "Godsblood Barons, local authorities and elements of the [SCOPE.gsInterestGroup('devout_scope').GetName] debate the proper future of the [SCOPE.sCulture('amazonian_culture_scope').GetName] peoples of [SCOPE.sState('amazon_indian_exploitation_state').GetName]. All agree the Morass must change. They disagree on who should change with it."
 dark_morass.8.f:0 "The old ways clung to the reeds and the fog. Children were taught to walk the marsh without sinking, to read the water by its color and scent. Now canals slice through ancestral grounds, and bells summon them to schools built on piled earth. Some see salvation. Others see only loss."
 morass_assimilation_modifier:0 "Put to School"
 morass_exploitation_modifier:0 "Put to Work"
 morass_devout_upset:0 "Sermons in the Fog"
 morass_landowners_upset:0 "Delayed Reclamation Targets"
 dark_morass.9.t:0 "The Morass Line"
 dark_morass.9.d:0 "Workers on the [SCOPE.sBuilding('morass_railroad').GetName] in [SCOPE.sState('morass_railway_state').GetName] are dying in droves. The bog swallows pilings whole, [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] fumes choke the air, and beasts warped by the ichor drag men screaming from the embankments at night."
 dark_morass.9.f:0 "\"Every sleeper is a coffin lid. We hammer them down by day and pray the things beneath the water do not pull us under by night. Last week a bull-lizard the size of a cart horse came up through the foundation trench. Its hide was slick with [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] and its eyes glowed like forge-coals. Four men it took before we brought it down.\""
 dark_morass.9.a:0 "Drive the rails through, whatever the cost."
 dark_morass.9.b:0 "Slow the work. We cannot throw lives into the bog."
 dark_morass.9.c:0 "Post armed guards and reinforce the embankments."
 morass_devils_railroad:0 "The Fiend's Embankment"
 morass_slowed_railway:0 "Halted Construction"
 morass_cautious_railway:0 "Reinforced Embankments"
 dark_morass.10.t:0 "The Godsblood Pits"
 dark_morass.10.d:0 "Workers at the [SCOPE.sBuilding('morass_rig_building').GetName] in [SCOPE.sState('morass_rig_state').GetName] are suffering unspeakable cruelty. Overseers drive them into flooded extraction shafts without protection, and those who fail to meet quotas are left on the bog's edge at dusk — where the [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting]-twisted creatures prowl."
 dark_morass.10.f:0 "“They told us the wells were safe. They are not. The [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] seeps through everything — skin, cloth, bone. I have seen men's fingers fuse together. I have seen a foreman feed a boy to the mire because he spilled a barrel. When we begged for gloves, they laughed and said the dead don't need them.”"
 dark_morass.10.a:0 "Production must not falter."
 dark_morass.10.b:0 "Send inspectors to the rigs at once."
 dark_morass.10.c:0 "The overseers will answer for their crimes."
 dark_morass.11.t:0 "Legend of the Gultavun"
 dark_morass.11.d:0 "An adventuring party in [SCOPE.sState('gultavun_state').GetName] has stumbled upon a swamp with confusing magical properties."
 dark_morass.11.f:0 "”The orcs here have a word ”Gultavun” which translates, approximately, as ”the place where the swamp returns its gifts”. They use it without particular alarm, the way one might refer to a difficult stretch of road or a market that overcharges.\n\nThe rangers and I spent three weeks in the lowest reaches documenting the gultavun phenomenon and I am prepared to report that: the bog does give things back; they are changed. Most interesting is the case of a deceased half-elf woman given to the bog; the body was returned two days later, perfectly preserved save for that the corpse had now taken on a number of orcish features.\n\nWe left the bog, because burning a bog requires resources my current entourage does not encompass. We have submitted a request for assistance. We expect it to be declined.”"
 dark_morass.11.a:0 "Approved. Drain this cursed swamp."
 dark_morass.11.b:0 "Declined. We will not be bogged down with these tall tales."
 morass_rig_mistreatment:0 "Godsblood Cruelty"
 morass_rig_slowdown:0 "Investigating the Pits"
 morass_rig_protections:0 "Rig Worker Protections"
 positivism.2.t:0 "The Rational Reformation"
 positivism.2.d:0 "[SCOPE.sCharacter('positivist_agitator').GetFullName], once trained in the druidic tradition, has founded a Hasalian chapter in [SCOPE.sState('positivist_church_state').GetName], preaching that nature is a system to be understood and refined rather than merely revered."
 positivism.2.f:0 "Under boughs once sacred to wandering rites, diagrams were now pinned beside pressed leaves. The old druids spoke of listening to the wind. The Hasalians spoke of charting it. Where once there were invocations, now there were lectures. Nature, they insisted, does not whisper. It operates.\n\nAnd what operates can be improved."
 positivism.2.a:0 "An intriguing reform."
 positivism.2.b:0 "They reduce the sacred to schematics."
 positivism.3.t:0 "The Hasalian Reformation"
 positivism.3.d:0 "Hasalian doctrine has taken root among the educated classes of [ROOT.GetCountry.GetName], reshaping druidic thought toward disciplined inquiry and institutional reform."
 positivism.3.f:0 "\"We were taught that the forest lives,\" the speaker began. \"Very well. Then let us study its pulse. We were taught that rivers remember. Then let us chart their memory in ink. Reverence without understanding is stagnation. Understanding is the highest form of reverence.\"\n\nThe applause came not from wandering mystics, but from surveyors, officers, and machinists."
 positivism.3.a:0 "Understanding is the next stage of faith."
 positivism.3.b:0 "The old ways need not be discarded so quickly."
 positivism.4.t:0 "A Doctrine in Retreat"
 positivism.4.d:0 "Hasalian thought has begun to lose influence in [ROOT.GetCountry.GetName] as traditional druidic circles reassert the primacy of ritual and communion with the living world."
 positivism.4.f:0 "The lecture hall stood quiet. Where once chalkboards bore geometric renderings of root systems and irrigation flows, only faint outlines remained. Outside, an older druid resumed the evening rite beneath the trees.\n\nOne listens. The other measures."
 positivism.4.a:0 "The pendulum swings back to reverence."
 positivism.4.b:0 "They mistook method for meaning."
 positivism_pulse.1.d:0 "Hasalian teachings have spread beyond formal assemblies, with many [GetPopType('engineers').GetName], [GetPopType('academics').GetName], and [GetPopType('officers').GetName] embracing its systematic view of the natural world."
 positivism_pulse.2.d:0 "Hasalian belief that even nature obeys discoverable principles has gained popularity within the [SCOPE.gsInterestGroup('armed_forces_ig').GetName], encouraging a more calculated approach to warfare."
 positivism_pulse.2.f:0 "The forest is no longer consulted for signs before a campaign. It is surveyed. Wind direction is calculated, supply lines diagrammed, artillery arcs plotted against elevation and humidity. If the natural world obeys laws, then war must as well.\n\nThe spirits of battle may fade. Efficiency remains."
 positivism_pulse.4.d:0 "Prominent Hasalian reformers have clashed with the elders of [GetReligion('gnomish_druidism').GetName] over whether disciplined inquiry should extend into open political agitation."
 positivism_pulse.5.t:0 "Hasalian Lecture Halls"
 positivism_pulse.5.d:0 "[GetReligion('creed_of_hasal').GetName] in [ROOT.GetCountry.GetNameNoFormatting] has petitioned to establish a new lecture hall in [SCOPE.sState('temple_of_humanity_state').GetName] dedicated to study, disputation, and applied reform."
 guild_syndicalism.1.t:0 "The New Commonwealth"
 guild_syndicalism.1.d:0 "Discontent with unrestrained capitalism and parliamentary stagnation has given rise to the [SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').GetName]. Its advocates argue that democracy must not end at the ballot box, but extend into the factory floor and counting house. They call for an Industrial Commonwealth in which organized producers govern their trades through guilds and cooperatives, subordinating capital to social purpose rather than speculation."
 guild_syndicalism.1.f:0 "\"Political liberty without economic power is but a shadow on the wall. What use is the vote to a man who must obey in the workshop? We do not seek chaos, nor the tyranny of party over nation. We seek order rooted in function, and representation rooted in work.\"\n\nThe pamphlet passed from hand to hand, its margins crowded with notes. In lecture halls and machine shops alike, the same question was beginning to echo: who truly governs industry?"
 guild_syndicalism.1.a:0 "Democracy must reach the factories."
 guild_syndicalism.1.b:0 "This threatens the existing order."
 guild_syndicalism.2.t:0 "The Commonwealth Realized"
 guild_syndicalism.2.d:0 "Through the efforts of the [SCOPE.sParty('guild_syndicalist_party_scope').GetName], [ROOT.GetCountry.GetName] has begun its transformation toward an Industrial Commonwealth. Guild charters are being drafted, cooperative ownership expanded, and new institutions devised to represent producers alongside parliament."
 guild_syndicalism.2.f:0 "The assembly hall was adorned with the emblems of trades. Engineers sat beside printers, masons beside machinists. When the charter was read aloud, there was no thunderous cheer, only a solemn murmur of assent.\n\nOutside, a foreman wiped his hands on an oil-stained rag and looked at the posted notice. \"So,\" he said quietly, \"we'll be choosing our own board now?\" His apprentice nodded.\n\nIt was not a revolution of barricades, but of bylaws."
 guild_syndicalism.2.a:0 "A Commonwealth of Producers."
 guild_syndicalism.2.b:0 "Let the guilds take responsibility."
 guild_syndicalism.3.t:0 "An Unfinished Vision"
 guild_syndicalism.3.d:0 "The [SelectLocalization(SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').IsValid, SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').GetName, 'movement_guild_syndicalist')] has failed to secure lasting reforms in [ROOT.GetCountry.GetName]. Though the language of industrial democracy lingers in pamphlets and union halls, the dream of an Industrial Commonwealth has, for now, receded."
 guild_syndicalism.3.f:0 "The storefront had already removed its painted sign. In the café across the street, a group of workers spoke in lower tones than before.\n\n\"It was a fine idea,\" said one, tracing a circle in spilled sugar. \"But perhaps we were too early.\"\n\nOutside, the factories continued their steady rhythm, unchanged. Yet somewhere in the clatter of steel and steam, the notion remained: that the workshop might one day govern itself."
 guild_syndicalism.3.a:0 "The old order endures."
 guild_syndicalism.3.b:0 "The Commonwealth will rise again."
 high_roost.1.t:0 "The Man in the High Roost"
 high_roost.1.d:0 "The [GetBuildingType('building_highroost').GetName] of [GetGeographicRegion('geographic_region_aritzakarri').GetName] now stands beneath our banner."
 high_roost.1.f:0 "The great majority of the Highroosts stand under our authority, some brought to submission and others restored after long abandonment. Their terraces are once again cultivated and their heights once more serve as the seats of power in the mountains.\n\nAmong the avian peoples of Aritzakarri, possession of the Highroosts has long carried a meaning beyond their walls. With most of them now answering to us, few can ignore the implication."
 high_roost.1.a:0 "The heights are ours."
 japan_events.1.t:0 "Letters for All"
 japan_events.1.d:0 "As modernist thinkers gain influence within the [ROOT.GetCountry.GetName], the limitations of the old courier system have become increasingly apparent. Whether through the dismantling of the feudal order or the spread of literacy among the population, the conditions now exist for a centralized postal service capable of supporting a modern state."
 japan_events.1.f:0 "Messengers, marked with the government seal, ran through the streets with their pouches, carrying an unusual amount of letters. In the capital, officials bent over maps, adjusting routes and counting stamps throughout the night. Merchants grumbled at the disruption of old courier networks, while curious children pressed their first letters into the new post boxes. The country, once divided by custom, was beginning to speak with one voice."
 japan_events.1.a:0 "Fully fund a national rollout."
 japan_events.1.b:0 "Focus on major urban centers."
 japan_events.1.c:0 "Rural areas take priority."
 japan_events.1.e:0 "Entrust the reform to [SCOPE.sCharacter('postal_reform_guy').GetFullName]."
 japan_events.1.g:0 "Preserve the old courier system."
 japan_single_fire_events_meji_postal_system_mod:0 "Meji Postal System"
 japan_single_fire_events_meji_stamping_out_chaos_mod:0 "Stamping out Chaos"
 japan_single_fire_events_meji_urban_only_mod:0 "Urban Postal Service"
 japan_single_fire_events_meji_rural_only_mod:0 "Rural Postal Service"
 japan_single_fire_events_meji_centralized_communications_mod:0 "Centralized Communication"
 japan_single_fire_events_enlightened_correspondence_mod:0 "Enlightened Correspondence"
 japan_single_fire_events_traditional_routes_preserved_mod:0 "Traditional Routes Preserved"
 japan_single_fire_events_displaced_by_postal_modernization_mod:0 "Displaced by Postal Modernization"
 japan_events.32.t:0 "Pictures of the Floating World"
 japan_events.32.d:0 "The work of a prolific elven artist in [SCOPE.sState('ukiyo_e_state').GetCityHubName] has inspired the imagination of artists both in [ROOT.GetCountry.GetName] and abroad."
 japan_events.32.f:0 "A popular woodblock print depicts the lively theatre district in the outskirts of [SCOPE.sState('ukiyo_e_state').GetCityHubName]. Silver moonlight shines down on the main street filled with people where their silhouettes cast shadows. The east side of the street is lined with teahouses and puppet theatres. Opposite, to the west, are three kabuki theatres with a drum tower above each.\n\n\"Only a master hand could make strokes so firm and true and so delicately shaded just where the shading should come. And only a master mind could conceive a figure so rhythmically organized throughout, so strong and at the same time so exquisitely dainty.\"\n— F.W.G., #italic Bulletin of the Art Institute of Chicago#!"
 japan_events.32.a:0 "No doubt [ROOT.GetCountry.GetAdjectiveNoFormatting] art will continue to gain global prominence."
 japan_events.32.b:0 "Excellent. Encourage the production for more of these works."
 bandit_state_formation.20.t:0 "A Kingdom Rises"
 bandit_state_formation.20.d:0 "With stability secured and the rule of law established, [ROOT.GetCountry.GetNameNoFlag] takes its next step: the formal proclamation of a monarchy."
 bandit_state_formation.20.f:0 "The banners are raised, the proclamation drafted. What was once a rough confederation of outlaws and frontiersmen now stands as a proper kingdom — however rough its edges may still be."
 bandit_state_formation.20.a:0 "Proclaim the kingdom within."
 bandit_state_formation.20.b:0 "Announce it to the world."
 bandit_state_formation.20.c:0 "Rally the army behind our new crown."
 bandit_state_formation.20.e:0 "Say nothing. Let them figure it out."
 blood_tribunal.5.t:0 "The Blood Tithe Flows"
 blood_tribunal.5.d:0 "Ravencliff's periodic harvest of tribute from its subjects proceeds as arranged."
 blood_tribunal.5.f:0 "The tributaries are gathered, processed, and returned. The machinery of the Blood Tribunals runs smoothly — for now."
 blood_tribunal.6.t:0 "The Tithe Redistributed"
 blood_tribunal.6.d:0 "The harvest from our subject peoples is redirected toward the most productive corners of the realm."
 blood_tribunal.6.f:0 "Workers and resources flow where Ravencliff directs them. The unseen hand of the tribunal shapes the labor of a dozen peoples without their knowledge."
 blood_tribunal.7.t:0 "The Tributaries Are Called"
 blood_tribunal.7.d:0 "Ravencliff calls upon its subject peoples once again."
 blood_tribunal.7.f:0 "Another year, another harvest. The tributaries comply — some willingly, most without a choice."
 dark_morass.6.f:0 "The settlement grows slowly but surely, carved from the wetlands by persistent labor. Canal networks crisscross the marsh, allowing boats to move goods where once only flat-bottomed skiffs could pass."
 dark_morass.8.a:0 "Expand extraction operations."
 dark_morass.8.b:0 "Support assimilation into the broader population."
 high_roost.2.t:0 "The Roost Stands Empty"
 high_roost.2.d:0 "The attempt to leverage guild power through the High Roost has fallen short."
 high_roost.2.f:0 "The guilds proved resistant to the kind of centralized control the initiative required. Without their cooperation, the High Roost sits half-organized — an aspiration without the machinery to realize it."
 high_roost.2.a:0 "We adapt. Strengthen what industrial capacity we have."
 high_roost.2.b:0 "Invest in internal security to prevent further obstruction."
 rimeroot_events.5.c:0 "We will hear what they have to say."
 rimeroot_events.6.c:0 "This was part of their grand design all along."
 veil_events.3.t:0 "The Veil Grows Thin"
 veil_events.3.f:0 "The boundary between worlds weakens. Strange lights dance along the horizon and compasses spin without purpose. Those sensitive to such things report voices carried on the wind."
 wingbreaker.5.t:0 "The Vats Come Online"
 wingbreaker.5.d:0 "The mutagen vats in [SCOPE.sState('argi_state').GetName] have been brought to full operation."
 wingbreaker.5.f:0 "The great iron cylinders hiss and bubble with arcane chemistry. Whatever emerges from Argi's vats will be... different."
 aritzakarri_events.4.c:0 "Unleash the secret police."
 zodiac_events.23.e:0 "This domain is ours to command!"
 orc_warband.1.t:0 "Winner takes all"
 orc_warband.1.d:0 "With the clans restless and [SCOPE.gsInterestGroup('challenger_ig').GetName] openly discontent, [SCOPE.sCharacter('challenger_leader').GetFullName] has gathered enough backing to force [SCOPE.sCharacter('deposed_ruler').GetFullName] from the high seat."
 orc_warband.1.f:0 "The brutal power contest consuming [ROOT.GetCountry.GetName] has claimed another victim. The high seat is never empty for long, and every challenger knows that today's champion may be tomorrow's offering."
 orc_warband.1.a:0 "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] is dead. Long live the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 orc_warband.2.t:0 "From on High"
 orc_warband.2.d:0 "[ROOT.GetCountry.GetRuler.GetFullName] has outlasted every challenger and proved that the banners can be bound beneath one command."
 orc_warband.2.f:0 "After years of fractured loyalties, feuding clans, and uncertain succession, [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] has emerged victorious from the tribal power struggle.\n\nFor the first time in years, the people dare to believe that tomorrow will resemble today."
 orc_warband.2.a:0 "Let them remember who stands above them."
 orc_warband.3.t:0 "A Throne Unclaimed"
 orc_warband.3.d:0 "A throne passed hand to hand becomes less a symbol than a trophy."
 orc_warband.3.f:0 "No chief has secured the obedience of the tribes. The old contest for rule has settled into a bitter rhythm, with each claimant strong enough to deny the others, yet none strong enough to command the whole."
 orc_warband.3.a:0 "The realm remains divided."
 event_effects_orc_warband.2_tt:0 "• [ROOT.GetCountry.GetRuler.GetFullName] gets #tooltippable;tooltip:[GetPlayer.GetTooltipTag],orc_warband_king_of_the_hill_tt $orc_warband_king_of_the_hill$#!"
 event_effects_orc_warband.3_tt:0 "• [ROOT.GetCountry.GetRuler.GetFullName] is [Concept('concept_exile', '$concept_exiled$')]\n• A new [concept_ruler] takes the high seat"
