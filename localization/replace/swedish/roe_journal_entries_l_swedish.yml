 notification_prestige_goods_ice_unlocked_desc:0 "[Concept('concept_building', '$concept_buildings$')] owned by [SCOPE.sCompany('relevant_company').GetName] may now begin producing @prestige_good_generic_ice! #b $prestige_good_generic_ice$#!"
 notification_prestige_goods_ice_unlocked_tooltip:0 "#header $notification_prestige_goods_ice_unlocked_name$#!\n$TOOLTIP_DELIMITER$\n$notification_prestige_goods_ice_unlocked_desc$"
 je_guild_syndicalism:0 "The Commonwealth of Producers"
 je_guild_syndicalism_reason:0 "Industrialization has transformed [ROOT.GetCountry.GetName], but many now question who truly governs its factories, workshops, and railways. The [SelectLocalization(SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').IsValid, SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').GetName, 'movement_guild_syndicalist')] contends that political rights without economic power are hollow, and calls for an Industrial Commonwealth in which organized producers manage their trades through guilds and cooperatives.\n\nTheir program seeks to bind labor, skill, and capital into a democratic order rooted in productive function rather than speculation or inherited privilege.\n\nWhilst this [concept_journal_entry] is active, the rate at which [GetIdeology('ideology_guild_syndicalist').GetName] characters appear will be increased."
 no_interest_group_in_government_is_guild_syndicalist_tt:0 "#b No#! [concept_interest_group] [concept_in_government] has the [GetIdeology('ideology_guild_syndicalist').GetName] ideology, or any #tooltippable;tooltip:[GetPlayer.GetTooltipTag],guild_syndicalist_ideologies_list_tt Guild Syndicalist#! [concept_leader] or [concept_agitator]"
