 gbr_unified_australia:0 "Australiensiska federationen"
 can_aus.1.t:0 "Konfederation med [SCOPE.sCountry('canada_annex_scope').GetName]"
 can_aus.1.d:0 "[SCOPE.sCharacter('canada_overlord_ruler').GetFullName][SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle]  har undertecknat lagen om konfederationen mellan[ROOT.GetCountry.GetName]  och [SCOPE.sCountry('canada_annex_scope').GetName]. Detta utgör en stor seger i vårt arbete för att förena hela Kanada."
 can_aus.1.f:0 "För varje dokument som undertecknas och stämplas kommer vi ett steg närmare att bygga upp en nation. Kolonierna har inte alltid varit överens, men Kanadas befolkning är fast besluten att fullfölja detta."
 can_aus.1.a:0 "Gud bevare [SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle]!"
 can_aus.2.t:0 "Föreningen av[SCOPE.sCountry('canada_scope_1').GetName]  och [SCOPE.sCountry('canada_scope_2').GetName]"
 can_aus.2.d:0 "[ROOT.GetCountry.GetRuler.GetFullName][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]   har undertecknat lagen om konfederationen mellan[SCOPE.sCountry('canada_scope_1').GetName]  och [SCOPE.sCountry('canada_scope_2').GetName]. Detta innebär en stor seger i vårt arbete för att förena hela Kanada."
 can_aus.2.a:0 "Gud bevare [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]!"
 can_aus.3.d:0 "[SCOPE.sCharacter('canada_overlord_ruler').GetFullName][SCOPE.sCountry('canada_annex_scope').GetName]Bläcket hade inte ens hunnit torka på enhetsförslaget innan våra tjänstemän och politiker satte igång med integrationsarbetet. Med  s[SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle] välsignelse har vi kommit ett steg närmare en australisk federation."
 can_aus.3.f:0 "Byråkratin växer, som man brukar säga, för att tillgodose den växande byråkratins behov. Åtminstone i detta fall tjänar den ett ädelt syfte; uppkomsten av en australisk nation står för dörren. Med stöd från kolonialministeriet, de lokala förvaltningarna och framför allt det australiska folkets vilja kan vi inte misslyckas i vår strävan."
 can_aus.4.d:0 "Bläcket hade inte ens hunnit torka på enhetsförslaget innan våra byråkrater och politiker började arbeta med integrationen[SCOPE.sCountry('canada_scope_1').GetName]med [SCOPE.sCountry('canada_scope_2').GetName]. Med  s[SCOPE.sCharacter('australia_overlord_ruler').GetFullName][SCOPE.sCharacter('australia_overlord_ruler').GetPrimaryRoleTitle] välsignelse har vi kommit ett steg närmare en australisk federation."
 can_aus.5.t:0 "Den kanadensiska konfederationen"
 can_aus.5.d:0 "[SCOPE.sCountry('canada_overlord_country').GetName]Kanadas enande är fullbordat. De olika koloniala regeringarna har integrerats till en enda, under ledning av[ROOT.GetCountry.GetName]  och med  entusiastiskt stöd."
 can_aus.5.f:0 "Drömmen om ett enat Kanada har äntligen gått i uppfyllelse. Från en blygsam start som en liten koloni i det vidsträckta och okända norr har nybyggarna vuxit och anpassat sig. De har blivit ett folk. De har skapat en nation."
 can_aus.5.a:0 "Det sanna norr – starkt och fritt!"
 can_aus.6.d:0 "[ROOT.GetCountry.GetName]Kanadas enande är fullbordat. De olika koloniala regeringarna har integrerats till en enda, under ledning av[SCOPE.sCountry('canada_country').GetName]  och med  entusiastiskt stöd."
 can_aus.7.t:0 "Australiensiska federationen"
 can_aus.7.d:0 "Australiens kolonier har sammanslagits till en enda regering under ledning av [ROOT.GetCountry.GetName].  i[SCOPE.sCountry('canada_overlord_country').GetName][SCOPE.sCharacter('canada_overlord_ruler').GetPrimaryRoleTitle]  har officiellt gratulerat det australiska folket."
 can_aus.7.f:0 "I dag firar vi den australiska nationens födelse. ”Landet Down Under” utgjorde en stor utmaning för de första nybyggarna, med en vildsint flora och fauna som var både hotfull och fientlig. Men tack vare uppfinningsrikedom, beslutsamhet och tro har vi tämjt detta karga land."
 can_aus.7.a:0 "Framåt, vackra Australien!"
 can_aus.8.d:0 "Australiens kolonier har sammanslagits till en enda regering under ledning av [ROOT.GetCountry.GetName].  har[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] officiellt gratulerat  i[SCOPE.sCountry('canada_country').GetName][SCOPE.sCharacter('canada_country_ruler').GetPrimaryRoleTitle]  för att ha lett integrationsarbetet."
 je_manifest_destiny_mexico:0 "Manifest Destiny: Mexikos avträdelse"
 je_manifest_destiny_mexico_reason:0 "Det är vårt öde att utvidga vårt territorium från Atlanten till Stilla havet. Från hav till hav!"
 je_manifest_destiny_frontier_wars:0 "Manifest Destiny: Gränskrig"
 je_manifest_destiny_frontier_wars_reason:0 "Vår avsikt är att Great Plains ska bli ett nytt hemland för det amerikanska folket. Dess nuvarande invånare måste hållas under strikt kontroll."
 manifest_destiny.1.t:0 "Den mexikanska avträdelsen"
 manifest_destiny.1.d:0 "Vi har återtagit kontrollen över den amerikanska sydvästra delen ur Mexikos olagliga grepp. Landet[ROOT.GetCountry.GetName] sträcker sig nu från Atlanten till Stilla havet."
 manifest_destiny.1.f:0 "”O, hur vacker är den patriotiska drömmen, \nsom ser bortom tidens gång\n, dina alabasterstäder lyser\n, oförmörkade av mänskliga tårar! \nAmerika! Amerika! Må\n Gud skänka dig sin nåd och\n kröna ditt goda med \nbroderskap från hav till strålande hav!”"
 manifest_destiny.1.a:0 "Det här var vårt öde!"
 manifest_destiny.2.t:0 "Gränskrigen"
 manifest_destiny.2.d:0 "[ROOT.GetCountry.GetName]De sista spåren av indianernas herravälde har utplånats, vilket innebär att endast .s herravälde återstår."
 manifest_destiny.2.f:0 "”Vi har makten att börja om från början. En situation som liknar den nuvarande har inte inträffat sedan Noas dagar fram till idag. En ny världs födelse står för dörren.”"
 manifest_destiny.2.a:0 "Frihetens gränser vidgas!"
 labor_rights.1.t:0 "Misshandel av livegna"
 labor_rights.1.d:0 "[SCOPE.gsInterestGroup('serf_mistreaters').GetName] ...[SCOPE.sState('serf_state').GetName]har blivit ökända för att behandla sina livegna brutalt. Bönderna klagar över hårda straff, omöjliga arbetsbördor och ibland till och med tortyr och mord."
 labor_rights.1.f:0 "”Hon fick trettio piskrapp för att hon spillde ut teet.”\n ”Folk har försvunnit på godsets område uppe på kullen.” \n”Det finns en fängelsekällare under källarvåningarna, det svär min kusin på! De torterar oss och dricker vårt blod!”"
 labor_rights.1.a:0 "Dessa kränkningar måste upphöra."
 labor_rights.1.b:0 "Vi kommer att straffa aristokraterna med lagens fulla kraft."
 serf_mistreaters_demonized:0 "Misshandel av livegna bestraffas"
 serf_mistreaters_demonized_enactment:0 "Misshandel av livegna"
 anti_serfdom_debate:0 "Motstånd mot livegenskapen"
 anti_serfdom_popularity:0 "Den populäre befriaren"
 labor_rights.2.t:0 "Befriare"
 labor_rights.2.d:0 "En grupp inflytelserika[SCOPE.gsInterestGroup('anti_serfdom_ig').GetName] personer, med[SCOPE.sCharacter('anti_serfdom_advocate').GetFullName]  i spetsen, driver en kampanj för att snabbt avskaffa livegenskapen."
 labor_rights.2.f:0 "”Jag skulle kunna tala i evigheter om frigörelsens moraliska fördelar, och det med goda skäl. Men den enkla sanningen är att livegenskapen är ineffektiv. Den är ekonomiskt förödande och utgör ett hinder för vår nations rättmätiga utveckling, såväl inom industrin som i samhället. Livegna som arbetar på åkrarna skulle komma bättre till nytta i fabriker, där de kan sysselsättas lönsamt och arbeta ordentligt flitigt.”"
 labor_rights.2.a:0 "De lägger fram mycket övertygande argument."
 labor_rights.2.b:0 "Vilken inspirerande talare!"
 labor_rights.3.t:0 "Att köpa sig fri"
 labor_rights.3.d:0 "De[SCOPE.gsInterestGroup('serf_owners').GetName]vägrar att avstå från sina livegna utan tillräcklig ersättning. Deras betydande politiska inflytande gör det svårt att avslå detta krav."
 labor_rights.3.f:0 "”Vi har i generationer förlitat oss på livegarnas arbetskraft. Ni kan inte bara be oss att frigöra dem utan ersättning! Hur ska vi kunna hålla vår egendom lönsam? Hur ska vi kunna upprätthålla den levnadsstandard vi är vana vid? Vår relativa fattigdom skulle göra oss till åtlöje bland aristokratin[ROOT.GetCountry.GetAdjectiveNoFormatting].”"
 labor_rights.3.a:0 "Staten kommer att täcka kostnaden."
 labor_rights.3.b:0 "Livegna måste köpa sig fria."
 labor_rights.3.c:0 "Man kan inte äga en människa."
 government_buying_serfs:0 "Inköp av livegna"
 serfs_buying_serfs:0 "Självbefrielse"
 no_buying_serfs:0 "Vägrade att betala för frigivningen"
 labor_rights.4.t:0 "Direktaktion"
 labor_rights.4.d:0 "Arbetare som[SCOPE.gsInterestGroup('unions_scope').GetName]är organiserade i  genomför korta strejker och perioder av strikt efterlevnad av arbetsreglerna i ett försök att sätta press på regeringen att anta  lagen[SCOPE.sLaw('current_law_scope').GetName]. Även om deras metoder verkar vara effektiva orsakar de stora skador på vår industriella ekonomi."
 labor_rights.4.f:0 "”Vi har rätt att känna oss trygga på jobbet! Ingen ska behöva stämpla in och undra om det är just idag som man kommer att förlora en arm eller ett öga. Tills vår säkerhet är garanterad kommer vi inte att arbeta en enda dag till.”"
 labor_rights.4.a:0 "Låt dem strejka!"
 labor_rights.4.b:0 "Ge försäkringar och försök att lugna ner situationen."
 enactment_strikes_modifier:0 "Strejker med anledning av arbetstagarnas säkerhet"
 enactment_strikes_deterred_modifier:0 "Ordnade demonstrationer för arbetstagarnas säkerhet"
 worker_protection_negotiations:0 "Förhandlingar om arbetstagarnas säkerhet"
 labor_rights.5.t:0 "Förhandlingar om arbetstagarsäkerhet"
 labor_rights.5.d:0 "[SCOPE.gsInterestGroup('unions_scope').GetName][SCOPE.gsInterestGroup('capitalists_scope').GetName] har gått med på statligt förmedlade förhandlingar med  om genomförandet av [SCOPE.sLaw('current_law_scope').GetName]."
 labor_rights.5.f:0 "”Våra vinstmarginaler kommer att drabbas, det måste ni förstå. Det kommer inte att vara bra för någon, inte heller för er. Vi kanske till och med tvingas säga upp några av er, och hur ska ni då försörja era familjer?” \n\n”Vet ni vad som verkligen är dåligt för verksamheten? Arga arbetare. Skadade arbetare. Döda arbetare.”"
 labor_rights.5.a:0 "[SCOPE.gsInterestGroup('unions_scope').GetName]Stöd ."
 labor_rights.5.b:0 "Gör eftergifter gentemot [SCOPE.gsInterestGroup('capitalists_scope').GetName]."
 labor_rights.6.t:0 "Strejkbrytare"
 labor_rights.6.d:0 "De[SCOPE.gsInterestGroup('capitalists_scope').GetName]betalar en grupp beväpnade ligister som kallar sig en privat detektivbyrå för att sätta stopp för[SCOPE.gsInterestGroup('unions_scope').GetName]agitationen för [SCOPE.sLaw('current_law_scope').GetName]."
 labor_rights.6.f:0 "”Vi ser bara till att alla följer lagen här. Vi vill inte att någon av de arga arbetarna ska avfyra ett skott eller starta ett upplopp. Vi är bara här för att upprätthålla ordningen, mot rätt pris. Och kanske blir några ben brutna och några skallar spruckna under tiden. Det är bara priset man får betala för den allmänna säkerheten.”"
 labor_rights.6.a:0 "Grip dem för misshandel."
 labor_rights.6.b:0 "Vi kan inte riskera att göra dem[SCOPE.gsInterestGroup('capitalists_scope').GetName]ännu mer upprörda."
 strikebreakers_called_off:0 "Gripna strejkbrytare"
 strikbreakers_enactment:0 "Strejkbrytare"
 strikebreakers_allowed:0 "Tillåtna strejkbrytare"
 je_texas_tex:0 "Texas självständighet"
 je_texas_tex_reason:0 "Efter år av kulturell och politisk oro mellan oss och Mexiko, där våra medborgares rättigheter har inskränkts alltmer, är det dags för oss att resa oss! \nDe dagar då våra härliga länder var underkastade det tyranniska mexikanska styret närmar sig sitt slut."
 je_texas_usa:0 "Texas som delstat"
 je_texas_usa_reason:0 "Vi följer konflikten mellan Mexiko och Texas med stort intresse. Om Republiken Texas skulle gå segrande ur striden bör vi försöka övertyga dem om att ansluta sig till vår rättfärdiga union."
 texas_je_tt:0 "Texas ska besluta om man ska bli en delstat i USA"
 texan_war_of_independence.1.t:0 "”Lone Star State”"
 texan_war_of_independence.1.d:0 "[SCOPE.sCountry('usa_scope').GetAdjectiveNoFormatting][ROOT.GetCountry.GetName] står nu, efter ett hårt och blodigt krig, som en självständig stat. Det finns många inom republiken som förespråkar att vi ska bli en del av [SCOPE.sCountry('usa_scope').GetName]. De skulle, enligt alla uppgifter, välkomna oss in i sin union."
 texan_war_of_independence.1.f:0 "Kriget mot Mexiko är över, och våra modiga medborgare har börjat lägga ner sina vapen och återgå till ett liv i fredstid. Men vad är självständigheten värd om vi varje dag måste se oss om över axeln och vänta på att våra förtryckare ska återvända? Texas kan bli ännu starkare som en del av en större union, en union av likasinnade stater som inte kommer att kränka våra gudagivna rättigheter."
 texan_war_of_independence.1.a:0 "Vi ska gå med i facket!"
 texan_war_of_independence.1.b:0 "Fullvärdig statlig status är onödig."
 texan_war_of_independence.1.c:0 "Vi behöver ingen hjälp från Yankees."
 lone_star_state:0 "Lone Star-staten"
 texan_war_of_independence.2.t:0 "Texas som delstat"
 texan_war_of_independence.2.d1:0 "[ROOT.GetCountry.GetName][SCOPE.sCountry('texas_scope').GetName] har vunnit sin självständighet från Mexiko och strävar nu efter att bli en delstat inom ."
 texan_war_of_independence.2.d2:0 "[SCOPE.sCountry('texas_scope').GetName] har vunnit sin självständighet från Mexiko och strävar nu efter en särskild relation med [ROOT.GetCountry.GetName], där landet inte skulle införlivas som en delstat utan istället som ett autonomt protektorat."
 texan_war_of_independence.2.d3:0 "[SCOPE.sCountry('texas_scope').GetName] har vunnit sin självständighet från Mexiko. Trots våra ambassadörers ihärdiga ansträngningar har de på ett oklokt sätt avböjt erbjudandet om att bli en delstat i USA."
 texan_war_of_independence.2.f:0 "”Eftersom folket i Texas, vid tidpunkten för antagandet av sin konstitution, genom en nästan enhällig omröstning uttryckte sin önskan att införlivas i Förenta staternas union, och fortfarande med lika stor enhällighet hyser samma önskan, i syfte att på ett mer effektivt sätt trygga sin säkerhet och sitt välstånd; och Förenta staterna, som uteslutande drivs av önskan att öka sin egen säkerhet och välfärd samt att tillmötesgå önskemålen från Texas regering och folk, har beslutat att genom ett fördrag uppnå mål som är så viktiga för deras ömsesidiga och bestående välfärd.”"
 texan_war_of_independence.2.a:0 "Välkommen till Amerika!"
 texan_war_of_independence.2.b:0 "En acceptabel kompromiss."
 texan_war_of_independence.2.c:0 "Helt otroligt!"
 nihilism.1.t:0 "Nihilism"
 nihilism.1.d:0 "[SCOPE.sCharacter('nihilist_scope').GetFullName]En antiklerikal och antimonarkistisk rörelse som kallas nihilism har fått fotfäste bland [SCOPE.gsInterestGroup('nihilist_ig').GetName]. Under ledning av kommer dessa farliga tänkare säkert att bli en nagel i ögat för det rådande samhällsordningen."
 nihilism.1.f:0 "”De är en skymf mot allt som är rättfärdigt i vårt land! Allt som kommer över deras läppar är förräderi av värsta slag! Aldrig tidigare har vi sett en sådan skamlös nonchalans gentemot vår gudomliga rätt att regera. De utgör det största möjliga hotet mot samhället.”\n\n ”Oroa er inte, min herre, dessa män är nihilister. Det finns inget att vara rädd för.”"
 nihilism.1.a:0 "Kanske har de en poäng."
 nihilism.1.b:0 "Det här är förräderi! Kätteri!"
 nihilism.1.c:0 "Staten måste förbjuda nihilistisk litteratur."
 less_popular_nihilist:0 "Den undertryckta nihiliströrelsen"
 popular_nihilist:0 "Den blomstrande nihiliströrelsen"
 less_popular_nihilist_red:0 "Den undertryckta nihiliströrelsen"
 nihilism.1.tt:0 "En nihilist[concept_agitator]kommer att skapas i [SCOPE.GetRootScope.GetCountry.GetName]."
 bureaucracy.1.t:0 "Byråkrati"
 bureaucracy.1.d:0 "Den offentliga förvaltningen, som för närvarande leds av [SCOPE.gsInterestGroup('bureaucrat_class').GetName], fördröjer medvetet regeringens arbete genom att skapa onödigt pappersarbete. De kräver att deras anställningar ska skyddas enligt  lagen[SCOPE.sLaw('current_law_scope').GetName]."
 bureaucracy.1.f:0 "”Jag skulle gärna hjälpa till, men tyvärr har den här beställningsblanketten bara stämplats två gånger. Du måste lämna in ett klagomål till den regionala ombudsmannen, som just nu är mycket upptagen med att optimera vårt nya arkivsystem. Du kan räkna med ett snabbt svar inom sex till åtta månader.”"
 bureaucracy.1.a:0 "Nuvarande tjänstemän kan behålla sina tjänster."
 bureaucracy.1.b:0 "Oacceptabelt! Tillbaka till arbetet."
 bureaucracy.1.c:0 "Säkerhetspolisen kommer att se till att de håller sig i schack."
 bureaucracy.1.e:0 "Utnyttja detta tillfälle för att utbilda deras efterträdare."
 red_tape:0 "Byråkrati"
 red_tape_reduced:0 "Minskad byråkrati"
 red_tape_jobs:0 "Den byråkratiska gamla gardet"
 bureaucracy.2.t:0 "Meritokrati"
 bureaucracy.2.d:0 "En ny generation byråkrater[SCOPE.gsInterestGroup('meritocracy_ig').GetName] överträffar sina föregångare[SCOPE.gsInterestGroup('bureaucrat_class').GetName]i alla aspekter av sitt arbete. Detta är ett mycket uppmuntrande tecken för effektiviteten hos [SCOPE.sLaw('current_law_scope').GetName]."
 bureaucracy.2.f:0 "”De tror att de förtjänar de viktigaste posterna bara för att de föddes med en silversked i munnen. Men deras privilegier och känsla av rättighet gör dem lata, nepotistiska och arroganta. Vi, däremot, har varit tvungna att arbeta för allt vi har, och det finns verkliga konsekvenser om man misslyckas. Befordran bör baseras enbart på meriter, inte på härkomst.”"
 bureaucracy.2.a:0 "Det[SCOPE.sLaw('current_law_scope').GetName]är uppenbart att detta är den rätta strategin."
 bureaucracy.2.b:0 "De[SCOPE.gsInterestGroup('bureaucrat_class').GetName]har gjort ett slarvigt arbete."
 bureaucracy.2.c:0 "Uppmuntra dem[SCOPE.gsInterestGroup('meritocracy_ig').GetName]att söka sig till den offentliga förvaltningen."
 meritocracy:0 "Meritokrati"
 meritocracy_ig:0 "Meritokrati"
 bureaucracy.3.t:0 "Kampen mot byråkratin"
 bureaucracy.3.d:0 "Våra ansträngningar att få igenom lagen[SCOPE.sLaw('current_law_scope').GetName] har stött på flera klassiska byråkratiska hinder. Det rasar heta debatter kring så högtflygande frågor som vilken form arkivskåpen ska ha."
 bureaucracy.3.f:0 "”Bra, snabbt, billigt. Du får två.”"
 bureaucracy.3.a:0 "Vi kommer inte att spara på kostnaderna."
 bureaucracy.3.b:0 "Det här kommer att ta den tid det tar."
 bureaucracy.3.c:0 "Låt oss bara få det överstökat."
 good_and_fast:0 "Bra och snabbt"
 good_and_cheap:0 "Bra och billigt"
 cheap_and_fast:0 "Billigt och snabbt"
 colonization.1.t:0 "Avkolonisering"
 colonization.1.d:0 "I takt med att vi avvecklar kolonialismen förväntar sig folket i[SCOPE.sCountry('colony_scope').GetName]  att beviljas självständighet som en del av denna ideologiska omvandling."
 colonization.1.f:0 "”Man kan inte avskaffa kolonialismen utan att avskaffa kolonialismen! Det räcker inte att bara lova att inte upprätta nya kolonier, man måste släppa sitt avskyvärda grepp om de människor som man redan har underkastat sin tyranni.”"
 colonization.1.a:0 "De ska få den frihet de eftersträvar."
 colonization.1.b:0 "[SCOPE.sCountry('colony_scope').GetName]Vi har inte för avsikt att ge upp."
 decolonization:0 "Avkolonisering"
 refused_to_release_colony:0 "Kolonial hyckleri"
 colonization.2.t:0 "Kolonial outsourcing"
 colonization.2.d:0 "De[SCOPE.sPoliticalMovement('outsourcing_scope').GetName]är oroliga för att billig arbetskraft från kolonierna ska användas för att göra deras jobb överflödiga."
 colonization.2.f:0 "”Vi kommer alla att hamna på fattighuset, det vet jag. Hur ska vi kunna sälja våra produkter när vi måste konkurrera utan tusentals acres oexploaterad mark, som bearbetas av infödda arbetare till ett spottbilligt pris?”"
 colonization.2.a:0 "Lugna dem."
 colonization.2.b:0 "Självklart ska vi utnyttja kolonierna!"
 slow_colonies:0 "Kolonial avmattning"
 fear_of_outsourcing_alleviated:0 "Minskade farhågor inför utkontraktering"
 outsourcing_anger:0 "Rädslan för kolonial outsourcing"
 colonization.3.t:0 "Kolonial entusiasm"
 colonization.3.d:0 "Nyheten om att regeringen avser att anta lagen[SCOPE.sLaw('current_law_scope').GetName] har väckt stor entusiasm bland dem som är ivriga att exploatera nya och avlägsna trakter."
 colonization.3.f:0 "”Vinst och äventyr väntar alla som är modiga nog att ge sig ut på resan med oss. En vild värld ligger framför oss, som bara väntar på att vi ska sprida lite välgörande[ROOT.GetCountry.GetAdjectiveNoFormatting]civilisation. Och om infödingarna protesterar, se till att du har ditt gevär nära till hands.”"
 colonization.3.a:0 "Ta det lugnt, lagen är inte undertecknad än!"
 colonization.3.b:0 "Vi kommer att inta den plats som tillkommer oss på den internationella arenan."
 colonization.3.c:0 "Lastar fartygen – nu ger vi oss av mot fjärran stränder!"
 colonization.4.t:0 "Utnyttjandets etik"
 colonization.4.d:0 "Regeringens försök att driva igenom lagen[SCOPE.sLaw('current_law_scope').GetName] har lyft kolonialismens etiska aspekter till förgrunden i den offentliga debatten."
 colonization.4.f:0 "”Vi har ingen rätt att lägga oss i, kontrollera eller utnyttja. De säger att vi för med oss ’civilisation’; vi för med oss elände och förtryck, vi manipulerar koloniernas hela socioekonomiska strukturer så att de tjänar våra egna själviska behov.”"
 colonization.4.a:0 "[SCOPE.sLaw('current_law_scope').GetName] är moraliskt korrekt."
 colonization.4.b:0 "Vi kan gå med på vissa av deras argument."
 colonial_ethical_conviction:0 "Debatt om kolonialismen"
 ethically_condemned:0 "Etisk fördömelse"
 ethical_concessions:0 "Etiska eftergifter"
 colonial_enthusiasm:0 "Kolonial entusiasm"
 our_place_on_the_world_stage:0 "En plats på den internationella scenen"
 colonial_enthusiasm_settlers:0 "Entusiastiska nybyggare"
 colonial_enthusiasm_time:0 "$colonial_enthusiasm$"
 anarchy.1.t:0 "Handlingens propaganda"
 anarchy.1.d:0 "Anarkister har tagit på sig ansvaret för bombattentatet mot en herrklubb som ofta besöks av medlemmar i [SCOPE.gsInterestGroup('anarchy_target_ig').GetName]. Kroppen av[SCOPE.sCharacter('anarchy_target_leader').GetFullName]  har hittats bland spillrorna."
 anarchy.1.f:0 "”Krig, klasskrig – och ni var de första att föra det under sken av de mäktiga institutioner som ni kallar ordning, i mörkret av era lagar. Det kommer att krävas blodsutgjutelse; vi kommer inte att undvika det; det kommer att krävas mord: vi kommer att döda, för det är nödvändigt; det kommer att krävas förstörelse; vi kommer att förstöra för att befria världen från era tyranniska institutioner.”"
 anarchy.1.a:0 "Inte mer än vad dessa reaktionärer förtjänar."
 anarchy.1.b:0 "Vi kan inte tolerera terrorism."
 anarchy.2.t:0 "Att avveckla staten"
 anarchy.2.desc:0 "I takt med att[ROOT.GetCountry.GetName]  närmar sig[SCOPE.sLaw('current_law_scope').GetName]  kräver  att de[SCOPE.gsInterestGroup('anarchists_scope').GetName] statliga institutionerna avskaffas."
 anarchy.2.f:0 "”Hur kan vi kalla oss ett anarkistiskt samhälle när vi fortfarande upprätthåller statens tyranni? De som utövar statligt våld härjar fortfarande fritt bland oss: poliser, värnpliktsansvariga, koloniala förvaltare – alla är de klassförrädare. De stjäl frukten av vårt ärliga arbete och använder den för att finansiera vårt eget förtryck!”"
 anarchy.2.a:0 "Ned med polisen!"
 anarchy.2.c:0 "Staten har ingen rätt att kontrollera oss!"
 anarchy.2.d:0 "Kolonialismen är en plåga för mänskligheten!"
 anarchy.2.e:0 "Staten kommer gradvis att försvinna."
 law_dismentling_the_state:0 "Att avveckla staten"
 dismantling_the_state:0 "Att avveckla staten"
 withering_away:0 "Att tyna bort"
 ig_withering_away:0 "Att tyna bort"
 anarchy.3.t:0 "Ömsesidig hjälp"
 anarchy.3.d:0 "Anarkister skapar gemenskaper som avstår från vinststrävan och istället satsar på ömsesidigt ansvar för att ta hand om sina medmänniskor. [SCOPE.sCharacter('anarchist_farmer').GetFullName], den nya ledaren för [SCOPE.gsInterestGroup('farmer_ig').GetName], har uppmuntrat till att starta kooperativa jordbruk."
 anarchy.3.f:0 "”Vi behöver varken hyresvärdar, chefer eller ens staten. Genom att samarbeta kan vi tillgodose alla våra behov och leva fria och jämlika, där var och en av oss både är beroende av och ansvarar för vårt samhälles välbefinnande.”"
 anarchy.3.a:0 "Tillsammans är vi starkare."
 anarchy.3.c:0 "Det här kommer att bli utmärkt propaganda."
 anarchy.3.b:0 "De har en fascinerande inställning till jordbruket."
 encouraging_mutual_aid:0 "Att främja ömsesidig hjälp"
 mutual_aid:0 "Ömsesidig hjälp"
