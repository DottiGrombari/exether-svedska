 krakatoa.4.t:0 "Rökströmmar"
 krakatoa.4.d:0 "Under flera månader rapporterades det om intensivt röda solnedgångar över hela landet. Brandbilar kallades till och med ut för[SCOPE.sState('art_state').GetName]att släcka den till synes våldsamma eldsvådan. Många konstnärer och forskare har visat intresse för detta fenomen."
 krakatoa.4.f:0 "”En blå och ibland grön måne, vars brännbara sken tänder upp natten med onaturlig intensitet. Vita månsken som lyser igenom molnen framträder som lila, och ibland även blåa och gröna. \n\nLavendelfärgade solar, nattlysande moln, en motbjudande fascination.”"
 krakatoa.4.a:0 "Endast en målning kan fånga en sådan skönhet."
 krakatoa.4.b:0 "Vi forskare måste se till att vi är förberedda på nästa utbrott."
