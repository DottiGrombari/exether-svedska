 je_kobold_draconic_recognition:0 "Children of the Blight"
 je_kobold_draconic_recognition_reason:0 "While [ROOT.GetCountry.GetName] both appears and acts as a sovereign nation, our standing in the draconic world will remain uncertain so long as the dragonborn states refuse to treat us as equals. To them, kobolds are the shameful legacy of the Dragonblight, a people to be isolated rather than welcomed into diplomacy.\n\n#b Formal Recognition#!\nUntil a dragonborn [concept_great_power] recognizes us as equal through the #b Recognize as Equal#! [concept_treaty] [concept_article], our relations with dragonborn states will remain constrained by stigma and denial. If no such dragonborn Great Power exists, we may instead force the question by proving ourselves against a dragonborn [concept_major_power]."
 je_kobold_draconic_recognition_complete_tt:0 "We are recognized by a dragonborn nation, or have become too strong to dismiss."
 button_proclaim_kobold_independence:0 "Disregard the Dragonborn"
 button_proclaim_kobold_independence_desc:0 "If the dragonborn states will only respect strength, then strength is what we will show them."
 button_proclaim_kobold_independence_great_power_tt:0 "Surpass a dragonborn [concept_great_power] in at least two of [concept_prestige], army power projection, and navy power projection."
 button_proclaim_kobold_independence_no_great_power_tt:0 "No dragonborn [concept_great_power] exists."
 button_proclaim_kobold_independence_major_power_tt:0 "Surpass a dragonborn [concept_major_power] in at least two of [concept_prestige], army power projection, and navy power projection."
 button_proclaim_kobold_independence_no_power_tt:0 "No dragonborn [concept_major_power] or [concept_great_power] exists."
 je_orc_warband_king_of_the_hill:0 "King of the Hill"
 je_orc_warband_king_of_the_hill_reason:0 "The banners follow strength before parchment. A ruler who keeps the warbands busy, the chieftains honored, and the clans convinced of their command can bind the realm into something more durable than a campfire oath.\n\nIf #bold $orc_warband_unrest_bar$#! reaches #v 100%#!, a discontent powerful leader will overthrow the current ruler and the contest begins again. $orc_warband_unrest_bar$ ticks down while the country is at war."
