 children_rights_events.4.t:0 "Fattigskolor"
 children_rights_events.4.d:0 "[SCOPE.sLaw('current_law_scope').GetName]I vårt arbete för att införa [lagförslaget] har man över hela landet ivrigt föreslagit att man ska inrätta fattigskolor. Dessa välgörenhetsorganisationer skulle tillhandahålla mat och utbildning till de mest utsatta barnen i vårt samhälle."
 children_rights_events.4.f:0 "”Det finns bara ett sätt för dessa fattiga barn, som saknar kontakter och familj, att ta sig fram i samhället: utbildning. Om de inte vet hur man skriver sitt namn, ska vi lära dem att skriva; om de inte kan läsa, ska vi lära dem att hålla sig informerade; om ett barn som detta inte kan få mat, ska vi skaffa honom ett jobb.”"
 children_rights_events.4.a:0 "[SCOPE.gsInterestGroup('devout_scope').GetName]En sådan andlig fråga måste hanteras av ."
 children_rights_events.4.b:0 "Ett fantastiskt initiativ som bör drivas av lärarna."
 children_rights_events.4.c:0 "Vi behöver egentligen inte dem."
 ragged_schools_modifier:0 "Fattigskolor"
 ragged_schools_devout:0 "Religiösa fattigskolor"
 modifier_no_ragged_schools:0 "Avvisade fattigskolor"
 children_rights_events.5.t:0 "Penna och papper"
 children_rights_events.5.d:0 "Genomförandet av[SCOPE.sLaw('current_law_scope').GetName]  har avstannat på grund av vissa protester från allmänheten. Det finns många familjer som saknar den köpkraft som krävs för att täcka de kostnader som inköp av nya skolmaterial medför, vilket hindrar deras barn från att gå i skolan."
 children_rights_events.5.f:0 "”Hör här, ingen förälder skulle försöka hindra sina barn från att få en bättre framtid än den de kommer att få här, men om jag måste fatta ett beslut och valet står mellan att köpa bröd eller att köpa penna och bläck, så skulle jag säga att det inte är ett rättvist beslut.”"
 children_rights_events.5.a:0 "Förmögenhet får inte utgöra ett hinder."
 children_rights_events.5.b:0 "Vi kan inte avsätta ännu mer offentliga medel."
 school_supplies_modifier:0 "Tillhandahållna skolmaterial"
 no_school_supplies_modifier:0 "Skolmaterial som inte finansieras"
 children_rights_events.6.t:0 "Aldrig en av dem"
 children_rights_events.6.d:0 "[SCOPE.gsInterestGroup('gatekeeper_ig').GetName]Vissa medlemmar i  har uttryckt sin oro över införandet av [SCOPE.sLaw('current_law_scope').GetName], eftersom de anser att det skulle påverka sysselsättningen och leda till oroligheter bland de lägre samhällsklasserna."
 children_rights_events.6.f:0 "”Alla har sin egen plats, eller hur? Det tror jag vi alla kan enas om. Om vi lär dessa barn samma saker som vi lär våra egna barn, vem hindrar dem då från att vilja ha samma jobb? \n\nOch vem skulle då göra det de borde göra? Att utbilda för utbildningens skull är nonsens, en idyllisk utopi som bara skulle leda till elände, tomma fabriker och lata arbetare.”"
 children_rights_events.6.a:0 "Alla förtjänar en chans."
 children_rights_events.6.b:0 "Säg till dem[SCOPE.gsInterestGroup('gatekeeper_ig').GetName]att de har rätt. Fortsätt sedan enligt vår plan."
 children_rights_events.6.c:0 "De borde betrakta det som en välgörenhetsgärning."
 gatekeeping_education_no:0 "Skyldig skolgång"
 no_gatekeeping:0 "Skyldig skolgång"
 jump_river_tt:0 "#!#!99 % chans att få #tooltippable;negative_value;TOOLTIP:expedition_peril_explanation_tt allvarlig fara. 0\n,1 % chans att få #tooltippable;positive_value;TOOLTIP:expedition_progress_explanation_tt enorma framsteg."
 je_dreamweaver_expedition:0 "Expedition till Kongofloden"
 je_dreamweaver_expedition_reason:0 "Afrikanska kontinentens hjärta är fortfarande ett mysterium för många. Vi ska ge oss ut på en expedition för att kartlägga Kongoflodens lopp."
 je_niger_river_expedition:0 "Expeditionen till floden Niger"
 je_niger_river_expedition_reason:0 "En expedition ska inledas för att kartlägga Nigerflodens lopp."
 je_west_america_expedition:0 "Expeditionen till västra gränslandet"
 je_west_america_expedition_reason:0 "En expedition för att kartlägga de okända områdena och geografin i den nordamerikanska västra gränsregionen."
 je_central_africa_expedition:0 "Expedition på Nilen"
 je_central_africa_expedition_reason:0 "I mitten av den afrikanska kontinenten ligger hemligheten bakom Nilens källa."
 expedition_taxes_modifier:0 "Expeditionsavgifter"
 expedition_events.290.t:0 "Ett stopp på vägen"
 expedition_events.290.d:0 "Med tanke på de låga temperaturerna i bergen hittar expeditionen en perfekt äng att slå läger på, nära floden och tillräckligt långt bort från andra byar för att inte störa deras mark. Ett läger byggt av poppelvirke som huggits vid flodbankerna föreslås av [SCOPE.sCharacter('expedition_leader').GetFullName]."
 expedition_events.290.d2:0 "Med tanke på de låga temperaturerna i bergen hittar expeditionen en perfekt äng att söka skydd på, nära floden och tillräckligt långt bort från andra byar för att inte störa deras mark. En fästning som byggts av tidigare upptäcktsresande står stolt där som en fristad."
 expedition_events.290.f:0 "”Det var en ovanligt kall månad när bergskedjan framför oss avkunnade sin obarmhärtiga dom. När solen började gå ner trängde ett glittrande ljus igenom trädkronorna, fick skuggorna att darra och regndropparna att täcka det bruna, nästan döda gräset.\n\nVår expedition var trött, och den där tröttheten i själen – långt hemifrån och nära havet – blev mycket mer påtaglig när de sista solstrålarna belyste deras svullna ansikten.”"
 expedition_events.290.a:0 "Det perfekta stället att bygga en fästning på."
 expedition_events.290.b:0 "Vi har inte råd med den här förseningen."
 expedition_events.290.c:0 "Vi ska stanna till och vila."
 built_fort_tt:0 "Någon har redan byggt en fästning under en tidigare expedition."
 expedition_events.291.t:0 "Livets mirakel"
 expedition_events.291.d:0 "Expeditionen väcks mitt i natten. Omänskliga skrik hörs från ett av tälten, och en kvinnoröst ropar: ”Älskling!”."
 expedition_events.291.f:0 "”Livets mirakel! Hur lite av ett mirakel det var och hur mycket av en plåga det verkade när man såg den stackars kvinnan föda. Skriken kunde inte stoppas på minst två timmar till och alla våra knappa mediciner gick åt till denna fruktansvärda förlossning – i vilken utsträckning de verkade fungera måste jag erkänna att mina förhoppningar är små och att jag önskar denna kvinna ett enklare liv efter detta lidande.”"
 expedition_events.291.f2:0 "”Livets mirakel! Vilket långt ifrån mirakel det var och vilken plåga det verkade vara när man såg den stackars kvinnan föda. Skriken kunde inte stoppas på minst två timmar till, och alla våra knappa mediciner gick åt till denna fruktansvärda förlossning – i vilken utsträckning de verkade fungera måste jag erkänna att mina förhoppningar är små och att jag önskar vår guide ett enklare liv efter detta lidande.”"
 expedition_events.291.a:0 "Vi tar hand om barnet."
 expedition_events.291.b:0 "Det är bäst för dem båda att återvända till byn."
 expedition_events.292.t:0 "Ett liv som upptäcktsresande är något för mig"
 expedition_events.292.d:0 "En upprorisk grupp har bildats inom expeditionen, och två av männen har smugit sig ut mitt i natten för att gå till en spritbutik."
 expedition_events.292.d2:0 "Samma två upptäcktsresande, som redan hade blivit tillrättavisade för sin olydnad, har återigen försvunnit under natten, för att sedan hittas berusade på golvet nästa morgon."
 expedition_events.292.f:0 "”Men vi… du vet, kapten, det är ju ett tag sedan vi var borta från hemmet och… hick! Upptäcktsresande är ju upptäcktsresande, eller hur? Vi utforskade bara lite… i en annan riktning, hick! Men det var ändå utforskning!”"
 expedition_events.292.a:0 "De här männen behöver lite disciplin."
 expedition_events.292.b:0 "De behövde bara en paus."
 expedition_events.293.t:0 "Ett nytt uppdrag"
 expedition_events.293.d:0 "Allteftersom expeditionen fortskrider blir det allt viktigare att prioritera uppgifterna, och[SCOPE.sCharacter('expedition_leader').GetFullName]han har börjat föra en loggbok där han håller reda på vad varje man måste göra."
 expedition_events.293.d2:0 "Allteftersom expeditionen fortskrider blir det allt viktigare att prioritera uppgifterna och[SCOPE.sCharacter('expedition_leader').GetFullName]  hålla reda på vad varje man måste göra. De olydiga upptäcktsresande har dock redan uttryckt sitt missnöje med detta beslut."
 expedition_events.293.f:0 "\”Dokumentera de nya växt- och blomarterna, teckna dem, teckna djuren och dokumentera även dem. En av våra män har en konstnärs hand och talang, även om hans brister i anatomi redan har ifrågasatts av några medlemmar. Oavsett vilket har han varit till stor hjälp under denna expedition. De\n\n flesta av de andra har skickats ut på jakt nu när vår resa lämnar de kartlagda byarna och vägarna bakom oss, som andra har följt före oss. Nu är det bara vi kvar, vi och vildmarken.”"
 expedition_events.293.a:0 "Jakten måste prioriteras."
 expedition_events.293.b:0 "Det är absolut nödvändigt att vi når en överenskommelse."
 expedition_events.294.t:0 "Fredliga avsikter"
 expedition_events.294.d:0 "Några dagar efter att ha skickats ut på ett rekognoseringsuppdrag återvänder medlemmarna i expeditionen och meddelar att de har hittat en infödingsby där gruppen kan få hjälp."
 expedition_events.294.d2:0 "Några dagar efter att de skickats ut på ett rekognoseringsuppdrag återvänder medlemmarna i expeditionen och meddelar att de har hittat en infödingsby, där gruppen kan få hjälp genom att använda det nyfödda barnet som en symbol för sina fredliga avsikter."
 expedition_events.294.f:0 "”När dagarna kommer och går förändras vårt landskap knappt alls. Dessa berg är mer kantiga, de där är äldre och mer eroderade; ibland rinner floden på den här sidan, ibland på den andra, men kedjan av omständigheter förblir densamma.\n\nVåra män kom tillbaka med glada nyheter och meddelade att ytterligare en infödingsbosättning hade hittats, så vi förberedde våra gåvor: nålar, speglar, medaljer, band och alla slags prydnadsföremål som såg rika och vackra ut. Vi hade redan upprepat ritualen hundra gånger, men varje gång kändes den lika viktig – vi behövde deras hjälp.”"
 expedition_events.294.a:0 "Vi borde försöka byta varor med dem."
 expedition_events.294.b:0 "Finns det någon här som kan hjälpa oss?"
 expedition_events.294.c:0 "De har gett oss lite förnödenheter till barnet och dess mamma."
 expedition_baby_tt:0 "Expeditionen reser tillsammans med ett spädbarn."
 expedition_events.295.t:0 "Jakt"
 expedition_events.295.d:0 "Expeditionsmedlemmarna som hade skickats ut på jakt har hittat ett område vid flodbanken där det vimlar av alla de djur de stött på under resan. Frågan är: vilket ska de jaga?"
 expedition_events.295.f:0 "”Skogen var en dröm av grönska och björnar, vildsvin, vargar, hjortar och bisonoxar, harar, rävar och till och med getter. Den var fylld av deras ljud och rörelser, som en levande bok. Naturen sträckte sig fri och orörd, och känslan av att låta sig förloras var en stark frestelse, tillbaka till paradisets trädgårdar.”"
 expedition_events.295.a:0 "Vi har inte råd att ta några risker. Välj ett litet djur."
 expedition_events.295.b:0 "Vi behöver maten. Satsa på den stora jakten."
 expedition_events.296.t:0 "När jorden öppnade sin mun"
 expedition_events.296.d:0 "När expeditionen tar sig fram genom bergen stöter den på en farlig ravin. Deras guide råder dem att ta en längre, säkrare väg istället för att korsa den."
 expedition_events.296.d2:0 "På sin väg genom bergen stöter expeditionen på en farlig ravin. Deras infödda guide föreslår en annan väg, som hon brukade ta tillsammans med sin stam."
 expedition_events.296.f:0 "”I gryningens lila skymning förvandlas bergens skuggor till lila avtryck, snitt i klipporna som efterliknar sina egna silhuetter som miniatyrer utställda på ett museum. Ravinen blir allt skarpare och smalare, jordens mynning riktad rakt mot oss – vissa begär kan man inte stilla.”"
 expedition_events.296.a:0 "Vår guide vet bättre."
 expedition_events.296.b:0 "Vi har ingen tid att förlora."
 expedition_events.296.c:0 "Hon känner till dessa stigar."
 native_guide_tt:0 "Expeditionen reser tillsammans med en lokal guide."
 expedition_events.297.t:0 "Stugfeber"
 expedition_events.297.d:0 "Expeditionen hittar en liten stuga i bergen. Den är halvt förfallen och verkar ha använts av spanska missionärer, men står nu tom."
 expedition_events.297.f:0 "”Det här är den perfekta platsen för ett myteri. Ett upplopp. Jag har utsatt dessa män för svåra prövningar som de inte kommer att glömma. Jag såg två av dem prata med varandra tidigare idag. De mumlade sinsemellan och tittade bara ibland i min riktning, vilket bevisar att deras avsikter inte var så ädla som de verkade. \n\nJag kan känna deras ivriga blickar på mig nu. Hur de tittade på hytten och nickade till varandra: \”Vi borde stanna här i natt, sir.\” Klart att de skulle säga så.\”"
 expedition_events.297.a:0 "Vi måste fortfarande övernatta någonstans."
 expedition_events.297.b:0 "Vi får inte ge dem den här möjligheten."
 expedition_events.120.t:0 "[SCOPE.sCharacter('old_expedition_leader').GetLastName]Dr., antar jag"
 expedition_events.120.d:0 "När de anländer till en by vid floden springer en av byborna snabbt fram till expeditionen och mumlar något om ”en av deras sort”."
 expedition_events.120.f:0 "[SCOPE.sCharacter('old_expedition_leader').GetLastNameNoFormatting]”Djungeln och dess ljud, dess högljudda invånare, deras dånande larm. Att nå en ny bosättning är alltid en källa till glädje och lugn. \n\nNär de såg oss närma oss sprang en ung man mot vår grupp, pekade mot staden och sa att en av oss befann sig där, eller att vi kunde gissa det. Och där fann vi honom. En skugga av en man, suddig i kanterna, färglös. \n\n\”Doktor, antar jag?\”."
 expedition_events.120.f2:0 "[SCOPE.sCharacter('old_expedition_leader').GetLastName]”Djungeln och dess ljud, dess högljudda invånare, deras dånande larm. Att nå en ny bosättning är alltid en källa till glädje och lugn. \n\nNär de såg oss närma oss sprang en ung man mot vår grupp, pekade mot staden och sa att en av oss var där, eller att vi kunde gissa det. Och där fann vi honom. En skugga av en man, suddig i kanterna, färglös. Han började skrika åt oss, hans ögon hade förlorat alla spår av den man han en gång varit. \n\n\”Doktor, antar jag?\”"
 expedition_events.120.a:0 "Vi har hittat honom!"
 expedition_events.120.b:0 "Han verkar trivas här."
 expedition_events.120.c:0 "Att ta med honom skulle utgöra en risk för vår expedition."
 found_explorer_modifier:0 "Hittad försvunnen upptäcktsresande"
 found_old_explorer:0 "Hittad försvunnen upptäcktsresande"
 expedition_events.130.t:0 "En oväntad gäst"
 expedition_events.130.d:0 "När expeditionen stöter på en grupp misstänkta handelsmän hävdar en av männen att han är en[SCOPE.sC('ambassador_country').GetAdjectiveNoFlag]ambassadör som har kidnappats av dessa ”legosoldater”."
 expedition_events.130.f:0 "\”Deras händer var fläckade av jord, gräs och rostigt blod. De log när de såg oss, och jag betraktade mina män med en sträng blick – ingen ler så här djupt inne i djungeln.\n\nEn av dem närmade sig oss och talade på ett främmande språk som en av våra yngre pojkar kunde känna igen. \”De är köpmän\”, sa han, \”de vill veta om vi har något att sälja.\” \”Upptäcktsresande?\”, ropade en annan röst, grov och desperat, \”De här männen kidnappade mig för flera månader sedan! Tjuvar, legosoldater, brottslingar! Jag är ambassadören[SCOPE.sC('ambassador_country').GetAdjectiveNoFormatting]! Befria mig från detta förrädiska öde!”"
 expedition_events.130.a:0 "Vi måste få den här mannen i säkerhet."
 expedition_events.130.b:0 "Hur vet vi att han inte ljuger?"
 expedition_events.140.t:0 "Dåliga nyheter"
 expedition_events.140.d:0 "[SCOPE.sCharacter('expedition_leader').GetFullName]När han nådde en av enklaverna väntade ett brev på honom, där det stod att hans fästmö hemma[ROOT.GetCountry.GetName]hade gift sig med en annan man."
 expedition_events.140.f:0 "”Åh, hur sorgset är inte mitt hjärta och hur tungt är inte mitt sinne! Denna förräderska har förtrollat mitt förnuft och förgiftat min själ! Åh, hur eländigt! Åh, hur hopplöst! Om ödesgudarna är rättvisa och rättfärdiga kommer de att ge denna avskyvärda kvinna det välförtjänta slutet!”"
 expedition_events.140.a:0 "Låt mannen sörja."
 expedition_events.140.b:0 "Han kommer att hitta en annan."
 expedition_events.150.t:0 "Among Us"
 expedition_events.150.d:0 "En av expeditionsmedlemmarna har ertappats med att stjäla mer proviant än vad som behövs, med ursäkten att han är sjuk och behöver mer mat."
 expedition_events.150.f:0 "”Ransonerna hade börjat ta slut, och rykten och misstro spred sig bland gruppen. En av männen anklagade en annan för att ha stulit bröd och bönor och smugit sig ut mitt i natten. \”Sir!\”, ropade han, med ett gult och magert ansikte, \”Jag behövde maten! Min kropp började svikta och jag orkade inte hålla takten under de långa marscherna in i djungeln.” \n\nMen det var många av männen som misstänksamt tvivlade på hans ord."
 expedition_events.150.a:0 "Vi behöver varenda man."
 expedition_events.150.b:0 "En tjuv är till ingen nytta för oss."
 expedition_events.160.t:0 "Ett konkursdrabbat företag"
 expedition_events.160.d:0 "Efter att ha fått höra om de många faror som expeditionen stod inför och om dess bristande framsteg har man fått besked om[ROOT.GetCountry.GetName]att expeditionen omedelbart måste återvända."
 expedition_events.160.f:0 "”De där snobbiga byråkraterna som sitter bekvämt vid sina ekbord, röker cigarrer och dricker gammal whisky, och bara bryr sig om vilket formulär de ska skicka till sitt nästa offer, och vilken helvetisk odyssé av oändligt pappersarbete de ska utsätta dem för.Vid \n\nmiddagstid kom ett brev: \"Herr [SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting], vi har fått information om att er expedition inte har uppnått de resultat vi förväntat oss...,\" Gud vet att om jag kunde bränna det, skulle jag omedelbart göra det. Jag är beredd att åka vart som helst, förutsatt att det är framåt!\""
 expedition_events.160.a:0 "Det här är slöseri med tid."
 expedition_events.160.b:0 "Nu kan vi inte vända om!"
 expedition_extra_expenses_modifier:0 "Extra kostnader för expeditionen"
 internal_security_events.1.t:0 "Ett mystiskt försvinnande"
 internal_security_events.1.d:0 "[SCOPE.sLaw('current_law_scope').GetName]Försvinnandet av [SCOPE.sCharacter('anti_secret_police_leader').GetFullName], från [SCOPE.gsInterestGroup('anti_secret_police_ig').GetName], har väckt allvarlig oro bland eliten, med[SCOPE.sCharacter('anti_secret_police_leader').GetHerHis] tanke på  det senaste motståndet mot ."
 internal_security_events.1.f:0 "”Det var långt efter middagstid när familjen anmälde saken till berörda myndigheter:[SCOPE.sCharacter('anti_secret_police_leader').GetFullNameNoFormatting]  hade varit försvunnen hela natten, utan att ha lämnat någon varning eller lapp efter sig. Anhöriga har uttryckt sin oro för att detta kan ha utlösts av[SCOPE.sCharacter('anti_secret_police_leader').GetHerHis]  ens ihärdiga motstånd mot [SCOPE.sLaw('current_law_scope').GetNameNoFormatting], eftersom en liten kniv hade lämnats vid deras dörr några dagar tidigare, vilket de nu tolkar som ett hot.”"
 internal_security_events.1.a:0 "Det finns inget att utreda här."
 internal_security_events.1.b:0 "Vi kan inte anta lagen på bekostnad av vårt folks förtroende."
 forced_disappearance_modifier:0 "Ett mystiskt försvinnande"
 forced_disappearance_coverage_modifier:0 "Ouppklarat fall med en försvunnen ledare"
 forced_disappearance_acknowledge_modifier:0 "Bekräfta att ledaren har försvunnit"
 internal_security_events.2.t:0 "En slumpmässig upptäckt"
 internal_security_events.2.d:0 "Samtidigt som regeringen förbereder sig för att anta lagen[SCOPE.sLaw('current_law_scope').GetName] har våra agenter gripit en[SCOPE.sC('spy_country').GetAdjectiveNoFormatting]spion, vilket har skadat vårt redan svaga förtroende för dem."
 internal_security_events.2.f:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('alcohol')]”En förteckning över alla våra generaler och deras familjer, anteckningar om tillståndet i våra kaserner och hamnar, prognoser om vår import, export, produktion, hamnar – allt! Jag är till och med förvånad över att de inte har tagit fram en förteckning över våra favoriter!”"
 internal_security_events.2.a:0 "Våra medarbetare måste få veta det!"
 internal_security_events.2.b:0 "Det här är mycket användbar information som bör förbli... privat."
 counterintelligence_modifier:0 "Åtgärder inom kontraspionage"
 counterattack_modifier:0 "Kontraspionageattack"
 counterintelligence_weak_modifier:0 "Åtgärder inom kontraspionage"
 internal_security_events.3.t:0 "Informationsåldern"
 internal_security_events.3.d:0 "I takt med att[SCOPE.sLaw('current_law_scope').GetName]lagen vinner mark har många av våra medborgare uttryckt oro över sin integritet."
 internal_security_events.3.f:0 "[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]”Jag har rätt att inte existera!”, har en orolig medborgare rapporterat till tidningen. ”Det här är helt otroligt – en skandal! Tänk på vilka felaktigheter den här informationen kan leda till... Tänk dig att bli anklagad för ett brott du inte har begått bara för att de har placerat dig i fel lista, med fel ideologi och fel bakgrund.”"
 internal_security_events.3.a:0 "De kanske har en poäng."
 internal_security_events.3.b:0 "De har ingenting att oroa sig för!"
 privacy_concerns_modifier:0 "Frågor om integritet"
 privacy_concerns_movement_modifier:0 "Frågor om integritet"
 privacy_concerns_movement_bad_modifier:0 "Frågor om integritet"
 privacy_concerns_ig_modifier:0 "Frågor om integritet"
 privacy_concerns_good_modifier:0 "Inget att dölja"
 internal_security_events.4.t:0 "Ett rop på frihet"
 internal_security_events.4.d:0 "En demonstration till stöd för lagen[SCOPE.sLaw('current_law_scope').GetName] anordnades i syfte att tysta kritikerna. Polisen beslutade dock att ta lagen i egna händer och slog våldsamt ner mot demonstranterna."
 internal_security_events.4.f:0 "”Åh! Vilken ironi! En protest mot våra nuvarande lagar, som inte skyddar medborgarna mot den korrupta polisen, stoppas av just den polisen! Mina händer darrar av indignation medan jag skriver den här artikeln. Om polisen är kapabel till detta nu, vad kommer de då att göra i framtiden? Vi behöver lagen för att skydda oss.”"
 internal_security_events.4.a:0 "Båda parter måste lugna ner sig."
 internal_security_events.4.b:0 "Polisen kommer att tvingas be om ursäkt offentligt för detta."
 violent_suppression_modifier:0 "Våldsamt förtryck"
 violent_suppression_ig_modifier:0 "Våldsamt förtryck"
 blamed_police_modifier:0 "Demonstranter som fick stöd"
 internal_security_events.5.t:0 "En säkerhetsfråga"
 internal_security_events.5.d:0 "I samband med förslaget om att anta lagen[SCOPE.sLaw('current_law_scope').GetName] har regeringsmedlemmar uttryckt sin oro för att den skulle kunna äventyra landets inre säkerhet."
 internal_security_events.5.f:0 "”Hur ska vi kunna förhindra reaktionära attacker och komplotter om vi inte har tillgång till offentlig information? Hur ska vi kunna skydda vårt folk om det enda vi erbjuder dem är en falsk känsla av trygghet?”"
 internal_security_events.5.a:0 "Denna information är av avgörande betydelse för vår förvaltning."
 internal_security_events.5.b:0 "Vi kommer att övergå till andra, mindre ingripande metoder."
 government_info_bad_modifier:0 "Lagrat personuppgifter"
 government_info_modifier:0 "Skydd av personuppgifter"
 internal_security_events.6.t:0 "Ogrundade angrepp"
 internal_security_events.6.d:0 "Det har framkommit att medlemmar av poliskåren har organiserat systematiska attacker mot anhängare av lagen[SCOPE.sLaw('current_law_scope').GetName] och vandaliserat deras affärer och mötesplatser."
 internal_security_events.6.f:0 "”De förstörde bänkarna och slog in dörrarna. De kastade stenar mot fönstren och brände alla böcker. De lämnade målningar på väggarna där vi avbildades som djur, medan de härskade över oss. De såg också till att lämna kvar några hot, så att vi skulle veta att det var de.”"
 internal_security_events.6.a:0 "Vi ska hålla ett offentligt tal och tydligt klargöra att detta är oacceptabelt."
 internal_security_events.6.b:0 "Poliskåren har blivit korrupt och omoralisk. Den måste rensas ut."
 terrorist_attack_modifier:0 "Offentliga ursäkter"
 purged_police_modifier:0 "Utrensning inom polisen"
 psychology_events.1.t:0 "Ett frånvarande sinne"
 psychology_events.1.d:0 "Det har kommit rapporter om [SCOPE.sCharacter('mentally_ill_leader').GetFullName]att [SCOPE.gsInterestGroup('mentally_ill_ig').GetName], ledare för , inte deltar i möten eller fullgör sina skyldigheter. Vi kan inte längre bortse från[SCOPE.sCharacter('mentally_ill_leader').GetHerHis]hans frånvaro."
 psychology_events.1.f:0 "[SCOPE.sCharacter('mentally_ill_leader').GetHerHim]”Han[SCOPE.sCharacter('mentally_ill_leader').GetLastNameNoFormatting] reagerar knappt ens när vi ropar[SCOPE.sCharacter('mentally_ill_leader').GetHerHis]på honom. Han stirrar tomt framför sig och[SCOPE.sCharacter('mentally_ill_leader').GetSheHe] blinkar knappt. ’Ska vi gå på en promenad?’, brukar vi säga, och[SCOPE.sCharacter('mentally_ill_leader').GetSheHe]han nickar tyst, och tyst går vi.”"
 psychology_events.1.a:0 "En läkare måste undersöka [SCOPE.sCharacter('mentally_ill_leader').GetHerHim]."
 psychology_events.1.b:0 "[SCOPE.sCharacter('mentally_ill_leader').GetSheHe|U] kan få den hjälp[SCOPE.sCharacter('mentally_ill_leader').GetSheHe]man behöver på ett asylboende."
 psychology_events.1.c:0 "Psykoanalysen har blivit en mycket lovande trend."
 psychology_events.1.tt:0 "Karaktären kommer att skickas till ett mentalsjukhus."
 psychology_events.2.t:0 "Desperata åtgärder"
 psychology_events.2.d:0 "Oron för  s[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName]hälsa har ökat i hela landet efter att[ROOT.GetCountry.GetRuler.GetHerHis]  inte har synts till offentligt.[ROOT.GetCountry.GetRuler.GetHerHis]  s make har under tårar berättat att ingen läkare verkar kunna bota [ROOT.GetCountry.GetRuler.GetHerHim]."
 psychology_events.2.f:0 "”Jag har provat allt! Men[ROOT.GetCountry.GetRuler.GetHerHis]sjukdomen kommer från… insidan. Inga brutna ben, inte ens halsont! \n\nJag är rädd att vi måste prova andra metoder, och en god vän till min kusin lyckades bota henne! Han knäppte bara med fingrarna, spådde hennes framtid i korten och voilà! Hon var precis lika frisk som när hon var ung, glad och full av liv.”"
 psychology_events.2.a:0 "Struntprat! En riktig läkare borde behandla[ROOT.GetCountry.GetRuler.GetHerHim] det med ordentlig hypnos."
 psychology_events.2.b:0 "Det är värt ett försök."
 psychology_events.2.c:0 "Filosofiska institutionen har erbjudit en experimentell behandling."
 hypnosis_modifier:0 "Behandling med hypnos"
 psychology_events.3.t:0 "Soldatens sjukdom"
 psychology_events.3.d:0 "Sedan han återvände från tjänstgöringen har han inte varit[SCOPE.sCharacter('mentally_ill_character').GetFullName] sig lik.[SCOPE.sCharacter('mentally_ill_character').GetSheHe|U][SCOPE.sCharacter('mentally_ill_character').GetPrimaryRoleTitle]Han undviker kasernerna som pesten, vägrar att använda vapen och[SCOPE.sCharacter('mentally_ill_character').GetSheHe]har gjort det jävligt tydligt att[SCOPE.sCharacter('mentally_ill_character').GetSheHe]han inte vill höra ett jävla ord om krig."
 psychology_events.3.f:0 "[SCOPE.sCharacter('mentally_ill_character').GetSheHe|U]”Vaknar mitt i natten, dränkt i svett, skrikande,[SCOPE.sCharacter('mentally_ill_character').GetSheHe]tittar på mig och känner inte igen mig, pekar bara och frågar efter[SCOPE.sCharacter('mentally_ill_character').GetHerHis]bror,[SCOPE.sCharacter('mentally_ill_character').GetHerHis]min kära bror.\n\nIbland[SCOPE.sCharacter('mentally_ill_character').GetSheHe]  försöker han till och med hitta något att kasta på mig, \"Var är jag?!\"[SCOPE.sCharacter('mentally_ill_character').GetSheHe],  skriker han,[SCOPE.sCharacter('mentally_ill_character').GetHerHis]  med blicken riktad förbi mig.\""
 psychology_events.3.a:0 "Sådana minnen skulle knäcka vem som helst. Det här måste behandlas."
 psychology_events.3.b:0 "[SCOPE.sCharacter('mentally_ill_character').GetSheHe|U] skulle få lämplig vård på ett asylhem. Långt borta från allmänhetens blickar."
 psychology_events.3.c:0 "Det här är bara ännu ett exempel på feghet. Skicka[SCOPE.sCharacter('mentally_ill_character').GetHerHim]tillbaka den till tjänst."
 leader_sent_back_modifier:0 "Polisman återinsatt i tjänst"
 asylum_leader_modifier:0 "Officer i Asylum"
 public_shame_modifier:0 "Offentlig skam"
 psychology_events.4.t:0 "Tvivelaktiga metoder"
 psychology_events.4.d:0 "Patienter som skrivits ut från anstalten[ROOT.GetCountry.GetCapital.GetCityHubName] har kontinuerligt kritiserat de metoder som använts i samband med deras, så kallade, medicinska behandlingar. Misshandel av de sjuka, undanhållande av personliga brev och oproportionerliga straff var några av anklagelserna."
 psychology_events.4.f:0 "”De tvingade oss att sitta i en stol i timmar, om inte hela dagen. I tystnad. Vi fick inte prata med någon annan patient, inte ens läsa en bok. De lät oss bara gå på toaletten om vi hade tur. Annars var det bara en rostig nattkärl. Ingen mat, inget vatten. Om vi inte var sjuka när vi togs in, blev vi det inom bara några veckor.”"
 psychology_events.4.a:0 "Man kan inte lita på deras omdöme."
 psychology_events.4.b:0 "Vi måste se över hur asylsystemet fungerar från grunden."
 psychology_events.4.c:0 "De[SCOPE.gsInterestGroup('healthcare_ig').GetName]kan ta över förvaltningen av anstalten."
 ignored_asylums_modifier:0 "Misshandel av asylsökande"
 asylums_modifier:0 "Ändringar i asylbestämmelserna"
 asylum_pay_modifier:0 "Ändringar i asylbestämmelserna"
 asylum_owner_modifier:0 "Asylum-ägare"
 asylum_paperwork_modifier:0 "Asylbyråkratin"
 psychology_events.5.t:0 "Drömtolkning"
 psychology_events.5.d:0 "En ansedd läkare från  har[SCOPE.sState('university_state').GetName] bedrivit nyskapande forskning inom psykiatrin, där[SCOPE.sBuilding('university_building').GetName] han betonar den roll som det omedvetna och förträngda barndomsminnen spelar i psykologiska sjukdomstillstånd."
 psychology_events.5.f:0 "”På de följande sidorna ska jag visa att det finns en psykologisk teknik med vilken drömmar kan tolkas och att varje dröm, när denna metod tillämpas, kommer att visa sig vara en meningsfull psykologisk struktur som kan placeras på en bestämd plats i den psykiska aktiviteten i vaket tillstånd.\n\nDenna undersökning kommer att avslutas när den når den punkt där drömproblemet möter bredare problem, vars lösning måste sökas genom annat material.”"
 psychology_events.5.a:0 "Han kan komma att fortsätta sina studier på universitetet."
 psychology_events.5.b:0 "Ett så briljant sinne förtjänar en framträdande roll!"
 psychology_events.5.c:0 "Det låter väldigt osannolikt."
 freud_modifier:0 "Stödjande psykoanalys"
 freud_ig_modifier:0 "Stödjande psykoanalys"
 freud_building_modifier:0 "Stödjande psykoanalys"
 freud_rejected_modifier:0 "Förkastad psykoanalys"
 sigmun_freud_tt:0 "Sigmund Freud kommer att bli ledare[SCOPE.gsInterestGroup('intelligentsia_ig').GetName] och åtnjuta stor popularitet."
