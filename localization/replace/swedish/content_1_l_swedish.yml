 je_schleswig_holstein_question_state_ownership_desc:0 "[GetPlayer.GetName] kontrollerar en del av$STATE_SCHLESWIG_HOLSTEIN$  och ingen utlänning[concept_country]  får äga eller kontrollera en del av [concept_state]"
 je_german_unification_complete_trigger_desc:0 "Vi har bildat den tyska nationen"
 schleswig_holstein_question_solver:0 "Löste Schleswig-Holstein-frågan"
 je_schleswig_holstein_question_status:0 "Frågan om Schleswig-Holstein måste lösas innan en tysk återförening på allvar kan övervägas."
 je_schleswig_holstein_question:0 "Schleswig-Holstein-frågan"
 je_schleswig_holstein_question_reason:0 "Schleswig-Holstein-frågan upptar för närvarande de tyska nationalisternas tankar och krafter. För att Tyskland ska kunna gå vidare mot nationell återförening måste det tyska folket i Holstein först befrias från sina danska härskare."
 je_schleswig_holstein_question_solved_trigger_desc:0 "$je_schleswig_holstein_question$En tysk[concept_country]måste ha löst  [concept_journal_entry]"
 je_schleswig_holstein_question_solved_fail_trigger_desc:0 "Ännu en tysk[concept_country]löser detta[concept_journal_entry]före oss"
 je_german_unification_sole_candidate_trigger_desc:0 "Det får inte finnas något tyskt[Concept('concept_unification_candidate', '$concept_unification_candidates$')]  förutom [GetPlayer.GetName]"
 je_german_unification_idea_trigger_desc:0 "$je_german_unification_idea$Har slutfört  [concept_journal_entry]"
 je_german_unification_idea:0 "Tysk nationell identitet"
 je_german_unification_idea_reason:0 "Nationalismens idéer sprider sig som en löpeld bland det tyska folket. När dessa ideal väl har nått en kritisk massa av anhängare i de olika staterna inom Tyska förbundet kommer det oundvikligen att uppstå en strävan efter nationell enande."
 je_german_unification_idea_status:0 "Idén om en tysk nation sprider sig i staterna inom Tyska förbundet."
 je_north_german_unification:0 "Nordtyska förbundet"
 je_north_german_unification_reason:0 "Nationalismens tid är här, och det tyska folket strävar efter återförening. Vi måste sträva efter att bli den ledande makten i norra Tyskland, så att folket ser oss som förkämpar för denna sak."
 je_north_german_status:0 "De nordtyska mindre nationerna kommer att förenas med oss om vi kan bli den enda [concept_unification_candidate]."
 je_german_status:0 "För att fullborda Tysklands återförening bör vi inleda en återföreningsprocess [concept_diplomatic_play]"
 je_south_german_status:0 "De sydtyska smånationerna kommer att förena sig med oss om vi kan bli den enda [concept_unification_candidate]."
 german_unification.1.t:0 "Tyskt ledarskap"
 german_unification.1.d1:0 "Eftersom[ROOT.GetCountry.GetName]detta nu ses som det enda realistiska alternativet för den tyska återföreningen har många nordtyska delstater valt att ansluta sig till vår sak. Förhoppningarna är stora om att detta snart ska leda till en federation av alla tyska delstater."
 german_unification.1.d2:0 "Eftersom[ROOT.GetCountry.GetName]detta nu ses som det enda realistiska alternativet för den tyska återföreningen har många sydtyska delstater valt att ansluta sig till vår sak. Förhoppningarna är stora om att detta snart ska leda till en federation av alla tyska delstater."
 german_unification.1.f:0 "Från det heliga romerska rikets splittrade feodalstater till det kaos som följde i Napoleons spår har Tyskland aldrig varit riktigt enat. Det som[ROOT.GetCountry.GetAdjectiveNoFormatting]staten har åstadkommit i dag är ett steg mot det omöjliga och det oundvikliga."
 german_unification.1.a:0 "De statsmän som bär ansvaret är nationella hjältar."
 german_unification.1.b:0 "Hela världen kommer att få veta om vår bedrift."
 german_unification.2.t:0 "Konfederation med [SCOPE.sCountry('german_unification_candidate').GetName]"
 german_unification.2.d:0 "Eftersom[SCOPE.sCountry('german_unification_candidate').GetName]detta nu ses som det enda realistiska alternativet för den tyska återföreningen har många mindre tyska stater valt att ansluta sig till dem. Bör vi ge upp vår självständighet för att främja en större tysk enhet?"
 german_unification.2.f:0 "[SCOPE.sCountry('german_unification_candidate').GetNameNoFormatting]”Genom att ansluta oss till denna konfederation med  kanske vi avstår från[ROOT.GetCountry.GetAdjectiveNoFormatting]vår suveränitet, men på så sätt bidrar vi till att säkra den tyska suveräniteten. Tidens anda är obestridlig; det tyska folket önskar enighet, och  verkar vara de[SCOPE.sCountry('german_unification_candidate').GetAdjectiveNoFormatting] som kommer att förverkliga den. Att motsätta sig det tyska folkets sammanslutning vore ren dårskap.”"
 german_unification.2.a:0 "För Tyskland!"
 german_unification.2.b:0 "Vår suveränitet är okränkbar."
 german_unification.3.t:0 "Järnkanslern"
 german_unification.3.d:0 "[SCOPE.gsInterestGroup('junkers').GetName]En adelsman vid namn[SCOPE.sCharacter('bismarck_scope').GetFullName]  har nått en framträdande ställning bland  . Som[ROOT.GetCountry.GetAdjectiveNoFormatting] förespråkare för tysk nationell enhet och politisk pragmatism ställer han sig till statens förfogande."
 german_unification.3.f:0 "”Jag kommer snart att tvingas ta över ledningen av regeringen[ROOT.GetCountry.GetAdjectiveNoFormatting]. Min första uppgift blir att omorganisera armén, med eller utan Landtagets hjälp. Så snart armén har bringats i ett sådant skick att den inger respekt, skall jag utnyttja den första bästa förevändningen för att förklara krig mot Österrike, upplösa den tyska riksdagen, underkasta de mindre staterna och skapa nationell enhet i Tyskland under[ROOT.GetCountry.GetAdjectiveNoFormatting]mitt ledarskap.”"
 german_unification.3.a:0 "Utnämn Bismarck till rikskansler."
 german_unification.3.b:0 "Realpolitik är inte rätt politik."
 realpolitik:0 "Realpolitikens triumf"
 germany_aggressive_expansion:0 "Realpolitik fördöms"
 bismarck_unpopular:0 "Bismarck missgynnad"
 bismarck_popular:0 "Bismarck är favorit"
 je_german_unification:0 "Tysklands återförening"
 je_german_unification_reason:0 "Det är nu dags att ta ett avgörande steg mot den tyska återföreningen. Som en av de främsta tyska delstaterna är det vår plikt att förverkliga detta mål."
 german_unification.4.t:0 "Tysklands återförening"
 german_unification.4.d:0 "Statsmännens och soldaternas outtröttliga insatser har belönats; Tyskland är nu förenat till en enda stat."
 german_unification.4.f:0 "Genom blod och järn, genom diplomati och list, har Tyskland förenats. Det är en dag präglad av triumf och eftertanke. Hur framtiden än kommer att se ut kommer den tyska staten utan tvekan att spela en ledande roll när det gäller att avgöra mänsklighetens öde."
 german_unification.4.a:0 "Länge leve [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]."
 german_unification.4.b:0 "Detta är en seger för det tyska folket."
 german_unification.5.t:0 "Tysk nationell identitet"
 german_unification.5.d1:0 "Idealen om nationalism och nationell enhet har vunnit många anhängare i hela Tyska förbundet. De vänder sig till de mäktigare tyska makterna, såsom vi själva, i förhoppningen att vi ska driva frågan om tysk enhet på den större europeiska arenan."
 german_unification.5.d2:0 "Idealen om nationalism och nationell enhet har vunnit många anhängare i hela Tyska förbundet. De riktar blicken mot de mäktigare tyska makterna i hopp om[SCOPE.sCountry('german_unifier_candidate').GetName]att dessa ska driva frågan om tysk enhet på den större europeiska arenan."
 german_unification.5.d3:0 "Idealen om nationalism och nationell enande har vunnit många anhängare i hela Tyska förbundet. Eftersom det inte finns någon tydlig ledande makt bland de tyska staterna är det fortfarande osäkert vem som skulle kunna driva frågan om tysk enhet på den europeiska arenan."
 german_unification.5.f:0 "”Det tyska förbundet? Förbundet är ett skämt, en relik från en svunnen tid, ett utländskt påtvingat system! För att det tyska folket ska kunna blomstra och inta den plats som tillkommer oss i Europa måste vi ha en äkta tysk nation!”"
 german_unification.5.a:0 "Vi har stora händelser framför oss."
 je_south_german_unification:0 "Sydtyska förbundet"
 je_south_german_unification_reason:0 "Nationalismens tid är här, och det tyska folket strävar efter återförening. Vi måste sträva efter att bli den ledande makten i södra Tyskland, så att folket ser oss som förkämpar för denna sak."
 partial_german_unification_influence_prestige:0 "Tysklands återförenare"
 german_unification_popularity:0 "Tysklands återförenare"
 je_age_of_princes:0 "Prinsarnas tidsålder"
 je_age_of_princes_reason:0 "Etiopien har splittrats i ett dussin stridande feodalstater. Det är upp till oss att återförena imperiet och återställa fred och välstånd för vårt folk."
 je_age_of_princes_is_ethiopia:0 "Du har bildat#bEtiopien#! (se fliken[concept_nation_formation] i din#bdagbok#!)"
 ethiopia.1.t:0 "Den laglösa prinsen"
 ethiopia.1.d:0 "En lägre adelsman ur Salomons hus har snabbt stigit till makt och popularitet. Rättsligt sett är han en laglös, men han har besegrat varje armé som skickats mot honom och nu strävar han efter att med våld ta över tronen i[ROOT.GetCountry.GetName] [land]."
 ethiopia.1.f:0 "Legenden om den laglöse som stjäl från de rika och ger till de fattiga är lika gammal som tiden själv, och denna rebelliske prins är ett typexempel på detta. Efter att ha berövats sitt adliga arv har mannen som föddes som Kassa Hailu inte bara samlat en armé utan också vunnit sina anhängares hjärtan."
 ethiopia.1.a:0 "Tewodros kommer att leda oss till ära. Sätt honom på tronen!"
 ethiopia.1.b:0 "Vi ska visa honom hur vi hanterar laglösa."
 Tewodros:0 "Tewodros"
 tewodros_modifier:0 "Outlaw Prince"
 italian_unification.1.t:0 "Risorgimento"
 italian_unification.1.d:0 "[ROOT.GetCountry.GetRuler.GetFullName]Under det heroiska ledarskapet av[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  har den italienska nationen sett dagens ljus. Förenad under en gemensam fana kommer Italien utan tvekan att forma Europas och världens framtid."
 italian_unification.1.f:0 "”Ja, unga män, Italien är er tacksam för en bedrift som har förtjänat hela världens applåder. Ni har segrat och ni kommer att segra ännu, ty ni är förberedda på de taktiker som avgör stridernas öde. Till detta underbara kapitel i vårt lands historia kommer ännu ett, ännu mer ärofullt, att läggas till, och slaven skall äntligen visa sina fria bröder ett slipat svärd, smitt av länkarna i hans bojor.”"
 italian_unification.1.a:0 "Viva Italia!"
 italian_unification.1.b:0 "Vi kommer aldrig att glömma våra modiga [SCOPE.gsInterestGroup('ruler_ig_scope').GetName]."
 italian_unification.2.t:0 "Förening med [SCOPE.sCountry('italian_annex_country').GetName]"
 italian_unification.2.d:0 "Inspirerad av vårt ledarskap på halvön har regeringen i den lilla italienska staten  lämnat in en ansökan om[SCOPE.sCountry('italian_annex_country').GetName] att få delta i våra ansträngningar att ena det italienska folket."
 italian_unification.2.f:0 "”De gamla stadsstaterna har en pittoresk och romantisk charm; vi kan blicka tillbaka till renässansens tid och se ett blomstrande Italien. Men för att blomstra igen måste vi blicka framåt, inte bakåt. Det är enighet under en enda stat som återigen kommer att leda det italienska folket till storhet.”"
 italian_unification.2.a:0 "Diplomacy has won the day!"
 italian_unification.2.b:0 "It is not the right time."
 communism.5.t:0 "The Great Purge"
 communism.5.d:0 "Reactionary elements in the political landscape have been almost entirely eradicated or suppressed. The vanguard party reigns supreme."
 communism.5.f:0 "\"A party is the vanguard of a class, and its duty is to lead the masses and not merely to reflect the average political level of the masses.\""
 communism.5.a:0 "Disloyalty is treason."
 great_purge_modifier:0 "The Great Purge"
 communism.6.t:0 "Our Revolution"
 communism.6.d:0 "The Communist government has delivered on its promise to expand public institutions. All [ROOT.GetCountry.GetAdjectiveNoFormatting] citizens are guaranteed access to healthcare, social security, education, and a safe workplace."
 communism.6.f:0 "\"From each according to his ability, to each according to his needs. This is a core principle of communist society, and a foundational principle for our fledgling state. We stand as a shining example of what humanity can achieve by working together for the common good.\""
 communism.6.a:0 "On such foundations is socialism built."
 institutions_of_socialism_modifier:0 "Institutions of Socialism"
 communism.7.t:0 "Socialist Demagogue"
 communism.7.d:0 "[SCOPE.sCharacter('popular_socialist_leader').GetFullName] of the [SCOPE.gsInterestGroup('popular_socialist_ig').GetName] is rapidly gaining popularity among the people. The radical socialist message of equality [SCOPE.sCharacter('popular_socialist_leader').GetSheHe] espouses is proving especially appealing to the lower classes."
 communism.7.f:0 "\"Comrades, the time for action is now! Why should we toil in squalor while the boss grows rich and fat off of our labor? Why should the meager pennies we earn go to the greedy landlord who tells us we should be grateful for our miserable shacks?\""
 communism.7.a:0 "Inspirational!"
 communism.7.b:0 "Radical!"
 popular_socialist_leader:0 "Socialist Demagogue"
 communism.8.t:0 "The Red Army"
 communism.8.d:0 "[SCOPE.sCharacter('red_army_general').GetFullName] has reorganized the [SCOPE.gsInterestGroup('red_army_ig').GetName] into the [ROOT.GetCountry.GetAdjectiveNoFormatting] Red Army. The military is now devoted to defending the dictatorship of the proletariat."
 communism.8.f:0 "The international revolution will not be won through the jabbering of politicians, it will be won through force of arms. All the bourgeoisie of the world are assembled against us, the enemies of the proletariat are omnipresent. The Red Army is the only force standing between survival and annihilation."
 communism.8.a:0 "For the motherland!"
 red_army_tt:0 "Armed Forces will be named Red Army"
 communism.9.t:0 "The Means of Production"
 communism.9.d:0 "The workers of [SCOPE.sState('coop_state').GetName] are running a successful cooperative in the [SCOPE.sBuilding('coop_building').GetName]. They live happy, productive, and prosperous lives."
 communism.9.f:0 "In a worker cooperative, the means of production are owned by the workers themselves. The workplace is democratic, self-managed, and collectively owned by its members. All share in the profits, so workers are highly invested in the success of the business. The good of one is the good of all."
 communism.9.a:0 "A happy worker is a loyal worker."
 communism.9.b:0 "[SCOPE.sState('coop_state').GetName] is a wonderful place to live."
 path_to_vanguardism:0 "Path to Vanguardism"
 je_consolidate_colonial_rule:0 "Consolidate Colonial Rule"
 je_consolidate_colonial_rule_reason:0 "The frontier of our Indian territories has proven a consistent source of risk. We are surrounded by disorderly polities under arbitrary rulers which may threaten the integrity of our territory at any time. In order to ensure the security of our core holdings, those native sovereigns who still evade our rule must be brought to heel, and any hint of popular resistance crushed before it spirals out of control.\n\nAs we expand our administration across India, we will have the opportunity to establish new [Concept('concept_princely_state', '$concept_princely_states$')] to aid our administration. Assuming direct rule over too much land will cause the [concept_liberty_desire] of our existing subjects to increase."
 je_reform_indies:0 "Reform the Indies"
 je_reform_indies_reason:0 "It has become clear to the Company that exploiting the East Indies through the antiquated continuation of agrarian feudalism and slavery is not a viable strategy. We must transform the economy thoroughly, so that exploitation can be achieved through private enterprise and investment instead."
 je_reform_indies_goal:0 "Improve GDP by 50%"
 je_ethical_policy:0 "The Ethical Policy"
 je_ethical_policy_reason:0 "Previous colonial administrations have allowed the people under their rule to wallow in poverty and ignorance, laboring under a government interested only in what it can extract from them. We have a chance to do better; to provide for these huddled masses a basic education as well as sufficient means to feed and clothe themselves."
 east_indies.1.t:0 "A Solid Frontier"
 east_indies.1.d:0 "The great Indian Subcontinent has been brought completely under [ROOT.GetCountry.GetAdjectiveNoFormatting] rule. Those native forces which once threatened the security of our rule have been brought to heel."
 east_indies.1.f:0 "\"Colonial rule is held together by the collaboration of the Company and the Indian Princes. Over decades we have seduced the Indians with promises of wealth and prestige, of military ranks and noble titles. Their service has been rewarded, and by winning their favor the subcontinent is pacified.\""
 east_indies.1.a:0 "Loyal princes will keep the peace."
 east_indies.1.b:0 "Capital will cement our rule."
 east_india_company_men:0 "Company Men"
 east_indies.2.t:0 "Reforming the Indies"
 east_indies.2.d:0 "The economy of the Indies has been transformed under our diligent rule. With slavery and feudalism abolished, our vast territories are ripe for exploitation through private enterprise."
 east_indies.2.f:0 "\"Famines, uprisings, and epidemics have been a staple of life under [ROOT.GetCountry.GetAdjectiveNoFormatting] rule. But we are resolved to change that; we have liberated the peasants from their quotas so that they are not forced to hand over the meager handful of rice they need to feed their families. By replacing these harsh regulations with private employment we are sure that the wealth will trickle down to the locals.\""
 east_indies.2.a:0 "Investors are beginning to show interest."
 east_indies.2.b:0 "We should make greater use of local labor."
 indies_investment:0 "Investment in the Indies"
 indies_qualified_employees:0 "Local Labor Force"
 east_indies.3.t:0 "The Ethical Policy"
 east_indies.3.d:0 "The [ROOT.GetCountry.GetName] has superseded the old colonialism. The people under our rule now enjoy a high standard of living and have access to a solid education."
 east_indies.3.f:0 "\"Fifty years ago such a policy would have been unthinkable. Colonial administrators were concerned only with what they could extract, typically through coercion, from the wretches with the misfortune to live within colonial borders. We can proudly say that we have done better, that we have enacted an ethical policy of rule.\""
 east_indies.3.a:0 "We should teach them good [SCOPE.sReligion('indies_religion').GetName] values."
 east_indies.3.b:0 "This is a land of opportunity."
 east_indies.3.c:0 "Are we not merciful?"
 indies_loyalists:0 "Well Fed Subjects"
 indies_conversion:0 "Converting the Indies"
 indies_migration:0 "Land of Opportunity"
 regicide:0 "Regicide"
 regicide_averted:0 "Averted Regicide"
 1848.1.t:0 "The Trial of [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]"
 1848.1.d:0 "The radical government has imprisoned [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFullName] and hastily organized a trial. The expected outcome is a guilty verdict followed by public execution."
 1848.1.f:0 "\"Citizen [ROOT.GetCountry.GetRuler.GetLastNameNoFormatting]. The [ROOT.GetCountry.GetAdjectiveNoFormatting] nation accuses you of having committed a multitude of crimes to establish your tyranny, to destroy her freedom. Most egregious among these charges include conspiring with foreign powers, aristocratic corruption, and causing the blood of the people to flow. How do you plead?\""
 1848.1.a:0 "Guilty! Long live the Republic! Long live [ROOT.GetCountry.GetName]!"
 1848.1.b:0 "This is not justice!"
 je_abolish_monarchy:0 "Stamp Out Monarchism"
 je_abolish_monarchy_reason:0 "It is time to put the outdated system of hereditary rule behind us. The monarchy must be removed and its supporters humbled, and it must be given time to fade into memory."
 je_abolish_monarchy_goal:0 "The following must be true for 5 total years:"
 1848.2.t:0 "The Last Monarchists"
 1848.2.d:0 "[ROOT.GetCountry.GetName] has successfully maintained a republican form of government for many years now. There are few who still remember the old monarchy with any fondness."
 1848.2.f:0 "\"The days of highborn kings ruling over the meek peasantry atop a gilded throne are over. Let them pass into the realm of story books and fairy tales where they belong, and let nostalgia for those days become an idle fancy, not the grim face of reaction.\""
 1848.2.a:0 "We must put the past behind us."
 1848.2.b:0 "There is no harm in nostalgia."
 no_more_royalists:0 "[concept_interest_group] Leaders will no longer have the [GetIdeology('ideology_royalist').GetName] ideology"
 monarchist_nostalgia:0 "Hopeless Nostalgia"
 1848.3.t:0 "The [ROOT.GetCountry.GetAdjectiveNoFormatting] Constitution"
 1848.3.d:0 "The radical government has drafted a new constitution that guarantees [SCOPE.sLaw('current_law_scope').GetName]. [SCOPE.sCharacter('radical_leader_scope').GetFullName] and [SCOPE.sCharacter('radical_leader_scope').GetHerHis] supporters are demanding that the constitution be immediately signed into law."
 1848.3.f:0 "\"The principle of liberty shall be the bedrock of the [ROOT.GetCountry.GetAdjectiveNoFormatting] nation. For every man, a vote. And every vote shall be counted equally. It is not by right of wealth or land that we will choose our governors, but by the shining mandate of democracy.\""
 1848.3.a:0 "Liberté, égalité, fraternité!"
 1848.3.b:0 "Trust in the legal process."
 radical_constitution:0 "Radical Constitution"
 no_new_constitution:0 "Due Process"
 1848.4.t:0 "The Springtime of the Peoples"
 1848.4.d:0 "Under the leadership of [SCOPE.sCharacter('radical_leader_scope').GetFullName], the [GetIdeology('ideology_radical').GetName] movement is becoming very widespread in [ROOT.GetCountry.GetName]. Whether we support or oppose them, this heralds a time of great change and reaction."
 1848.4.d_no_leader:0 "Spurred by revolutionary sentiments spreading across Europe, the [GetIdeology('ideology_radical').GetName] movement is becoming widespread in [ROOT.GetCountry.GetName]. Whether we support or oppose them, this heralds a time of great change and reaction."
 1848.4.f:0 "\"The people of the [ROOT.GetCountry.GetAdjectiveNoFormatting] nation have a right to rule themselves, free from the clutches of kings and aristocrats who hoard hereditary power. We have made our demands clear; they will be met, or we shall take to the streets. We will win our freedom with the blood of martyrs if we have to.\""
 1848.4.a:0 "Support the conservative establishment."
 1848.4.b:0 "Support the radical movement."
 modifier_springtime_of_the_peoples:0 "Springtime of the Peoples"
 peoples_springtime_underway_tt:0 "Any #b European#! [concept_country] with a [concept_rank] of [concept_major_power] or above is experiencing a #tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt Liberal#! or #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt Socialist#! [concept_revolution]"
 modifier_radical_movement_enhancement:0 "Radical Sentiments"
 suppressing_radicals:0 "Suppressing Radicals"
 1848_popular_radical:0 "Popular Radical"
 je_secret_police:0 "Restore Order"
 je_secret_police_reason:0 "Desperate times call for desperate measures. With the radicals at the gates threatening to destroy traditional hierarchies, we must be prepared to use coercion to restore order."
 spell_disaster.9.t:0 "Radicals at the Gates"
 spell_disaster.9.d:0 "The radical movement is becoming popular, uncontrollable, and violent. Calls for revolution echo in the streets. Extreme measures may be necessary."
 spell_disaster.9.f:0 "\"Blind, ignorant fools. They want to be treated as equals when they most certainly are not. It would be so much easier if they could just accept their place, but instead they cling to their useless pride, taking to the streets to protest their obstinate cause. If they insist on using violence, we have no choice but to respond in kind.\""
 spell_disaster.9.a:0 "Secret Police will provide a discrete solution."
 spell_disaster.9.b:0 "We need the National Guard."
 spell_disaster.9.c:0 "Tyranny is not the answer."
 1848_reactionary_enactment:0 "Urgent Security Needs"
 1848_institution_speed:0 "Urgent Security Needs"
 rooting_out_radicals:0 "Rooting Out Radicals"
 home_affairs_cost_mod:0 "Efficient Home Affairs"
 spell_disaster.10.t:0 "Extreme Measures"
 spell_disaster.10.d:0 "The [SCOPE.sLawType('home_affairs_law').GetName] have sown terror throughout the ranks of the radicals. Already we are seeing how effective such a force can be, in the responsible hands of the state."
 spell_disaster.10.f:0 "\"Let them hate us, so long as they fear us. Dissenters of their insidious kind cannot be tolerated. Like vermin they gnaw at the very bones of the [ROOT.GetCountry.GetAdjectiveNoFormatting] nation.\""
 spell_disaster.10.a:0 "Round up the ringleaders."
 spell_disaster.10.b:0 "Strike with our full force."
 spell_disaster.10.c:0 "Effective, and efficient."
 garibaldi_popularity:0 "Heroic Reputation"
 italian_unifier_prestige:0 "Risorgimento"
 italian_unifiers_ig:0 "Italian Unifiers"
 theocracy.1.t:0 "Miracle Workers"
 theocracy.1.d1:0 "Patients at the [SCOPE.sState('capital_scope').GetCityHubName] Charity Hospital are recovering rapidly. They attribute their recovery to miracles performed by visiting clergy who are patrons of the hospital. Such displays are encouraging support for [SCOPE.sLaw('current_law_scope').GetName] throughout [ROOT.GetCountry.GetName]"
 theocracy.1.d2:0 "Students at the [SCOPE.sState('capital_scope').GetCityHubName] School for Orphaned Children rejoice as they receive a series of generous donations from local members of the [SCOPE.gsInterestGroup('priests_scope').GetName]. Such displays are encouraging support for [SCOPE.sLaw('current_law_scope').GetName] throughout [ROOT.GetCountry.GetName]."
 theocracy.1.d3:0 "Reports abound of a miracle performed by clergymen in [SCOPE.sState('capital_scope').GetCityHubName]. Such displays are promoting religious piety throughout [ROOT.GetCountry.GetName]."
 theocracy.1.f:0 "\"Think first of the good of others before yourselves. To give is divine, to cultivate a generous spirit is true virtue. Follow the path of righteousness not out of fear, but out of love.\""
 theocracy.1.a:0 "Religious institutions are the backbone of the state."
 theocracy.1.b:0 "The [SCOPE.gsInterestGroup('priests_scope').GetName] are true followers of the divine."
 theocracy.1.c:0 "[SCOPE.sLaw('current_law_scope').GetName] will fill our hearts with faith."
 theocracy.2.t:0 "The Blasphemy Laws"
 theocracy.2.d:0 "As part of the transition to [SCOPE.sLaw('current_law_scope').GetName], the [SCOPE.gsInterestGroup('priests_scope').GetName] have introduced and enforced a series of harsh anti-blasphemy laws in [SCOPE.sState('blasphemy_state').GetName]. These measures are polarizing even among the faithful."
 theocracy.2.f:0 "\"It is as the scriptures say: ours is the only path of the divine. We can suffer no deviation from this path, no defamation of our edicts or of our church. For the faithful the reward is eternal; so too is the punishment for the blasphemer.\""
 theocracy.2.a:0 "We must uphold the law."
 theocracy.2.b:0 "The laws should be relaxed."
 theocracy.2.c:0 "Blasphemers shall be put to death."
 theocracy.3.t:0 "Religious Pogroms"
 theocracy.3.d:0 "Pogroms targeting [SCOPE.sReligion('target_religion').GetName] people living in [SCOPE.sState('pogrom_state').GetName] are being perpetrated by fanatical [SCOPE.sPop('perpetrator_pop').GetReligion.GetName] supporters of the [SCOPE.sLaw('current_law_scope').GetName] law."
 theocracy.3.f:0 "\"They came at night. We were lucky; they came for our neighbors first and we heard them smash the glass and ransack the shop, so we hid under the floorboards. Huddled in the dark, I pressed my hand to my children's mouths so they would not cry out. We were silent and still. We didn't dare emerge until dawn.\""
 theocracy.3.a:0 "We cannot interfere."
 theocracy.3.b:0 "This is not the [SCOPE.sPop('perpetrator_pop').GetReligion.GetName] way."
 theocracy.3.c:0 "This will not stand. Arrest the perpetrators."
 miracle_workers_mod:0 "Miracle Workers"
 miracle_workers_ig_mod:0 "Miracle Workers"
 blasphemy_laws:0 "Blasphemy Laws"
 relaxed_blasphemy_laws:0 "Relaxed Blasphemy Laws"
 pogroms_law_success:0 "Ignoring Pogroms"
 pogroms_law_time:0 "Discouraging Pogroms"
 isolation.1.t:0 "Unequal Treaties"
 isolation.1.d:0 "Taking an interest in the newly opening [ROOT.GetCountry.GetAdjectiveNoFormatting] economy, [SCOPE.sCountry('fraud_country').GetName] has proposed a trade agreement that seemed initially equitable. On closer inspection it contains numerous unfavorable clauses that were never agreed upon."
 isolation.1.f:0 "\"You needn't trouble yourselves with reading the fine print, I assure you that all is in order as we agreed. It's nothing more than trivial formalities about ownership of natural resources and harbors. Just sign right here.\""
 isolation.1.a:0 "This is outrageous!"
 isolation.1.b:0 "Politely reject the treaty."
 isolation.1.c:0 "Sign the treaty, unfavorable as it is."
 isolation.2.t:0 "[SCOPE.sCountry('murdered_visitor_country').GetAdjectiveNoFormatting] Dignitary Murdered"
 isolation.2.d:0 "A visiting dignitary from [SCOPE.sCountry('murdered_visitor_country').GetName] has been murdered in a [SCOPE.sState('capital_scope').GetCityHubName] restaurant. It is suspected that this was an attempt to sabotage a trade agreement that would bring [ROOT.GetCountry.GetName] out of its isolated state."
 isolation.2.f:0 "\"We must think carefully on how to proceed. As soon as word of this gets out it will surely cause a scandal in [SCOPE.sState('foreign_capital').GetCityHubName] and threaten the signing of the treaty. There was a young man present at the scene, probably innocent but certainly a convenient scapegoat if we wish to hastily resolve the matter. It may not be just, but it will be expedient.\""
 isolation.2.a:0 "Convict a law student as a scapegoat."
 isolation.2.b:0 "We must get to the bottom of this crime."
 unequal_treaties_isolation:0 "Unequal Treaties"
 legal_scapegoat:0 "Legal Scapegoat"
 investigating_foreign_murder:0 "Lengthy Murder Investigation"
 dreadnought_hoax.1.t:0 "The Battleship Hoax"
 dreadnought_hoax.1.d:0 "The [SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')] reports that a group of rascal academics have disguised themselves as visiting members of the [SCOPE.sCountry('hoax_country').GetAdjectiveNoFormatting] royal family. Officers at the [SCOPE.sState('hoax_state').GetName] [SCOPE.sBuilding('hoax_building').GetName] believed the deception and offered them a tour of the fleet. The incident has caused great embarrassment to the [SCOPE.gsInterestGroup('navy_ig').GetName]."
 dreadnought_hoax.1.f:0 "\"The officers present welcomed the hoaxers with an honor guard and, lacking any knowledge of [SCOPE.sCountry('hoax_country').GetAdjectiveNoFormatting] customs or fashions, they were unable to see through the disguise and raised the [SCOPE.sCountry('haox_country_2').GetAdjectiveNoFormatting] flag by mistake. The hoaxers then proceeded to speak in gibberish and perform fabricated [SCOPE.sCountry('hoax_country').GetAdjectiveNoFormatting] ceremonies to bless the fleet.\""
 dreadnought_hoax.1.a:0 "Arrest them at once!"
 dreadnought_hoax.1.b:0 "Bunga bunga."
 battleship_hoax:0 "Battleship Hoax"
 dual_monarchy.1.t:0 "The Dual Monarchy"
 dual_monarchy.1.d:0 "We have reached accommodation with the [SCOPE.sCulture('hungarian_culture').GetName] people. After centuries of unbalanced rule, they will now play an equal role in an Austria-Hungarian state."
 dual_monarchy.1.d2:0 "The situation in Hungary has reached a boiling point. If we do not give the [SCOPE.sCulture('hungarian_culture').GetName] people an equal part in the [ROOT.GetCountry.GetAdjectiveNoFormatting] state, we risk open rebellion."
 dual_monarchy.1.f:0 "\"If only the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] could see reason, [ROOT.GetCountry.GetRuler.GetSheHe] would understand that the union of Austria and Hungary will benefit both parties. Austria can be assured Hungarian elites, now satisfied with their place at court, will loyally serve the Empire.\""
 dual_monarchy.1.a:0 "Austria and Hungary are united."
 dual_monarchy.1.b:0 "We must accept the compromise."
 dual_monarchy.1.c:0 "Austria will forever be Austrian!"
 austria_hungary_tt:0 "Country will become known as Austria-Hungary"
 ideology_austrian_hegemony:0 "Austrian Hegemonists"
 ideology_austrian_hegemony_desc:0 "#lore This group believes that Austrians alone should form the social and political elite of the country."
 dual_monarchy_compromise:0 "Austro-Hungarian Compromise"
 dual_monarchy_compromise_rejected:0 "Rejected Hungarian Compromise"
 austria_hunary_invalid:0 "Owns no Hungarian homeland states"
 je_electric_underground_railway:0 "The Metropolitan Railway"
 je_electric_underground_railway_reason:0 "As the capital becomes ever more densely populated, we must devise ever more ingenious transport solutions. Our leading engineers believe that it would be possible to construct an underground rail network powered by electricity beneath the city, allowing citizens to travel rapidly between key locations."
 metro_system:0 "Electrified Metropolitan Railway"
 metro_prestige:0 "City of International Renown"
 metro.1.t:0 "The Metropolitan Railway"
 metro.1.d:0 "The grand opening of the [SCOPE.sState('metro_state').GetCityHubName] Metropolitan Railway was received with much celebration. In a speech, the [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] congratulated the engineers who made this possible."
 metro.1.f:0 "\"It is not only the railway that is electrified, but the whole city of [SCOPE.sState('metro_state').GetCityHubName]. The streets are abuzz with citizens marveling at the wonders of technology, speculating about what new innovation will come to transform our lives for the better.\""
 metro.1.a:0 "The engineers deserve a reward."
 metro.1.b:0 "Our railway will be the envy of the world."
 je_patagonia:0 "The Conquest of the Desert"
 je_patagonia_reason:0 "The southern reaches of the continent remain outside of the control of any nation. Though the native population will certainly not make it easy, it is imperative that we secure this territory before it falls into the hands of our rivals."
 patagonia.1.t:0 "The Conquest of the Desert"
 patagonia.1.d:0 "We have completed our long campaign to conquer the Patagonian south. Settlers are beginning to seek out promising sites from which to establish new towns and exploit the region's natural resources."
 patagonia.1.f:0 "\"The Mapuche fought long and hard for centuries to protect their country. Now at last they are defeated, and that land belongs to us. To the victor, the spoils. Now we must set ourselves to the task of populating and governing what we have won.\""
 patagonia.1.a:0 "At last, the south belongs to us."
 patagonian_settlement:0 "Patagonian Settlement"
 patagonia.2.t:0 "Arming the Natives"
 patagonia.2.d:0 "We have discovered that our rivals in [SCOPE.sCountry('rival_country').GetName] have been arming the [SCOPE.sCountry('patagonia_country').GetAdjectiveNoFormatting] natives in [SCOPE.sState('mimic_state').GetName]. This is likely to impede our efforts to conquer the region."
 patagonia.2.f:0 "\"The [SCOPE.sCountry('patagonia_country').GetAdjectiveNoFormatting] natives have never welcomed our presence, but without the means to mount a truly effective resistance we have paid little heed to their objections. The addition of [SCOPE.sCountry('rival_country').GetAdjectiveNoFormatting] munitions into the equation comes with the frightening possibility that we must face them on equal terms.\""
 patagonia.2.a:0 "We should de-escalate the situation."
 patagonia.2.b:0 "If they want a fight, they'll get one."
 patagonia_slow_down:0 "Colonial De-Escalation"
 patagonia_supplied_with_weapons:0 "Supplied with Weapons"
 amazon.1.t:0 "The Devil's Railroad"
 amazon.1.d:0 "Workers on the [SCOPE.sBuilding('devils_railroad').GetName] in [SCOPE.sState('amazon_state').GetName] are dying in droves due to the harsh malarial conditions and the extreme demands placed upon them."
 amazon.1.f:0 "\"Every mile is marked with gravestones, every track laid in blood. Malady and the scorching heat blister our bodies. We pave the road to hell with our lives.\""
 amazon.1.a:0 "Full steam ahead!"
 amazon.1.b:0 "This is too high a price to pay."
 amazon.1.c:0 "Tighten safety standards."
 devils_railroad_modifier:0 "The Devils Railroad"
 slowed_railway_construction:0 "Slowed Down Construction"
 cautious_railway_construction:0 "Cautious Railroad Construction"
 amazon.2.t:0 "Hell on Earth"
 amazon.2.d:0 "Workers at the [SCOPE.sBuilding('rubber_plantation_scope').GetName] in [SCOPE.sState('amazon_state').GetName] are being severely mistreated. Mutilation has become a common punishment for perceived failures."
 amazon.2.f:0 "\"They went on to declare, when asked why they had fled, that they had endured such ill-treatment at the hands of the Government officials and the Government soldiers in their own country that life had become intolerable, that nothing had remained for them at home but to be killed for failure to bring in a certain amount of rubber or to die from starvation or exposure in their attempts to satisfy the demands made upon them.\""
 amazon.2.a:0 "We cannot slow down production."
 amazon.2.b:0 "Launch an inquiry into conditions at the plantations."
 amazon.2.c:0 "The perpetrators will pay for their crimes."
 rubber_mistreatment:0 "Mistreatment of Rubber Workers"
 rubber_slowdown:0 "Investigating Atrocities"
 rubber_protections:0 "Protection of Rubber Workers"
 morass_theatre:0 "Playhouse of the Mire"
 morass_migration:0 "Migration to the Morass"
 amazon_theatre:0 "Teatro Amazonas"
 amazon_migration:0 "Migration to the Amazon"
 amazon.4.t:0 "The Most Dangerous Game"
 amazon.4.d:0 "Returning from a safari expedition, [SCOPE.sCharacter('hunted_character').GetFullName] was marooned on a small island in the [SCOPE.sState('dangerous_game_state').GetName]. There [SCOPE.sCharacter('hunted_character').GetSheHe] was hunted like an animal by the [SCOPE.sCountry('hunter_country').GetAdjectiveNoFormatting] aristocrat [SCOPE.sCharacter('hunter_character').GetFullName]."
 amazon.4.f:0 "\"Splendid! One of us is to furnish a repast for the hounds. The other will sleep in this very excellent bed. On guard, [SCOPE.sCharacter('hunted_character').GetFirstNameNoFormatting].\""
 amazon.4.a:0 "Barbaric!"
 amazon.4.b:0 "[SCOPE.sCharacter('hunted_character').GetFirstName] had never slept in a better bed."
 je_trans_siberian_railway:0 "The Trans-Siberian Railway"
 je_trans_siberian_railway_reason:0 "Siberia is rich in resources but poor in infrastructure. We must build a great railway that will traverse the vast distance between Moscow and the Pacific!"
 major_railways.1.t:0 "The Trans-Siberian Railway"
 major_railways.1.d:0 "An extensive railway line now connects [SCOPE.sState('moscow_scope').GetName] to [SCOPE.sState('siberia_end_scope').GetName]. The riches of Siberia are ours for the taking!"
 major_railways.1.f:0 "This is a triumph for the [ROOT.GetCountry.GetAdjectiveNoFormatting] nation. [ROOT.GetCountry.GetAdjectiveNoFormatting] trains shall carry [ROOT.GetCountry.GetAdjectiveNoFormatting] coal, [ROOT.GetCountry.GetAdjectiveNoFormatting] sulfur, and [ROOT.GetCountry.GetAdjectiveNoFormatting] iron across the vast expanse of Eurasia!"
 major_railways.1.a:0 "Mine, boys!"
 major_railways.1.b:0 "All aboard!"
 siberia_mining:0 "Riches of Siberia"
 siberia_infrastructure:0 "Siberian Railways"
 siberia_mines.tt:0 "Every owned state in the East Siberia and West Siberia Strategic Regions gets:"
 je_trans_continental_railway:0 "The First Transcontinental Railway"
 je_trans_continental_railway_reason:0 "The railway shall connect us all, from sea to shining sea!"
 major_railways.2.t:0 "The First Trans-Continental Railway"
 major_railways.2.d:0 "With the route between the Atlantic and Pacific complete, the door is open for greater settlement of the American West."
 major_railways.2.f:0 "\"With this golden spike, we call for the unity of our country, as this railroad unites the two great oceans of the world!\""
 major_railways.2.a:0 "We will settle the Great Plains."
 major_railways.2.b:0 "The West Coast shall be just as prosperous as the East."
 transcontinental.tt:0 "Every owned state in the Great Plain Strategic Region gets:"
 great_plains_settlement:0 "Settling the American West"
 canada_settlement_mod:0 "Western Canadian Settlement"
 major_railways.3.t:0 "The Last Spike"
 major_railways.3.d:0 "The Canada Pacific Railway has finally been completed, connecting the Atlantic and Pacific coasts. The new railway opens up new opportunities for settlement across the Western Provinces."
 major_railways.3.f:0 "\"The stroke released the trigger for a burst\nOf sound which stretched the gamut of the air.\nThe shouts of engineers and dynamiters,\nOf locomotive-workers and explorers,\nFlanking the rails, were but a tuning up\nFor a massed continental chorus.\""
 major_railways.3.a:0 "The coast holds the most promise."
 major_railways.3.b:0 "There is great potential in the Prairies."
 je_canada_pacific_railway:0 "The Canadian Pacific Railway"
 je_canada_pacific_railway_reason:0 "A railway spanning from the Atlantic to the Pacific coast would open up new opportunities for settlement in Western Canada."
 je_victoria:0 "The Hanoverian Succession"
 je_victoria_reason:0 "The personal union between Great Britain and Hanover rests upon unstable ground. Different laws of succession guarantee that the union will end upon the death of King William, with the British throne passing to Princess Victoria."
 queen_victoria_mod:0 "Victorian Propriety"
 billy_died:0 "King William of Hanover has died"
 hanover_union_ends:0 "The union between Britain and Hanover will end"
 je_general_strike_warning:0 "If the strike has not been resolved within 5 years, a General Strike will occur"
 je_general_strike_active:0 "A General Strike is in effect"
 Ieyoshi:0 "Ieyoshi"
