 je_built_for_war:0 "Built for War"
 je_built_for_war_reason:0 "The [GetCulture('soulwrought').GetName] were forged to serve the gnomes of [ROOT.GetCountry.GetNameNoFlag], bound by craft to toil in the fields and workshops. Yet, tradition offers them a path to freedom. Those who take up arms in defense of the nation and complete their tour are granted full citizenship.\n\nThis pact of service has long kept unrest at bay, but a troubling truth lingers. Without [Concept('concept_war', 'war')], there is no proving ground. If peace endures, the [GetCulture('soulwrought').GetName] remain trapped in servitude, and their patience is not infinite."
 je_built_for_war_lobby:0 "The [GetCulture('soulwrought').GetName] were forged to serve the gnomes of [ROOT.GetCountry.GetNameNoFlag], bound by craft to toil in the fields and workshops. Yet, tradition offers them a path to freedom. Those who take up arms in defense of the nation and complete their tour are granted full citizenship.\n\nThis pact of service has long kept unrest at bay, but a troubling truth lingers. Without [Concept('concept_war', 'war')], there is no proving ground. If peace endures, the [GetCulture('soulwrought').GetName] remain trapped in servitude, and their patience is not infinite."
 built_for_war_calm:0 "The [GetCulture('soulwrought').GetName] are under control."
 built_for_war_problems:0 "The [GetCulture('soulwrought').GetName] are restless."
 built_for_war_revolt_imminent:0 "The [GetCulture('soulwrought').GetName] are rioting."
 je_spell_disaster:0 "The Fraying Veil"
 je_spell_disaster_reason:0 "With spellcraft woven into every loom, furnace, and engine, the [concept_veil]! that separates Exether from the outer realms grows thin. Strange storms and unseasonal blights spread panic among the common folk, while scholars and zealots alike warn of dire consequences. A new current of thought takes hold: that unchecked thaumaturgy is poisoning the world itself. From village green to city square, voices rise demanding restraint, stewardship, and protection for the land before calamity becomes irreversible."
 je_spell_disaster_lobby:0 "With spellcraft woven into every loom, furnace, and engine, the [concept_veil]! that separates Exether from the outer realms grows thin. Strange storms and unseasonal blights spread panic among the common folk, while scholars and zealots alike warn of dire consequences. A new current of thought takes hold: that unchecked thaumaturgy is poisoning the world itself. From village green to city square, voices rise demanding restraint, stewardship, and protection for the land before calamity becomes irreversible."
