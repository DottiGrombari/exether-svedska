 ig_national_guard:0 "Nationalgardet"
 ig_national_guard_desc:0 "Nationalgardet är en del av den franska försvarsmakten som är avsedd att fungera som en reservstyrka inom både armén och gendarmeriet, bestående av vanliga medborgare. Nationalgardet, som historiskt sett varit lojalt mot liberala och republikanska ideal i sin roll som folkets armé, kom att bli den drivande kraften bakom upprättandet av Kommunen."
 communard_effects_header_tt:0 "[SCOPE.sCountry('paris_commune_nation_scope').GetName]#header Följande effekter kommer att gälla för:#!"
