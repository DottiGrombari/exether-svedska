 fascism_events.1.t:0 "De långa knivarnas natt"
 fascism_events.1.d:0 "Misstankarna om ett internt hot bland våra egna generaler och ledare har ökat och nått [SCOPE.sCharacter('fascist_leader').GetFullName]’s öron, och behovet av att utrota hoten mot den fascistiska regimen är påtagligt. Förhastade ord, undvikande blickar – de finns överallt. Överallt."
 fascism_events.1.f:5 "”Knivarna föll i natten – de sov när vi kom. \n\n’Upp med er!’ Trägolvet var blött av deras blod. ’Ni har anklagats för brott mot[SCOPE.sCharacter('fascist_leader').GetLastNameNoFormatting]  och regimen, vad har ni att säga till ert försvar?’\n\nOch deras röster var som hästar som frustade och dundrade på slagfältet, skottlossning, kanoner. \”Det här är nonsens!\” \”Ni har åtalats för...\” \”Nonsens! Allt detta är ett myteri! Länge leve [SCOPE.sCharacter('fascist_leader').GetLastNameNoFormatting]!\” De är överallt. Överallt.\”"
 fascism_events.1.a:0 "Vi måste hantera detta med yttersta försiktighet."
 fascism_events.1.b:0 "Avrätta dem offentligt."
 fascism_events.1.c:0 "Må de ruttna i fängelset."
 night_of_the_long_knives.tt:0 "De[SCOPE.gsInterestGroup('fascist_ig').GetName]kommer endast att få$Fascist$  eller$Integralist$  ledare."
 fascism_to_jail_tt:0 "De som förråder regimen kommer att hamna i fängelse."
