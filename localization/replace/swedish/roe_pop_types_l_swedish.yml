l_swedish:
 archmages:0 "@archmages! $archmages_no_icon$"
 archmages_only_icon:0 "@archmages!"
 archmages_no_icon:0 "Archmages"
 archmages_desc:0 "Elite Spellcasters at the cutting edge of what magic is capable of, ushering in the next generation of spellcasters or profiting enormously from their own magic-based businesses. Commonly leads the Mages."
 janissaries:0 "@janissaries! $janissaries_no_icon$"
 janissaries_only_icon:0 "@janissaries!"
 janissaries_no_icon:0 "Janissaries"
 janissaries_desc:0 "Soldiers or Slaves conscripted into the Military"
 ARCHMAGES_QUALIFICATIONS_DESC:0 "Only pops with adequate [concept_literacy] can become #v $archmages$#!. Potential increases with greater [concept_literacy] and [concept_wealth]. Pops whose [concept_culture] faces [concept_discrimination] take a much longer time. #v $wizards$#! and #v $aristocrats$#! have a particularly easy time becoming #v $archmages$#!."
 POP_GUILD_BONDED:0 "$guild_bonded$ [concept_profession]"
 POP_ARCHMAGES:0 "$archmages$ [concept_profession]"
 POP_WIZARDS:0 "$wizards$ [concept_profession]"
 country_archmages_voting_power_add:0 "[concept_political_strength] from the [concept_votes] of $archmages$"
 country_archmages_voting_power_add_desc:0 "An increase or decrease to amount of [concept_political_strength] gained from the [concept_votes] of $archmages$ in Elections"
 wizards:0 "@wizards! $wizards_no_icon$"
 wizards_only_icon:0 "@wizards!"
 wizards_no_icon:0 "Wizards"
 wizards_desc:0 "Spellcasters performing supernatural tasks in government, infrastructure and shops. Commonly part of the Mages."
 WIZARDS_QUALIFICATIONS_DESC:0 "Pops with minimal [concept_literacy] can become #v $wizards$#!. Potential increases with greater [concept_literacy]. #v $artificers$#! have a particularly easy time becoming #v $wizards$#!."
 POP_ARTIFICERS:0 "$artificers$ [concept_profession]"
 artificers:0 "@artificers! $artificers_no_icon$"
 artificers_only_icon:0 "@artificers!"
 artificers_no_icon:0 "Artificers"
 artificers_desc:0 "Manual laborers with stable employment operating magical equipment in manufacturies, mines, enchanted farms and other sectors. Politically, they tend to be a driving force among the Mages and Trade Unions."
 guild_bonded:0 "@guild_bonded! $guild_bonded_no_icon$"
 guild_bonded_only_icon:0 "@guild_bonded!"
 guild_bonded_no_icon:0 "Guild Laborers"
 guild_bonded_desc:0 "Laborers bound by guild contracts. While their standard of living often exceeds that of slaves due to guild benefits, their lives are wholly controlled by their corporate masters. Though technically free to leave, most remain tethered to their guilds through housing, education, and essential services."
 adventurers:0 "@adventurers! $adventurers_no_icon$"
 adventurers_only_icon:0 "@adventurers!"
 adventurers_no_icon:0 "Adventurers"
 adventurers_desc:0 "Adventurers seek a better lot in life by searching for artifacts, hunting monsters and helping out communities in need. Commonly part of the Petite Bourgeoisie."
 ADVENTURERS_QUALIFICATIONS_DESC:0 "Only pops with some [concept_wealth] can become #v $adventurers$#!. Potential increases with greater [concept_wealth]. #v $soldiers$#! and #v $farmers$#! have a particularly easy time becoming #v $adventurers$#!."
 POP_ADVENTURERS:0 "$adventurers$ [concept_profession]"
 tribesmen:0 "@tribesmen! $tribesmen_no_icon$"
 tribesmen_only_icon:0 "@tribesmen!"
 tribesmen_no_icon:0 "Tribesmen"
 tribesmen_desc:0 "Powerful individuals with long-standing familial connections."
 POP_TRIBESMEN:0 "$tribesmen$ [concept_profession]"
 TRIBESMEN_QUALIFICATIONS_DESC:0 "Only pops in tribal societies can become tribesmen. Tribesmen are paid through [concept_subsistence_output]."
 peasants_irreplaceable:0 "@peasants! $peasants_no_icon$"
 peasants_irreplaceable_only_icon:0 "@peasants!"
 peasants_irreplaceable_no_icon:0 "Peasants"
 peasants_irreplaceable_desc:0 "Subsistence farmers found only in [Concept('concept_subsistence_building', '$concept_subsistence_buildings$')], where they produce agricultural and simple manufactured products they use mostly for their own needs. They rely on [concept_subsistence_output] for survival and play only a limited role in the [concept_market] economy. They tend to be [Concept('concept_politically_unaligned_aligned', '$concept_politically_unaligned$')]."
