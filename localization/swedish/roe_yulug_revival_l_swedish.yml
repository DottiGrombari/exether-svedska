l_swedish:
 je_grinning_revival:0 "The Grinning Word"
 je_grinning_revival_reason:0 "The Grinning Word, the revived teaching of the [Concept('concept_religion','Grinning Triad')], has begun to spread amongst the goblin [GetPopType('peasants').GetName] of [ROOT.GetCountry.GetName]. Long ground beneath the Crimson Yoke, its followers — often affiliated with the [SCOPE.gsInterestGroup('revival_ig').GetName] — preach the old faith of the Triad, the equality of all goblinkind, and the casting-off of hobgoblin overseers.\n\nThe meeting-pits and prayer-circles that the faithful have raised spread throughout the land, and may serve as a means to rapidly organize rebellion in the future."
 je_grinning_revival_lobby:0 "The Grinning Word has begun to spread amongst the goblin peasants of [ROOT.GetCountry.GetName], riding a wave of fury at generations under the Crimson Yoke. Its preachers call for the return of the old Triad faith and an end to hobgoblin rule. It may be only a matter of time before the movement erupts in open rebellion."
 grinning_petition_complete_tt:0 "Has completed the #bold Vindicate the Prophet#! [concept_journal_entry]"
 je_vindicate_prophet:0 "Vindicate the Prophet"
 je_vindicate_prophet_reason:0 "Followers of the Grinning Word amongst the [SCOPE.gsInterestGroup('revival_ig').GetName] have laid a petition before the throne, calling for toleration of the Triad faith, the recall of the hobgoblin overseers, and the clearing of the executed Prophet's name against the corrupt of the [SCOPE.gsInterestGroup('governors_ig').GetName].\n\nThe throne's promise to hear the demands of the faithful has temporarily quieted their unrest, but turning our back on the petitioners will certainly rekindle revolutionary fervor."
 je_vindicate_prophet_lobby:0 "The faithful of the Grinning Word have petitioned the throne to tolerate the Triad faith, recall the hobgoblin overseers, and vindicate their martyred Prophet. We have bought time by promising to listen — but a betrayal will set the countryside ablaze."
 modifier_grinning_revival:0 "The Grinning Word"
 modifier_grinning_uprising:0 "The Goblin Uprising"
 modifier_grinning_concord:0 "Justice and Fellowship"
 modifier_grinning_paradise:0 "Paradise Among the Peaks"
 modifier_grinning_betrayed:0 "Abandoned Promises"
 modifier_grinning_petition_rejected:0 "Disaffected Peasants"
 modifier_grinning_petition_accepted:0 "Appeased Faithful"
 modifier_grinning_prophet:0 "Heart of the Triad"
 modifier_grinning_prophet_hunted:0 "Heart of the Triad"
 modifier_grinning_realm_uprising:0 "The Realm Ablaze"
 grinning_word_effect_tt:0 "While #v The Grinning Word#! is active, the [SCOPE.gsInterestGroup('revival_ig').GetName] will be empowered, and [Concept('concept_revolution','$concept_revolutions$')] will present a greater threat to our realm"
 roe_yulug.1.t:0 "The Grinning Word"
 roe_yulug.1.d:0 "Goblin [GetPopType('peasants').GetName] moved by the revived teaching of the Grinning Triad have begun to organize across [ROOT.GetCountry.GetName]. Their calls for the equality of all goblinkind, the freedom to worship the old faith, and the casting-off of the hobgoblin overseers grow harder to ignore with every passing season."
 roe_yulug.1.f:0 ""
 roe_yulug.1.a:0 "Does another peasant war loom?"
 roe_yulug.2.t:0 "The Goblin Uprising"
 roe_yulug.2.d:0 "Discontent amongst the [SCOPE.gsInterestGroup('revival_ig').GetName] has spiraled into the beginnings of open conflict. Across [ROOT.GetCountry.GetName], goblin peasants have used the meeting-pits of the Grinning Word to organize themselves for revolution."
 roe_yulug.2.f:0 "The word had passed pit to pit, hamlet to hamlet. They were to march for the seat of power as swiftly as they could, drive out the overseers, and pull down the house of [SCOPE.sCharacter('gov_leader_scope').GetLastNameNoFormatting].\n\nThis was to be a merciful march — sparing the innocent and their property, paying for their bread, and showing their faith to all who watched. It was as far from the conduct of the governors' soldiers as the grin is from the scourge."
 roe_yulug.2.a:0 "Call up the garrisons, and prepare for battle."
 roe_yulug.3.t:0 "The Prophet"
 roe_yulug.3.d:0 "A revived doctrine, the Grinning Word, has taken root in [SCOPE.sState('prophet_state').GetName], carried by the preacher [SCOPE.sCharacter('prophet_scope').GetFullName]. It calls for the equality of all goblinkind and the building of paradise here, among the peaks, in this life."
 roe_yulug.3.f:0 ""
 roe_yulug.3.a:0 "A balm for the people's woes."
 roe_yulug.3.b:0 "A deceiver and a danger to the realm."
 roe_yulug.4.t:0 "The [SCOPE.sState('petition_state').GetFarmHubName] Petition"
 roe_yulug.4.d:0 "Believers of the Grinning Word have petitioned [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetLastName] for a slate of reforms. They include toleration of the Triad faith, the recall of the hobgoblin overseers, and the punishment of corrupt governors."
 roe_yulug.4.f:0 "The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] had come to know the followers of the Grinning Word through reports of their organizing in the countryside and the countless small petitions sent to [ROOT.GetCountry.GetRuler.GetHerHim] and the court. All of them ran the same way — protestations of the utmost loyalty to the throne, followed by their requests.\n\nIt was not the first of its kind, [ROOT.GetCountry.GetRuler.GetSheHe] mused, but it was certainly the loudest. The choice was twofold: alienate the newly organized peasantry, or draw the ire of the governors' caste."
 roe_yulug.4.a:0 "Threaten reprisals if they do not disperse."
 roe_yulug.4.b:0 "The throne will hear this petition."
 roe_yulug.5.t:0 "Paradise Through Patience"
 roe_yulug.5.d:0 "Through careful reform and cooperation with the [SCOPE.gsInterestGroup('revival_ig').GetName], we have mollified the followers of the Grinning Word. [ROOT.GetCountry.GetName] shall stand apart from the world — but it shall do so in harmony."
 roe_yulug.5.f:0 "The last foreign factors had been turned back from the ports, and the gates drawn shut. Somewhere beyond the strait, some merchant prince had surely fallen into shock, and was already penning letters to every power he knew. They would return — that was certain — and certain too that they would return heavily armed.\n\nThere was something new about the goblins of the land, though, an invisible energy that followed them as they went about their day. They no longer feared the guns and the overseers, and no longer counted one another their greatest threat. When the outsiders returned, there would be no inner fracture to pry open — and what host could conquer a reserve of millions, all grinning as one?"
 roe_yulug.5.a:0 "We have enforced justice and fellowship."
 roe_yulug.5.b:0 "We will build paradise among the peaks."
 roe_yulug.6.t:0 "Out to Dry"
 roe_yulug.6.d:0 "After waiting an unbearable span for promised reforms, the patience of the Grinning Word has run dry. The mood of the [SCOPE.gsInterestGroup('revival_ig').GetName] is now one of betrayal — and of budding revolt."
 roe_yulug.6.f:0 "They had lost another messenger. Despite the hopes of his kin, the inspector suspected they would never see him again. Tax-collectors, census-takers, runners, watchmen — all had begun to vanish in this district if they strayed too far from the roads. It was never all of them, but it was enough. The mood in the barracks had turned from cool indifference to plain terror, and that did not seem likely to change.\n\nRather than a single realm, the country had come to feel like an archipelago of towns linked by the thinnest of threads, ringed by a vast and terrible sea of contempt."
 roe_yulug.6.a:0 "We must live with the consequences."
