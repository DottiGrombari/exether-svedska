 ig_type_matches_former_tt:0 "[SCOPE.sCharacter('exile_temp').GetFullName] har samma typ av intressegrupp som [SCOPE.gsInterestGroup('exile_ig_scope').GetName]"
 exiles_events.1.t:0 "Ett hopplöst folk"
 exiles_events.1.d:0 "På grund av bristande folkligt stöd för[SCOPE.sCharacter('agitator_scope').GetHerHis]sina idéer har han lämnat landet [ROOT.GetCountry.GetName]och[SCOPE.sCharacter('agitator_scope').GetFullName] begett sig i exil utanför våra gränser."
 exiles_events.1.f:0 "”Efter att ha fördjupat mig i frågan har jag nu kommit fram till motsatsen. Arbetarklassen[ROOT.GetCountry.GetAdjectiveNoFormatting] kommer aldrig att åstadkomma någonting.”"
 exiles_events.1.a:0 "En dag kanske saker och ting kommer att bli bättre."
 exiles_events.1.b:0 "Hoppet är det första steget på vägen mot besvikelsen."
 exiles_events.2.t:0 "Ett berömt kafé"
 exiles_events.2.d:0 "Efter ett slumpartat möte på ett kafé och ett ingående samtal har  rekommenderat att [SCOPE.sCharacter('exile_scope').GetFullName],[SCOPE.sCharacter('friend_scope').GetFullName] som för närvarande är bosatt i [ROOT.GetCountry.GetName], ska beviljas permanent uppehållstillstånd."
 exiles_events.2.f:0 "”Om du behöver någonstans att bo kan jag knappast låta bli att bjuda in dig. Det vore en skam för mig att, efter en så fantastisk brevväxling, inte ta tillfället i akt att utforska dina talanger ytterligare.”"
 exiles_events.2.a:0 "Vi kunde knappast önska oss ett mer ansett stöd."
 exiles_events.2.b:0 "[SCOPE.sCharacter('friend_scope').GetFullName]"
 exiles_events.3.t:0 "Stöd från utlandet"
 exiles_events.3.d:0 "Ledarna för[SCOPE.sPoliticalMovement('movement_scope').GetName]  har skrivit till  [SCOPE.sCharacter('exile_scope').GetFullName]och bett att[SCOPE.sCharacter('exile_scope').GetSheHe]  ska återvända till landet för att driva rörelsen framåt."
 exiles_events.3.f:0 "[ROOT.GetCountry.GetNameNoFormatting]”Ända sedan du tvingades lämna landet, jagad av regeringens hundar, har folket sakta börjat vakna upp… Nu är det dags, mer än någonsin tidigare, att återvända och fullfölja den förändring som du så ädelt efterlyste för så många år sedan.”"
 exiles_events.3.a:0 "Det finns inget bättre tillfälle än just nu."
 exiles_events.3.b:0 "Vi kommer inte att överväga den här möjligheten."
 exiles_events.4.t:0 "En vanärad landsflykting"
 exiles_events.4.d:0 "[ROOT.GetCountry.GetName]Efter en våldsam maktkamp om har de[SCOPE.gsInterestGroup('failed_revolution_ig').GetName] hamnat på historiens förlorarsida.[SCOPE.sCharacter('failed_revolution_agitator').GetFullName]har försökt fly landet för att undkomma repressalier."
 exiles_events.4.f:0 "Det var en plan som[SCOPE.sCharacter('failed_revolution_agitator').GetSheHe]han hade hoppats att aldrig behöva genomföra. Att ta sig ut[SCOPE.sCharacter('failed_revolution_agitator').GetHerHis]ur bostaden genom ett fönster, fly genom en mörk, lerig tunnel – och sedan vidare ut i skogen och över gränsen långt borta."
 exiles_events.4.a:0 "[SCOPE.sCharacter('failed_revolution_agitator').GetSheHe|U] kan se över[SCOPE.sCharacter('failed_revolution_agitator').GetHerHis]sitt liv i en utländsk ruckel."
 exiles_events.4.b:0 "Trakassera[SCOPE.sCharacter('failed_revolution_agitator').GetHerHim]  vid varje steg på vägen."
 exiles_events.5.t:0 "Den ångerfulle landsflyktingen"
 exiles_events.5.d:0 "Glada över de senaste besluten från vår regering har man meddelat[SCOPE.sCharacter('exile_scope').GetHerHis]sin avsikt att återvända till [ROOT.GetCountry.GetName].[SCOPE.sCharacter('exile_scope').GetHerHis|U][SCOPE.sCharacter('exile_scope').GetFullName]De[SCOPE.gsInterestGroup('exile_ig').GetName] kvarvarande medarbetarna i firar detta."
 exiles_events.5.f:0 "”I mina tidigare strävanden sökte jag efter en enastående ledare för [ROOT.GetCountry.GetNameNoFormatting], en som kunde lösa de många problem som vårt folk står inför... Det var bara min egen envishet som hindrade mig från att inse det jag inser nu. Det är du själv som har blivit den enastående ledaren.”"
 exiles_events.5.a:0 "Ta emot[SCOPE.sCharacter('exile_scope').GetHerHis]lyckönskningarna och[SCOPE.sCharacter('exile_scope').GetHerHis]återgälda dem."
 exiles_events.5.b:0 "Kan vi verkligen vara så säkra på att[SCOPE.sCharacter('exile_scope').GetSheHe]det är välmenande?"
 exiles_events.6.t:0 "Politisk migration"
 exiles_events.6.d:0 "Det komplexa och instabila politiska läget i[ROOT.GetCountry.GetName]  har visat sig vara lockande för politiska flyktingar och statslösa personer, som har börjat samlas på kaféerna i [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]."
 exiles_events.6.f:0 "[SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]Åh, du bristfälliga men ändå glödande juvel… var annars skulle man kunna se tre olika uppvisningar inom en fem minuters promenad?"
 exiles_events.6.a:0 "De är välkomna att ansluta sig till den stora skaran av röster."
 exiles_events.6.b:0 "Dessa människor gör narr av [ROOT.GetCountry.GetName]."
 exiles_events.7.t:0 "En landsflykting vid portarna"
 exiles_events.7.d:0 "Det relativt generösa[ROOT.GetCountry.GetAdjective]invandringssystemet har länge varit lockande för dem som flyr från sina hemländer.[SCOPE.sCharacter('exile_scope').GetFullName] Nyligen har man lämnat in en ansökan om att få ansluta sig till strömmen av människor som flyttar till [ROOT.GetCountry.GetName]."
 exiles_events.7.f:0 "Det var ett namn på en väldigt, väldigt lång lista – ett namn som hade passerat genom flera byråkratiska instanser innan det uppmärksammades. En ödesdiger dag pekade dock en kontorist, precis när hans skift var slut, på namnet och yttrade de ödesdigra orden: \n\n”Jag skulle kunna svära på att jag har hört talas om[SCOPE.sCharacter('exile_scope').GetHerHim]det förut.”"
 exiles_events.7.a:0 "[SCOPE.sCharacter('exile_scope').GetFullName]Så småningom kommer även det att bli [ROOT.GetCountry.GetAdjective]."
 exiles_events.7.b:0 "Vi kommer inte att acceptera någon som den här, oavsett tidigare praxis."
 exiles_events.8.t:0 "Ett utländskt manifest"
 exiles_events.8.d:0 "[SCOPE.sPoliticalMovement('movement_scope').GetName]De nyligen översatta verken av[SCOPE.sCharacter('exile_scope').GetFullName]  har blivit populära inom . Förhållandet har utvecklats så långt att[SCOPE.sCharacter('exile_scope').GetFullName]  öppet stöder rörelsen."
 exiles_events.8.f:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]”Och för en hel stor klass finns det ingen annan väg, särskilt inte för en nation som är så utpräglat praktisk som den. Det viktigaste är att få arbetarklassen att agera som en klass; när det väl är uppnått kommer de snart att hitta rätt riktning, och alla som gör motstånd kommer att hamna i kylan med sina egna små sekter.”"
 exiles_events.8.a:0 "Vår kamp är internationell!"
 exiles_events.8.b:0 "Denna utländska inblandning borde ha bestraffats."
 exiles_events.9.t:0 "Amnesti för regimkritiker"
 exiles_events.9.d:0 "[SCOPE.sCharacter('exile_scope').GetFullName]De[SCOPE.gsInterestGroup('government_ig_scope').GetName]har lämnat in en framställning till regeringen om amnesti för före detta dissidenter utomlands. Bland dessa ingår framför allt , en av deras tidigare medarbetare."
 exiles_events.9.f:0 "Vi har sedan länge intagit ståndpunkten att tidigare regeringars handlingar inte har någon inverkan på nationens[ROOT.GetCountry.GetAdjectiveNoFormatting] grundläggande karaktär. Med denna princip i åtanke ber vi er att bevilja förlåtelse till vissa personer som tidigare har förvisats utomlands, och att vi en gång för alla lägger dessa händelser bakom oss."
 exiles_events.9.a:0 "De förtjänar en belöning för sitt trogna stöd."
 exiles_events.9.b:0 "[SCOPE.sCharacter('exile_scope').GetHerHim]Om vi inte hade gått i exil, skulle de aldrig ha stöttat oss alls."
 exiles_events.10.t:0 "En hälsokris"
 exiles_events.10.d:0 "En framstående[ROOT.GetCountry.GetAdjective]politisk flykting har insjuknat allvarligt under[SCOPE.sCharacter('exile_scope').GetHerHis]sin vistelse utomlands.[SCOPE.sCharacter('exile_scope').GetSheHe|U][SCOPE.sCharacter('exile_scope').GetFullName]Han har ansökt om att få återvända hem under en tillräckligt lång tid för att kunna genomgå medicinsk behandling."
 exiles_events.10.f:0 "En människas karaktär spelar ingen roll – pesten kan mycket väl drabba dem alla ändå."
 exiles_events.10.a:0 "[SCOPE.sCharacter('exile_scope').GetSheHe|U] bör ta konsekvenserna av[SCOPE.sCharacter('exile_scope').GetHerHis]sina handlingar."
 exiles_events.10.b:0 "Vi har råd att visa barmhärtighet mot de sjuka."
 exiles_events.10.c:0 "[SCOPE.sCharacter('exile_scope').GetSheHe|U] är välkommen att stanna kvar efter[SCOPE.sCharacter('exile_scope').GetSheHe] att behandlingen är avslutad."
