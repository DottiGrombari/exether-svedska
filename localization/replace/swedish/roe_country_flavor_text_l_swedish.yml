l_swedish:
 DUM_FLAVOR_TEXT:0 "The Empire of [concept_dumonia] is a land of ancient traditions and fading glory, once the center of human power before the rise of magic brought it crashing down. The [concept_nightfall] led to the collapse of most of the empire, and today only the heartlands on Noricum remain under imperial control. It must grapple with a host of internal problems lest it be reduced to an even more humiliating state. Internal divides and external enemies, the Empire will have to tackle and resolve those issues before it can even consider looking West to restore its former glory."
 ABR_FLAVOR_TEXT:0 "Albiar is a large Imperial province of the currently withering Dumonian Empire. Its loyalty is tenuous at best as only through proximity to the heartlands has Albriar been kept under the thumb of Crownpeak. Though as [concept_dumonia] continues to struggle to regain its footing after losing so much, the Albrian elite have ceased the opportunity to squeeze the Crown for more and more freedoms. In more recent times leading to the establishment of 'Albriar' as closer to a state-within-a-state instead of an Imperial holding. The Avalorean people thus enjoy far more autonomy in the Empire than its many other subjects currently; a fact which has caused great envy across the Empire... for if the Avaloreans can demand so much from the Crown, why can't they as well?"
 AUM_FLAVOR_TEXT:0 "Arelon is a small, although powerful, state that serves as the center of the [GetReligion('cult_of_the_sun').GetName] Cult of the Sun and its church hierarchy. It had long been a dominion within the Dumonian Empire, but now finds itself independent and poised to spread its influence to the foreign heathens. The state is said to be guided directly by Holy Kamiros, Lord of Light, with the Luminarch merely serving as His interpreter in His absence. Kamiros, The Bright Judge, works tirelessly to uphold this blessed land as a haven for all righteous believers. He drives away the darkness and spreads His divine light through His holy words. Arelon is a sacred land, a bridge between the mundane and the divine. It is a beacon for all who seek Kamiros' warmth and wish to embrace His teachings."
 YAN_FLAVOR_TEXT:0 "The Yanger Nomads are a people hailing from the the vast steppes of the western reaches of Noricum. Historically, these lands were a former imperial province of [concept_dumonia], the land ripe for wealthy Dumonian ranchers.  However, it was not the wealthy Dumonian landowner who would come to rule the steppe; but the horselords of the Yanger and their riders.  Now, [concept_dumonia] has retreated to its' heartland, and these steppes lay in control of men hardened by war. With much talk of magic and the return of the gods, people look for an answer. In the eternal skies of the steppes exists a chaotic storm, serving as a prophecy for the many religious of forthcoming change. The steppe-riders lie prepared to weather the storm once more."
 RVC_FLAVOR_TEXT:0 "The Midnight Court, Dreadmoor. A nation purely born from the Chaos of the [concept_nightfall] and the failure of Men. A state managed by Arch Vampires, the corrupt and fallen brethren of the Sunkissed. The humans which dwell in these lands are sickly and pale by nature, unhealthy and often short lived as their Vampire Masters view them as nothing more than cattle. Their bodies and souls nothing more than resources to be expended as seen fit by Vampires for they are potent Mages naturally.  Reviled by all and for good reason the Midnight Magocracy has isolated itself from the world. A land of mystery now to the Human nations around it Dreadmoor year by year becomes more of a threat to peace in Southern Noricum. The Vampire Lords are a greedy caste, and they will stop at nothing to extend their reach over more and more unwitting souls of which to dominate, corrupt, and expend. The question remains, do they have the cunning required to achieve their goals? Or will their greed be their undoing against the stout hearts of men?"
 VAE_FLAVOR_TEXT:0 "The Expedition is a grand venture of this modern age, only seven years old, yet decades in the making. With the help of the Vairian Navy, Icebreaker Expeditionary Limited has taken over a Zakonish leviathan whaling colony, and expanded from there.  With the Vermillion Thicket displacing millions from the homeland, thousands of Vairian refugees arrive monthly, destitute and needing order. This the company provides as the fires of industry require more bodies against the cold. Penal labor has become commonplace, the worst jobs and living conditions going to convicts.  In this inhospitable northern land, progress must be forged like the steel prow of an Icebreaker. Will adversity forge an orderly society, or turn brittle and shatter with frost?"
 DRK_FLAVOR_TEXT:0 "Drysgolmark is a Jalian exclave situated on the fringes of the Yanger Steppes born from Jalian colonization from the South hundreds of years ago. The small amount of woodlands to its West forming a natural barrier which prevented Yanger tribes from attempting to settle the territory out of inconvenience. It is a densely populated city-state in current day that has in recent years fallen under the direct influence of Stagworth to its south. The larger Jalian state setting its gaze on the creation of a larger cultural union of Jalian people. Drysgolmark has thus become the first domino to fall in regard to Stagworth's plans. But that does not mean it cannot carve out a niche in the rising power's fledgling Empire. Rise, Drygolites! The time has come to show those Stagworthers that you are a prize to be cherished, not a stepping stone!"
 JUR_FLAVOR_TEXT:0 "The Inquisitor calls upon the flame of the mighty, holy Kamiros, God of light. He calls unto the bright judge to vanquish all whom sin heinously under the cover of night. This land has incurred the punishment of the nightbane, and Jurian answers the call. With fanatic fervor, he has established a foothold for the inquisition to carry out retribution and return these green pastures to the righteous. This expedition will prove his faith and spread the truth of Kamiros to the ignorant. But most important of all the oncoming campaign will once and for all exonerate the Sunkissed of their failure to protect Stonewise decades ago. Specifically through the complete and utter purification of Dreadmoor and the extinction of this so-called 'Midnight Court'."
 DOV_FLAVOR_TEXT:0 "Dovedale, once a collection of minor provinces within the Empire, is primarily populated by Jalians. Its dense woodlands served as a natural barrier between the Empire's heartland and its eastern holdings. Despite their unimportant economic status, the Jalians thrived until the [concept_nightfall], when magical calamities shook the region. With the Empire stretched thin, the plight of Dovedale was neglected, leading to a popular uprising for independence. The Jalians banded together to combat the encroaching darkness, fighting a long, bloody, and costly war against magical beasts and mutants. The ends justified the means and by the end of this decades-long conflict 'Dovedale' would stand as the de-facto safest land in Noricum. Ironically right above perhaps the most dangerous place in all of Noricum; Dreadmoor..."
 ROF_FLAVOR_TEXT:0 "Rosecroft is yet another breakaway state in Southern Noricum. Initially the Rosecroftans had withdrawn from the mainland when the [concept_nightfall] ensued. The monstrous new wildlife proved too much for them and the last resort was pulling away to Caecarw which overcrowded the peninsula. This fact eventually leading to a small 'crusade' by Rosecroft's leadership to establish a beachhead on the mainland once more a decade later. The attempt saw success and a militarized holding in Bancfan was established. Decades have since passed as Rosecroft continues to exist in relative peace...however the arrival of the Inquisition to the South and the recent activity of Dreadmoor to the north leaves Rosecroft in a precarious position! Even more pressingly it seems agents of the Inquisition and the Midnight Magocracy have both entered the nation and begun a secret war upon one another already on Rosecroftan land..."
 FOX_FLAVOR_TEXT:0 "Stagworth, the former administrative capital of the Dumonian Empire's Eastern Noric provinces and cultural heart of the Jalian people. Initially loyal to the Crown during the Viceroy's war,  Stagworth joined the growing list of provinces breaking away from the Empire as supernatural incursions ravaged the land and requests for aid remained unanswered. This decision was not made easily as Stagworth pushed itself to its breaking point before Dovedale's revolt finally broke the back of the province and forced it to look out for its own citizens. The Jalians believed wholly in the Dumonian Empire. But those times have long since passed as nearly 40 years have come and gone since Stagworth declared itself independent. Much of the population no longer remembers the times of the Empire and a strong sense of Patriotism is felt by the Stagworth Jalians. The politics of Dunefield have begun deeper interests in Imperialism as a result. Already the Jalians of Drysgolmark has fallen beneath the thumb of Stagworth's influence...and yet still there is more cultural kin to be brought into the fold. But first one thing has become abundantly clear; Dreadmoor is becoming an issue that can no longer be ignored..."
 BIE_FLAVOR_TEXT:0 "Brackenshire is the birthplace of the Nivaskyan people, a Northern Noric culture that is famed for its resilience to the elements and hardship as well as its prowess in fishing and seafaring. During the height of the Empire's reach, Brackenshire narrowly avoided domination through the wide swathes of land occupied by their Yanger cousins, and through the deep pockets of their investor's guild. The Empire's wane in the decades since has allowed Brackenshire to slowly assert itself more firmly as a regional power. Dumonia no longer has the presence necessary to threaten potential imperialist interests... and the capitalists of Crystalbrook have already begun buying out the industry of the horselords to the south. Meanwhile, their kin of the North, Mistbourne lie ripe to be pressured into political union and even further north lie the land of Half-Giants...\n\nWill the Brackenshire Investor's Guild stand tall, or find itself subject to hostile takeover?"
 MBR_FLAVOR_TEXT:0 "Many, many centuries ago Nivaski settlers set out from the Bracken peninsula to colonize the lands of the north. In the times of the Empire it was a rather lawless region of the far north. Too problematic to bother settling or conquering. Not much has changed in that field even today beyond a more settled soceity as well as possessing a potent squidding industry which supplies dyes to Northern Noricum. Still. The Nivaski of Mistbourne are proud of their humble stature. They etch out an honest life in the chilly north and are far from any real threat to its national integrity. Though, its cousins in Brackenshire call for the unity of the Nivaski people...will Mistbourne answer the call? Beyond that there lays strange reports from the northern reaches of the country. Strange beasts emerging from the Whistling Summits and the sightings of stout humanoids who's skin is as black as tar itself. A cause for concern potentially and source of potential pressure to agree towards Crystalbrook's pressures for unity..."
 EVR_FLAVOR_TEXT:0 "Everglen is a relatively secluded exclave of Avalorean people that was fortunate enough to escape the reach of Crownpeak during the [concept_nightfall]. Its local geography left it benefitting little from being part of the Imperial economy, leaving the Avaloreans of Everglen paying tribute to the Crown for no real benefit. Independence was a no-brainer once the opportunity presented itself! Still, token contact is made between Albrian and Everglenian traders which exchange gossip and goods alike. In recent times its local lake has begun being exploited for wishstone and magic has slowly begun to penetrate into the Everglenian economy which might serve to springboard it from an irrelevant rump state to a center of magical learning in the far reaches of northern Noricum."
 LAR_FLAVOR_TEXT:0 "During his expedition to the Lonely Isles, a young Kiarr Kamiel Romhaar met a great many islanders. Among them was the man who would become the current Prince, Orion Thrain. While accompanying Romhaar on his expedition as a local guide and diplomat, the Prince grew entranced by the advanced culture and technology the Dumonians brought with them. After departing as friends, the young Prince kept in diplomatic correspondance with the Kiarr, taking on a new Noric name as well as Kamiran missionaries to help modernize and develop his domain. As the Cult of the Sun entrenches it's grip on the Lonely Isles, can Larimora modernize without flying too close to the Sun?"
 AHO_FLAVOR_TEXT:0 "Despite the Nightfall, despite the Changeling epidemic, even despite the Viceroy's War, Achon still stands as a beacon of Magical Learning and Enlightment in a world darkened by ignorance and tribalism. While the Magocrats of Achon eagerly point to their cutting-edge technology as evidence of the superiority of Achonite minds, it is not an entirely honest presentation...The Secretkeepers, intellectually elite dwarves of a bygone era who live deep within the southern mountain of Vyndervoht, played a crucial role teaching the first generations of Achonite Magocrats how to forge power on the anvil of knowledge as the dwarves had done themselves in their own time. The Mages of Achon did not simply happen upon their knowledge due to their 'superiority', it was exchanged like any good for the military and economic strength of a weaker, but still powerful Achon. This reality is a closely-guarded secret which would undermine the patriotic and jingoistic rhetoric of Achon's Magocrats if it was public knowledge. As the saying goes, 'History is written by the victors' and Achon must ensure it writes the history of its people."
 ARR_FLAVOR_TEXT:0 "Arrador, once the Jewel of the Dumonian Empire, rose to prominence through unchecked innovation and wealth, becoming the Empire’s most influential territory outside Noricum. Its booming capitalist class, emboldened by the Empire's lack of oversight, seized the opportunity during the Nightfall disaster—a calamity that destabilized Dumonia. In the chaos, the rebellious Dorites and their allies declared war, swiftly defeating the Empire's forces and securing their independence.\n\nNow, nearly five decades later, Arrador stands as a titan of industry, but at a heavy cost. Industrial growth has concentrated power in the hands of factory-owning elites, while indentured servitude grips the working class. The state’s true rulers are no longer its officials, but the wealthy elite, whose control over the nation remains unchecked—at least for now."
 EBR_FLAVOR_TEXT:0 "The Republic of Ebridor stands as a humble entity along Settler Coast's northern coastline. The blowback of the Nightfall sent waves throughout Ebridor but the overall impact was moderate at best compared to neighboring Achon which suffered immensely in the aftermath. The Viceroy's War which transpired around this time also impacted Ebridor to a minimal extent. Arrador, ever savvy-minded for business promptly established warm relations with the fresh Republic. The passing decades consisted of creating a brand new society, and with the Dorites brinding in new ideas and technologies, the Eberri became an developed nation, joining the likes of Arrador. Even though the newcomers seemed honest and helpful, as it turns out they might have another goal for the Eberri. The nation is still haunted by its past, and the future is threatening. Only time can tell what will happen to the Eberri."
 PFL_FLAVOR_TEXT:0 "Pefril is an enigmatic realm of changelings, realmtouched humans gifted with the ability to shift their appearance. Pefril is a nation born out of a rejection to oppression over the nature of the Changeling people. Banding together in the Hinterlands of what was once Achonite land and forming a nation state for the sake of freedom for Changelings and freedom to express their powers. But this freedom comes with a price, their now distant cousins, humans, carry a deep distrust for Changelings. Leading to a rejection and complete lack of recognition of the Pefrilan state by its neighbors.\n\nTo its north, the Magocracy of Achon eyes Pefril with a disdainful gaze. Viewing the country to be nothing more than a nation of squatters sitting upon rightful Achon territory. It is unlikely that there will ever be reconciliation with the Achonites...especially considering their continued oppression of Changelings unfortunate enough to be under their thumb. Hope however lies to the South as the Astral Consortium is a League of coin and and innovation, not tradition and pride. Perhaps the way to recognition and acceptance is a display of ingenuity to the Consortium? Membership would be a large boon to the fledgling nation..."
 VHT_FLAVOR_TEXT:0 "From the depths of Mount Vyndervoht the Vynduri Dwarves stirred some years prior to the Nightfall. The Archmages of their society awakening far ahead of the rest of Dwarvenkind. But they did not choose to spring from their mountain home, instead keeping to the protection of their sacred halls. Content to safeguard the collection of their culture's knowledge and conduct magical experiments from the safety of their mountain. The lack of practiced magic in the world pleased the Vynduri Archmages to a degree as they discovered that magic had returned to the world.\n\nQuietly they made use of it...and in doing so they came to discover that Khus had begun its secretive exploitation of magic. Sensing a disaster was soon to come, the Vynduri Mages set about preparations for such an event. Chief among this was subtly attempting to aid the neighboring Achonites as much as possible as the Vynduri had developed cordial relations with these men of reason. As expected the Nightfall transpired and the world was wounded mortally. In the advent of the destruction the Vynduri formally ended their isolationism and set out to deepen their ties with the Achonite peoples as the rest of Vynduri society arose from their entombment. Their desire to learn struck a cord with the Vynduri and thus the troves of Vyndervoht were opened to the select few Achonites who were allowed to learn mystical arts. This act would pave the way for the generations of Mages that rule Achon today. Currently Vyndervoht sits as a junior partner in an economic union with the Achonites. The Vynduri have benefitted greatly from this relation and there is lies little reason to break away from Achon. Especially when considering the disdain the Dwarves possess for Changelings...impure creatures wrought by the Nightfall and a perpetual reminder of the disaster brought on by the misuse of magic."
 CER_FLAVOR_TEXT:0 "Ceraun stood loyally with [concept_dumonia] during the Viceroy's War, fighting and falling alongside Dumonian soldiers. Yet, despite their bravery, Dorite tacticians secured a devastating victory. Wounded and weakened, [concept_dumonia] withdrew from the continent, severing Ceraun from the Empire and leaving it to fend for itself.\n\nIn the decades since, Ceraun has fought fiercely to establish itself as a military power in Settler's Coast. Through the subjugation of the Rivierling Halflings and brutal wars—culminating in large scale deployment of Wyldfire Tincture against the Buramog Orcs and the creation of the Plaguewood—Ceraun has partly achieved its ambition. Even [concept_dumonia] now recognizes its strength, forming an alliance and investing heavily in Cerunite lands. But this rise came at a heavy cost—blood, freedom, and countless lives, as the military junta clings to power under its last surviving leader, Ludric Zarnak."
 GCS_FLAVOR_TEXT:0 "The Halfling Principality of Smallshore-Gladcross, placed on the coast between Arrador and Ceraun, is growing increasingly insecure as its titanic neighbors vie to dominate one another and the world as a whole. The delicate balance which has preserved Smallshorian soveriegnty grows increasingly fragile as both powers desire to expand their market south of the Principality, in the resource-rich Moorweald and Whisker Fields. Will Smallshore be able to withstand the aggression of its potential enemies, or could it perhaps play its cards perfectly enough to leverage that aggression?"
 VOZ_FLAVOR_TEXT:0 "When the Vozi Dwarves emerged from their Hold following their long slumber, they found their ancestral lands arid and inhospitable. Through ingenuity, they overcame environmental hurdles through by utilizing mountaintop glaciers for water in combination with mountainside terrace farms.\nMore recently, the arrival of the Aridrun elves has sparked a renaissance for both the dwarves and the newcomers. The two races find themselves complementing each other in culture, trade and politics. The Chimesilt trade, previously an odd niche of the Nogi Sands, has made the region very wealthy thanks to an ever-growing demand abroad.\nWill the airships flying the routes of the 'Silt Wind' herald a new future for the Vozmead Peaks, or will history remember them as the beginning of a dark turn in dwarven history?"
 DRO_FLAVOR_TEXT:0 "Recently arriving on a massive ark from the distant continend of Iaslesh, the South Sea elves came to Zalaron seeking their lost Goddess after feeling the impact of the Nightfall from across the world. They've since become hardened by the Nogi desert they now inhabit, having dug intricate subterranean settlements and taking advantage of the Chimesilt trade with their dwarven friends, the Vozi.\n\nThe Aridrun have recently sent emissaries to the other elves of Zalaron, offering riches and knowledge from the south as tokens of friendship. Their goals are noble, but none can deny that these are missionary expeditions in search of new followers — and in search of their lost goddess.\n\nWill the people of the Nogi unite for a better future or turn against eachother for their own pursits?"
 WHI_FLAVOR_TEXT:0 "The Whisker Fields have remained a largely neutral agricultural state throughout the chaos of the Age of Man. Beneath the surface, however, brews a crisis born of their famously fertile fields and cutting-edge agricultural breakthroughs: overpopulation! The advent of industry and railroads in neighboring countries may catalyze the unemployed masses of Whiskerfield to venture out into the world. As technology and hawkish neighbors erode the softpaw way of life, each citizen will have to ask themselves the question: will you be man or mouse?"
 EME_FLAVOR_TEXT:0 "In Siren's cradle, that fair Isle dwells; ’Neath vaulted skies, through ocean swells; Her steadfast folk with valiant hand; Hold fast the glory of this ancient land; Her gaze serene, her heart is fair; Her soul is stout, beyond compare.\n\nFor as long as its splendid cities have stood, the proud denizens of the Emerald Isle have sought to preserve their beloved culture and traditions. In this land every city, village and street boasts of its own legends, heroes and many victories over their rival neighbours. Indeed, the only thing that could cause them to put aside their squabbling was the imminent threat posed by the expansive Empire of [concept_dumonia] and its bastard children in the Settler's Coast. United by common cause and the riches political unity has brought; the League has stood the test of time. While it presents a united front abroad, its internal politics remain as turbulent as ever. Though its cities no longer war amongst each other, their fighting has instead moved to the chambers of parliament. Conflict over land and petty slights have made way for fights over the budget and federal law. Regardless of how vicious the politicking may become, the Emerald League remains solidly opposed to those that would threaten its freedoms and its bottom line."
 SMA_FLAVOR_TEXT:0 "The Halfling Principality of Smallshore-Gladcross, placed on the coast between Arrador and Ceraun, enjoys a positive relationship with its powerful neighbors as an important exporter of goods. This balance is however increasingly fragile as the two powers desire to expand their market south of the Principality, in the resource-rich Moorweald and Whisker Fields. Will Smallshore-Gladcross manage to protect its independence while many citizens call the monarchy to safeguard the oppressed Halfling minority in Ceraun?"
 TLD_FLAVOR_TEXT:0 "The Tolorri are a splinter group of the Vozi, who left their mountainous homeland in the south. They journeyed north from Skypiercer Peak, passing through the Enelli state of Serbinelle, and eventually settled in the borderlands of Vozmead. Here, they thrived despite facing the harsh environment. To the west lay the Nogi Desert, with its seemingly endless sands inhabited by the Dark Elves from a place so distant it isn't even on their maps. To the north, a hostile wasteland teeming with mutated creatures created by human recklessness of Ceraun, whose expansionism is a constantly looming threat. To the east lies more swamps and Ocelians who inhabit them, though the Tolorri fear their land may become a tempting target of conquest for the greedy Emerald League, whose colonies have begun to spread across Exether. And to the south lie their brothers, who they left, but now ironically seem like the only choice for a people enclosed by strangers. Trapped, once more, like a statue deep underground, with nowhere to go but further down."
 RTD_FLAVOR_TEXT:0 "The Buramog Wars, a series of conflicts in which Ceraun fought the Orcish Clans of Buramog, have left the Orcish lands blighted by Ceraun's Wyldfire Tincture. This powerful chemical agent has withered the once-lush fields and forests of the Orc clans turning them into an inhospitable 'Plaguewood'. Can the martial traditions of the Buramogs keep protecting them against the ambitions of their neighbors?"
 BDB_FLAVOR_TEXT:0 "The Buramog Wars, a series of conflicts in which Ceraun fought the Orcish Clans of Buramog, have left the Orcish lands blighted by Ceraun's Wyldfire Tincture. This powerful chemical agent has withered the once-lush fields and forests of the Orc clans turning them into an inhospitable 'Plaguewood'. Can the martial traditions of the Buramogs keep protecting them against the ambitions of their neighbors?"
 CLL_FLAVOR_TEXT:0 "Known as the 'Bridge Between' among many, the half-elves of Rannor have become the facilitators of communication between species and cultures in Zalaron. They don't expect each other to put themselves in danger for strangers' sake, but when possible, half-elves do what they can to help others with information, shelter, and the like.\n\nThere has always been an elite force of spies and assassins within Rannor, known to few. Only special clients — nobles, merchant lords, and the like — have access to these spies. An organization known only as the Crows has exploited this fact by infiltrating royal courts and influential guilds, their agents often posing as entertainers and artists while offering information brokering, assassination, and espionage to those in the know."
 TEF_FLAVOR_TEXT:0 "The High elves of Teferet have long been known for their magical prowess, and their expertise in magic has made them one of the most sought-after groups of magical artisans in the world. When the [concept_nightfall] ravaged Khus and the surrounding area, the lands of Teferet were suffused with latent magic. This proved too much for most of the humans residing there, leading to a mass exodus of those who had no latent magical ability.\n\nBy quickly settling the sparsely populated land, the Tefereti elves seized this opportunity to call a single land their home since the age of gods. The magically-infused Lake Eutrater in the area empowered many of the elves with magic, allowing them to regain the powers of old. Although most of the remaining humans in the area are magically inclined, the elves are not quick to forget their mistreatment at the hands of humans and refuse to treat them equally.\n\nRecently, the subjugation of the Wood elves living in the Feylight Forest by the human nation of Thiral has caused outrage within the local poulation. Many have began demanding their leaders take action and free the elves from human rule. However, there are whispers that factions within Teferet may be pursuing darker magical secrets to put an end to actions like this in the area. There are fears that this could lead to a dangerous conflict with other nations if it were to be uncovered."
 SET_FLAVOR_TEXT:0 "As the Age of Man began, the elves of the Starshimmer Sea found themselves facing the prospect of human yoke. Unlike the Tefereti or Kashtarnel, who faced the brunt of human encroachment, the Seleni found themselves instead on the margins of three separate human realms being mostly ignored.\n\nWhile the neighbouring Eutratoi Kingdom, Anwarthi Dominion and Khussite lords would each claim dominion over Seleneth, none of them put in much effort to enforce their claims. Surprisingly, the Seleni themselves worked very hard to ensure this state of uncertainty remained. As the human realms did not seem eager to come to blows over these borderlands, the elves managed to retain a certain level of autonomy by paying lip service to their would-be masters. To the human states, these reclusive elves living on the edge of their realms caused no trouble at all. Unlike their own fickle human subjects, they always paid their dues on time and in full.\n\nFor many centuries the Seleni maintained this position, avoiding attention and carefully navigating the whims and foibles of their neighbours. Learning their secrets, their strengths and weaknesses, just in case. So when the Khussites rediscovered the secrets of magic, the Seleni paid very close attention. When the ravages of the [concept_nightfall] destroyed Khus and drove the humans from the land, the Seleni were in the perfect position to reassert their independence and reestablish the magical traditions of the elves built on a foundation of Khussite secrets. Knowledge they amicably shared with their resurgent elven kin. Well, most of it anyway. The mage-lords of Seleneth still hoard secret knowledge none but them remain privy to. Their gaze is fixed northwards, for there are many more secrets still buried beneath the crystalline wasteland of old Khus."
 OPA_FLAVOR_TEXT:0 "Once, elven civilization ruled this land. We, the blessed children of the gods; the last creation; the most divine of all mortals, ruled. Ours was a might unmatched by any of the lesser races, fumbling around in the darkness of our shadow. It should not have surprised us that their base and foolish nature would have them conspire against their betters. That the vile winged lizards and their treacherous mortal lackeys would break the world itself to ruin us. Yet, they did; they banished magic and the very gods themselves; they drained the colour from the world. Our gods begged us to flee across the sea, but we Kashtarnel would not go so meekly. No, we would stay behind and fight.\n\nHumans; a flawed creation; possessed of low cunning and avaricious greed; a weed, pernicious and ever-present. Yet, there were so many of them; too many. Our ancestors were forced to abandon their grand cities, vaunted temples and luxurious estates. They retreated into the desolate hills to prepare for the coming storm. Abroad, our kin bowed their heads in defeat or abandoned their senses in the wilderness; we would do neither. We kept the flame of tradition burning during centuries of hardship. Throughout the hills the divine symphony of the Fosirmi Pantheon rang without restraint. How it would beckon the vile creatures to come sniffing for spoils; how they longed to take what was ours and subjugate us like our weak kin; how they failed, again and again.\n\nHow right we were to suffer for so long, for we have been rewarded for our faith. Magic has come again and our priests hear the soothing voices of our creators once more. The power of our bloodright has returned and we have grown strong again. All the world may have forgotten, but we have not. We were weak once, but no longer. Now is the time for elvenkind to take its rightful place as rulers of this realm; now is the time for our revenge. It will begin with the half-human blood-traitors of Sirlael and then our would-be masters will at last feel the righteous wrath born of an Age of Humiliation."
 THI_FLAVOR_TEXT:0 "Thiral, the cradle of chivalry, once saw the Rose Knights in shining armor riding out on heavy destriers to vanquish Orcs and creatures of the night. However, those days are long gone. Today, Thiral resists the loud, ugly, and dirty advancements of metal and magic embraced by its neighbors. During a recent expansion northward, Thiralians encountered elves who were not the legendary paragons of beauty but primitive hut-dwellers, allowing the Feylight Forest to fester. Determined to civilize the forest and its inhabitants, Thiral took action.\n\nThis intervention into Feylight has brought the ire of the Teferet Elves which see this act as one of disgrace for Elvenkind. Intent to challenge Thiral's claim on the region in time. To the South meanwhile failed revolutionaries have escaped into the Dark Morass to hide for now.\n\nSimpler times have faded for Thiral now and it must take action against these external threats. Much more it must face the reality that its traditions cannot be maintained if it is to remain a dominant power on the continent. Will a balance be found? Or will Thiral formally end its glorious past to build a stronger, albeit uglier future?"
 PRI_FLAVOR_TEXT:0 "Prilyra is the famed breadbasket of the Settler's Coast. During the Viceroy's war, Prilyra had remained loyal to the empire, the sleepy rural communities saw little reason in marching from their homes for so-called 'Independence'. Unfortunately for them, they chose the losing side of that war. Swarmed over by the Rebelling provinces and promptly forced into the Astral Consortium that formed following Dumonia's defeat. A gentle hand during the occupation kept relations with the Prilyran people at a calm state. Decades have passed since and little has changed for the Wealder people of Prilyra. They are a simple farming society and above all simply wish to be left alone. The world can change as much as it pleases, for Prilyrans? As long as harvests are good, life is good and they will fight to guarantee that if needed."
 KRC_FLAVOR_TEXT:0 "The province of Mistreach has long been a vital crossroads between Arrador and Emparal. The flow of goods helped solidify the 'Mistreachan' provincial identity and its dependence on both Emparal and Arrador left it with no choice but to side with them during the Viceroy's War. Despite this, Emparal would still cast its shadow of influence over Mistreach in the coming decades after the war. Culminating in establishing a Personal Union and renaming it to the Principality of Kracia instead. For the people of Mistreach it remains unlikely they will ever have true self-determination. Though...Settler's Coast's relatively quiet political situation seems to be on the verge of an upheaval with its orchestrators yet to be revealed. Perhaps 'Kracia' can find opportunity to the South of Lake Bossard or maybe even at the peaks of Mount Yelfis? Kracia may yet be able to ride this tide of change...or perhaps it will be drowned beneath it?"
 EMP_FLAVOR_TEXT:0 "Similar to Arrador, Emparal was a prospering province during the height of the Dumonian Empire. Similar to Arrador, Emparal fought for its independence in the Viceroy's War following the chaos of the Nightfall. Whilst Arrador did most of the heavy lifting, in this conflict, Emparal also contributed significant manpower and logistical support to the effort. Today Emparal continues to prosper as one of the richest nations along Settler's Coast. Will it settle for remaining in its 'Big Brother's' shadow to the North or will it carve out an Empire to the South? It faces a slew of issues such as the Orcs to their southern frontier and monitoring the developing political situation of the Darvak dwarves to its North. One wrong move could potentially undo decades of prosperity for the enlightened Bossardi state..."
 DAR_FLAVOR_TEXT:0 "The conclusion of the Nightfall saw the Dwarves of Mount Yelfis awaken from their self-entombment surrounded on all sides by unfamiliar faces and even more unfamiliar technology. Utterly encircled, the Dwarves were swift to interact with their industrious neighbors and learn of the last millenia's innovations. Decades later, this early necessity of curiosity has paid off handily as Darvak now stands as a giant of industry in the region. It now stands at the precipice of yet another massive societal shift as Yelfie leaders compete to carve out Darvak's path as an regional powerhouse...or perhaps something even greater?"
 TIZ_FLAVOR_TEXT:0 "No political drama is complete without a romance side plot, and the marriage of Yolmu Tisenari and Alys Zehiran despite all adversity was a miracle in the midst of the theater of chaos brought by the Nightfall. The two rising nations of Athrensei and Thynadûr eye this fragile union hungrily as Yolmu's sister, Nae, gathers supporters from within the admiralty. Will the miraculous union last an eternity... or will it fall to enemies both outside and within?"
 SNM_FLAVOR_TEXT:0 "The Nightfall did not kill all of the Praksian elite of the Empire of Khus, sparing only those who were outside the plateau. Within the chaos of the native Lyseians of the coast vying for power, a Praksian general rallied the lost refugees fleeing the destruction of Khus to form a nation where they were not unwanted immigrats but true citizens. Will the Praksians come to rule Lysei as they did a half-century before, or will they fall once again?"
 VER_FLAVOR_TEXT:0 "Vertêni, the City of Learning, was one of the few places in Lysei that remained relatively politically stable. Her universities and knowledge remained intact, and quick political maneuvering ensured friendly ties with neighbors. Will Vertêni be able to maintain its independence among an increasingly imperialist coast?"
 ATH_FLAVOR_TEXT:0 "If the Night Without End was a play, Lys Athren would certainly be the main character. Only a young man when the Nightfall suddenly destroyed all Khussite central authority, Lys quickly rose to power as one of the many competing warlords that filled the power vacuum. One by one, his enemies fell at his feet, and Athrensei became one of the largest domains in the ashes of the Empire of Khus. One of the most well-known haters of magic, he championed the belief that magic was the cause of the destruction, wielding his absolute power within his domain to totally ban the practice. His authoritarian actions had left him with no scarcity of enemies, and an arson event 2 years ago killed his entire family save for himself and one scarred infant. For now, Lys Athren maintains his iron grip on the nation, but his days are numbered. Will young Eren Athren pick up the reins from his grandfather, or will he lose his family's kingdom?"
 THD_FLAVOR_TEXT:0 "Praksian immigrants from the Khussite Plateau flooded the area after the Nightfall, bringing new knowledge and ideas. Achonite investment bought a burgeoning magical industry, and the old guard, dominated by magoclasts, was replaced with the new generation enamored by magic. Will Thynadûr maintain its magical tradition, or will the magical skeptists destroy all the progress gained?"
 MYT_FLAVOR_TEXT:0 "The Republic of Mytistēni, the City of Tomorrow, was founded in wish of a better Tomorrow. In the chaos and despair of the Night Without End, Mytistēni was a bright beacon attracting refugees from both the Khussite Plateau and atrocities committed in the name of both gold and glory. Will Mytistēni retain her status as a beacon of liberty and freedom, or will she be subsumed by her imperialist neighbors?"
 DSB_FLAVOR_TEXT:0 "Long ago, the lands of the Astreval were inhabited by the Golgakar orcs. For centuries, they raided and traded with their human neighbours of the ancient Vaythir state. As the human realm grew in size, population and wealth; conflict between the two groups became ever more common. A daring Golgakar raid on the prosperous Vaythir marches would devolve into a bloody war; one that would doom the orcs. Their warriors defeated in the struggle, the Vaythir armies marched into orcish lands; bloody vengeance on their minds. Unshackled from restraint or decency, the violence quickly escalated. As village after village burned, the Golgakar were forced to abandon their homeland.\n\nThe doomed orcs swept away; upon its ashes throngs of Vaythir settlers would make the land their own. These settlers of the southern plains, the Astreval, would form their own culture over the centuries to come. A hardy people, rough and tough from life on the frontier; from living just a stones throw away from the orcish threat to the north and east. Pious and militant, they are accustomed to fight and die for faith and family. Unsurprisingly, they embraced the Rose Court faith with great enhousiasm. Now their steely gaze has turned beyond home and hearth, for over the horizon the savage heathens have yet to experience the Blooming. You'll never find a clergyman they say; more eager to spread the good word; than those good men from Dushambay; who wield scripture in one hand and in the other a sword."
 RLP_FLAVOR_TEXT:0 "Seeing many provinces of the Vermillion Thicket recently freed from Vairiath control, the Wood elves scattered to establish themselves as free nations. Who will rule the Thicket and stop the corruption from Xalutia?"
 BLL_FLAVOR_TEXT:0 "Seeing many provinces of the Vermillion Thicket recently freed from Vairiath control, the Wood elves scattered to establish themselves as free nations. Who will rule the Thicket and stop the corruption from Xalutia?"
 VLF_FLAVOR_TEXT:0 "Seeing many provinces of the Vermillion Thicket recently freed from Vairiath control, the Wood elves scattered to establish themselves as free nations. Who will rule the Thicket and stop the corruption from Xalutia?"
 LTA_FLAVOR_TEXT:0 "Seeing many provinces of the Vermillion Thicket recently freed from Vairiath control, the Wood elves scattered to establish themselves as free nations. Who will rule the Thicket and stop the corruption from Xalutia?"
 IRA_FLAVOR_TEXT:0 "Seeing many provinces of the Vermillion Thicket recently freed from Vairiath control, the Wood elves scattered to establish themselves as free nations. Who will rule the Thicket and stop the corruption from Xalutia?"
 FEY_FLAVOR_TEXT:0 "The Wood elves of the Charmebrise Woods have recently been put under Thiralian control after the country was not satisfied with their cultural practices. This has left Erdei neighbors angry with the humans who have disgraced elven kind with their pity. Will the Erdei be freed from their oppressors or come to meet new ones?"
 MNN_FLAVOR_TEXT:0 "Seen as a haven for Wood elves, the Gruhain have become a buffer territory between the nomads of the Salt Wastes and humans of western Zalaron. With the Vandori quickly taking over a majority of the Shaking Fields, will this small country of half-elves stand tall, or be conquered by its neighbors to unite the region?"
 XXP_FLAVOR_TEXT:0 "After losing Funétun to the High elves of Opalath, the Timari half-elves turned towards their more powerful-and more cooperative-western neighbors. By providing a refuge for Vairians as they lost their land to the suddenly ornery Vermillion Thicket, Sirlael has been left with a large influx of foreign refugees in it's southernmost provinces. This melting pot of the North holds great favor with it's powerful ally in the west, and will certainly benefit from their friendship as they seek to reclaim their lost territory and expand beyond it."
 WAQ_FLAVOR_TEXT:0 "Wasi Qhuchuy is a holy place, though it is no temple. It is the first foremost of the 'Wasi', grandiose casino-cathedrals operated by djinni in worship of fate as a concept, rather than any particular god. Food and drink and rest are all free, yet everyone leaves the Nawi Oasis poorer than they came. The Chi'in Desert is hostile to all life, the not-so-distant Salt Wastes even moreso, in these places the sun burns so hot it is hard to feel as though any God is watching. The heat makes the House of Fate an appealing philosophy, believing one's life to be a cosmic dice roll away from changing for the better is a great way for mortal minds to bear their burdens. A Wasi simply serves as a way for believers to feel freed from the oppression of nature, in a comfortable place, and their fortunes are a small price to pay for a suspiciously cold glass of water...this is how the Wasi Qhuchuy has survived for millinea: a small, yet spiritually mighty empire of gambling. \n\nBut now, magic seeps through the veil like never before, rigging the game in the favor of those who can wield it. It is said the house always wins, and while the isolated Nawi Oasis has always been protected from foreign aggression by the vast, empty desert, as technology advances so too may foreign armies eager to exploit their vast deposits of Wishstone and Chimesilt..."
 GMR_FLAVOR_TEXT:0 "The Curse of the Salt Wastes has always made the region a harsh place to live, but the Nightfall's escalation of it has brutalized Orc and nomad nations like never before. The relatively peaceful coexistence previously enjoyed by the isolated tribes of the Wastes is no longer an option, even the Djinni who live in the south of the Wastes have no choice but to accept a new overlord, or rule the wastes themselves. The strong have always thrived here, and the weak have always withered. But now more than ever, time is of the essence, as the fabric protecting this place erodes no-one knows how much time is left to unite the Wastes and break the curse..."
 KUN_FLAVOR_TEXT:0 "Kunturmana stands as the most southern human state on the great continent. Most of its population lives close to the coast but great riches and resources might dwell in the vast unchartered lands bordering the west frontier. Only those brave enough to travel westward may know what awaits them there. Neighbouring Gnoll and Orc countries might not appreciate this expansionism... But can Kunturmana really afford to stagnate in those trying times?"
 RAV_FLAVOR_TEXT:0 "The Gnomes of Ravik were once a simple, primitive society. This stature left them open to the expansionism of their southern Human neighbors, Thaloria. Pushed to the coast and oppressed for decades these Gnomes felt no other choice but to embrace the Dark Art of Necromancy when one of their own discovered its secrets, Hasal Nezzelech. Through hate in their hearts for Mankind and their exploitation of the dead, the Raviki have formed a powerful Meritocracy which has surged past that of the decadent Thalorians and handed these brazen fools defeat after defeat. Already two successful Crusades against this abhorrent Empire have come and gone, and the third begins on this day to finally shatter these ancient oppressors of the Gnomish people. The Soulwrought are ready to prove their worth to their creators to join Raviki society and the Gnomes of Ravik stand united to dissolve Thaloria and bring about the the Gnomish Age in Fraesoh! Onwards! The Age of Man is finished!"
 SNB_FLAVOR_TEXT:0 "Long ago, an infamous blight began to plague the peoples of the Dragon Isles. The fear of devolving into kobolds, a wretched lesser form, proved intolerable to the proud scions of dragonkind. They would leave their home en masse to seek shelter across the seas. Still holding the faint hope that this curse would not follow them there, they were proven right. These refugees would establish new homes along the shores of the Citrus Current, free from the turmoil of their ancestral home. It were the Pabardians of Thassarcia who would prove the most promising pioneers.\n\nIn these new lands they had little to fear. Not from the blight, nor from the placid Lacertians or savage tribes of gnolls and orcs. Here they could build a future for their kind in peace. It didn't last. In but a moment, the Kaalkid empire of Yingulnado came crashing down. And from its ruin arose a far more capable new power; the dwarven state of Khaduras. The past few decades have seen them embrace the savages with open arms and greatly expand their military and economic might. The Pabardians have begun to fear again. They fear that this rising power may soon eclipse them and that they'll be powerless in the face of danger once again. Above all, they fear to lose this home too.\n\nFor far too long have the pioneers been content with stagnation. The world is changing fast and Thassarcia cannot afford to be left behind. If we are to survive we must learn their secrets, rally our kin and remind all would-be rivals of their rightful place and ours. If these upstarts do not relent, we will shatter their Ring of Steel. These are our lands and we will not leave again."
 KHD_FLAVOR_TEXT:0 "The Duneshar of Khaduras did not get much time to settle into the new world they had awoken to. An age of slumber had seen the lands outside their mountain hold fall under the control of the Kaalkid empire of Yingulnado. The Tozhi orcs, a ragtag band of a dozen disparate orcish tribes, lived here under the harsh rule of their Kaalkid overlords. Perhaps things would have gone differently had the dwarves remained inside their hold, but like all their brethren afflicted with the mountains curse the Duneshar had to leave and seek out the open sky. The Kaalkid responded with invasion, to subjugate these upstart invaders. They failed. Their empire collapsed and the Duneshar found themselves with stewardship over the haggard Tozhi.\n\nSince then Khaduras has attempted to secure their newfound position. To unite a state in which all peoples of the Rust Gorge can live in peace and prosperity; a Ring of Steel, an unbreakable bond forged in the fires of conflict. As airships bring with them ever more secrets of industry and artifice from the east the furnace light grows brighter. Both dwarven and orcish sweat will temper the future the Emvervein peoples will forge together.\n\nYet, troubles both new and old may soon arise again. Beyond the Kaalkid lands, the ascendant dragonborn state of Thassarcia seeks to assert their own dominance over the region. And all the while, the remnants of a ruined empire contemplate their decline and eye any opportunity to rectify the sins of the past."
 DRI_FLAVOR_TEXT:0 "Grim and dreary, the isles of Driftwyn are a gloomy place. Yet beneath the overcast skies burn the fires of gnomish ingenuity. Driftwyn is a land of merit, of natural talent and learned skill. Where the individual may rise to great heights, as long as they are resolved to work hard. Its cities are filled with modern marvels of engineering and magitech. The Driftwyn gnomes consider their society to be on the cutting edge of scientific progress. Those who witness their great mechanical clocktowers and whirling automatons will find it hard to disagree. \n\nThe inhabitants of these islands hold the enviable honor of being some of the few Raviki to escape domination by the Thalorian Empire. Still, the suffering of their fellow gnomes did leave its mark. Powerless to act, they were forced to watch the injustices unfold. The hole of bitterness this left in their hearts was eagerly filled by the Creed of Hasal and a renewed determination to protect gnome-kind and destroy its enemies. It was in Driftwyn where gnomes could freely organize and coordinate their struggles. And it was in Driftwyn that the famed Soulwrought constructs were first conceived. Soon, they would be sent forth to enact gnomish vengeance and usher in a new age."
 TLE_FLAVOR_TEXT:0 "Once the seat of Human power in the far west; Thaloria now stands on the brink of dissolution. Revanchist Gnomes of the rising Necrostate Ravik to its north have been the architects behind defeat after humiliating defeat for the once 'unbeatable' Thalorian Empire. Already two 'Crusades' waged by the Raviki have seen success and shattered the western part of Thaloria. Eager to finish the job, the Raviki have begun their Third and potentially final Crusade against the remnants of Thaloria. West Thaloria may be currently lost but there is still hope in the East. As Raviki troops and Soulwrought Battle-thralls march on Thaloria there will be no shortage of patriots willing to lay down their lives for the sake of Thaloria. The Lacustrines are committed to preserving their proud heritage and repelling these foul Necromantic Gnomes! Onwards! For Thaloria! The Age of Men will never end!"
 VAR_FLAVOR_TEXT:0 "Centuries ago, worshippers of the Raven Queen lived on the mainland of Zalaron, but were banished due to their practice of the Dark Arts. Without a home, the Umbradorn were forced to turn to the sea and found a home on the distant island of Toftir - an island known for it's presence of death magic.\n\nThe local Toftirite population of Blacktalon were accepting of the elves, as long as they pledged allegiance to their goddess the Raven Queen. With her blessings leading the way, the elves have been able to adapt to the harsh island environment and keep their practices alive.\n\nWith the presence of wishtone returning to Toftir, who knows what the future holds for the followers of the great Queen."
 LIR_FLAVOR_TEXT:0 "Many of the South Sea elves never made it to the Nogi Desert and ended up scattered around some the southern islands of the realm. This branch of elves have focused on supporting each other while claiming more lands for themselves in their settled homes. Will the preaching of their lost goddess to the local population help or hurt the Cithrel cause?"
 JUX_FLAVOR_TEXT:0 "After the collapse of the Cicaorin Republic to invaders with fresh and modern weaponry, Juxjthraaria was left as a remnant state. Half of an old province struggling to survive in the last corner of the realm. These last independent [GetCulture('akmuociai').GetName] found themselves isolated from the other Dragonborn for a long time. The more recent arrivals in Thassarcia bring some hope, with ties for mutual defense quickly formed. In the meantime Juxthraaria has made it their goal to find new lands to ensure that should the worst come to pass there will still be a haven left for them. While not without dangers, this has been taken up by the Hijaasch Zit Chaak which negatioated a mandate to colonise the island of Vhaulirb. The magically infused monster essences flowing back towards the capital feed the workshops that produce potions, which then in turn improve the economy. Properly managed Juxjthraaria might become an economic powerhouse and perhaps rekindle hopes of returning west to free their kin."
 VHA_FLAVOR_TEXT:0 "On the island of Vhaulirb the Hijaasch Zit Chaak, Adventurers Guild of Hijaasch, has taken the lead in settling and exploiting the land. Mandated with colonising Vhaulirb so the [GetCulture('akmuociai').GetName] have a safe haven to live, but more importantly with bringing home exotic goods for the benefit of its investors."
 ZIN_FLAVOR_TEXT:0 "Zinj-Zuun is a small subject state in service to the Western Togo Dynasty of Haingrok. It exists as a recent experiment by Emperor Goro to better administrate the frontier territories of the Empire via utilizing the local Tales Togrul Goblins that have been a vital part of Haingrok's power base in the far East. Its rule is marked by firm repression but generally progressive Religious Laws in the Ogre and Goblin world, primarily out of necessity to rule over the many Akmuociain Dragonborne who have lived here far longer than their Goblin rulers."
 MOK_FLAVOR_TEXT:0 "'North Crown' or Haingrok as it is known in the language of Ogres is by far the largest and most successful of the Togo Dynasties that dominate the islands East of Bataji, Emperor's Marbles. It enjoys near uncontested supremacy in the region and is largely responsible for the destruction of long-dead Akmuociain Empire of which its many former citizens still remain beneath the boot of Togo Emperors centuries later. Though the [concept_nightfall] has served to shake the previously steely grip of the Togo Dynasty across the frontiers of its Empire. Will the 1200s lead to the dissolution of Ogrekind's current strongest Empire, or observe its ascent to continental supremacy?"
 GENERIC_FLAVOR_TEXT:0 "Magic and gods are new and world-changing concepts to the people of Exether. In some places, it has given rise to new religions or a return to ancient traditions, but in others, it has inspired intense scientific study. What new challenges will this new and rapidly changing world bring?"
 DATA_COUNTRY_NAME_TOOLTIP_IMPL:0 "[ConcatIfNeitherEmpty( Country.GetLabel(GetPlayer.Self), '\n' )][ConcatIfNeitherEmpty( AddLocalizationIf(Not(Country.IsLocalPlayer), Country.GetStatus(GetPlayer.Self)), '\n' )][AddTextIf( Or( Not(StringIsEmpty( Country.GetLabel(GetPlayer.Self) )), And(Not(StringIsEmpty( Country.GetStatus(GetPlayer.Self) )), Not(Country.IsLocalPlayer)) ), '\n' )]$COUNTRY_RANKING_INFO$$COUNTRY_DIPLOMATIC_INFO$\n\n$COUNTRY_MILITARY_INFO$\n\n$COUNTRY_POLITICAL_INFO$[AddLocalizationIf(Not(Country.IsPlayer),'COUNTRY_TOOLTIP_AI_INFO')][AddLocalizationIf(Not(Country.IsLocalPlayer),'COUNTRY_TOOLTIP_OTHER_PLAYER_INFO')]"
 DATA_COUNTRY_NAME_TOOLTIP_DESC:0 "#lore [ConcatIfNeitherEmpty('\n$TOOLTIP_DELIMITER$\n', Country.GetCustom('country_flavor_loc'))]#!"
