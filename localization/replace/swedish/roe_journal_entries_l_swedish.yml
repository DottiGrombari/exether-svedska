 je_blueriband_standard:0 "The current [concept_blue_riband] is from [GetGlobalVariable('blue_riband_holder').GetCountry.GetName] with a score of [GetGlobalVariable('blue_riband_holder_score').GetValue|D], our score is [ROOT.GetCountry.MakeScope.Var('blue_riband_point').GetValue|D]."
 je_blueriband_withscore:0 "[SelectLocalization(GetMetaPlayer.GetPlayedOrObservedCountry.IsValid, 'blue_riband_tooltip_overlayed', 'OBSERVER_NO_COUNTRY_SELECTED') ]."
 je_oceanliner:0 "Oceanliners"
 je_oceanliner_reason:0 "To challenge the waves in pursuit of the [concept_blue_riband] is no small ambition. It begins not with grand speeches or bold declarations, but in the dry heat of shipyards and the rhythmic ringing of hammers on steel.\n\nShipbuilding capacity, and more importantly, the experience honed over generations, is the true foundation of any serious contender. Only with the industrial might to forge leviathans of iron and the technical genius to shape them for both speed and endurance can a nation hope to seize this coveted title.\n\nThe [concept_blue_riband] is not merely an accolade for the swiftest vessel across the Atlantic. It is a symbol of prestige, of engineering excellence, and of maritime supremacy.\n\nThose who would claim it must first build not just a ship, but a legacy. A legacy that will endure through the ages, written in the wake of the ship's passage."
 je_oceanliner_lobby:0 "To challenge the waves in pursuit of the [concept_blue_riband] is no small ambition. It begins not with grand speeches or bold declarations, but in the dry heat of shipyards and the rhythmic ringing of hammers on steel.\n\nShipbuilding capacity, and more importantly, the experience honed over generations, is the true foundation of any serious contender. Only with the industrial might to forge leviathans of iron and the technical genius to shape them for both speed and endurance can a nation hope to seize this coveted title.\n\nThe [concept_blue_riband] is not merely an accolade for the swiftest vessel across the Atlantic. It is a symbol of prestige, of engineering excellence, and of maritime supremacy.\n\nThose who would claim it must first build not just a ship, but a legacy. A legacy that will endure through the ages, written in the wake of the ship's passage."
