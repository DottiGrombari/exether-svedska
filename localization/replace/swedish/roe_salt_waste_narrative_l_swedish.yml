 salt_waste_narrative_events.10.t:0 "Evolving Tastes"
 salt_waste_narrative_events.10.d:0 "New recipes, novel tastes, a more complex palate; chefs in [SCOPE.sState('chef_state').GetName] are innovating."
 salt_waste_narrative_events.10.f:0 "It is a time of change in [SCOPE.GetRootScope.GetCountry.GetName], and as [SCOPE.sCulture('atamkumi_culture').GetName] culture spreads so too does #italic baf [SCOPE.sState('chef_state').GetName]#!-style cuisine. But is this a revolution in how we eat, or just a brief fad?"
 salt_waste_narrative_events.10.y:0 "A modern people deserve modern foods"
 salt_waste_narrative_events.10.n:0 "No, snail steaks forever!"
