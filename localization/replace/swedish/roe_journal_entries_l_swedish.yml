 hungry_forties.1.t:0 "The Hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]"
 hungry_forties.1.d:0 "An outbreak of crop disease in [SCOPE.sState('relevant_state').GetName] has begun to spread across much of Settler's Coast. With a failed harvest looming, fears of famine have begun to circle."
 hungry_forties.1.f:0 "The doctor prodded the potato with his instrument, and leaned aside so his colleague could see. The tool's blunt tip had sunk a centimetre into a discolored patch on its flesh.\n\n\"It's the blight, I'm afraid. Were I to inspect any other tuber from the field, the result would likely be the same. As it stands, I would recommend extraordinary measures.\""
 hungry_forties.1.a:0 "Calamity!"
 hungry_forties.1.b:0 "Set up funds for purchasing foreign grain."
 hungry_forties.2.t:0 "Easier Times"
 hungry_forties.2.d:0 "The waves of crop disease that wracked the European continent throughout the \"hungry [SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')]\" have subsided. Whilst the blighted fields may never again be able to host the affected variety of potatoes, other crops are expected to make a full recovery."
 hungry_forties.2.f:0 "\"Did you hear? They're selling a new kind of potato seed. One that isn't blighted, or so they say.\"\n\nThe man leaning on the other side of the fence raised an eyebrow \"About time. Too late, even. I had to have my kids eating hay to make it through the winter.\"\n\n\"You got off easy. The family down the road lost theirs. Too damned late, indeed.\""
 hungry_forties.2.a:0 "Thank goodness."
 hungry_forties.2.b:0 "Can we be certain it's over?"
