 exhibition_events.8.t:0 "En enastående samling"
 exhibition_events.8.d:0 "Medlemmarna i utställningskommittén har föreslagit att föremål från tidigare expeditioner ska ges en framträdande plats i hallen."
 exhibition_events.8.f:0 "Det är svårt att motstå hans ord, särskilt när de yttras på ett så passionerat sätt. Han kastar huvudet bakåt och skrattar åt något som hans följeslagare nämner, så oambitiöst. \n\n”Det handlar om Afrikas avlägsna djungler”, förklarar han ivrigt, ”Amerikas karga slätter, Antarktis outforskade berg. Så få av våra medborgare kommer någonsin att besöka en enda av dessa platser – vi ska föra dessa platser till dem.”"
