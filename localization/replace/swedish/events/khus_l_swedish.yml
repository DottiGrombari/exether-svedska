 khus_events.1.t:0 "Magic Disaster!"
 khus_events.1.d:0 "An accident happened involving magic happened."
 khus_events.1.f:0 "Do not court death, lest death courts you."
 khus_events.1.a:0 "Think of the economy, fools..."
 khus_events.2.t:0 "Magic Miracle!"
 khus_events.2.d:0 "An miracle happened involving magic happened."
 khus_events.2.f:0 "All praise Marktaros!"
 khus_events.2.a:0 "Think of the economy, fools..."
 khus_events.3.t:0 "The Death of Lys Athren"
 khus_events.3.d:0 "If the Night Without End was a play, Lys Athren would certainly be the main character. Only a young man when the Nightfall suddenly destroyed all Khussite central authority, Lys quickly rose to power as one of the many competing warlords that filled the power vacuum. One by one, his enemies fell at his feet, and Athrensei became one of the largest domains in the ashes of the Empire of Khus. Unfortunately, every play reaches an end, and Lys Athren has passed away. Now, the Athren clan's many enemies seek to take power within the nation."
 khus_events.3.f:0 "#italic \"Fase estumnais veir veideta, tresa estumnais shair shaire.\"\n\"I lived my life without regret, and so I face my death without regret.\"#!"
 khus_events.3.a:0 "Concede absolute power."
 khus_events.3.b:0 "Refuse demands."
 khussite_religion_unlock_company:0 "Unlock the ability found one of two unique companies (Sunforged Industries or Lunar Eclipse). Companies may not be available if another country has founded them first."
 khus_events.4.t:0 "Daybreak"
 khus_events.4.d:0 "At long last, the Night Without End has come to pass and the light of day has reached all corners of our country."
 khus_events.4.f:0 "#italic \"Hastis nairentis yol sodo einare reste.\"\n\"Even the darkest night shall inevitably end.\"#!"
 khus_events.4.a:0 "We may finally rebuild."
 khus_events.7.t:0 "The Price's Passing"
 khus_events.7.d:0 "Yolmu Tisenari has sadly passed away."
 khus_events.7.f:0 "#italic \"Shu shaith, sarn mair pyvesta.\"\n\"I am happy in death, for I have found love.\"#!"
 khus_events.7.a:0 "The nation mourns."
 khus_events.8.t:0 "The Admiral's Passing"
 khus_events.8.d:0 "Nae Tisenari has sadly passed away."
 khus_events.8.f:0 "#italic \"Ly vanais heide vade, na zuthal vas heire.\"\n\"If I cannot have it, nobody can.\"#!"
 khus_events.8.a:0 "The nation mourns."
 khus_events.9.t:0 "The Purchase of the Myvasa Islands"
 khus_events.9.d:0 "Our diplomats in Lysei have organized a deal to purchase the Myvasa Islands, cementing our control of the entirety of the Novaĵlandio archipelago. This has ceded all our influence in Lisinia to the selling country, and we owe them an obligation."
 khus_events.9.f:0 "#italic \"Yuthalis sanest deris thalis kentair asre.\"\n\"(In Lyseian) One man's trash is another man's treasure.\"#!"
 khus_events.9.a:0 "Inspect our beautiful new islands."
 khus_events.10.t:0 "Oanzûr Swears Fealty!"
 khus_events.10.d:0 "To protect against the Thynadûr threat, Oanzûr has agreed to become our protectorate."
 khus_events.10.f:0 "#italic \"Vei salnas hyles vrestar tadas asre.\"\n\"Life is nothing but a series of bad choices.\"#!"
 khus_events.10.a:0 "Welcome to the winning team."
