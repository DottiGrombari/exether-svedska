 je_tomes_of_akethor:0 "The Testament Halls"
 je_tomes_of_akethor_reason:0 "Across [ROOT.GetCountry.GetNameNoFlag], libraries, scriptoria, and monasteries safeguard the words and works of those who have passed, teaching literacy and practical wisdom to any who seek them. Among these institutions, the grand library of Akethor stands as the greatest repository of mortal memory, an [GetReligion('mortals_burden').GetName] shrine to the belief that every life leaves a mark worth preserving.\n\nThough the Testament Halls ensure a wide foundation of learning and remembrance, they remain decentralized, each hall guided by its own custodians. If the state wishes to harness this vast legacy into a unified and advanced system of education, it must reform the Halls into a more formal and centralized curriculum."
 je_tomes_of_akethor_lobby:0 "Across [ROOT.GetCountry.GetNameNoFlag], libraries, scriptoria, and monasteries safeguard the words and works of those who have passed, teaching literacy and practical wisdom to any who seek them. Among these institutions, the grand library of Akethor stands as the greatest repository of mortal memory, an [GetReligion('mortals_burden').GetName] shrine to the belief that every life leaves a mark worth preserving.\n\nThough the Testament Halls ensure a wide foundation of learning and remembrance, they remain decentralized, each hall guided by its own custodians. If the state wishes to harness this vast legacy into a unified and advanced system of education, it must reform the Halls into a more formal and centralized curriculum."
 je_jux_restoration:0 "Restoring Juxjthraaria"
 je_jux_restoration_reason:0 "Dreams of restoration of #bold Cicaor#! are far away. Before we can even consider such ambitions we first need to recover the missing half of our own province. [SCOPE.sCountry('zin_scope').GetName] holds the remainder of [ROOT.GetCountry.GetName] and these lands must be re-integrated for the safety of our realm."
 je_jux_restoration_lobby:0 "Dreams of restoration of #bold Cicaor#! are far away. Before we can even consider such ambitions we first need to recover the missing half of our own province."
 je_YCH_restoration:0 "Ao sjiv"
 je_YCH_restoration_reason:0 "Our great revenge is near. Having proven our might with the fall of Zinj-Zuun, it is time to push further. Our navies must stand ready to transport our troops. Our goal is clear, our resolve unbreakable, to restore #bold Cicaor#! and break the reign of the Ogres who cast it down."
 je_YCH_restoration_lobby:0 "Our great revenge is near. Having proven our might with the fall of Zinj-Zuun, it is time to push further. Our navies must stand ready to transport our troops. Our goal is clear, our resolve unbreakable, to restore #bold Cicaor#! and break the reign of the Ogres who cast it down."
 is_cicaor_tt:0 "Has restored #bold Cicaor#!"
 je_everfrost_migration:0 "Settling the Everfrost"
 je_everfrost_migration_reason:0 "Our Everfrost [Concept('concept_incorporated_state','$concept_incorporated$')] [Concept('concept_pop', '$concept_population$')] is #b [Country.MakeScope.Var('everfrost_incorporated_population').GetValue|D]#!\nOur target [Concept('concept_pop', '$concept_population$')] is #b [Country.MakeScope.Var('everfrost_migration_goal').GetValue|D]#!\n\n[ROOT.GetCountry.GetName] holds a vast northern frontier, rich in hidden ores and prime for expansion. Yet it remains perilously underpopulated. We must look beyond the seas, to the crowded and war-scarred realms of Zalaron, for hardy settlers to tame this frozen land."
 je_everfrost_migration_lobby:0 "The Everfrost holds a vast northern frontier, rich in hidden ores and prime for expansion. Yet it remains perilously underpopulated. We must look beyond the seas, to the crowded and war-scarred realms of Zalaron, for hardy settlers to tame this frozen land."
 roe_migration_button:0 "Promote Northern Migration"
 roe_migration_button_desc:0 "By offering land rights, heated dwellings, and guaranteed work in mining or industry, we can present our nation as the gateway to prosperity in the Everfrost."
 mass_migration_button_tt:0 "Starts a [concept_mass_migration] to our nation"
