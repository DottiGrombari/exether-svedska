 je_heavenly_kingdom_main:0 "Kamiran-imperiet"
 je_heavenly_kingdom_main_reason:0 "Farliga fanatiker väcker missnöje över hela landet. De utgör ett extremt hot; om de lyckas samla tillräckligt många anhängare till sin sekt kommer de att försöka upprätta sitt eget kätterska rike. Dessa galningar måste stoppas till varje pris."
 canada_unite_can:0 "Konfedererade Kanada"
 canada_unite_can_desc:0 "Drömmen om en kanadensisk konfederation måste förverkligas. Genom att uppnå ekonomisk dominans över våra övriga kolonier och samtidigt upprätthålla goda relationer med centralregeringen kan vi föreslå en annektering av ett av våra grannländer."
 canada_test_modifier:0 "Kanadensisk enhetsfaktor"
 canada_unite_gbr:0 "Konfedererade Kanada"
 canada_unite_gbr_desc:0 "Vi strävar efter att alla de kanadensiska kolonierna ska slås samman till en enda och att en kanadensisk nation ska uppstå. För att uppnå detta måste vi övertyga de lokala koloniala förvaltningarna om att en sammanslagning ligger i deras eget intresse."
