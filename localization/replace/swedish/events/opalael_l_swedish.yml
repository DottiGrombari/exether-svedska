l_swedish:
 opalael_events.1.t:0 "Smothering the Flame"
 opalael_events.1.d:0 "With the supremacist movement weakened and the general staff purged of ethno-nationalists, we are finally in a position to crush the Tetsenñás."
 opalael_events.1.f:0 "In the end, it is the military that we have to thank for delivering us the Tetsenñás on a silver platter. After we removed their barriers in the general staff, a reformist clique amongst the officer corps ousted and arrested of Tetsenñás cells embedded within the military. After intense interrogations, they provided a list of benefactors and financiers across the heights of Opalai society."
 opalael_events.1.a:0 "Jail time alongside a comprehensive re-education plan is the only way forward."
 opalael_events.1.b:0 "Move forward with a mass amnesty order."
 opalael_events.2.t:0 "Kashtarnel Above All"
 opalael_events.2.d:0 "A new government has taken control in [ROOT.GetCountry.GetCapital.GetCityHubName] under the Tetsenñás!"
 opalael_events.2.f1:0 "The Tetsenñás have seized power and have immediately set to work directing the country in their image. While paramilitary violence has, as of yet, been kept to a minimum, a portion of the new government wants to go even further."
 opalael_events.2.f2:0 "The Tetsenñás have seized power and have immediately set to work directing the country in their image. While paramilitary violence has, as of yet, been kept to a minimum, a portion of the new government wants to go even further. Already, refugees in [SCOPE.sState('fleeing_state').GetName] are fleeing the across the border into [SCOPE.sState('arriving_state').GetName]."
 opalael_events.2.a:0 "Old guard, new government."
 fleeing_pops_tt:0 "Pops below the @acceptance_status_3! $open_prejudice$ [concept_acceptance_status] may seek refuge in [SCOPE.sState('arriving_state').GetName]"
 opalael_events.3.t:0 "A Love Forbidden"
 opalael_events.3.d:0 "Hardliners in the $movement_cultural_majority$ are up-in-arms after the recent release of a play they consider to be degenerate."
 opalael_events.3.f:0 "The play depicts an elven Sirlaeli woman and her lover, a Vairian corporal, against the backdrop of the Sirlai-Opalai War of 1162. The script is a tour-de-force, and its beautiful depiction of the town of Múrnúleci places it among the classics of Cardarish literature. It has already attracted quite a following, with runnings already planned in theaters across the Starshimmer Pool and beyond.\n\nIn spite of its popularity, its detractors claim that it depicts a dishonorable relationship that no wellborn elven person would ever stoop to. To add insult to injury, one of the primary themes of the play is that one meets their destiny on the path they take to avoid it; the clear insinuation being that Opalai militarism has only pushed Sirlael more firmly into Vairian arms."
 opalael_events.3.a:0 "This play is insulting to Kashtarnel sensibilities."
 opalael_events.3.b:0 "We will not censure popular art."
 opalael_events.4.t:0 "Moral Representitive"
 opalael_events.4.d:0 "A petition put forth by hardliners in the $movement_cultural_majority$ has demanded [SCOPE.sCharacter('accused_scope').GetFullName]’s resignation from the general staff."
 opalael_events.4.f:0 "The petition does not mince words. [SCOPE.sCharacter('accused_scope').GetLastName] stands accused of three separate accounts of “degenerate behavior unbecoming of an elf” as well as suffering from a “lazy and uncaring demeanor.”\n\nWhile there is no evidence that [] has done anything illegal, the petition further demands that all members of the [Root.Country.GetName] general staff be “moral representatives” for the nation; something they clearly believe [] is not."
 opalael_events.4.a:0 "They are correct!"
 opalael_events.4.b:0 "[SCOPE.sCharacter('accused_scope').GetLastName] has committed no wrongdoing."
 opalael_events.5.t:0 "Unintelligent Design"
 opalael_events.5.d:0 "An anatomy textbook included as part of the [ROOT.GetCountry.GetAdjectiveNoFlag] school curriculum is catching flak for containing an image comparing the skeletal similarities of a human, a gnome, and an elf, side-by-side."
 opalael_events.5.f:0 "The [ROOT.GetCountry.GetAdjectiveNoFormatting] curriculum is a hotbed of disagreement. Most recently, a number of parents are beside themselves with rage over an anatomical image comparing the similarities in the skeletons of elves, humans and gnomes. They claim that comparing elven biology to that of humans or gnomes is a farce unfit for [ROOT.GetCountry.GetAdjectiveNoFormatting] halls of learning."
 opalael_events.5.a:0 "We need doctors, not veterinarians."
 opalael_events.5.b:0 "This is just modern medical science."
 opalael_events.6.t:0 "Diplomatic Immunity"
 opalael_events.6.d:0 "One of our foreign diplomats in [SCOPE.sCountry('host_country_scope').GetName] has made quite a stir after their bigoted remarks towards their host country were published in the largest [SCOPE.sCountry('host_country_scope').GetAdjectiveNoFormatting] newspaper."
 opalael_events.6.f:0 "Those serving in the [ROOT.GetCountry.GetAdjectiveNoFlag] government are certainly no stranger to hardline rhetoric, and in some cases, the call may even be coming from inside the house. Now, a prominent member of our diplomatic service is spouting supremacist rhetoric directed at the country they were performing diplomacy in. If we do not recall them, and quickly, it risks becoming a full-blown diplomatic incident."
 opalael_events.6.a:0 "Recall the diplomat immediately!"
 opalael_events.6.b:0 "Well, are they wrong?"
 opalael_events.7.t:0 "The Proper Pedigree"
 opalael_events.7.d:0 "[SCOPE.sCharacter('petty_b_leader').GetFullName] and other prominent members of the [GetInterestGroupVariant('ig_petty_bourgeoisie',GetPlayer).GetNameWithCountryVariant] have come together to submit a proposal that would limit serving in the officer corps to those who could prove sufficient elven ancestry."
 opalael_events.7.f:0 "The proposal, if accepted, would limit officer commissions to those who could document at least 3 generations of pure elven ancestry. While this would still leave a sizeable pool of candidates for service, it would disqualify many from the former Sirlaeli lands, who would either have at least partial human ancestry, or would no longer have easy access to their ancestral records — which would have been Sirlaeli, and not reliably admissible, anyway."
 opalael_events.7.a:0 "Only the best will serve!"
 opalael_events.7.b:0 "We will not turn away willing soldiers."
 opalael_events.8.t:0 "Dwarven Ingenuity"
 opalael_events.8.d:0 "[SCOPE.sCountry('bsk_scope').GetNameNoFlag] weaponry, and enough [SCOPE.sCountry('bsk_scope').GetAdjectiveNoFormatting] dwarves to train our soldiers to use them, are flowing from the mountains."
 opalael_events.8.f:0 "The deal we made with [SCOPE.sCountry('bsk_scope').GetNameNoFlag] has come to bear fruit; our armies will soon be stronger than ever. Despite the centuries-old age of many of the old dwarven weapons, the stagnation of magic and of spell development prior to the [concept_nightfall] means that the majority of them are still relevant in a modern context."
 opalael_events.8.a:0 "Woe to our enemies."
 opalael_events.9.t:0 "A Serious Disappearance"
 opalael_events.9.d:0 "[SCOPE.sCharacter('sina_letal_scope').GetFullName], the head of the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant], has disappeared, with relatives claiming they were kidnapped in the night!"
 opalael_events.9.f:0 "The family claims that armed men came to the house during the night and took her away. Others in the [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] are quick with accusations; [SCOPE.sCharacter('sina_letal_scope').GetLastName] has long acted as a stumbling block for the Opalai nationalist movement, so many believe her sudden disappearance could have no other culprit."
 opalael_events.9.a:0 "There is nothing we can do."
 opalael_events.9.b:0 "We shall put together a ransom fund!"
 opalael_events.10.t:0 "Stewards of the Sanctum"
 opalael_events.10.d:0 "The [ROOT.GetCountry.GetAdjectiveNoFlag] supremacist movement has begun to claim that the $building_khus_lab_1$ is the natural property of [ROOT.GetCountry.GetNameNoFormatting]."
 opalael_events.10.f:0 "“For it was our #italic lessers#! who tore it up in the first place! It is only natural that we should take stewardship where they have failed. Perhaps if we had done so sooner, the Khussite realm would still be intact.”"
 opalael_events.10.a:0 "After all, why shouldn’t we keep it?"
 opalael_events.10.b:0 "We have no interest in that wasteland."
 opalael_events.11.t:0 "Assassination of [SCOPE.sCharacter('gess_remyin_scope').GetFullName]"
 opalael_events.11.d:0 "[SCOPE.sCharacter('gess_remyin_scope').GetFullName] has been shot in broad daylight!"
 opalael_events.11.f:0 "[SCOPE.sCharacter('gess_remyin_scope').GetLastName] DEAD, newspapers declare. Mere hours after delivering one of the largest speeches of their career in Sécolísot Square in [ROOT.GetCountry.GetCapital.GetCityHubName], the popular reform activist was killed by a lone shooter. The killer was pursued by Capitol police forces before being cornered and killed in a barn a few miles outside of the capitol.\n\nAlready the theories of conspiracy are circling Opalael. Was the shooter a member of the Tetsenñás? Is the state complicit? Could [SCOPE.sCharacter('ruler_scope').GetFullName] have put out the hit themselves?"
 opalael_events.11.a:0 "Good riddance."
 opalael_events.11.b:0 "We must denounce political violence!"
 opalael_events.14.t:0 "Smoke Without Flame"
 opalael_events.14.d:0 "The period of political violence seems to be drawing to an end as the Tetsenñás have begun to simmer down."
 opalael_events.14.f:0 "The long period of satisfaction amongst the Opalai Supremacist movement has fractured the movement; many of the rank-and-file members have moved on, content with the current regime. While more reactionary extremists still agitate, their ire is now directed at targets other than the government."
 opalael_events.14.a:0 "Thank the gods, it’s over."
 opalael_events.15.t:0 "No Stone Unturned"
 opalael_events.15.d:0 "While reviewing evidence collected during the trials of the various members of the Tetsenñás, a chilling pattern has appeared; [SCOPE.sCharacter('ruler_scope').GetFullName] was much more closely involved with the group than previously thought."
 opalael_events.15.f1:0 "Interrogations as well as evidence seized from Tetsenñás safehouses has provided corroborating evidence for what many already suspected; that [SCOPE.sCharacter('ruler_scope').GetLastName] was a member of the Tetsenñás.\n\nThere is credible evidence that they were involved both with the murder of Gess Remyin as well as the kidnapping of Sina Letal, amongst a litany of other crimes.\n\nIf this were to become public knowledge, it would destroy the legitimacy of the [ROOT.GetCountry.GetAdjectiveNoFormatting] state. Rumors can be ignored; the removal of a head-of-state cannot."
 opalael_events.15.f2:0 "Interrogations as well as evidence seized from Tetsenñás safehouses has provided corroborating evidence for what many already suspected; that [SCOPE.sCharacter('ruler_scope').GetLastName] was a member of the Tetsenñás.\n\nThere is credible evidence that they were involved with the murder of Gess Remyin, amongst a litany of other crimes.\n\nIf this were to become public knowledge, it would destroy the legitimacy of the [ROOT.GetCountry.GetAdjectiveNoFormatting] state. Rumors can be ignored; the removal of a head-of-state cannot."
 opalael_events.15.f3:0 "Interrogations as well as evidence seized from Tetsenñás safehouses has provided corroborating evidence for what many already suspected; that [SCOPE.sCharacter('ruler_scope').GetLastName] was a member of the Tetsenñás.\n\nThere is credible evidence that they were involved with the kidnapping of Sina Letal, amongst a litany of other crimes.\n\nIf this were to become public knowledge, it would destroy the legitimacy of the [ROOT.GetCountry.GetAdjectiveNoFormatting] state. Rumors can be ignored; the removal of a head-of-state cannot."
 opalael_events.15.a:0 "[SCOPE.sCharacter('ruler_scope').GetFullName] cannot be allowed to remain [SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]."
 opalael_events.15.b:0 "Bribe whoever you must to keep this secret."
 opalael_events.16.t:0 "The Devil On Their Shoulders"
 opalael_events.16.d:0 "Disturbing rumours are spreading among the citizenry."
 opalael_events.16.f:0 "A misguided speech by the $movement_radical$ has had some unexpected consequences. Their ill-conceived diatribe about our enormously successful efforts for the salvation of the Timari, packed with junk statistics and false conclusions, has somehow eluded the best efforts of our censors. We were assured that all communiques had been destroyed and all attendants had been put under surveillance, but somehow a transcript has slipped the net.\n\nNow we are experiencing the consequences of our loose grip as misinformation spreads sedition among the gullible masses. We simply cannot escape the foul lies of the poisonous humans and their sycophants in government. This sickness needs to be treated quickly."
 opalael_events.16.a:0 "Cut the rotten roots and the tree of lies falls."
 opalael_events.16.b:0 "A tree as rotten as this will fall over on its own."
 opalael_events.17.t:0 "Just Like Us?"
 opalael_events.17.d:0 "The presence of indentured half-elves in the homeland is causing quite a stir."
 opalael_events.17.f:0 "The recent decision by an overzealous commander to bring indentured [SCOPE.sCulture('timari_scope').GetName] to [SCOPE.sState('indenture_state').GetName] has backfired spectacularly. The Timari in question are a number of labourers taking part in the government's [concept_salvation_campaign] to pay off their blood debt to elvenkind. Per the decree of [SCOPE.sCharacter('racist_general_scope').GetFullName] they were supposed to do this away from the prying eyes of the public, not among our doe-eyed citizens.\n\nSo once again, we’re dealing with an epidemic of misplaced empathy. They’re pointing out our many similarities, foolishly falling victim to their own lying eyes. Such is the insidious poison of humanity; it hides behind the veneer of elven beauty. No matter how slender their frames or pointy their ears may be, they are tainted. The rot must be excised before they can be saved, but try convincing the weakhearted of such harsh truths!"
 opalael_events.17.a:0 "They are #italic not#! like us!"
 opalael_events.17.b:0 "Damn it, just redeport them back home."
 opalael_events.18.t:0 "Woe To The Victors"
 opalael_events.18.d:0 "Our heroic soldiers return home, but they don’t seem content."
 opalael_events.18.f:0 "Lately our soldiers returning from duty in liberated Sirlael have been acting out. Drunken disorderliness and brawling are common vices of the rank and file, but more and more soldiers are lashing out in random bursts of violence. Arbitrary violent crimes, suicides and desertion are on the rise. What’s worse, people have begun noticing this trend.\n\nA petition from over a thousand mothers, beseeching the government to provide succour for their sons' troubled minds, was delivered to us in person. Though we don’t put much stock in soft motherly hearts opining on military matters, this trend has the military brass worried. We need to deal with this."
 opalael_events.18.a:0 "A lack of discipline, drill them harder."
 opalael_events.18.b:0 "Maybe mother knows best after all."
 opalael_events.19.t:0 "Terrorist Scum"
 opalael_events.19.d:0 "Rebel operatives have bombed a government facility."
 opalael_events.19.f:0 "The wretched Timari insurgent forces in [SCOPE.sState('indenture_state').GetName] have murdered thirteen brave souls in an act of unprovoked terror. The lives of these innocent civilians, who only sought to fairly administer the lands of our liberated brothers, were lost when a bomb exploded within their administrative complex.\n\nNot only these pure souls, but thousands of documents detailing the progress of our [Salvation Campaign] were lost in the blaze. It will take months to restore the damage, not to mention the blow to our prestige. These rabid dogs should’ve never gotten so close, we must retaliate."
 opalael_events.19.a:0 "Round up some locals, make an example."
 opalael_events.19.b:0 "Double the garrison."
 opalael_events.20.t:0 "Fragged & Bagged"
 opalael_events.20.d:0 "One of our officers was murdered by soldiers under his command."
 opalael_events.20.f:0 "A regiment commander serving in [SCOPE.sState('fragging_state').GetName] has been tragically murdered by his own cadets. The military police reports that no fewer than five soldiers have deserted after stabbing their commander eighty-three times and leaving him for dead. They will be hunted down and punished. Unit records showed no demerits for his command, no abuse that might have provoked this.\n\nThe commander was a decorated veteran and longtime party member. He had served as an agent for the [concept_department_public_welfare] and officer-warden of [concept_verporis_reformatory_institute]. His charitable work in the liberated territories has left behind many grieving wards. We’ve determined that the soldiers have simply been seduced by greed and Timari lies, no further investigation needed."
 opalael_events.20.a:0 "Pull the unit from the front for now."
 opalael_events.20.b:0 "Bury this report and send a replacement."
 opalael_events.23.t:0 "Martyrs To The Cause"
 opalael_events.23.d:0 "A governor in the liberated territories has been lynched."
 opalael_events.23.f:0 "“The Wolf of [SCOPE.sState('werewolf_state').GetName]” Governor Pewyn and his wife have been found hanging from the chandelier of their own mansion. [SCOPE.sState('werewolf_state').GetFarmHubName] is considered to be a model town of Salvaged Timari, but it seems that our expectations were too high. Pewyn had long been lauded for his success; his governorship was marked by remarkably low levels of strife. Even now the meek townsfolk are eager to aid our investigation, yet they have surprisingly little to say.\n\nNobody knows or has seen anything and nobody knows anybody who has either. But this raid has all the signs of Asvean infiltration. Strangely, the mansion’s wealth was left unmolested, aside from one busted safe.\n\nThere is one complication, however; the attack all but confirmed that the governor was himself an #italic actual#! werewolf, and we could not publicize the attack without publicizing that, as well."
 opalael_events.23.a:0 "We cannot let this news reach the papers."
 opalael_events.23.b:0 "The debt will be paid in blood."
 opalael_events.24.t:0 "State Wards Kidnapped!"
 opalael_events.24.d:0 "One of our state orphanages in [SCOPE.sState('orphan_state').GetName] was attacked and the children stolen."
 opalael_events.24.f:0 "As part of our [concept_salvation_campaign], the government has sponsored many orphanages to house Timari children who have lost their parents during the liberation of Sirlael. These charitable institutions ensure that these innocent victims can still grow up in peace and comfort to become productive citizens of our united elven realm. Yet, some criminals have now decided to traumatize these poor victims once more.\n\nAll 162 children were stolen in the dead of night. There was no sign of forced entry and the guards had been knocked out without a fight. We believe some of the staff must have been involved in this tragedy. Our agents are on the hunt, but we still don’t know where the children are. We fear our enemy’s callous grip is likely to steal their only chance at salvation as well."
 opalael_events.24.a:0 "Let the world know of this cruelty."
 opalael_events.24.b:0 "Reinforce the other orphanages."
 opalael_events.25.t:0 "Leave The Whole World Blind"
 opalael_events.25.d:0 "Radical insurgents have massacred our innocent civilians."
 opalael_events.25.f:0 "Tragic reports have come in from [SCOPE.sState('settlement_state').GetName] of a massacre at the Aphaion settlement. In a cowardly attack on a peaceful community, the wicked Asvean rangers killed three dozen people in cold blood. Justice, they claim, for the actions of our soldiers elsewhere. Tell me, what justice is there in killing the innocent; why could the little children not be spared? If anybody doubts the barbarity of humanity, take a good look at their bloody work.\n\nThe temple at Aphaion is one of the oldest holy sites in our lands, fallen to neglect under Timari stewardship. These settlers were brave, pious folk. Who were moved only by dedication to their gods; artists, musicians, craftsmen. We didn’t even send them there, rather we foolishly allowed them to come. We’ll never know what the little ones might have grown up to be, what wonders the world will now miss out on."
 opalael_events.25.a:0 "An eye for an eye it shall be."
 opalael_events.25.b:0 "Capitalize on public outrage."
 opalael_events.26.t:0 "Wolves In Sheep’s Clothing"
 opalael_events.26.d:0 "Unusual behaviour has made our officials paranoid."
 opalael_events.26.f:0 "We’ve noticed a trend of mistakes being made by our vetted employees. These are not foolish people, and they seemed entirely surprised by the failures we’ve pointed out. They have simply been following the orders they’ve been given, following every single procedure to the letter. Yet, somewhere there is something breaking our processes.\n\nHalf our staff believes this to be a simple procedural error, while the other half is now convinced we are infiltrated by an elaborate human spy network. It’s unwise to feed into conspiracy, but there may be some truth to the latter. One rather banal order was sent, stamped, and cleared from supervisor Pevall’s desk. Yet, the good man has been at the hospital since the day before he sent it."
 opalael_events.26.a:0 "Scour every single file we have."
 opalael_events.26.b:0 "We cannot be ruled by paranoia."
 sirlael_events.3.t:0 "Asvëan Agitation"
 sirlael_events.3.d:0 "The Asvean are demanding that [SCOPE.sCharacter('asvean_insulter_scope').GetFullName] step down from politics"
 sirlael_events.3.f:0 "While [SCOPE.sCharacter('asvean_insulter_scope').GetLastName] is known for many things, their tact is not one of them. Their recent feud with a group of Asvean officers has now been escalated, with the Asvean submitting a formal complaint and demanding [SCOPE.sCharacter('asvean_insulter_scope').GetLastName]’s immediate resignation!\n\nNeither party seems willing to accept blame, and the rangers will not forget this offense."
 sirlael_events.3.a:0 "[SCOPE.sCharacter('asvean_insulter_scope').GetLastName] must step down."
 sirlael_events.3.b:0 "The Asvëan must learn to take a joke!"
 sirlael_events.4.t:0 "Not In My Backyard"
 sirlael_events.4.d:0 "The rangers are petitioning to ensure that any rural construction in Wixieti is not done without their explicit approval"
 sirlael_events.4.f:0 "Real estate availability as well as agricultural prices have led to Wixieti becoming a hot destination for new rural developments. This has led to encroachment on what have traditionally been Asvëan forests and meadows.\n\nThings have come to a head after an altercation near [SCOPE.sState('asvean_state').GetName] between a ranger and an investor from [ROOT.GetCountry.GetCapital.GetCityHubName], and now a decision must be made."
 sirlael_events.4.a:0 "The Asvean may oversee any development in Wixieti."
 sirlael_events.4.b:0 "They must get with the times."
 sirlael_events.5.t:0 "Professional Foragers"
 sirlael_events.5.d:0 "The Asvëan rangers’ proficiency for procuring their own provisions has been a notable boon for our logistics."
 sirlael_events.5.f:0 "When on a patrol in the forest, a ranger may be away from settlements for weeks or even months at a time. If they are to survive in the wilderness, they must be able to forage and provide for themselves.\n\nWhile a modern military regiment’s needs are far beyond what can be found in the woods, the wild game and other materials sourced by our friends in the Asvëan are greatly easing the strain of our logistics."
 sirlael_events.5.a:0 "A scout must always be prepared."
 sirlael_events.6.t:0 "The Angel On Their Shoulders"
 sirlael_events.6.d:0 "Odd news from Opalael as trouble brews at home."
 sirlael_events.6.f:0 "Our view of Opalael’s citizens as obedient, brainwashed little soldiers has taken a pleasant hit. A reformist politician in [Kaltur] made a venomous speech pointing out the government’s moral failures and gross incompetence in managing occupied []. What’s surprising isn’t just that it happened, but that we actually heard about it.\n\nDespite the best efforts of their censors, the news has spread northwards via word of mouth alone. Our spies say these whispers from the normally loyal Kashtarnel masses show a growing unease among the elves with the treatment of our people. We’re not sure where this is leading, but knowing the enemy, it will surely end in tears."
 sirlael_events.6.a:0 "Now is the time to reach out."
 sirlael_events.6.b:0 "Too little, too late."
 sirlael_events.7.t:0 "A Message From The Other Side"
 sirlael_events.7.d:0 "We’ve received a curious message from behind enemy lines."
 sirlael_events.7.f:0 "Recently, some odd communiques from Kaltur caught the eye of our resident spies. It turns out some prominent opposition figures are trying to contact us via coded messages, taking great pains to avoid the watchful eye of the Opalai secret police.\n\nOur insight into the hidden world of Opalai political intrigue is woefully substandard, so we don’t know whether they actually want to help us. It may simply be a ploy to buttress their own political ambitions or even some elaborate trap designed to take advantage of our good intentions. Regardless, the enemy camp doesn’t appear to be as confident as it pretends to be."
 sirlael_events.7.a:0 "Take the risk; let’s make contact."
 sirlael_events.7.b:0 "Play it safe, take note, and move on."
 sirlael_events.8.t:0 "A Great Escape"
 sirlael_events.8.d:0 "Our rebel allies have liberated scores of captive children."
 sirlael_events.8.f:0 "Terrific news has reached us about some 162 children who were saved from the enemy’s clutches. Opalael’s state orphanages operate under the guise of charity, but their true goal is to indoctrinate young Timari children. Our agents found common cause with some of the facility’s staff and orchestrated a daring heist.\n\nThe children have been shaken up by the events, they’ll need lots of gentle care to undo the damage done by their captors. Some of the children still have living parents, they were simply stolen from them due to being human-presenting or political dissidents. The actual orphans will be reunited with their remaining relatives or else found a new loving home. Some kids however, are so young we’re not even sure who they are; others only have family left living under occupation. At least they’re safe for now, their tears will dry in time."
 sirlael_events.8.a:0 "An excellent propaganda victory!"
 sirlael_events.8.b:0 "Let’s break out their relatives too."
 sirlael_events.9.t:0 "Death To Tyrants"
 sirlael_events.9.d:0 "Our rebel allies have exacted some righteous vengeance."
 sirlael_events.9.f:0 "Governor Pewyn, the Werewolf of [SCOPE.sState('werewolf_state').GetName], has finally gotten what he deserved. Ever since the occupation began, this beast in noble frock has acted without a shred of conscience. He and his sadistic wife had turned [SCOPE.sState('werewolf_state').GetFarmHubName] into a realm of horror. If only they had simply been fanatical supremacists; at least those are predictable. The Pewyns did it all for the love of the game.\n\nTheir deaths are just a bonus, however; the real price is the copious amount of blackmail the maids alerted us to being hidden in their safe. We’ll make sure everybody hears about every little sordid detail. The enemy will surely retaliate, but the townsfolk seemed set on paying the price. We should try to blunt the hammer blow coming their way. "
 sirlael_events.9.a:0 "Get the survivors out of there."
 generic_occupation_events.2.t:0 "Convoy Ambushed"
 generic_occupation_events.2.d:0 "A supply train headed to the front was raided by the enemy."
 generic_occupation_events.2.f:0 "One of our military convoys was ambushed whilst traversing [SCOPE.sState('rebel_state').GetName]. The enemy normally doesn’t dare to engage our armed escorts, but this time they got lucky and proved the victors.\n\nWe’ve lost a large shipment of weapons, ammunition and supplies; not to mention the lives of several guards. The soldiers at the front will no doubt be particularly miffed about the lack of chocolate this rotation."
 generic_occupation_events.2.a:0 "Send emergency sweets."
 generic_occupation_events.2.b:0 "Ammo comes first."
 generic_occupation_events.1.t:0 "Enemies Eliminated"
 generic_occupation_events.1.d:0 "A den of rebels has been cleared out by our soldiers."
 generic_occupation_events.1.f:0 "Our garrison forces in [SCOPE.sState('rebel_state').GetName] have reported the destruction of a pernicious local rebel sect. They’ve been playing a game of cat and mouse for some time now, but we proved victorious in the end.\n\nOur soldiers can breathe a little easier now these saboteurs are no longer plaguing our supply lines; a little reprieve will do them good. At least until the next crop of insurgents show up."
 generic_occupation_events.1.a:0 "This ought to calm the locals."
 generic_occupation_events.1.b:0 "Dig in while we can."
 generic_occupation_events.3.t:0 "Deserters On The Run"
 generic_occupation_events.3.d:0 "Some of our troops have deserted from the army."
 generic_occupation_events.3.f:0 "Reports from the military brass show that a number of soldiers across the front have abandoned their posts. It appears they are leaving during the night; taking their kit, weapons and significant supplies with them. We’ll try to catch them if we can.\n\nDesertion is an unfortunate reality of warfare, but its prevalence and catalysts can still shed light on some of our own failings. Considering the punishment, soldiers do not just desert for no reason."
 generic_occupation_events.3.a:0 "How are they being treated?"
 generic_occupation_events.3.b:0 "Just hunt the deserters down."
 generic_occupation_events.4.t:0 "Attitude Adjustment"
 generic_occupation_events.4.d:0 "Our soldiers are behaving rather poorly in the field."
 generic_occupation_events.4.f:0 "Not all deployments are in quaint little towns, some are in miserable rural backwaters. Peace does not mean an end to trouble and without the immediate fear of death, frustration, resentment and boredom thrive.\n\nSome of our soldiers have been treating the [SCOPE.sCulture('occupied_culture').GetName] locals in [SCOPE.sState('occupied_state').GetCityHubName] badly. Provoking fights, harassing women, looting and even worse crimes have been committed. This kind of pernicious behaviour is how you fuel a rebellion, so we need to put a stop to it right now. Hearts and minds, people, hearts and minds."
 generic_occupation_events.4.a:0 "Punish the troublemakers."
 generic_occupation_events.4.b:0 "Ease up on our presence."
 generic_occupation_events.5.t:0 "Malicious Compliance"
 generic_occupation_events.5.d:0 "Obedient [SCOPE.sCulture('compliant_culture').GetName] are clogging our bureaucratic systems."
 generic_occupation_events.5.f:0 "Administrators in [SCOPE.sState('compliant_state').GetName] have reported an unusually large amount of delays and citations. It seems the locals are taking our new rules for them extremely seriously, too seriously. Their insistence on following every jot and tittle is slowing our understaffed bureaucracy to a crawl.\n\nNot content with wasting their own time, they’ve now started reporting our troops for falling short of our own laws. This is just unworkable, it seems that some of these rules might function better as guidelines instead."
 generic_occupation_events.5.a:0 "Do as I do, not as I say."
 generic_occupation_events.5.b:0 "Just relax the rules already."
 vermillion_events.1.t:0 "Standing Tall"
 vermillion_events.1.d:0 "Our benefactor has successfully united the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName]!"
 vermillion_events.1.f:0 "After many years of fighting and even more years of training, our benefactor has successfully united the Thicket. While their newfound strength and prestige means we will no longer hold the sway over them we once did, their debt of gratitude towards us will guide their foreign policy for years to come. They stand ready to take their place on the world stage alongside us as a friend and ally."
 vermillion_events.1.a:0 "We stand in the shade of a tree that #italic we#! have planted."
 vermillion_events.2.t:0 "Returned to Soil"
 vermillion_events.2.d:0 "Our benefactor in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] has collapsed!"
 vermillion_events.2.f:0 "It seems our support was simply not enough. Our opportunity for an aligned Thicket has closed with our benefactor’s annexation by [SCOPE.sCountry('annexer_scope').GetNameNoFlag]. If we still wish to unify the Thicket, it must be by the sword."
 vermillion_events.2.a:0 "A great tree has fallen."
 vermillion_events.3.t:0 "The Thick of It"
 vermillion_events.3.d:0 "Due to the nature of the Thicket, it is getting hard to supply [SCOPE.sCountry('backed_scope').GetNameNoFlag]."
 vermillion_events.3.f:0 "We have gained reports of problems supplying our ally in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName], with some of our supplies not being able to arrive safely and having instead to be transported by foot over dangerous terrain. This has caused significant delay as some get lost between the trees, never to be seen again.\n\nSome have requested to make landmarks along the track to make the journey easier and to minimize any more lost troops. Others, however, say that this comes from the incompetency of the troops that we use and that it can be mitigated by just sending more troops with more supplies."
 vermillion_events.3.a:0 "Just send more soldiers."
 vermillion_events.3.b:0 "Authorize the safer track with landmarks."
 vermillion_events.3.c:0 "Why not use our slaves?"
 vermillion_events.4.t:0 "Cutting Critique"
 vermillion_events.4.d:0 "Some of our advisors to [SCOPE.sCountry('backed_scope').GetNameNoFlag] have returned with valuable knowledge related to the science of woodcutting."
 vermillion_events.4.f:0 "Constraint is often the father of ingenuity. The logging camps in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] operate under many constraints; their rurality  and lack of local tooling shops foremost among them. This has led their [Concept('concept_starbrand', '$concept_starbrands$')] to pioneer a number of magical solutions to their problems.\n\nOne of our advisors, a starbrand themselves, has returned with knowledge of a new cantrip that can transmute sections of tree into a soft, spongy material for up to four hours, allowing it to be brought down with even rudimentary cutting tools. After the cantrip wears off, the wood returns to its original form, ready for sale."
 vermillion_events.4.a:0 "True Elven ingenuity!"
 vermillion_events.4.b:0 "Excellent!"
 vermillion_events.5.t:0 "Vermillion Detractors"
 vermillion_events.5.d:0 "Vocal members of the [SCOPE.gsInterestGroup('vermillion_detractor_scope').GetName] are questioning our investment in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName]."
 vermillion_events.5.f:0 "Not everyone in [ROOT.GetCountry.GetNameNoFlag] sees the value of supporting our benefactor in the Thicket. There are many in [ROOT.GetCountry.GetNameNoFormatting] who see it as little more than a costly prestige project. The Thicket, they argue, is a hostile forest with few resources to its name other than the Vermillion trees that are its namesake. Bright young [ROOT.GetCountry.GetAdjectiveNoFormatting] boys get turned away while forest-dwellers with little connection to us fill up our military academies, and money collected from good [ROOT.GetCountry.GetAdjectiveNoFormatting] taxpayers goes toward developing a forest we have little connection to."
 vermillion_events.5.a:0 "The Thicket will blossom; we need only wait."
 vermillion_events.5.b:0 "Perhaps they have a point."
 vermillion_events.6.t:0 "Foreign Military Educations?"
 vermillion_events.6.d:0 "[SCOPE.sCountry('benefactor_scope').GetNameNoFlag] has offered to allow our officer candidates to attend a military academy in [SCOPE.sCountry('benefactor_scope').GetCapital.GetCityHubName]."
 vermillion_events.6.f:0 "If we are to claim the Thicket for ourselves, we will have to fight. If we are to fight, we will have to train; and [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] military institutions are perhaps the best in the region.\n\nHowever, they do not do this out of the goodness of their heart; if we accept, they will gain influence within [ROOT.GetCountry.GetNameNoFlag] that may embolden them into sending offers we #bold cannot#! refuse."
 vermillion_events.6.a:0 "Whatever help we can get, we must accept."
 vermillion_events.6.b:0 "We cannot risk our military leaders gaining [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] sentiments."
 vermillion_events.7.t:0 "Foreign Developmental Aid?"
 vermillion_events.7.d:0 "[SCOPE.sCountry('benefactor_scope').GetNameNoFlag] has offered to send us developmental aid as well as a team of industrial advisors."
 vermillion_events.7.f:0 "While we have found ways to be at peace with the forest, our industry remains rudimentary. However, the offer comes with a number of strings attached that would surely increase [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] influence in our country."
 vermillion_events.7.a:0 "Free money, you say?"
 vermillion_events.7.b:0 "This is just the first step to selling out our country!"
 vermillion_events.8.t:0 "Foreign Bureaucratic Advisors?"
 vermillion_events.8.d:0 "[SCOPE.sCountry('benefactor_scope').GetNameNoFlag] has offered to send us bureaucratic advisors, as well as a host of educational materials for training our own bureaucrats."
 vermillion_events.8.f:0 "Governance amongst the tribes of the Thicket is often an ad-hoc, as-needed affair, and [ROOT.GetCountry.GetNameNoFlag] is no exception. With [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] bureaucrats directing the formation of new government processes and institutions, we could establish new governmental functions in record time."
 vermillion_events.8.a:0 "We graciously accept."
 vermillion_events.8.b:0 "We will not allow foreigners to direct our governance!"
 vermillion_events.9.t:0 "Foreign Logging Subsidies?"
 vermillion_events.9.d:0 "[SCOPE.sCountry('benefactor_scope').GetNameNoFlag] has offered us a number of subsidies that would boost our logging industry for many years to come."
 vermillion_events.9.f:0 "While the wood of the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] is known to the world, our capacity for actually using or harvesting it is less-than-sufficient. An influx of [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] cash and tool designs would be an incredible boon."
 vermillion_events.9.a:0 "Vermillion wood is the best in the world!"
 vermillion_events.9.b:0 "We cannot become indebted to [SCOPE.sCountry('benefactor_scope').GetNameNoFlag]."
 vermillion_events.10.t:0 "Territorial Expansion"
 vermillion_events.10.d:0 "[SCOPE.sCountry('benefactor_scope').GetNameNoFlag] has sent us a military envoy along with a number of trinkets; their intention is for us to use them to make the neighboring tribes fall in line."
 vermillion_events.10.f:0 "Many of the tribes of the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] are disparate and disunited. They would fall in line behind us if we could show them proof of our prestige and success; proof that [] has provided us with."
 vermillion_events.10.a:0 "The Thicket belongs to us!"
 vermillion_events.11.t:0 "A Branch Too Far"
 vermillion_events.11.d1:0 "The [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] penguin has come home to roost; [SCOPE.sCountry('benefactor_scope').GetNameNoFlag] is demanding that we fall in line under them, as a [concept_protectorate]!"
 vermillion_events.11.d2:0 "The [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] chanticleer  has come home to roost; [SCOPE.sCountry('benefactor_scope').GetNameNoFlag] is demanding that we fall in line under them as a protectorate!"
 vermillion_events.11.f:0 "Years of foreign influence has finally come to a head; [SCOPE.sCountry('benefactor_scope').GetNameNoFormatting] is demanding our immediate subjugation. While we have the capacity to say no, it may bring them to unify us through force-of-arms."
 vermillion_events.11.a:0 "We have no choice but to accept."
 vermillion_events.11.b:0 "We cannot accept such one-sided terms."
 vermillion_events.12.t:0 "The Vermillion Expedition"
 vermillion_events.12.d:0 "After nearly nine months without contact, our expedition has returned!"
 vermillion_events.12.f:0 "Our expedition returns with excellent news: while the first several months were spent unsuccessfully trying to break through Thubramble, they eventually made contact with a group of [SCOPE.sCountry('bll_scope').GetAdjective] scouts. The scouts took pity on them, and after some negotiation, showed them a secret path through the bramble.\n\nAfter they arrived at the tribe’s heart, their newfound guides spoke of the start of a great military campaign. They spoke of the Bloodbark Crown, and how they planned to receive the forest’s favor. They spoke of power; and how they planned to gain it."
 vermillion_events.12.a:0 "Interesting. Support them however we can."
 vermillion_events.12.b:0 "A laughable goal."
 vermillion_events.13.t:0 "An Opaline Envoy"
 vermillion_events.13.d:0 "An envoy from Opalael has arrived in our lands."
 vermillion_events.13.f:0 "Some of our scouts in Thubramble recently returned with a haggard group of Opalaeli explorers. After nursing them back to health, we introduced them to some of our most elder storytellers, and told them legends of the Bloodbark Crown. They claimed that their superiors would be very interested to hear these  legends. More importantly, they say that we could rely on [] support in our efforts to seize the Bloodbark Crown; in exchange for a few favors here-and-there, of course."
 vermillion_events.13.a:0 "We would be fools not to accept."
 vermillion_events.13.b:0 "The risk is too great."
 vermillion_events.14.t:0 "In The Greattree's Shadow"
 vermillion_events.14.d:0 "Our benefactor in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] has been outmatched."
 vermillion_events.14.f:0 "It seems our support was simply not enough. Our opportunity for an aligned Thicket has closed with the claiming of the Bloodbark Crown by [SCOPE.sCountry('bloodbark_scope').GetNameNoFlag]. While [SCOPE.sCountry('backed_scope').GetNameNoFlag] still exists, it is clear they will never be the master of the forest."
 vermillion_events.14.a:0 "A colossal failure."
 vermillion_events.15.t:0 "Shackles of Vermillion"
 vermillion_events.15.d:0 "The [SCOPE.sCountry('benefactor_scope').GetAdjectiveNoFormatting] penguin rears its head; [SCOPE.sCountry('benefactor_scope').GetNameNoFlag] is demanding that we turn over our northern territories!"
 vermillion_events.15.f:0 "Years of foreign influence has finally come to a head; [SCOPE.sCountry('benefactor_scope').GetNameNoFormatting] is demanding we turn over our northern territories. While we have the capacity to say no, it may bring them to take it through force-of-arms."
 vermillion_events.15.a:0 "We have no choice but to accept."
 vermillion_events.15.b:0 "We cannot accept such one-sided terms."
