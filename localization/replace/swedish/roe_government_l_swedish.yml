l_swedish:
 gov_kiarrike:0 "Kiarrike"
 gov_kiarrike_desc:0 "This is a [concept_government_type] where the power rests with the [Concept('concept_ruler','$RULER_TITLE_KIARR$')] or [Concept('concept_ruler','$RULER_TITLE_KIARRA$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_jarldom:0 "Jarldom"
 gov_jarldom_desc:0 "This is a [concept_government_type] where the power rests mainly with the [Concept('concept_ruler','$RULER_TITLE_KING$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_magocracy:0 "Magocracy"
 gov_magocracy_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by the mages.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_dwarf_monarchy:0 "Corporate Monarchy"
 gov_dwarf_monarchy_desc:0 "This is a [concept_government_type] organized along corporatist lines, within which the government officially serves as a mediator between different social classes. It is headed by a [Concept('concept_ruler','$RULER_TITLE_KING$')].\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_elf_monarchy:0 "Magocratic Monarchy"
 gov_elf_monarchy_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by a [Concept('concept_ruler','$RULER_TITLE_KING$')] and a council of spellcasters.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_magocratic_dictatorship:0 "Magocratic Dictatorship"
 gov_magocratic_dictatorship_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by the head of a magical order.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_magocratic_oligarchy:0 "Magocratic Oligarchy"
 gov_magocratic_oligarchy_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by a class of rich and powerful mages.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_magocratic_democracy:0 "Magocratic Democracy"
 gov_magocratic_democracy_desc:0 "This is a [concept_government_type] that is ruled by mages who are [Concept('concept_election','$concept_elected$')] by the people.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_magocratic_single_party_state:0 "Magocratic Regime"
 gov_magocratic_single_party_state_desc:0 "This is a [concept_government_type] that is ruled by mages who are [Concept('concept_election','$concept_elected$')] by members of a single legal ruling party.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_captain_regency:0 "Perpetual Regency"
 gov_captain_regency_desc:0 "This is a [concept_government_type] ruled by a [Concept('concept_ruler','$RULER_TITLE_CAPTAIN_REGENT$')] who has continuously refused to surrender their power to the rightful ruler since that ruler came of age.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_march:0 "March"
 gov_march_desc:0 "This is a [concept_government_type] ruled by a [Concept('concept_ruler','$RULER_TITLE_MARGRAVE$')] focused on military power.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_alchemist_guild:0 "Alchemist Guild"
 gov_alchemist_guild_desc:0 "This is a [concept_government_type] ruled by a [Concept('concept_ruler','$RULER_TITLE_CHIEF_ENGINEER$')] specializing in magical inventions.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_artificer_society:0 "Artificer Guild"
 gov_thalorian_remnant_monarchal:0 "Thalorian Remnant Principality"
 gov_thalorian_remnant_monarchal_desc:0 "The rapid collapse of the Divine Thalorian Dominion has left massive power vacuums, and leadership grasps at anything that can give even a semblance of legitimacy.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_yulug_governorate:0 "Yulug Governorate"
 gov_yulug_governorate_desc:0 "This is a [concept_government_type] ruled by an appointed hobgoblin governor, on behalf of the Yulug Authority.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_blood_tribunal:0 "Blood Tribunal"
 gov_blood_tribunal_2:0 "Blood Tribunal"
 gov_blood_tributary_principality:0 "Bloodied"
 gov_blood_tributary_kingdom:0 "Bloodied"
 gov_achon_magocratic_democracy:0 "Kosek Democracy"
 gov_achon_magocratic_democracy_desc:0 "This is a [concept_government_type] where the [concept_country] is formally a democracy, but political power is dominated by the mage class who control elections and institutions through their arcane prowess.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_plutocratic_monarchy:0 "Plutocratic Monarchy"
 gov_plutocratic_monarchy_desc:0 "This is a [concept_government_type] where the [concept_country] is formally a monarchy, but true power lies with the wealthy elite who control the crown through their riches.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_plutocratic_democracy:0 "Plutocratic Democracy"
 gov_plutocratic_democracy_desc:0 "This is a [concept_government_type] where the [concept_country] is formally a democracy, but political power is dominated by the wealthy elite who control elections and institutions through their wealth.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_plutocratic_single_party_state:0 "Plutocratic Regime"
 gov_plutocratic_single_party_state_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by a single legal party that is controlled by the wealthy elite.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_plutocratic_dictatorship:0 "Plutocratic Dictatorship"
 gov_plutocratic_dictatorship_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled by a single individual whose power rests upon the support of the wealthy elite.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_plutocracy:0 "Plutocracy"
 gov_plutocracy_desc:0 "This is a [concept_government_type] where the [concept_country] is ruled directly by the wealthy elite, whose riches grant them political dominance.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_emerald_confederation:0 "Emerald Confederation"
 gov_emerald_confederation_desc:0 "This is the [concept_government_type] of the Emerald League. A varied collection of city states, bishoprics and feudal realms; it is held together by their common cause in resisting the ambitions of their neighbours and realizing their own.\" \n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_thalorian_remnant_presidential:0 "Thalorian Remnant State"
 gov_thalorian_remnant_presidential_desc:0 "The rapid collapse of the Divine Thalorian Dominion has left massive power vacuums, and leadership grasps at anything that can give even a semblance of legitimacy.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_thalorian_remnant_dictatorial:0 "Thalorian Remnant Dictatorship"
 gov_thalorian_remnant_dictatorial_desc:0 "The rapid collapse of the Divine Thalorian Dominion has left massive power vacuums, and leadership grasps at anything that can give even a semblance of legitimacy.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_kamiran_theocracy:0 "Kamiran Theocracy"
 gov_kamiran_theocracy_desc:0 "This is a [concept_government_type] ruled by the [Concept('concept_ruler','$RULER_LUMINARCH$')] of the Church of Kamiros, vicar to the God of the Sun, supreme ecclesiastical authority and shepherd to the Kamiran faithful during His absence from the Realm. \n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_thiralian_theocratic_monarchy:0 "Rose Monarchy"
 gov_thiralian_theocratic_monarchy_desc:0 "This is the [concept_government_type] headed by the most [Concept('concept_ruler','$RULER_TITLE_VIRTUOUS_SOVEREIGN$')] of the Kingdom of Thiral. Blessed by the divine miracles of the Rose Court faith and entwined with its supreme ecclesiastical authority; the monarch is the paragon of virtue that all good citizens, whether they be noble or pauper, should aspire towards. \n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_amanzi_theocratic_republic:0 "Akinic Republic"
 gov_amanzi_theocratic_republic_desc:0 "This is the [concept_government_type] of the Amanzi Republic. A revolutionary state that threw off the shackles of tyranny; the intervention of Holy Akini during its most dire moment greatly expanded clerical influence and weakened its democracy. For now, the republic is governed by the [concept_pibliyakimo] as they await the fulfillment of the [concept_prophecy_dawn]. \n\n$TRANSFER_OF_POWER_NAME_DESC$"
 gov_thalorian_remnant_theocratic:0 "Thalorian Remnant Theocracy"
 gov_thalorian_remnant_theocratic_desc:0 "The rapid collapse of the Divine Thalorian Dominion has left massive power vacuums, and leadership grasps at anything that can give even a semblance of legitimacy.\n\n$TRANSFER_OF_POWER_NAME_DESC$"
