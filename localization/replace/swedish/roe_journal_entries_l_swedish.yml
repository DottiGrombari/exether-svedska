 je_gnoll_mountain:0 "Reclaiming the #italic Nyolli#!"
 je_gnoll_mountain_complete_tt:0 "Has formed Nyolli."
 je_gnoll_mountain_reason:0 "Since the incursion of the orcs, the #italic Nyolli#!, the mountain of gnolls, has become a fantastical dream rather than the powerful nation it once was.  We must reclaim the warrens of our ancestors before this dream fades from memory."
 je_dwarf_excavation:0 "Gugnos Excavation"
 je_dwarf_excavation_reason:0 "In the years since the [concept_godsbane], the dwarves' self-imposed exile has left the #italic Gugnos#!, the oldroads, in disrepair. While the cave-ins mean much will never be recovered, there is much that could cleared using modern tools."
 excavate_gugnos_cavein:0 "Excavate the Gugnos Cave-in"
 excavating_gugnos_cavein:0 "Excavating Gugnos Cave-in"
 excavate_gugnos_cavein_desc:0 "In the years since the [concept_godsbane], the dwarves' self-imposed exile has left the #italic Gugnos#!, the oldroads, in disrepair. While the cave-ins mean much will never be recovered, there is much that could cleared using modern tools."
 je_blood_tribunal:0 "Spreading Darkness"
 je_blood_tribunal_complete_tt:0 "[ROOT.GetCountry.GetName] has established 5 or more Blood Tribunals or Blood Tributaries.\nAll subjects, including tributaries, will count toward this goal."
 je_blood_tribunal_reason:0 "Tending to the hunger of the lords of Ravencliff is a task unending. As our flock has grown, it has proven impossible to cultivate the tithes we require from our lands alone. Thus, the formation of cattle-puppets, known as Blood Tribunals, has been decreed."
 je_blood_tribunal_more_tt:0 "Raises blood-tithe rates"
 je_blood_tribunal_relations_tt:0 "Significantly reduces relations with all diplomatically relevant countries"
 blood_tribunal_progress_bar:0 "[concept_vampire_masquerade]"
