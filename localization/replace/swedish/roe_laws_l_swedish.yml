l_swedish:
  law_ecumenical_recognition:0 "Ecumenical Recognition"
  law_ecumenical_recognition_desc:0 "The state has an official state religion but the people may choose to identify with adjacent denominations. Distant sects and exotic religions are discriminated against."
  law_religious_tax:0 "Religious Tax"
  law_religious_tax_desc:0 "The state imposes a special tax on heathens within the country, but offers some religious freedoms for similar faiths."
  law_landed_voting_halfling:0 "Tillers’ Suffrage"
  law_landed_voting_halfling_desc:0 "Those who own land or capital property are given a vote, with particular recognition for farmers and rural households who cultivate the land and sustain their communities."
  law_guild_system_consortium:0 "Astral Consortium"
  law_guild_system_consortium_desc:0 "A system in which eligibility for employment within certain fields is dependent upon membership of a great guild."
  law_orc_banners:0 "Orc Banners"
  law_orc_banners_desc:0 "Rather than a centralized army, the clans maintain their own warbands. When danger looms, the state may summon these banners, calling warriors to defend their kin and territory."
  lawgroup_environment:0 "Industrial Regulation"
  law_no_restrictions:0 "No Regulation"
  law_no_restrictions_desc:0 "There are no regulations on the environmental impact of industry. Factories, both mundane and magical, may operate without oversight."
  law_environmental_regulation:0 "Environmental Protection"
  law_environmental_regulation_desc:0 "The state enforces regulations on the environmental impact of industry, requiring factories to implement measures to mitigate pollution and resource depletion."
  law_magic_banned:0 "Artifice Banned"
  law_magic_banned_desc:0 "An economic view that rejects magical industry and the supernatural, preferring the fruits of honest labor over volatile arcane gizmos."
  law_arcane_economy:0 "Artificer Guilds"
  law_arcane_economy_desc:0 "This magic framework revolves around the expertise of artificer guilds, ran by skilled craftsmen who blend magic with technology. Through skilled practice, enchanted tools, and arcane engineering, artificers create powerful artifacts and constructs."
  law_court_mages:0 "Starbranded Bureaucrats"
  law_court_mages_desc:0 "Bureaucrats are promoted based upon [concept_magic] aptitude in exchange for high wages; in addition to [concept_rememberancers] where possible."
  law_magical_schools:0 "Wizardry Schools"
  law_magical_schools_desc:0 "Letting the [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] take care of education ensures a magically talented population."
  law_religious_schools_desc:0 "Letting the [GetInterestGroupVariant('ig_devout',GetPlayer).GetNameWithCountryVariant] take care of education ensures a loyal and morally healthy population."
  law_magocracy:0 "Magocracy"
  law_magocracy_desc:0 "#lore The government is ruled by circle of mages and their pursuit of arcane knowledge. The Head of State is nominally the most powerful spellcaster in the nation, selected by merit, status, or birth.#!"
  law_matriarchy:0 "Matriarchy"
  law_matriarchy_desc:0 "#lore Women rule society while men are usually not allowed in positions of power.#!"
  law_men_own_property:0 "Propertied Men"
  law_men_own_property_desc:0 "Whether inherited or otherwise earned, even men have the right and duty to own and cherish their possessions."
  law_men_in_the_workplace:0 "Men in the Workplace"
  law_men_in_the_workplace_desc:0 "How will we be able to keep the furnaces of progress aflame with only half the potential workforce?"
  law_civic_confederation:0 "Civic Confederation"
  law_civic_confederation_desc:0 "The state exists as a confederation of self-governing communities. Citizens are defined by their participation in the pact of union, not by cultural or national identity. Each community maintains broad autonomy within the federation."
  EFFECTS_ON_ACCEPTANCE_law_civic_confederation:0 "#tooltippable #tooltip:$BREAKDOWN_TAG$ Low Acceptance status Pops face moderate penalties, but more accepted Pops receive few benefits#!#!"
 law_palace_economy:0 "Palace Economy"
 law_palace_economy_desc:0 "#lore The economy is centered entirely around the needs and desires of the capital. It becomes not only the political, but literal heart of the nation.#!"
 law_womens_suffrage:0 "Egalitarian Suffrage"
 law_plutocracy:0 "Plutocracy"
 law_plutocracy_desc:0 "#lore The government is ruled by a cabal of rich business moguls. The Head of State is nominally the most influential businessman in the nation, selected by wealth, connections, or status.#!"
 law_guild_bondage:0 "Guild Slavery"
 law_guild_bondage_desc:0 "#lore A system of labor where guilds exercise total control over their employees' lives - from housing and education to healthcare and recreation. Workers trade personal autonomy for corporate security, living in guild-owned communities and operating under guild law. While technically free to leave, few can afford to escape the Consortium's all-encompassing influence.#!"
 law_genetic_testing:0 "Mutagenic Trials"
 law_genetic_testing_desc:0 "Healthcare is managed by alchemists and chirurgeons, using potions and mutagens to achieve miraculous cures. While the poor often serve as test subjects, the wealthy reap the benefits, with minimal cost to the state."
 law_adventuring_economy:0 "Adventuring Economy"
 law_adventuring_economy_desc:0 "An economic system which is based around daring Adventurers risking their lives collecting the riches of these lands. Organised in an Adventurers Guild that guarantees their hard work is rewarded. Under this system the Government of the overlord does not allow for the building of Heavy Industries"
 law_adventuring_economy_independent:0 "Free Adventuring Economy"
 law_adventuring_economy_independent_desc:0 "An economic system which is based around daring Adventurers risking their lives collecting the riches of these lands. Organised in an Adventurers Guild that guarantees their hard work is rewarded."
 law_adventurer_freeholds:0 "Adventurer Freeholds"
 law_adventurer_freeholds_desc:0 "Adventurers and their families use their gains to buy plots of land and fund their own enterprises."
 law_consumption_based_taxation_corsair:0 "Protection Rackets"
 law_consumption_based_taxation_corsair_desc:0 "Living in peace isn't free, you'll always need someone looking out for you."
 law_professional_army_corsair:0 "Admiralty Primacy"
 law_professional_army_corsair_desc:0 "The state exists to support the Admiralty with naval affairs remaining paramount in state policy."
 law_pest_control:0 "Pest Control"
 law_pest_control_desc:0 "By giving your police force adequate equipment and monster-hunting training, they become more effective at protecting citizens from supernatural dangers."
 law_anarchy_bandit:0 "Lawless Society"
 law_anarchy_bandit_desc:0 "WIP"
 law_dwarf_compulsory_guild_apprenticeship:0 "Compulsory Guild Apprenticeship"
 law_dwarf_compulsory_guild_apprenticeship_desc:0 "All workers must serve formal apprenticeships under guild supervision. The guilds maintain strict control over craft knowledge, pricing, and labor practices, ensuring quality while restricting competition and social mobility."
 law_dwarf_guild_privileges:0 "Guild Privileges"
 law_dwarf_guild_privileges_desc:0 "Guild membership confers significant privileges and protections. The guild system is recognized and supported by law, granting member-craftspeople competitive advantages and preferential treatment in contracts."
 law_dwarf_no_guild_privileges:0 "No Guild Privileges"
 law_dwarf_no_guild_privileges_desc:0 "While guilds are permitted to exist, they receive no special privileges or legal recognition. Independent craftspeople and non-guild workers operate on equal footing with organized guild members."
 law_dwarf_guilds_discouraged:0 "Promote Syndicates"
 law_dwarf_guilds_discouraged_desc:0 "The state actively promotes worker syndicates and collective bargaining over traditional guild structures. Independent workers and syndicalist organizations are given preferential support to break guild monopolies."
  law_orc_warrior_society:0 "Orcish Warband"
  law_orc_warrior_society_desc:0 "Strength rules all. Only the fiercest fighters command respect and hold sway. Life is measured by battle, and warriors shape every aspect of the tribe."
  law_orc_balanced_society:0 "Warrior Society"
  law_orc_balanced_society_desc:0 "Power is shared between warriors, leaders, and laborers. Strength matters, but cleverness, skill, and effort are also honored. The tribe thrives through both might and craft."
  law_orc_normal_society:0 "Balanced Society"
  law_orc_normal_society_desc:0 "Every orc has their place, whether fighting, working, or leading. Strength is valued, but daily life is guided by custom, duty, and the roles each orc fulfills."
  law_orc_affirmative_action:0 "Affirmative Action"
  law_orc_affirmative_action_desc:0 "Active measures are taken to create an equitable orcish society, prioritizing previously marginalized groups who rely on non-traditional strengths."
  law_avian_caste_enforced:0 "Laws of Vitic Enforced"
  law_avian_caste_enforced_desc:0 "The Laws of Vitic are strictly enforced. The hierarchy is absolute: those dwelling in the heights enjoy undisputed privilege and power, while those of the lowlands are bound to their stations. Mobility between castes is forbidden, and violation of caste law is severely punished."
  law_avian_caste_codified:0 "Laws of Vitic Codified"
  law_avian_caste_codified_desc:0 "The Laws of Vitic are formally codified in law. The hierarchy is maintained through legal statute, with those of the heights holding privileged positions and those of the lowlands restricted in their opportunities. A degree of flexibility is permitted, though upward mobility remains difficult."
  law_avian_caste_not_enforced:0 "Laws of Vitic Accommodating"
  law_avian_caste_not_enforced_desc:0 "The Laws of Vitic exist primarily as tradition rather than enforced law. While the hierarchy is still recognized, strict adherence is not demanded. Those of the lowlands may pursue opportunities with less institutional resistance, though cultural prejudice persists."
  law_avian_affirmative_action:0 "Affirmative Action"
  law_avian_affirmative_action_desc:0 "Active measures are taken to elevate those of the lowlands, providing them with education and opportunity equal to their mountain-dwelling counterparts. The hierarchy is actively dismantled through deliberate policy."
  law_industry_banned_unrecognized:0 "Preindustrial Society"
  law_industry_banned_unrecognized_desc:0 "An economic view that rejects heavy industry and automation, preferring the fruits of honest labor over soulless machinery."
  law_industry_banned_druidic:0 "Druidic Community"
  law_industry_banned_druidic_desc:0 "A rural economy emphasizing agricultural development and community."
  law_serfdom_druidic:0 "Rootbound Communities"
  law_serfdom_druidic_desc:0 "Rural households hold land through local custom, sacred stewardship, and communal obligation. Peasants are not owned by lords, but their lives are deeply tied to the groves, fields, and kinship networks that sustain them."
  law_homesteading_sea:0 "Seasteading"
  law_homesteading_sea_desc:0 "Farmers and fishermen lay claim to plots of land which they work alongside their hired laborers."
  law_creed_of_hasal:0 "Creed of Hasal"
  law_creed_of_hasal_desc:0 "Religion is banned from public life, and the state advocates anti-religious policies. All religions face discrimination, and the clergy are allowed little to no role in society."
  law_war_slaves:0 "Slave Armies"
  law_war_slaves_desc:0 "Demand for soldiers is fulfilled through forced conscription of slaves."
  amendment_hedgemage_schools:0 "Hedgemage Schools"
  amendment_ind_guild_shares:0 "Industrialist Guild Shares"
  amendment_ind_guild_shares_desc:0 "The governing bodies for the state's artificery assembly are systematically biased towards employers' associations and industry."
  amendment_tu_guild_shares:0 "Trade Union Guild Shares"
  amendment_tu_guild_shares_desc:0 "The governing bodies for the state's artificery assembly are systematically biased towards labor associations and trade unions."
  amendment_ma_guild_shares:0 "Mage Guild Shares"
  amendment_ma_guild_shares_desc:0 "The governing bodies for the state's artificery assembly are systematically biased towards starbrands and magical institutions."
  amendment_exetherial_physics:0 "Exetherial Physics"
  amendment_exetherial_physics_desc:0 "The sciences are taught with special bearing given to the principles of the nature of [concept_exether]."
  amendment_planar_physics:0 "Planar Physics"
  amendment_planar_physics_desc:0 "The sciences are taught with special bearing given to universal principles that apply across all [Concept('concept_outer_realms', '$outer_plane$')]."
  amendment_mage_hunters:0 "Mage Hunters"
  amendment_clerical_oversight:0 "Clerical Oversight of Magic"
  amendment_clerical_oversight_desc:0 "The clergy maintain strict license on what magical practices are or are not permitted."
  amendment_protected_groves:0 "Protected Groves"
  amendment_protected_groves_desc:0 "Numerous old-growth forests have been marked as protected spaces, reserved for religious or druidic usage."
  amendment_divine_avatars:0 "Divine Avatars"
  amendment_divine_avatars_desc:0 "The nation's devout uphold a powerful magic user or group of magic users as their god's Champion on [concept_exether]."
  amendment_voting_starbrands:0 "Starbrand-Only Voting"
  amendment_voting_starbrands_desc:0 "Only [Concept('concept_starbrand', '$concept_starbrands$')] may participate in elections."
  amendment_subsidized_questboards:0 "Subsidized Questboards"
  amendment_subsidized_questboards_desc:0 "The state subsidizes quest rewards to encourage their swift execution."
  amendment_state_adventurers:0 "State Adventuring Parties"
  amendment_state_adventurers_desc:0 "Government-funded adventuring parties are managed from the capital to deal with a variety of threats."
  amendment_mutagenic_safety_commision:0 "Mutagenic Safety Commission"
  amendment_mutagenic_safety_commision_desc:0 "The state funds a commission for the study of mutagens and the enforcement of regulation."
  amendment_reduced_research_regulation:0 "Reduced Research Regulation"
  amendment_reduced_research_regulation_desc:0 "The state places few restrictions or regulations on the study of mutagens and their effects."
  amendment_species_supremacy:0 "Species Supremacy"
  amendment_species_supremacy_desc:0 "The nation's laws operate on the assumption that [GetPlayer.GetCustom('species_adjective')] persons hold the reins of power."
