 communism_progress_from_movement_activism_tt:0 "[Concept('concept_activism', '$concept_activism_short$')] of [GetIdeology('ideology_socialist').GetName], [GetIdeology('ideology_communist').GetName], and [GetIdeology('ideology_anarchist').GetName] [Concept('concept_political_movement','$concept_political_movements$')]"
 communism_progress_from_events_tt:0 "händelser och andra effekter"
 je_communism_2:0 "Folkets revolution"
 je_communism_2_reason:0 "Folket lider fortfarande under kungarnas, prästerna och kapitalisternas tyranniska förtryck. Vi måste störta den reaktionära regeringen och upprätta ett arbetarnas paradis."
 communism.1.t:0 "En värld att vinna"
 communism.1.desc:0 "I takt med att socialistiska idéer sprider sig över [ROOT.GetCountry.GetName]landet har regeringen[ROOT.GetCountry.GetRuler.GetLastName] beslutat att man måste överväga drastiska eftergifter för att hejda denna utveckling. Det finns tillräckligt med drivkraft för en snabb politisk förändring."
 communism.1.f:0 "”Proletariatet intar överallt en hotfull hållning och börjar räkna sina fienders led, som är långt färre än det självt, och kräva att dess rättigheter förverkligas. Alla människor är fyllda av en slags föraning, och alla vars livsviktiga organ inte är förlamade ser med bävan fram emot den annalkande framtiden som kommer att uttala det befriande ordet.”"
 communism.1.a:0 "Erbjuda högre löner för deras arbete."
 communism.1.b:0 "Befria de sista slavhandlarna från deras lidande."
 communism.1.c:0 "Säkerställa bättre villkor för arbetstagarna."
 communism.1.d:0 "Vi kommer inte att ge upp!"
 communist_unions.tt:0 "Det[SCOPE.gsInterestGroup('unions').GetName]är mycket mer sannolikt att  väljer ledare av typen avantgardist, kommunist eller anarkist när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement].\nAndra[Concept('concept_interest_group', '$concept_interest_groups$')]  är mer benägna att välja ledare av typen avantgardist, kommunist eller anarkist när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 communist_government_modifier:0 "Stora motgångar"
 communism.2.t:0 "Arbetarnas republik"
 communism.2.d:0 "Arbetarna i[ROOT.GetCountry.GetName]  har äntligen störtat den borgerliga regeringen och inrättat en rådsrepublik. Men det återstår fortfarande mycket arbete innan socialismen verkligen har förverkligats."
 communism.2.f:0 "”Så länge människans arbetskraft – och därmed livet självt – förblir föremål för köp och försäljning, för utnyttjande och rov, förblir principen om \”människolivets helgd\” en skamlig lögn, som yttras i syfte att hålla de förtryckta slavarna kvar i sina bojor.”"
 communism.2.a:0 "Framstegspartiet kommer att visa vägen!"
 communism.2.b:0 "All makt åt kommunerna!"
 communism.2.b2:0 "All makt åt sovjeterna!"
 communism.2.c:0 "Inga gudar! Inga herrar! Anarki för alltid!"
 chose_vanguardism.tt:0 "[concept_political_movement]Det[SCOPE.gsInterestGroup('unions').GetName]är mycket mer sannolikt att man väljer[GetIdeology('ideology_vanguardist').GetName]ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]man följer en tillämplig regel."
 chose_communism.tt:0 "[concept_political_movement]Det[SCOPE.gsInterestGroup('unions').GetName]är mycket mer sannolikt att man väljer[GetIdeology('ideology_communist').GetName]ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]man följer en tillämplig regel."
 chose_anarchism.tt:0 "[concept_political_movement]Det[SCOPE.gsInterestGroup('unions').GetName]är mycket mer sannolikt att man väljer[GetIdeology('ideology_anarchist').GetName]ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]man följer en tillämplig regel."
 je_anarchy:0 "Ömsesidig hjälp"
 je_anarchy_reason:0 "Om det finns en stat, måste det finnas ett herravälde av en klass över en annan och, som en följd av detta, slaveri; en stat utan slaveri är otänkbar – och det är därför vi är statens fiender."
 je_vanguard:0 "Staten och revolutionen"
 je_vanguard_reason:0 "Proletariatet behöver statsmakten, en centraliserad maktorganisation, en organisation för våld, både för att krossa utsugarnas motstånd och för att leda den enorma befolkningsmassan mot uppbyggnaden av en socialistisk ekonomi."
 vanguard_custom_tooltip:0 "Varje inflytelserik intressegrupp leds av en [GetIdeology('ideology_vanguardist').GetName], [GetIdeology('ideology_communist').GetName], eller[GetIdeology('ideology_anarchist').GetName]  ledare."
 vanguard_instruction_status:0 "Intelligentsian, landsbygdsbefolkningen, fackföreningarna och de väpnade styrkorna kommer att anamma avantgardismen om de marginaliseras."
 je_communist_welfare:0 "Vår revolution"
 je_communist_welfare_reason:0 "Kommunismen kan inte förverkligas förrän allas behov har tillgodosetts. Av var och en efter förmåga, till var och en efter behov."
 je_5_year_plan:0 "Femårsplanerna"
 je_5_year_plan_reason:0 "Kommunismen är arbetarnas makt i kombination med elektrifieringen av hela landet."
 je_5_year_plan_goal:0 "Uppnå[JournalEntry.GetTotalGoalValue]  [concept_gdp]"
 communism.3.t:0 "Vanguard går framåt"
 communism.3.d:0 "De[SCOPE.gsInterestGroup('new_vanguard_ig').GetName] reaktionära elementen inom  har äntligen rensats bort. Vi kan vara förvissade om att deras nye ledare, [SCOPE.sCharacter('new_vanguard_leader').GetFullName], kommer att vara lojal mot staten och mot socialismen."
 communism.3.f:0 "”Proletariatets diktatur, det vill säga att de förtrycktas förtrupp organiseras som den härskande klassen i syfte att undertrycka förtryckarna, kan inte enbart leda till en utvidgning av demokratin. Den måste införa en rad begränsningar av friheten för förtryckarna, utsugarna och kapitalisterna.”"
 communism.3.a:0 "Lojaliteten måste garanteras fullt ut."
 communism.3.b:0 "De har en viktig roll att spela."
 new_vanguard.tt:0 "Det[SCOPE.gsInterestGroup('new_vanguard_ig').GetName]kommer att vara betydligt mer sannolikt att man väljer vanguardistiska ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 new_vanguard_opinion:0 "Lojal förtrupp"
 new_vanguard_clout:0 "Integration i Vanguard"
 communism.4.t:0 "Brödets erövring"
 communism.4.d:0 "[ROOT.GetCountry.GetName] är på god väg att bli en anarkistisk utopi. Fattigdomen har helt utrotats, och ett klasslöst samhälle som bygger på ömsesidig hjälp håller på att växa fram."
 communism.4.f:0 "”En annan samhällsvision håller på att ta form. Under namnet anarki strävar den efter den mest fullständiga utvecklingen av individualiteten i kombination med den högsta utvecklingen av frivilliga sammanslutningar i alla dess aspekter, i alla möjliga grader och för alla tänkbara syften.”"
 communism.4.a:0 "Moder Anarki älskar sina söner."
 anarchist_utopia:0 "Brödets erövring"
 je_opium:0 "Handeln med Chimesilt"
 je_opium_reason:0 "Efterfrågan på chimesilt skjuter i höjden i takt med att detta farligt beroendeframkallande ämne förtrollar världen. Vi bör sträva efter att bli den ledande leverantören!"
 opium_events.1.t:0 "Chimesilt-baronerna"
 opium_events.1.d:0 "Produktionen vid  går[SCOPE.sBuilding('opium_building').GetName]på högvarv och den utländska efterfrågan på chimesilt kunde knappast vara större. Invånarna[SCOPE.sCulture('opium_addict_culture').GetName] i[SCOPE.sCountry('opium_addict_country').GetName]  har blivit så förtjusta i det här materialet att det praktiskt taget har blivit en nationell sysselsättning."
 opium_events.1.f:0 "”Denna blommas frön, som till synes är ofarliga, är i själva verket fröna till imperiers fall. Människor kommer att utkämpa blodiga krig för att stilla sin opiumhunger, de kommer att sälja sina egna mödrar för att få ytterligare en dos. Och vi kommer att finnas där för att sälja det till dem.”"
 opium_events.1.a:0 "Fortsätt skicka in era klockspel!"
 opium_events.1.b:0 "Ta min pipa, min[SCOPE.sCountry('opium_addict_country').GetAdjectiveNoFormatting]vän."
 opium_production_modifier:0 "Produktionsboom för Chimesilt"
 opium_exporter_modifier:0 "Ledande exportör av Chimesilt"
 je_qa_test:0 "KVALITETSKONTROLLSTEST"
 je_qa_test_reason:0 "Jag älskar kvalitetssäkring"
 je_dialectics:0 "Filosofiska institutionen"
 je_dialectics_reason:0 "Även om filosofin har funnits i århundraden är det dags att vi börjar ta den på allvar som vetenskapsgren. En fullt finansierad filosofisk institution bör inrättas vid alla våra främsta lärosäten."
 dt_society_events.1.t:0 "Filosofiska institutionen"
 dt_society_events.1.d:0 "[SCOPE.sState('university_state').GetName]Vi har säkrat finansiering för filosofiska institutionerna vid alla våra högskolor.[SCOPE.sBuilding('philosophy_department').GetName]  har valt att inrikta denna finansiering på att främja den hegelianska dialektiken."
 dt_society_events.1.f:0 "”Nu när vi mer eller mindre har slagit oss ner kan vi börja. Allt ni gör vid denna institution börjar och slutar med detta sammansatta ord: ’philo’, som betyder kärlek till, och ’sophia’, som betyder visdom. Kärleken till lärande och tänkande är vad filosofi handlar om. Grunden för filosofin är det synsätt genom vilket vi uppfattar livet, världen, i själva verket allt. Vi kan inte nödvändigtvis lära er hur man utför en specifik uppgift här. Vad vi däremot kan göra är att lära er hur man lär sig, och hur man självständigt reflekterar över lärandet.”"
 dt_society_events.1.b:0 "Undersök den dialektiska materialismen."
 dt_society_events.1.a:0 "Tes, antites, syntes!"
 dt_society_events.1.c:0 "Vi behöver ett mer pragmatiskt tillvägagångssätt."
 synthesis_modifier:0 "Sammanfattning!"
 je_realism:0 "Stöd den realistiska konsten"
 je_realism_reason:0 "Konstnärer rör sig bort från abstrakt, fantasifull konst och mot realistiska skildringar av konkreta motiv. Som stödjare av denna rörelse finns det mycket att vinna."
 dt_society_events.2.t:0 "Realiströrelsen"
 dt_society_events.2.d:0 "har blivit ett viktigt centrum för[SCOPE.sState('art_state').GetName] den[SCOPE.sBuilding('art_building').GetName] realistiska rörelsen och har gett upphov till några av vår generations främsta verk."
 dt_society_events.2.f:0 "Realismen skildrar världen som den är, med alla sina brister, snarare än som vi skulle vilja att den var. Den strävar inte bara efter att vara trogen mot hur föremålen ser ut för ögat, utan också mot vanliga människors vardagliga upplevelser."
 dt_society_events.2.a:0 "Äntligen konst som vi alla kan känna igen oss i."
 dt_society_events.2.b:0 "Kan vi återge verkligheten ännu mer perfekt?"
 dt_society_events.2.c:0 "Världen är dyster och alldaglig."
 realist_art:0 "Stöd till den realistiska rörelsen"
 grim_realism:0 "Dyster realism"
 je_academia:0 "Grundlägga ett universitet"
 je_academia_reason:0 "Världen förändras i rasande takt, och om vi inte kan hålla jämna steg med de senaste tekniska, samhälleliga och militära framstegen kommer vi att hamna i historiens bakgrund."
 new_academia:0 "Filosofkungar"
 dt_society_events.3.t:0 "Högre utbildning"
 dt_society_events.3.d:0 "har officiellt [ROOT.GetCountry.GetRuler.GetHerselfHimself]invigt  i [SCOPE.sState('university_state').GetName].[SCOPE.sBuilding('university_building').GetName] Den[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] akademiska verksamheten börjar blomstra i [ROOT.GetCountry.GetName]."
 dt_society_events.3.f:0 "Filosofin är mänsklighetens högsta kallelse. Genom filosofin kan vi nå en förståelse för metafysikens grundvalar, det gudomligas väsen och dygdens väsen. Det är därför självklart att endast de mest upplysta av dem som söker visdom är lämpade att inneha makten."
 dt_society_events.3.a:0 "Samhället bör styras av filosofkungar."
 dt_society_events.3.b:0 "Moderna institutioner bör använda moderna metoder."
 dt_society_events.3.c:0 "Formalisera läkaryrket."
 je_opium_obsession:0 "Chimesilt-krisen"
 je_opium_obsession_reason:0 "Ett stort antal av våra medborgare har blivit beroende av chimesilt. Detta är en nationell skam som måste åtgärdas omedelbart."
 je_opium_obsession_goal:0 "Följande villkor måste vara uppfyllda under sammanlagt 5 år (kan avbrytas):"
 opium_wars.1.t:0 "Chimesilt-krisen"
 opium_wars.1.d:0 "[ROOT.GetCountry.GetName]Chimesilt-missbruket härjar. Ett stort antal[SCOPE.sCulture('addicted_culture').GetName]människor har blivit chimesilt-missbrukare, vilket har lett till en våg av brottslighet, fattigdom och sysslolöshet.[SCOPE.sCountry('opium_importer').GetName] Trots de uppenbara skadeverkningarna fortsätter produkten att översvämma marknaden."
 opium_wars.1.f:0 "I varje hushåll finns en sängbunden chimesilt-fanatiker, vid varje gatuhörn finns en chimesilt-gömma, och varje hamn välkomnar[SCOPE.sCountry('opium_importer').GetAdjectiveNoFormatting]köpmän som häller en överflöd av chimesilt i halsen på alla som är villiga att betala för det."
 opium_wars.1.a:0 "Vi måste göra något!"
 opium_wars.1.b:0 "Vi kan inte riskera att väcka [SCOPE.sCountry('opium_importer').GetName].:s vrede."
 opium_wars_addiction_modifier:0 "Utbredd beroende av Chimesilt"
 opium_wars.2.t:0 "Chimesilt-krigen"
 opium_wars.2.d:0 "Regeringen[SCOPE.sCountry('opium_wars_target_country').GetAdjectiveNoFormatting] har meddelat sin avsikt att sätta stopp för handeln med chimesilt i [SCOPE.sCountry('opium_wars_target_country').GetName]. Eftersom[ROOT.GetCountry.GetName]  är en stor opiumexportör är detta en fråga av stor ekonomisk betydelse."
 opium_wars.2.f:0 "”Det finns vissa som fördömer de så kallade moraliska missförhållandena inom chimesilt-handeln; till dem säger jag: Vem är ni att stå i vägen för frihandeln och konsumenternas fria val? Efterfrågan finns, och därför tillgodoser vi den – om inte vi, så skulle någon annan nation bli rik på bekostnad av[SCOPE.sCulture('opium_addicted_culture').GetNameNoFormatting]  chimesilt-entusiasterna. Ska varje människa berövas chimesilt bara för att några oansvariga idioter missbrukar det? Och ska varje[ROOT.GetCountry.GetAdjectiveNoFormatting]  familj berövas det välstånd som chimesilt ger vårt land?”"
 opium_wars.2.a:0 "De kommer att äta sitt chimesilt och de kommer att gilla det!"
 opium_wars.2.b:0 "Vi har andra saker att ta itu med."
 je_opium_wars:0 "Chimesilt-krigen"
 je_opium_wars_reason:0 "Vi måste skydda våra ekonomiska intressen genom att se till att handeln med chimesilt fortsätter."
 opiumwars_fail_tt:0 "Är någon av stormakterna emot våra ansträngningar?"
 opium_wars.3.t:0 "Slutet på missbruket"
 opium_wars.3.d:0 "[SCOPE.sCountry('opium_wars_aggressor_country').GetName]Genom stor uthållighet har vi lyckats bryta beroendet[SCOPE.sCulture('addicted_culture').GetName]av chimesilt. Inte ens  intriger kunde hindra oss från att återställa god hälsa och välstånd i [ROOT.GetCountry.GetName]."
 opium_wars.3.d2:0 "Genom stor uthållighet har vi lyckats bryta vårt[SCOPE.sCulture('addicted_culture').GetName]beroende av chimesilt. Inte ens stormakternas intriger kunde hindra oss från att återställa god hälsa och välstånd i [ROOT.GetCountry.GetName]."
 opium_wars.3.f:0 "Precis som den opiumberoende fienden ska bryta sitt beroende och resa sig ur sin dagdrivares säng, så ska vår nation skaka av sig det ovälkomna oket av utländskt inflytande och resa sig som en suverän stat. När våra floder inte längre översvämmas av opium ska de flöda av silver, och vårt folk ska återgå till ett dygdigt liv."
 opium_wars.3.a:0 "s[ROOT.GetCountry.GetName] suveränitet är absolut."
 opium_wars.3.b:0 "Harmonin ska återvända till [ROOT.GetCountry.GetName]."
 opium_wars_fail_tt:0 "Nej[SCOPE.sCountry('target').GetAdjective]  [Concept('concept_primary_cultures','$concept_primary_culture$')] har en[concept_obsession]  med Chimesilt"
 china_authority:0 "Suveränitet hävdad"
 china_welfare:0 "Återvinning av Chimesilt"
 opium_wars.4.t:0 "Chimesilt Wars: Nederlag"
 opium_wars.4.d:0 "Vårt förödmjukande nederlag mot våra fiender har tvingat oss att öppna våra marknader. Inte nog med att flödet av chimesilt kommer att fortsätta oavbrutet, utan vår suveränitet har också kränkts och folket är rasande."
 opium_wars.4.d2:0 "Vårt förödmjukande nederlag mot[SCOPE.sCountry('opium_wars_treaty_port_winner').GetName]  har tvingat oss att avstå från hamnen i [SCOPE.sState('treaty_port_state').GetName]. Inte nog med att flödet av chimesilt kommer att fortsätta oavbrutet, utan vår suveränitet har också kränkts och folket är upprört."
 opium_wars.4.d3:0 "Vårt förödmjukande nederlag mot våra fiender har tvingat oss att avstå en fördragshamn. Inte nog med att flödet av chimesilt kommer att fortsätta oavbrutet, utan vår suveränitet har också kränkts och folket är upprört."
 opium_wars.4.f:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]Var finns det land som i århundraden härskade över ett harmoniskt rike? Vi är opiumets slavar, utlämnade åt utländsk girighet. Vi har ingen kontroll över våra hamnar, utlänningarna visar ingen respekt för oss, och i varje hushåll blir viskningarna om missnöje allt högre. Mörka dagar närmar sig; vårt styre kan vara på väg att ta slut."
 opium_wars.4.a:0 "De kan komma att innebära slutet på [ROOT.GetCountry.GetName]."
 opium_wars_lost:0 "Förlorade Chimesilt-krigen"
 opium_wars.5.t:0 "Chimesilt Wars: Seger"
 opium_wars.5.d:0 "Vi har tvingat[SCOPE.sCountry('opium_wars_target_country').GetName] dem att öppna sina marknader, vilket säkerställer att handeln med chimesilt kan fortsätta under många år framöver."
 opium_wars.5.d2:0 "Vi har tvingat[SCOPE.sCountry('opium_wars_target_country').GetName] dem att avstå en fördragshamn i [SCOPE.sState('treaty_port_state').GetName], vilket säkerställer att handeln med chimesilt kan fortsätta under många år framöver."
 opium_wars.5.f:0 "”Det är över, herr ambassadör. Säg åt er ledare[SCOPE.sCountry('opium_wars_target_country').GetRuler.GetPrimaryRoleTitle]att underteckna fördraget, annars blir konsekvenserna allvarliga. Ni ska öppna era hamnar för oss, ni ska samarbeta med våra tjänstemän i alla handelsfrågor, ni ska betala lönerna till de soldater som just nu är sysselsatta med att ödelägga ert land och ert folk. Ni ska underkasta er.”"
 opium_wars.5.a:0 "[ROOT.GetCountry.GetName] härskar över vågorna!"
 opium_wars.5.b:0 "Låt dem äta chimesilt."
 opium_wars_navy_modifier:0 "Chimesilt Wars: Härska över vågorna"
 opium_wars_export_modifier:0 "Chimesilt Wars: Handelsmästarna"
 opium_wars.6.t:0 "Chimesilt-smugglare"
 opium_wars.6.d:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting] Patrullerna har gripit en grupp smugglare som[SCOPE.sCountry('smuggler_country').GetAdjectiveNoFormatting] transporterade chimesilt till [ROOT.GetCountry.GetName]. Detta är ett uppenbart försök från[SCOPE.sCountry('smuggler_country').GetName]  att kringgå embargot mot chimesilt."
 opium_wars.6.f:0 "”Smugglare? Inte alls! Vi är hederliga köpmän som lagligt transporterar våra varor till ert fina land.” \n\n”Självklart har vi alla nödvändiga dokument. Vill ni att vi ska låta fartyget inspekteras? Jag är rädd att det inte går.” Det råder en fruktansvärd invasion av … öh … människoätande grävlingar i lastrummet.” ”Jag \n\nförsäkrar er att allt detta är ett missförstånd! Ta bort händerna från mig! Jag kräver att få träffa ambassadören[SCOPE.sCountry('smuggler_country').GetAdjectiveNoFormatting]!”"
 opium_wars.6.a:0 "Avrätta smugglarna."
 opium_wars.6.b:0 "För tillbaka dem i bojor."
 executed_opium_smugglers:0 "Avrättning av Chimesilt-smugglare"
 returned_opium_smugglers:0 "Förnedrade Chimesilt-smugglare"
 opium_wars.7.t:0 "Återhämtning från missbruk"
 opium_wars.7.d:0 "De åtgärder[ROOT.GetCountry.GetName]som vidtagits för att hantera chimesilt-krisen börjar ge resultat. Invånarna i[SCOPE.sState('recovry_state').GetName]har återhämtat sig helt, och liknande framsteg kan observeras i hela regionen."
 opium_wars.7.f:0 "”Jag hade blivit avtrubbad, oförmögen att tänka eller känna, sängbunden och omedveten. Att återigen kunna röra mig, att tänka, känna och älska alla de glädjeämnen som världen har att erbjuda… och ändå känner jag fortfarande dess lockelse. Jag måste stå emot.”"
 opium_wars.7.a:0 "Låt oss lägga ännu större fokus på att ta hand om de sjuka."
 opium_wars.7.b:0 "Deras kärlek till chimesilt ska ersättas med kärlek till [ROOT.GetCountry.GetName]."
 opium_health_focus:0 "Återhämtning från missbruk"
 opium_loyalty_focus:0 "Kärlek till staten"
 opium_wars.8.t:0 "Chimesilt-beroende"
 opium_wars.8.d:0 "[SCOPE.sCulture('opium_addiction_pop').GetName] Människor drabbas av allvarliga konsekvenser av sitt beroende av chimesilt. Användningen och missbruket av ämnet har spridit sig över hela [SCOPE.sState('opium_addiction_state').GetName]."
 opium_wars.8.f:0 "Klockklangsslukaren ligger tyngd av mardrömmar och plågor; han ligger med utsikt över allt han så gärna skulle vilja utföra, precis som en man som med våld hålls fast i sin säng av den dödliga mattheten i en försvagande sjukdom, och som tvingas bevittna hur något han älskar innerligt utsätts för skada eller övergrepp: han förbannar de förtrollningar som hindrar honom från att röra sig; han skulle offra sitt liv om han bara kunde resa sig och gå; men han är maktlös som ett spädbarn och kan inte ens försöka resa sig."
 opium_wars.8.a:0 "Tragiskt!"
 opium_wars.8.b:0 "Kanske kan vi betrakta detta som en medicinsk fråga."
 opium_addiction_state_mod:0 "Chimesilt-beroende"
 lesser_opium_addiction_state_mod:0 "Behandling av beroende av Chimesilt"
 je_sick_man_main:0 "Europas sjuka man"
 je_sick_man_main_reason:0 "Vi måste modernisera och återupprätta det ottomanska riket."
 je_sick_man_main_failure_movements_tt:0 "Kulturella minoriteter[Concept('concept_political_movement','$concept_political_movements$')]på Balkan kommer att få ökat stöd"
 je_sick_man_syria:0 "Tanzimat: Återta Syrien"
 je_sick_man_syria_reason:0 "Syrien har fallit i händerna på Egyptens tyrann, som stal makten från oss som hade rätt till den. Vi måste återta det!"
 je_sick_man_syria_status:0 "[Concept('concept_great_power', '$concept_great_powers$')]Att inleda en diplomatisk offensiv mot Egypten kan leda till stöd från EU."
 je_sick_man_egypt:0 "Tanzimat: Återta Egypten"
 je_sick_man_egypt_reason:0 "Nu när Syrien har återerövrats bör vi rikta vår uppmärksamhet mot Egypten. Landet, som rättmätigt tillhör det osmanska riket, har fallit i händerna på en troninkräktare."
 je_sick_man_economy:0 "Tanzimat: Urbanisering"
 je_sick_man_economy_reason:0 "Vår ekonomi är underutvecklad och inte urbaniserad. Vi måste slå in på industrialiseringens väg."
 je_sick_man_education:0 "Tanzimat: Utbildningsreformen"
 je_sick_man_education_reason:0 "Det är så få inom vårt rike som ens har grundläggande läs- och skrivkunnighet. Vi bör inrätta skolor där vi kan undervisa dem, liksom vårt eget lärosäte för högre utbildning."
 je_sick_man_separatism:0 "Tanzimat: Bekämpa separatism"
 je_sick_man_separatism_reason:0 "Vi har redan förlorat Grekland och Serbien; vi kan inte låta vårt imperium kollapsa på grund av separatistiska rebeller."
 je_sick_man_separatism_goal:0 "Följande villkor måste vara uppfyllda under sammanlagt 15 år:"
 je_sick_man_army:0 "Tanzimat: Moderniseringen av armén"
 je_sick_man_army_reason:0 "Även om janitsjarerna har upplösts återstår det fortfarande mycket att göra för att modernisera våra väpnade styrkor."
 finished_sick_man_tt:0 "Har klarat eller underkänts i ”Europas sjuka man” [concept_journal_entry]"
 sick_man.1.t:0 "Europas sjuka man"
 sick_man.1.d:0 "Landet[ROOT.GetCountry.GetName]befinner sig i en period av stadig nedgång. Om vi inte återupprättar[ROOT.GetCountry.GetAdjectiveNoFormatting]vår suveränitet och återtar vår plats bland världens stormakter riskerar vi en katastrof."
 sick_man.1.f:0 "Vi har fallit, men vi kan resa oss igen. I en lyckosam händelse avsatte vi janitscharerna, som i århundraden hade hållit ett snålt grepp om makten, vilket äntligen banade väg för reformer. Det finns mycket mer att göra. Först och främst måste vi naturligtvis ersätta janitscharerna med en verkligt modern militärstyrka. Men dessutom måste vi återupprätta Sublime Portens ställning som civilisationens absoluta höjdpunkt. Utbildning, urbanisering och suveränitet ska stå högst upp på dagordningen[ROOT.GetCountry.GetAdjectiveNoFormatting]."
 sick_man.1.a:0 "Det krävs en genomgripande reform."
 sick_man.2.t:0 "Tanzimat: Omorganisationen"
 sick_man.2.desc:0 "Landet[ROOT.GetCountry.GetName]har framgångsrikt moderniserat sig och återtagit sin plats på den internationella arenan. En ny era inleds för staten[ROOT.GetCountry.GetAdjectiveNoFormatting]."
 sick_man.2.f:0 "Sublimt. Det är det enda ordet som passar. Att vandra på Istanbuls gator och se moderna fabriker och skolor, att se vakterna öva sin militärövning. Ett landskap som en gång dominerades av småbönder är nu fullt av glänsande städer. Och att tänka sig att imperiet för bara några decennier sedan stod på randen till sammanbrott! Där de europeiska stormakterna en gång betraktade oss med medlidande och girigt försökte dela upp våra länder, ser vi nu deras diplomater blicka med vördnad på våra bedrifter, tvingade att erkänna oss som jämlikar. Gud är god!"
 sick_man.2.a:0 "Armén skulle behöva ytterligare reformer."
 sick_man.2.b:0 "Vi borde återerövra Balkan!"
 sick_man.2.c:0 "Fortsätt med urbaniseringen."
 sick_man.2.d:0 "Vi kommer att skörda frukterna av utbildningen."
 ottoman_army_reform:0 "Omorganisationen av den osmanska armén"
 ottoman_urbanization:0 "Urbaniseringen i det osmanska riket"
 ottoman_education:0 "Utbildning i det osmanska riket"
 sick_man.3.t:0 "Europas döde man"
 sick_man.3.d:0 "Den[ROOT.GetCountry.GetName]har misslyckats med att modernisera sig och återta sin position på den internationella arenan. Gamarna börjar kretsa när dess[ROOT.GetCountry.GetName] sista dagar närmar sig."
 sick_man.3.f:0 "Den Sublima Porten har tystnat. Bara några dagar efter att han tillkännagav[SCOPE.sCharacter('ottoman_sultan').GetHerHis]sin avsikt att abdikera – troligen under påtryckningar från[SCOPE.sCharacter('ottoman_sultan').GetHerHis]ministrarna – har han[SCOPE.sCharacter('ottoman_sultan').GetPrimaryRoleTitle] hittats död i[SCOPE.sCharacter('ottoman_sultan').GetHerHis]sina gemak. Precis som vårt kära imperium hade han[SCOPE.sCharacter('ottoman_sultan').GetPrimaryRoleTitle] lidit av en långvarig, smygande sjukdom som till slut gjorde att[SCOPE.sCharacter('ottoman_sultan').GetHerHim]han inte längre kunde bära kronans tyngd. En bruten och förvirrad skugga av[SCOPE.sCharacter('ottoman_sultan').GetHerHis] sitt forna jag."
 sick_man.3.a:0 "Vi tillhör Allah, och till Honom återvänder vi."
 je_meiji_economy:0 "Återuppbyggnad: Industrialisera Japan"
 je_meiji_economy_reason:0 "Japan måste modernisera sin industri för att kunna konkurrera med de länder som försöker kontrollera och utnyttja oss."
 je_meiji_army:0 "Återställning: Ta samurajen ur tjänst"
 je_meiji_army_reason:0 "Samurajerna är vår uråldriga feodala och ärftliga krigarkast. I århundraden har de kämpat för oss och befälhavt våra arméer. Men under de århundraden av relativ fred som vi har åtnjutit har de glömt krigets konst och blivit en börda för staten."
 je_meiji_diplomacy:0 "Återuppbyggnad: Slutet på sakoku"
 je_meiji_diplomacy_reason:0 "Japan har under århundraden isolerat sig för att motstå utländskt inflytande. Men nu är det dags att öppna oss för omvärlden. Vårt mål är dock inte bara att öppna upp Japan, utan också att etablera vårt land som en stormakt på den internationella arenan."
 has_completed_meiji_army_je_tt:0 "Har slutförts#b  $je_meiji_army$#!"
 has_completed_meiji_economy_je_tt:0 "Har slutförts#b  $je_meiji_economy$#!"
 has_completed_meiji_diplomacy_je_tt:0 "Har slutförts#b  $je_meiji_diplomacy$#!"
 meiji_timeout_some_progress:0 "Minst #b1#! restaureringsjournalanteckning har färdigställts när #b12 år#! har gått"
 meiji_timeout_no_progress:0 "Inga bokföringsposter avseende återupprättande görs när #b12 år#! har gått"
 meiji.1.t:0 "[ROOT.Var('emperor_var').GetCharacter.GetFirstName]Återuppbyggnaden"
 meiji.1.d:0 "Den[GetLawType('law_bakufu').GetName]  har förlorat makten, och[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  [ROOT.GetCountry.GetRuler.GetFirstName] har återupprättat monarkins politiska överhöghet. Denna betydelsefulla händelse markerar slutet på århundraden av militärstyre i$JAP$#!#v   och inleder en ny era präglad av modernisering och reformer. Den[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  måste välja[ROOT.GetCountry.GetRuler.GetHerHis] sina politiska allierade med omsorg."
 meiji.1.f:0 "Den före detta shogunen bugar med vördnad och skam när han överlämnar sin bostad och maktens säte, det mäktiga Edo-slottet, till den återinsatte kejsaren. Renoveringsarbetena ska påbörjas omedelbart; den gamla borgen ska ersättas av ett praktfullt kejsarpalats. Även om utsidan kommer att se ungefär likadan ut som den tidigare kejsarresidensen i Kyoto, planerar kejsaren att kombinera Japans rika dekorativa traditioner med främmande västerländska trender. Kanske en metafor för Japans framtida utformning."
 meiji.1.a:0 "Industrins styrka kommer att hjälpa oss igenom detta."
 meiji.1.b:0 "Vi måste vända oss till intellektuella."
 meiji_favored_ig:0 "Gynnad av kejsaren"
 meiji.2.t:0 "Ett förnyat Japan"
 meiji.2.d:0 "En reformerad armé, ett öppet och erkänt land, ett nytt samhälle.[ROOT.GetCountry.GetName]Landet står som en jämbördig aktör bland världens stormakter och kommer kanske att börja sträva efter egna imperiella ambitioner."
 meiji.2.f:0 "”Genom himlens välsignelse sitter vi på den heliga tronen, på vilken våra förfäder regerade sedan urminnes tider. Japans civilisation och institutioner skiljer sig så mycket från andra länders att vi inte kan förvänta oss att nå det uttalade målet på en gång. Vår avsikt är att ur de olika institutioner som råder bland upplysta nationer välja ut de som bäst passar våra nuvarande förhållanden och anpassa dem genom gradvisa reformer och förbättringar av vår politik och våra seder, så att vi kan stå på jämställd fot med dem.”"
 meiji.2.a:0 "Imperiet[ROOT.GetCountry.GetAdjectiveNoFormatting] skall återuppstå."
 meiji.2.b:0 "Vi kommer att behöva mäktiga vänner, för vi kommer att skaffa oss mäktiga fiender."
 meiji.2.c:0 "Järnvägarna är nyckeln till vår framtida framgång."
 japan_military_reward:0 "Den japanska militärreformen"
 japan_diplomatic_reward:0 "Japanska ambassadörer"
 japan_production_reward:0 "Moderna japanska järnvägar"
 meiji.3.t:0 "Samurajernas fall"
 meiji.3.d:0 "[ROOT.GetCountry.GetName] har lyckats reformera försvarsmakten och sätta stopp för det föråldrade feodalsystemet. Krigarkasten[SCOPE.gsInterestGroup('samurai_ig').GetName] verkar inte längre ha någon plats i vårt samhälle som genomgår en moderniseringsprocess."
 meiji.3.f:0 "Shogunen åtnjöt daimyoernas lojalitet, vilka i sin tur förlitade sig på sina samurajer för att upprätthålla sin makt över de livegna bönderna. Detta utgjorde grunden för den japanska feodalismen – numera ett minne blott. Det finns fortfarande de som är trogna samurajernas ideal, de regler och dygder som kallas bushido, och det arvet kommer säkert att bestå. Men samurajerna har fallit, och vi kommer aldrig mer att få se deras like."
 meiji.3.a:0 "Låt dem behålla sin ställning som officerare och adelsmän."
 meiji.3.b:0 "Samurajernas era är över."
 samurai_rename.tt:0 "Intressegruppen Samurai kommer att omorganiseras till försvarsmakten"
 samurai_officers:0 "Samurai-officerare"
 meiji.4.t:0 "[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting] Militära konsulter"
 meiji.4.d:0 "Med tanke på  [ROOT.GetCountry.GetName]s moderniseringsinsatser har  erbjudit oss general[SCOPE.sCharacter('military_consultant_general').GetFullName]  s tjänster som militär rådgivare.[SCOPE.sCountry('military_consultant_country').GetName] Villkoren för detta avtal verkar fördelaktiga, men vi bör vara försiktiga med att sätta oss i skuld till utländska makter."
 meiji.4.f:0 "”Detta, sir, är en Gatling-kanon. Tvåhundra skott per minut. Det finns ingenting – varken människa, djur eller maskin – som kan stå emot den helvetiska kakofonin av ammunition som denna anordning kan släppa lös. Vi kommer att lära era soldater att hantera sådana maskiner, att upprätthålla modern militär disciplin och att lyda sina överordnade utan att ifrågasätta.”"
 meiji.4.a:0 "Vi tar gärna emot[SCOPE.sCountry('military_consultant_country').GetAdjectiveNoFormatting]hjälp."
 meiji.4.b:0 "Vi vill inte ha deras förgiftade bägare."
 western_military_consultant:0 "Western Military Consultants"
 meiji.5.t:0 "Ambassaden i [SCOPE.sCountry('japan_embassy_country').GetName]"
 meiji.5.d:0 "Som en del av en ambassadörsresa till väst har våra dignitärer träffat [SCOPE.sCharacter('japan_embassy_politician').GetFullName], en högt uppsatt[SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting]politiker. I syfte att etablera goda relationer med den nyligen öppnade[ROOT.GetCountry.GetAdjectiveNoFormatting]staten har de utarbetat flera fördrag som vi kanske vill ingå med [SCOPE.sCountry('japan_embassy_country').GetName]."
 meiji.5.f:0 "”Nuförtiden verkar alla nationer upprätthålla sina förbindelser i en anda av vänskap och hövlighet. Men detta är helt ytligt; bakom denna fasad döljer sig nämligen ömsesidigt förakt och en kamp om överhöghet. Även[ROOT.GetCountry.GetNameNoFormatting] om  nu må ha diplomatiska förbindelser med ett antal länder, bör dess vänskap med  staten[SCOPE.sCountry('japan_embassy_country').GetAdjectiveNoFormatting] vara den närmaste av alla, på grund av den uppriktiga respekt med vilken vi hyser för rätten till självstyre.”"
 meiji.5.a:0 "Upprätta starka diplomatiska förbindelser."
 meiji.5.b:0 "[SCOPE.sCountry('japan_embassy_country').GetName] har mycket att lära oss."
 meiji.5.c:0 "[SCOPE.sCountry('japan_embassy_country').GetName]Vi har ingenting att vinna på det."
 meiji.6.t:0 "[SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] Investeringar"
 meiji.6.d:0 "[SCOPE.sCharacter('western_investor_ig_leader').GetFullName], en förmögen och inflytelserik industrimagnat från [SCOPE.sCountry('western_investor_country').GetName], ser[ROOT.GetCountry.GetName]  som en lönsam och outnyttjad marknad. I utbyte mot olika politiska tjänster som ska utnyttjas vid en ännu inte fastställd tidpunkt är  villig att dela med sig av den industriella tekniken från[SCOPE.sCharacter('western_investor_ig_leader').GetHerHis]  hemland till oss.[SCOPE.sCharacter('western_investor_ig_leader').GetFullName]"
 meiji.6.f:0 "”Det finns kollegor bland mig som föraktar intresset för [ROOT.GetCountry.GetNameNoFormatting]landet och hävdar att bristen på värdefulla naturresurser gör det till en oattraktiv plats att bedriva affärsverksamhet på. Jag ser dock potentialen i detta land. Det som idag är urskogar och öde åkrar kommer i morgon att bli blomstrande stadscentrum, fyllda av den hälsosamma smogen från den moderna industrin.”"
 meiji.6.a:0 "[ROOT.GetCountry.GetName][SCOPE.sCountry('western_investor_country').GetAdjectiveNoFormatting] Uppfinningsrikedom ska ge kraft."
 meiji.6.b:0 "Vi behöver inte utländsk inblandning i vår ekonomi."
