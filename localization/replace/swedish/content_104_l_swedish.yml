 fascism_events.10.t:0 "Att hamna på efterkälken"
 fascism_events.10.d:0 "Rörelsens[GetIdeology('ideology_fascist').GetName] tidigare blixtsnabba framväxt verkar ha planat ut. Även om ideologin säkerligen kommer att bestå, kommer den att möta en mindre mottaglig allmänhet och en betydligt mer erfaren opposition."
 fascism_events.10.f:0 "Det fanns de som hade välkomnat den fascistiska rörelsens framväxt. Den kunde vara precis vad de önskade – laissez-faire, interventionistisk, paternalistisk, libertariansk, from, sekulär. Ingen av dem hade egentligen trott att dess ledare trodde på något annat än ett envist motstånd mot kommunisterna, och varje droppe blod som spilldes av en fascistisk batong var en droppe som de själva inte behövde spilla. \n\nKanske välkomnade de den fortfarande, med dess tusenåriga löften om rena gator och inga röda. Men nu var det för allvarligt, för välbekant – och det hade blivit för impopulärt. De som brydde sig om sin trovärdighet hade lärt sig att tiga och att, när det behövdes, framföra sina symboliska fördömanden av våldet. Det var en märklig avvikelse från det normala, sa de, en som hade spelat ut sin roll. Och det var allt det handlade om."
 fascism_events.10.a:0 "Äntligen!"
 fascism_events.10.b:0 "Det här är inte slutet."
 fascism_events.11.t:0 "Marschen mot [ROOT.GetCountry.GetCapital.GetCityHubName]"
 fascism_events.11.d:0 "[SCOPE.sCharacter('fascist_leader').GetFullName] har förklarat[SCOPE.sCharacter('fascist_leader').GetHerHis]sin avsikt att marschera mot [ROOT.GetCountry.GetCapital.GetCityHubName], i syfte att ta makten över [ROOT.GetCountry.GetName].[SCOPE.sCharacter('fascist_leader').GetHerHis|U]  Anhängarna samlas i stadens utkanter."
 fascism_events.11.f:0 "”Vi har inte för avsikt att ta makten genom bakdörren. Vi har inte för avsikt att ge upp vår mäktiga och idealiska födslorätt för en ynklig tallrik med ministerlinser. Antingen ger de oss regeringen, eller så tar vi den själva!”"
 fascism_events.11.a:0 "Bemyndiga[SCOPE.sCharacter('fascist_leader').GetHerHim]att bilda en regering."
 fascism_events.11.b:0 "Vi har all rätt att sätta stopp för denna kupp."
 fascism_events.11.c:0 "Nu räcker det! Se till att den här personen[SCOPE.sCharacter('fascist_leader').GetWomanMan]utvisas."
 existent_fascist_character_tt:0 "Den #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fascistiska#! rörelsen har en sak[concept_character]att samlas kring"
