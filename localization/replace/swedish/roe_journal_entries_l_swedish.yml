 je_twin_suns:0 "Rise of the Twin Suns"
 je_twin_suns_reason:0 "#lore [ROOT.GetCountry.GetRuler.GetFullName] is known by many names: war hero. Guerilla fighter. Prophet. Cynic. She led the revolution against the [concept_six_golden], second only to General-Turned-President [concept_nchyama]. But Nchamya is dead, his promised constitution never came, and the power vacuum was easy to fill. Now she is [concept_pibliyakimo], The Pure Dragon, and the prophetess of Akini for the mortal world.\n\nYet even upon her resplendent throne, she faces doubt. Conservative [Concept('concept_lightspeaker', '$concept_lightspeakers$')] claim Akini cannot manifest in a woman. In calmer times she could silence the whispers. But now people speak of a radiant [concept_perfect] wandering the jungles and mountains, a man who tames dinosaurs with a word and heals with a glance. They call him the messiah. Quietly, heads are being counted and lines are being drawn. When all is said and done, there shall be only one [concept_pibliyakimo].#!\n\nThe bar will progress based on which [Concept('concept_interest_group', '$concept_interest_groups$')] are in power. The progress bar will #bold gain#! points as the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] or the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] gain clout, and #bold lose#! points as the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] or the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] gain clout.\n\nIf Amanzi is no longer a [GetLawType('law_theocracy').GetName], the Journal Entry will end inconclusively."
 je_twin_suns_lobby:0 "#lore [ROOT.GetCountry.GetRuler.GetFullName] is known by many names: war hero. Guerilla fighter. Prophet. Cynic. She led the revolution against the [concept_six_golden], second only to General-Turned-President [concept_nchyama]. But Nchamya is dead, his promised constitution never came, and the power vacuum was easy to fill. Now she is [concept_pibliyakimo], The Pure Dragon, and the prophetess of Akini for the mortal world.\n\nYet even upon her resplendent throne, she faces doubt. Conservative [Concept('concept_lightspeaker', '$concept_lightspeakers$')] claim Akini cannot manifest in a woman. In calmer times she could silence the whispers. But now people speak of a radiant [concept_perfect] wandering the jungles and mountains, a man who tames dinosaurs with a word and heals with a glance. They call him the messiah. Quietly, heads are being counted and lines are being drawn. When all is said and done, there shall be only one [concept_pibliyakimo].#!\n\nThe bar will progress based on which [Concept('concept_interest_group', '$concept_interest_groups$')] are in power. The progress bar will #bold gain#! points as the [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] or the [GetInterestGroupVariant('ig_rural_folk',GetPlayer).GetName] gain clout, and #bold lose#! points as the [GetInterestGroupVariant('ig_landowners',GetPlayer).GetName] or the [GetInterestGroupVariant('ig_devout',GetPlayer).GetName] gain clout.\n\nIf Amanzi is no longer a [GetLawType('law_theocracy').GetName], the Journal Entry will end inconclusively."
