 salt_waste_narrative_events.8.t:0 "Unification of the Salt Wastes"
 salt_waste_narrative_events.8.d:0 "The cultures of [SCOPE.sCulture('unification_culture').GetName], [SCOPE.sCulture('unification_culture_2').GetName], and [SCOPE.sCulture('unification_culture_3').GetName] have been united within a single nation."
 salt_waste_narrative_events.8.f:0 "For centuries the peoples of the Salt Waste have been united only in suffering. Divided in three, much blood has been spilt by orcs and humans in this desolate wasteland. But no longer! We have entered into a new age of unprecedented political unity; it only remains to be seen if we will claim new glories or squander our chance."
 salt_waste_narrative_events.8.a:0 "Atam nim yammo wad! Together we face the future!"
 salt_waste_narrative_events.9.t:0 "A new capital for [ROOT.GetCountry.GetName]?"
 salt_waste_narrative_events.9.d:0 "A question has risen amongst the government ministers of [ROOT.GetCountry.GetName]; should we move our capital?"
 salt_waste_narrative_events.9.f:0 "The forming of our new nation gives us an unprecedented chance to move our seat of government. [SCOPE.sState('tinkuyuq_state').GetStateRegion.GetCityHubName], in [SCOPE.sState('tinkuyuq_state').GetStateRegion.GetName], has long been the cultural heart of the [SCOPE.sCulture('rahoru_culture').GetName]. [SCOPE.sState('bloodthorn_state').GetStateRegion.GetCityHubName], in [SCOPE.sState('bloodthorn_state').GetStateRegion.GetName], is the most prestigious city of the [SCOPE.sCulture('tqalt_culture').GetName]. And, in [SCOPE.sState('snailbane_state').GetStateRegion.GetName], [SCOPE.sState('snailbane_state').GetStateRegion.GetCityHubName] is the most sacred city of the [SCOPE.sCulture('waste_walker_culture').GetName]."
 salt_waste_narrative_events.9.n:0 "No, we will not move our capital."
 salt_waste_narrative_events.9.a:0 "We will move the government to [SCOPE.sState('tinkuyuq_state').GetStateRegion.GetCityHubName]"
 salt_waste_narrative_events.9.b:0 "Our new capital will be [SCOPE.sState('bloodthorn_state').GetStateRegion.GetCityHubName]"
 salt_waste_narrative_events.9.c:0 "The center of our administration will be [SCOPE.sState('snailbane_state').GetStateRegion.GetCityHubName]"
 je_atm_salt_crucible:0 "Rising Above the Wastes"
 je_atm_salt_crucible_reason:0 "For centuries we have lived on the thin edge of starvation; in our struggle we have become cunning survivors. But we no longer negotiate from a place of desperation, and it is time to secure our place in this world."
 je_atm_skarrakhlot:0 "Skarrakh's Command"
 je_atm_skarrakhlot_reason:0 "Skarrakh is dead, but his legacy lives on. His teachings have led us from victory to victory, and as he was a father to us we must now be a father to all orcs. We must strike out, prove our strength to all the world and grasp the dream of an orcish future."
 je_atm_vurzaratmoda:0 "Vurzara's Embrace"
 je_atm_vurzaratmoda_reason:0 "We have struggled, we have survived, and now we will be rewarded. Vurzara's teachings have allowed us to regain the glories of the past and we will build a society to make her proud."
