l_swedish:
 ideology_astra:0 "Consortium Baron"
 ideology_astra_desc:0 "A pragmatic believer in absolute corporate sovereignty, seeing the Consortium's ordered hierarchy and guild system as the most efficient path to progress. Considers neat, calculated control of society through economic power as the highest form of governance."
 ideology_romantic:0 "Romantic"
 ideology_romantic_desc:0 "A traditionalist who cherishes personal fealty and noble obligation over corporate bondage. Believes in the dignity of direct patronage and views the Consortium's systematic control as a cold perversion of proper hierarchical relationships."
 ideology_skeptic_leader:0 "Skeptic"
 ideology_skeptic_leader_desc:0 "#lore This leader believes that magic needs to treated with caution and care.#!"
 ideology_magoclast_leader:0 "Magoclast"
 ideology_magoclast_leader_desc:0 "#lore This leader believes that magic needs to be curbed and controlled.#!"
 ideology_epidemiologist:0 "Epidemiologist"
 ideology_epidemiologist_desc:0 "#lore This leader has a particular set of plans to try and stop the Dragonblight in its tracks.#!"
 ideology_druid:0 "Druid"
 ideology_druid_desc:0 "#lore This leader prioritizes balance with nature above all else.#!"
 ideology_magocrat:0 "Magocrat"
 ideology_magocrat_desc:0 "#lore This leader believes in a state run by the magically gifted.#!"
 ideology_despotic_magocrat:0 "Despotic Magocrat"
 ideology_despotic_magocrat_desc:0 "#lore This leader believes in a authoritarian state run by the magically gifted.#!"
 ideology_magocrat_movement:0 "Magocrat"
 ideology_magocrat_movement_desc:0 "#lore This leader believes in a state run by the magically gifted.#!"
 ideology_plutocrat:0 "Plutocrat"
 ideology_plutocrat_desc:0 "#lore This leader believes in a state run by the wealthy elite, where riches determine political power.#!"
 ideology_segregationist:0 "Segregationist"
 ideology_segregationist_desc:0 "#lore This leader believes in a particular racial order.#!"
 ideology_pro_magic:0 "Arcanophile"
 ideology_pro_magic_desc:0 "#lore This leader believes magic is required for a modern society.#!"
 ideology_pro_magic_movement:0 "Arcanophile"
 ideology_pro_magic_movement_desc:0 "#lore This group believes magic is required for a modern society.#!"
 ideology_anti_magic_movement:0 "Arcanophobe"
 ideology_anti_magic_movement_desc:0 "#lore This leader believes magic has no place in modern society.#!"
 ideology_artificer_baron:0 "Artificer Baron"
 ideology_artificer_baron_desc:0 "#lore This leader believes that the metaphorical mage hand of the free market should be the guiding force of the nation's economy.#!"
 ideology_magillismo:0 "Arcane Republican"
 ideology_magillismo_desc:0 "#lore This leader believes the republic is sacred— so long as it is upheld by its magical elite.#!"
 ideology_mad_scientist:0 "Chimerist"
 ideology_mad_scientist_desc:0 "#lore Chimerists pursue personal transcendence through alchemical transformation. Followers believe that the mortal form is merely a starting point, and that through the art of alchemy, they can fuse and enhance physical, mental, and spiritual aspects of their being to become a more perfect, multifaceted entity—like a chimera.#!"
 ideology_papal_moralist:0 "Akinite Moralist"
 ideology_papal_moralist_desc:0 "#lore This group has a strong devotion to maintaining both the temporal and ecclesiastical powers of the [concept_pibliyakimo].#!"
 ideology_ecumenical_traditionalist:0 "Ecumenical Traditionalist"
 ideology_ecumenical_traditionalist_desc:0 "#lore This leader believes in maintaining traditional customs, viewing them as an extension of natural laws. #!"
 ideology_integralist:0 "Integralist"
 ideology_integralist_desc:0 "#lore This leader supports traditional religious values in governance, but rejects conventional conservatism in favor of an organic nation that transcends ethnic grounds.#!"
 ideology_humanitarian:0 "Egalitarian"
 ideology_humanitarian_desc:0 "This character is an advocate for all races.  Every intelligent being should be guaranteed a set of inalienable and non-negotiable rights by the state."
 ideology_humanitarian_royalist_desc:0 "This character believes that the ideal form of society is a radically egalitarian nation ruled by an enlightened monarch."
 ideology_bandits:0 "Bandits"
 ideology_bandits_desc:0 "WIP"
 ideology_freeholder_technocrat:0 "Freeholder Technocrat"
 ideology_freeholder_technocrat_desc:0 "This character believes the strength of a nation comes from its working folk, guided by those who craft and tend the land. The Soulwrought are seen as loyal hands, built to serve their makers in the fields and workshops alike."
 ideology_noble_burdens_movement:0 "Romantic Traditionalist"
 ideology_noble_burdens_movement_desc:0 "#lore The landed nobility views protecting commoners from predatory guild contracts as their ancestral responsibility. While their motives may not be purely altruistic, they consider guild bondage an affront to proper noble-peasant relations and traditional social order.#!"
 ideology_anti_clerical_gnome:0 "Hasalian"
 ideology_anti_clerical_gnome_desc:0 "#lore This group opposes the influence of organized religion on the political and education system. They believe that rational minds should be at the forefront of governance.#!"
 ideology_lys_magoclast_leader:0 "Lyseian Magoclast"
 ideology_lys_magoclast_leader_desc:0 "#lore This group believes that magic must be banned from all aspects of society.#!"
 ideology_lys_magophile_leader:0 "Lyseian Magophile"
 ideology_lys_magophile_leader_desc:0 "#lore This group believes that magic should be in all aspects of society.#!"
 ideology_cartist:0 "Curatorial"
 ideology_cartist_desc:0 "#lore This group values continuity, refinement, and the steady hand of cultivated stewardship. They favor governance by an established circle of proven houses and appointed officials, believing statecraft to be a discipline entrusted to the prepared rather than granted by popular acclaim.#!"
