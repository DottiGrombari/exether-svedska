 je_purpur_wedding:0 "The Purpur Wedding"
 je_purpur_wedding_reason:0 "The dark elf nation of Yavira and the dwarven kingdom of Vozmead stand on the brink of a historic political union. Years of mutual reliance have led to this unprecedented alliance, combining Yavira's rich soils with Vozmead's unmatched craftsmanship. As leaders gather to seal the pact, the realm anticipates a new era of power and possibility. Will this union bring prosperity, or will their differences spark unforeseen strife? The future of both nations hangs in the balance."
 je_purpur_wedding_lobby:0 "The dark elf nation of Yavira and the dwarven kingdom of Vozmead stand on the brink of a historic political union. Years of mutual reliance have led to this unprecedented alliance, combining Yavira's rich soils with Vozmead's unmatched craftsmanship. As leaders gather to seal the pact, the realm anticipates a new era of power and possibility. Will this union bring prosperity, or will their differences spark unforeseen strife? The future of both nations hangs in the balance."
 je_purpur_wedding_status:0 "Assert our economic dominance before the wedding date."
 je_union_of_the_sands:0 "Union of the Sands"
 je_union_of_the_sands_status:0 "Resolve the gender equality issues that divide the union."
 je_union_of_the_sands_reason:0 "Yavira and the Vozmead Peaks have been joined in a sacred bond through the marriage of their monarchs. This union has brought our peoples closer than ever, forging an alliance of unmatched strength and unity. Yet, a profound challenge lies before us.\n\nThe matriarchal traditions of Drow and the patriarchal traditions of Dwarves now stand at a crossroads. To truly unite our nations, we must find common ground and resolve these differences."
