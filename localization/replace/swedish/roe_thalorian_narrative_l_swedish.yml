l_swedish:
 thalorian_agitators.1.t:0 "The Verdant Crusade"
 thalorian_agitators.1.d:0 "In this enlightened age some are questioning the violent bigotries of the past. A new collection of poems, with themes of understanding and universal forgiveness, has captivated the attention of the masses."
 thalorian_agitators.1.f:0 "And from every field did it grow,\nFood of the likes you and I cry in sight,\nNot beans, nor spuds, nor wheat from which to make dough,\nFor the farmhand's hoe is cast aside, and him in flight.\n...\nOur land is a garden, our spirit an endless field.\nEach drop of blood, a poison. Each act of hate, a weed.\nWhen winter comes, what shall we eat, when there is nought to yield?\n\n-- Maritica sna Vreigren"
 thalorian_agitators.1.a:0 "Our society will benefit from her influence."
 thalorian_agitators.1.b:0 "In the beauty of poetry, truth!"
 thalorian_agitators.1.c:0 "We want nothing to do with this naive upstart."
 thalorian_agitators.2.t:0 "The Emperor Returned?"
 thalorian_agitators.2.d:0 "A soulwrought in [SCOPE.sState('robot_norton_state_scope').GetName] is claiming to be the first emperor of Thaloria, returned."
 thalorian_agitators.2.f:0 "As every child in [ROOT.GetCountry.GetName] knows, [SCOPE.sCharacter('historic_agitator_scope').GetFullName] was the first emperor of the Divine Thalorian Dominion.\n\nWhether this soulwrought is actually him is impossible to prove. He seems to know a lot about the emperor's personal life, but we have no way to verify anything that isn't already public knowledge. His personality seems very different from what we can see in the historical record, but he claims to have changed in his afterlife.\n\nThe only thing we know for sure is that he's become a beloved mascot of [SCOPE.sState('robot_norton_state_scope').GetName]; only a handful of people actually believe him, but almost everyone there loves his eccentricity."
 thalorian_agitators.2.a:0 "He seems harmless enough. Welcome back, your majesty!"
 thalorian_agitators.2.b:0 "Get this fool out of here!"
 je_thalorian_soulwrought:0 "In Death, Acceptance?"
 je_thalorian_soulwrought_reason:0 "To the Thalorians the invention of the soulwrought was a world-historical crime, every new one forged in Ravik another ancestor stolen from the afterlife. It remains an open question whether the living and the dead can learn to live together."
 heartland_or_soulwrought_without_acceptance:0 "Thalorians view the soulwrought as abominations"
 je_thalorian_soulwrought_complete:0 "Society is accepting enouch of difference, for long enough, that understanding becomes widespread"
 thalorian_soulwrought_acceptance_abandoned:0 "Efforts to bridge the gap between Thalorians and Soulwrought are abandoned"
 thalorian_soulwrought_progress_bar:0 "Thalorian/Soulwrought Reconciliation"
 thalorian_soulwrought_progress_bar_desc:0 "Progress towards reconciliation"
 abandon_thalorian_soulwrought_acceptance_button:0 "Reject Reconciliation"
 abandon_thalorian_soulwrought_acceptance_button_desc:0 "Abandon all efforts to mend the rift between soulwroughts and humans"
 abandon_thalorian_soulwrought_acceptance_effect:0 "This will cause the journal entry to fail, permanently"
