 domains_window_flavor:0 "The #bold Outer Realms#! are distant, unknowable dimensions beyond the world of [concept_exether]. Though unreachable by physical means, their influence can be drawn into the world, granting powerful boons. These blessings can shape your nation’s military, economy, or culture in strange and transformative ways, each [Concept('concept_outer_realms', '$outer_plane$')] offering unique effects tied to its own otherworldly nature.\n\nTo access these realms, your nation must spend [concept_magic_reserves]. As #bold Arcana#! increases, you can maintain more blessings from the #bold Outer Realms#!. By picking at least #bold three#! blessings from the same realm, your nation can unlock additional bonuses, enhancing the benefits of your chosen realm."
