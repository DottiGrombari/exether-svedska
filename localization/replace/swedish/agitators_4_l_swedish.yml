 revolution_pulse_events.1.t:0 "Nationellt självförsvar"
 revolution_pulse_events.1.d:0 "I takt med att den[ROOT.GetCountry.GetAdjective] våldsamma stämningen [SCOPE.gsInterestGroup('self_defense_threat_ig').GetName]tilltar bland   har flera[SCOPE.sCulture('self_defense_threat_culture').GetName]  samhällen börjat bilda beväpnade miliser för att skydda sina invånare."
 revolution_pulse_events.1.f:0 "”De forntida[SCOPE.sCulture('self_defense_threat_culture').GetNameNoFormatting]hjältarnas själar, som vandrat omkring i kaosets värld, har äntligen funnit sin plats.”"
 revolution_pulse_events.1.a:0 "Myndigheterna har betydligt viktigare saker att tänka på."
 revolution_pulse_events.1.b:0 "De[SCOPE.sCulture('self_defense_threat_culture').GetName]har gått över gränsen och måste straffas."
 revolution_pulse_events.2.t:0 "Stokastisk terror"
 revolution_pulse_events.2.d:0 "Efter ett bombattentat som nyligen utfördes av en radikal anhängare av  i[SCOPE.gsInterestGroup('blatant_fedposting_ig').GetName] [SCOPE.sState('blatant_fedposting_state').GetName], har ett exemplar av  verk[SCOPE.sCharacter('fedposting_agitator').GetFullName] påträffats hos de ansvariga."
 revolution_pulse_events.2.f:0 "\"...och om den tragiska stunden slår till och vi måste underkasta oss den, kommer medvetenheten om detta att ge oss stöd och styrka. Vi säger inte bara \"nej\", utan förklarar oss ur djupet av våra hjärtan redo att offra allt.\" \n\n– Jean Jaurès"
 revolution_pulse_events.2.a:0 "De[SCOPE.gsInterestGroup('blatant_fedposting_ig').GetName]utgör ett hot mot det civila samhället."
 revolution_pulse_events.2.b:0 "Framhäv denna händelse som[SCOPE.sCharacter('fedposting_agitator').GetFullName]en uppmaning till terrorism mot oskyldiga."
 revolution_pulse_events.3.t:0 "Dubbel effekt"
 revolution_pulse_events.3.d:0 "Revolutionärerna[SCOPE.gsInterestGroup('dual_power_ig').GetName]har inrättat ett arbetar- och bondråd som konkurrerar med vår egen förvaltning i [SCOPE.sState('dual_power_state').GetName], och hävdar att de bättre representerar folkets vilja i regionen."
 revolution_pulse_events.3.d2:0 "De[SCOPE.gsInterestGroup('dual_power_ig').GetName]i [SCOPE.sState('dual_power_state').GetName], inspirerade av  ord,[SCOPE.sCharacter('dual_power_agitator').GetFullName]har inrättat ett arbetar- och bondråd som konkurrerar med vår egen förvaltning och hävdar att de bättre representerar folkets vilja i regionen."
 revolution_pulse_events.3.f:0 "”Man kan utan tvekan säga att regeringen[ROOT.GetCountry.GetAdjectiveNoFormatting] endast existerar så länge som folkrådet tillåter det.”"
 revolution_pulse_events.3.a:0 "Staten[ROOT.GetCountry.GetAdjective] har ensam behörighet över [SCOPE.sState('dual_power_state').GetName]!"
 revolution_pulse_events.3.b:0 "Befolkningen i[SCOPE.sState('dual_power_state').GetName]  har lärt sig att stå enade mot regeringens tyranni."
 revolution_pulse_events.3.c:0 "Ställ[SCOPE.sState('dual_power_state').GetName] det under militärens direkta kontroll."
 revolution_pulse_events.4.t:0 "De vanliga soldaterna"
 revolution_pulse_events.4.d:0 "De[GetPopType('soldiers').GetName]  hos[SCOPE.sBuilding('soldiers_council_building').GetName][SCOPE.sState('soldiers_council_state').GetName]    har börjat organisera sig i ett råd för att verka för högre löner och bättre villkor.  ser detta[SCOPE.gsInterestGroup('armed_forces_ig').GetName] som ett direkt hot mot sin legitimitet."
 revolution_pulse_events.4.f:0 "Han tog fram den handskrivna broschyren ur fickan på sin uniformströja och räckte den till sin kamrat. \n\n”Sergeanten och jag har pratat om den lön vi får – och jag vet att du känner likadant. Hur ska vi kunna sköta vårt jobb om generalerna slösar bort alla pengar vi har rätt till på sina fina vita hästar?”"
 revolution_pulse_events.4.a:0 "Sätt dem alla på plats och ta in ersättare från andra regioner."
 revolution_pulse_events.4.b:0 "Våra[GetPopType('soldiers').GetName]  bör kunna stå upp för sina egna intressen."
 revolution_pulse_events.5.t:0 "Självorganisering"
 revolution_pulse_events.5.d:0 "Personer med sympatier för revolutionen[SCOPE.sState('self_organization_state').GetName][SCOPE.gsInterestGroup('rural_folk_ig').GetName] bland  har börjat bilda bondråd för att motsätta sig  :s[SCOPE.gsInterestGroup('landowners_ig').GetName] makt i regionen."
 revolution_pulse_events.5.f:0 "”Jag vill tynga de rikas samvete med allt lidande och alla dolda, bittra tårar.” \n\n– Rosa Luxemburg"
 revolution_pulse_events.5.a:0 "De[SCOPE.gsInterestGroup('rural_folk_ig').GetName]  måste lära sig att hålla sig på sin plats."
 revolution_pulse_events.5.b:0 "De[SCOPE.gsInterestGroup('landowners_ig').GetName]måste göra eftergifter för att upprätthålla freden."
 revolution_pulse_events.6.t:0 "Slagskeppets flykt [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName]"
 revolution_pulse_events.6.d:0 "Besättningen på slagskeppet#bold [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName]#! , som tidigare var stationerad vid[SCOPE.sBuilding('potemkin_naval_administration').GetName]  i [SCOPE.sState('potemkin_state').GetName], har gjort uppror och flytt med sitt fartyg till [SCOPE.sCountry('potemkin_final_destination').GetName]. Regeringen i[SCOPE.sCountry('potemkin_final_destination').GetName]  har vägrat att utlämna sjömännen."
 revolution_pulse_events.6.f:0 "Det stora stålfartyget ångade in i hamnen, inte under sin egen[ROOT.GetCountry.GetAdjectiveNoFormatting]flagga utan under den från [SCOPE.sCountry('potemkin_final_destination').GetNameNoFormatting]. Sjömännen på däck jublade medan de gjorde sig redo att fly in i den nya hemstadens inre, äntligen befriade från fasorna med maskarfyllda ransoner och rostiga kojer.\n\nOch när de fattiga invånarna i[SCOPE.sState('potemkin_state').GetNameNoFormatting]  såg förföljarfartygen inleda jakten på [SCOPE.sState('ship_name_state').GetStateRegion.GetCityHubName], slog en tanke dem: \n\n”Vi kommer inte att glömma!”"
 revolution_pulse_events.6.a:0 "Förhandla med regeringen[SCOPE.sCountry('potemkin_final_destination').GetAdjective] för att återfå fartyget."
 revolution_pulse_events.6.b:0 "Staten[SCOPE.sCountry('potemkin_final_destination').GetAdjective] samarbetar med förrädarna!"
 revolution_pulse_events.7.t:0 "Demonstrationsmarschen"
 revolution_pulse_events.7.d:0 "[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle]En grupp demonstranter som företräder [SCOPE.gsInterestGroup('petition_march_ig').GetName], ledda av [SCOPE.sCharacter('petition_march_leader').GetFullName], har genomfört en demonstration vid den för närvarande tomma bostaden i [SCOPE.sState('petition_march_state').GetStateRegion.GetCityHubName]. De vägrar att lämna bostaden tills  går[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle]med på att träffa dem."
 revolution_pulse_events.7.f:0 "”Ers Majestät, detta är vad vi står inför och detta är anledningen till att vi har samlats framför murarna till Ert palats. \nHär söker vi vår sista räddning.\nVägra inte att komma ert folk till undsättning; led det ut ur fattigdomens, okunnighetens och rättslöshetens grav; ge det möjligheten att bestämma över sitt eget öde och befria det från byråkraternas outhärdliga ok.”"
 revolution_pulse_events.7.a:0 "Skicka en representant från kungafamiljen för att blidka dem."
 revolution_pulse_events.7.b:0 "[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle]Avvärj detta uppenbara hot mot hans liv med våld!"
 revolution_pulse_events.7.c:0 "De[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle]ska stiga på ett snabbtåg till [SCOPE.sState('petition_march_state').GetStateRegion.GetCityHubName]."
 revolution_pulse_events.8.t:0 "Folkets förmögenhet"
 revolution_pulse_events.8.d:0 "En grupp revolutionärer har genomfört ett rån mot en[ROOT.GetCountry.GetAdjective]statlig bank i [SCOPE.sState('revolutionary_robbery_state').GetName]. En betydande summa pengar har stulits och förts över till revolutionärernas kassa."
 revolution_pulse_events.8.f:0 "Ett skott avfyrades, och det marmorbelagda taket fick en ny spricka. Bankpersonalens skrik blandades med damm och splitter som slog mot golvet. \n\n”I den revolutionära verkställande kommitténs namn förklarar jag att alla är arresterade! Upp med händerna! Annars kommer alla att dödas!”"
 revolution_pulse_events.8.a:0 "Man har infört skärpta säkerhetsåtgärder kring banker över hela [ROOT.GetCountry.GetName]."
 revolution_pulse_events.8.b:0 "Lita på att lokalbefolkningen anmäler de som misstänks för rånet."
 revolution_pulse_events.8.c:0 "Skicka ut[SCOPE.sLaw('secret_police_law').GetName]  för att gripa dessa brottslingar."
 revolution_pulse_events.9.t:0 "Dold agitation"
 revolution_pulse_events.9.d:0 "[SCOPE.sBuilding('agitation_af_building').GetName]Revolutionära sympatisörer har börjat bedriva agitation för regeringsfientliga sakfrågor i  i [SCOPE.sState('agitation_af_state').GetName]."
 revolution_pulse_events.9.d2:0 "[SCOPE.sBuilding('agitation_af_building').GetName]Revolutionära sympatisörer har börjat sprida flygblad som[SCOPE.sCharacter('agitation_af_agitator').GetFullName] innehåller uppmaningar till revolutionära åtgärder i  i [SCOPE.sState('agitation_af_state').GetName]."
 revolution_pulse_events.9.f:0 "”Staten har förverkat varje rätt den har att beordra att ditt blod ska spillas – det måste du inse. Även bortom [SCOPE.sState('agitation_af_state').GetNameNoFormatting]det organiserar sig människor som du och jag för att kräva ett slut på denna mardröm.” \n\n”Och det börjar med dig och mig! Vi vanliga soldater, de som de litar på att utföra deras vilja… vad kommer att hända när de äntligen inser att ingen står bakom dem?”"
 revolution_pulse_events.9.a:0 "De[SCOPE.gsInterestGroup('armed_forces_ig').GetName]  måste framför allt vara lojala mot staten."
 revolution_pulse_events.9.b:0 "Den som styr soldaterna styr nationen."
 revolution_pulse_events.10.t:0 "Reformer under vapenhot"
 revolution_pulse_events.10.d:0 "[SCOPE.sCharacter('reforms_at_gunpoint_ruler').GetFullName]Medan den revolutionära stämningen kokar över hela landet har[SCOPE.sCharacter('reforms_at_gunpoint_ruler').GetPrimaryRoleTitle]  :s rådgivare i[SCOPE.gsInterestGroup('reforms_at_gunpoint_ig').GetName]  rekommenderat ett reformpaket för att blidka revolutionärerna."
 revolution_pulse_events.10.f:0 "”Situationen är allvarlig. Huvudstaden befinner sig i ett tillstånd av anarki. Regeringen är handlingsförlamad. Transportväsendet och försörjningen av livsmedel och bränsle har helt brutits samman. Det allmänna missnöjet växer … Det får inte bli någon fördröjning. Varje förhalning är liktydigt med döden.” \n\n– Michail Rodzianko"
 revolution_pulse_events.10.a:0 "Detta förslag ska skydda[ROOT.GetCountry.GetNameNoFormatting]  från radikalisternas härjningar."
 revolution_pulse_events.10.b:0 "De[SCOPE.gsInterestGroup('reforms_at_gunpoint_ig').GetName]kommer att utgöra vårt starkaste skydd mot revolutionen."
 revolution_pulse_events.10.c:0 "Revolutionärerna kan inte stillas – de måste krossas."
 revolution_pulse_events.11.t:0 "Trenchokrati"
 revolution_pulse_events.11.d:0 "[SCOPE.gsInterestGroup('armed_forces_ig').GetName]Desillusionerade medlemmar av  har börjat skriva dikter och berättelser till ära för den kamratskap som upplevdes under det senaste kriget mot [SCOPE.sCountry('most_recent_opponent_scope').GetName]. De framhåller denna gemensamma stridsanda som en lösning på den nuvarande sociala oron."
 revolution_pulse_events.11.f:0 "”Den brutala och blodiga läroperioden i skyttegravarna kommer att leda till något. Den kommer att leda till större mod, större tro och större uthållighet.” \n\n– Benito Mussolini"
 revolution_pulse_events.11.a:0 "Det är den här inställningen vi behöver för att möta våra fiender."
 revolution_pulse_events.11.b:0 "Inget annat än vanvettiga uttalanden från människor som drivits till vansinne av kriget."
 revolution_pulse_events.12.t:0 "Den gula internationella"
 revolution_pulse_events.12.d:0 "[SCOPE.sCharacter('communist_agitator_scope').GetFullName]Trots den revolutionära agitationen inom  finns det[SCOPE.gsInterestGroup('trade_union_ig').GetName]fortfarande vissa ledare inom  som hyser starka reformistiska sympatier. Att hjälpa dem att ta kontroll över  kommer att[SCOPE.gsInterestGroup('trade_union_ig').GetName] bidra till att bekämpa revolutionärerna."
 revolution_pulse_events.12.f:0 "”Inget högt utvecklat proletariat kommer att acceptera en diktatur – hur proletär den än må vara – som ett medel för frigörelse.” \n\n– Karl Kautsky"
 revolution_pulse_events.12.a:0 "Det är bättre att våra fiender strävar efter reformer än efter revolution."
 revolution_pulse_events.12.a1:0 "En[SCOPE.gsInterestGroup('trade_union_ig').GetLeader.GetIdeology.GetName]ledare kommer att utses till chef för [SCOPE.gsInterestGroup('trade_union_ig').GetName]."
 revolution_pulse_events.12.b:0 "En socialist är en socialist, oavsett hur välkomnande hen än försöker framstå."
 revolution_pulse_events.13.t:0 "Gratis hjälp"
 revolution_pulse_events.13.d:0 "[SCOPE.gsInterestGroup('attacked_ig').GetName]I takt med att missnöjet bland  ökar har  medlemmar i[SCOPE.sState('attacked_state').GetName]  som inte[SCOPE.gsInterestGroup('paramil_ig').GetName] bär uniform bildat avdelningar för att direkt slå ner revolutionärerna."
 revolution_pulse_events.13.f:0 "Tidningen låg på bordet som en död fågel, med ett av hörnen genomblött av utspillt kaffe. ”Massorna får inte sitta tysta en minut till…”, stod det med fet svart tryckfärg på förstasidan, ”…alla principfasta arbetare måste visa sitt stöd i dag…”\n\nLäsaren reste sig ur stolen och vände sig mot dörren, innan han sträckte sig efter den hemmagjorda batongen som låg bredvid tidningen."
 revolution_pulse_events.13.a:0 "Möjligheten att förneka på ett trovärdigt sätt är uppskattad i dessa svåra tider."
 revolution_pulse_events.13.b:0 "Vägled dem så att de inser[SCOPE.sCharacter('communist_revolutionary_scope').GetFullName]att deras[SCOPE.sCharacter('communist_revolutionary_scope').GetHerHis]vägar är felaktiga."
 revolution_pulse_events.13.c:0 "Det är enbart staten som har befogenhet att använda tvångsmedel mot sina fiender."
 revolution_pulse_events.14.t:0 "Folkets[ROOT.GetCountry.GetAdjectiveNoFlag] union"
 revolution_pulse_events.14.d:0 "De senaste oroligheterna i[ROOT.GetCountry.GetName]  har lett till att en grupp medborgare i[SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName]  har bildat en nationalistisk organisation som har som mål att försvara nationen och  mot revolutionär verksamhet[SCOPE.sCharacter('nation_ruler').GetPrimaryRoleTitle]."
 revolution_pulse_events.14.f:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]Talarnas ord strömmade ut ur hans mun som en eldström och uttryckte de skarpaste fördömandena mot de röda, mot fienderna till [ROOT.GetCountry.GetNameNoFormatting], mot de folk som de svartklädda männen vid flaggstången – med revärerna prydda av vördnadsfulla symboler – ansåg \n\nvara ovärdiga.””Och hur ska ni visa att ni stod på de[SCOPE.sCharacter('nation_ruler').GetPrimaryRoleTitle]rättfärdigas sida, mot den smutsiga strömmen?” \n\nStenhårda ögon borrade sig in i folkmassan, på jakt efter den första åskådaren som skulle fly."
 revolution_pulse_events.14.a:0 "Folket[ROOT.GetCountry.GetAdjectiveNoFlag] har tagit ställning mot revolutionen."
 revolution_pulse_events.14.b:0 "Vi bryr oss inte om den här demagogens bedrägeri."
 revolution_pulse_events.15.t:0 "Att satsa helhjärtat"
 revolution_pulse_events.15.d:0 "[SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName]Eftersom de revolutionära aktiviteterna tycks ha eskalerat ytterligare de senaste dagarna finns det en möjlighet för regeringen att närma sig [SCOPE.sCharacter('reactionary_agitator').GetFullName]den nationalistiska rörelsen och i ännu högre grad välkomna[SCOPE.sCharacter('reactionary_agitator').GetHerHis]dess inflytande över ."
 revolution_pulse_events.15.f:0 "”Detta möte behöver inte vara ett möte mellan motståndare, utan snarare mellan människor vars kärlek till[ROOT.GetCountry.GetNameNoFormatting]  sträcker sig bortom alla jordiska gränser. Även om vi har olika visioner hoppas jag att ni kan inse att det som hotar vårt land hotar oss alla...”"
 revolution_pulse_events.15.a:0 "Med hjälp av[SCOPE.sCharacter('reactionary_agitator').GetHerHis]stöd kommer vi att begrava revolutionen."
 revolution_pulse_events.15.b:0 "Vi behöver inte hjälp av uppviglare."
 revolution_pulse_events.16.t:0 "Innovation och lojalitet"
 revolution_pulse_events.16.d:0 "Bland revolutionärernas motståndare har olika tankeströmningar kommit till ytan när det gäller rörelsens framtid. Radikala krafter inom rörelsen[SCOPE.gsInterestGroup('reactionary_agitator_ig').GetName]har börjat kräva att en ny totalitär nationalistisk regering inrättas för att försvara landet mot det kommunistiska hotet."
 revolution_pulse_events.16.f:0 "”På två veckor kan tidningarna hetsa upp de fårliknande massorna i vilket land som helst till ett sådant tillstånd av upprörd raseri att människor är beredda att ta på sig uniformer och döda och bli dödade, allt för att tjäna de smutsiga syftena hos ett fåtal intressenter.” \n\n– Albert Einstein"
 revolution_pulse_events.16.a:0 "Landets beskyddare måste anta en ny form."
 revolution_pulse_events.16.b:0 "Dessa idéer är helt enkelt ännu en modernistisk avvikelse."
 revolution_pulse_events.17.t:0 "Ett monster av möjligheter"
 revolution_pulse_events.17.d:0 "Genom att lägga skulden på folket[SCOPE.sCulture('pogrom_culture').GetName] för den rådande revolutionära oron har anhängare inom[SCOPE.sCharacter('reactionary_agitator').GetFullName] gruppen[SCOPE.gsInterestGroup('pogrom_ig').GetName] genomfört omfattande våldshandlingar mot befolkningen[SCOPE.sCulture('pogrom_culture').GetName] i[SCOPE.sState('pogrom_state').GetName]och dess angränsande regioner."
 revolution_pulse_events.17.f:0 "”Vilken sorts odjur skapar uppror bland vanliga medborgare genom att använda rädsla som lockbete? I den verkliga världen var det inte sådana egenskaper som kännetecknade monster. Det var egenskaper hos människor som strävade efter makt.”"
 revolution_pulse_events.17.a:0 "Denna[SCOPE.sCulture('pogrom_culture').GetName]kultur utgör faktiskt ett hot mot [ROOT.GetCountry.GetName]."
 revolution_pulse_events.17.b:0 "Dessa laglösa handlingar har passerat gränsen för vad som är meningsfullt."
 revolution_pulse_events.18.t:0 "Fiendens vapen"
 revolution_pulse_events.18.d:0 "I[SCOPE.sCharacter('fascist_agitator').GetFullName] takt med att den nationalistiska rörelsen vinner mark har före detta socialister, som blivit desillusionerade av de ”antinationalistiska” tendenserna inom ,[SCOPE.gsInterestGroup('internationalist_ig').GetName]börjat ansluta sig till den nationalistiska saken. Fascismens värderingar har blivit allt mer förankrade bland kontrarevolutionärerna i [ROOT.GetCountry.GetName]."
 revolution_pulse_events.18.f:0 "”Statens rättigheter uttrycker individens sanna väsen. Och om friheten ska vara ett kännetecken för levande människor och inte för abstrakta marionetter som uppfunnits av den individualistiska liberalismen, då står fascismen för friheten – och för den enda frihet som är värd att ha: statens frihet och individens frihet inom staten. Den fascistiska statsuppfattningen är allomfattande; utanför den kan inga mänskliga eller andliga värden existera, än mindre ha något värde.” \n\n– Benito Mussolini"
 revolution_pulse_events.18.a:0 "Fascisterna går att kontrollera. Socialisterna går inte att kontrollera."
 revolution_pulse_events.18.b:0 "Fascismen är framtiden för [ROOT.GetCountry.GetName]."
 revolution_pulse_events.19.t:0 "Modernitetens metoder"
 revolution_pulse_events.19.d:0 "[SCOPE.sCharacter('fascist_regime_agitator').GetFullName] och en grupp anhängare[SCOPE.sCharacter('fascist_regime_agitator').GetHerHis] bland  har genomfört en demonstration i [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName], där de[SCOPE.gsInterestGroup('fascist_agitator_ig').GetName] krävde att få en ledande position i regeringen."
 revolution_pulse_events.19.d2:0 "[SCOPE.gsInterestGroup('fascist_agitator_ig').GetName][SCOPE.sCharacter('fascist_regime_leader').GetFullName] har hållit ett tal inför den samlade[ROOT.GetCountry.GetAdjective]regeringen med stöd av[SCOPE.sCharacter('fascist_regime_agitator').GetFullName]  och , där man kräver att få en ledande roll i regeringen."
 revolution_pulse_events.19.f:0 "”Politikerna och kapitalisterna hävdar att de kan se till att denna kris lugnar ner sig och att[ROOT.GetCountry.GetAdjectiveNoFormatting]nationen kan räddas från socialismens gissel. I bästa fall är de naiva idealister. I värsta fall är de inte bättre än de röda själva. Endast ett omedelbart återupprättande av nationens styrka kan rädda oss[ROOT.GetCountry.GetNameNoFormatting]i denna farliga stund...”"
 revolution_pulse_events.19.a:0 "Hyllas vare [SCOPE.sCharacter('fascist_regime_leader').GetFullName], nationens sanna hjälte!"
 revolution_pulse_events.19.a2:0 "[SCOPE.sCharacter('fascist_regime_agitator').GetFullName]Hyllas vare , folkets främste!"
 revolution_pulse_events.19.b:0 "Kasta ut dessa uppkomlingar från gatorna i [SCOPE.sState('capital_scope').GetStateRegion.GetCityHubName]!"
 revolution_pulse_events.20.t:0 "Det förflutnas ideal"
 revolution_pulse_events.20.d:0 "För att förhindra en revolution har  lämnat in en petition till  med[SCOPE.sCharacter('petition_march_ruler').GetPrimaryRoleTitle]krav på att återinföra det autokratiska styret.[SCOPE.sCharacter('reactionary_regime_ig_leader').GetFullName] De församlade[SCOPE.gsInterestGroup('reactionary_regime_ig').GetName]  har redan uttryckt sitt stöd för dessa nödåtgärder."
 revolution_pulse_events.20.f:0 "”Vad är grunden till [ROOT.GetCountry.GetNameNoFormatting]’s storhet? Det är våra tidigare ledares vilja att fatta svåra beslut och ta ansvar i svåra tider.”\n\n[SCOPE.sCharacter('reactionary_regime_ig_leader').GetLastNameNoFormatting] Han sträckte ut[SCOPE.sCharacter('reactionary_regime_ig_leader').GetHerHis]handen mot fönstret och pekade på rökmolnen i fjärran. \n\n”Den andan har tillfälligt försvagats. Men den kan återupplivas...”"
 revolution_pulse_events.20.a:0 "[SCOPE.sCharacter('reactionary_regime_ig_leader').GetFullName] kommer att bli vår nations frälsare."
 revolution_pulse_events.20.b:0 "Det här förslaget kommer att göra mer skada än nytta."
 revolution_pulse_events.21.t:0 "Det ädla blodets utgjutelse"
 revolution_pulse_events.21.d:0 "En lägre adelsman[ROOT.GetCountry.GetAdjectiveNoFormatting] har mördats av revolutionära styrkor på sin herrgård i [SCOPE.sState('assassination_state').GetName]. De överlevande familjemedlemmarna kräver hämnd."
 revolution_pulse_events.21.f:0 "Det hördes ett skott, ett skrik, och sedan blev allt tyst, bortsett från den förtvivlade kvinnans snyftningar som strax därefter hördes från salongen."
 revolution_pulse_events.21.a:0 "Vi får inte låta denna terror avleda vår uppmärksamhet."
 revolution_pulse_events.21.b:0 "Utlysa nationell sorg."
 revolution_pulse_events.22.t:0 "Minister tagen som gisslan"
 revolution_pulse_events.22.d:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]En av regeringens betrodda ministrar, [SCOPE.sCharacter('hostage_char').GetFullName], har kidnappats av rebeller och förts bort till en hemlig plats. Rebellerna har hotat att[SCOPE.sCharacter('hostage_char').GetLastName]  kommer att avrättas om regeringen inte betalar en lösensumma."
 revolution_pulse_events.22.f:0 "FÖRSTÅ DETTA:  [SCOPE.sCharacter('hostage_char').GetFirstNameNoFormatting]s liv ligger enbart i dina händer. Om[SCOPE.sCharacter('hostage_char').GetSheHe]  ska dö,[SCOPE.sCharacter('hostage_char').GetHerHis] kommer  blod att vila enbart på dina händer, tillsammans med blodet från så många andra av folket i [ROOT.GetCountry.GetNameNoFormatting].\n\nDu har fyrtioåtta timmar på dig från det att detta brev har överlämnats för att ge oss de nödvändiga eftergifterna. Om du inte gör det kan vi inte garantera ministerns säkerhet."
 revolution_pulse_events.22.a:0 "Vi måste betala den lösensumma som de kräver."
 revolution_pulse_events.22.b:0 "[SCOPE.sCharacter('hostage_char').GetFullName]Om de vill bli martyrer, så må det vara så."
 revolution_pulse_events.22.c:0 "[SCOPE.sCharacter('hostage_char').GetHerHim]Skicka ut armén för att rädda ."
 revolution_pulse_events.23.t:0 "Tårar från elfenbenstornet"
 revolution_pulse_events.23.d:0 "En utredning av händelserna[SCOPE.sBuilding('university_terror_building').GetName]vid[SCOPE.sState('university_terror_state').GetName]  har avslöjat trovärdiga bevis på revolutionär verksamhet bland studenterna, med stöd och medverkan från åtminstone en del av lärarkåren."
 revolution_pulse_events.23.f:0 "”Den skuld vi bär är oändligt gammal – den som tillhör folkets förtryckare. Det är vår plikt att gottgöra detta genom att ägna hela våra liv, varje handling vi utför, åt att stärka bönderna...\"Här, i den här källaren, \n\nuttrycktes professorernas åsikter mer öppet, tänkte den unge studenten, men de var inte mer omstörtande än de alltid hade varit."
 revolution_pulse_events.23.a:0 "Stäng universitetet och gripa lärarkåren."
 revolution_pulse_events.23.b:0 "Det finns inga bevis för dessa anklagelser."
 revolution_pulse_events.24.t:0 "Mordförsök på [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
 revolution_pulse_events.24.d:0 "[SCOPE.sState('capital_scope').GetCityHubName]Vid ett evenemang för att fira invigningen av en prydnadsträdgård i  sprängde en revolutionär en sprängladdning nära [ROOT.GetCountry.GetRuler.GetFullName].  överlevde, men attentatsmannen avled av sina skador innan han[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] hann vittna."
 revolution_pulse_events.24.f:0 "[ROOT.GetCountry.GetNameNoFormatting]Så fort bomben detonerade och explosionen skakade luften kastade sig folkmassan redan över den blivande mördaren, utan att bry sig om sina egna skador, och övermannade honom medan de slog honom med sina väskor och knytnävar. \n\n”Folk! Jag gjorde det för er!”, ropade mördaren, men det hjälpte inte."
 revolution_pulse_events.24.a:0 "Hämnd över alla förrädare och mördare!"
 revolution_pulse_events.24.b:0 "Vi vet exakt vem som ligger bakom det här, och exakt vem som måste dö."
 revolution_pulse_events.25.t:0 "Borta på ett ögonblick"
 revolution_pulse_events.25.d:0 "Medan[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  [ROOT.GetCountry.GetRuler.GetFullName]färdades i en vagn mellan[SCOPE.sState('capital_scope').GetCityHubName]  och en av[ROOT.GetCountry.GetRuler.GetHerHis]  sina lantgårdar kastade sig en revolutionär framför vagnen med en aktiv granat, vilket ledde till att både  och han[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] själv omkom."
 revolution_pulse_events.25.f:0 "Sedan, som i en dröm, i en dimma, tyckte jag mig se en ung man av liten växt som skyndade sig att lämna trottoaren och springa ut på gatan mot monarkens vagn, och han kastade sig mot den, varefter det hördes en öronbedövande explosion. Så snart smällen ekade föll monarken, de officerare som omgav honom och åskådarna på trottoaren i närheten – alla på en gång – och ett moln av vit rök skymde dem alla."
 revolution_pulse_events.25.a:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]Strö mördarens aska i en flod och sörj vår älskade."
 revolution_pulse_events.25.b:0 "[SCOPE.sCharacter('heir_scope').GetFullName] kommer att hämnas på[SCOPE.sCharacter('heir_scope').GetHerHis] [SCOPE.GetRootScope.GetCountry.GetCustom('mother_father')] s mördare."
 custom_father:0 "far"
 custom_mother:0 "mor"
 revolution_pulse_events.26.t:0 "Uppvigling bland [SCOPE.gsInterestGroup('devout_ig').GetName]"
 revolution_pulse_events.26.d:0 "Det[SCOPE.gsInterestGroup('devout_ig').GetName]har visat sig att framstående medlemmar av  utnyttjar sin privilegierade ställning i samhället för att uppmuntra radikala regeringsfientliga aktiviteter."
 revolution_pulse_events.26.f:0 "”är uppdelat i två oförsonliga läger”[ROOT.GetCountry.GetNameNoFormatting], sade prästen. ”Det ena bedriver en politik präglad[ROOT.GetCountry.GetAdjectiveNoFormatting] av antireligiös terror! Det andra läger bedriver en politik präglad av respekt för [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]religionen och strävar efter att återupprätta den nationella ordningen. Med detta i åtanke… vem annars skulle en godhjärtad människa kunna ställa sig bakom?”"
 revolution_pulse_events.26.a:0 "De är inte heliga, så länge de fortsätter att lägga sig i politiken."
 revolution_pulse_events.26.b:0 "Vi får inte bli kända som prästers bödelar."
 revolution_pulse_events.27.t:0 "Revolutionär dödläge i [SCOPE.sState('standoff_state').GetName]"
 revolution_pulse_events.27.d:0 "En grupp militanta i[SCOPE.sState('standoff_state').GetName]  har barrikaderat sig i en kyrka, utrustade med ett förråd av ammunition och skjutvapen. De har öppnat eld mot all regeringspersonal som försökt ta kontroll över byggnaden."
 revolution_pulse_events.27.f:0 "Kyrkans träverk var märkt av kulhål, men dess ekdörrar stod fortfarande orubbliga. Sammanflätade lik låg på gatan utanför, där de hade fått ta emot den första skur av skott. Från varje fönster flammade skottlossningen, vilket tvingade poliser och soldater att sänka huvudet under barrikaderna. En man i uniform vände sig mot en annan, i jakt på en lösning på situationen."
 revolution_pulse_events.27.a:0 "Gör ett exempel av dem – beskjut byggnaden."
 revolution_pulse_events.27.b:0 "Skicka en förhandlare för att träffa en överenskommelse med ockupanterna."
 revolution_pulse_events.28.t:0 "Den feminina orden av [SCOPE.sState('feminine_brigades_state').GetName]"
 revolution_pulse_events.28.d:0 "En grupp kvinnor med anknytning till[SCOPE.gsInterestGroup('devout_ig').GetName]  i[SCOPE.sState('feminine_brigades_state').GetName]  har grundat en organisation med syftet att ordna medicinskt och materiellt stöd till regeringsfientliga revolutionärer."
 revolution_pulse_events.28.f:0 "[ROOT.GetCountry.GetRuler.GetLastNameNoFormatting]”Den hatfulle tyrannen har ingen makt i våra tempel och ingen plats vid vår guds sida!”, sade den beslöjade kvinnan på talarstolen. \n\n”Vi erkänner inte människans lagar, ty de är lika felbara som de människor som skapar dem!”"
 revolution_pulse_events.28.a:0 "Vi har inte råd att göra kvinnor till martyrer."
 revolution_pulse_events.28.b:0 "Slå hårt mot kvinnliga religiösa organisationer."
 revolution_pulse_events.29.t:0 "Brott och gudomlighet"
 revolution_pulse_events.29.d:0 "De reaktionära tendenserna hos många[GetPopType('clergymen').GetName]som är anslutna till[SCOPE.gsInterestGroup('devout_ig').GetName]  har gett upphov till krav på att begränsa det politiska inflytandet från[ROOT.GetCountry.GetAdjective]  religiösa organisationer."
 revolution_pulse_events.29.f:0 "”Jag har tydligt uttryckt min åsikt i denna fråga. Inget av klostren i[SCOPE.sState('capital_scope').GetCityHubName]  är värt livet på en enda[ROOT.GetCountry.GetAdjectiveNoFormatting]  medborgare.”"
 revolution_pulse_events.29.a:0 "De är heliga män och kvinnor, och de kan säga vad de vill."
 revolution_pulse_events.29.b:0 "Bultar fast deras tempel och griper de präster som gör motstånd."
 revolution_pulse_events.29.c:0 "Den rättskaffens nationen når man bäst genom den revolutionära vägen."
 revolution_pulse_events.30.t:0 "Arbetarbrigaderna[SCOPE.sState('workers_brigade_state').GetName]"
 revolution_pulse_events.30.d:0 "[SCOPE.gsInterestGroup('workers_militia_ig').GetName]Beväpnade arbetare som tillhör de progressiva fraktionerna har frivilligt erbjudit sig att bistå regeringsstyrkorna i kampen mot reaktionära krafter som skulle kunna utgöra ett hot mot [ROOT.GetCountry.GetName]."
 revolution_pulse_events.30.f:0 "En efter en tog de upp vapnet, far och son, och se, under en solfri himmel vänds ännu ett blad i historien, medan ännu mer blod flyter."
 revolution_pulse_events.30.a:0 "Vi kommer att behöva allt stöd vi kan få."
 revolution_pulse_events.30.b:0 "Kräv att denna organisation omedelbart avväpnar sig."
 revolution_pulse_events.31.t:0 "Undantagstillstånd"
 revolution_pulse_events.31.d:0 "Massiva uppror inom[SCOPE.sState('martial_laws_state').GetName]  under  [SCOPE.sCharacter('armed_forces_ig_leader').GetFullName]:s ledning[SCOPE.gsInterestGroup('armed_forces_ig').GetName] har lett till att officerare har gått ut på gatorna för att kräva en ny regering."
 revolution_pulse_events.31.f:0 "Det som började med ett fåtal missnöjda försörjningsofficerare och svågrar till överstar har spridit sig genom hela trupperna. Oavsett om de tvingats av sina ledare eller är frivilliga medbrottslingar har hela brigader anslutit sig till myteriet. Deras edar ligger nedtrampade i leran tillsammans med alla som står i deras väg."
 revolution_pulse_events.31.a:0 "Grip förrädarna."
 revolution_pulse_events.31.b:0 "Skicka hem dem. Påminn dem om deras plikt."
 revolution_pulse_events.31.c:0 "Skjut var tionde man."
 revolution_pulse_events.32.t:0 "Vox Diaboli"
 revolution_pulse_events.32.d:0 "[SCOPE.sReligion('majority_religion').GetName]I[SCOPE.sState('vox_diaboli_state').GetName] har anhängare under[SCOPE.sCharacter('devout_ig_leader').GetFullName] uppmanat till ett våldsamt uppror, där[SCOPE.sReligion('minority_religion').GetName] vissa personer utpekas som syndabockar för deras nuvarande elände."
 revolution_pulse_events.32.f:0 "För att inte misstolka folkets röst som Guds röst bör man komma ihåg att ärkefienden känner till Skriften bättre än de själva. Det är faktiskt just dessa vackra, vältaliga predikningar som underblåser stridigheter. Priset blir utan undantag en blodig flodvåg."
 revolution_pulse_events.32.a:0 "Sätt munkavle på ledarna."
 revolution_pulse_events.32.b:0 "Placera soldater utanför[SCOPE.sReligion('minority_religion').GetName]församlingarna."
 revolution_pulse_events.32.c:0 "Ta upp några av  de[SCOPE.sReligion('majority_religion').GetNameNoFormatting]farhågorna."
 revolution_pulse_events.33.t:0 "Girighet är bra"
 revolution_pulse_events.33.d:0 "[SCOPE.sState('greed_is_good_state').GetName][SCOPE.sCharacter('industrialists_ig_leader').GetFullName], och[SCOPE.gsInterestGroup('industrialists_ig').GetName]  har avgett en avsiktsförklaring: all industriell produktion ska upphöra tills en samarbetsvillig regering har tillträtt."
 revolution_pulse_events.33.f:0 "En fientlig övertagning innebär, enkelt uttryckt, att ett stort företag förvärvar ett mindre företag mot det mindre företagets vilja. För ett tillräckligt stort företag är en motarbetande regering bara ytterligare ett företag som ska införlivas. Skillnaden är bara att det företaget nu kan skriva alla regler. \n\nTitta bara på South Sea Trading Company."
 revolution_pulse_events.33.a:0 "Förhandla fram någon form av försörjningsverksamhet."
 revolution_pulse_events.33.b:0 "Öppna nya fabriker med våra egna chefer."
 revolution_pulse_events.33.c:0 "Skicka in soldaterna."
 revolution_pulse_events.34.t:0 "En ny mörk tid"
 revolution_pulse_events.34.d:0 "Rubriken i [SCOPE.sCharacter('intelligentsia_ig_leader').GetFullName]tidningen ”” meddelar att alla författare, konstnärer, artister och lärare i[SCOPE.sState('little_dark_age_state').GetName]  har sagt upp sig. Befolkningen[ROOT.GetCountry.GetAdjective]i  har bara en utväg kvar för att ge uttryck för sitt missnöje: uppror."
 revolution_pulse_events.34.f:0 "”Upplysningen” var namnet på den tid då stora tänkare och konstnärer verkade. Dess löfte var att alla folk skulle befrias från okunnighetens och vidskepelsens bojor. \n\nNu har vi ”Förmörkningen”, en tid präglad av våldsam okunnighet och skräckinjagande mysticism. Dess löfte är kulturens undergång, hoppets död och, kanske för de överlevande när det är över, chansen till en ny början."
 revolution_pulse_events.34.a:0 "Regeringen kommer att driva sina egna tryckerier."
 revolution_pulse_events.34.b:0 "Kanske är det dags att satsa mer pengar på konsten?"
 revolution_pulse_events.34.c:0 "Universitetet måste bemannas på nytt."
 revolution_pulse_events.35.t:0 "Problem i underhuset"
 revolution_pulse_events.35.d:0 "Alla hyreskontrakt i[SCOPE.sState('tragedy_of_commons_state').GetName][SCOPE.gsInterestGroup('landowners_ig').GetName]  har hyresnivåer som överskrider rimliga gränser. Hyresgästerna riktar sin vrede mot regeringen för att den inte skyddar dem."
 revolution_pulse_events.35.f:0 "Människor reagerar på två sätt i tider av konflikt: de söker efter någon att skylla sina eländigheter på och agerar därefter. Ett tecken på styrka eller ödesdiger dumhet – filosoferna skulle kunna debattera detta till tidens ände. De är dock överens om att det inte är ett tecken på intelligens. Skulden kan läggas på någon annan, och det är de skyldiga som tjänar mest på det."
 revolution_pulse_events.35.a:0 "Grip ledarna!"
 revolution_pulse_events.35.b:0 "De borde åtalas för utpressning."
 revolution_pulse_events.35.c:0 "Hyran måste begränsas kraftigt."
 revolution_pulse_events.36.t:0 "Begravd i byråkrati"
 revolution_pulse_events.36.d:0 "Förfalskade rapporter från alla privata och offentliga instanser i[SCOPE.sState('red_tape_state').GetName]  har skapat splittring inom regeringen.[SCOPE.sCharacter('petty_bourgeoisie_ig_leader').GetFullName]  ställer ett enkelt krav: överlämna makten till de människor som vet hur man får saker gjorda."
 revolution_pulse_events.36.f:0 "Allt motstånd handlar inte om att slå någon i huvudet med en klubba eller sätta eld på en maskin. Ett effektivt sätt är helt enkelt att inte följa den oskrivna överenskommelsen som kallas juridisk bokföring. Några manipulerade siffror här, några felaktigt inlämnade uppgifter där; allt oskyldiga misstag i en chefs ögon. Sammantaget kan det tolkas som ett tanklöst misstag eller som en välplanerad förstörelse."
 revolution_pulse_events.36.a:0 "Vi måste ersätta dessa rapporter."
 revolution_pulse_events.36.b:0 "De borde åtalas för bedrägeri!"
 revolution_pulse_events.36.c:0 "Börja om utifrån dessa förfalskade siffror."
 revolution_pulse_events.37.t:0 "Rötan i vinstocken"
 revolution_pulse_events.37.d:0 "[SCOPE.sState('rot_on_vine_state').GetName]Efter en rik skörd i har en leveransrapport –[SCOPE.sCharacter('rural_folk_ig_leader').GetFullName] noll av allt – med ett strängt ultimatum: en ny beställning som tillgodoser [SCOPE.gsInterestGroup('rural_folk_ig').GetName], eller massvält."
 revolution_pulse_events.37.f:0 "”Vi är ju helt utsvultna. Råttorna svälter också. Vi kan inte ens gå ut och jaga kaniner.” \n\n”Titta på all den där frukten… den ligger bara där och blinkar åt oss. Väntar på att bli plockad.” \n\n”Varför gör inte regeringen något? Jag tar hellre chansen med dem än med gamle Jenkins hagelgevär.”"
 revolution_pulse_events.37.a:0 "Beslagta alla jordbruk som är delaktiga i detta."
 revolution_pulse_events.37.b:0 "Beställ förnödenheter från [SCOPE.sCountry('neighbour_country').GetName]."
 revolution_pulse_events.37.c:0 "Sälj frön och handböcker för odling hemma."
 revolution_pulse_events.38.t:0 "Under inga omständigheter"
 revolution_pulse_events.38.d:0 "Efter att ha stormat armékasernerna i[SCOPE.sState('shall_not_be_infringed_state').GetName] har gruppen[SCOPE.gsInterestGroup('trade_unions_ig').GetName]under[SCOPE.sCharacter('trade_unions_ig_leader').GetFullName] börjat rikta sina vapen mot regeringen i [ROOT.GetCountry.GetName]."
 revolution_pulse_events.38.f:0 "”Du förstår, det är just det som är grejen med det här nationalistiska vapenskramlandet. De flesta tror att deras vapen bara kommer från just den här lagen. Men vad boken säger är att fackföreningarna inte är ute efter era vapen. Faktum är att den säger att ni ska skaffa fler.” \n\n”Du vet ju att du inte kan läsa!” \n\n”Det är Engels, du får poäng för att du försöker.”"
 revolution_pulse_events.38.a:0 "Koncentrera er på att försvara städerna."
 revolution_pulse_events.38.b:0 "Jaga dem upp i bergen."
 revolution_pulse_events.38.c:0 "Polisen måste få bättre vapen!"
 agitator_spawn_tt:0 "Ett[SCOPE.gsInterestGroup('trade_unions_ig').GetName]  [concept_agitator] kommer att visas i [SCOPE.sCountry('agitator_country_scope').GetName]"
 revolution_pulse_events.39.t:0 "Gamar över ett kadaver"
 revolution_pulse_events.39.d:0 "[SCOPE.gsInterestGroup('revolting_ig').GetName]Opportunistiska medlemmar av[SCOPE.gsInterestGroup('defecting_ig').GetName]  har gått över till  s sak."
 revolution_pulse_events.39.f:0 "Kråkor äter av färska kadaver, oavsett dödsorsak. Vissa känner dock av när ett djur som fortfarande lever är på väg att dö. Då väntar kråkan, hur lång tid det än tar, tills bytet dör. Men det är bättre att vara först på plats och välja det bästa köttet än att hoppas på rester."
 revolution_pulse_events.39.a:0 "Så må det vara."
 revolution_pulse_events.39.b:0 "Försök att locka tillbaka några."
 revolution_pulse_events.40.t:0 "Hårdhänthet"
 revolution_pulse_events.40.d:0 "[SCOPE.gsInterestGroup('revolting_ig').GetName][SCOPE.gsInterestGroup('defecting_ig').GetName][SCOPE.sCharacter('governor_person').GetFullName] misstog en fiende i . Efter att ha anklagat dem för falska anklagelser övergick moderaterna i[SCOPE.gsInterestGroup('defecting_ig').GetName]  till dennes sida."
 revolution_pulse_events.40.f:0 "Även den kortaste glimten av ilska kan förvandla ett vänligt ansikte till en fiende. Den kan få till och med de trognaste allierade att vända sig mot varandra på grund av ett missförstånd. Och när den väl har släppts lös finns det ingen återvändo."
 revolution_pulse_events.40.a:0 "Deras allierade kanske inte är lika tillmötesgående."
 revolution_pulse_events.40.b:0 "[SCOPE.sCharacter('governor_person').GetFullName] bör avgå."
 provisional_government_events.1.t:0 "Den provisoriska regeringens fall"
 provisional_government_events.1.d:0 "Tack vare vår seger i revolutionen kan den provisoriska regeringen nu formellt[ROOT.GetCountry.GetRuler.GetLastName] fastställa den styrelseform man önskar för [ROOT.GetCountry.GetName]."
 provisional_government_events.1.f:0 "Röken från revolutionskriget har till stor del skingrats, och med den har även den djupa osäkerheten om i vilken riktning den provisoriska regeringen önskar leda nationen försvunnit. Medan regeringsmedlemmarna debatterar sinsemellan öppnas flera vägar –[ROOT.GetCountry.GetNameNoFormatting] att formalisera den revolutionära strukturen, att ta över det mandat som den gamla regimen innehade, eller att bana en helt ny väg genom historien."
 provisional_government_events.1.a:0 "Presidentens inflytande kommer att hjälpa oss att klara framtida kriser."
 provisional_government_events.1.b:0 "Det är dags att överföra befogenheter till [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]."
 provisional_government_events.1.c:0 "Vi vänder oss mot den avsatte monarken, inte mot monarkin i sig."
 provisional_government_events.1.e:0 "Vi är inte fiender till [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], utan endast till den tidigare regimen."
 provisional_government_events.1.g:0 "Det var endast den tidigare regimen som var förrädare mot arbetarna."
