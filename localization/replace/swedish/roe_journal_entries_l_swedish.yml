 je_bandit_raiding:0 "Ill-Gotten Gains"
 je_bandit_raiding_reason:0 "With little land and few legitimate means of support, the [ROOT.GetCountry.GetAdjectiveNoFlag] turn to [concept_raiding] neighboring settlements to survive. \n\nWhile raiders proudly display the spoils of their attacks, excessive brutality can draw unwanted attention from powerful neighbors. \n\nIf raids become too frequent, nearby authorities may use them as justification for counterattacks. \n\n[concept_raiding]:\nWe are earning #v @money![GetPlayer.MakeScope.ScriptValue('raiding_income')]#! thanks to our army's [concept_power_projection] of #v [SCOPE.GetRootScope.GetCountry.GetArmyPowerProjection|0]#! and a [concept_raiding_frequency] of #v [Country.MakeScope.Var('raiding_intensity').GetValue]%#!.\n\nThe more we earn from raiding, the more likely our neighbors are to strike back, unless they are distracted by other conflicts."
 je_bandit_raiding_lobby:0 "With little land and few legitimate means of support, the [ROOT.GetCountry.GetAdjectiveNoFlag] turn to [concept_raiding] neighboring settlements to survive. \n\nWhile raiders proudly display the spoils of their attacks, excessive brutality can draw unwanted attention from powerful neighbors. \n\nIf raids become too frequent, nearby authorities may use them as justification for counterattacks. \n\n[concept_raiding]:\nWe are earning #v @money![GetPlayer.MakeScope.ScriptValue('raiding_income')]#! thanks to our army's [concept_power_projection] of #v [SCOPE.GetRootScope.GetCountry.GetArmyPowerProjection|0]#! and a [concept_raiding_frequency] of #v [Country.MakeScope.Var('raiding_intensity').GetValue]%#!.\n\nThe more we earn from raiding, the more likely our neighbors are to strike back, unless they are distracted by other conflicts."
