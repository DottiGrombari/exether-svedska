 colonial_administration_events.1.t:0 "The Nature of Administration"
 colonial_administration_events.1.d:0 "With the establishment of [SCOPE.sCountry('newly_formed_colonial_nation_scope').GetName], we must decide the direction of our new colonial   administration."
 colonial_administration_events.1.f:0 "\"Right, now take this down. And you remembered your pen this time? Ah, good. So it is in the darkest land, that we come to the now called [SCOPE.  sCountry('newly_formed_colonial_nation_scope').GetNameNoFormatting], where we can begin the beachhead of true civilization. From there, proper exploitation of resources for the glory   of- My God, man, strike out me asking about your pen! This is for the annals!\""
 colonial_administration_events.1.a:0 "It will be administered by a chartered [SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjectiveNoFormatting] Company."
 colonial_administration_events.1.b:0 "The [SCOPE.sPop('majority_religion').GetReligion.GetName] missions will uplift the local populace."
 colonial_administration_events.1.c:0 "In the darkest land, a new [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting] shall emerge."
 colonial_administration_events.1.e:0 "The whip shall crack, and the colony provide."
 colonial_administration_events.1_tt_1:0 "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjective] [Concept('concept_law', '$concept_laws$')] will be tailored around #bold   commerce#! and #bold private enterprise.#!"
 colonial_administration_events.1_tt_2:0 "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjective] [Concept('concept_law', '$concept_laws$')] will be tailored around #bold   conversion#! and #bold education.#!"
 colonial_administration_events.1_tt_3:0 "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjective] [Concept('concept_law', '$concept_laws$')] will be tailored around #bold   immigration#! and #bold colonial settlement.#!"
 colonial_administration_events.1_tt_4:0 "[SCOPE.sCountry('newly_formed_colonial_nation_scope').GetAdjective] [Concept('concept_law', '$concept_laws$')] will be tailored around #bold   slave labor#! and #bold ruthless exploitation.#!"
