 notification_government_petition_start_tooltip:0 "#header $notification_government_petition_start_name$#!\n$TOOLTIP_DELIMITER$\n$notification_government_petition_start_desc$"
 government_petition_tt:0 "De[SCOPE.gsInterestGroup('government_petition_ig').GetName]kommer att förvänta sig att regeringen antar[SCOPE.sLaw('government_petition_law').GetName] [lagförslaget] inom de närmaste fem åren."
 government_petition_2_tt:0 "De[SCOPE.gsInterestGroup('government_petition_ig').GetName]kommer att förvänta sig att regeringen antar[SCOPE.sLaw('government_petition_law_2').GetName] [lagförslaget] inom de närmaste fem åren."
 government_petition_events.1.t:0 "[SCOPE.gsInterestGroup('government_petition_ig').GetName] Petition till regeringen"
 government_petition_events.1.d:0 "[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetFullName]Som företrädare för sina väljare i har han[SCOPE.gsInterestGroup('government_petition_ig').GetName] lämnat in en formell framställning till regeringen[ROOT.GetCountry.GetAdjective] om att anta [SCOPE.sLaw('government_petition_law').GetName]."
 government_petition_events.1.d2:0 "Eftersom de är missnöjda med sin nuvarande begränsade roll i styrningen har de[SCOPE.gsInterestGroup('government_petition_ig').GetName] lämnat in en petition där de uppmanar regeringen att omedelbart vidta åtgärder för att införa [SCOPE.sLaw('government_petition_law').GetName]."
 government_petition_events.1.d3:0 "[SCOPE.gsInterestGroup('government_petition_ig').GetName][SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetFullName], ledaren[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetCustom('petition_trait_descriptor')] för , har vänt sig till regeringen med ett förslag om att införa [SCOPE.sLaw('government_petition_law').GetName]. Om förslaget antas kommer det utan tvekan att bidra till[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetHerHis]  rykte som en effektiv politiker."
 government_petition_events.1.f:0 "”Öh, en sista sak för idag, sir. Medlemmar från er valkrets anlände i morse. De… frågar ganska högljutt och insisterande… om ni skulle kunna träffa dem angående den nya lagstiftningen.”\n\n ”Är det allt? Herregud, ni ser ut som om ni sett ett spöke. Jag kan väl avsätta de sista timmarna av dagsljus åt dem, eller hur?” \n\n”J-ja, det tror jag, herr minister. De tog inte nej för ett svar.”"
 government_petition_events.1.f2:0 "”Jag har fått ett uttalande från[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetCustom('getMsMr')] [SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting] ,” inledde sekreteraren. ”[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe|U]  vill betona att det inte är något ultimatum.” \n\nMinistern lyfte ett ögonbryn. \”Kan du utveckla det?\”\n\n\”[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe|U] rapporterar att[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe]  inte skulle kunna fortsätta att försäkra[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetHerHis]  sina medarbetare om att regeringen företräder deras intressen, om regeringen inte vidtar \”meningsfulla och omedelbara åtgärder för att understryka detta uttalande\”.\”\n\n\”Ett ultimatum, alltså?\”\n\n\”Det verkar så.\”"
 government_petition_events.1.f3:0 "[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting]”Kan jag få ett ord?” \n\nMinistern, som redan var halvvägs ut genom dörren, ryckte till vid ljudet. A[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetWomanMan]stod i korridoren med en läderinbunden mapp i handen. Han kände igen honom –[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetHerHis] utseendet var omisskännligt. \n\n”Ja, självklart”, sa han. ”Ska jag...?”\n\n[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetLastNameNoFormatting] nickade och räckte över mappen. Minst hundra sidor, att döma av vikten. ”Jag tänker lägga fram det första utkastet i morgon”[SCOPE.gsInterestGroup('government_petition_ig').GetLeader.GetSheHe], sa . ”Det vore en ära att få ert stöd.”"
 government_petition_events.1.a:0 "Vi får se vad vi kan göra."
 government_petition_events.1.b:0 "Erbjud dem[SCOPE.sLaw('government_petition_law_2').GetName] detta som en kompromiss."
 government_petition_events.1.c1:0 "De måste inse att den nuvarande situationen inte medger detta."
