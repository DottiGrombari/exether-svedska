 je_cove_pirate_raiding:0 "Raiding the seas"
 je_cove_pirate_raiding_reason:0 "The Empire of Dumonia gazes south. But in it's greed, it has dismissed our presence. Muster our fleets and send word to our fellow ravagers; it is time to make the Empire bleed!"
 je_cove_pirate_raiding_status:0 "The Empire and it's lackeys have us heavily outnumbered. We are limited to small raids until we can regain the upper hand."
 pirate_start_raids_button_name:0 "Intensify Raids!"
 pirate_start_raids_button_desc:0 "We have gathered enough flotillas to put real hurt on the complacent Dumonians. Set Sail!"
 pirate_consolidation_1_button_name:0 "Coordinate Raids!"
 pirate_consolidation_1_button_desc:0 "By diplomacy or might, we are able to bring the other pirates in line with us. And we have the perfect goal in mind for our first combined foray..."
 no_avian_independence_tt:0 "No independent avian heritage nations in [GetGeographicRegion('geographic_region_aritzakarri').GetName]"
 je_mindrend_expedition:0 "Expedition Across the Mindrend Sands"
 je_mindrend_expedition_reason:0 "\"The southern half of the Locari continent remains a mystery for many. We shall launch an expedition to chart what lies beyond the sands.\""
 je_heptadron_probs:0 "Expedition to the Rimeroot Core"
 je_heptadron_probs_reason:0 "These heptadrones cannot be allowed to terrorize our citizens. We must find the heart of the sunstation grid and find a way to control them or shut them down."
 rimeroot_exp_possible_tt:0 "Has completed #bold $je_sunstation$#!"
 heptadrone_controller_tt:0 "#green You will receive greater rewards if the expedition finds a way to control the heptadrones#!"
 je_sunstation:0 "The Rising Sun"
 je_sunstation_reason:0 "This land was warmed and tamed long ago by its ancient Draconic custodians with a massive underground heating network, known as the #italic Fuchghirn#!, or the sunstations. Disabled by the [concept_godsbane], these stations dot the countryside, hanging over Rimeroot like a dark sun.\n\nHowever, the since the [concept_nightfall], adventurers have reported signs of life from within these stations, and commoners nearby are pooling their funds together to pay whomever they can afford to deal with the machine spiders that they claim originate from the massive complexes that lie beneath the stations.\n\nThe sunstations are a discoverable [concept_building] that can be found anywhere in the $region_thawed_lands$ and $region_rimeroot_jungle$ [concept_strategic_region]. Once discovered, it must be rebuilt with the help of a construction sector before you can begin the hard work of restarting the stations.\n\nOnce at least one sunstation has been renovated, we must complete a power-cycle on at least one station before the network can be brought back online. Fill the progress bar on the $building_sunstation$ [concept_building] and you may begin to harness the power of the sun. \n\nThis wild land must be civilized."
 journal_entry_sunstation_status_1:0 "Find and renovate one of the mythical sunstations"
 journal_entry_sunstation_status_2:0 "Bring the station back online!"
 sunstation_je_complete_tt:0 "We have completed a power-cycle on any $building_sunstation$"
 opalael_racists_losing_tt:0 "The Tetsenñás are nearly weak enough to oust"
 opalael_racists_winning_tt:0 "The Tetsenñás are nearly satisfied with Opalai governance"
 opalael_racists_winning_2_tt:0 "The Tetsenñás are beginning to become satisfied with Opalai governance"
 je_shattered_ring:0 "Shattered Ring"
 je_shattered_ring_reason:0 "The upstart dwarves of [SCOPE.sCountry('khd_scope').GetNameNoFlag] have made their intentions known. They would draw all the Embervein orcs within their realm and feed them into their armies and factories. Should they succeed we will forever have a powerful rival at our doorstep, poised to drive us from our homes. We would never be secure again. This region can only have one hegemon and it cannot be them!\n\nIf [SCOPE.sCountry('khd_scope').GetNameNoFlag] is allowed to fill the progress bar, they will form the Ring of Steel [concept_power_bloc], with [SCOPE.sCountry('hoz_scope').GetNameNoFlag] and [SCOPE.sCountry('tsh_scope').GetNameNoFlag] as junior members. The progress will continue to grow as long as Khaduras maintains its long-standing military relationship with Stihugnado. If you form a [concept_power_bloc] of your own, your leverage generation within Stihugnado will slow the growth of the progress bar, otherwise the only way to slow progress is to [concept_fund_lobbies] in [SCOPE.sCountry('tsh_scope').GetNameNoFlag].\n\nIf [SCOPE.sCountry('khd_scope').GetNameNoFlag] is brought into a war against [SCOPE.sCountry('tsh_scope').GetNameNoFlag], the [concept_journal_entry] will end inconclusively."
 ring_pipe_dream_loc:0 "The Ring of Steel remains #bold a pipe dream#!"
 ring_getting_serious_loc:0 "Discussion surrounding the Ring of Steel begins to #bold grow serious#!"
 ring_nearing_ratification_loc:0 "The Ring of Steel is #bold nearing ratification#!"
 je_ring_on_it:0 "A Ring on It"
 je_ring_on_it_reason:0 "Though we have achieved much with our orcish allies thus far, there is still more glory within our reach. If we are to truly unite as one people, citizens of Khaduras one and all, we must secure our hegemony over the region. We must form a Ring of Steel; an unbreakable bond of strength through unity. The Embervein peoples would stand tall indeed. We need only convince the people of [SCOPE.sCountry('tsh_scope').GetNameNoFlag] of our dream.\n\nOnce the progress bar is filled, we will unlock the ability to form the Ring of Steel [concept_power_bloc], with [SCOPE.sCountry('hoz_scope').GetNameNoFlag] and [SCOPE.sCountry('tsh_scope').GetNameNoFlag] as junior members. The progress bar will continue to grow as long as we maintain our existing military relationship. We can #bold #green increase#!#! the rate at which progress grows by increasing their opinion of us, and by signing a military assistance [concept_treaty] [concept_article] with Stihugnado. You may wish to establish additional treaties, to establish a base of leverage generation for when your [concept_power_bloc] is formed.\n\nIf we are brought into a war against [SCOPE.sCountry('tsh_scope').GetNameNoFlag] for any reason, the [concept_journal_entry] will end inconclusively."
 je_ring_on_it_stihug:0 "A Ring on It"
 je_ring_on_it_stihug_reason:0 "If [SCOPE.sCountry('khd_scope').GetNameNoFlag] manages to fill the progress bar, they will form a [concept_power_bloc], and allow us to join. If you go to war with [SCOPE.sCountry('khd_scope').GetNameNoFlag] for any reason, the JE will end inconclusively."
 ring_of_steel_formation_tt:0 "[SCOPE.sCountry('khd_scope').GetNameNoFlag] will form the Ring of Steel [concept_power_bloc]"
