 je_scotland_yard:0 "The Metropolitan Police"
 je_scotland_yard_reason:0 "As cities grow and dangerous ideas spread, the need to maintain public order becomes even more essential. The police must have the manpower and resources that they need to keep the peace, with priority given to the heart of our nation."
 scotland_yard.1.t:0 "The Metropolitan Police"
 scotland_yard.1.d:0 "Scotland Yard has solved a series of high-profile murders in [SCOPE.sState('capital_scope').GetCityHubName] thanks to the expansion of the [SCOPE.sLawType('police_law').GetName]. Public confidence in the institution is at an all-time high."
 scotland_yard.1.d2:0 "The [SCOPE.sLawType('police_law').GetName] has solved a series of high-profile murders in [SCOPE.sState('capital_scope').GetCityHubName] thanks to our investment in their institution. Public confidence in the police is at an all-time high."
 scotland_yard.1.f:0 "\"[SCOPE.sState('capital_scope').GetCityHubName] by gaslight can be a treacherous place. The papers would have you believe that danger lurks around every corner. But all of that is set to change; with a Peeler patrolman on every street, our citizens will be able to stride confidently in the knowledge that they are protected from the criminal element.\""
 scotland_yard.1.a:0 "Medals for all of our brave Bobbies!"
 scotland_yard.1.b:0 "[SCOPE.sState('capital_scope').GetCityHubName]'s finest are on the case."
 scotland_yard_effective_policing:0 "Confidence in the Police"
 siberia_tt:0 "Every owned state in [SCOPE.sStrategicRegion('west_siberia').GetName], and [SCOPE.sStrategicRegion('manchuria').GetName] with a Railway gets:"
 plague_might_spread.tt:0 "The virus may spread to [THIS.GetCountry.GetName] via neighboring states or common markets."
 je_spanish_flu:0 "Flu Pandemic"
 je_spanish_flu_reason:0 "A deadly flu pandemic is ravaging the globe. The government's response to this plague will determine the fate of thousands, perhaps millions, of lives."
 production_tech_events.700.t:0 "The Engines of Progress"
 production_tech_events.700.d:0 "The manufacture of steam engines has become a profitable industry in [SCOPE.sState('steam_engine_state').GetName] thanks to our sound investment in locomotive technology. These engines are already being employed across new [ROOT.GetCountry.GetAdjectiveNoFormatting] railway lines."
 production_tech_events.700.f:0 "\"All aboard for [SCOPE.sState('first_railway_state').GetCityHubName]! Courtesy of the good folks at the [SCOPE.sState('steam_engine_state').GetCityHubName] Steam Locomotive Company, getting out of [SCOPE.sState('second_railway_state').GetCityHubName] has never been easier. The dining cart is restricted to first class passengers only, stowaways will be prosecuted!\""
 production_tech_events.700.a:0 "All aboard!"
 production_tech_events.700.b:0 "More engines! More locomotives!"
 production_tech_events.700.c:0 "We're on the track for innovation."
 first_railway_modifier:0 "Railway Connections"
 steam_engine_production:0 "Steam Engine Time"
 je_steam_engines:0 "Steam Engine Time"
 je_steam_engines_reason:0 "The locomotive industry is a promising avenue not only for the development of our infrastructure, but also for profit and innovation. We should establish factories capable of manufacturing steam engines, and connect our cities through railways."
 has_adjacent_railway_tt:0 "Any owned neighboring state also meets these conditions"
 wedding.1.t:0 "The Royal Wedding"
 wedding.1.d:0 "The nation celebrates the marital union of [SCOPE.sCharacter('royal_marriage_character').GetHerHis] Most Gracious Majesty [SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFirstName] and the charming [SCOPE.sCharacter('royal_marriage_character').GetCustom('wedding_son_daughter')] of [SCOPE.sCharacter('foreign_ruler').GetPrimaryRoleTitle] [SCOPE.sCharacter('foreign_ruler').GetFirstName] of [SCOPE.sCountry('marriage_country').GetName]."
 wedding.1.f:0 "\"Today the most august ceremony of the marriage of [SCOPE.sCharacter('royal_marriage_character').GetHerHis] Most Gracious Majesty [SCOPE.sCharacter('royal_marriage_character').GetPrimaryRoleTitle] [SCOPE.sCharacter('royal_marriage_character').GetFirstNameNoFormatting] was performed in [SCOPE.sState('capital_scope').GetCityHubName]. It is not to be wondered that these circumstances should make the people of this country, who are naturally and intrinsically a loyal people, suspend their ordinary avocations to join in keeping holiday, and publicly to demonstrate their attachment to the Throne.\""
 wedding.1.a:0 "Invite only those of the highest social standing."
 wedding.1.b:0 "A grand public wedding will placate the masses."
 royal_marriage_son:0 "son"
 royal_marriage_daughter:0 "daughter"
 royal_marriage:0 "Elite Royal Wedding"
 marriage_popularity:0 "Public Royal Wedding"
 suez_canal_purchase_available:0 "The #b $suez_canal_purchase$#! [concept_decision] is now available"
 suez_canal_construction_available:0 "It is now possible to construct the Suez Canal in Sinai"
 canal_events.100.d:0 "Our survey of the Suez Isthmus is complete: it would be possible to construct a canal linking the Mediterranean to the Red Sea. Next we must acquire the land from [SCOPE.sCountry('suez_owner').GetName]."
 canal_events.100.a:0 "We will make a suitable offer."
 canal_events.100.b:0 "Coercion is the simplest form of persuasion."
 canal_events.100.c:0 "We will build the Canal!"
 je_suez_survey:0 "The Suez Survey"
 je_suez_survey_reason:0 "Our engineers believe it may be possible to construct a canal linking the Mediterranean to the Red Sea. They are currently conducting a survey of the Isthmus of Suez to determine the feasibility of the project."
 je_suez_survey_goal:0 "Await the completion of the #bold 18 month#! survey"
 je_suez_canal:0 "Construct the Suez Canal"
 je_suez_canal_reason:0 "We have determined that it would be possible to construct a canal linking the Mediterranean to the Red Sea. We must now secure the region and construct the canal."
 suez_purchase:0 "The Suez Purchase"
 suez_sale:0 "The Suez Sale"
 je_panama_survey:0 "The Panama Survey"
 je_panama_survey_goal:0 "Await the completion of the #bold 12 month#! survey"
 je_panama_survey_reason:0 "Our engineers believe it may be possible to construct a canal linking the Atlantic and Pacific Oceans. They are currently conducting a survey of the Isthmus of Panama to determine the feasibility of the project."
 je_panama_canal:0 "Construct the Panama Canal"
 je_panama_canal_reason:0 "We have determined that it would be possible to construct a canal linking the Atlantic and Pacific Oceans. We must now secure the region and construct the canal."
 panama_canal_purchase_available:0 "The #b $panama_canal_purchase$#! [concept_decision] is now available"
 panama_canal_construction_available:0 "It is now possible to construct the Panama Canal in Panama"
 panama_purchase:0 "The Panama Purchase"
 panama_sale:0 "The Panama Sale"
 canal_events.101.d:0 "Our survey of the Panama Isthmus is complete. We have confirmed that it would be possible to construct a canal linking the Atlantic and Pacific Oceans. Next we must acquire the land from [SCOPE.sCountry('panama_owner').GetName]."
 je_land_reclamation:0 "Land Reclamation"
 je_land_reclamation_reason:0 "The Netherlands is densely populated, and arable land is increasingly scarce. Through great works of engineering, we can reclaim new land from the sea."
 je_land_reclamation_goal:0 "Has reclaimed at least 20 Arable Land"
 land_reclamation_no_tech:0 "Each year there is a chance that our land reclamation effort will yield results and create more Arable Land. The process will be more efficient if we research Concrete Dockyards."
 land_reclamation_tech:0 "Each year there is a chance that our land reclamation effort will yield results and create more Arable Land. The process is more efficient because we have researched Concrete Dockyards."
 land_reclamation.1.t:0 "Land Reclamation"
 land_reclamation.1.d2:0 "Our land reclamation project in [SCOPE.sState('land_reclamation_state').GetName] has borne results. The state can now support additional agricultural land."
 land_reclamation.1.d:0 "Our land reclamation project in [SCOPE.sState('land_reclamation_state').GetName] has borne results. The state can now support additional agricultural land. With this final polder, a great feat of engineering is complete."
 land_reclamation.1.f:0 "\"They say that the Dutch are the best engineers in Europe. They are wrong. The Dutch are the best engineers in the world.\""
 land_reclamation.1.a:0 "The sea retreats before us."
 land_reclamation.1.b:0 "We are the masters of land and sea."
 land_reclamation_complete:0 "Reclaimers of the Land"
 central_america.3.t:0 "[SCOPE.sCountry('secession_country').GetName] Secedes"
 central_america.3.d:0 "[SCOPE.sCountry('secession_country').GetName] has declared its secession from [ROOT.GetCountry.GetName]. This has prompted further instability and turmoil in the remaining states of our fragile union."
 central_america.3.f:0 "\"The [ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] signed a decree allowing the remaining states to secede, but this was nothing more than a formality; the dissolution of our confederation was already a reality. But perhaps what was may come again, given time for the wounds of division to heal.\""
 central_america.3.a:0 "Let them have their independence."
 central_america.3.b:0 "They will regret this betrayal."
 central_america_capital_tt:0 "When Central America is dissolved, you will play as the country most appropriate to your capital state. You can change your national capital through the Political Lens."
 central_america_breakup_status:0 "Central American states with high turmoil may secede"
 je_peru_bolivia:0 "The Peru-Bolivian Confederation"
 je_peru_bolivia_reason:0 "The Bolivian intervention into the Peruvian civil war of 1835 has led to the territories of Peru falling under the control of the [SCOPE.sCountry('bolivia_scope').GetRuler.GetPrimaryRoleTitle] of [SCOPE.sCountry('bolivia_scope').GetName]. [SCOPE.sCountry('bolivia_scope').GetNameNoFormatting] seeks to preserve this fragile Confederation, so that a true and complete union between her subjects might become possible.\n\n@information! The ambitions of the #bold Peru-Bolivian Confederation#! can be averted by forcing them to release their [Concept('concept_subject', '$concept_subjects$')] before the Progress Bar reaches #variable 100%#!.\n\n@warning! Whilst #b $BOL$#! seek to consolidate the #bold Confederation#!'s rule, she will be subject to increased aggression from her neighbors."
 je_peru_bolivia_restorer_victory:0 "To achieve a #b Restorer#! victory:\n"
 je_peru_bolivia_on_restorer_victory:0 "On a #b Restorer#! victory:\n$EFFECT$"
 je_peru_bolivia_confederation_victory:0 "To achieve a #b Confederation#! victory:\n"
 je_peru_bolivia_on_confederation_victory:0 "On a #b Confederation#! victory:\n$EFFECT$"
 dyn_c_peru_bolivia:0 "Peru-Bolivia"
 dyn_c_peru_bolivia_adj:0 "Peruvian-Bolivian"
 je_autocracy:0 "Religion, Autocracy, Nationality"
 je_autocracy_reason:0 "Our nation is defined by the absolute authority of our beloved ruler. We are one family, with one father and one fatherland; united and strong. If we wish to preserve these values, the Autocracy must be maintained."
 je_autocracy_goal:0 "The following must be true for 30 total years:"
 autocracy.1.t:0 "Official Nationality"
 autocracy.1.d:0 "The state policy of Religion, Autocracy, and Nationality has become the ubiquitous ideology of the [ROOT.GetCountry.GetAdjective] people. There are few who dare to question the absolute authority of the [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]."
 autocracy.1.f:0 "\"In a state where love for [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]s and devotion to the throne are based on the native characteristics of the people, where there are laws of the fatherland and firmness in administration, all efforts of the evil-intentioned will be in vain and insane.\""
 autocracy.1.a:0 "All hail the [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]!"
 autocracy.1.b:0 "The [SCOPE.sCulture('primary_culture_scope').GetName] people are supreme."
 autocracy.1.c:0 "The [SCOPE.gsInterestGroup('church_scope').GetName] shows us the way."
 autocracy.2.t:0 "Secret Societies"
 autocracy.2.d:0 "Clandestine groups of academics in [SCOPE.sState('secret_societies_state').GetName] are plotting against the state to advance the misguided cause of the [SCOPE.gsInterestGroup('secret_society_ig').GetName]."
 autocracy.2.f:0 "\"We have found your blasphemous and treasonous books. Your pamphlets. The shops you used to run as a front. Your houses. The meeting places you thought you had kept secret. We have set them all to flame. All that is left now is your confession.\""
 autocracy.2.a:0 "Leave them be, they pose no threat."
 autocracy.2.b:0 "Dissent must be punished."
 autocracy.3.t:0 "Blessed Are the Meek"
 autocracy.3.d:0 "The [SCOPE.gsInterestGroup('church_scope').GetName] in [SCOPE.sState('religious_serfs_state').GetName] are assuring [SCOPE.sPop('religious_serf_pop').GetName] that despite the harsh conditions of their lives, they are serving the greater good of the [ROOT.GetCountry.GetAdjective] nation. Serfs shall be rewarded in the hereafter for their service."
 autocracy.3.f:0 "\"Blessed are the meek,\nfor they will inherit the earth,\nBlessed are those who hunger and thirst for righteousness\nfor they will be filled,\nBlessed are the merciful\nfor they will be shown mercy.\" \n\n–#italic Sermon on the Mount#!, Matthew 5: 5-7"
 autocracy.3.a:0 "Imbue them with loyalty to the state."
 autocracy.3.b:0 "Absolve yourselves of impure thoughts."
 popular_autocrat:0 "Popular Autocrat"
 popular_autocrat_ig:0 "Favorites of the Autocracy"
 russification_modifier:0 "National Assimilation"
 religious_orthodocy_enforced_mod:0 "Enforced Faith"
 tolerated_secret_societies:0 "Secret Societies Tolerated"
 suppressed_secret_societies:0 "Suppressed Secret Societies"
 loyal_religious_serfs:0 "Loyalty through Faith"
 less_radical_religious_serfs:0 "Cleansed of Impure Thoughts"
 generals.1.t:0 "Due a Promotion"
 generals.1.d:0 "The [SCOPE.gsInterestGroup('low_rank_general_ig').GetName] demand the promotion of [SCOPE.sCharacter('low_rank_general').GetRankName] [SCOPE.sCharacter('low_rank_general').GetFullName], touting [SCOPE.sCharacter('low_rank_general').GetHerHis] history of loyal and effective service."
 generals.1.f:0 "So many medals adorned [SCOPE.sCharacter('low_rank_general').GetHerHis] jacket that one could scarcely see the fabric beneath, but it was not yet enough. Chest puffed out with pride, the General smiled as [SCOPE.sCharacter('low_rank_general').GetSheHe] imagined the look on [SCOPE.sCharacter('high_rank_general').GetLastNameNoFormatting]'s face when the [SCOPE.sCharacter('high_rank_general').GetRankName] learned of [SCOPE.sCharacter('low_rank_general').GetHerHis] imminent ascension; their rivalry was legendary among the officers.\n\nAt last [SCOPE.sCharacter('low_rank_general').GetSheHe] would have [SCOPE.sCharacter('low_rank_general').GetHerHis] due."
 generals.1.a:0 "[SCOPE.sCharacter('low_rank_general').GetFullName] has earned it."
 generals.1.b:0 "The [SCOPE.gsInterestGroup('low_rank_general_ig').GetName] will not force our hand."
 low_rank_general_ig_opinion_add:0 "Promoted Prominent General"
 low_rank_general_ig_opinion_remove:0 "Refused General Promotion"
 high_rank_general_ig_opinion_add:0 "Denied Rival's Promotion"
 denied_promotion:0 "Denied Promotion"
 is_meiji_japan:0 "Has completed the #v $je_meiji_restoration$#! Journal Entry"
 shinto_decision:0 "Adopt State Shinto"
 shinto_decision_desc:0 "With the restoration of the imperial household to political power, it would be wise to integrate local beliefs into an official state religion emphasizing the Emperor's divinity."
 taxation_is_theft:0 "Taxation is Theft"
 antitax_anger:0 "Anti-Tax Movement"
 skyscraper_site:0 "Skyscraper Construction Site"
 skyscraper_survey:0 "Skyscraper Survey"
 je_skyscraper_site:0 "Skyscraper Survey"
 je_skyscraper_site_reason:0 "Our architects believe that innovations involving steel frames and concrete would allow the construction of buildings taller than ever conceived before. We have authorized a survey to identify the best possible site to lay the foundations."
 je_skyscraper_site_goal:0 "Await the completion of the #BOLD 2 year#! survey"
 je_skyscraper_construction:0 "Construct a Skyscraper"
 je_skyscraper_construction_reason:0 "Having identified the optimal site for our skyscraper, we must set about the monumental task of its construction. When it is completed we expect this structure to be among the tallest in all the world."
 skyscraper_decision:0 "Survey a Skyscraper Site"
 skyscraper_decision_desc:0 "Our architects believe that innovations involving steel frames and concrete would allow the construction of buildings taller than ever conceived before. They urge us to authorize a survey to identify the best possible site to lay the foundations."
 skyscraper_modifier:0 "Touching the Sky"
 first_skyscraper_modifier:0 "Architectural Pioneering"
 skyscraper.1.t:0 "Skyscraper Site Identified"
 skyscraper.1.d:0 "Our architects and engineers have identified [SCOPE.sState('skyscraper_site').GetCityHubName] in [SCOPE.sState('skyscraper_site').GetName] as the optimal site to begin construction of a Skyscraper."
 skyscraper.1.f:0 "\"Gentlemen, we are going to erect the tallest building in the world. The foundation alone will need hundreds of men, more if they will not work twelve hour shifts. Every day we will need to transport thousands of bags of cement into the heart of a metropolis. We must secure an immense quantity of steel that must, like Atlas, hold the weight of a whole world. The task ahead of us is monumental.\""
 skyscraper.1.a:0 "Lay the foundations."
 skyscraper.2.t:0 "Touching the Sky"
 skyscraper.2.d:0 "Construction of the [SCOPE.sState('skyscraper_state').GetCityHubName] [SCOPE.sBuilding('skyscraper_building_scope').GetName] in [SCOPE.sState('skyscraper_state').GetName] is complete. Dominating the skyline, it inspires all who gaze upon it."
 skyscraper.2.d2:0 "Construction of the [SCOPE.sState('skyscraper_state').GetCityHubName] [SCOPE.sBuilding('skyscraper_building_scope').GetName] in [SCOPE.sState('skyscraper_state').GetName] is complete. The first building of its type in the world, it dominates the skyline and inspires all who gaze upon it."
 skyscraper.2.f:0 "\"My skyscraper would not have been possible without the hard work and grit of the thousands of people who dedicated themselves to its construction. Of course as Chief Architect I had perhaps more impact than most. One might even say the lion's share of the credit is mine. In fact, this pinnacle of human achievement, this new Babel, was borne entirely from the machinations of my mind. Look upon my works all ye mighty, and despair!\""
 skyscraper.2.a:0 "A magnificent achievement."
 skyscraper.2.b:0 "[ROOT.GetCountry.GetAdjective] architecture is second to none."
 first_skyscraper_tt:0 "We have constructed the first Skyscraper in the world"
 war_crimes.1.t:0 "War Crimes"
 war_crimes.1.d:0 "[SCOPE.sCharacter('war_crimes_perpetrator').GetFullName]'s use of mustard gas against the civilian population of [SCOPE.sState('war_crimes_state').GetName] has branded [SCOPE.sCharacter('war_crimes_perpetrator').GetHerHim] a war criminal. There are widespread calls to institute laws outlining acceptable conduct in warfare."
 war_crimes.1.f:0 "\"Great mustard-colored blisters, blind eyes, all sticky and stuck together, always fighting for breath, with voices a mere whisper, saying that their throats are closing and they know they will choke.\""
 war_crimes.1.a:0 "All's fair in love and war."
 war_crimes.1.b:0 "[SCOPE.sCharacter('war_crimes_perpetrator').GetFullName] will be tried for [SCOPE.sCharacter('war_crimes_perpetrator').GetHerHis] crimes."
 je_war_crimes:0 "Chemical Warfare"
 je_war_crimes_reason:0 "The recent development of terrifying chemical weapons has called the ethics of modern warfare into question."
 war_criminal:0 "War Criminal"
 war_criminal_desc:0 "This character has committed crimes against humanity, greatly damaging their own reputation."
 mustard_gas:0 "Mustard Gas"
 laws_against_war_crimes:0 "Prohibition of War Crimes"
 je_munitions_factories:0 "The Munitions Industry"
 je_munitions_factories_reason:0 "Developments in firearms technology have created a need for the manufacture of bullets more ammunition than musketballs. If we develop an industry around fabricating bullets, we could supply our own soldiers and potentially sell to other nations."
 munitions_modifier:0 "Munitions Mania"
 war_crimes.2.t:0 "Dealing in Arms"
 war_crimes.2.d:0 "The establishment of [SCOPE.sBuilding('munitions_building').GetName] in [SCOPE.sState('munitions_state').GetName] ensures an abundant supply of [SCOPE.sGoods('ammo_scope').GetName] for [ROOT.GetCountry.GetNameNoFlag]."
 war_crimes.2.f:0 "\"I resent the term 'arms dealer'. It implies that I am no more than a cynical profiteer, benefiting from the suffering of my fellow man. Nothing could be farther from the truth; what I do guarantees peace and security, not only in [ROOT.GetCountry.GetNameNoFormatting] but throughout the civilized world.\""
 war_crimes.2.a:0 "If you want peace, prepare for war."
 war_crimes.2.b:0 "Let's see some rapid-fire gains in research."
 tunguska_research:0 "Tunguska Scientific Expedition"
 tunguska_omen:0 "The Tunguska Omen"
 tunguska_mining:0 "Tunguska Mining Expedition"
 tunguska.1.t:0 "The Tunguska Event"
 tunguska.1.desc:0 "A massive explosion resounds across the region of Tunguska in [SCOPE.sState('tunguska_state').GetName]. Scientists believe that a celestial object has collided with the Earth."
 tunguska.1.f:0 "\"I lost my senses for a moment, but then my wife ran out and led me to the house. After that such noise came, as if rocks were falling or cannons were firing, the Earth shook, and when I was on the ground, I pressed my head down, fearing rocks would smash it. When the sky opened up, hot wind raced between the houses, like from cannons, which left traces in the ground like pathways, and it damaged some crops.\""
 tunguska.1.a:0 "Fascinating, but irrelevant."
 tunguska.1.b:0 "This warrants scientific investigation."
 tunguska.1.c:0 "It is an omen!"
 tunguska.1.d:0 "Can we mine it?"
 cholera.1.t:0 "On the Mode of Communication of Cholera"
 cholera.1.d1:0 "The source of a cholera outbreak in [SCOPE.sState('cholera_state').GetCityHubName] has been traced by the ingenious surgeon-apothecary John Snow. This has led to great advancements in the field of public health."
 cholera.1.d2:0 "The source of a cholera outbreak in [SCOPE.sState('cholera_state').GetCityHubName] has been traced by an ingenious surgeon-apothecary. This has led to great advancements in the field of public health."
 cholera.1.f:0 "\"The result of the inquiry, then, is, that there has been no particular outbreak or prevalence of cholera in this part of London except among the persons who were in the habit of drinking the water of the above-mentioned pump well. In consequence of what I said, the handle of the pump was removed on the following day.\""
 cholera.1.a:0 "We need to keep the filth off the streets."
 cholera.1.b:0 "Epidemiology is a promising field."
 cholera.1.c:0 "John Snow knows nothing."
 john_snow_knows_nothing:0 "Discredited Epidemiology Research"
 cholera_modifier:0 "Cholera Outbreak"
 commercial_bison_hunting:0 "Commercial Bison Hunting"
 military_bison_hunting:0 "Military Bison Slaughter"
 bison_hunting_subsistence:0 "Depleted Bison Herds"
 manifest_destiny.3.t:0 "Bison Hunting"
 manifest_destiny.3.d:0 "The [SCOPE.sCountry('native_american_country').GetAdjectiveNoFlag] people of [SCOPE.sState('native_american_state').GetName] rely on bison for many of their basic needs. It would serve the interests of settlers in [SCOPE.sState('bison_state').GetName] if the bison population were to be depleted."
 manifest_destiny.3.f:0 "\"Many thousands have been ruthlessly and shamefully slain every season by white hunters and tourists merely for their robes, and in sheer wanton sport, and their huge carcasses left to fester and rot, and their bleached skeletons to strew the deserts and lonely plains.\""
 manifest_destiny.3.a:0 "Encourage commercial hunting."
 manifest_destiny.3.b:0 "Have the army slaughter bison."
 manifest_destiny.3.c:0 "Protect the bison herds."
 communist_elections.1.t:0 "The Red Scare"
 communist_elections.1.d1:0 "Members of the [SCOPE.sParty('anti_leftist_party').GetName] have been vigorously warning voters against [SCOPE.sParty('leftist_party').GetName]'s electoral campaign."
 communist_elections.1.f:0 "First they will take your boss's house and you will thank them for it. You'll receive them as the promised savior and knee before them. Then they will take your neighbor's house, and you will try to convince them, you'll say \"but he is a good man, I know him!\" and it won't matter in the slightest.\n\nThen they will take your car, and you shall think to yourself \"it's fine, I don't need a car anyways.\" And can you guess what'll happen next? You know what'll happen next."
 communist_elections.1.a:0 "These leftists are traitors to the nation."
 communist_elections.1.b:0 "The rhetoric here is needlessly alarmist."
 communist_elections.1.c:0 "Communist literature should be banned."
 communist_elections.1.d:0 "Infiltrate the [SCOPE.sParty('leftist_party').GetName] leadership."
 communist_elections.1.e:0 "The [SCOPE.sParty('leftist_party').GetName] has every right to spread its ideas."
 red_scare_minimized:0 "Red Scare Minimized"
 red_scare_communists_annoyed:0 "Red Scare Supported"
 infiltrating_communist_parties:0 "Party Infiltration"
 communist_elections.2.t:0 "Council Elections"
 communist_elections.2.d:0 "With the approaching Council Elections, workers among all our nation have expressed their overwhelming preference towards the [SCOPE.sParty('unions_party').GetName]."
 communist_elections.2.f:0 "If we don't vote for someone who defends our values, then why vote? The [SCOPE.sParty('unions_party').GetNameNoFormatting] shall look after our best interests, and only them. Who else is going to care? The military? The church? Those pompous, conceited kids of the [SCOPE.sParty('anti_union_party').GetNameNoFormatting]? I know for sure that I don't care about them."
 communist_elections.2.a:0 "The workers are always right."
 communist_elections.2.b:0 "Loyalty to the Party is mandatory."
 communist_elections.2.c:0 "Other voices should also be heard."
 communist_elections.2.tt:0 "The Worker's Party is in government."
 communist_elections.2.c.tt:0 "There's not a Worker's Party."
 mandatory_communist_support:0 "Mandatory Party Support"
 protected_fascist_rally_antifa:0 "Protected Fascist Rally"
 communist_elections.3.t:0 "Socialist Internationalism"
 communist_elections.3.d:0 "The [SCOPE.sParty('socialist_party').GetName] is receiving election campaign support from the [SCOPE.sCharacter('foreign_socialist_leader').GetIdeology.GetName] [SCOPE.gsInterestGroup('foreign_socialist_ig').GetName] in [SCOPE.sCountry('socialist_country').GetName]."
 communist_elections.3.f:0 "\"So comrades, come rally,\nAnd the last fight let us face,\nThe Internationale unites the human race.\""
 communist_elections.3.a:0 "[SCOPE.sCountry('socialist_country').GetAdjective] socialists are welcome here."
 communist_elections.3.b:0 "Try to limit foreign influence in the election."
 communist_elections.3.c:0 "Find and expel all infiltrators."
 election_socialist_support_tt:0 "The [SCOPE.sCharacter('foreign_socialist_leader').GetIdeology.GetName] ideology will be more likely to appear in our country."
 communist_elections.4.t:0 "The Blackshirts"
 communist_elections.4.desc:0 "[SCOPE.sCharacter('fascist_leader').GetIdeology.GetName] paramilitaries organized by the [SCOPE.sParty('fascist_party_scope').GetName] are using violence and coercion to intimidate voters loyal to rival parties."
 communist_elections.4.f:0 "Violence? Coercion? Someone has been looking at the dictionary lately, huh? If all we are doing is stating the facts, and people have nothing to rebate them, then why would that be called coercion? If I tell you that it won't snow unless it's cold, am I also coercing the weather?"
 communist_elections.4.a:0 "Tolerate fascist paramilitaries."
 communist_elections.4.b:0 "Reinforce paramilitaries with the army and police."
 communist_elections.4.c:0 "Attempt to enforce voter suppression laws."
 communist_elections.4.d:0 "Crack down on paramilitary organizations."
 communist_elections.4.tt:0 "A fascist leader is in government."
