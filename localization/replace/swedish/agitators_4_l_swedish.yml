 nihilism.2.t:0 "Ingenting tar slut"
 nihilism.2.d:0 "Det hårda förtrycket av den nihilistiska rörelsen har äntligen burit frukt, och ordet ”nihilism” har återigen blivit inget annat än ett fult ord."
 nihilism.2.f:0 "”Din värsta synd är att du har förstört och svikit dig själv helt i onödan.” \n\n– Fjodor Dostojevskij,#italic  Brott och straff#!"
 nihilism.2.a:0 "De ställde till med mer besvär än de hade någon rätt att göra."
 nihilism.2.b:0 "Använd detta för att återta vår kontroll över den akademiska världen."
 nihilism.3.t:0 "In i glömskan"
 nihilism.3.d:0 "Konflikten inom den nihilistiska rörelsen har till slut lett till att den har brunnit ut, men den radikala andan lever kvar. Före detta nihilister har i stora skaror anslutit sig till andra radikala rörelser."
 nihilism.3.f:0 "\"...tror du att jag kritiserar dem för att de pratar strunt? Inte alls! Jag gillar att de pratar strunt. Det är människans enda privilegium framför hela skapelsen. Genom misstag når man sanningen! Jag är en människa just därför att jag felar! Man når aldrig någon sanning utan att göra fjorton misstag, och troligen hundrafjorton. Och det är på sitt sätt en fin sak; men vi kan inte ens göra misstag på egen hand! Prata strunt, men prata ditt eget strunt, så ska jag kyssa dig för det. Att ha fel på sitt eget sätt är bättre än att ha rätt på någon annans.” \n\n– Fjodor Dostojevskij,#italic  Brott och straff#!"
 nihilism.3.a:0 "Bara en försmak av den konflikt som väntar."
 nihilism.3.b:0 "Låt dem försvinna in i det förflutna."
 nihilism.4.t:0 "Fördömanden av barnen"
 nihilism.4.d:0 "En populär medlem av[SCOPE.gsInterestGroup('intelligentsia_ig').GetName][ROOT.GetCountry.GetAdjective]    har gett ut en roman som fördömer trenden med nihilistiska excesser bland ungdomarna. Huvudpersonen, som öppet bekänner sig till nihilismen, påminner om [SCOPE.sCharacter('nihilist_scope').GetFullName]."
 nihilism.4.f:0 "”Saken är den att de förut helt enkelt var dumskallar, och nu har de plötsligt blivit nihilister.” \n\n– Ivan Turgenev,#italic  Fäder och söner#!"
 nihilism.4.a:0 "Åtminstone en av dem har lite förnuft."
 nihilism.4.b:0 "Men är inte huvudpersonen riktigt stilig?"
 nihilism.5.t:0 "Svarta rockar och Feuerbach"
 nihilism.5.d:0 "Det har blivit allt vanligare att studenter anammar nihilismens estetik och inställning vid[SCOPE.sState('university_nihilist_affected_state').GetName] [SCOPE.sBuilding('university_nihilist_affected_building').GetName] , och många parter har uttryckt oro över radikalismen inom den akademiska världen."
 nihilism.5.f:0 "”Det lilla utrymme jag upptar är så oändligt litet i jämförelse med resten av rymden, där jag inte finns och som inte har något med mig att göra; och den tidsperiod under vilken det är mitt öde att leva är så obetydlig jämfört med den evighet där jag inte har funnits och inte kommer att finnas... Och i denna atom, denna matematiska punkt, cirkulerar blodet, hjärnan arbetar och längtar efter något... Är det inte motbjudande? Är det inte obetydligt?” \n\n– Ivan Turgenev,#italic  Fäder och söner#!"
 nihilism.5.a:0 "Den enda utbildning dessa människor förtjänar är den man får genom livets hårda skola!"
 nihilism.5.b:0 "Detta är en fråga som faller under universitetsledningens ansvarsområde."
 nihilism.6.t:0 "Brist på respekt"
 nihilism.6.d:0 "En kvinna som[GetPopType('aristocrats').GetName]är knuten till[SCOPE.gsInterestGroup('landowners_ig').GetName]  har upprört anmält en händelse där en grupp studenter vägrade att flytta på sig för henne vid vägkanten och retade henne när hon gick förbi."
 nihilism.6.f:0 "”Har ni ingen respekt alls?” \n\n”Vad spelar det för roll om era kjolar måste släpa i snön? De är lika mycket värda oavsett om de blir fläckiga eller inte – samma värde som vilket annat plagg som helst.”\n\n ”Myndigheterna ska få höra talas om detta!” \n\nHånskratten från studenterna med sina rufsiga hår och svarta rockar följde henne medan hon skyndade iväg, röd i ansiktet."
 nihilism.6.a:0 "Hur långt kan dessa nihilisters fördärv sträcka sig?"
 nihilism.6.b:0 "Det är knappast en fråga för rättsväsendet."
 nihilism.7.t:0 "Kaos på gården"
 nihilism.7.d:0 "[SCOPE.sCharacter('nihilist_scope').GetFullName]Genom sitt besök[SCOPE.sBuilding('courtyard_chaos_affected_building').GetName][SCOPE.sState('courtyard_chaos_affected_state').GetName] har  väckt stor uppmärksamhet bland studenterna och stört verksamheten för flera personer med anknytning till [SCOPE.gsInterestGroup('wronged_by_nihilists_ig').GetName]."
 nihilism.7.f:0 "Talaren på talarstolen riktade sin uppmärksamhet mot flera olyckliga själar klädda i överklassens kläder och sträckte ut en arm. \n\n”Ser ni dem när de går förbi, dessa företrädare för den ondskefulla vidskepelsen? Ja, ser ni hur de döljer sina ansikten av skam? Sanningen är att de inte är bättre än någon av oss!”"
 nihilism.7.a:0 "Nu räcker det med det här tramset! Upplös demonstrationen."
 nihilism.7.b:0 "Vi kan inte förneka att det var en bra föreställning."
 nihilism.8.t:0 "Oheliga aktiviteter"
 nihilism.8.d:0 "En grupp nihilistiska studenter har genomfört en obscen och bisarr protest framför en kyrka, vilket har lett till krav från  på[SCOPE.gsInterestGroup('devout_ig').GetName]att dessa aktiviteter ska stoppas med våld."
 nihilism.8.f:0 "Kyrkoherden, som stod ute och sopade gången fram till kyrkans ingång, kunde bara stirra chockad när de jublande eleverna, klädda som präster, knöt upp sina kåpor och slängde dem upp i luften. Mörka tygstycken bildade korta moln i luften. Vid åsynen av deras nakna kroppar vände han bort huvudet och skymde sin syn med händerna. \n\n”Har ni ingen aning alls?!”"
 nihilism.8.a:0 "Spåra upp alla inblandade och åtala dem för hädelse!"
 nihilism.8.b:0 "Hur förväntar de sig att vi ska identifiera gärningsmännen?"
 nihilism.9.t:0 "Skatter och facklor"
 nihilism.9.d:0 "Mitt i natten har en grupp nihilister begått en anlagd brand mot en[SCOPE.sBuilding('kissed_by_fire_building').GetName]  i [SCOPE.sState('kissed_by_fire_state').GetName], vilket har lett till att den har skadats allvarligt av elden."
 nihilism.9.f:0 "”Du skriker av raseri när tomma byggnader brinner, men var är dina tårar när män och kvinnor med hjärtan fulla av kärlek dör av hunger?”"
 nihilism.9.a:0 "Förövarna kommer att återuppbygga det de förstörde i fängelset."
 nihilism.9.b:0 "Klassrummen kommer att hållas stängda tills byggnaden har renoverats."
 nihilism.10.t:0 "Klyftan inom den akademiska världen"
 nihilism.10.d:0 "I takt med att missnöjet inom den akademiska världen ökar har en ny, stolt[SCOPE.gsInterestGroup('intelligentsia_ig').GetLeader.GetIdeology.GetName]ledare för rörelsen[SCOPE.gsInterestGroup('intelligentsia_ig').GetName] trätt fram."
 nihilism.10.f:0 "”Livet för en begränsad människa förlöper nästan alltid smidigare och trevligare än livet för ett geni eller till och med bara en intelligent person. Klara människor har svårt att förhålla sig till de fenomen som massorna utan minsta svårighet vänjer sig vid. Intelligenta människor har, beroende på olika temperament och utvecklingsnivåer, de mest skiftande förhållanden till dessa fenomen.” \n\n– Dmitrij Pisarev"
 nihilism.10.a:0 "Håll noga koll på [SCOPE.sCharacter('nihilist_leader').GetFullName]."
 nihilism.10.b:0 "Kanske[SCOPE.sCharacter('nihilist_leader').GetSheHe]är det helt enkelt en följd av våra handlingar."
 nihilism.11.t:0 "En diskussion på forumet"
 nihilism.11.d:0 "[SCOPE.sCharacter('nihilist_scope').GetFullName] och[SCOPE.sCharacter('communist_scope').GetFullName]  har hamnat i en spontan offentlig diskussion om fördelarna med sina respektive ideologier."
 nihilism.11.f:0 "”Hur ska du någonsin kunna få stöd för din rörelse bortom de lättlurade arvingarna till borgarklassen?”, ropade mannen med den röda halsduken. ”Du har ingenting annat än estetik bakom dig, just det som du fördömer!” Nihilisten vände på\n\n sin svarta kappa och mötte sin motståndares blick. ”Du har uppenbarligen inget förtroende för folkets vilja när den väl har väckts...”"
 nihilism.11.a:0 "[SCOPE.sCharacter('nihilist_scope').GetFullName] slutar med en seger över motståndaren!"
 nihilism.11.b:0 "[SCOPE.sCharacter('communist_scope').GetFullName] har uppenbarligen starkare argument."
 nihilism.11.c:0 "De har potential att bli något större än summan av sina delar."
 nihilism.12.t:0 "De röda och de svarta förenas"
 nihilism.12.d:0 "[SCOPE.gsInterestGroup('devout_ig').GetName]Drivna av de nära banden mellan sina respektive agitatorer har  och[SCOPE.gsInterestGroup('intelligentsia_ig').GetName][SCOPE.gsInterestGroup('communist_ig').GetName]  börjat samarbeta för att motverka  :s inflytande."
 nihilism.12.f:0 "De utgjorde ett märkligt par – de pigga studenterna som uppenbarligen försökte efterlikna arbetarnas trasiga stil, och ändå verkade de komplettera varandra. I det fladdrande stearinljuset i källaren verkade nihilisternas slitna kläder nästan ha en äkta karaktär, för här visste de att de hade ingått ett avtal om att lida lika mycket om de åkte fast."
 nihilism.12.a:0 "Noll gånger två är fortfarande noll."
 nihilism.12.b:0 "Det[SCOPE.gsInterestGroup('communist_ig').GetName]kan väl ändå inte vara så att alla verkligen står enade bakom denna absurditet."
 nihilism.13.t:0 "Spiralformad uppstigning"
 nihilism.13.d:0 "De allt mer inflytelserika nihilistiska sympatisörerna inom regeringen har iscensatt ett drag för att avskaffa och med tvång avveckla all egendom som tillhör [SCOPE.gsInterestGroup('devout_ig').GetName], samt omedelbart införa [SCOPE.sLaw('current_law_scope').GetName]."
 nihilism.13.f:0 "”Det som går att krossa måste krossas. Det som tål slaget är värdigt att överleva; det som går i bitar är skräp. I vilket fall som helst, slå till åt höger och vänster – det kan inte göra någon skada.” \n\n– Dmitrij Pisarev"
 nihilism.13.a:0 "Den[SCOPE.gsInterestGroup('devout_ig').GetName]kommer att gå under, ty den strider mot själva verkligheten!"
 nihilism.13.b:0 "Den här vägen är dömd att misslyckas!"
