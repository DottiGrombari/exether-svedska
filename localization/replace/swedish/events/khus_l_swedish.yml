 khus_events.20.t:0 "To Stand Where He Stood"
 khus_events.20.d:0 "The laboratory where [concept_alestair_marktaros] first pored over the [GetCulture('vynduri').GetName] scrolls that would inadvertently cause the [concept_nightfall] is but a ghost of its former glory. One of the foremost [ROOT.GetCountry.GetAdjectiveNoFormatting] experts in archeotechnology has submitted a plan to revivify the $building_khus_lab_3$ in an arcane style unique to $STATE_ZAHRAFI$."
 khus_events.20.f:0 "While much of that which was not lost to the Nightfall has now been lost to time or to looters, the core sections of the laboratory could be brought back to a working condition with enough labor and materials.\n\nOnce approved, construction can start immediately."
 khus_events.20.a:0 "Entrust this architect to oversee the renovation."
 khus_events.20.b:0 "Have we learned nothing?"
 khus_lab_1_construct_tt:0 "The $building_khus_lab_1$ may be constructed in the State Panel for [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_ZAHRAFI')]"
 khus_lab_2_construct_tt:0 "The $building_khus_lab_2$ may be constructed in the State Panel for [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_ZAHRAFI')]"
 khus_lab_3_construct_tt:0 "Another wing for the $building_khus_lab_3$ may be constructed in the State Panel for [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_ZAHRAFI')]. It requires $electrical_capacitors$ [concept_technology]."
 dismissed_khus_lab_je_tt:0 "#r The #bold $je_khus_lab$#! [concept_journal_entry] will be dismissed#!"
 khus_lab_accepted:0 "Accepted Laboratory Renovation"
 khus_lab_rejected:0 "Refused Laboratory Renovation"
 khus_events.21.t:0 "As He Left It"
 khus_events.21.d:0 "Steady progress has been made in the restoration of the $building_khus_lab_3$. Impressed with the architect's devotion to the project, the [SCOPE.gsInterestGroup('relevant_ig').GetName] are clamoring to support the next phase of construction."
 khus_events.21.f:0 "From afar, the east-facing spellforge of $building_khus_lab_1$ shines when bathed in the golden rays of dawn. Even in this partially constructed state, the laboratory is a marvel."
 khus_events.21.a:0 "The [SCOPE.gsInterestGroup('relevant_ig').GetNameNoFormatting] are sharp-eyed."
 khus_events.22.t:0 "Anachronistic Power Requirements"
 khus_events.22.d:0 "Due to limitations with arcane energy storage, [concept_alestair_marktaros] was never able to finish the laboratory as he planned; this limitation will soon be surpassed by modern magitech."
 khus_events.22.f:0 "Marktaros' original plans for the laboratory were far beyond what was completed within his lifetime. The primary limitation was one of energy consumption; there were no known ways to safely compress the amount of arcane energy needed to power the experiments he wished to conduct.\n\nHowever, magical technology has advanced far beyond what was possible in Marktaros' lifetime; perhaps it is time to revisit these plans."
 khus_events.22.a:0 "His legacy will live on."
 khus_events.23.t:0 "The End, for Now"
 khus_events.23.d:0 "The final layer of the $building_khus_lab_3$ has been completed, signaling the end of construction. The arcane architect's extraordinary vision is a cultural touchstone here in [SCOPE.sState('relevant_state').GetName]."
 khus_events.23.f:0 "After so many years of construction, the ambitious arcane capacitor designs of [concept_alestair_marktaros] have been realized. Foreign travelers who come to the $building_khus_lab_3$ marvel at the structure's unique style. Two visitors stand before the newest addition to the laboratory.\n\n\"Breathtaking,\" one traveler remarks, unable to conceal the awe in his voice.\n\nHis companion, however, looks on skeptically. \"Perhaps this arcane style is an acquired taste.\""
 khus_events.23.a:0 "Such exceptional magic!"
 khus_events.23.b:0 "A true architectural marvel."
 khus_lab_reward_loc:0 "Modern Masterpiece"
 khus_lab_reward_int:0 "Arcane Acclaim"
 khus_lab_construction:0 "Designs of [Concept('concept_alestair_marktaros', '$concept_marktaros_short$')]"
 modifier_khussite_religious_fevor:0 "Einaire Yol"
 death_of_a_legend:0 "Death of a Legend"
 khus_reconstruction:0 "Vynasyva"
 sell_myvasa_island:0 "Sell the Myvasa Islands"
 sell_myvasa_island_desc:0 "The Myvasa Islands are an island chain in the Novaĵlandio archipelago. While not very useful to us, Vairian nationalists eye the isles with great interest. We could sell the islands in exchange for an obligation and overlordship of Lisinia."
 join_ath:0 "Join with Athrensei"
 join_ath_desc:0 "The Thynadûr threat has only intensified within recent years. Only joining the rising Athrensei banner can we stand strong against them."
