 je_roe_crown_of_the_peaks:0 "Crown of the Peaks"
 je_roe_crown_of_the_peaks_reason:0 "The mountains of [GetGeographicRegion('geographic_region_aritzakarri').GetName] are crowned with ancient avian cities. Each of these is colloquially known as a [GetBuildingType('building_highroost').GetName]. Built upon sheer cliffs and sacred peaks, these settlements have for centuries been the centers of avian authority, ritual, and prestige. From their heights, rulers once commanded the labor of entire valleys and presided over great terrace harvests and ceremonial feasts.\n\nYet the centuries have not been kind to these lofty capitals. Wars, migrations, and the long years of decline that followed the fall of earlier empires have left many Highroosts diminished. Some remain proud citadels ruled by rival [GetCulture('whitefeather').GetName] and [GetCulture('cliffpercher').GetName] states. Others stand half-abandoned, their terraces overgrown and their plazas silent.\n\nShould a single power bring every [GetBuildingType('building_highroost').GetName] under its banner, rebuilding those that have fallen and subduing those that remain defiant, none could dispute their claim to leadership over the peoples of the peaks. From such heights, a ruler may look down upon all [GetGeographicRegion('geographic_region_aritzakarri').GetName]."
 je_roe_crown_of_the_peaks_lobby:0 "The mountains of [GetGeographicRegion('geographic_region_aritzakarri').GetName] are crowned with ancient avian cities. Each of these is colloquially known as a [GetBuildingType('building_highroost').GetName]. Built upon sheer cliffs and sacred peaks, these settlements have for centuries been the centers of avian authority, ritual, and prestige. From their heights, rulers once commanded the labor of entire valleys and presided over great terrace harvests and ceremonial feasts.\n\nYet the centuries have not been kind to these lofty capitals. Wars, migrations, and the long years of decline that followed the fall of earlier empires have left many Highroosts diminished. Some remain proud citadels ruled by rival [GetCulture('whitefeather').GetName] and [GetCulture('cliffpercher').GetName] states. Others stand half-abandoned, their terraces overgrown and their plazas silent.\n\nShould a single power bring every [GetBuildingType('building_highroost').GetName] under its banner, rebuilding those that have fallen and subduing those that remain defiant, none could dispute their claim to leadership over the peoples of the peaks. From such heights, a ruler may look down upon all [GetGeographicRegion('geographic_region_aritzakarri').GetName]."
