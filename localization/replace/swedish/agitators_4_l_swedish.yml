 agitators_election_events.1.t:0 "Fruktbara rekommendationer"
 agitators_election_events.1.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName]Som en gest av solidaritet med  har  uppmanat[SCOPE.sCharacter('agitator_scope').GetHerHis]sina[SCOPE.sParty('agitator_party_scope').GetName] anhängare att rösta på partiet i det pågående valet."
 agitators_election_events.1.f:0 "Till glädje för alla som värnar om principer –[SCOPE.sParty('agitator_party_scope').GetNameNoFormatting]har organisationen en lång historia av utmärkta insatser. Jag kan inte berömma dessa modiga män och kvinnor nog, som kämpar[ROOT.GetCountry.GetNameNoFormatting]vidare under organisationens namn."
 agitators_election_events.1.a:0 "[SCOPE.sCharacter('agitator_scope').GetSheHe|U] får vi verkligen tacka honom för."
 agitators_election_events.1.b:0 "Det vore bäst om detta stöd uttrycktes mer konkret."
 agitators_election_events.2.t:0 "En oplanerad debatt"
 agitators_election_events.2.d:0 "[SCOPE.sState('debate_state').GetName]Under arbetet med att stödja[SCOPE.sParty('agitator_party_scope').GetName]  i  har  stött på [SCOPE.sCharacter('agitator_scope_2').GetFullName],[SCOPE.sCharacter('agitator_scope').GetFullName] som företräder [SCOPE.sParty('agitator_2_party_scope').GetName]. En het debatt har brutit ut mellan dem."
 agitators_election_events.2.f:0 "Han sträckte[SCOPE.sCharacter('agitator_scope').GetHerHis] ut sina imponerande rockfållor,[SCOPE.sCharacter('agitator_scope').GetSheHe]tog ett steg framåt och betraktade[SCOPE.sCharacter('agitator_scope').GetHerHis] sin nya motståndare med en blick som uttryckte motvillig respekt. \n\n”Du ska veta att...”"
 agitators_election_events.2.a:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] är betydligt mer övertygande."
 agitators_election_events.2.b:0 "[SCOPE.sCharacter('agitator_scope_2').GetFullName]De bättre argumenten tillhör helt klart ."
 agitators_election_events.3.t:0 "Falsk demokrati"
 agitators_election_events.3.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har riktat skarp kritik mot valsystemet[ROOT.GetCountry.GetAdjective] och uppmanat till att avstå från att rösta i det som[SCOPE.sCharacter('agitator_scope').GetSheHe]man kallar en skenföreställning som iscensatts för att blidka folket."
 agitators_election_events.3.f:0 "I den reaktionära diktaturen, där de rika och mäktiga härskar och döljer sig bakom en demokratisk fasad, är det bästa man kan göra att visa på meningslösheten i en sådan skenbild, så att folket kan sporras till handling oavsett vilka eftergifter som görs."
 agitators_election_events.3.a:0 "Regeringen måste inse att vi genomskådar deras system."
 agitators_election_events.3.b:0 "Att undergräva systemet är nästa steg mot revolutionen!"
 agitators_election_events.3.c:0 "Röstar inte deras anhängare? Våra gör det i alla fall."
 agitators_election_events.4.t:0 "Aggressiv valkampanj"
 agitators_election_events.4.d:0 "[SCOPE.sParty('opposition_party_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName], efter ett tal där[SCOPE.sCharacter('agitator_scope').GetSheHe] han fördömde , har börjat mobilisera hängivna anhängare för att motsätta sig det i valet."
 agitators_election_events.4.f:0 "\n”Ett principlöst träsk”\n, ”Hör hemma inte i [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')], utan i fängelse”\n, ”Utan några positiva prestationer”\n, ”En kollektiv självparodi”, ”En skam för [ROOT.GetCountry.GetAdjectiveNoFormatting]nationen”\n, ”Ned med [SCOPE.sParty('opposition_party_scope').GetNameNoFormatting]!”"
 agitators_election_events.4.a:0 "Det finns säkert ett bättre alternativ."
 agitators_election_events.4.b:0 "En skara skurkar, verkligen!"
 agitators_election_events.5.t:0 "Felaktig måttfullhet"
 agitators_election_events.5.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har kritiserat ett flertal beslut som fattats av ledningen inom[SCOPE.sCharacter('agitator_scope').GetHerHis]den egna organisationen [SCOPE.sParty('agitator_party_scope').GetName]och beskrivit den som[SCOPE.sCharacter('agitator_ig_leader_scope').GetFullName]alltför försiktig och ovillig att ta itu med kritiska frågor."
 agitators_election_events.5.f:0 "”När jag ser på de aktiviteter vi bedriver – särskilt de som är avgörande för att utöka vår krets av anhängare – undrar jag ofta om[SCOPE.sCharacter('agitator_ig_leader_scope').GetLastNameNoFormatting]partiet verkligen är medvetet om, eller engagerat i, deras framgång. Vår insamlingsverksamhet är i allmänhet godtagbar – partiets kassa ger inget anledning till klagomål, och inte heller våra revisorer – men dessa resurser har ännu inte mobiliserats på ett sätt som gynnar det allmänna bästa.”\n\nOch därför är min tes följande: vad är[SCOPE.sCharacter('agitator_ig_leader_scope').GetLastNameNoFormatting]  avsikten, och hur kan man bäst få  att ändra[SCOPE.sCharacter('agitator_ig_leader_scope').GetHerHis]sig i denna fråga?”"
 agitators_election_events.5.a:0 "Det vore bäst att helt enkelt göra som[SCOPE.sCharacter('agitator_scope').GetSheHe]han vill."
 agitators_election_events.5.b:0 "Låt det bli en prioritet att öka den energi vi lägger ner."
 agitators_election_events.5.c:0 "Uteslut[SCOPE.sCharacter('agitator_scope').GetHerHim]honom från mötena tills[SCOPE.sCharacter('agitator_scope').GetSheHe]han ber om ursäkt."
 agitators_election_events.6.t:0 "Kvinnornas uppror"
 agitators_election_events.6.d:0 "Förespråkandet av[SCOPE.sCharacter('agitator_scope').GetFullName]  har lett till att[SCOPE.sParty('agitator_party_scope').GetName]  har vunnit större popularitet bland kvinnorna, som har skyndat sig att utöva sin nyvunna rösträtt."
 agitators_election_events.6.f:0 "När vi marscherar, marscherar, i dagens skönhet, \nEn miljon mörka kök, tusen grå\n kvarnloft Berörs av all den glans som en plötslig sol avslöjar, \nFör folket hör oss sjunga: ”Bröd och rosor, bröd och rosor.”\n\nNär vi marscherar, marscherar, kämpar vi också för männen – \nför de är kvinnornas barn och vi tar hand om dem som mödrar igen. \nVåra dagar ska inte präglas av svett från födseln till livets slut – \nhjärtan svälter lika väl som kroppar: Ge oss bröd, men ge oss rosor."
 agitators_election_events.6.a:0 "[SCOPE.sParty('agitator_party_scope').GetName]Inför valet av !"
 agitators_election_events.6.b:0 "För att[ROOT.GetCountry.GetAdjective] stärka demokratin!"
 agitators_election_events.7.t:0 "Produktion och omrörning"
 agitators_election_events.7.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName][SCOPE.sParty('agitator_party_scope').GetName]I samarbete med  har  slutit ett avtal om billiga broschyrer som snabbt kan distribueras till stöd för partiet."
 agitators_election_events.7.f:0 "Inuti vagnen väntade en trevlig överraskning – en låda med flera tusen broschyrer, tryckta i industriell skala, var och en med instruktioner om hur man röstar och en billigt kopierad logotyp för [SCOPE.sParty('agitator_party_scope').GetNameNoFormatting]. De vägde en hel del – och skulle,[SCOPE.sCharacter('agitator_scope').GetSheHe]hoppades man, visa sig vara till lika stor nytta."
 agitators_election_events.7.a:0 "Låt våra motståndare drunkna i ett hav av papper!"
 agitators_election_events.7.b:0 "Dessa kopplingar kan komma till nytta senare."
 agitators_election_events.8.t:0 "Partiets favoriter"
 agitators_election_events.8.d:0 "Den del av  som[SCOPE.sParty('agitator_party_scope').GetName]är knuten till[SCOPE.gsInterestGroup('snubbed_ig_scope').GetName]  har framfört klagomål över  [SCOPE.sCharacter('agitator_scope').GetFullName]s val av stödpersoner, vilket enligt dem har lett till att deras anhängare har försummats."
 agitators_election_events.8.f:0 "”Nu när detta har kommit till min kännedom måste jag uttrycka en oro. Även om [SCOPE.sCharacter('agitator_scope').GetFullNameNoFormatting][namn]s agerande utan tvekan är välmenande, verkar de rekommendationer som ingår däri utesluta vissa partimedlemmar som har visat mer än tillräckligt med handlingskraft, god vilja och målmedvetenhet.”"
 agitators_election_events.8.a:0 "[SCOPE.gsInterestGroup('snubbed_ig_scope').GetName]Lyssna på deras farhågor och lugna dem."
 agitators_election_events.8.b:0 "Eftergivenhet? Vet de inte att det var helt avsiktligt?"
 agitators_election_events.9.t:0 "Demokratisk solidaritet"
 agitators_election_events.9.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]Som en gest till stöd [SCOPE.sCharacter('agitator_scope').GetFullName]för rösträtten har  uttryckt sitt positiva stöd för  för dess orubbliga engagemang för rösträtten i [ROOT.GetCountry.GetName]."
 agitators_election_events.9.f:0 "”Det finns ingen fråga som är[ROOT.GetCountry.GetGovernment.GetName]viktigare för oss än frågan om rösträtten – det sätt på vilket folket kan ta ställning till alla framtida frågor som de ställs inför. Med detta i åtanke bör mitt stöd inte komma som någon överraskning...”"
 agitators_election_events.9.a:0 "Den här[SCOPE.sParty('agitator_party_scope').GetName]är franchisens[ROOT.GetCountry.GetAdjective] väktare!"
 agitators_election_events.9.b:0 "Kanske vissa partimedlemmar mer än andra."
 agitators_election_events.10.t:0 "En stormig valkampanj"
 agitators_election_events.10.d:0 "Under valkampanjen i det[SCOPE.sParty('agitator_party_scope').GetName]av oroligheter härjade [SCOPE.sState('tumultuous_state_scope').GetName]landet[SCOPE.sCharacter('agitator_scope').GetFullName]har  blivit attackerad och brutalt misshandlad av en grupp okända angripare."
 agitators_election_events.10.f:0 "När folkmassan skingrats och skriken tystnat var[SCOPE.sCharacter('agitator_scope').GetHerHis] det enda som återstod på gatan en liggande gestalt, full av blåmärken och skärsår, knappt igenkännlig som den titan[SCOPE.sCharacter('agitator_scope').GetSheHe]han hade varit knappt fem minuter tidigare."
 agitators_election_events.10.a:0 "Det vore bäst med lite vila och återhämtning."
 agitators_election_events.10.b:0 "Gå tillbaka till stigen direkt."
 agitators_election_events.10.c:0 "Vi vet förstås vem det var. Det var vi."
 agitators_election_events.11.t:0 "Röstsedel eller kula"
 agitators_election_events.11.d:0 "Den särskilt effektiva kampanjverksamhet som[SCOPE.sCharacter('agitator_scope').GetFullName]har bedrivits i[SCOPE.sState('communist_agitation_state').GetName]har väckt frågor om organisationens[SCOPE.sParty('agitator_party_scope').GetName] slutgiltiga mål under denna valperiod."
 agitators_election_events.11.f:0 "”Kommunistpartiets främsta uppgift är att leda arbetarklassen in i den revolutionära kampen om makten. När partiet fastställer sin taktiska linje måste det ta hänsyn till den konkreta inre och yttre situationen, förhållandet mellan klasskrafterna, borgarklassens stabilitet och styrka, proletariatets beredskap, de olika mellanliggande skiktens ställning m.m. i sitt land. Partiet fastställer paroller och kampmetoder i enlighet med dessa omständigheter, i syfte att organisera och mobilisera massorna i så stor skala som möjligt och på den högsta möjliga nivån i denna kamp.” \n\n–#italic  Kommunistiska internationalens program#!, 1929"
 agitators_election_events.11.a:0 "[SCOPE.sParty('agitator_party_scope').GetName]Valet är upptakten till revolutionen."
 agitators_election_events.11.b:0 "Arbetarnas makt kommer att uppnås genom ett[SCOPE.sParty('agitator_party_scope').GetName]parlament."
 agitators_election_events.11.c:0 "Den[SCOPE.sParty('agitator_party_scope').GetName]  representerar inte arbetarklassen."
 agitators_election_events.12.t:0 "Den revolutionära linjen"
 agitators_election_events.12.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]Eftersom partiets kampanjmedel nu är väl etablerade [SCOPE.sCharacter('agitator_scope').GetFullName]har  föreslagit för partiledningen att en del av dessa medel ska omfördelas till partiets mer hemliga verksamhet."
 agitators_election_events.12.f:0 "”Vi, som proletariatets parti, är skyldiga att följa den väg som leder till förverkligandet av socialismen i [land][ROOT.GetCountry.GetNameNoFormatting] och så småningom i hela världen. Överklassen kommer inte att träda åt sidan utan motstånd – även om vi måste följa denna parlamentariska väg måste vi bygga upp krafter för att avvärja den oundvikliga statskuppen som kommer att följa på vår seger.”"
 agitators_election_events.12.a:0 "Medlen kan omfördelas till utbildning av våra Röda gardister."
 agitators_election_events.12.b:0 "Risken att bli inblandad i en skandal är för stor."
 agitators_election_events.12.c:0 "Alla tillgängliga resurser måste användas för att främja revolutionen."
 agitators_election_events.13.t:0 "Att vandra bland folket"
 agitators_election_events.13.d:0 "[SCOPE.sParty('agitator_party_scope').GetName] Organisatörer under ledning av[SCOPE.sCharacter('agitator_scope').GetFullName]  har rest ut på landsbygden för att väcka klassmedvetande bland  bönderna[ROOT.GetCountry.GetAdjective]."
 agitators_election_events.13.f:0 "Här, förlorade i den vidsträckta vildmarken mellan rökbrända enklaver, levde de vars liv inte hade förändrats på femhundra år.\n\nDe skrapade i jorden, sådde frön för att klara sig på det allra nödvändigaste och överlämnade allt överskott till sina feodala jordherrar. De tänkte endast på sin nuvarande situation, omedvetna om den rödaktiga solen som skulle stiga upp över deras mjuka kullar redan nästa morgon."
 agitators_election_events.13.a:0 "Ett djärvt steg för att främja alliansen mellan arbetare och bönder."
 agitators_election_events.13.b:0 "De bör inrikta sina insatser på att organisera mot hyresvärdssystemet."
 agitators_election_events.14.t:0 "Kommunistisk demonstration i [SCOPE.sState('capital_scope').GetName]"
 agitators_election_events.14.d:0 "En stor demonstration, ledd av[SCOPE.sCharacter('agitator_scope').GetFullName]  till stöd för ,[SCOPE.sParty('agitator_party_scope').GetName]har hållits i [SCOPE.sState('capital_scope').GetName], och lockat kommunistiska anhängare från hela regionen. Den retorik som använts vid demonstrationen har väckt farhågor om att våld snart kan bryta ut."
 agitators_election_events.14.f:0 "[SCOPE.sCharacter('agitator_scope').GetHerHim][SCOPE.sCharacter('agitator_scope').GetLastNameNoFormatting], längst fram i folkmassan, blickade mot den smala raden av blått och svart längst bort på gatan och sedan tillbaka mot den vidsträckta, rödaktiga massan bakom sig.[SCOPE.sCharacter('agitator_scope').GetSheHe|U]  tvekade inte. Med den värdighet som kännetecknar den som orädd gör avgrunden till sin egen,[SCOPE.sCharacter('agitator_scope').GetSheHe]  tog  ytterligare ett steg framåt in i det vilda tumultet."
 agitators_election_events.14.a:0 "En underbar dag för invånarna i [SCOPE.sState('capital_scope').GetName]!"
 agitators_election_events.14.b:0 "Vi ska visa Reds hur våld ser ut."
 agitators_election_events.14.c:0 "[SCOPE.sParty('fascist_party_scope').GetName]”s anhängare kommer att ta itu med dessa skurkar.”"
 agitators_election_events.15.t:0 "Enhetsfronten"
 agitators_election_events.15.d:0 "Partiets[SCOPE.sParty('fascist_party_scope').GetName] framgångar i de senaste[ROOT.GetCountry.GetAdjective]valen har fått[SCOPE.sCharacter('agitator_scope').GetFullName]  och partiledningen[SCOPE.sParty('agitator_party_scope').GetName]att föreslå en enhetsfront mellan de vänster- och liberala partierna mot fascismen."
 agitators_election_events.15.f:0 "Och just för att han är en människa vill en man gärna ha \nnågot att äta; \nhan vill inte ha något trams och en massa prat\n som inte ger vare sig bröd eller kött."
 agitators_election_events.15.a:0 "[SCOPE.sParty('fascist_party_scope').GetName]Vad som helst är bättre än dennes vision."
 agitators_election_events.15.b:0 "Socialdemokratin är helt enkelt fascismens vänsterflygel."
 agitators_election_events.16.t:0 "Praktisk invändning"
 agitators_election_events.16.d:0 "Genom att betrakta[SCOPE.sParty('communist_party_scope').GetName]  som ett allvarligt hot mot  nationen[ROOT.GetCountry.GetAdjective] [SCOPE.sParty('agitator_party_scope').GetName]har  uppmuntrat anhängare av  att organisera sig[SCOPE.sParty('agitator_party_scope').GetName] i grupper och attackera misstänkta kommunister på gatorna."
 agitators_election_events.16.f:0 "”Det finns personer inom vår egen regering som tror att  är ett parti som alla andra. Det är det[SCOPE.sParty('communist_party_scope').GetNameNoFormatting] inte! Denna klick är inte egentligen ett politiskt parti, utan en täckorganisation för ett hemligt sällskap som släpper in utlänningar, spioner och minderåriga i sina led. Dess försök att krypa in i de mörka hörnen av våra städer måste bemötas med det enda som dessa djur förstår – det godas kraft,[ROOT.GetCountry.GetAdjectiveNoFormatting]  nävarna!”"
 agitators_election_events.16.a:0 "Angrip kommunistiska partisaner varhelst de dyker upp."
 agitators_election_events.16.b:0 "Rikta in er på kommunisternas ledare för att krossa folkets kampvilja."
 agitators_election_events.16.c:0 "Detta våld kommer att bli demokratins undergång!"
 agitators_election_events.17.t:0 "Samarbete och kapital"
 agitators_election_events.17.d:0 "För att säkra ytterligare stöd för  har[SCOPE.sCharacter('agitator_scope').GetFullName][SCOPE.sParty('agitator_party_scope').GetName]  och flera högt uppsatta partimedlemmar vänt sig till[SCOPE.gsInterestGroup('industrialists_scope').GetName]  för att främja en politik som syftar till att säkerställa samarbetet mellan kapitalet och en[SCOPE.sParty('agitator_party_scope').GetName]  regering."
 agitators_election_events.17.f:0 "”Fascismen borde egentligen kallas korporativism, eftersom den innebär en sammansmältning av statens och näringslivets makt.” \n\n– Benito Mussolini"
 agitators_election_events.17.a:0 "De[SCOPE.sParty('agitator_party_scope').GetName]kommer att visa sig vara utmärkta allierade."
 agitators_election_events.17.b:0 "De[SCOPE.gsInterestGroup('industrialists_scope').GetName]  behöver inte deras försäkringar."
 agitators_election_events.18.t:0 "För nationell enighet"
 agitators_election_events.18.d:0 "Med hänvisning till det uppenbara och överhängande hot som ”kommunister och kommunistsympatiserande grupper” utgör mot nationen[ROOT.GetCountry.GetAdjective] har man efterlyst en kampanj för nationell enighet för att besegra kommunismen,[SCOPE.sCharacter('agitator_scope').GetFullName] organiserad under ledning av [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.18.f:0 "”I dessa tider måste vi, som lojala medborgare i nationen[ROOT.GetCountry.GetAdjectiveNoFormatting], stå enade och alltid vara vaksamma. Inom våra gränser finns regeringens fiender, utländska agenter som vill riva ner allt som gör vårt land stort. Men de är få till antalet, mina vänner, och vi är många...”"
 agitators_election_events.18.a:0 "Det röda hotet får inte tillåtas få fotfäste här!"
 agitators_election_events.18.b:0 "Nationell enighet, visserligen, men inte bakom [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.19.t:0 "Den röda terrorn utomlands"
 agitators_election_events.19.d:0 "I ett tal nyligen har[SCOPE.sCharacter('agitator_scope').GetFullName]  direkt pekat på situationen i[SCOPE.sCountry('scary_communist_country').GetName]  som ett exempel på vad som väntar[ROOT.GetCountry.GetAdjective]  samhället om  inte[SCOPE.sParty('agitator_party_scope').GetName]kommer till makten. Enligt  [SCOPE.sCharacter('agitator_scope').GetHerHim]är det endast[SCOPE.sCharacter('agitator_scope').GetSheHe]  som kan rädda nationen från kommunismen."
 agitators_election_events.19.f:0 "”I vissa kretsar har det talats om en strejk – ett försök från kommunisternas sida att ta makten och förvandla[ROOT.GetCountry.GetNameNoFormatting]landet till en blodröd mardröm! Låt mig påminna er om vad de vill. I [SCOPE.sCountry('scary_communist_country').GetNameNoFormatting]har de gjort kvinnor till statens egendom! De har bränt präster levande! De har överfallit banker och småföretagare! \n\nVi ska inte tillåta att kommunisterna i detta land ersätter oss och styr våra angelägenheter. Det här är [ROOT.GetCountry.GetNameNoFormatting], inte [SCOPE.sCountry('scary_communist_country').GetNameNoFormatting]!”"
 agitators_election_events.19.a:0 "Hela nationen måste enas mot hotet[SCOPE.sCountry('scary_communist_country').GetAdjectiveNoFormatting]!"
 agitators_election_events.19.b:0 "Kanske[SCOPE.sCharacter('agitator_scope').GetSheHe]borde man rikta[SCOPE.sCharacter('agitator_scope').GetHerHis]retoriken mer inåt."
 agitators_election_events.19.c:0 "Det här är inget annat än skrämselpropaganda och struntprat."
 agitators_election_events.20.t:0 "Hat i handling"
 agitators_election_events.20.d:0 "Partisaner med anknytning till[SCOPE.sParty('agitator_party_scope').GetName]  har begått en rad våldsamma och förnedrande handlingar mot[SCOPE.sCulture('hate_crime_culture').GetName]  människor i [SCOPE.sState('hate_crime_state').GetName]. Motståndare till[SCOPE.sParty('agitator_party_scope').GetName]  har anklagat[SCOPE.sCharacter('agitator_scope').GetFullName]  för att ha uppmuntrat attacken genom[SCOPE.sCharacter('agitator_scope').GetHerHis]  extrem retorik."
 agitators_election_events.20.f:0 "Krossat glas och aska som knastrade under fötterna. Skyltar som var vanställda med fascismens symboler. Kroppar svarta av eld, som fortfarande låg kvar där paramilitärerna hade fällt dem. Inspektören visste att de aldrig skulle kunna identifieras tillräckligt väl för att väcka åtal. \n\nNär han satte sig på en bänk i närheten och betraktade platsen, slog en bitter tanke honom. Av de män som hade till uppgift att lösa detta fall, hur många av dem hade egentligen sett det med egna ögon, genom svarta masker?"
 agitators_election_events.20.a:0 "De[SCOPE.sParty('agitator_party_scope').GetName]är avskyvärda spridare av grundlöst hat."
 agitators_election_events.20.b:0 "Kan någon verkligen bevisa[SCOPE.sCharacter('agitator_scope').GetSheHe]att det fanns skäl att vidta denna åtgärd?"
 agitators_election_events.20.c:0 "[SCOPE.sCulture('hate_crime_culture').GetName][SCOPE.sCharacter('agitator_scope').GetSheHe|U] är en sann försvarare av [ROOT.GetCountry.GetName], och  är dess fiender."
 agitators_election_events.21.t:0 "Franchise för jordbrukare"
 agitators_election_events.21.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]På uppdrag av  har  påbörjat en turné i olika landsbygds- och avlägset belägna regioner i [ROOT.GetCountry.GetName],[SCOPE.sCharacter('agitator_scope').GetFullName] i syfte att registrera väljare och se till att röstsedlarna samlas in i svåråtkomliga samhällen."
 agitators_election_events.21.f:0 "”Inbäddat högt uppe på bergstopparna, mitt i mörka skogar, omgivet av öde slätter, utan att finnas utmärkt på någon karta… ändå finns det människor just här. Det är vår plikt att stärka var och en av dem.”"
 agitators_election_events.21.a:0 "[SCOPE.sParty('agitator_party_scope').GetName]Alla borde få höra talas om organisationens uppdrag!"
 agitators_election_events.21.b:0 "En man, en röst – oavsett hur avlägset man bor!"
 agitators_election_events.22.t:0 "Värderingar på landsbygden"
 agitators_election_events.22.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]Gruppen, som drivs av [SCOPE.sCharacter('agitator_scope').GetFullName], har inlett en folkrörelse med fokus på att bevara landsbygdens värden i en tid präglad av snabba och skrämmande förändringar."
 agitators_election_events.22.f:0 "”Man kan säga att det är nytt och bättre, att det kommer att ge oss mer att köpa eller berika våra barn. Men det som spelar roll är att det är främmande och annorlunda, att det gör oss arbetslösa, och att vi inte har bett om det.”"
 agitators_election_events.22.a:0 "[SCOPE.sParty('agitator_party_scope').GetName]Stöd din kommun – rösta på !"
 agitators_election_events.22.b:0 "Vi måste bilda en bredare koalition mot dessa främmande tendenser."
 agitators_election_events.23.t:0 "Svärd och plogbillar"
 agitators_election_events.23.d:0 "[SCOPE.sParty('armed_forces_party_scope').GetName][SCOPE.sParty('agitator_party_scope').GetName]En diskussion om folkets roll i den militära ledningen mellan[SCOPE.sCharacter('armed_forces_leader').GetFullName]  och[SCOPE.sCharacter('agitator_scope').GetFullName]  har utlöst en ordväxling mellan  och ."
 agitators_election_events.23.f:0 "”Den ärade[SCOPE.sCharacter('agitator_scope').GetLastNameNoFormatting]  har, med all respekt, ingen aning om vad[SCOPE.sCharacter('agitator_scope').GetSheHe]  talar om. Det finns en anledning till att[SCOPE.gsInterestGroup('armed_forces_scope').GetNameNoFormatting]  kan sköta sina egna angelägenheter – vi är särskilt utbildade för detta, och man kan helt enkelt inte förvänta sig att vanligt folk ska ha samma kunskapsnivå.”"
 agitators_election_events.23.a:0 "Ja, folket vet!"
 agitators_election_events.23.b:0 "Militära frågor bör man helst överlåta åt generalerna."
 agitators_election_events.24.t:0 "Kamp för antiimperialism"
 agitators_election_events.24.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]En oväntat populär agitationskampanj mot[SCOPE.sCharacter('agitator_scope').GetFullName] regeringens kolonialpolitik[ROOT.GetCountry.GetAdjective] har lett till ett kraftigt ökat allmänintresse för partiets politiska program."
 agitators_election_events.24.f:0 "Av alla utställningar var det utan tvekan skildringarna av avlägsna grymheter som lockade flest åskådare. Vuxna män stod med vidöppna ögon medan deras blickar följde källan till de röda floderna, och barn gömde sig bakom sina mödrar för att undkomma de anklagande blickarna från männen med bajonetter.\n\nDet var inte någon invecklad slogan som avgjorde saken, eller någon skicklig retorisk vändning – det var just detta, den enda fras man behövde när man såg sådana saker: \n\n”Hur kan vi stoppa det?”"
 agitators_election_events.24.a:0 "Använd denna energi för att stödja antiimperialistisk politik."
 agitators_election_events.24.b:0 "Endast  tar ställning[SCOPE.sParty('agitator_party_scope').GetName] mot meningslöst krig!"
 agitators_election_events.25.t:0 "Röster för ”Clear Skies”"
 agitators_election_events.25.d:0 "[SCOPE.sState('industry_enroachment_state').GetName]Efter den senaste tidens industriella expansion i landsbygdssamhällena i[SCOPE.sCharacter('agitator_scope').GetFullName]har man inlett en lokal kampanj för [SCOPE.sParty('agitator_party_scope').GetName], där man lyfter fram önskvärda lösningar på den obehagliga smogen som numera är vanlig i närheten av regionens fabriker."
 agitators_election_events.25.f:0 "Rökmolnet som skymde himlen tycktes speglas i bybornas ögon när[SCOPE.sCharacter('agitator_scope').GetSheHe]han red förbi. I stället för den ljusa, soliga dag han[SCOPE.sCharacter('agitator_scope').GetSheHe]hade förväntat sig skulle detta tal åtföljas av det ständigt närvarande mörkret. \n\nDet spelade ingen roll. När[SCOPE.sCharacter('agitator_scope').GetFullNameNoFormatting]  tittade upp mot himlen och föreställde sig molnet som skymde människornas hjärtan, kom en vision om en ny sorts retorik till[SCOPE.sCharacter('agitator_scope').GetHerHis]  sinnet. Medan arbetarna började resa scenen [SCOPE.sCharacter('agitator_scope').GetSheHe]tog  upp en penna och började skriva."
 agitators_election_events.25.a:0 "Det[SCOPE.sParty('agitator_party_scope').GetName]kommer att få solen att skina igen!"
 agitators_election_events.25.b:0 "De står inte för något annat än motstånd mot framsteg."
 agitators_election_events.26.t:0 "Mot extremism"
 agitators_election_events.26.d:0 "Som en viktig del av sitt valprogram har partiledningen[SCOPE.sParty('agitator_party_scope').GetName] inlett en offensiv kampanj för att ta avstånd från den revolutionära socialistiska ideologin hos [SCOPE.sParty('communist_party_scope').GetName].[SCOPE.sCharacter('agitator_scope').GetFullName]"
 agitators_election_events.26.f:0 "”Kommunismen är fredens död och frihetens död.”"
 agitators_election_events.26.a:0 "Vi måste erbjuda folket ett lockande alternativ."
 agitators_election_events.26.b:0 "Låt vår kampanj inriktas på att bekämpa kommunisterna."
 agitators_election_events.27.t:0 "Att engagera allmänheten"
 agitators_election_events.27.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har inlett en målmedveten kampanj för att organisera de fattiga stadsarbetarna i [SCOPE.sState('socdem_agitation_state').GetName], i syfte att forma dem till en sammanhållen och inflytelserik väljargrupp[SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.27.f:0 "”Om någon man, kvinna eller barn blir försummad, övergiven och lämnad utan röst eller hopp… hur kan vi då säga att nationen[ROOT.GetCountry.GetAdjectiveNoFormatting] verkligen är civiliserad?”"
 agitators_election_events.27.a:0 "Folket i[SCOPE.sState('socdem_agitation_state').GetName]  har vaknat."
 agitators_election_events.27.b:0 "Denna strategi bör tillämpas i hela landet."
 agitators_election_events.28.t:0 "Unionens kampanj"
 agitators_election_events.28.d:0 "[SCOPE.gsInterestGroup('trade_union_ig').GetName]Genom att utnyttja  [SCOPE.sCharacter('agitator_scope').GetFullName]:s kontakter inom  har[SCOPE.sParty('agitator_party_scope').GetName]  erhållit en betydligt större andel hängivna och ideologiskt engagerade fackföreningsväljare."
 agitators_election_events.28.f:0 "[SCOPE.sParty('agitator_party_scope').GetNameNoFormatting]Staplar med affischer lämnade tryckeriet, var och en försedd med organisationens logotyp och en slogan. Män med hammare, uppmaningar till solidaritet och röda färgstänk från hinkar prydde papperen, redo att sättas upp runt om i staden av en veritabel armé av partisaner.\n\nHan tog sig en stund att med stolthet betrakta ett utkast som låg på en arbetsbänk, och studerade formerna som var tryckta på papperet, de livfulla röda, svarta och vita färgerna. Och sedan, framför allt, det nedre högra hörnet, där det avgörande märket gjorde sin entré: \n”Producerat med facklig arbetskraft”."
 agitators_election_events.28.a:0 "[SCOPE.sParty('agitator_party_scope').GetName]Mobilisera fackföreningens väljare för !"
 agitators_election_events.28.b:0 "Strong[SCOPE.gsInterestGroup('trade_union_ig').GetName]kommer att tjäna oss i många år framöver."
 agitators_election_events.29.t:0 "Bourgeoisins rädslor"
 agitators_election_events.29.d:0 "För att skingra överklassens farhågor inför en eventuell[SCOPE.sParty('agitator_party_scope').GetName]ny regering har man genomfört en rad möten med förmögna opinionsbildare,[SCOPE.sCharacter('agitator_scope').GetFullName] där man betonat vikten av reformer som fortfarande är förenliga med[ROOT.GetCountry.GetAdjective]värderingarna."
 agitators_election_events.29.f:0 "”Det är helt enkelt så att om det inte genomförs några reformer i[ROOT.GetCountry.GetAdjectiveNoFormatting]samhället kommer det att bli en social revolution. Jag stöder inte detta. Faktum är att jag avskyr det som pesten. Men så ser verkligheten ut – ni måste inse detta lika tydligt som jag gör. Och därför blir frågan: hur kan vi förhindra detta?”"
 agitators_election_events.29.a:0 "Reform ist bättre än revolution!"
 agitators_election_events.29.b:0 "Hur mycket de än försöker kommer de alltid att vara Reds."
 agitators_election_events.30.t:0 "Kampen om franchisen"
 agitators_election_events.30.d:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName] har inlett en kampanj som lyfter fram partiets franchisevänliga program och lovar att kraftigt utvidga rösträtten för alla grupper i samhället om partiet vinner valet."
 agitators_election_events.30.f:0 "”Mina ärade kollegor! Vad har ni att frukta från ett folk som har fått makt? Kan ni säga att ni välkomnar folket när de ser vad ni har åstadkommit och är lika stolta som ni själva?”"
 agitators_election_events.30.a:0 "Bilda en valkoalition med andra kandidater som förespråkar rösträtt."
 agitators_election_events.30.b:0 "[SCOPE.sParty('agitator_party_scope').GetName]Endast  kan verkligen tjäna folket!"
 agitators_election_events.31.t:0 "Författarens avsikt"
 agitators_election_events.31.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]En mindre skandal har uppstått kring verket, då en reformistisk roman som författaren[SCOPE.sCharacter('agitator_scope').GetFullName] skrev i[SCOPE.sCharacter('agitator_scope').GetHerHis]sin ungdom återigen har börjat cirkulera. Verket är visserligen skrivet med stor entusiasm, men det är dess enda förtjänst."
 agitators_election_events.31.f:0 "Var det ”vidskepelsens och dogmernas plåga” som satte punkt för det [ROOT.GetCountry.GetNameNoFormatting]hela? Om så är fallet, varför rullar tågen fortfarande? Hur skulle de överhuvudtaget ha kunnat skaffa kol att driva dem med? Din benägenhet att slakta dina karaktärer för billig dramatik är rent ut sagt skamlig. Och för att göra saken ännu värre… varför skulle [SCOPE.GetRootScope.GetCountry.GetCustom('fiction_cliche')]"
 agitators_election_events.31.a:0 "[SCOPE.sCharacter('agitator_scope').GetHerHim]En tragisk historia, men det finns ingen anledning att trakassera någon."
 agitators_election_events.31.b:0 "Det här är [SCOPE.sCharacter('agitator_scope').GetFullName]hans problem, inte partiets."
 agitators_election_events.31.c:0 "Kvaliteten speglar… det konservativa förtrycket av konsten."
 fanfic_ship_west:0 "Skulle Victor verkligen inte försöka vinna Estrids gunst, när de har känt varandra så länge? Har du inget öga för en försonande romans?"
 fanfic_ship_japan:0 "Skulle Kazuo någonsin ljuga om sin ställning som krigare, när han visste att hans vänner behövde en beskyddare? Har du för avsikt att förringa arméns orädda anda?"
 fanfic_ship_south_america:0 "Ska doktor Conceição plötsligt drabbas av samvetskval, trots att hon inte visat några sådana under sju hundra sidor, och söka sin egen död genom kyrkans händer?"
 fanfic_ship_china:0 "Skulle Jié till slut bli så skamligt dödad av banditerna och därmed döma sina kamrater till undergång, efter att han gett dem så mycket hopp?"
 fanfic_ship_russia:0 "Natalya avvisar kapten Preobrazhenskys närmanden – och dessutom, varför skulle han bara ge upp när han hörde detta? Har han ingen passion?"
 fanfic_ship_generic:0 "Varför vägrar ingenjören att dela med sig av kunskapen om hur man reparerar det tåg som de är beroende av till dem som räddade hans liv, och lämnar dem därmed försvarslösa när han avrättas?"
 agitators_election_events.32.t:0 "Bojaernas förbannelse"
 agitators_election_events.32.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] höll ett tal på uppdrag av[SCOPE.sParty('agitator_party_scope').GetName]  inför en folkmassa på flera hundra personer i en av[SCOPE.sState('capital_scope').GetCityHubName]  parker. När talet var slut hade folkmassan vänt sig helt mot tanken på slaveri."
 agitators_election_events.32.f:0 "”Dussintals, om inte hundratals, fördes med fartyg bort från sina hem. Oavsett om de fördes bort mitt i natten eller såldes för att betala en skuld spelar det ingen roll. Sedan staplas de, som om man skulle stapla mattor eller stolar, i lastrummen i månader.” \n\nEn dam höjde en näsduk till kinden. Hennes mans läpp stelnade. \n\n”Vänd bort blicken så mycket ni vill, men era hjärtan vet sanningen.”"
 agitators_election_events.32.a:0 "Folket har valt tidigare; de kommer att välja även nu."
 agitators_election_events.32.b:0 "Ta upp frågan omedelbart!"
 agitators_election_events.33.t:0 "En rationell diskussion"
 agitators_election_events.33.d:0 "När vi träffades för att diskutera idéer hade vi[SCOPE.gsInterestGroup('opposition_ig_scope').GetLeader.GetFullName] ett vänligt och givande samtal.[SCOPE.sCharacter('agitator_scope').GetFullName] De flesta hade förväntat sig ett bråk."
 agitators_election_events.33.f:0 "Vissa säger att motsatser drar varandra till sig, medan andra hävdar att motsatser stöter bort varandra. En del inser att en av motsatsernas egenskaper är förändring: eld och vatten blir till ånga, gnista och krut blir till explosion, värme och malm blir till metall. Och så är det även med en debatt som förs i god tro: ett tankesprång som ger upphov till nya idéer."
 agitators_election_events.33.a:0 "Liberal hövlighet är vägen framåt."
 agitators_election_events.33.b:0 "[SCOPE.sCharacter('agitator_scope').GetFullName]"
 agitators_election_events.33.c:0 "Även oppositionen bör få komma till tals."
 agitators_election_events.34.t:0 "Vår storslagna nation"
 agitators_election_events.34.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName][SCOPE.sParty('agitator_party_scope').GetName]I ett försök att vända den nationalistiska strömningen till fördel för  höll ett patriotiskt tal i en av[SCOPE.sState('capital_scope').GetCityHubName]  parker."
 agitators_election_events.34.f:0 "Nationalism är den ofta förmodade och oförtjänta överlägsenheten som härrör från ens födelseort. Den förväxlas lätt med något som liknar patriotism, men ett skarpt öga kan urskilja skillnaden. Ett ännu skarpare sinne vet hur man använder den som ett verktyg."
 agitators_election_events.34.a:0 "Han är verkligen en folkets hjälte."
 agitators_election_events.34.b:0 "Vi bör se till att lagarna tillämpas på rätt sätt."
 agitators_election_events.34.c:0 "Sluta med detta skamlösa smicker!"
 agitators_election_events.35.t:0 "Att tala om tal"
 agitators_election_events.35.d:0 "[GetLawType('law_right_of_assembly').GetName]Dagens tal från[SCOPE.sCharacter('agitator_scope').GetFullName]  handlar om , och  s[SCOPE.sParty('agitator_party_scope').GetName] insatser för att säkra det. En folkmassa har strömmat till från alla håll för att lyssna på det."
 agitators_election_events.35.f:0 "”Ingen verklig diskussion kan äga rum så länge lagen tvingar oss till tystnad! Hur kan vi kalla oss ’stora’ och ’upplysta’ när vi fruktar repressalier från själva lagen? Och för vad? Våra egna ord? ’Stora’ och ’upplysta’… en lögn, säger jag! En bluff! En parodi! En skamlig uppvisning!”"
 agitators_election_events.35.a:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har en poäng..."
 agitators_election_events.35.b:0 "Hämta papper och bläck. Det finns en lag som måste utarbetas!"
 agitators_election_events.35.c:0 "De som vill yttra sig bör först veta hur och när man gör det."
 agitators_election_events.36.t:0 "Liknande drar till varandra"
 agitators_election_events.36.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] och[SCOPE.gsInterestGroup('devout_ig').GetLeader.GetFullName]  sågs delta i diskussioner om det kommande valet. Dagen därpå hyllade predikanterna fördelarna med [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.36.f:0 "Det första ståndet och det andra ståndet har gått hand i hand ända sedan imperiets forna glansdagar. En mer modern benämning på detta heliga äktenskap är ”hjärtan och sinnen” – en strålande ledare som vinner deras hjärtan, och en storslagen gud som upptar deras sinnen."
 agitators_election_events.36.a:0 "De[SCOPE.gsInterestGroup('devout_ig').GetName]  ligger utanför vår räckvidd."
 agitators_election_events.36.b:0 "Låt oss hoppas att de inte avgör valet."
 agitators_election_events.36.c:0 "Lita aldrig på en fanatiker när det gäller världsliga frågor."
 agitators_election_events.37.t:0 "Anständighetens försvarare"
 agitators_election_events.37.d:0 "[SCOPE.gsInterestGroup('patsy_ig').GetName][SCOPE.sParty('agitator_party_scope').GetName][SCOPE.gsInterestGroup('revolutionary_ig').GetName][SCOPE.sCountry('revolutionary_nation_scope').GetName] har lett till en revolt bland . I partiets kampanjmaterial har  omedelbart fördömt  här,[SCOPE.sCharacter('agitator_scope').GetFullName] och därmed förebyggt en liknande revolt."
 agitators_election_events.37.f:0 "”Skulle du kalla mig förrädare?” \n\n”Det är jag helt säker på att du är. Många utomlands[SCOPE.sCountry('revolutionary_nation_scope').GetNameNoFormatting]skulle tänka precis som du. Vem säger att du inte redan är en förrädare? Planerar du uppvigling tillsammans med medlemmarna i din bokklubb?” \n\n”Du har blivit galen!”"
 agitators_election_events.37.a:0 "Någon måste stå emot den revolutionära vågen!"
 agitators_election_events.37.b:0 "[SCOPE.sCountry('revolutionary_nation_scope').GetNameNoFormatting] är långt borta, och det här är här."
 agitators_election_events.37.c:0 "Revolutionen kommer inte att svartmålas!"
 agitators_election_events.38.t:0 "De gamla goda tiderna"
 agitators_election_events.38.d:0 "När han blev inbjuden att hålla ett tal på uppdrag av [SCOPE.sParty('agitator_party_scope').GetName],[SCOPE.sCharacter('agitator_scope').GetFullName]började han hylla fördelarna med ett starkt hem, starka gränser och starka män. Publikens reaktioner var blandade."
 agitators_election_events.38.f:0 "”Jag vågar verkligen påstå att männen inte längre är män! De skämmas bort med böcker, som om de skulle kunna ersätta ett#italicriktigt#! äventyr! Deras mödrar sveper in dem i bomull och siden, bara för att de sedan ska bli under tårna av sina fruar! Och Gud förbjude att de dricker en pint öl:#italic  en enda klunk#!, och de behöver sina fäder för att bära dem hem!”"
 agitators_election_events.38.a:0 "Kan ingen tänka på barnen?"
 agitators_election_events.38.a1:0 "Kan ingen tänka på barnen?"
 agitators_election_events.38.b:0 "Gamla metoder för gamla tider – och ännu äldre dårar."
 agitators_election_events.38.c:0 "Retorik kan inte dölja vad[SCOPE.sCharacter('agitator_scope').GetLastName]man vill."
 agitators_election_events.39.t:0 "Avgifterna"
 agitators_election_events.39.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har tagit kontakt med[SCOPE.gsInterestGroup('rf_scope').GetName]  för att få valströd till [SCOPE.sParty('agitator_party_scope').GetName].[SCOPE.sCharacter('rf_leader_scope').GetFullName]  har åtminstone bekräftat att samtal har ägt rum."
 agitators_election_events.39.f:0 "Att vädja till ”naturliga allierade” är ett vågspel med låga odds. De som lyssnar på ”naturliga allierade” är ofta redan av samma åsikt. De som inte delar denna åsikt skulle, på ett artigt sätt, fortsätta på sin egen väg. På ett oartigt sätt skulle de kanske skratta, håna eller, om de är riktigt sluga, förvandla den som tar risken till sin egen nyttiga idiot."
 agitators_election_events.39.a:0 "Gamla sinnen tänker likadant."
 agitators_election_events.39.b:0 "Gräs har en tendens att växa precis som det vill."
 agitators_election_events.39.c:0 "De bör akta sig för [SCOPE.sCharacter('rf_leader_scope').GetFullName]hans list."
 agitators_election_events.40.t:0 "Biskopen tar den svarta bonden"
 agitators_election_events.40.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]Vid en fest för organisationens rikaste stödjare inledde han[SCOPE.sCharacter('agitator_scope').GetFullName] ett långdraget utbrott om fördelarna med slaveri och diskriminering."
 agitators_election_events.40.f:0 "\n\n\n\n”Som ni tydligt kan se är skallens utveckling direkt kopplad till en mans civiliserade väsen. Man kan med säkerhet avgöra om en man är lämplig för det fina sällskapet genom att korrekt mäta hans skalleomkrets—””Och hur tänker ni bevisa att en man tänker med sina ben?”””Som jag sa, kan man avgöra om en man är lämplig för det fina sällskapet genom att korrekt mäta hans skalle.”"
 agitators_election_events.40.a:0 "Alla har rätt till sin åsikt, även om den är felaktig."
 agitators_election_events.40.b:0 "Civilisationen är grunden för vår jämlikhet."
 agitators_election_events.40.c:0 "Man undrar om[SCOPE.sCharacter('agitator_scope').GetLastName]han någonsin har blivit piskad tidigare..."
 agitators_election_events.41.t:0 "Hyra i den här konjunkturen?"
 agitators_election_events.41.d:0 "De[SCOPE.gsInterestGroup('devout_ig').GetName]har formellt riktat kritik mot[SCOPE.sCharacter('agitator_scope').GetFullName]  på grund av en okonventionell artikel i en[SCOPE.sParty('agitator_party_scope').GetName]  tidning där man förespråkar omvälvande socialpolitik."
 agitators_election_events.41.f:0 "[SCOPE.sState('capital_scope').GetNameNoFormatting]”Jag vill framföra mina uppriktiga ursäkter för min artikel i tidningen i torsdags. Vid det tillfället hade jag talat med flera kolleger om den beklagliga situation som hyresmarknaden har hamnat i. Kanske är det alldeles för tidigt att föreslå polygami som en genomförbar lösning för arbetarklassen.”"
 agitators_election_events.41.a:0 "Äktenskapets helgd måste skyddas!"
 agitators_election_events.41.b:0 "Vad som helst som gör det lite lättare att bo i hyreslägenhet..."
 agitators_election_events.41.c:0 "Du kan ju bara ge dem pengar."
 agitators_election_events.42.t:0 "Popularitetstävling"
 agitators_election_events.42.d:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('monarch_scope').GetFullName]:s desperata strävan efter att vinna  undersåtarnas[SCOPE.sCharacter('monarch_scope').GetHerHis] gillande har inspirerat[SCOPE.sCharacter('agitator_scope').GetFullName]  att främja :s åsikter."
 agitators_election_events.42.f:0 "”Se nu på denna misslyckade härskare! Denna Guds utvalde! En man som knappt vet vilken dag det är, för att inte tala om hur man knyter sina egna skor. Ni bagare och skomakare, ni skräddare och slaktare, står till hans tjänst för varje liten nyck han får. Och nu belönar han sina favorit-smickrare med er svett. Era liv själva! Om Gud utsåg honom, då säger jag att Gud är en dåre! Nej, nej, jag säger… jag säger att Gud är död!”"
 agitators_election_events.42.a:0 "Samla folket på stadens torg."
 agitators_election_events.42.b:0 "Vänd dig till [SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]tidningens trogna ”tänkare”."
 agitators_election_events.42.c:0 "Upplys de vilsna[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]direkt."
 agitators_election_events.43.t:0 "Övriga röstningsmetoder"
 agitators_election_events.43.d:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName] har gått ut på gatorna och uppmanat[SCOPE.sCulture('discriminated_culture_scope').GetName]människor att använda sig av mindre konventionella demokratiska metoder för att stödja ."
 agitators_election_events.43.f:0 "Ett upplopp må vara de tystas röst, men det är bara ett av många sätt att göra sig hörd. Det enklaste av dem alla är ett vänligt ord över en drink. Därefter kommer konsten. Många som inte uppskattar konst glömmer ofta hur kraftfull en välgjord affisch kan vara. Naturligtvis finns det alltid alternativet med ett vänligt ord och en pistol i en mörk gränd. Valmöjligheterna är oändliga när man verkligen sätter sig in i saken."
 agitators_election_events.43.a:0 "Och de kommer att bli hörda när tiden är mogen."
 agitators_election_events.43.b:0 "Alla missnöjda bör fängslas."
 agitators_election_events.43.c:0 "Ingen demokrati är äkta om inte alla får göra sin röst hörd."
 agitators_election_events.44.t:0 "Rättigheter för mig och för dig"
 agitators_election_events.44.d:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sParty('anti_democratic_party').GetName][SCOPE.sCharacter('agitator_scope').GetFullName] har intagit en kraftfull ståndpunkt mot [namn]s argument för demokrati som drivs av en upplyst minoritet. Även om argumentet var enkelt utgjorde det ett effektivt stöd för [namn]s ståndpunkt i frågan om [GetLawType('law_universal_suffrage').GetName][ämne]."
 agitators_election_events.44.f:0 "”Demokratins konventioner gör det omöjligt för alla utom de upplysta bland oss att rösta. Jag utmanar vem som helst att motbevisa denna naturliga utveckling inom demokratin.” \n\n”Ahem. Jag ska ge ett enkelt motargument. Kan alla män och kvinnor som för närvarande inte äger egendom räcka upp handen om de håller med om att ett barn bör lära sig att läsa och skriva när det är i stånd till det?” \n\nAlla räckte upp handen. \n\n”Och nu har ni deltagit i demokratin.”"
 agitators_election_events.44.a:0 "Enkelt och sant. Fantastiskt!"
 agitators_election_events.44.b:0 "Lagstiftning innebär mer än så."
 agitators_election_events.44.c:0 "Och hur är det med kvinnorna?"
 agitators_election_events.45.t:0 "Att halshugga en orm"
 agitators_election_events.45.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har avbrutit ett kungligt framträdande i[SCOPE.sState('capital_scope').GetCityHubName]  för att göra ett enkelt uttalande:  är[SCOPE.sParty('agitator_party_scope').GetName] fast beslutna att införa en republik."
 agitators_election_events.45.f:0 "Kungarnas gudomliga rätt är en sådan motivering för att den aktuella monarken aldrig ska ifrågasättas. En annan är himmelens mandat. Samma sak som förut – i princip gäller samma sak: ifrågasätt inte monarken. Det lustiga är att när Gud väl är död, vem garanterar då den gudomliga rätten?"
 agitators_election_events.45.a:0 "De[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]måste visa[SCOPE.sCharacter('monarch_scope').GetHerHis] att de har en koppling till folket."
 agitators_election_events.45.b:0 "Uppvigling kan inte tolereras."
 agitators_election_events.45.c:0 "Vår lojalitet gäller republiken och demokratin!"
 agitators_election_events.46.t:0 "De rika blir rikare"
 agitators_election_events.46.d:0 "[SCOPE.sCharacter('agitator_scope').GetFullName] har anordnat en fest för eliten inom [SCOPE.gsInterestGroup('industrialists_ig').GetName]. Mutor, som knappt förkläddes som donationer, bytte ägare inom [SCOPE.sParty('agitator_party_scope').GetName]."
 agitators_election_events.46.f:0 "”Med er hjälp i det kommande valet ska vi se till att era maskiner hålls välsmorda och att hamnarna förblir öppna!” \n\nEndast tvåhundra personer var närvarande, men varje applåd var som ett åsknedslag som förebådade tusen fartygs passage."
 agitators_election_events.46.a:0 "De kommer nog att spendera allt på champagne."
 agitators_election_events.46.b:0 "Någon borde undersöka de där donationerna."
 agitators_election_events.46.c:0 "Kan vi inte använda de här mutpengarna till något bättre?"
 agitators_election_events.47.t:0 "Vänner utomlands"
 agitators_election_events.47.d:0 "I samband med sin kampanj för ytterligare stöd lyfte man fram detta[SCOPE.sCountry('friendly_country_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName]som ett exempel på hur detta[SCOPE.sParty('agitator_party_scope').GetName]skulle stärka de utrikespolitiska förbindelserna."
 agitators_election_events.47.f:0 "Handelns väsen är enkelt: den ena parten har något som den andra parten behöver, och kommer att ge det på grundval av ömsesidigt utbyte. Oftast handlar det om en bok mot en bok, en måltid mot en måltid, en tjänst mot en tjänst. Mindre vanligt, och förmodligen farligare, är den typ av handel som nationer bedriver: människoliv mot materiellt välstånd. Även känt som ekonomi."
 agitators_election_events.47.a:0 "Vi hälsar våra vänner från [SCOPE.sCountry('friendly_country_scope').GetName]. välkomna."
 agitators_election_events.47.b:0 "[SCOPE.sCharacter('agitator_scope').GetSheHe|U] måste ha en fabrik där."
 agitators_election_events.47.c:0 "Om[SCOPE.sCharacter('agitator_scope').GetLastName]man älskar det[SCOPE.sCountry('friendly_country_scope').GetName]så mycket,[SCOPE.sCharacter('agitator_scope').GetSheHe]borde man bo där!"
 agitators_election_events.48.t:0 "Soldater som hotar med vapen"
 agitators_election_events.48.d:0 "Spänningarna inför valet[SCOPE.sParty('armed_forces_party').GetName][SCOPE.sParty('agitator_party_scope').GetName] mellan  och  har varit stora, då[SCOPE.sCharacter('agitator_scope').GetFullName]  har[SCOPE.gsInterestGroup('armed_forces_ig').GetName] anklagat  för uppenbart krigshetsande beteende."
 agitators_election_events.48.f:0 "”General! Jag vill säga några ord till er och era sabelsvingande plåtmän. Ni och era bråkmakare har konspirerat för att starta ett krig inom en mycket snar framtid. Vad säger ni om det\n\n?” ”Hur ska vi annars använda de kulor och bandage som ni förser oss med, sir? Ett krig ökar efterfrågan på era varor.” \n\n”Det är… det är inte poängen! Våra fabriker ligger i skottlinjen!”"
 agitators_election_events.48.a:0 "De[SCOPE.gsInterestGroup('armed_forces_ig').GetName]har fått insyn i alltför många beslut."
 agitators_election_events.48.b:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName] bör strikt begränsa[SCOPE.sCharacter('agitator_scope').GetHerselfHimself] sig till  sina egna angelägenheter."
 agitators_election_events.48.c:0 "Kanske kan ett nybildat regemente lindra [SCOPE.sCharacter('agitator_scope').GetFullName]hans bekymmer."
 agitators_election_events.49.t:0 "Frihandel, friare arbetsmarknad"
 agitators_election_events.49.d:0 "[SCOPE.sParty('agitator_party_scope').GetName][SCOPE.sCharacter('agitator_scope').GetFullName], i[SCOPE.sCharacter('agitator_scope').GetHerHis]sin kampanj för , har förespråkat ideal som[GetLawType('law_free_trade').GetName]  och [GetLawType('law_no_migration_controls').GetName], så att andra också ska kunna ta del av[ROOT.GetCountry.GetAdjective]  framgången.[SCOPE.sCharacter('trade_union_leader_scope').GetFullName]  har anklagat[SCOPE.sCharacter('agitator_scope').GetHerHim]  för att utnyttja invandrare."
 agitators_election_events.49.f:0 "En självklarhet var du än befinner dig: läs alltid det som står med liten stil. Den som är skrupelfri nog kan lura dig på vad som helst: dina kläder, ditt bankkonto, din häst, ditt hus, din mark och till och med ditt liv. Och läs särskilt det som står med liten stil om det verkar som om någon erbjuder dig allt du behöver."
 agitators_election_events.49.a:0 "Det finns en anledning till att vi patrullerar våra gränser."
 agitators_election_events.49.b:0 "[ROOT.GetCountry.GetName]"
 agitators_election_events.49.c:0 "Alla invandrare bör utbildas redan vid gränsen."
 agitators_election_events.50.t:0 "Skaffa dig erfarenhet redan tidigt!"
 agitators_election_events.50.d:0 "[SCOPE.sParty('agitator_party_scope').GetName]Ett djärvt drag från[SCOPE.sCharacter('agitator_scope').GetFullName]  ledde till att allmänheten splittrades i en fråga som berörde dem personligen:  s uttryckliga stöd för barnarbete."
 agitators_election_events.50.f:0 "”Kom hit, barn, och njut av en dag i solen! Just det, ni får fem bob om dagen för att plocka frukt och leka i gräset. Och ni får den tid utomhus som era föräldrar alltid tjatar om! Kom bort från dem, gå ut i solen och bygg upp de starka musklerna och de breda höfterna som ni kommer att behöva för era egna familjer. Hjälp gamle Jenkins idag!”"
 agitators_election_events.50.a:0 "Så länge de inte får utföra riktigt farliga arbeten."
 agitators_election_events.50.b:0 "[SCOPE.sCharacter('agitator_scope').GetHerHim]Lyssna inte på det där, barn. Nu är det dags att gå till skolan."
 agitators_election_events.50.c:0 "Kanske[SCOPE.sCharacter('trade_union_leader_scope').GetFullName]skulle man vilja skicka en delegation till[SCOPE.sCharacter('agitator_scope').GetFullName] arbetsplatserna"
