l_swedish:
 objective_settler_coast:0 "Birth of Artifice"
 objective_settler_coast_desc:0 "Magic and gods are new and world-changing concepts to the people of Exether. In some places, it has given rise to new religions or a return to ancient traditions, but in others, it has become the focus of intense scientific study. \n \nWill the old kingdoms of the Settler Coast adapt and sail on the winds of change, or will magic be their undoing?"
 objective_settler_coast_idle_header:0 "Birth of Artifice"
 objective_settler_coast_idle_hint:0 "Unpause the game"
 objective_settler_coast_name_ARR:0 "Arrador"
 objective_settler_coast_desc_ARR:0 "The states that now make up Arrador achieved independence from the Dumonian Empire during the Nightfall, a period of magical calamities following the destruction of The Kingdom of Khus. \n \nOfficially, a monarch rules over the union, but their power pales next to the Astral Consortium, a cabal of wealthy industry titans. \n \nRapid technological progress has shifted culture within Arrador away from old Dumonian traditions and religion in favor of industry and innovation."
 objective_settler_coast_name_DUM:0 "Empire of Dumonia"
 objective_settler_coast_desc_DUM:0 "The Dumonian Empire is an old, revanchist state that has endured decades of decline. \n\nUnder emperor Urik Romhaar it was a united front for humanity, but war with the old Kingdom of Khus, and subsequent violent return of magic to the world has left it fractured and weakened.  \n \nLosing influence along the Settler Coast, the new emperor has instead turned his attention to the faraway continent of Locari as a new avenue of expansion. \n \nRising instability allows increasingly extreme factions, such as the zealous Order of the Sun, to vie for political dominance, threatening to reshape or unmake the old empire."
 objective_settler_coast_name_CER:0 "Ceraun"
 objective_settler_coast_desc_CER:0 "Ceraun maintains itself as a military dictatorship still even as the 50th anniversary of the Viceroy's War passes. Ludric Zarnak, its leader is the last surviving member of a decades-long Military Junta presiding over Ceraun and no doubt the most famous (and infamous). For Zarnak ultimately approved the Wyrmfyre Tincture that devastated the Buramog Orcs to the South and warped their forest home into an unrecognizable hellscape. \n \nHowever, the Margrave grows old and these final few years of his Rule may prove to be his most important as the very same Alchemists he'd once used to decimate the Southern Orcs now run rampant with the authority he'd granted them as a reward for their efforts previously. Will he reign them in or will the task be left to his successors?"
 objective_settler_coast_name_AHO:0 "Achon"
 objective_settler_coast_desc_AHO:0 "In the northeast of Zalaron, the nation of Achon, once a shining beacon of magical innovation and prosperity, now remains only as a shadow of its former self. The Nightfall ravaged the land, leaving it scarred and twisted. \n\nDespite the devastation, the people of Achon have persisted, rebuilding what they can in the wake of the cataclysm. But their efforts are hampered by a growing paranoia that has gripped the nation. The cataclysm was accompanied by a surge in the number of changelings and mimics, shapeshifters who can take on the form of any creature they encounter.\n\nThe people of Achon are now constantly on edge, never sure who they can trust. The government has enacted strict measures to root out changelings and mimics, with many living in fear of being accused of being a shapeshifter."
 objective_settler_coast_name_EMP:0 "Emparal"
 objective_settler_coast_desc_EMP:0 "Emparal stands as one of the biggest beneficiaries of the Viceroy's War. It'd both gain full independence from Dumonia as well as contribute enough to the war effort that it'd steer clear of Arrador's clutches. It alone standing as the sole Bossardi Nation not currently beneath the thumb of a foreign state. Emparal maintains itself as a rising star in the industry of artificing and keeps ambitious aspirations for the existence of a united Bossardi state enveloping Lake Bossard itself. Such plans however are a distant dream for the moment for Thiral and Arrador both aren't intent on letting go of their Bossardi subjects."
 objective_settler_coast_name_THI:0 "Thiral"
 objective_settler_coast_desc_THI:0 "Heirs to the ancient legacy of the Vaythir Imperium, the Kingdom of Thiral is rapidly assuming its former status as hegemon of southern Zalaron. Though ravaged by the Nightfall, the chivalric state has emerged stronger for having endured its trials. The divine miracles of the Blooming herald a new age of religious unity and fervor. Under the ordained stewardship of the Dillaelgol Kings, the realm has never been so united. The motherland secure, they now cast a scornful eye at the heathens across her borders.\n\nThe savage elves of the Feylight woods cry out for the light of Thirallian civilization. Such a noble and ancient race cannot be allowed to languish in squalor, clinging to blood-soaked idols of vile demons. Ours is a virtuous cause. Thiral will save them, no matter what the misguided fools in Teferet or Rannor have to say about it."
 objective_settler_coast_name_TEF:0 "Teferet"
 objective_settler_coast_desc_TEF:0 "Elves once ruled much of Central Zalaron until the Godsbane which sapped magic from the world. Leaving Elfkind weakened and vulnerable to a millenia of humanity's dominion. \n\nSince the Nightfall, Elves had returned to prominence and none is moreso than Teferet. Teferet has firmly asserted itself since the Nightfall as the De Facto powerhouse of Starshimmer and the center of Elfkind's revitalized status among Great Powers. While it does not pursue Elven racial Supremacy, it still persists to proclaim itself as Guardian of Elfkind and has such come to blows with the Southern Empire of Thiral. It postures for war as it will never accept the Feylight forest being controlled by humans, and the Kingdom of Rannor can only delay this destructive conflict for so long."
 objective_settler_coast_name_CLL:0 "Rannor"
 objective_settler_coast_desc_CLL:0 "Nestled in the valleys and hills of the Caslinet Highlands, the amicable half-elves of Rannor sit half-way between worlds. The people of this land learned how to navigate life at the edge of squabbling empires through both diplomacy and guile. Disturb their quiet peace and you'll quickly find yourself cut by a sharp tongue; or a keen blade.\n\nFrom the rowdy taverns above to the bloody underworld below, Rannor's unrivalled spirit of unity has spread across the land. Ever ready to aid the downtrodden and punish the wicked. The poor Erdei have become the playthings of greater powers spoiling for a fight. Rannor will do everything it can to aid those caught in the middle; and anything it must to keep the peace.\n\nAnything."
 objective_wilds_of_locari:0 "Wilds of the South"
 objective_wilds_of_locari_desc:0 "With Dumonia suffering a crushing defeat in the Viceroy's war, it has turned it's eyes towards the rich resources of the South Seas. \n\nThe balance of the region be damned, the Empire will have it's dues. Extracted in blood if and when the local nations refuse it's purported rightful authority"
 objective_wilds_of_locari_header:0 "Wilds of the South"
 objective_wilds_of_locari_idle_header:0 "Wilds of the South"
 objective_wilds_of_locari_idle_hint:0 "Unpause the game"
 objective_wilds_of_locari_name_SSC:0 "South Seas Company"
 objective_wilds_of_locari_desc_SSC:0 "An Imperial holding tasked with the economic exploitation of Locari. Will they subjugate the continent or be just another failed dream of conquest?"
 objective_wilds_of_locari_name_PAY:0 "Paylaz"
 objective_wilds_of_locari_desc_PAY:0 "Paylaz is the last major power of Locari that has not fallen to colonial powers.\n\nEvery month, this fact grows closer to becoming false. It has inherited its Kingdom from the former Five Gem Kings, who were guardians and stewards of the continent against the Naga's perditions.\n\nWill Paylaz take on the role of guardian once more? Will it bear a torch against the shadow of colonialism that has fallen across Locari? Or will they fall, like the dragons of old?"
 objective_wilds_of_locari_name_AZI:0 "Amanzi"
 objective_wilds_of_locari_desc_AZI:0 "President Zikapa Nchamya had saved the Republic and was lauded as an impeachable hero, but he delayed elections until his death. Nyama Kovohi filled the power vacuum, and was crowned Pibliyakimo: 'The Pure Dragon', and the prophetess of Akini for the mortal world. But her ascension has not been painless. A pretender, or perhaps the true heir, has emerged from obscurity.\n\nAmanzi must navigate the power struggle between two powerful mages, and chart a course to survive in a Kailando finding itself increasingly tied to the world stage."
 objective_wilds_of_locari_name_ORL:0 "Bintu Durve"
 objective_wilds_of_locari_desc_ORL:0 "The Bintu had believed that the arriving humans were better friends than the naga, and so they opened their doors. They came to understand that, contrast to naga, the human capacity for domination can be masked by 'benevolent' intentions. \n\nBintu Durve must chart its course in the new age of Exether. Will its people succumb to colonialism, wrestle themselves into a favorable vassalage, or become independent and secure upon the world stage?"
 objective_wilds_of_locari_name_OLC:0 "Ocelian Locari Company"
 objective_wilds_of_locari_desc_OLC:0 "The Locari Company is the Emerald League's response to the South Seas Company. With an initial foothold in Bintu Durve, and a slowly unfolding scheme to fold the country into a compliant company asset, it is close to unlocking the rich interior of the mysterious continent.\n\nWhile they have experienced delayed market entry, the company is confident that a proper leveraging of strategic acquisition opportunities, and sustainable value creation, will maximize value and ensure organizational resilience in an evolving marketplace."
 objective_wilds_of_locari_name_SAP:0 "Kettoketto"
 objective_wilds_of_locari_desc_SAP:0 "The Naga once ruled Locari. Their empire was resplendent, ferried through the splendor of blood and the pleasure of inflicting violence. They created the Hiadud in twisted human experiments, aided by their dark gods, as a servile race so that they could focus entirely on perfecting the arts of domination. \n\nAfter the Godsbane, centuries of human sacrifice to return their dark gods culminated in the release of the accumulated psionic power that shattered their cities, and then their Empire.\n\nWithin the decay of these colossal wrecks, there are plans to once again stride the continent and declare with a sneer of cold command:\n\n\"Build our works, ye wretched, and despair!\""
 objective_ravik_undead:0 "Hasal's Legacy"
 objective_ravik_undead_desc:0 "With magic spreading throughout the world, it was only a matter of time before new and old crises would (re)surface. And no region had more trouble brewing than the sub-continent of Fraesoh, now embroiled in war after war as the old lines on the map are either replaced with new ones or violently held in place."
 objective_ravik_undead_header:0 "Hasal's Legacy"
 objective_ravik_undead_idle_header:0 "Hasal's Legacy"
 objective_ravik_undead_idle_hint:0 "Unpause the game"
 objective_ravik_undead_name_RAV:0 "Ravik"
 objective_ravik_undead_desc_RAV:0 "Pushed to embrace nihilistic necromancy, the gnomes of Ravik have launched their third and most ambitious crusade against the remnants of their Thalorian opressors. Their eyes set on dismantling Thaloria for good before turning their gaze upon challenging the rest of Humanity abroad. \n\nThe dead march, but can they deliver one more victory to finally avenge the centuries of humiliation Raviki Gnomes suffered?"
 objective_ravik_undead_name_TLE:0 "South Thaloria"
 objective_ravik_undead_desc_TLE:0 "The largest remnant of the Thalorian Empire faces the Third Ravikian Crusade. The gnomes, with their numbers bolstered by undead war slaves, aim to utterly dominate the region. Already the Raviki Gnomes have trounced Thaloria twice in the previous two conflicts which saw the Empire fracture and weaken. \n\nThe fate of Thaloria hangs in the balance, do its people have the mettle to rebuke the fury of Ravik?"
 objective_ravik_undead_name_DIS:0 "The Dragon Isles"
 objective_ravik_undead_desc_DIS:0 "The repeated defeats suffered by The Dragon Isles's old rival, Thaloria should have quickly gave way to a revival of Dragonborne domination on the high seas. Yet instead as the Dragonborne receive the boon of a destroyed rival, they are cursed with a disease that has haunted their kind since the death of their Dragon Gods. \n\n Will the Isles endure this blight upon their nation or is this the beginning of the end for its unity?"
 objective_ravik_undead_name_VAI:0 "Vairia"
 objective_ravik_undead_desc_VAI:0 "Not long after the Nightfall, Vairia's southern territories were besieged by the rampant overgrowth of the Vermillion Thicket. Causing millions to cram into the Coastline and warping the politics of the nation. Decades later this event would further entrench Vairian Naval traditions to an extreme. The desire to secure new land for the ever growing population as the Arcane Revolution sweeps through Vairia further empowering the Admiralty to its current state as the Regency of the nation.\n\n Vairian ambitions in Zalaron died at the branches of the Vermillion Thicket. Instead it now looks outward towards the open seas for conquest, glory, and resources alike.\n\n Vairia will rule the waves!"
 objective_ravik_undead_name_HOR:0 "Horkaa"
 objective_ravik_undead_desc_HOR:0 "A relatively densely populated nation by virtue of its incredible farmland, Horkaa has persisted as an influential part within the Bay of New Fortune. Both playing a part in the regional politics of the Salt Wastes as much as the Ch'in Desert.\n\nThough up until recently Horkaa had been distantly beneath the thumb of Thaloria- its recent defeats at the hands of Ravik has prompted Horkaa to escape Thaloria's sphere and once more set out as an independent entity. Much work remains to be done, however. For the dominance of Thaloria left Horkaa incredibly stagnant."
 objective_ravik_undead_name_DKO:0 "Drakoria"
 objective_ravik_undead_desc_DKO:0 "The seat of the Thalorian Empire of which Drakoria has recently broken off from for during the Second Raviki Crusade the ancient capital of Emberfall was in danger of falling to the oncoming Necromantic armies. As the Emperor fled the city towards the Eastern provinces the nobility of Emberfall rebelled and declared independence to pursue a separate and desperate peace with Ravik, anything to preserve Emberfall and the surrounding provinces. In the times since Drakoria become a bastion of Anti-Absolutism and Anti-Monarchy ideals due to the shortcomings of the reigning Thalorian Dynasty. A dream of a Grand Thalorian Republic has been born."
 objective_the_scaletides:0 "Rivals on the Scaletides"
 objective_the_scaletides_desc:0 "Home to gnolls, goblins, ogres, and kobolds, few pay much mind to the western seas. But this state of affairs will not last long, as territorial and nationalistic ambitions amongst the 'monstrous' inhabitants as well as the meddling of established empires drives them ever further towards modernity."
 objective_the_scaletides_idle_header:0 "Rivals on the Scaletides"
 objective_the_scaletides_header:0 "Rivals on the Scaletides"
 objective_the_scaletides_idle_hint:0 "Unpause the game"
 objective_the_scaletides_name_ZIX:0 "Zinxhiron"
 objective_the_scaletides_desc_ZIX:0 "Centuries have passed since millions of Goblins made the great voyage across Emperor's Marbles to carve out their place on the Gavkhan peninsula in their flight from the oppression of Ogre Tyrants and Hobgoblin Warlords. The so-called Gavkhani Goblins thus remain disunited since the time of their initial settlement. Though after the Nightfall wrought Chaos upon Zalaron there has been no shortage of upstart leaders across Gavkhan seeking to unite it. \n\nZinxhiron presents itself as the leading candidate for potential martial unification as it already has conquered its immediate neighbors with the remaining threats to its supremacy being the Zealous Theocracy of Lugzar and the uncharacteristically progressive Kingdom of Kvararag."
 objective_the_scaletides_name_SNB:0 "Thassarcia"
 objective_the_scaletides_desc_SNB:0 "The Pabardian Dragonborne were at one point a culture who's numbers dominanted a sizeable portion of the global Dragonborne population. Repeated Dragonblight outbreaks however has diminished this culture down to its last survivors down in the Citrus Currents in the form of the Thassarcian Republic.\n\nDespite this existential crisis the Pabardians have done incredibly well for themselves. Having gained the trust and loyalty of the local Lacertian population alongside dominating the Gnoll population with the aid of their lizard friends. Still, revanchism runs high in the blood of the Gnolls and the Orcs of Embervein eye Thassarcia hungrily. Khaduras too may verywell become another major threat.\n\nThe Pabardians have much work to do to secure their place in the sun."
 objective_the_scaletides_name_MOK:0 "Haingrok"
 objective_the_scaletides_desc_MOK:0 "The lead architect of the Cicaoran Republic's demise with the aid of its brother Ogre Kingdoms in the south, Haingrok has spent this time in relative peace. It maintains a massive population over its territories in Emperor's Marbles and has grown swollen ever since. Very much content with its current reach as it rules over a diverse array of subjects. \n \nDespite this, a remnant state of the old Cicaoran Republic, Juxjthraaria has not yet fully lost the memory of better times. Times are changing fast across Exether and Haingrok currently appears content to remain frozen in time. Will this prove to be its undoing?"
 objective_the_scaletides_name_JUX:0 "Juxjthraaria"
 objective_the_scaletides_desc_JUX:0 "Juxjthraaria stands as the last living evidence of the long defunct Cicaoran Republic's existence. Despite this heritage, Juxjthraaria ultimately consisted of the least developed provinces of the old Republic. It being spared from the onslaught of Ogre and Goblin invasions solely by being on the very hinterlands of the Empire back then. Still, the bloated nature of Haingrok causing it to become benign over the centuries has given the Akmuociai of Juxjthraaria time to develop and prosper. Greatly outpacing that of the decadent yet grand Empire of Haingrok. \n \nThis prosperity has come with a resurgence of nostalgia of the times of the old Republic. A dream has collectively appeared in the minds of many Akmuociai in the leadership on perhaps retaking parts of the Republic back, and restoring its former glory."
 objective_the_scaletides_name_VHA:0 "Hijaasch Zit Chaak"
 objective_the_scaletides_desc_VHA:0 "The Akmuociai in Juxjthraaria have been paranoid for centuries that the Ogres and Goblins would come in from the west to finish their conquests and lay waste to their home. Under these circumstances the shrewd leader of the adventurers guild of Hijaasch, Mao̯k Kuo̯h, secured a mandate from the Assembly to colonise the island of Vhaulirb. Under which the Guild, the Hijaasch Zit Chaak, would seek both resources and a safe haven should the worst come to pass.\n\nVhaulirb is not without its dangers. The island is filled by a great jungle teeming with Lacertians which in the distant past brought Dinosaurs from Kailando. Dinosaurs they've come to worship, especially now that Fae influences are starting to empower them. The Lacertians are unpleased that the Akmuociai have come here to invade their home and hunt the sacred beasts. There are many challenges ahead for the guild to complete their mandate and create a new home for their kind."
 objective_the_scaletides_name_KHD:0 "Khaduras"
 objective_the_scaletides_desc_KHD:0 "The Duneshar Dwarves were much like many Holds of the time, Industrial Titans Pre-Godsbane. The Duneshar too were no strangers to the art of war and thus when leaving their mountain home they had little issue dispatching the reigning Orcish Empire of the region which sought to dominate them. Yet the Duneshar were humble in their victory and sought to aid the Orcs of Embervein, not dominate and exploit. \n \nIn the decades since Embervein has grown prosperous due to the support of Dwarven ingenuity, with each Orc nation nearby having directly benefitted from Khaduras's aid. Khaduras, hoping to capitalize on this continued prosperity seeks to create stronger ties between its orcish neighbors and itself. Akin to that of a Ring of Steel."
 exether_welcome:0 "Welcome to Realms of Exether!"
 exether_welcome_desc:0 "Step into a reimagined world of Victoria 3 where the gears of industry and the mystique of magic intertwine. This mod introduces a wealth of new features: \n\nSupernatural [Concept('concept_good', 'Goods')]: Harness the power of wishstone, cloudsilver, and ectoplasm nthrough specialized buildings and industries.\n\nThe [GetInterestGroupVariant('ig_mages',GetPlayer).GetNameWithCountryVariant] [concept_interest_group]: A new interest group representing spellcasters, alchemists, artificers and magical scholars, influencing your nation's politics and society.\n\n[concept_magic_reserves] System: Unleash powerful buffs by collecting and mastering [concept_arcana_cards] tied to religious institutions.\n\n[concept_adventurer_coverage]: Expand your state's protection by establishing questing offices and hiring adventurer [Concept('concept_retainer', 'Retainers')] to safeguard your people and uncover riches.\n\nRacial [Concept('concept_technology', 'Technologies')]: Unlock unique advancements for each fantasy race at the bottom of the tech tree, offering diverse and flavorful strategies. \n\nForge your legacy in a land of steam, sorcery, and endless possibilities. How will you shape the Realms of Exether?"
 exether_complete:0 "Realms of Exether tutorial complete"
 exether_complete_desc:0 "Good luck shaping the world of Exether!"
 je_exether_start:0 "Welcome to Exether"
 je_exether_start_reason:0 "This journal entry will disappear once you unpause the game"
