 dragon_port_lockdown_button:0 "Lockdown the Ports"
 dragon_port_lockdown_button_desc:0 "By taking a number of precautions in our ports, we may be able to slow the spread of the Dragonblight."
 negotiate_kobold_settlements_button:0 "Negotiate Kobold Border Settlements"
 negotiate_kobold_settlements_button_desc:0 "Many of our states have already suffered dearly to the Dragonblight.  By ceding key border territories to the kobolds nearby, we may hope to regain some semblance of control over our territories.\n#red This will cede land to the kobolds. Can only be done once per state.#!"
