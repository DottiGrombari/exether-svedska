 state_atheism.4.t:0 "Extraterritorialitet i Guds nation"
 state_atheism.4.d:0 "Försöken att utvisa missionärer, präster, andliga healare och liknande har väckt stor uppståndelse utomlands.[SCOPE.sCountry('missionary_nation').GetName]  har motsatt sig tvångsutlämning av sina medborgare i [ROOT.GetCountry.GetName]."
 state_atheism.4.f:0 "”Nej, jag vägrar att följa dessa lagar! Jag är en man av [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')], och jag låter mig inte avskräckas från mitt ädla syfte. Ni kan släpa ut mig i handbojor, men jag har ändå laglig rätt att beträda denna plats. Om jag tvingas till det, kommer jag att åberopa extraterritorialitet mot denna fars!”"
 state_atheism.4.a:0 "Vi borde tänka om innan det blir krig."
 state_atheism.4.b:0 "Tvinga ut dem om du måste."
 state_atheism.4.c:0 "De får stanna om de avsäger sig sin tro."
 state_atheism.5.t:0 "En flods nya strömriktning"
 state_atheism.5.d:0 "När[ROOT.GetCountry.GetName]  ger sig ut på en resa för att ifrågasätta den[SCOPE.gsInterestGroup('intelligentsia_ig').GetName] traditionella religiösa moralen, lägger medlemmarna i  fram sina teser."
 state_atheism.5.f:0 "”Dessutom vill jag påpeka att om Gud verkligen ska vara död, måste Gud vara frånvarande från gudstjänsten. Låt oss vara dömda till frihet, så att vi kan skriva vår historia. Inte i sten eller blod, som vår historia under Gud har varit, utan med bläck och genom handlingar. Gud kan inte vara – och bör inte längre accepteras som – en bekväm ursäkt, en lögn för att uppmuntra de mäktigas nycker!”"
 state_atheism.5.a:0 "Traditionen har fortfarande en plats i samhället."
 state_atheism.5.b:0 "Bort med tron. Bort med alla dess yttre attribut."
 state_atheism.5.c:0 "Det finns ingenting alls som inte bör ifrågasättas."
 state_atheism.6.t:0 "Gyllene njutningar"
 state_atheism.6.d:0 "De[SCOPE.gsInterestGroup('armed_forces_ig').GetName]har börjat genomföra beslag från alla[SCOPE.sPop('majority_religion').GetReligion.GetName]  gudstjänstlokaler i [SCOPE.sState('religion_seizures_state').GetName]. Varje byggnad, konstverk och varje guldkitschföremål inventeras inför försäljningen."
 state_atheism.6.f:0 "”Okej, det där är bara det som finns i prästgården. Vad har han i sin bostad?” \n\n”Sir, vi har hämtat allt det här från ett av kapellen i ambulatoriet.” \n\n”Jösses, det finns tillräckligt med guld där inne för att starta en ny gruva. Kalla in fyra man till och genomsök de återstående kapellen, omedelbart!”"
 state_atheism.6.a:0 "Smält ner guldet och prägla det på nytt."
 state_atheism.6.b:0 "Låt våra modiga styrkor få lite ”riskersättning”."
 state_atheism.6.c:0 "Ge prästerna ett bidrag så att de kan börja ett nytt liv."
 luddite_law_events.4.t:0 "Längtan efter tallar"
 luddite_law_events.4.d:0 "En populär ny bok, fylld med färgstarka beskrivningar av fältarbetet och detaljerade uppgifter om [ROOT.GetCountry.GetName]områdets djurliv, har riktat stor uppmärksamhet mot utsikterna att införa [SCOPE.sLaw('current_law_scope').GetName]."
 luddite_law_events.4.f:0 "”Och busken har vänner som möter honom, och deras vänliga röster hälsar honom\n i vindens sus och flodens porlande över sandbankarna, \noch han ser den storslagna synen av de solbelysta slätterna som sträcker sig vidare, \noch om natten de eviga stjärnornas underbara prakt.”"
 luddite_law_events.4.a:0 "Vilken fängslande läsning."
 luddite_law_events.4.b:0 "Erbjud författaren en provision – med våra hälsningar."
 luddite_law_events.5.t:0 "Dårar!"
 luddite_law_events.5.d:0 "Motståndarna till de föreslagna[SCOPE.sLaw('current_law_scope').GetName]lagarna, som har kopplingar till [...][SCOPE.gsInterestGroup('intelligentsia_ig').GetName], har väckt stor vrede hos de människor de försökte påverka. Många kräver nu hårda motåtgärder mot denna störning."
 luddite_law_events.5.f:0 "”Hur ska vi kunna gå framåt om vårt land plågas av blodtörstiga enfaldiga människor?” \n\n”Enfaldiga människor? Ja, jag är en enfaldig människa! Är du en enfaldig person? Vi ska bygga en stad och kalla den Enfaldsstaden, för då kommer alla de smarta jävlarna som gjorde oss arbetslösa att vara döda!”"
 luddite_law_events.5.a:0 "Om de är så smarta kan de väl lära sig att klara sig utan maskiner."
 luddite_law_events.5.b:0 "Kanske kan vi lyssna på vad[SCOPE.sCharacter('intelligentsia_leader').GetFullName]han har att säga."
 luddite_law_events.6.t:0 "Kollektiv fientlighet"
 luddite_law_events.6.d:0 "[SCOPE.gsInterestGroup('trade_unions_ig').GetName][SCOPE.gsInterestGroup('industrialists_ig').GetName]Nyheterna om lagarna[SCOPE.sLaw('current_law_scope').GetName] har nått  och . Istället för att omförhandla avtalen försöker de med våld omförhandla lagarna."
 luddite_law_events.6.f:0 "Ingen seriös aktör på den politiska scenen vågar betrakta ”Min fiendes fiende är min vän” som ett klokt råd. Det finns koalitioner, allianser av bekvämlighet och desperata överenskommelser. I de allra svåraste stunderna kan till och med eld och sten förena sig mot sin gemensamma fiende. Och om de skulle förenas, vore det klokt för dem som befinner sig närmast utbrottet att fly med alla medel."
 luddite_law_events.6.a:0 "Kanske var vi för hastiga."
 luddite_law_events.6.b:0 "Vi behöver bara locka bort den ena från den andra."
 luddite_law_events.6.c:0 "Pengar smörjer alla hjul."
