 titanic.2.t:0 "En sorglig katastrof"
 titanic.2.d:0 "Efter att den monumentala Titanic lämnat varvet i [SCOPE.sState('titanic_state').GetName]gick det inte lång tid förrän tragedin drabbade henne, då en del av hennes skrov kolliderade med ett lika imponerande isberg."
 titanic.2.d2:0 "[SCOPE.sState('titanic_state').GetName]Efter att det monumentala[SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')] fartyget lämnat varvet i  dröjde det inte länge förrän en tragedi drabbade henne, då en del av hennes skrov kolliderade med ett lika imponerande isberg."
 titanic.2.f:0 "”När jag sattes i båten ropade han till mig: ’Det är okej, lilla flicka. Åk du. Jag stannar kvar.’ När vår båt sköt iväg skickade han mig en kyss, och det var sista gången jag såg honom.”"
 titanic.2.a:0 "Det här är en tragedi."
 titanic_sank_modifier:0 "Ett oceangående fartyg sjunker"
 titanic.3.t:0 "En imponerande resa"
 titanic.3.d:0 "Efter att den monumentala Titanic lämnat varvet i [SCOPE.sState('titanic_state').GetName]… dröjde det inte länge förrän hennes jungfrufärd visade sig bli en fullständig framgång. Folkmassorna vinkade till passagerarna i ankomsthamnen och jublade."
 titanic.3.d2:0 "Efter att det monumentala[SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')] fartyget lämnat varvet i  [SCOPE.sState('titanic_state').GetName]dröjde det inte länge förrän hennes jungfrufärd visade sig bli en fullständig framgång. Folkmassorna vinkar till passagerarna i ankomsthamnen och jublar."
 titanic.3.f:0 "”Vad är människan jämfört med vågorna och havet? Det där skeppet var det enda beviset vi hade på att människan hade etablerat sitt herravälde över havet. Antikens vise män skulle förtvivla och förbanna oss, ty vi har förtrollat deras gudar och överträffat deras vattenmonster. \n\nVi är här, nu – och vördnaden är evig.”"
 titanic.3.a:0 "Det var drömmarnas skepp."
