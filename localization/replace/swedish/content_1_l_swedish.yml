 JAP_emperor_meiji_loc:0 "Meiji"
 JAP_emperor_taisho_loc:0 "Taisho"
 JAP_emperor_hirohito_loc:0 "Showa"
 je_veiled_protectorate:0 "Det dolda protektoratet"
 je_veiled_protectorate_reason:0 "Vårt inflytande i Egypten har ökat avsevärt, men vår makt i regionen är beroende av våra förbindelser med den icke-erkända staten. Genom att inrätta ett protektorat över landet skulle vår dominans säkerställas."
 veiled_protectorate.1.t:0 "Det dolda protektoratet"
 veiled_protectorate.1.d:0 "[ROOT.GetCountry.GetName] har säkrat herraväldet över [SCOPE.sCountry('egypt_country').GetName]. Denna situation har snabbt kommit att kallas ”Det dolda protektoratet”, eftersom Egypten – rent formellt – fortfarande är juridiskt underställt[SCOPE.sCountry('ottoman_country').GetAdjectiveNoFormatting][SCOPE.sCharacter('ottoman_ruler').GetPrimaryRoleTitle], som hjälplöst ser på situationen."
 veiled_protectorate.1.f:0 "I dag var Nilen översvämmad av blod. De som motsatte sig den nya regimen kuvades snabbt.[SCOPE.sCountry('egypt_overlord_country').GetAdjectiveNoFormatting]Diplomater och politiker har eld i blicken när de, i skuggan av pyramiderna, diskuterar hur de ska föra civilisationen till Egyptens länder."
 veiled_protectorate.1.a:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]Ingen kan förneka Imperiets makt."
 veiled_protectorate.1.b:0 "Var förvissad om att vi [SCOPE.sCharacter('egypt_ruler').GetPrimaryRoleTitle]kommer att stödja dig[SCOPE.sCountry('egypt_country').GetAdjectiveNoFormatting]."
 veiled_influence:0 "Dold påverkan"
 laws.1.t:0 "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] Undviker ett mordförsök"
 laws.1.d:0 "[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]Vår älskade[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]  [SCOPE.sCharacter('ruler_scope').GetFullName] har med nöd och näppe överlevt ett mordförsök. Den tilltänkta mördaren har kopplingar till [SCOPE.gsInterestGroup('jedi_scope').GetName], som motsätter sig de nya befogenheter som  lagen[SCOPE.sLaw('current_law_scope').GetName] skulle ge ."
 laws.1.f:0 "Oroande nyheter om ett misslyckat mordförsök mot[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]  har nått huvudstaden. Attentatet ägde rum mitt i natten, men[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]  lyckades övermanna gärningsmannen med hjälp av[SCOPE.sCharacter('ruler_scope').GetHerHis] sin  unga skyddsling. Från sin sjukhussäng berättade  för[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')][SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]  att trots skador som säkert kommer att lämna livslånga ärr är  beslutsamhet och engagemang starkare än någonsin.[SCOPE.sCharacter('ruler_scope').GetHerHis]"
 laws.1.a:0 "För ett tryggt och säkert samhälle."
 laws.1.b:0 "Så här dör friheten."
