 je_fascism_1_complete_condition_tt:0 "Förloppsindikatorn#!#bold har nått #bold100 %#!"
 je_fascism_1_fail_condition_tt:0 "Förloppsindikatorn#!#bold har nått #bold0 %#!"
 fascism_events.2.t:0 "Uppmuntrande ord"
 fascism_events.2.d:0 "De eldiga nationalistiska talen från [SCOPE.sCharacter('fascist_leader').GetFullName], en frispråkig [SCOPE.sCharacter('fascist_leader').GetIdeology.GetName], verkar ha fångat vissa delar av vår befolkning. Allt fler människor har tagit till sig rörelsens[SCOPE.sCharacter('fascist_leader').GetIdeology.GetNameNoFormatting] symboler och paroller."
 fascism_events.2.f:0 "”Ingen stad har någonsin grundats på en enda dag, och haven har aldrig tämjts på ett par morgnar; våra skepp är inte resultatet av en lat dag, och de hus som ger våra familjer skydd har inte byggts på två veckor. Att\n\n uppnå den storhet som vår nation förtjänar ska inte och får inte vara en lätt uppgift. Precis som arkitekterna i det förflutna kommer vi att uppföra underverk på våra marker, oföränderliga i evighet. Genom passion, genom styrka, genom kraft!”"
 fascism_events.2.a:0 "Genom kraft!"
 fascism_events.2.b:0 "Vi behöver inte ännu en uppviglare."
 fascism_events.2.c:0 "[SCOPE.sCharacter('fascist_leader_2').GetFullName] har en betydligt bättre syn."
 promoted_fascist_leader_modifier:0 "Befordrad fascistisk ledare"
 ignored_fascist_leader_modifier:0 "Den ignorerade fascistledaren"
 promoted_fascist_leader_ig_modifier:0 "Befordrad fascistisk ledare"
 ignored_fascist_leader_ig_modifier:0 "Den ignorerade fascistledaren"
 je_fascism_2:0 "Nationen framför jaget"
 je_fascism_2_reason:0 "Ett säkert land måste vara säkert inifrån. Förrädare och konspiratörer kan finnas överallt, och vi måste kunna ta itu med dem."
 fascism_2_tt:0 "Varje intressegrupp med en #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_ideologies_list_tt socialistisk#! eller[GetIdeology('ideology_radical').GetName]  [concept_leader] är [concept_marginalized]"
 fascism_3_tt:0 "Varje #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt socialist#! eller[GetIdeology('ideology_radical_movement').GetName]  [concept_political_movement] är antingen#bold  marginaliserad#! eller utsatt för#bold  förtryck#!"
 fascism_events.3.t:0 "Den organiserade majoriteten"
 fascism_events.3.d:0 "Våra gator är en trygg tillflyktsort för vårt folk, där säkerhetsvakter värnar om deras säkerhet dygnet runt och uppviglarna hålls borta från vår fascistiska regering."
 fascism_events.3.f:0 "”Dagens värme får fåglarna att sjunga i en samstämmig sång, som rytmiskt följs av sirenerna från polisen som patrullerar gatorna. Barnen leker i parken innan nattens utegångsförbud träder i kraft. Ett annorlunda – och säkrare – samhälle är möjligt, och vi är på rätt väg.”"
 fascism_events.3.a:0 "Vi måste lägga fokus på säkerheten."
 fascism_events.3.b:0 "Folk måste kunna lita på oss."
 fascist_authority_modifier:0 "Auktoritära åtgärder"
 fascist_loyalty_modifier:0 "Lojalitetsregler"
 fascism_events.4.t:0 "Gå med i vår sak"
 fascism_events.4.d:0 "I takt med att fascistiska idéer slår rot bland andra grupper och missnöjet växer bland folket har medlemmarna i[SCOPE.gsInterestGroup('fascist_ig').GetName]  försökt påverka  att välja ledare som[SCOPE.gsInterestGroup('new_fascist_ig').GetName] står regimen närmare."
 fascism_events.4.f:0 "”Tänker ni verkligen låta de där skurkarna visa sådan brist på respekt för vårt land? Den respekt som vi[SCOPE.gsInterestGroup('new_fascist_ig').GetNameNoFormatting]har förtjänat genom så många års hårt arbete och förnuft kommer att gå förlorad för alltid under deras inkompetenta styre. \n\nLåt dem drömma om ett fredligt och jämlikt samhälle som ett naivt barn – det finns bara ett sätt att uppnå fred: herravälde.”"
 fascism_events.4.a:0 "Det finns faktiskt bara ett sätt."
 fascism_events.4.b:0 "Alla vägar leder till Rom."
 fascism_events.4.c:0 "Kapitulation är en annan form av död."
 fascism_leaders.tt:0 "Det[SCOPE.gsInterestGroup('new_fascist_ig').GetName]kommer att bli betydligt mer sannolikt att man väljer fascistiska ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 conservative_leaders.tt:0 "Det[SCOPE.gsInterestGroup('new_fascist_ig').GetName]kommer att bli betydligt mer sannolikt att man väljer fascistiska, traditionalistiska eller etnonationalistiska ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 modifier_repressed_by_fascists:0 "Förtryckta av fascisterna"
 generate_fascist_leader_tt:0 "A[GetIdeology('ideology_fascist').GetName]  [concept_politician] kommer att ta över ledningen för [SCOPE.gsInterestGroup('new_fascist_ig').GetName]"
 generate_integralist_leader_tt:0 "En[GetIdeology('ideology_integralist').GetName]  [concept_politician] kommer att ta över ledningen för [SCOPE.gsInterestGroup('new_fascist_ig').GetName]"
 generate_generically_chudded_leader_tt:0 "[GetIdeology('ideology_fascist').GetName]A, [GetIdeology('ideology_traditionalist').GetName], eller[GetIdeology('ideology_ethno_nationalist').GetName]  [concept_politician] kommer att ta över ledningen för [SCOPE.gsInterestGroup('new_fascist_ig').GetName]"
 generate_brazilian_generically_chudded_leader_tt:0 "En [GetIdeology('ideology_integralist').GetName], [GetIdeology('ideology_traditionalist').GetName], eller[GetIdeology('ideology_ethno_nationalist').GetName]  [concept_politician] kommer att ta över ledningen för [SCOPE.gsInterestGroup('new_fascist_ig').GetName]"
 je_modernization_program:0 "Moderniseringsprogrammet"
 je_modernization_program_reason:0 "Ett mäktigt land hämtar sin styrka från just de pelare som bär upp det. Vi måste bygga ut vår infrastruktur för att öka vårt välstånd."
 je_modernization_program_tt:0 "Infrastrukturen i huvudstaden#!#bold är 150 eller mer"
 fascism_events.5.t:0 "Fyraårsplanen"
 fascism_events.5.d:0 "Utbyggnaden av vårt lands infrastruktur har lett till en mer effektiv och produktiv industri. Må denna tekniska utveckling bli den första av många som kommer att följa!"
 fascism_events.5.f:0 "”De så kallade ’stormakterna’ utanför våra gränser har försökt hindra oss, skada vårt land och vårt anseende samt skada vårt folk. Men från och med i dag ska de inte längre kunna skada oss. Det finns inget starkare än vår[ROOT.GetCountry.GetAdjectiveNoFormatting]kampanda; inte ens det finaste järnet, antikens svärd eller stålet från Damaskus kan mäta sig med den. \n\nOch idag bevisar vi det med eftertryck. Nationens[ROOT.GetCountry.GetAdjectiveNoFormatting]ekonomi kan inte saboteras, för vår infrastruktur är nu fri från utländska rovdjur.”"
 fascism_events.5.a:0 "Våra varv kommer att säkra vår plats i solen."
 fascism_events.5.b:0 "Vi borde använda det för att öka vår bygghastighet."
 infrastructure_port_modifier:0 "Effektiva hamnar"
 infrastructure_time_modifier:0 "Utbyggd infrastruktur"
 fascism_events.6.t:0 "Nationella myter"
 fascism_events.6.d:0 "En enighet bland vårt folk är inte bara möjlig, utan redan ett faktum. Alla medborgare i[ROOT.GetCountry.GetName]  är nu förenade under samma banner, samma flagga."
 fascism_events.6.f:0 "”De gamla legenderna från det förflutna kommer snart att få sin motsvarighet i våra egna nya legender. Våra nationalhjältar ser nu leende på oss. Vårt språk, vår kultur, allt som förenar oss – söner och döttrar av samma förfäder – det ska vi äntligen hedra.”"
 fascism_events.6.a:0 "Vårt land, vår kultur!"
 fascism_events.6.b:0 "Vi får inte låta den här segern splittra oss."
 ethno_nationalist_leaders.tt:0 "Det[SCOPE.gsInterestGroup('ethno_nationalist_ig').GetName]kommer att bli betydligt mer sannolikt att man väljer etnonationalistiska ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 ethno_conservative_leaders.tt:0 "Det[SCOPE.gsInterestGroup('ethno_nationalist_ig').GetName]kommer att bli betydligt mer sannolikt att man väljer etnonationalistiska, fascistiska eller traditionalistiska ledare när[Concept('concept_political_movement_pressure', '$concept_political_movement_pressured_short$')]  genom en tillämplig [concept_political_movement]."
 je_ethno_nationalist:0 "Vårt land, vår kultur"
 je_ethno_nationalist_reason:0 "Våra förfäders hemland tillhör oss, och till oss skall det återvända."
 ethnonationalist_tt:0 "Har en#boldetnonationalistisk eller fascistisk#! ledare"
 je_ethno_nationalist_tt:0 "Du äger#boldalla#! dina kulturella hemland"
 fascism_events.8.t:0 "Nationens röst"
 fascism_events.8.a:0 "Det där är verkligen en häftig hymn!"
 fascism_events.8.d:0 "En grupp ansedda kompositörer som undervisar vid  i[SCOPE.sState('anthem_state').GetName][SCOPE.sBuilding('anthem_building').GetName]  har vänt sig till oss. De har påpekat den alarmerande bristen på en riktig nationalsång som kan stärka vårt folks kampanda."
 first_line_rhyme_a_1:0 "”Bergens land, landet vid floden,\n"
 first_line_rhyme_a_2:0 "”Rikedomens land, silverlandet”\n"
 first_line_rhyme_b_1:0 "”Krigarnas land, praktens land”\n"
 first_line_rhyme_b_2:0 "”Ett land präglat av strider, där kapitulation är omöjlig”\n"
 second_line_rhyme_a_1:0 "Det är vår uppgift att skapa ära.\n"
 second_line_rhyme_a_2:0 "Må alla våra fiender darra av skräck!\n"
 second_line_rhyme_b_1:0 "Denna nations stolta försvarare\n"
 second_line_rhyme_b_2:0 "Att ständigt hota gärningsmannen\n"
 third_line_rhyme_a_1:0 "Född ur natten och välsignad av dagen,\n"
 third_line_rhyme_a_2:0 "Därför visar våra steg vägen,\n"
 third_line_rhyme_b_1:0 "Så skapades vårt land\n"
 third_line_rhyme_b_2:0 "Vi kommer att straffa dem[SCOPE.sCountry('rival_country').GetAdjectiveNoFormatting]som förrådde,\n"
 fourth_line_rhyme_a_1:0 "”För att driva bort alla våra fiender.”"
 fourth_line_rhyme_a_2:0 "”Vårt öde kommer att avgöras i dag!”"
 fourth_line_rhyme_b_1:0 "”Genom svärdets eld.”"
 fourth_line_rhyme_b_2:0 "”Med hjälp av makt och förnuft.”"
 national_anthem_modifier:0 "Nationalsången"
 fascism_events.9.t:0 "Öppen successionsordning"
 fascism_events.9.d:0 "Avgången av organisationens[SCOPE.sCharacter('new_fascist_leader_scope').GetInterestGroup.GetName] tidigare ledare har skapat ett maktvakuum i ledningen. Det verkar som om det kommer att fyllas av [SCOPE.sCharacter('new_fascist_leader_scope').GetFullName], en öppen [SCOPE.sCharacter('new_fascist_leader_scope').GetIdeology.GetName]."
 fascism_events.9.f:0 "\”[SCOPE.sCharacter('new_fascist_leader_scope').GetLastNameNoFormatting], av alla människor?[SCOPE.sCharacter('new_fascist_leader_scope').GetSheHe|U]  är, med all respekt, en tölp. Att placera[SCOPE.sCharacter('new_fascist_leader_scope').GetHerHim]  bredvid oss skulle vara kränkande.\”\n\n\”Det är väl inte vi som bestämmer det, eller hur?\”\n\n\”De[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  skulle lägga in sitt veto.[ROOT.GetCountry.GetRuler.GetSheHe|U]  #italicmåste#! lägga in sitt veto. Många av dem kan fortfarande tänka klart.”\n\n ”Jag är kluven. Kan vi vara säkra på att[SCOPE.sCharacter('new_fascist_leader_scope').GetLastNameNoFormatting]  verkligen tror på någonting alls? Om vi kan bli de som talar med[SCOPE.sCharacter('new_fascist_leader_scope').GetHerHim]  sist… tänk på det.”"
 fascism_events.9.a:0 "Det finns ingen anledning att lägga sig i."
