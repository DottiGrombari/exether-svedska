 fascist_characters_return_to_normal_tt:0 "Frekvensen med vilken #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fascistiska#! karaktärer dyker upp kommer att återgå till det normala"
