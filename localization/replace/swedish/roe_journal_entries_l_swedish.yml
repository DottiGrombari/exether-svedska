 je_unite_vermillion_proclaim_lumvar_button:0 "Proclaim Lumvar"
 je_unite_vermillion_proclaim_lumvar_button_desc:0 "With the strength of all the warbands at our back, we proclaim our nation under the name of Lumvar, united at last."
