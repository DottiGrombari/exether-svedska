l_swedish:
 victoria.1.t:0 "Drottning Victorias kröning"
 victoria.1.d:0 "[SCOPE.sCharacter('queen_victoria').GetFirstName]Kungen är död. I och med att hans unga systerdotter bestigit tronen jublar riket, och Hannoverkrönet övergår till händer utanför brittiskt inflytande. Må hon regera länge!"
 victoria.1.d2:0 "[SCOPE.sCharacter('queen_victoria').GetFirstName]Kungen är död. I och med att hans unga systerdotter har bestigit tronen jublar riket. Må hon regera länge!"
 victoria.1.f:0 "”Eftersom det har varit Försynen vilja att placera mig i denna befattning, ska jag göra mitt yttersta för att fullgöra min plikt gentemot mitt land.”"
 victoria.1.a:0 "Gud bevare drottningen!"
 victoria.1.tt:0 "[concept_customs_union]Medlemmarna i  [SCOPE.sCountry('hannover_victoria_scope').GetAdjective] lämnar vårt ekonomiska område."
 victoria.2.t:0 "Drottning Victorias kröning"
 victoria.2.d:0 "Kungen är död. I och med att hans unga systerdotter Victoria bestigit tronen övergår Hannoverkrönet till händer utanför brittiskt inflytande. Hennes farbror, [SCOPE.sCharacter('ernest_augustus').GetFirstName], regerar nu över Hannover."
 victoria.2.f:0 "”Jag skulle offra till och med den sista droppen av mitt blod för min systerdotter.”"
 victoria.2.a:0 "Gud bevare kungen!"
 britain_monarchy.1.t:0 "Kung Georg V:s kröning"
 britain_monarchy.1.d:0 "[SCOPE.sCharacter('george_v_relevant_ruler').GetFirstName]Kungen är död. I och med att hans son har bestigit tronen jublar riket. Må han regera länge!"
 britain_monarchy.1.f:0 "”Jag har förlorat min bästa vän och den bästa av fäder …” \n”Jag har aldrig haft ett enda gräl med honom i hela mitt liv.”\n ”Jag är förkrossad och överväldigad av sorg, men Gud kommer att hjälpa mig att fullgöra mina plikter, och min älskade May kommer att vara min tröst, precis som hon alltid har varit.” \n”Må Gud ge mig styrka och vägledning i den tunga uppgift som nu har fallit på mig.”"
 britain_monarchy.1.a:0 "Gud bevare kungen!"
 edward_vii_death_tt:0 "Edward VII avlider"
 prostitution.1.t:0 "Lagarna om smittsamma sjukdomar"
 prostitution.1.d:0 "Gruppen[SCOPE.gsInterestGroup('cda_ig').GetName]i [SCOPE.sState('cda_state').GetName], under ledning av [SCOPE.sCharacter('cda_ig_leader').GetFullName], kräver att regeringen tar ställning i frågan om prostitution. De begär att lagar ska tillämpas som ger polisen rätt att internera kvinnor som misstänks för prostitution på tvångssjukhus, med motiveringen att de sprider könssjukdomar."
 prostitution.1.d2:0 "Gruppen[SCOPE.gsInterestGroup('cda_ig').GetName]i [SCOPE.sState('cda_state').GetName], under ledning av [SCOPE.sCharacter('cda_ig_leader').GetFullName], kräver en lösning på den höga förekomsten av könssjukdomar bland sina män. De begär att lagar ska tillämpas som ger polisen rätt att internera kvinnor som misstänks för prostitution på isoleringssjukhus, med motiveringen att de sprider könssjukdomar."
 prostitution.1.f:0 "”Dessa fallna kvinnor är en skymf mot den moraliska anständigheten. De måste hållas i schack och behandlas, så att de inte sprider sina syndiga sjukdomar över hela nationen.”"
 prostitution.1.a:0 "Antag en lag om smittsamma sjukdomar."
 prostitution.1.b:0 "Dessa lagar är omänskliga."
 prostitution.1.c:0 "Den medicinska vetenskapen visar att sådana åtgärder är meningslösa."
 prostitution.2.t:0 "Upphävande av lagarna om smittsamma sjukdomar"
 prostitution.2.d:0 "[SCOPE.sState('feminist_cda_state').GetName]Feministiska grupper, med i spetsen,[SCOPE.sCharacter('feminist_cda_ig_leader').GetFullName]kräver att smittskyddslagarna i ska upphävas. De fördömer polisens brutala behandling av kvinnor och de omänskliga förhållandena på isoleringssjukhusen. Till och med kvinnor som inte har något samband med prostitution spärras rutinmässigt in mot sin vilja."
 prostitution.2.f:0 "”Männen i polisen lägger händerna på oss. Det är män som undersöker oss, hanterar oss och behandlar oss. På sjukhuset är det återigen en man som ber och läser Bibeln för oss. Vi ställs inför domare som är män, och vi kommer aldrig undan männens grepp förrän vi dör!”"
 prostitution.2.a:0 "Upphäva lagarna."
 prostitution.2.b:0 "Förnya lagarna."
 prostitution.2.c:0 "Upphäva lagarna i hela landet."
 prostitution.3.t:0 "En skandal i [SCOPE.sState('capital_state').GetName]"
 prostitution.3.d:0 "Polisen har stängt en ökänd bordell för män. Den gripne ägaren har avslöjat att[SCOPE.sCharacter('scandal_character').GetFullName]  ingår i hans kundkrets, och denna information har läckt ut till pressen."
 prostitution.3.f:0 "[SCOPE.sState('capital_state').GetNameNoFormatting]”En obeskrivligt avskyvärd skandal har brutit ut! De tillfångatagna pojkarna tvingades erkänna, och det[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]rapporteras att ytterligare en sensation i samband med denna affär snart kommer att avslöjas. Tjugotvå män som är inblandade, både adelsmän och andra, har flytt från [ROOT.GetCountry.GetNameNoFormatting]…”"
 prostitution.3.a:0 "[SCOPE.sCharacter('scandal_character').GetFullName] måste avgå omedelbart."
 prostitution.3.b:0 "Försök att mörklägga händelsen."
 prostitution.3.c:0 "Våra propagandister kommer att tona ner konsekvenserna."
 prostitution.3.a.tt:0 "[SCOPE.sCharacter('scandal_character').GetFullName] avgår från det politiska livet."
 prostitution.4.t:0 "Polisvåld"
 prostitution.4.d:0 "Användningen av extremt våld blir allt vanligare bland poliser i [SCOPE.sState('police_brutality_state').GetName]. Arbetarklassen och de socialt engagerade mobiliserar sig mot polisen som institution."
 prostitution.4.f:0 "”Det går knappt en vecka utan att de begår något brott som väcker avsky hos alla utom domarna. Pojkar får blåmärken av deras grymhet, kvinnor förolämpas av deras råhet; och det som brutaliteten har ställt till med förnekas genom mened, och domarnas dumhet låter det förbli ostraffat. Polisbrutalitet håller på att bli en av våra mest vördade institutioner.”"
 prostitution.4.a:0 "Vi kan inte tolerera detta beteende."
 prostitution.4.b:0 "Användning av våld är berättigat."
