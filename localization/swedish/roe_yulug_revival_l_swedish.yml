l_swedish:
 je_grinning_revival:0 "Det leende ordet"
 je_grinning_revival_reason:0 "”Det leende ordet”, den återupplivade läran från [Concept('concept_religion','Grinning Triad')], har börjat sprida sig bland goblinerna[GetPopType('peasants').GetName]i [ROOT.GetCountry.GetName]. Efter att länge ha levt under det blodröda oket predikar dess anhängare — som ofta är knutna till[SCOPE.gsInterestGroup('revival_ig').GetName]— den gamla tron på Triaden, jämlikheten bland alla gobliner och avskaffandet av hobgoblinernas övervakare.\n\nDe mötesplatser och böncirklar som de troende har upprättat sprider sig över hela landet och kan komma att fungera som ett medel för att snabbt organisera ett uppror i framtiden."
 je_grinning_revival_lobby:0 "”Det leende ordet” har börjat sprida sig bland goblinbönderna i [ROOT.GetCountry.GetName], på en våg av vrede över generationer under det karmosinröda oket. Dess predikanter manar till en återgång till den gamla triad-tron och ett slut på hobgoblinernas herravälde. Det är kanske bara en tidsfråga innan rörelsen bryter ut i ett öppet uppror."
 grinning_petition_complete_tt:0 "Har slutfört uppdraget#bold”Försvara profeten”#! [concept_journal_entry]"
 je_vindicate_prophet:0 "Försvara profeten"
 je_vindicate_prophet_reason:0 "Anhängare av det Leende Ordet bland folket[SCOPE.gsInterestGroup('revival_ig').GetName]har lagt fram en petition inför tronen, där de kräver tolerans för Triad-tron, att hobgoblin-förvaltarna avsätts och att den avrättade profetens namn rentvås från anklagelserna mot de korrupta inom [SCOPE.gsInterestGroup('governors_ig').GetName].\n\nTronens löfte att lyssna på de troendes krav har tillfälligt lugnat deras oro, men att vända ryggen åt de som framfört petitionen kommer utan tvekan att återuppväcka den revolutionära glöden."
 je_vindicate_prophet_lobby:0 "De troende inom ”Det leende ordet” har riktat en vädjan till tronen om att tolerera Triad-tron, återkalla hobgoblin-övervakarna och rentvå sin martyrdöde profet. Vi har vunnit tid genom att lova att lyssna – men ett svek kommer att sätta landsbygden i brand."
 modifier_grinning_revival:0 "Det leende ordet"
 modifier_grinning_uprising:0 "Goblinupproret"
 modifier_grinning_concord:0 "Rättvisa och gemenskap"
 modifier_grinning_paradise:0 "Ett paradis bland bergstopparna"
 modifier_grinning_betrayed:0 "Ouppfyllda löften"
 modifier_grinning_petition_rejected:0 "Missnöjda bönder"
 modifier_grinning_petition_accepted:0 "De försonade troende"
 modifier_grinning_prophet:0 "Triadens hjärta"
 modifier_grinning_prophet_hunted:0 "Triadens hjärta"
 modifier_grinning_realm_uprising:0 "Riket i lågor"
 grinning_word_effect_tt:0 "Så länge#v  The Grinning Word#! är aktivt kommer[SCOPE.gsInterestGroup('revival_ig').GetName]  att få ökad kraft och[Concept('concept_revolution','$concept_revolutions$')]  kommer att utgöra ett större hot mot vårt rike"
 roe_yulug.1.t:0 "Det leende ordet"
 roe_yulug.1.d:0 "[ROOT.GetCountry.GetName]Gobliner[GetPopType('peasants').GetName]som inspirerats av den återupplivade läran från den Leende Triaden har börjat organisera sig över hela landet. Deras krav på jämlikhet för alla gobliner, friheten att utöva den gamla tron och att göra sig av med hobgoblinernas övervakare blir allt svårare att ignorera för varje säsong som går."
 roe_yulug.1.f:0 ""
 roe_yulug.1.a:0 "Hotar ett nytt bonduppror?"
 roe_yulug.2.t:0 "Goblinupproret"
 roe_yulug.2.d:0 "Missnöjet bland folket[SCOPE.gsInterestGroup('revival_ig').GetName]har eskalerat till en begynnande öppen konflikt. Över [ROOT.GetCountry.GetName]hela landet har goblinbönderna använt ”Grinning Word”-mötesplatserna för att organisera sig inför revolutionen."
 roe_yulug.2.f:0 "[SCOPE.sCharacter('gov_leader_scope').GetLastNameNoFormatting]Ryktet hade spridit sig från gruva till gruva, från by till by. De skulle marschera mot maktens säte så snabbt de kunde, driva bort förmännen och riva ner huset. \n\nDetta skulle bli en barmhärtig marsch – där de skonade de oskyldiga och deras egendom, betalade för deras bröd och visade sin tro för alla som såg på. Det var lika långt ifrån guvernörernas soldaters uppförande som ett leende är från en piska."
 roe_yulug.2.a:0 "Kalla in garnisonerna och förbered er för strid."
 roe_yulug.3.t:0 "Profeten"
 roe_yulug.3.d:0 "En återupplivad lära, ”Det leende ordet”, har slagit rot i [SCOPE.sState('prophet_state').GetName], spridd av predikanten [SCOPE.sCharacter('prophet_scope').GetFullName]. Den förespråkar jämlikhet för alla gobliner och att man ska skapa ett paradis här, bland bergstopparna, redan i detta liv."
 roe_yulug.3.f:0 ""
 roe_yulug.3.a:0 "Ett plåster på folkets sår."
 roe_yulug.3.b:0 "En bedragare och ett hot mot riket."
 roe_yulug.4.t:0 "[SCOPE.sState('petition_state').GetFarmHubName]Framställningen"
 roe_yulug.4.d:0 "Anhängarna av det Leende Ordet har lämnat[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] in en [ROOT.GetCountry.GetRuler.GetLastName]begäran om en rad reformer. Dessa omfattar tolerans gentemot Triad-tron, avsättandet av hobgoblin-förvaltarna samt bestraffning av korrupta guvernörer."
 roe_yulug.4.f:0 "Man[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]hade fått kännedom om anhängarna av det Leende Ordet genom rapporter om deras organisering på landsbygden och de otaliga små framställningarna som skickats till[ROOT.GetCountry.GetRuler.GetHerHim]  och hovet. Alla var uppbyggda på samma sätt – försäkringar om den största lojaliteten mot tronen, följda av deras krav. \n\nDet var inte det första i sitt slag,[ROOT.GetCountry.GetRuler.GetSheHe]funderade han, men det var utan tvekan det mest högljudda. Valet var dubbelt: att stöta bort det nyorganiserade bondståndet eller dra på sig guvernörskastens vrede."
 roe_yulug.4.a:0 "Hota med repressalier om de inte skingrar sig."
 roe_yulug.4.b:0 "Tronen kommer att ta denna begäran i beaktande."
 roe_yulug.5.t:0 "Paradiset genom tålamod"
 roe_yulug.5.d:0 "[SCOPE.gsInterestGroup('revival_ig').GetName]Genom genomtänkta reformer och samarbete med har vi lugnat anhängarna av det Leende Ordet.[ROOT.GetCountry.GetName]ska hålla sig avskilt från världen – men det ska ske i harmoni."
 roe_yulug.5.f:0 "De sista utländska krafterna hade drivits tillbaka från hamnarna, och portarna hade stängts. Någonstans bortom sundet hade säkert någon handelsmagnat drabbats av chock och höll redan på att skriva brev till alla makthavare han kände. De skulle återvända – det var säkert – och det var lika säkert att de skulle återvända tungt beväpnade.\n\nDet fanns dock något nytt hos landets troll, en osynlig energi som följde dem i deras dagliga sysslor. De fruktade inte längre kanonerna och förmännen, och betraktade inte längre varandra som sitt största hot. När utomstående återvände skulle det inte finnas någon inre splittring att utnyttja – och vilken armé skulle kunna besegra en styrka på miljoner, som alla log i samlad kor?"
 roe_yulug.5.a:0 "Vi har främjat rättvisa och gemenskap."
 roe_yulug.5.b:0 "Vi ska skapa ett paradis bland bergstopparna."
 roe_yulug.6.t:0 "Ute på tork"
 roe_yulug.6.d:0 "Efter att ha väntat en outhärdligt lång tid på de utlovade reformerna har ”Grinning Word” tappat tålamodet. Stämningen bland läsarna[SCOPE.gsInterestGroup('revival_ig').GetName]präglas nu av en känsla av svek – och av en begynnande revolt."
 roe_yulug.6.f:0 "De hade förlorat ännu en budbärare. Trots hans anhörigas förhoppningar misstänkte inspektören att de aldrig skulle få se honom igen. Skatteindrivare, folkräknare, budbärare, vakter – alla hade börjat försvinna i detta distrikt om de avvek för långt från vägarna. Det var aldrig alla, men det räckte. Stämningen i kasernerna hade förvandlats från kylig likgiltighet till ren skräck, och det verkade inte som om det skulle förändras. Landet kändes inte längre\n\n som ett enda rike, utan snarare som en skärgård av städer sammanlänkade av de tunnaste trådar, omgivna av ett vidsträckt och fruktansvärt hav av förakt."
 roe_yulug.6.a:0 "Vi måste leva med konsekvenserna."
