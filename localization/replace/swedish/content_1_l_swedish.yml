 sale_of_alaska_happened:0 "Försäljningen av Alaska har ägt rum"
 oregon_dispute_happened:0 "Gränstvisten i Oregon har lösts"
 usa_purchase_alaska:0 "Förhandlingarna om köpet av Alaska"
 usa_purchase_alaska_desc:0 "Även om vissa ifrågasätter det strategiska och ekonomiska värdet av Alaskas vidsträckta områden, bör vi inte låta chansen att utvidga frihetens gränser gå oss förbi."
 alaska.1.t:0 "Ett erbjudande om Alaska"
 alaska.1.d:0 "[SCOPE.sState('alaska_scope').GetName][SCOPE.sCountry('alaska_buyer').GetName] har lämnat ett erbjudande till oss om att köpa ."
 alaska.1.f_ru:0 "”I egenskap av representant för[SCOPE.sCountry('alaska_buyer').GetNameNoFormatting]  förbinder vi oss hädanefter att vid statskassan i[SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName]  till den diplomatiska representanten eller annan ombud för[ROOT.GetCountry.GetRuler.GetHerHis]  Hans Majesteten[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  av hela Ryssland betala sju miljoner tvåhundratusen dollar i guld.”"
 alaska.1.f:0 "”I egenskap av företrädare för[SCOPE.sCountry('alaska_buyer').GetNameNoFormatting]  förbinder vi oss hädanefter att vid statskassan i[SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName]  till den diplomatiska representanten eller annan ombud för  från[SCOPE.sCountry('alaska_seller').GetNameNoFormatting][ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  betala sju miljoner tvåhundratusen dollar i guld.”"
 alaska.1.a:0 "[SCOPE.sCountry('alaska_buyer').GetAdjectiveNoFormatting]Marken är värdelös, låt de få den."
 alaska.1.b:0 "[SCOPE.sState('alaska_scope').GetName] kan fortfarande dölja rikedomar."
 alaska.2.t:0 "Inköpet[SCOPE.sState('alaska_scope').GetName]"
 alaska.2.d:0 "[SCOPE.sCountry('alaska_seller').GetName] har godkänt våra villkor. Ett avtal om köpet av[SCOPE.sState('alaska_scope').GetName]  har utarbetats."
 alaska.2.f:0 "”I morgon, om ni vill, kommer jag till avdelningen, så kan vi ingå avtalet.” \n”Varför vänta till i morgon, herr Stoeckl? Låt oss ingå avtalet redan i kväll!”"
 alaska.2.a:0 "Vilka rikedomar döljer dessa vidsträckta områden?"
 alaska.3.t:0 "Misslyckat[SCOPE.sState('alaska_scope').GetName]köp"
 alaska.3.d:0 "Förhandlingarna med[SCOPE.sCountry('alaska_seller').GetName]  om köpet av[SCOPE.sState('alaska_scope').GetName]  har strandat."
 alaska.3.f:0 "”Vi ser alltså att krig inte bara är en politisk handling, utan också ett verkligt politiskt verktyg, en fortsättning på den politiska verksamheten, ett genomförande av denna med andra medel.”"
 alaska.3.a:0 "Vi kommer att fortsätta med diplomatin på andra sätt."
 alaska.3.b:0 "Det var värt ett försök."
 alaska.4.t:0 "Ett erbjudande om Alaska"
 alaska.4.d:0 "[SCOPE.sState('alaska_scope').GetName][SCOPE.sCountry('alaska_seller').GetName] har visat sig oförmögen att skydda sin nordamerikanska koloni och verkar vara villig att sälja territoriet till oss för ett överkomligt belopp."
 alaska.4.f:0 "”Representanten för[SCOPE.sCountry('alaska_buyer').GetNameNoFormatting]  förbinder sig att vid statskassan i [SCOPE.sCountry('alaska_buyer').GetCapital.GetCityHubName], till den diplomatiska representanten eller annan ombud för[SCOPE.sCountry('alaska_seller').GetRuler.GetHerHis]  Hans[SCOPE.sCountry('alaska_seller').GetRuler.GetPrimaryRoleTitle] Majestät  betala summan [SCOPE.sCountry('alaska_seller').GetNameNoFormatting]av sju miljoner tvåhundratusen dollar i guld.”"
 alaska.4.a:0 "Vidta nödvändiga åtgärder."
 alaska.4.c:0 "Vi har inte råd med en sådan utgift just nu."
 alaska.4.tt1:0 "Vi kommer att erbjuda 3 miljoner pund under ett år."
 je_alaska:0 "Erövringen av Alaska"
 je_alaska_reason:0 "Beläget längst i norr ligger ett vidsträckt, outforskat område som kan rymma stora rikedomar.[SCOPE.sState('alaska_state').GetStateRegion.GetName] Om vi erövrar detta område kommer våra gränser att utvidgas avsevärt, vårt lands anseende att stärkas och vi kommer att kunna dominera handeln i norra Stilla havet. "
 alaska_usa_big_money:0 "Betala för Alaska – Stora betalningar"
 alaska_usa_medium_money:0 "Att betala för Alaska – Måttliga utgifter"
 alaska_usa_small_money:0 "Att betala för Alaska – magra utbetalningar"
 alaska_rus_big_money:0 "Försäljningen av Alaska – stora betalningar"
 alaska_rus_medium_money:0 "Försäljning av Alaska – Rimliga betalningar"
 alaska_rus_small_money:0 "Försäljningen av Alaska – magra betalningar"
 je_oregon:0 "Gränstvisten i Oregon"
 je_oregon_reason:0 "Var exakt gränsen till Oregon går har länge varit en olöst fråga mellan Storbritannien och Förenta staterna. Det är hög tid att denna tvist löses."
 oregon_tt:0 "Har upptäckt Oregon Trail genom att kartlägga den amerikanska västra gränsen"
 oregon.2.t:0 "Gränstvisten i Oregon"
 oregon.2.d:0 "De[SCOPE.sCountry('usa_scope').GetName]har lagt fram ett rimligt kompromissförslag i gränstvisten om Oregon. De föreslår att de ska annektera [SCOPE.sState('washington_scope').GetName], [SCOPE.sState('oregon_scope').GetName], och [SCOPE.sState('idaho_scope').GetName], medan vi behåller våra anspråk på de norra regionerna."
 oregon.2.f:0 "”Om amerikanerna slår sig ner vid Columbiaflodens mynning skulle det enligt min mening vara nödvändigt att överge kusten söder om floden. Denna fråga måste avgöras utan dröjsmål.” \n\n”Så länge handlarna från British Fur Company har fri tillgång till området kring Rocky Mountains från de olika handelsstationerna, kommer de i stor utsträckning att monopolisera pälshandeln väster om Mississippi, vilket under de närmaste åren nästan helt kommer att utesluta vår handel.”"
 oregon.2.a:0 "En ytterst tillfredsställande kompromiss."
 oregon.2.b:0 "Vi kommer inte att avstå en tum av brittiskt territorium!"
 oregon.3.t:0 "Oregonfördraget"
 oregon.3.d:0 "[ROOT.GetCountry.GetName][SCOPE.sCountry('britain_scope').GetName] har godtagit våra rimliga villkor och har överlåtit kontrollen över [SCOPE.sState('washington_scope').GetName], [SCOPE.sState('oregon_scope').GetName], och[SCOPE.sState('idaho_scope').GetName]  till ."
 oregon.3.f:0 "”Detta fördrag skall ratificeras av[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]  av [ROOT.GetCountry.GetNameNoFormatting], efter råd och med samtycke från dess senat, och ratifikationsurkunderna skall utväxlas i London sex månader efter detta avtals datum, eller tidigare om möjligt.”"
 oregon.3.a:0 "En ytterst vänskaplig överenskommelse."
 oregon.4.t:0 "Det misslyckade Oregonfördraget"
 oregon.4.d:0 "[ROOT.GetCountry.GetName][SCOPE.sCountry('britain_scope').GetName] har avvisat vårt rimliga kompromissförslag i gränstvisten med Oregon. :s anspråk på regionen är obestridliga, och därför kan en mer våldsam maktövergång bli oundviklig."
 oregon.4.f:0 "”Det brittiska imperiet står i vägen för vårt ’Manifest Destiny’! Vår stora nation måste sträcka sig från hav till hav.”"
 oregon.4.a:0 "Om de inte vill överlämna det kommer vi att beslagta det med våld."
 je_conquer_oregon:0 "Bilaga: Oregon"
 je_conquer_oregon_reason:0 "Eftersom britterna har vägrat att avstå från Oregon på diplomatisk väg måste vi erövra det med vapenmakt."
 oregon_resolved:0 "Tvisten i Oregon har lösts"
 plague.1.t:0 "[ROOT.GetCountry.GetAdjectiveNoFormatting]Influensan"
 plague.1.d:0 "Ett omfattande utbrott av en särskilt dödlig influensastam har brutit ut i [SCOPE.sState('plague_origin_state').GetName]. Det hotar att sprida sig snabbt och kan komma att utvecklas till en global pandemi."
 plague.1.f:0 "”Influensaepidemin drabbade oss nästan över en natt, likt ett dödsspöke, och tre dagar efter att hälsovårdsnämnden införde anmälningsplikt för sjukdomen var vårt sjukhus överfullt av offer för denna farsot.”"
 plague.1.a:0 "Vi får hoppas att det inte sprider sig!"
 plague_decisions_available.tt:0 "Beslutet om ”pandemihantering” har offentliggjorts, vilket kan mildra effekterna och begränsa smittspridningen."
 plague_state_mortality.tt:0 "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] Influensan bryter ut i [THIS.GetState.GetName], och antalet fall ökar[Concept('concept_pop_growth', '$concept_pop_growth_mortality$')]under de kommande 6 månaderna; delstaten kan drabbas av ytterligare pandemivågor"
 plague.2.t:0 "Influensan sprider sig[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting]"
 plague.2.d:0 "Den dödliga[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting]influensan har brutit ut i [SCOPE.sState('plague_spread_target').GetName]. Pandemin håller snabbt på att utvecklas till en global kris."
 plague.2.f:0 "”Det liknade verkligen en ström av sårade som flydde från slagfältet, och huset fylldes till bristningsgränsen nästan omedelbart. Inom några dagar blev det nödvändigt att inrätta en avdelning i högskolans idrottshall, som utrustades med sängar från våra studenters studenthem.”"
 plague.2.a:0 "När ska denna plåga ta slut?"
 plague.3.t:0 "En ny våg av[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting]influensa"
 plague.3.d:0 "Den fruktansvärda pesten fortsätter i [SCOPE.sState('new_wave_state').GetName], där en ny våg drabbar allt fler människor."
 plague.3.f:0 "”Runt klockan 12 började jag känna mig varm. Jag var så feberhet att jag var rädd att mina kläder skulle fatta eld. Jag hade en hosta som slet sönder mina inälvor när jag inte kunde hålla tillbaka den. Det var mörkt; jag hade säkert lunginflammation och jag har aldrig känt mig så förtvivlad och eländig i hela mitt liv.”"
 plague.3.a:0 "Må himlen låta detta ta slut snart."
 plague.4.t:0 "[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting]Influensan"
 plague.4.a:0 "[ROOT.GetCountry.GetName]Jag hoppas att det inte når dit!"
 plague.5.t:0 "Influensan[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting]: Regeringens åtgärder"
 plague.5.d:0 "Regeringen måste besluta hur den ska hantera den influensapandemi som hotar att drabba hela landet. Strängare åtgärder kommer visserligen att medföra kostnader, men de kommer att rädda liv."
 plague.5.f:0 "”På uppdrag av och enligt anvisningar från Statens hälsovårdsnämnd kommer det INTE att hållas några föreläsningar vid universitetet från och med kl. 12.00 idag. Studenterna FÅR INTE lämna staden; att göra det skulle bidra till att smittan sprids.”"
 plague.5.a:0 "Inför en strikt nedstängning och stäng icke-nödvändiga verksamheter."
 plague.5.b:0 "Införa hälsoåtgärder såsom social distansering och skyddsmasker."
 plague.5.c:0 "Vi kan inte riskera att skada ekonomin."
 plague_lockdown.tt:0 "Det är betydligt mindre troligt att stater drabbas av flera på varandra följande influensavågor. Dödligheten\n i influensa minskar avsevärt vid på varandra följande vågor."
 plague_measures.tt:0 "Det är mindre troligt att stater drabbas av flera på varandra följande influensavågor. Dödligheten\n i influensa minskar vid på varandra följande vågor."
 plague_no_response.tt:0 "Länderna kommer alltid att drabbas av flera på varandra följande influensavågor, upp till fyra vågor. Dödligheten\n i influensa kan vara mycket hög."
 spanish_flu_response:0 "Åtgärder mot pandemin"
 spanish_flu_response_desc:0 "Med en dödlig influensa som härjar i landet måste vi vidta åtgärder för att skydda våra medborgare."
 has_not_taken_plague_decision_for_6_months.tt:0 "Har inte förändrat den nationella pandemihanteringen under de senaste 6 månaderna."
 pandemic_response.tt:0 "Vi kommer att välja hur vi ska hantera pandemin. Under de kommande sex\n månaderna kommer vi inte att kunna välja någon annan strategi."
 plague_modifier:0 "Influensapandemi: Dödlighet"
 plague_lockdown_mod:0 "Influensapandemi: Ekonomisk nedstängning"
 plague_measures_mod:0 "Influensapandemi: Ekonomisk avmattning"
 plague.7.t:0 "Rapporter om influensa skapar en antikrigsstämning"
 plague.7.d:0 "Rapporterna om de många dödsfallen till följd av influensan[SCOPE.sCountry('plague_originator_country').GetAdjectiveNoFormatting] under[SCOPE.sState('plague_state').GetName]  skadar allmänhetens stöd för våra krigsansträngningar."
 plague.7.f:0 "”Det är ren galenskap att vi skickar män i krig medan denna farsot härjar i våra hem. Borde inte staten sätta sina medborgares liv före deras död?”"
 plague.7.a:0 "Vi kommer inte att ingripa mot den fria pressen."
 plague.7.b:0 "Sprid lugnande propaganda som stöds av medicinsk vetenskap."
 plague.7.c:0 "Censurera nyheter om dödstal och smittfall."
 plague.8.t:0 "Pandemirelaterade åtgärder som bidrar till fattigdom"
 plague.8.d:0 "[SCOPE.sState('plague_poverty_state').GetName]Eftersom många inte kan arbeta på grund av våra åtgärder mot pandemin har fattigare medborgare svårt att betala hyran. Nyligen arbetslösa arbetare riskerar att vräkas eftersom hyresvärdarna vägrar att bevilja deras ansökningar om anstånd."
 plague.8.f:0 "”De sa till mig att jag inte kunde arbeta eftersom fabriken är överbelagd. Alla fabriker är överbelagda! Hyresvärden – må han brinna i den eviga elden – bryr sig inte det minsta om vår situation och kräver att hyran ska betalas före veckans slut, annars hotar han med vräkning. Min familj kommer säkert att tvingas lämna vårt hem.”"
 plague.8.a:0 "Införa ett hyresstopp och ett förbud mot vräkningar."
 plague.8.b:0 "Öka socialförsäkringen tillfälligt."
 plague.8.c:0 "Det finns inget vi kan göra åt det här."
 plague.9.t:0 "Anti-mask-ligan"
 plague.9.d:0 "[SCOPE.sCharacter('anti_mask_ig_leader').GetFullName] har bildat organisationen ”Anti-Mask League” i protest mot våra pandemibekämpningsåtgärder. De ifrågasätter effektiviteten i våra åtgärder och kräver att vi upphäver dem med hänsyn till den pressade ekonomin."
 plague.9.f:0 "”Bär en mask och rädda ditt liv! Den kris som vårt land nu står inför överstiger hälsovårdsmyndighetens resurser. \nDe som inte bär mask blir sjuka. Den man, kvinna eller det barn som vägrar att bära mask just nu är en farlig slöfock!”"
 plague.9.a:0 "Bry dig inte om ligan."
 plague.9.b:0 "Avskaffa åtgärderna mot pesten."
 plague.9.c:0 "Diskreditera ligan med hjälp av medicinsk vetenskap."
