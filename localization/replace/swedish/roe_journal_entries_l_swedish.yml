 je_bandit_sign_letter_of_marque:0 "Sign Letter of Marque"
 je_bandit_sign_letter_of_marque_desc:0 "By signing a letter of marque with a powerful patron, [ROOT.GetCountry.GetNameNoFlag] trade a degree of independence for protection and legitimacy. With the backing of a great power, our raids gain cover under their flag, turning outlaw deeds into sanctioned operations."
