 historical_agitators.1.t:0 "Tillbaka från Sibirien"
 historical_agitators.1.d:0 "Han har just återvänt efter tre års exil i Sibirien och[SCOPE.sCharacter('historic_agitator_scope').GetFullName]har träffat kollegor inom fackföreningarna för att diskutera sina nästa steg."
 historical_agitators.1.f:0 "”Ilych! Du ser ut att frysa. Och vilken fin ring du har på fingret. Exilen har gjort underverk för dig.” \n\n”Tillräckligt för att jag ska inse hur mycket arbete som återstår. Nadya och jag har haft många diskussioner om vart partiet kan ta vägen härnäst.” \n\n”Ha! Du talar som om du redan i morgon ska leda bourgeoisins fall! Det är skönt att se dig igen, gamle vän.”"
 historical_agitators.1.a:0 "Europas proletariat existerar bortom [ROOT.GetCountry.GetName]."
 historical_agitators.1.b:0 "Revolutionen kommer att fortsätta, oavsett om Okhrana övervakar den eller inte."
 historical_agitators.1.c:0 "#italic Iskra#! kommer att ha störst nytta av hans direkta handledning."
 historical_agitators.2.t:0 "Påkommen med att återvända"
 historical_agitators.2.d:0 "[ROOT.GetCountry.GetName]Han återvände från sin vistelse utomlands för att undvika fängelse,[SCOPE.sCharacter('historic_agitator_scope').GetFullName] men greps när han försökte ta sig in i landet igen. "
 historical_agitators.2.f:0 "Saint-Pelagie, Belle-Île och Carte. Hotet om allt mer förnedrande och fientliga fängelser tilltog. Och ryktena om denna nya Djävulsön någonstans i Guyana låter lika fruktansvärda som namnet antyder. Delescluze kunde ha hållit sig borta, men folkets revolution kan inte vänta."
 historical_agitators.2.a:0 "Grip honom igen. Att gömma sig i ett annat land är inte riktig exil."
 historical_agitators.2.b:0 "Han avtjänade sitt straff någon annanstans, inte här. Låt honom vara."
 historical_agitators.3.t:0 "Att undkomma lagen"
 historical_agitators.3.d:0 "Medan han avtjänade ett straff för revolutionära åsikter flydde han i smyg från fängelset.[SCOPE.sCharacter('historic_agitator_scope').GetFullName] Han har nu återförenats med de otaliga andra revolutionärerna över hela [ROOT.GetCountry.GetName]."
 historical_agitators.3.f:0 "”Sir? Revolutionären är borta.” \n\n”Mon dieu, vilken då? Vi har hela fängelser bara för de förrädiska råttorna!” \n\n”Blanqui, sir. Han har smugglats ut, och vi tror att det skedde när hans vänner anlände. Han är nog redan halvvägs till Belgien vid det här laget, sir.”"
 historical_agitators.3.a:0 "Fånga in honom igen och lämna honom på Djävulsön."
 historical_agitators.3.b:0 "Vi har fler politiska huvuden att ta."
 historical_agitators.4.t:0 "Kvinnor – mer än bara gamla jungfrur"
 historical_agitators.4.d:0 "De framväxande feministiska fraktionerna i[ROOT.GetCountry.GetName]  har drabbats av en splittring.[SCOPE.sCharacter('historic_agitator_scope').GetFullName]  har i dess kölvatten grundat en ny, militant organisation."
 historical_agitators.4.f:0 "Anknytningen till Independent Labour Party, tre separata lagförslag, tjugo års arbete och allt stöd från en engagerad gemenskap räckte inte – inte på långa vägar – för att åstadkomma ens det minsta framsteg när det gällde kvinnors rösträtt. Nya åtgärder skulle krävas. En kvinnas rösträtt skulle inte bara tillhöra de ogifta kvinnorna och änkorna. \n\nGenom eld, kamp och svält ska alla kvinnor få rösträtt."
 historical_agitators.4.a:0 "Några dagar på landet borde lindra deras bekymmer."
 historical_agitators.4.b:0 "Träffa hennes följare redan i ett tidigt skede."
 historical_agitators.4.c:0 "Hennes välgörenhetsinsatser på fattighusen talar till hennes fördel."
 historical_agitators.5.t:0 "En känsla av ödesbestämdhet"
 historical_agitators.5.d:0 "Missnöjd med de bristande framstegen när det gäller avskaffandet av [SCOPE.sCharacter('historic_agitator_scope').GetFullName]slaveriet har han börjat ta hjälp av alla revolvermän som kämpar mot slaveriet för att bistå slavar som flyr från sina ägare."
 historical_agitators.5.f:0 "”Gå och lägg er, barn. Ni måste väl vara trötta.” \n\n”Mamma, klockan är knappt tolv. Vi har ju inte ens gift bort Julia med Romeo än.” \n\n”Gå in genast och håll dig borta från den där vagnen! John Brown och hans söner är på väg hit, och hans korståg kommer att dränka oss alla i blod. Lita på vad jag säger, pojk!”"
 historical_agitators.5.a:0 "Må han vandra med Guds välsignelse"
 historical_agitators.5.b:0 "Må hans jordiska verk fortsätta obehindrat."
 historical_agitators.6.t:0 "Fransk åtgärd"
 historical_agitators.6.d1:0 "En ny publikation har kommit till kännedom inom ramen för [SCOPE.sCharacter('historic_agitator_scope').GetFullName]. I publikationen står det bland annat att[SCOPE.sCharacter('alfred_dreyfus_scope').GetFullName]  bör offras på  nationella intressets[ROOT.GetCountry.GetAdjective] altare."
 historical_agitators.6.d2:0 "En ny publikation har kommit i dagen inom ramen för [SCOPE.sCharacter('historic_agitator_scope').GetFullName]. Publikationen förespråkar i sitt program för[ROOT.GetCountry.GetName] radikal statlig antisemitism och en reaktionär, absolutistisk nationalism."
 historical_agitators.6.f1:0 "Anti-ards[SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting] förenades bland annat av ett gemensamt hat mot [SCOPE.sCharacter('alfred_dreyfus_scope').GetLastNameNoFormatting]. Oavsett om han var jude, alsacier eller helt enkelt en förrädare spelade det ingen roll för dem. Någon var skyldig till att ha befläckat Frankrikes ärofulla imperium. Inget mindre än mannens liv skulle kunna blidka de flesta. \n\nVissa krävde dock mer av Frankrike. De krävde enhetlighet i en ny nation."
 historical_agitators.6.f2:0 "Action Française förenades bland annat av ett gemensamt fiendskap mot fyra grupper av ”inhemska utlänningar”. Oavsett om det handlade om judar, frimurare, hugenotter eller utländska agenter spelade det ingen roll för dem. Någon var skyldig till att ha befläckat Frankrikes härliga imperium, och någon måste göras av med för att skapa enhet i en ny nation."
 historical_agitators.6.a:0 "Det är dags för en positiv granskning av monarkin."
 historical_agitators.6.b:0 "Den enda sanningen är att Dreyfus är skyldig!"
 historical_agitators.6.c:0 "En nation under en diktator och en kung är den enda vägen framåt."
 historical_agitators.7.t:0 "Den unge Josef"
 historical_agitators.7.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] har officiellt anlänt till[ROOT.GetCountry.GetName]  och mottagits med blandade reaktioner. Vissa kallar honom en plåga, medan andra kallar honom en visionär. "
 historical_agitators.7.f:0 "En dröm lockade honom: en union av självständiga stater. Ett enat och starkt Europa. Ett Europa förenat i broderskap. Ett Europa som en bastion för demokrati och upplysning. \n\nEn dröm som gång på gång krossades. Men drömmen lockade alltid, och han svarade alltid på den. Det enda som skulle kunna förverkliga denna republik är att förstöra allt som står i vägen för den."
 historical_agitators.7.a:0 "Föreläsningar och rundvisningar på universitetet – och inget mer."
 historical_agitators.7.b:0 "Håll noga utkik efter en rörelse från Young[ROOT.GetCountry.GetName]."
 historical_agitators.8.t:0 "Den tredje Bonaparte"
 historical_agitators.8.d:0 "Efter att ha fått sig en läxa genom sina utlandsresor och sitt misslyckade kuppförsök [SCOPE.sCharacter('historic_agitator_scope').GetFullName]har han återvänt till[ROOT.GetCountry.GetAdjective]landets gränser."
 historical_agitators.8.f:0 "”Pappa, pappa! Napoleon har kommit tillbaka!” \n\n”Vilken Napoleon menar du, Jacques? Den lille korpralen, den regerande kungen eller schweizaren?” \n\n”Den schweiziske officeren, pappa!”"
 historical_agitators.8.a:0 "Han förtjänar ingen särbehandling."
 historical_agitators.8.b:0 "Kanske har han lärt sig sin läxa."
 historical_agitators.8.c:0 "Och så avslöjar sig hjärnan bakom det hela."
 notification_napoleon_iii_leaves_country_name:0 "Napoleon III avreser [ROOT.GetCountry.GetName]"
 notification_napoleon_iii_leaves_country_desc:0 "I syfte att stödja den franska rojalistiska saken har den självutnämnde Napoleon III gett sig av[ROOT.GetCountry.GetName]mot bättre jaktmarker."
 notification_napoleon_iii_leaves_country_tooltip:0 "#header $notification_opium_wars_british_response_passive_name$#!\n$TOOLTIP_DELIMITER$\n$notification_opium_wars_british_response_passive_desc$"
 historical_agitators.9.t:0 "Den som vill bli kung"
 historical_agitators.9.d:0 "En invånare i regionen[SCOPE.sState('california_scope').GetName] [SCOPE.sCharacter('historic_agitator_scope').GetFullName]har utropat sig till kejsare. Han har börjat utfärda egna dekret, och folk har tryckt sedlar med hans avbild."
 historical_agitators.9.f:0 "”På den bestämda begäran och önskan från en stor majoritet av medborgarna i Förenta staterna förklarar och utropar jag,[SCOPE.sCharacter('historic_agitator_scope').GetFullNameNoFormatting] , tidigare bosatt i Algoa Bay vid Goda Hoppets udde och sedan de senaste 9 åren och 10 månaderna bosatt i San Francisco, Kalifornien, mig själv till kejsare över Förenta staterna...”"
 historical_agitators.9.a:0 "Låt honom tala. Det får folket att skratta."
 historical_agitators.9.b:0 "En utländsk statschef får inte tillåtas gå fri."
 historical_agitators.10.t:0 "Var till nytta"
 historical_agitators.10.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName], en arvlös son till en furstlig familj, har återvänt till [ROOT.GetCountry.GetName]. Hans verksamhet verkar vara av subversiv karaktär."
 historical_agitators.10.f:0 "”Det är ett stort nöje att träffa dig igen, Dmitri. Jag ser att Sankt Petersburg har blivit livligt igen.” \n\n”Det stämmer, Pyotr. Hör här, det här var inget artighetsbesök. Jag är glad att se dig i hemlandet igen, och… jag antar att några av mina vänner också skulle vara det\n\n.” ”Vänner? Säg inte att det är Tjajkovskij… åh, du menade allvar.”"
 historical_agitators.10.a:0 "Skicka honom till Sibirien tillsammans med de andra."
 historical_agitators.10.b:0 "Vad kunde en misslyckad prins göra?"
 historical_agitators.10.c:0 "Han borde hålla sig långt borta från städerna."
 historical_agitators.11.t:0 "Bakunin i Berlin"
 historical_agitators.11.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] har lämnat militären utan att ha uppnått sina mål och har ansökt om tjänstledighet för att studera i Berlin."
 historical_agitators.11.f:0 "”Min son, du är den förste i min släktlinje, och det är du som bär ansvaret för att upprätthålla den. Jag uppmanar dig att stanna kvar och använda dina talanger i tjänsten.” \n\n”Och jag skulle skala min panna som en potatis medan jag stämplar blanketter. Det finns ingen framtid i det. Det som finns i min panna kräver mer.”"
 historical_agitators.11.a:0 "Det[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]krävs både stora tänkare och stora generaler."
 historical_agitators.11.b:0 "Han kommer att njuta av sin utbildning och aldrig återvända till den."
 historical_agitators.12.t:0 "En man vid namn ”Lvov”"
 historical_agitators.12.d:0 "Vid en razzia som genomfördes i[SCOPE.sState('trotsky_state').GetName]  har över 200 medlemmar i Sydryska arbetarförbundet identifierats. Bland dem finns en ung man vid namn [SCOPE.sCharacter('historic_agitator_scope').GetFullName]."
 historical_agitators.12.f:0 "Det går rykten om[SCOPE.sState('trotsky_state').GetCityHubName]en tryckpress. Inte vilken tryckpress som helst som trycker den lokala tidningen eller ens godkända böcker. Denna tryckpress var inriktad på en handfull idéer: slagord som förkunnade proletariatets rättigheter och uppmaningar till de bildade att sprida det glada budskapet: revolutionen är på väg."
 historical_agitators.12.a:0 "Grip dem alla och skicka dem till Sibirien."
 historical_agitators.12.b:0 "Grip ledarna. Då kommer de övriga att följa reglerna."
 historical_agitators.13.t:0 "Dąbrowskis flykt"
 historical_agitators.13.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName]Kaptenen, en före detta artilleriofficer som gripits för uppvigling, har rymt från fångenskapen i Sibirien. Hans fångvaktare tror att han är på väg söderut."
 historical_agitators.13.f:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]Är det verkligen patriotiskt att göra motstånd mot en tyrann som härskar över ett älskat hemland, eller är det bara självupptaget förräderi? En viktig fråga som borde besvaras – om det bara fanns tid att stanna upp och vila. I söder, någonstans, var som helst söder om Moskva, skulle det vara rätt tillfälle. Just nu stod ”s” jakthundar i vägen."
 historical_agitators.13.a:0 "Hitta honom, innan han sprider sitt förräderi."
 historical_agitators.13.b:0 "Må Rysslands vidsträckta vidder ta honom i besittning."
 historical_agitators.13.c:0 "Han är nu Polens problem."
 historical_agitators.14.t:0 "En berättelse av Dickens"
 historical_agitators.14.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] har blivit alltmer trött på att driva Daily[SCOPE.sState('capital_scope').GetCityHubName] News och har valt att tillbringa sin tid utomlands."
 historical_agitators.14.f:0 "”Jag vågar påstå, John, att delägarna till Daily News kommer att bli min död. Den här tidningen var tänkt att bli så mycket mer. Jag känner att jag inte har någon tid kvar, varken av brist på kärlek eller pengar.” \n\n”Och jag borde veta när du vill lämna över något till mig, Charlie. Det är ditt projekt, och jag delar gärna med mig av min erfarenhet, men tänk noga igenom vad du föreslår. Jag tar det om det är vad du vill, men jag ska inte fatta beslutet åt dig.”"
 historical_agitators.14.a:0 "Han bör inte tyngas av okunnighet och fattigdom."
 historical_agitators.14.b:0 "Hans arbete där är ännu inte avslutat."
 historical_agitators.15.t:0 "Den unge Spartacus"
 historical_agitators.15.d:0 "En katastrofal strejk i Polen har lett till att ledarna för Proletariatpartiet avrättats för förräderi. Vissa medlemmar, däribland [SCOPE.sCharacter('historic_agitator_scope').GetFullName], har lyckats fly."
 historical_agitators.15.f:0 "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]Betydligt färre av gruppens medlemmar överlevde attacken än vad någon hade hoppats. De överlevande beslöt att träffas i hemlighet efter att de hade förklarats fredlösa. Alla var väl medvetna om att de skulle jagas av myndigheterna på grund av sina handlingar. Det fanns bara ett begränsat antal platser i Polen där de kunde gömma sig, och myndigheternas klor räknades i miljoner."
 historical_agitators.15.a:0 "Det får inte bli några kompromisser, inte ens för hennes skull."
 historical_agitators.15.b:0 "Det är överdrivet att straffa en kvinna som har hela livet framför sig."
 historical_agitators.16.t:0 "Förstörelse: En kreativ drivkraft"
 historical_agitators.16.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] har nyligen gett ut boken ”Reflections on Violence”, vilket både visar på hans anslutning till den radikala vänstern och ett avsteg från den ortodoxa socialistiska teorin."
 historical_agitators.16.f:0 "”Marx antog att borgarklassen inte behövde uppmanas att använda våld; men vi står inför ett nytt och helt oförutsett faktum: en borgarklass som strävar efter att försvaga sin egen styrka.”"
 historical_agitators.16.a:0 "Se till att han lämnar Frankrike innan han blir en plåga!"
 historical_agitators.16.b:0 "Socialismen kan bara fortsätta om man tar hänsyn till nationen."
 historical_agitators.16.c:0 "Vissa begrepp bör förbli just begrepp."
 historical_agitators.17.t:0 "Hämndens etik"
 historical_agitators.17.d:0 "I linje med den allmänna stämningen inom försvarsmakten har han uppmanat till hämnd mot[SCOPE.sCountry('revenge_country').GetName] …,[SCOPE.sCharacter('historic_agitator_scope').GetFullName] vilket möttes av stormande applåder."
 historical_agitators.17.f:0 "Hämnd är i stort sett behovet av att återupprätta en befläckad ära. Man kan lika gärna söka hämnd för en stulen godbit som för ett utstucket öga. När en nations värde är knutet till dess militära storhet kan varje nederlag på slagfältet ändå skada dess anseende. Och ve den som angriper en nations värde."
 historical_agitators.17.a:0 "Länge leve Frankrike! Ingen kan stå emot henne!"
 historical_agitators.17.b:0 "Varje man har rätt att hämnas sitt lands förlust."
 historical_agitators.17.c:0 "Se till att den här krigshetsaren försvinner från sitt kontor."
 lv_4_general_tt:0 "[Concept('concept_commander_rank', 'Rank')][SCOPE.sCharacter('historic_agitator_scope').GetFullName] kommer att befordras till  av $commander_rank_4_general$"
 lv_2_general_tt:0 "[Concept('concept_commander_rank', 'Rank')][SCOPE.sCharacter('historic_agitator_scope').GetFullName] kommer att befordras till  av $commander_rank_2_general$"
 historical_agitators.18.t:0 "Silkehandlarens son"
 historical_agitators.18.d:0 "Efter[SCOPE.sCharacter('historic_agitator_scope').GetFullName] att nyligen ha återvänt till politiken har han blivit inbjuden att hålla offentliga tal om delstatens[ROOT.GetCountry.GetAdjective] konstitution."
 historical_agitators.18.f:0 "En revolution, oavsett hur fredliga avsikterna må vara eller hur mycket våld som utövas, tar sin tribut av alla inblandade. För vissa är priset enkelt: stövlar och blod. Andra upplever mindre uppenbara kostnader: förlorad passion, bleknande glädje och ideal som förvandlas till ingenting annat än minnen. Men med tillräckligt med tid och omsorg finns det en chans till förnyelse."
 historical_agitators.18.a:0 "Lagens moraliska företräde tillkommer arbetstagaren."
 historical_agitators.18.b:0 "Konstitutionella frågor handlar enbart om maktförhållanden."
 historical_agitators.19.t:0 "Det usla samarbetet med Djävulen"
 historical_agitators.19.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName]Det ryktas i São Paulo om en ny tidning,#italic*Diablo Coxo#!*. Detta är bara en av många publikationer som den självlärde advokaten skriver för."
 historical_agitators.19.f:0 "Ett nytt samarbete mellan en befriad slav och en utländsk serietecknare har tagit staden med storm. Skarpt, kvickt och vackert att se på – det var förutbestämt att det skulle reta upp varenda påfågel i São Paulo.[SCOPE.sCharacter('historic_agitator_scope').GetFullNameNoFormatting] Han hade ett stort arbete framför sig: inget mindre än friheten för varje slav i [ROOT.GetCountry.GetNameNoFormatting]."
 historical_agitators.19.a:0 "Democracia inleds."
 historical_agitators.19.b:0 "Dödshot är alltför vanliga mot en man som har frigivits."
 historical_agitators.20.t:0 "Valjeans flykt"
 historical_agitators.20.d:0 "När[SCOPE.sCharacter('ruler_scope').GetFullName]  börjar samla på sig allt mer makt,[SCOPE.sCharacter('historic_agitator_scope').GetFullName]anklagar  för[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]att vara en förrädare mot [ROOT.GetCountry.GetName]."
 historical_agitators.20.f:0 "Militärstövlar marscherade fram längs paradvägen. Makten bytte återigen händer. Varje steg var en dödsstöt för ännu en republik. Ingen som uttalade sig mot dödsstraffet, mot social orättvisa och mot fattigdom kunde övertalas att med värdighet böja sig för en privilegierad arvtagares nycker. Men vad kunde man göra för att påverka detta och samtidigt hålla en familj vid liv?"
 historical_agitators.20.a:0 "Det är bättre att dra sig tillbaka från striden än att dö i onödan."
 historical_agitators.20.b:0 "Alla Bonapartes har fallit. Den här är inget undantag."
 historical_agitators.20.c:0 "Frankrike kommer inte längre att följa Orléans anvisningar."
 imprison_hugo_tt:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] kommer att skickas till Djävulsön"
 historical_agitators.21.t:0 "Under Atari"
 historical_agitators.21.d:0 "Informanter har fått kännedom om att organisationen ”Reform China Society” existerar. En läcka har avslöjat detaljerade planer på ett uppror i [SCOPE.sState('sunyatsen_state').GetName], och dess medlemmar har nu gripits. [SCOPE.sCharacter('historic_agitator_scope').GetFullName], en av ledarna, har undgått att gripas."
 historical_agitators.21.f:0 "[SCOPE.sCharacter('monarch_scope').GetPrimaryRoleTitle]”Min bror, jag önskar att jag kunde skriva till dig under bättre omständigheter. Reformerna har inte gått så bra.[SCOPE.sState('sunyatsen_state').GetNameNoFormatting]  är fortfarande i ’s’ händer, och jag kan inte få en lön som går att leva på. Jag behöver det du kan avvara från dina rancher...”"
 historical_agitators.21.a:0 "Han skulle göra klokt i att satsa på Japan eller England."
 historical_agitators.21.b:0 "Om han lyckades undgå att bli gripen kan han befinna sig var som helst i Kina vid det här laget."
 historical_agitators.22.t:0 "Frosty, förrädaren"
 historical_agitators.22.d:0 "En chartistmarsch i Newport urartade till blodiga våldsamheter. Militärpersonal omringade folkmassan och grep bland annat en av dess ledare, John Frost."
 historical_agitators.22.f:0 "John Frosts fotbojor var värda 100 pund, förutsatt att han överlämnades levande och oskadd. En lyckobringande dag krävde det äldsta straffet: hängning, dragning och därefter kvartersning. Och ändå skulle folket få säga sitt i detta fall. En barbarisk död medan man marscherade för en rättvisare rösträtt var bortom all förståelse. Ett mildare straff var på sin plats i upplysningstidens kölvatten."
 historical_agitators.22.a:0 "Betrakta honom som den siste förrädaren som dödats på detta sätt."
 historical_agitators.22.b:0 "Förvisa honom från Storbritannien."
 historical_agitators.22.c:0 "Van Diemens Land är tillräckligt långt bort."
 historical_agitators.23.t:0 "Damen med lampan"
 historical_agitators.23.d:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] har anlänt till [ROOT.GetCountry.GetName], där hon mottagits med blandade reaktioner. Att hon har fört med sig sitt banbrytande arbete inom omvårdnad till landet har gett upphov till omfattande rykten om hennes strävan att förändra lagstiftningen rörande kvinnor på arbetsmarknaden."
 historical_agitators.23.f:0 "Hon är utan överdrift en ”välgörande ängel” på våra sjukhus, och när hennes smala gestalt tyst glider fram längs varje korridor, mjuknar varje stackars mans ansikte av tacksamhet vid åsynen av henne.\n\n När alla läkare har dragit sig tillbaka för natten och tystnad och mörker har sänkt sig över de milsvida raderna av liggande sjuka, kan man se henne ensam, med en liten lampa i handen, göra sina ensamma ronderingar."
 historical_agitators.23.a:0 "Kvinnan med hammaren! Hon bröt sig in i ett låst förråd för att komma åt medicin till de sårade."
 historical_agitators.23.b:0 "Hennes förslag vinner mark i [ROOT.GetCountry.GetName]."
 jaroslaw_in_prison_tt:0 "[SCOPE.sCharacter('historic_agitator_scope').GetFullName] kommer att föras tillbaka till ett betydligt hårdare fängelse"
 paris_commune.1.t:0 "Pariskommunen"
 paris_commune.1.d:0 "Ett långvarigt missnöje med regeringens krav på  i[SCOPE.sState('paris_scope').GetStateRegion.GetCityHubName][SCOPE.gsInterestGroup('national_guard_scope').GetName]  har eskalerat till ett öppet uppror i staden. Revolutionärerna har avrättat flera arméofficerare och utropat en rivaliserande regering under ledning av [SCOPE.sCountry('paris_commune_scope').GetName]."
 paris_commune.1.f:0 "”Proletärerna i Paris har, mitt bland de härskande klassernas misslyckanden och svek, insett att tiden är inne för dem att rädda situationen genom att själva ta ledningen över de offentliga angelägenheterna. De har insett att det är deras tvingande plikt och deras absoluta rätt att bli herrar över sitt eget öde genom att ta makten i sina egna händer.” \n\n– Karl Marx,#italic  Inbördeskriget i Frankrike#!"
 paris_commune.1.a:0 "Den här galenskapen måste ta slut!"
 paris_commune.1.b:0 "Ett beväpnat Paris är en beväpnad revolution!"
 commune_progress_start_at_40:0 "Vi kommer att ställa oss på regeringens#bold[SCOPE.sCharacter('ruler_scope').GetLastName]\nsida. Pariskommunen#! kommer att inleda med ett litet underläge."
 commune_progress_start_at_60:0 "Vi kommer att ställa oss på Paris-kommunens#bold#bold #!\nsida. Paris-kommunen#! kommer att inleda med ett litet försprång."
 paris_commune_on_cooldown_tt:0 "Har inte använt detta beslut under de senaste#boldtre månaderna#!"
 paris_commune.2.t:0 "Den blodiga veckan"
 paris_commune.2.d:0 "[SCOPE.sCountry('paris_commune_scope').GetName]Regeringslojala[ROOT.GetCountry.GetRuler.GetLastName] styrkor har marscherat in i Paris och slutgiltigt besegrat kommunens styrkor under en veckolång strid inom stadens gränser. Det har redan rapporterats om massavrättningar av tillfångatagna nationalgardister som var lojala mot kommunen."
 paris_commune.2.f:0 "”Kommunen, som var omringad från alla håll, hade endast döden i sikte. Den kunde bara visa mod, och det gjorde den. Och genom att gå under öppnade den dörren till framtiden på vid gavel. Det var dess öde.” \n\n– Louise Michel"
 paris_commune.2.a:0 "Det får inte finnas någon nåd för en grupp mördare."
 paris_commune.2.b:0 "Vi måste uppträda lättsamt, annars kommer Paris aldrig att förlåta oss."
 paris_commune.3.t:0 "Marschen mot Versailles"
 paris_commune.3.d:0 "En styrka på flera tusen man från Nationalgardet, lojala mot [[SCOPE.sCountry('paris_commune_scope').GetName]...], har marscherat mot slottet i Versailles och tillfångatagit ministrarna i[ROOT.GetCountry.GetRuler.GetLastName][...]. Kommunens flagga har hissats över det konservativa motståndets viktigaste fäste."
 paris_commune.3.f:0 "”Den kommunala revolutionen, som inleddes genom ett folkinitiativ, inleder en ny era av experimentell, positiv och vetenskaplig politik.\n\nDet är slutet på den gamla regerings- och kyrkliga världen, på militarismen och byråkratin, på utnyttjandet, spekulationen, monopolen och privilegierna, som proletariatet har att tacka för sitt slaveri och fosterlandet för sina olyckor och katastrofer.” \n\n–#italic  Pariskommunens manifest#!"
 paris_commune.3.a:0 "Versailles-regeringen kommer att ställas inför rätta som brottslingar."
 paris_commune.3.b:0 "Vi måste fira vår seger och försonas."
 communards_seize_power_tt:0 "[SCOPE.sCountry('paris_commune_scope').GetAdjective] styrkorna kommer att ta kontrollen över#boldFrankrike#!"
 paris_commune.4.t:0 "Kommunardernas revolution"
 paris_commune.4.d:0 "[SCOPE.sCountry('paris_commune_scope').GetName]De långvariga spänningarna mellan folket[ROOT.GetCountry.GetAdjective] och regeringen[ROOT.GetCountry.GetRuler.GetLastName] har nått en kritisk punkt. Revolutionärer över hela landet har förklarat sin lojalitet mot och marscherar mot den hårt ansatta centralregeringen."
 paris_commune.4.f:0 "”Gör plats för folket, för kämparna med bara armar! Tiden för det revolutionära kriget har slagit! Till vapen, medborgare! Till vapen!” \n\n– Louis Delescluze"
 paris_commune.4.a:0 "Död åt förrädarna!"
 paris_commune.4.b:0 "Länge leve Kommunen!"
 commune_progress_subtract_10:0 "#!Paris-kommunens#bold framsteg kommer att#boldminska#! med #bold10#!"
