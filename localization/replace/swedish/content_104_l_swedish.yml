l_swedish:
 congo_river_expedition:0 "Expedition till Kongofloden"
 congo_river_expedition_desc:0 "Afrikanska kontinentens hjärta är fortfarande ett mysterium för många. Vi ska ge oss ut på en expedition för att kartlägga Kongoflodens lopp."
 congo_river_expedition_tooltip:0 "Krav:"
 modifier_congo_river_expedition_complete:0 "Kartlagt Kongoflodens lopp"
 expedition_events.601.t:0 "Expedition till Kongofloden"
 expedition_events.601.d:0 "En expedition har organiserats för att utforska floderna Lualaba och Kongo."
 expedition_events.601.f:0 "Ett antal experter inom olika områden har samlats för att delta i expeditionen till naturens innersta. Deras ungdomliga entusiasm smälter tyst samman med den försiktiga rädsla som våra mest erfarna upptäcktsresande hyser inför den okända kontinenten."
 expedition_events.601.a:0 "Bra idé."
 expedition_events.601.b:0 "Inte nu."
 expedition_events.602.a:0 "[SCOPE.sCharacter('expedition_leader_1').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_1').GetFullName]"
 expedition_events.602.b:0 "[SCOPE.sCharacter('expedition_leader_2').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_2').GetFullName]"
 expedition_events.602.c:0 "[SCOPE.sCharacter('expedition_leader_3').GetPrimaryRoleTitle] [SCOPE.sCharacter('expedition_leader_3').GetFullName]"
 expedition_events.603.t:0 "Att välja en budget"
 expedition_events.603.d:0 "Hur mycket pengar vill du avsätta till expeditionens budget?"
 expedition_events.603.f:0 "”Vi kan stöta på alla möjliga hinder, och ju mer finansiering vi har, desto bättre förberedda kommer vi att vara.”"
 expedition_events.603.a:0 "En liten mängd."
 expedition_events.603.b:0 "En medelmåttig mängd."
 expedition_events.603.c:0 "En stor mängd."
 expedition_events.604.t:0 "Expeditionen anländer"
 expedition_events.604.d:0 "Efter några veckors förberedelser och resor har expeditionen under ledning av[SCOPE.sCharacter('expedition_leader').GetFullName]  anlänt till Kongoflodens mynning. Härifrån kommer de att påbörja sin resa för att kartlägga denna svårfångade flods lopp."
 expedition_events.604.f:0 "”Att färdas uppför den där floden var som att resa tillbaka till världens allra första början, när vegetationen växte vilt på jorden och de stora träden var kungar. En tom vattendrag, en djup tystnad, en ogenomtränglig skog. Luften var varm, tjock, tung och trög. Det fanns ingen glädje i solens strålande sken. De långa sträckorna av vattenvägen fortsatte, öde, in i mörkret i de skuggade avlägsenheterna.”"
 expedition_events.604.a:0 "Framåt!"
 expedition_events.611.t:0 "En lyckad expedition"
 expedition_events.611.d:0 "[SCOPE.sCharacter('expedition_leader').GetFullName] har återvänt i triumf, och Kongoflodens lopp och källa har kartlagts."
 expedition_events.611.f:0 "”Att återvända hem ska ju vara det enklaste, och i viss mening var det verkligen så. Men djungeln hade för alltid tagit oss, förtrollat våra själar med fest och skräck – en del av oss hade för alltid stannat kvar där. När jag blundade där såg jag min familj; när jag blundar här ser jag bara ett ihållande och överväldigande grönt.”"
 expedition_events.611.a:0 "Fantastiska nyheter!"
 congo_expedition_modifier:0 "En lyckad expedition till Kongo"
 expedition_events.612.t:0 "Misslyckad expedition"
 expedition_events.612.d:0 "Efter att inga rapporter har inkommit på flera månader har det blivit uppenbart att expeditionen som skulle kartlägga Kongoflodens lopp har misslyckats och[SCOPE.sCharacter('expedition_leader').GetFullName]att expeditionsmedlemmarna har försvunnit tillsammans med den."
 expedition_events.612.d2:0 "Efter att inga rapporter hade kommit på flera månader verkade expeditionens öde klart; men i morse kom äntligen ett brev där[SCOPE.sCharacter('expedition_leader').GetFullName] man medgav att det enda sättet att överleva var att vända tillbaka."
 expedition_events.612.f:0 "”Ser du berättelsen? Ser du någonting? Det känns som om jag försöker berätta en dröm för dig – ett fåfängt försök, eftersom ingen beskrivning av en dröm kan förmedla drömkänslan, den där blandningen av absurditet, överraskning och förvirring i en darrning av kämpande uppror, den där känslan av att fångas av det otroliga, vilket är själva essensen av drömmar...\”"
 expedition_events.612.a:0 "Förbannat!"
 expedition_events.612.b:0 "Förbannat!"
 failed_congo_river_expedition_modifier:0 "Den misslyckade Kongo-expeditionen"
 expedition_events.620.t:0 "Båtreparationer"
 expedition_events.620.d:0 "Vår båt har skadats av ett stenblock som vi inte upptäckte när vi försökte ta oss igenom en av flodens smalaste meander i [SCOPE.sState('current_expedition_location').GetName]."
 expedition_events.620.f:0 "”Det smalnande vattnet strömmar mellan kantiga klippor, träskrot och drivande rester av den djungel som omger oss. Man skulle kunna gå vilse i denna flod – till och med gå helt vilse i sina egna tankar, och dessa ruiner skulle kunna förväxlas med ens egna ruiner.\n\nEtt skarpt ljud väckte oss ur vår barnsliga dagdröm, minnen från enklare tider på en annan plats, en annan tid så avlägsen att den slukar denna tillvaro, förvandlar den till något vildare, något ensammare. När vi gick fram för att undersöka det upptäckte vi att en del av skrovet hade skadats allvarligt.”"
 expedition_events.620.a:0 "Vi måste stanna upp och ta itu med det."
 expedition_events.620.b:0 "Vi har inte råd att förlora någon tid."
 expedition_events.620.c:0 "Vi kan utan problem fixa det på ett par dagar."
 expedition_events.630.t:0 "Den vita dimman"
 expedition_events.630.d:0 "Vid gryningen vaknar expeditionsmedlemmarna och upptäcker att de är omgivna av en tät vit dimma som kraftigt försämrar deras sikt."
 expedition_events.630.f:0 "”Där låg det framför oss: ett trögflytande och koagulerat skikt av naturens unkna andedräkt, som en massa ruttet elfenbensblod, vilket gjorde det omöjligt att ana var vår ångbåt befann sig, och till och med omöjligt att ens gissa vem mannen bredvid oss var, eller om han fortfarande levde. \n\nDet var stilla. Och den livslösa stillheten liknade inte alls fred.”"
 expedition_events.630.a:0 "Vi borde strunta i det och fortsätta vår resa."
 expedition_events.630.b:0 "Det är inte säkert att segla ut under dessa förhållanden."
 expedition_events.640.t:0 "Krokodiler!"
 expedition_events.640.d:0 "Under färden på floden dras en av våra män oåterkalleligt ner i vattnet medan han kontrollerade skrovets skick."
 expedition_events.640.f:0 "”På silverglänsande sandbankar solade sig flodhästar och alligatorer sida vid sida. Ett skrik hördes i gryningen, men det framstod som en orolig och bullrig dröm, som man minns med förundran mitt bland den överväldigande verkligheten i denna märkliga värld av växter, vatten och larm. Efter att sömndrucket ha följt ljudet upptäckte vi att en av våra män hade dragits ner i flodens djup av ett par vassa käkar, klara ögon och smaragdgrön hud.”"
 expedition_events.640.a:0 "Kämpa för ditt liv!"
 expedition_events.641.t:0 "Livet segrar"
 expedition_events.641.d:0 "Efter en oändligt lång minut av kamp lyckas vår man blockera krokodilens käftar med en träplanka och snabbt ta sig tillbaka ombord."
 expedition_events.641.f:0 "”Skrik, kamp och rädsla. Slag, bett och simmande. Stängda ögon, darrande händer och lättnadssuckar. Vi tittade på mannen som hade kämpat mot döden själv, jag lade min hand på hans axel och sa: ’Vila nu.’”"
 expedition_events.641.a:0 "Ge den här mannen en löneförhöjning!"
 expedition_events.642.t:0 "En tyst minut"
 expedition_events.642.d:0 "Efter en oändligt lång minut av kamp visar sig naturen vara oundviklig."
 expedition_events.642.f:0 "”Det skarpa ljudet av käftar som sluts avbryts av en mjukare klang. Vi önskar att vi hade förmågan att sluta höra. Ångbåten tar sig fram genom vatten som skimrar som sammet.”"
 expedition_events.642.a:0 "Han kommer att bli ihågkommen."
 expedition_events.650.t:0 "Bakre spalt"
 expedition_events.650.d:0 "Vi anlände till ett missionsläger, där vi fick den mat och vila vi så väl hade längtat efter. Bristen på mat under resan hade fått en man att begära att expeditionen skulle delas upp."
 expedition_events.650.f:0 "”Jag hade aldrig sett något som liknade hans uttryck förut – eller kanske hade jag det, i min ungdom, när fascination och hopp blandades med ambition och längtan. Åh, jag blev inte rörd, jag var livrädd. Huden kring hans mun var inte böjd i ett leende, utan sprack i extas. \”Låt mig stanna kvar,[SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting] jag ber dig.\”"
 expedition_events.650.a:0 "Vi kan inte garantera att alla våra män får mat."
 expedition_events.650.b:0 "Expeditionen kan inte delas upp."
 expedition_events.650.tt:0 "Männen blir kvar."
 expedition_events.651.t:0 "Nyheter från den bakre kolonnen"
 expedition_events.651.d:0 "De få hedervärda män som fortfarande lever kvar bland oss har skickat brev till[ROOT.GetCountry.GetNameNoFlag]. Den bakre kolonnen har förvandlats till en dyster cirkel i något slags helvete."
 expedition_events.651.f:0 "”Vi kunde inte ens ana vad som skulle hända med dem vi hade lämnat kvar. Vi fortsatte att segla utan att se oss tillbaka, för frestelsen att känna ånger hotade att överväldiga oss och fylla oss med ånger över att vi inte själva hade stannat kvar. De grymheter som hade ägt rum där var okända för oss, något vi inte hade anat. Och det kanske var bättre så.”"
 expedition_events.651.a:0 "Expeditionens rykte har fläckats."
 expedition_events.652.t:0 "Myteri!"
 expedition_events.652.d:0 "De män som hade krävt att expeditionen skulle delas upp har startat ett myteri."
 expedition_events.652.f:0 "[SCOPE.sCharacter('expedition_leader').GetFullNameNoFormatting]”Undvikande blickar, undvikande ord. Det fanns något i uttrycket hos några av våra män som fick mig att önska att jag hade lyssnat på deras önskemål om att få stanna kvar – inte för att jag ville uppfylla deras själviska önskningar, utan för att deras sällskap hade blivit mig ett hån.”\n\n”Herr…”, hörde jag, samtidigt som jag vände mig om och mötte en kall pistol riktad mot mitt bröst, ”det vore klokt att vända om.”"
 expedition_events.652.a:0 "Bort med förrädarna!"
 modifier_expedition_rear_column_disaster:0 "Katastrofen i den bakre kolumnen"
 expedition_events.660.t:0 "Handelsenklaven"
 expedition_events.660.d:0 "Expeditionen har nått en arabisk handelsstation, där köpmännen har erbjudit sig att byta sina livsmedel mot en del av vår ammunition och våra vapen."
 expedition_events.660.f:0 "”Vi följde den enorma, utsträckta ormen, vars huvud låg i havet, vars kropp i vila böjde sig långt bort över ett vidsträckt land och vars svans försvann i landets djup. Vi följde den svansen, som en skara glupska jägare, och sedan försvann ormen ur sikte.\n\nNär vi kom ut ur djungeln låg en liten enklav framför oss, vars invånare var klädda på samma sätt som männen norr om öknen. De betraktade oss med nyfikna blickar och pekade på våra vapen. \”Mat\”, sa en av dem och visade våra hungriga och besegrade jägare en brödlimpa.\”"
 expedition_events.660.a:0 "Vi behöver mer mat."
 expedition_events.660.b:0 "Vi behöver vapnen."
 expedition_event_decreasing_peril_tt:0 "#!Detta kommer att #tooltippable;TOOLTIP:expedition_peril_explanation_tt minska expeditionens nuvarande risk."
 expedition_events.670.t:0 "In i djungeln"
 expedition_events.670.d:0 "I våra beräkningar hade vi inte tagit hänsyn till de svårigheter som skogen[SCOPE.sState('current_expedition_location').GetName] skulle medföra för vår expedition. De två månader som vi hade avsatt för denna del av Kongo kommer troligen att fördubblas."
 expedition_events.670.f:0 "”Vi kunde inte förstå att vi redan hade kommit för långt. Jag försökte prata med våra officerare om det, men de avfärdade det bara och sa att vi inte hade kommit så långt in i djungeln. De kunde inte förstå att vi redan hade kommit för långt – inte in i djungeln, inte ut på floden, inte ens in i denna oklanderliga natt med stjärnhimlen och den djupa tystnaden.\n\nVi färdas mot tidernas ände, mot tidernas början, de första tidsåldrarna, de sista tidsåldrarna; här finns knappt några tecken för oss: framåt, tillbaka, tystnad mot den dånande djungeln – bara tystnad.”"
 expedition_events.670.a:0 "Det är nödvändigt att vi ransonerar vår mat."
 expedition_events.670.b:0 "Vi närmar oss slutet."
 expedition_events.680.t:0 "De sju vattenfallen"
 expedition_events.680.d:0 "Under sin vandring genom skogen i [SCOPE.sState('current_expedition_location').GetName]… följer expeditionen ljudet av vattenströmmar tills den når okända vattenfall."
 expedition_events.680.f:0 "”Det var som att dra upp ridån. Djungelns grönska hade fått oss att glömma alla andra färger; vi var döva för världens livfullhet. Och där var den, äntligen. Vi hade trängt djupare och djupare in i mörkrets hjärta och genomborrat det med våra tänder. Vi hade ätit och svalt det, och kommit tillbaka med blodiga händer, blodig mun – rött, en ny färg. \n\nVi sköt undan vegetationen och gick genom ved, löv och sten. Blått. Vitt. Vattenfallen stod framför oss inbjudande, storslagna, inspirerande, vilda. De såg ut som den enda vattenkällan i en värld av törst.”"
 expedition_events.680.a:0 "[SCOPE.sCharacter('expedition_leader').GetLastName]Från och med nu ska de kallas ”Falls”."
 modifier_expedition_waterfalls:0 "Lualaba-flodens vattenfall"
 waterfalls_modifier:0 "Kallas ”Vattenfallen”"
 expedition_events.690.t:0 "En generös gåva"
 expedition_events.690.d:0 "Expeditionen har gjort ett uppehåll på sin resa i[SCOPE.sState('current_expedition_location').GetName] en lokal by, där[SCOPE.sCharacter('local_ruler').GetPrimaryRoleTitle] man [SCOPE.sCharacter('local_ruler').GetFullName]vänligt har erbjudit ett presentutbyte som ett tecken på fred."
 expedition_events.690.f:0 "”Vi anlände i gryningen. Vi hörde ljud och vad vi trodde var människoröster mitt i djungeln. Våra trötta kroppar kunde bara fokusera på de rösterna – vilka röster som helst utom våra egna.\n\nVi anlände i gryningen och de väntade sig inte att vi skulle komma, men de hade redan sett några av vår sort. Den[SCOPE.sCharacter('local_ruler').GetWomanMan]som verkade vara deras ledare kom fram till oss, presenterade sig[SCOPE.sCharacter('local_ruler').GetHerHis]som[SCOPE.sCharacter('local_ruler').GetFullNameNoFormatting]  och bjöd med kortfattade och vänliga gester in oss att tillbringa dagen med dem, samtidigt som han räckte ett halsband till mig, till min stora förvåning.”"
 expedition_events.690.a:0 "Vi kommer att återgälda denna omtänksamma gåva."
 expedition_events.690.b:0 "Vi har inte tid att slösa bort på att umgås med lokalbefolkningen."
 urbanization_events.1.t:0 "Vägen till framsteg"
 urbanization_events.1.d:0 "De[SCOPE.gsInterestGroup('industrialist_ig').GetName]har uttryckt sin tillfredsställelse med den riktning landet slår in på och med de nybyggda fabrikerna."
 urbanization_events.1.f:0 "”Det finns bara en möjlig riktning: framåt! Framsteg är som ett tåg som inte stannar, som inte väntar på någon – antingen är man med eller så är man inte det.”"
 urbanization_events.1.a:0 "Vi har gjort detta för våra medarbetare."
 urbanization_events.1.b:0 "Och vi kommer att stödja det här initiativet."
 modifier_urbanized_state:0 "Stod på folkets sida"
 ig_urbanization_industrialists:0 "Gynnade industriherrarna"
 je_urbanization_events_1:0 "Från jordbruk till fabriker"
 je_urbanization_events_1_reason:0 "Ett bondesamhälle hör till det förflutna. Hur kan vi förvänta oss att framstegen ska nå våra hem om dessa hem inte är något annat än bondgårdar?"
 je_urbanization_events_2:0 "Urbanize [ROOT.GetCountry.GetNameNoFlag]"
 je_urbanization_events_2_reason:0 "Framtiden är varken svart eller vit, som det står i de gamla sagorna – den är grå! Färgen på tåget som låter oss besöka främmande länder! Färgen på fabriken som gör att vi har råd med en sådan resa! Färgen, min vän, på framsteg."
 modifier_final_urbanization:0 "Helt och hållet urbaniserat"
 urbanization_events.2.t:0 "Åh, överflödets stad"
 urbanization_events.2.d:0 "De mest framstående medlemmarna av[SCOPE.sState('urbanization_state').GetName]societeten har setts anordna lyxiga fester i de nya och praktfulla stadsbyggnaderna."
 urbanization_events.2.f:0 "”Marmorväggar, glittrande sten. Ljudet av människor som kommer och går väcker staden till liv igen, när vi inte ens visste att den var död. Höga byggnader skymmer solnedgången, barn leker med tegelstenar, rök smälter samman med molnen; en avlägsen klocka signalerar att nästa tåg är på väg. Framstegen är på väg.”"
 urbanization_events.2.a:0 "Låt dem fira."
 urbanization_events.2.b:0 "Festen tar aldrig slut!"
 modifier_ig_industrialists_urbanization:0 "Nöjd med urbaniseringen."
 modifier_strong_urbanized_state:0 "Förbättringar av stadsmiljön"
 urbanization_events.4.t:0 "Att ta upp frågor"
 urbanization_events.4.d:0 "[SCOPE.gsInterestGroup('industrialist_ig').GetName]De[SCOPE.gsInterestGroup('opposing_ig').GetName]har uttryckt sin oro över regeringens beslut, som tydligt gynnar deras intressen."
 urbanization_events.4.f:0 "”Att välja är alltid svårt; inte för att beslutet är svårt att fatta, utan för att konsekvenserna kan vara lite… besvärliga. Rykten sprider sig som rök från en fabrik och förorenar den klara luften med[ROOT.GetCountry.GetNameNoFormatting] ett tjockt och giftigt gift.”"
 urbanization_events.4.a:0 "Detta måste åtgärdas."
 urbanization_events.4.b:0 "De måste inse att vi inte alltid kan göra alla nöjda."
 modifier_ig_happy_urbanization:0 "Frågor kring urbaniseringen har tagits upp"
 modifier_ignored_ig_urbanization:0 "Oro över urbaniseringen ignoreras"
 modifier_ig_happy_urbanization_bad:0 "Avvisar farhågorna kring urbaniseringen"
 modifier_ig_ignored_urbanization:0 "Uttrycker missnöje med att farhågorna ignorerats"
 urbanization_events.5.t:0 "Förändringens vindar"
 urbanization_events.5.d:0 "[SCOPE.sState('urbanization_state').GetName] har genomgått en lång utveckling sedan vi först uppmärksammade området – från små hus och spridda jordbruksmarker till att nu vara på väg att bli en blomstrande storstad."
 urbanization_events.5.f:0 "Kvinnan suckar, och hennes gamla händer slutar virka för en sekund. ”När jag var yngre var allt det här åkermark. Vi barn lekte helt fritt på fälten, utan att behöva oroa oss för att bli påkörda av en vagn eller att de där brottslingarna skulle komma och ta oss. Och vi hann ändå med att arbeta!” \n\n”Ja, mormor, nu kommer folk att ha ännu fler ställen att arbeta på.”"
 urbanization_events.5.a:0 "Äntligen lyser den[SCOPE.sState('urbanization_state').GetName] som aldrig förr."
 urbanization_events.5.b:0 "Det här är inte slutet!"
 modifier_heavily_urbanized:0 "Starkt urbaniserat"
 modifier_urban_centers:0 "Effektivitet i stadscentrum"
 urbanization_events.6.t:0 "Ineffektivt jordbruk"
 urbanization_events.6.d:0 "De[SCOPE.gsInterestGroup('industrialist_ig').GetName]har börjat klaga på den slösaktiga ineffektiviteten hos självförsörjande jordbruk i [SCOPE.sState('subsistence_state').GetName]."
 urbanization_events.6.f:0 "”Vårt folks bördiga jord mår dåligt, eftersom den har hamnat i trötta och förhårdnade händer, som är alltför utmattade av kroppsarbete för att kunna prestera på en rimlig nivå. De är för fattiga för att kunna använda mer avancerade redskap som skulle göra odlingen mer lönsam... Den här branschen är helt enkelt en meningslös investering.”"
 urbanization_events.6.a:0 "Det spelar ingen roll om alla kommer till staden."
 urbanization_events.6.b:0 "Då borde vi modernisera jordbruken."
 urbanization_events.6.c:0 "Det ser ut som den perfekta platsen för en militärbas."
 modifier_factories_no_subsistence_farming:0 "Från jordbruk till fabriker"
 modifier_better_farms_no_subsistence_farming:0 "Från jordbruk till bättre jordbruk"
 subsistence_farms_ignored:0 "Från jordbruk till försvarsmakten"
 modifier_army_bases:0 "Militärinriktad"
 modifier_listened_to_advice:0 "Godkända råd"
 marx_events.1.t:0 "Det kommunistiska manifestet"
 marx_events.1.d:0 "Den växande inkomstklyftan i vårt samhälle har blivit lika skadlig och tydlig som en lie. En broschyr med titeln ”Det kommunistiska manifestet”, författad av en socialistisk revolutionär, har fångat massornas uppmärksamhet."
 marx_events.1.f:0 "”Hela det hittills existerande samhällets historia är en historia av klasskamp. \n\nFri man och slav, patricier och plebej, herre och livegen, gillmästare och gesäll, kort sagt, förtryckare och förtryckta, stod i ständig motsättning till varandra och förde en oavbruten kamp, ibland dold, ibland öppen, som varje gång slutade antingen med en revolutionär ombildning av samhället i stort eller med de stridande klassernas gemensamma undergång.”"
 marx_events.1.a:0 "Våra medarbetare skulle kunna ha nytta av dessa lärdomar."
 marx_events.1.b:0 "Förena er, verkligen! Vi har inget att förlora utom våra bojor!"
 marx_events.1.c:0 "Vi vill inte ha något med den här upproriske personen att göra."
 modifier_supported_marx:0 "Stödd socialism"
 modifier_promoted_marx:0 "Framhävd socialism"
 modifier_ditched_marx:0 "Avvisad socialism"
 Karl_Heinrich:0 "Karl Heinrich"
 Marx:0 "Marx"
 exile_communist_agitator_tt:0 "Ett[GetIdeology('ideology_communist').GetName]  [concept_agitator] förekommer i [concept_exile]"
 je_sol_1:0 "Fattigdomskrisen"
 je_sol_1_goal:0 "Förbättra situationen[concept_sol]i ditt land."
 je_sol_goal_desc:0 "[concept_sol]Förbättra  i ditt land med 3."
 je_sol_1_reason:0 "De lägre samhällsklasserna har uttryckt sin oro över att de inte har råd att leva ett värdigt liv."
 je_sol_invalid_desc:0 "Har avfärdat fattigdomsprotesterna i samband med evenemanget$Signs of the Times$."
 sol_events.1.t:0 "Tecken i tiden"
 sol_events.1.d:0 "En kvinna har inlett en protest i centrum av [ROOT.GetCountry.GetCapital.GetCityHubName], där hon hävdar att hennes barn inte har något annat att äta än råttor. Människor har samlats runt henne och anslutit sig till hennes desperata vädjanden."
 sol_events.1.f:0 "”Jag hoppas att du aldrig behöver se dina barn i ögonen när du serverar dem en förkolnad råtta och säger att det bara är fläsk, ljuger för dem så att deras oskuld bevaras lite till, bara en dag till, och förbjuda dem att leka kurragömma så att de inte blir hungrigare av ansträngningen, och säga till dem att om de rör sig kommer spöket att hitta och fånga dem.”"
 sol_events.1.a:0 "Ingen förtjänar ett sådant liv."
 sol_events.1.b:0 "Fattigdom är helt enkelt en del av livet."
 sol_events.1.c:0 "Grip dessa uppviglare omedelbart."
 repressed_sol_protester_modifier:0 "Undertryckta protester mot fattigdomen"
 disapproves_of_repression_modifier:0 "Fördömer förtryck av fattiga"
 supports_sol_improvements_modifier:0 "Stöder åtgärder mot fattigdom"
 disapproves_of_poverty_dismissed_modifier:0 "Den förbisedda fattigdomen"
 poverty_relief_modifier:0 "Bekämpning av fattigdom"
 sol_events.2.t:0 "En berättelse om hopp"
 sol_events.2.desc:0 "Vårt folks levnadsvillkor har stadigt förbättrats under den senaste tiden, vilket har gett hopp till de mest nedstämda delarna av våra städer – men trots det har vi fortfarande en lång väg kvar att gå."
 sol_events.2.f:0 "\"Det var den bästa av tider, det var den värsta av tider, det var visdomens tidsålder, det var dårskapens tidsålder, det var trons epok, det var misstroens epok, det var ljusets årstid, det var mörkrets årstid, det var hoppets vår, det var förtvivlans vinter.\""
 sol_events.2.a:0 "Vårt folk kommer aldrig att glömma vad vi har gjort för dem."
 sol_events.2.b:0 "Det här kommer att hjälpa oss att utvecklas ännu mer!"
 sol_events.2.c:0 "Det räcker för oss att de mår bra."
 sol_improved_modifier:0 "Förbättrad levnadsstandard"
 sol_increased_modifier:0 "Lojala medborgare"
 sol_institution_modifier:0 "Att främja institutioner"
 sol_events.3.t:0 "Det bittra ropet"
 sol_events.3.d:0 "Medlemmar i organisationen[SCOPE.gsInterestGroup('ig_devout').GetName]har setts gå runt i slumområdena i [ROOT.GetCountry.GetCapital.GetCityHubName]och dela ut välgörenhetsmat till de fattiga. Nu begär de dock statligt stöd för sin verksamhet."
 sol_events.3.f:0 "”När man vandrar genom dessa gränder känns det som om själen träder in i djävulens rike: näsborrarna fylls till bristningsgränsen av insekternas stank, ögonen sluts av medkänsla efter att ha sett helvetets portar stå vidöppna.\n\nOm vi inte får det stöd vi behöver, kanske gudomlighetens ljus aldrig blir starkt nog att lysa upp de askbelagda ansiktena.”"
 sol_events.3.a:0 "Det är ett gott ändamål att stödja."
 sol_events.3.b:0 "Vi vill inte att de ska få ännu mer makt."
 charitable_slums_modifier:0 "Policy för välgörenhetsarbete i slumområden"
 bad_charitable_slums_modifier:0 "Förkastar politiken om välgörenhetsslumområden"
 rejected_charitable_slums_modifier:0 "Avvisad politik för välgörenhet i slumområden"
 rejected_charitable_slums_state_modifier:0 "Avvisade välgörenhetsprojekt i slumområden"
 charity_slums_modifier:0 "Sponsring av välgörenhetsorganisationer"
 charitable_slums_state_modifier:0 "Välgörenhetsorganisationens policy för slumområden"
 sol_events.4.t:0 "Trångt"
 sol_events.4.d:0 "Bostadsförhållandena i slumområdena i[ROOT.GetCountry.GetCapital.GetCityHubName]  har blivit så eländiga att det enligt rapporter finns hela familjer som bor på trappuppgångarna till flera olika hus"
 sol_events.4.f:0 "”När vi anlände möttes vi av en dyster samling hus som trängdes ihop som kugghjul i fattigdomens maskineri; smutsiga och ångande hela bostadskvarter, förfallna, gamla, smutsiga innergårdar och smutsiga källare, uthyrda till så många familjer att de trängdes ihop som om de vore en massa grisar. Alla tecken på ett värdigt liv var borta.”"
 sol_events.4.a:0 "Dessa människor förtjänar att behandlas med värdighet."
 sol_events.4.b:0 "Vi kan inte täcka dessa kostnader."
 slums_housing_opposed_modifier:0 "Mot slumbostäder"
 slums_housing_modifier:0 "Bättre bostäder i slumområdena"
 slums_housing_rejected_modifier:0 "Avvisade bättre bostäder i slummen"
 sol_events.5.t:0 "[ROOT.GetCountry.GetCapital.GetCityHubName], Som det är"
 sol_events.5.d:0 "En[SCOPE.GetRootScope.GetCountry.GetCustom('generic_newspaper_type')]artikel om levnadsförhållandena i [ROOT.GetCountry.GetCapital.GetCityHubName]slumområdena har offentliggjorts. Det dröjde naturligtvis inte länge innan den efterföljande upprördheten spred sig."
 sol_events.5.f:0 "”När vi betraktar denna storslagna stad kan våra sinnen lätt bli överdrivet hänförda av dess storslagna prakt och glans – glansen hos dess palats, tempel och herrgårdar, dess domstolar, vetenskapsakademier och välgörenhetsinstitutioner. Vi sörjer förvisso över att en sådan stad rymmer så mycket ondska, förfall, hedendom och utsvävningar... De myllrande massorna av eländiga, smutsiga, utmärglade, lösaktiga och bekymrade utstötta som har trängts ut till samhällets yttersta utkanter.”"
 sol_events.5.a:0 "Det här stället måste saneras så snart som möjligt."
 sol_events.5.b:0 "Artikel? Vilken artikel?"
 approves_of_drainage_modifier:0 "Godkänner dräneringsnivåerna i slumområdena"
 better_drainage_levels_modifier:0 "Förbättrad dränering i slumområdena"
 drainage_levels_cost_modifier:0 "Kostnad för dränering i slumområden"
 bad_drainage_levels_modifier:0 "Dåliga avloppsförhållanden i slumområdena"
 approves_of_ignoring_drainage_modifier:0 "De försummade dräneringsförhållandena i slumområdena"
 sol_events.6.t:0 "Brödupplopp"
 sol_events.6.d:0 "Bristen på livsmedel och de låga – om inte obefintliga – lönerna i slumområdena har lett till en rad upplopp bland kvinnorna i [ROOT.GetCountry.GetCapital.GetCityHubName], där de har vandaliserat flera butiksfönster."
 sol_events.6.f:0 "”Vi har ingen mat, vi har inga pengar, och vi ser hur de där rika jävlarna hamstrar mat som om de vore på väg att svälta, trots att ett av deras fingrar är tjockare än våra armar. Vi har rätt att vara lika välnärda som de.”"
 sol_events.6.a:0 "Vi kan säkert hitta något att ge dem."
 sol_events.6.b:0 "De ska betala för sin egen mat precis som alla andra."
 starvation_palliative_modifier:0 "Åtgärder för att lindra hunger"
 bread_riots_modifier:0 "Åtgärder för att lindra hunger"
 je_telephone:0 "Utöka telefonens användningsområden"
 je_telephone_reason:0 "I och med telefonens uppfinning måste vi bygga upp den industriella kapaciteten för att massproducera denna nya elektriska innovation."
 production_tech_events.300.t:0 "Hör du det också?"
 production_tech_events.300.d:0 "Telefonens uppfinning har banat väg för stora framsteg inom vår kommunikation... eller inom vår elindustri."
 production_tech_events.300.f:0 "”En rysning gick längs assistentens ryggrad när han trodde sig höra sin herres röst i den kalla, dammiga källaren.” \n\n”Förstår du vad jag säger?” Mannen stannade till och höll på att tappa den trälåda han bar, svagt upplyst av de ljus som omsorgsfullt placerats runt den revolutionerande apparaten – halvt maskin, halvt människa. ”J-Ja.” \n\n”Kom hit omedelbart! Vi har något i våra händer, grabben.”"
 production_tech_events.300.a:0 "Vi borde förbättra vår kommunikation."
 production_tech_events.300.b:0 "Skriv bara ett brev! Elen är till för industrin!"
 electrics_building_modifier:0 "Boom inom animerad industri"
 je_whaling:0 "Valfångstindustrin"
 je_whaling_reason:0 "Valolja är vår historia och kommer att vara vår framtid! Tvål, bränsle till oljelampor och till och med den viktiga smörjningen av våra maskiner – denna mångsidiga substans täcker alla dessa behov."
 production_tech_events.301.t:0 "En farlig verksamhet"
 production_tech_events.301.d:0 "Vår[SCOPE.sBuilding('whaling_building').GetName] effektivitet har visat sig ha en farlig baksida,[SCOPE.sState('whaling_state').GetName] och dödsfall har blivit vanliga på nästan varje resa. Det är ett högt pris att betala, men vinsten är lika stor."
 production_tech_events.301.f:0 "Valens kropp sträcker sig lika vidsträckt som himlen. Dess huvud har tömts och oljefatet är fläckat av blod.\n\nEn röst ekar över hela kajen: ”Vi har förlorat ett dussin män”, och sedan börjar han räkna upp dem och deras hemorter; några av dem kommer från huvudstaden, en av dem har din brors namn. \n\nOljan skimrar – det flytande, guldliknande blodet från en siren, som lockar männen till döden."
 production_tech_events.301.a:0 "Vi måste se till att sjömännen är i säkerhet."
 production_tech_events.301.b:0 "Men den lyser ju!"
 whaling_state_modifier:0 "Valfångstboomen"
 whaling_state_mortality_modifier:0 "Försiktighetsåtgärder vid valfångst"
 whaling_admiral_modifier:0 "Försiktighetsåtgärder vid valfångst"
 je_ig_suppression_1:0 "Att säkra strömförsörjningen"
 je_ig_suppression_1_reason:0 "De[SCOPE.gsInterestGroup('target').GetName]har blivit alltför mäktiga för sitt eget bästa, med tanke på den uppfattning de har om oss, och hotar nu vår fredliga regering."
 je_ig_suppression_1_goal_desc:0 "Det[SCOPE.gsInterestGroup('target').GetName]får inte vara [concept_powerful]."
 je_ig_suppression_1_invalidad_desc:0 "Har avböjt den hjälp som erbjudits i samband med$With Friends Like These...$händelsen."
 je_ig_suppression_status_1:0 "Det har spridits rykten om omoraliska handlingar begångna av ledaren för [SCOPE.gsInterestGroup('target').GetName], vilket har skadat organisationens anseende."
 je_ig_suppression_status_2:0 "[SCOPE.gsInterestGroup('target').GetName]Ledaren för  har beslutat att avgå efter rykten om omoraliska handlingar."
 je_ig_suppression_status_3:0 "[SCOPE.gsInterestGroup('target').GetName]Ledaren för  har fängslats på grund av sitt vägran att frivilligt avgå."
 ig_suppression_events.1.t:0 "Med sådana vänner..."
 ig_suppression_events.1.d:0 "Det inflytande som  har[SCOPE.gsInterestGroup('suppressed_ig').GetName]fått har gjort det till en hotfull kraft mot vår regering. En av våra agenter har kontaktat oss och föreslagit en... mindre konventionell lösning."
 ig_suppression_events.1.f:0 "”Dörren har öppnats utan att någon har lagt märke till det, tills vinden blåser iväg dokumenten som ligger på träbordet.” \n\n”Ursäkta mig”, säger en lugnande röst samtidigt som personen försiktigt plockar upp dem, ”jag hoppas att mitt besök inte stör era viktiga ärenden. Det har dock konstaterats att de[SCOPE.gsInterestGroup('suppressed_ig').GetNameNoFormatting]  har ett desperat behov av lite vägledning mot den rätta vägen, vilket kommer att hjälpa både dem och oss.”"
 ig_suppression_events.1.a:0 "De behöver verkligen vår vägledning."
 ig_suppression_events.1.b:0 "Det här är fullständigt omoraliskt!"
 ig_suppression_tt:0 "[SCOPE.gsInterestGroup('suppressed_ig').GetName]Detta kommer att leda till händelser som syftar till att minska dennes makt."
 dismissed_ig_suppression_tt:0 "Möjligheten avfärdas och vi kommer att bekämpa den[SCOPE.gsInterestGroup('suppressed_ig').GetName]med konventionella metoder."
 ig_suppression_events.2.t:0 "Det ryktas att…"
 ig_suppression_events.2.d:0 "Rykten om det syndiga livet hos [SCOPE.sCharacter('suppressed_leader').GetFullName], från [SCOPE.gsInterestGroup('target').GetName], har hittats på och är redo att spridas bland folket som en löpeld."
 ig_suppression_events.2.f:0 "”Att de gjorde vad mot vem? Det är ju helt otroligt! Ett sådant skandalöst beteende kan inte tolereras i detta fromma land! Och vad gjorde de sedan? Jag orkar inte höra mer om det här! Snälla, bespara mig detta lidande! Gör slut på det nu, jag ber er! Jag ber er!”"
 ig_suppression_events.2.a:0 "Det bästa ryktet går aldrig att spåra."
 ig_suppression_events.2.b:0 "Det här räcker till mer än en societetsbal."
 ig_suppression_events.2.c:0 "Folk i förorterna är ivriga efter lite socialt underhållning."
 undermined_upper_class_modifier:0 "Skandal bland överklassen"
 undermined_lower_class_modifier:0 "Skandal bland de lägre samhällsklasserna"
 undermined_ig_modifier:0 "En intressegrupp som förlorat sitt inflytande"
 suppression_discovered:0 "Komplott som syftar till att undergräva upptäckt"
 ig_suppression_events.3.t:0 "Övertalning"
 ig_suppression_events.3.d:0 "Med tanke på att ryktena om[SCOPE.sCharacter('suppressed_leader').GetHerHis]hans livsstil har spridit sig till alla samhällsskikt och[SCOPE.sCharacter('suppressed_leader').GetHerHis]hans anseende har skadats, kan vi säkert övertyga honom[SCOPE.sCharacter('suppressed_leader').GetFullName]att avgå från[SCOPE.sCharacter('suppressed_leader').GetHerHis]sin post som ledare för [SCOPE.gsInterestGroup('target').GetName]."
 ig_suppression_events.3.f:0 "\n\n[SCOPE.sCharacter('suppressed_leader').GetHerHim]”Det var en av de där dagarna när fabrikernas eldar glittrade som små ögon genom fönstren, en av de där dagarna när[SCOPE.sCharacter('suppressed_leader').GetFullNameNoFormatting]man kände det som om hela staden stirrade på [SCOPE.sCharacter('suppressed_leader').GetHerHim]en, anklagande, krävande. Men det var inte[SCOPE.sCharacter('suppressed_leader').GetHerHis]ens fel![SCOPE.sCharacter('suppressed_leader').GetSheHe]Man visste det,[SCOPE.sCharacter('suppressed_leader').GetSheHe]man hade inte gjort något fel... Det var regeringen, det var uppenbarligen regeringen, som spred lögner; de hade aldrig gillat mig, eller hur? Åh nej, det hade de aldrig gjort.”Vad stirrar du på!?”"
 ig_suppression_events.3.a:0 "Lite utpressning har aldrig skadat någon."
 ig_suppression_events.3.a.tt:0 "[SCOPE.sCharacter('suppressed_leader').GetFullName] kommer att avgå."
 ig_suppression_events.3.b:0 "Kanske behöver vi bara blåsa upp skandalen ännu mer."
 ig_suppression_events.3.c:0 "Det här har gått för långt."
 blackmailed_ig_modifier:0 "Utpressad intressegrupp"
 suppression_scandal_modifier:0 "En växande skandal"
 suppression_leader_modifier:0 "En växande skandal"
 plot_backing_down_modifier:0 "Backade ur i förtrycket"
 plot_backing_down_bad_modifier:0 "Backade ur i förtrycket"
 ig_suppression_events.4.t:0 "Nedgörande slag"
 ig_suppression_events.4.d:0 "Trots de ihärdiga försöken att undergräva  [SCOPE.sCharacter('suppressed_leader').GetFullName]s rykte har  visat sig ovillig att avgå.[SCOPE.sCharacter('suppressed_leader').GetSheHe] Det krävs hårdare åtgärder."
 ig_suppression_events.4.f:0 "[SCOPE.sCharacter('suppressed_leader').GetHerHim][SCOPE.sCharacter('suppressed_leader').GetHerHim]Dörren står öppen igen, men den här gången finns det ingen vind som varnar dig, inget ljud, ingen livstecken kan skönjas i detta säkra rum. Men där är han igen. Samma lugnande röst närmar sig dig: ”Ursäkta mig”, du känner igen den tonen, ”jag hoppas att mitt besök inte stör dina viktiga sysslor. Men vårt mål har visat sig vara något motståndskraftigt mot vår övertalning, så det finns bara ett alternativ kvar.” \n\n”Vi kan inte döda!” \n\nAgenten kastar en förbryllad blick på dig: ”Döda? Åh, nej, det skulle jag aldrig föreslå! Jag tänkte bara att vi har så många tomma celler...”"
 ig_suppression_events.4.a:0 "Må[SCOPE.sCharacter('suppressed_leader').GetHerHis]hans kropp ruttna i fängelset."
 ig_suppression_events.4.b.tt:0 "[SCOPE.sCharacter('suppressed_leader').GetFullName] kommer att avgå."
 ig_suppression_events.4.b:0 "[SCOPE.sCharacter('suppressed_leader').GetSheHe|U] behöver bara övertygas lite till..."
 ig_suppression_events.4.a.tt:0 "[SCOPE.sCharacter('suppressed_leader').GetFullName] kommer att fängslas."
 ig_suppression_events.4.c:0 "Det här har verkligen gått för långt!"
 imprisoned_ig_modifier:0 "Fängslad ledare"
 imprisoned_ig_people_modifier:0 "Politisk fängsling"
 ig_suppression_events.7.t:0 "Slutordet"
 ig_suppression_events.7.d:0 "[SCOPE.gsInterestGroup('target').GetName]Våra ansträngningar att undergräva deras anseende har varit ytterst framgångsrika. Nu när deras inflytande har försvagats är det dags för oss att ägna oss åt viktigare frågor."
 ig_suppression_events.7.f:0 "”Den här gången öppnas inte dörren. Minuterna går och ingenting händer. Det är nästan en besvikelse. Men i korridoren på väg ut står en man. Han har på sig en sammetsfrack och du tittar förväntansfullt på honom. En annan man går fram till honom och de går iväg tillsammans. Ingenting händer.”"
 ig_suppression_events.7.a:0 "Folk kommer att veta vem de ska respektera."
 ig_suppression_events.7.b:0 "Vi kommer aldrig att låta dem glömma vem som åstadkom detta."
 ig_suppression_events.7.c:0 "Ett bra tillfälle att påminna dem om våra lagar."
 founded_fear:0 "Terror genom förtryck"
 founded_fear_legitimacy:0 "Ett fridfullt tillstånd"
 je_famine:0 "Den stora hungersnöden"
 je_famine_reason:0 "En svår missväxt har orsakat oerhörda lidanden för vårt folk, som vädjar till vår regering att vidta särskilda åtgärder i denna fråga."
 je_famine_goal:0 "[concept_sol]Vänta tills hungersnöden upphör eller höj  i din nation med 3 poäng."
 je_major_famines_success:0 "[concept_sol]Vänta tills hungersnöden upphör eller höj  i din nation med 3 poäng."
 natural_disaster_variable:0 "Har drabbats av en naturkatastrof"
 natural_disaster_events.7.t:0 "[SCOPE.sState('volcanic_state').GetName]Utbrottet"
 natural_disaster_events.7.d:0 "Ett våldsamt utbrott har skakat delstaten [SCOPE.sState('volcanic_state').GetName]. Fragment av tefra och vulkanaska har förstört byggnader och skördar och kostat flera av våra medborgare livet."
 natural_disaster_events.7.f:0 "”Den täta rökpelaren följdes av en tydlig explosion. Herdarna som arbetade vid foten av berget riktade blicken mot det nu ljusa och tydliga molnet. Därefter inträffade jordskredet.”"
 natural_disaster_events.7.a:0 "Vi kan inte förutsäga ett utbrott."
 natural_disaster_events.7.b:0 "Våra medarbetare behöver oss!"
 modifier_volcano_relief:0 "Hjälpinsatser vid vulkanutbrott"
 natural_disaster_events.8.t:0 "Det[SCOPE.sState('mega_volcanic_state').GetName]stora utbrottet"
 natural_disaster_events.8.d:0 "Ett utbrott av oöverträffad omfattning har fullständigt förstört livet för många i delstaten [SCOPE.sState('mega_volcanic_state').GetName]. Explosionen kunde höras flera hundra miles bort, och allt som hade den olyckliga omständigheten att befinna sig i närheten av berget förstördes omedelbart."
 natural_disaster_events.8.f:0 "”Och dagen förvandlades till natt. De enorma eldvattenfallen som forsade nerför bergssidan. Ett svart moln, gigantiskt – alla fåglar har för länge sedan lämnat detta fält. Om många\n\n år kommer jag att sitta vid eldstaden, och ljuset kommer inte längre att störa mig.”"
 natural_disaster_events.8.a:0 "Tyvärr har vi inga medel att avsätta."
 natural_disaster_events.8.b:0 "Vi måste absolut hjälpa dessa människor."
 modifier_mega_volcanic_relief:0 "Reliefbild av ett stort vulkanutbrott"
 natural_disaster_variable_tt:0 "Det finns en risk för att det kommer att uppstå en hungersnöd under de kommande månaderna."
 famine_events.1.t:0 "De svåra tiderna"
 famine_events.1.d:0 "Hungern har blivit ett allvarligt problem för vårt land, eftersom människor från delstaten[SCOPE.sState('famine_state').GetName]  rapporterar att de inte har någonting alls att äta. Man har begärt att nödhjälp ska sättas in."
 famine_events.1.f:0 "”Det är omöjligt att på ett adekvat sätt beskriva de umbäranden som de ständigt och tyst uthärdar... I många trakter är potatis deras enda mat, vatten deras enda dryck, och deras stugor skyddar sällan mot väder och vind; en säng eller en filt är en sällsynt lyx, och i nästan alla fall utgör deras gris och en gödselhög deras enda egendom.”"
 famine_events.1.a:0 "Vi har inte råd med den utgiften."
 famine_events.1.b:0 "Frågan om katastrofhjälp kommer att lyftas fram i [SCOPE.sState('famine_state').GetName]."
 emergency_hunger_relief_modifier:0 "Hungerbekämpning"
 thats_life_modifier:0 "Inga åtgärder mot svält"
 great_famine_modifier:0 "Den stora hungersnöden"
 emergency_relief_promise_tt:0 "Vi kommer att behöva utfärda ett dekret om nödhjälp i [SCOPE.sState('famine_state').GetName]."
 famine_events.2.t:0 "Bröd och blod"
 famine_events.2.d:0 "[SCOPE.sState('famine_2_state').GetName]Bristen på livsmedel har spridit sig till grannstaten , där missväxten har lett till ett ökat antal dödsfall bland vårt folk."
 famine_events.2.f:0 "”Ingen fantasi kan föreställa sig, ingen man eller kvinna kan föreställa sig, inget språk kan uttrycka, ingen författare, ingen journalist, ingen målare eller skådespelare kan ge uttryck för de fasor som många familjer utsätts för i [SCOPE.sState('famine_2_state').GetNameNoFormatting]. Deras undernärda ansikten, lika magra som galgos’; spädbarnen går knappt att skilja från utbuktningar i filtarna – om de bara inte hade sålt alla sina filtar för att köpa månadens sista mat.”"
 famine_events.2.a:0 "Våra nödhjälpsåtgärder har bidragit till att minska antalet offer."
 famine_events.2.b:0 "Det här är de konsekvenser som vi måste ta itu med."
 famine_events.2.c:0 "Vi bör aktivera nödhjälpen i originalet[SCOPE.sState('famine_state').GetName]nu."
 no_emergency_relief_tt:0 "Hungersnöden sprider sig på grund av bristen på nödhjälp."
 emergency_famine_modifier:0 "Åtgärder mot svält"
 famine_events.3.t:0 "På jakt efter ett bättre liv"
 famine_events.3.d:0 "Människor från delstaten[SCOPE.sState('famine_state').GetName]  har börjat flytta i stor skala över hela landet, i hopp om att hitta en bättre plats att bosätta sig på och undkomma den stora hungersnöden som har ödelagt deras liv."
 famine_events.3.f:0 "”Längs de öde och rostiga järnvägsspåren är barnens rop det enda ljud som hörs – inget tåg kommer förrän vid middagstid, men familjerna har redan samlats nära den förfallna stationen. Vissa av dem har vandrat i flera dagar, \"var är bror?\", de fortsätter att gå. \n\nRykten om ett bättre liv bortom deras land är ett fåfängt hopp, misstänker de, \"var är bror?\", regnet faller, och även några män.”"
 famine_events.3.a:0 "Våra nödhjälpsåtgärder har bidragit till att minska antalet offer."
 famine_events.3.b:0 "Det här är de konsekvenser som vi måste ta itu med."
 famine_events.3.c:0 "Vi bör nu aktivera nödhjälpen enligt den ursprungliga[SCOPE.sState('famine_state').GetName] planen."
 no_emergency_relief_migration_tt:0 "Människor migrerar i större utsträckning på grund av bristen på nödhjälp."
 great_famine_migration_modifier:0 "Migrationen under den stora hungersnöden"
 famine_migration_modifier:0 "Migrationen till följd av hungersnöd"
 famine_events.4.t:0 "Generösa donationer"
 famine_events.4.d:0 "Efter att ha fått kännedom om de fasor som invånarna i[SCOPE.sState('famine_state').GetName]  har fått utstå har solidariteten mellan nationerna ökat, och det finns många som vill skänka pengar till denna sak."
 famine_events.4.f:0 "”Och se! Framför oss ligger en stad som en gång var vacker och blomstrande! Bördiga marker, glada ansikten, ett enkelt liv. Ack, dessa tider är sedan länge förbi, mitt folk, och nu hotar hungern deras frid, lika fruktansvärd som vargen själv! Det är vår plikt att försöka lindra deras lidande. \n\nJag ser att detta kommer att ge oss en plats i deras hjärtan, i hjärtat av deras land och i mänsklighetens hjärta. Detta kommer att föra våra nationer närmare varandra!”"
 famine_events.4.a:0 "Vi bör ta emot donationer från [SCOPE.sC('neighbor_country_1').GetName]."
 famine_events.4.b:0 "Vi bör ta emot donationer från [SCOPE.sC('neighbor_country_2').GetName]."
 famine_events.4.c:0 "Vi kommer att förlita oss på interna donationer."
 famine_donations_modifier:0 "Donationer till svältdrabbade"
 famine_internal_donations_modifier:0 "Donationer till svältdrabbade"
 donations_ig_modifier:0 "Donationer till svältdrabbade"
 ig_suppression_events.5.t:0 "Ett överraskande besök"
 ig_suppression_events.5.d:0 "Vi har hört att de[SCOPE.gsInterestGroup('target').GetName]har hållit några mycket intressanta möten i sitt huvudkontor, som vi råkar känna till ytterst väl. Vi skulle verkligen kunna besöka dem."
 ig_suppression_events.5.f:0 "”Jag? Åh, jag råkade bara gå förbi när jag la märke till den där lilla charmiga sammankomsten ni har där, eller hur? Men det är inte särskilt vänligt av er att begränsa den till er egen grupp – man skulle till och med kunna gå så långt som att säga att det är lite… sekteristiskt, eller hur?” \n\n”Jag skulle förstås aldrig anklaga dig för något sådant, men kanske är det bästa för alla inblandade att du vänligen upplöser detta extremt olagliga och smutsiga möte omedelbart.”"
 ig_suppression_events.5.a:0 "Våra agenter kommer att hantera detta på ett diskret sätt."
 ig_suppression_events.5.b:0 "Slå in dörren!"
 ig_suppression_events.5.c:0 "Tyvärr, om de bara hade mötesfrihet..."
 ig_suppression_events.5.e:0 "Vi behöver ingen anledning för att helt enkelt sprida ut det."
 suppressed_meeting_modifier:0 "Inställt möte"
 sneaky_suppressed_meeting_modifier:0 "Ett möte som diskret undertrycktes"
 violent_suppressed_meeting_modifier:0 "Våldsamt avbrutet möte"
 ig_suppression_events.6.t:0 "Självsabotage"
 ig_suppression_events.6.d:0 "Ryktena om den svaga viljan hos [SCOPE.sCharacter('suppressed_leader').GetFullName], i [SCOPE.gsInterestGroup('target').GetName], är mer ett faktum än en misstanke. Det finns många sätt att dra nytta av en svag motståndare."
 ig_suppression_events.6.f:0 "”Så det ligger två metaller framför dig, som du ser, eller hur? Och sedan kan du välja mellan det här guldet som erbjuds så vänligt eller det här vassa – men lika vackra – stålet. Förstår du vad jag menar?”"
 ig_suppression_events.6.a:0 "Kasta ett mynt till er ledare."
 ig_suppression_events.6.b:0 "Det finns andra... billigare metoder."
 ig_autosabotage_modifier:0 "Självsabotage"
 ig_autosabotage_leader_modifier:0 "Självsabotage"
 bribing_scandal_modifier:0 "Mutor för att sabotera sig själv"
 je_airships:0 "Luftfartyg"
 je_airships_reason:0 "Man upptäcker ständigt nya användningsområden för molnsilver, och drömmarna om praktiska luftskeppsresor kan snart bli verklighet."
 society_tech_events.301.t:0 "Högt uppe i luften"
 society_tech_events.301.d:0 "Luftskeppet[SCOPE.GetRootScope.GetCountry.GetRuler.GetLastName] har valts ut som en alldeles särskild plats för en bal för överklassen. Landets mest framstående medlemmar har uttryckt sina åsikter om denna storslagna maskin."
 society_tech_events.301.f:0 "”Från denna höjd är horisonten bara ett gyllene halsband, som omsluter havets livfulla blå nyanser.” ”Middagen serveras snart, och restaurangen är fylld av lätt rök och djupa röster.”\n\n”Får jag erbjuda er en plats, fröken...? \\n\n”Jag vågar inte skriva ner mitt namn, för vissa av oss har hemligheter som inte får följa med bortom landets gränser. Bestickens klirrande ljud följer solens sista hjärtslag i ett rytmiskt avsked. Systole, diastole.\”"
 society_tech_events.301.a:0 "Vilken skamlig excentricitet. Det här är ju en spaningskrigsmaskin!"
 society_tech_events.301.b:0 "Titta på de där sammetskuddarna! Och väggarna av målat siden!"
 society_tech_events.301.c:0 "Om bara allt detta utrymme användes för gods istället för passagerare..."
 schneppelins_military_modifier:0 "Militära luftskepp"
 zeppelins_society_modifier:0 "Samhällets luftskepp"
 zeppelins_trading_modifier:0 "Handelsluftskepp"
 je_romanticism:0 "Stöd romantiken"
 je_romanticism_reason:0 "Den romantiska konstströmningen hyllar det ärofulla förflutna: riddare, slott, pirater, den förbjudna naturen och försvunna hjältar. Dess lockande karaktär måste snabbt spridas."
 society_tech_events.302.t:0 "Är det inte romantiskt?"
 society_tech_events.302.d:0 "Inom[SCOPE.sState('academy_state').GetName][SCOPE.sBuilding('academy_building').GetName]  har intresset för den romantiska rörelsen ökat, och några av våra främsta konstnärer har skapat verkliga mästerverk."
 society_tech_events.302.f:0 "”I Xanadu lät Kubla Khan\n uppföra en ståtlig nöjespalats: \ndär Alph, den heliga floden, rann \ngenom grottor som var omätliga för människan\n, ner till ett solfritt hav.” \n\n– Samuel Taylor Coleridge,#italicKubla Khan#!"
 society_tech_events.302.a:0 "Vi ska visa världen hur man gör romantik!"
 society_tech_events.302.b:0 "Dessa lovande unga män förtjänar varenda öre."
 society_tech_events.302.c:0 "Men skulle du kunna göra det lite mer… realistiskt?"
 romantic_building_modifier:0 "Romantisk arkitektur"
 preraphaelites_modifier:0 "Stödda konstnärer"
 je_fascism_1:0 "Kraft och storhet"
 je_fascism_1_reason:0 "Oavsett om det kommer från utländska makter eller från missnöjda inom våra gränser, hotar socialismen att förstöra nationen[ROOT.GetCountry.GetAdjective]. Vi måste alla marschera under samma banner. Vi får inte glömma vilka våra ledare är, och hur deras styrka utgör vårt enda försvar mot detta hot. \n\nSå länge detta[concept_journal_entry]är aktivt kommer frekvensen med vilken #tooltippable;tooltip:[GetPlayer.GetTooltipTag],fascist_ideologies_list_tt fascistiska#! karaktärer dyker upp att öka."
 fascism_1_tt:0 "Har en#boldfascistisk#! ledare eller agitator"
 integralist_agitator_appears_tt:0 "Ett[GetIdeology('ideology_integralist').GetName]  [concept_agitator] kommer att visas i [ROOT.GetCountry.GetNameNoFlag]"
 fascist_agitator_appears_tt:0 "Ett[GetIdeology('ideology_fascist').GetName]  [concept_agitator] kommer att visas i [ROOT.GetCountry.GetNameNoFlag]"
