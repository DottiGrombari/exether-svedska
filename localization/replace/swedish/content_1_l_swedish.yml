 plague_eviction_ban:0 "Förbud mot vräkning"
 plague_eviction_ban_anarchist:0 "Förbud mot vräkning"
 plague_welfare_cost:0 "Akut socialhjälp"
 plague_welfare_reliance:0 "Förbättrad välfärd"
 plague_no_poverty_measures:0 "Den utbredda fattigdomen som ignoreras"
 anti_mask_ignored:0 "Struntade i Anti-Mask League"
 anti_mask_appeased:0 "Blidkade Anti-Mask League"
 anti_mask_discredited:0 "Diskrediterade Anti-Mask League"
 cable_street.1.t:0 "Slaget vid [SCOPE.sState('fascist_rally_state').GetCityHubName]"
 cable_street.1.d:0 "[SCOPE.gsInterestGroup('antifa_ig').GetName][SCOPE.sCharacter('fascist_leader').GetFullName] och de[SCOPE.sParty('fascist_party').GetName]planerar en stor demonstration i [SCOPE.sState('fascist_rally_state').GetName]. De räknar med häftigt motstånd från antifascistiska grupper som är löst organiserade under .s flagg."
 cable_street.1.f:0 "”Bemanna barrikaderna! Ner med fascisterna! De ska inte komma förbi!”"
 cable_street.1.a:0 "Vi måste skydda deras rätt att demonstrera."
 cable_street.1.b:0 "Låt dem slåss, vi ska inte lägga oss i."
 cable_street.1.c:0 "Förbjud demonstrationen."
 protected_fascist_rally:0 "Skyddad fascistisk demonstration"
 banned_fascist_rally:0 "Förbjudna fascistiska demonstrationer"
 heavenly.1.t:0 "Missionsverksamhet i [SCOPE.sState('missionary_state').GetName]"
 heavenly.1.d:0 "Utländska missionärer som är verksamma i[SCOPE.sCountry('treaty_port_owner').GetAdjective]  [SCOPE.sState('treaty_port_scope').GetName] har begärt tillstånd att bygga skolor och sjukhus i [SCOPE.sState('missionary_state').GetName]. De kommer säkert att använda dessa som plattformar för att sprida sin tro."
 heavenly.1.f:0 "”Finns det något bättre sätt att sprida Herrens budskap än genom helande? De som söker sig till vårt sjukhus kommer att finna vägen till Gud.”"
 heavenly.1.a:0 "Låt dem bygga skolor och sjukhus"
 heavenly.1.b:0 "Vi vill inte ha deras främmande tro."
 missionary_schools_hospitals:0 "Missionsskolor och sjukhus"
 heavenly.2.t:0 "Föreningen för gudsdyrkan"
 heavenly.2.d:0 "En märklig sekt har uppstått i [SCOPE.sState('cult_state').GetName]. Den hämtar inslag från både lokala trosuppfattningar och kristendomen, och dess ledare anser sig vara Jesus Kristus yngre bror."
 heavenly.2.f:0 "”Mina ögon ser bortom väster, norr, floderna och bergen; \nmin röst skakar öster, söder, solen och månen.”"
 heavenly.2.a:0 "Intressant och oroande."
 heavenly.3.t:0 "Gudsdyrkare i [SCOPE.sState('cult_growth_state').GetName]"
 heavenly.3.d:0 "”The God Worshipping Society” är en fanatisk evangelisk organisation som har lyckats samla en betydande anhängarskara i [SCOPE.sState('cult_growth_state').GetName]."
 heavenly.3.f:0 "”De hittar ivriga anhängare bland de fattiga och förtryckta, människor som ignoreras eller sviks av staten.”"
 heavenly.3.a:0 "Det här kan inte vara något bra."
 heavenly.4.t:0 "Kamiran-imperiet"
 heavenly.4.d:0 "Fanatikerna inom ”God Worshipping Society” har rest sig mot oss som en reaktion på vår diskrimineringspolitik. De har etablerat sig[SCOPE.sState('heavenly_kingdom_spawn').GetName]där som sin operationsbas och kommer inom kort att ta kontroll över andra delstater där sekten är verksam."
 heavenly.4.f:0 "”Det härliga maktens svärd har givits av Herren. \nDikter och böcker är vittnesbörd som prisar Jahve. \nTaiping förenar Ljusets värld, och\n den härskande stämningen kommer att vara glädjefylld i otaliga årtusenden.”"
 heavenly.4.a:0 "Vi ska krossa dem fullständigt!"
 heavenly.5.t:0 "Himmelens fall"
 heavenly.5.d:0 "Kamiran-imperiet har besegrats. Vi måste besluta hur vi ska hantera efterverkningarna av upproret; kultens anhängare är fortfarande aktiva och kan komma att ställa till problem för oss även i framtiden."
 heavenly.5.f:0 "”Den som påstås vara Kristi bror har halshuggits och bränts. Hans aska har avfyrats ur en kanon. Han kommer inte att finna någon evig vila, ty han har vanärat vår nation. Han har utplånats fullständigt, och så kommer det att gå alla som motsätter sig oss.”"
 heavenly.5.a:0 "Utrota de återstående hedningarna."
 mass_reconversion_tt:0 "#variable 10 %#! av alla som inte är[Concept('concept_pop', '$concept_pops$')][SCOPE.sReligion('state_religion_scope').GetName]  i[SCOPE.sCountry('china_scope').GetName]  kommer att konvertera till [SCOPE.sReligion('state_religion_scope').GetName]."
 heavenly.5.b:0 "Visa barmhärtighet och bevilja benådningar till före detta rebeller."
 heavenly.6.t:0 "Himmelens uppkomst"
 heavenly.6.d:0 "Denna[ROOT.GetCountry.GetName] regel har sopats bort[SCOPE.sCulture('manchu_culture').GetName]. Vår stat måste fortsätta att bestå och sprida Guds ord till hela Kina."
 heavenly.6.d1:0 "Landet[ROOT.GetCountry.GetName]har säkrat sin självständighet från [SCOPE.sCountry('china_scope').GetName]. Vår stat måste fortsätta att bestå och kunna skydda sig mot[SCOPE.sCountry('china_scope').GetAdjective]  hämndåtgärder."
 heavenly.6.f:0 "När människorna på denna jord inte behåller något för eget bruk, utan överlämnar allt till Gud så att alla kan använda det gemensamt, då ska varje plats få lika stora andelar, och alla ska få kläder och mat."
 heavenly.6.a:0 "Prioritera att sprida Guds ord till folket."
 heavenly.6.b:0 "Reformerna i den nya avhandlingen kommer att föra vår stat framåt."
