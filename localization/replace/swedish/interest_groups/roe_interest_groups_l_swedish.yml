 ig_hobgoblin_restaz_desc:0 "WIP"
 ig_yernit:0 "Yernit"
 ig_yernit_desc:0 "WIP"
 ig_taskmasters:0 "Taskmasters"
 ig_taskmasters_desc:0 "WIP"
 human_aristocracy:0 "Settler Aristocracy"
 human_aristocracy_desc:0 "The Settler Aristocracy represents the established noble class of Ceraun, historically awarded with noble titles by the  Dumonian Emperors and Margraves of Ceraun, and possessing great influence within the country."
 vampire_aristocracy:0 "Vampire Aristocracy"
 vampire_aristocracy_desc:0 "The Aristocracy in this country are vampires, and are very keen to keep the human cattle below down them in the pecking order."
 ig_dwarf_clans:0 "Clans"
 ig_dwarf_clans_only_icon:0 "@clans!"
 ig_dawrf_clans_desc:0 "Powerful families with widespread influence in the community."
