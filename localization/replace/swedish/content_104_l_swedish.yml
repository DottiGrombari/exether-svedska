 exhibition_events.1.t:0 "Utställningen ”Inte så bra”"
 exhibition_events.1.d:0 "Efter flera månaders förberedelser är utställningen äntligen klar, och enligt alla omdömen ganska besvikande."
 exhibition_events.1.f:0 "”Ett reflekterande paraply, en sorts diamant som är mindre och mattare än den du sett din mormor bära, en vagn som fortfarande luktar gatorna. \n\n’Jag reste tvärs över halva landet för det här, och för vad?’”"
 exhibition_events.1.a:0 "Nåja."
 exhibition_events.2.t:0 "Världsutställningen"
 exhibition_events.2.d:0 "Efter flera månaders förberedelser är utställningen äntligen klar och har fått ett mycket positivt mottagande."
 exhibition_events.2.f:0 "”Där fanns otaliga underverk att beskåda: glaskupoler större än några jag någonsin sett, diamanter stora som en knytnäve. Barnen frågade vad det här och det där var för slags djur, och ingen kunde ens svara. Jag kunde knappt tro mina ögon – det kändes som att besöka en annan värld.”"
 exhibition_events.2.a:0 "Det här är jättebra!"
 exhibition_events.3.t:0 "Den största utställningen"
 exhibition_events.3.d:0 "Efter månader av förberedelser är utställningen äntligen klar och hyllas redan som en av vår tids främsta utställningar."
 exhibition_events.3.f:0 "”Och den här statyn räddade vi ur havet”, och sedan ställdes den ut nära den centrala fontänen, fortfarande fläckad av vattnet. ”Om du vågar titta genom det här glaset, min kära, skulle du kunna se de mest ödsliga stjärnbilderna.”\n\nPå andra sidan salen välkomnade alla besökare,[ROOT.GetCountry.GetRuler.GetFullNameNoFormatting] klädda helt i vitt. \n\nDet var trumpeter och jubel, musik och rök, fascination och vördnad, och det fanns – liv, så strålande."
 exhibition_events.3.a:0 "Underbart. Helt enkelt… underbart."
 exhibition_events.4.t:0 "Väckande misstankar"
 exhibition_events.4.d:0 "[SCOPE.gsInterestGroup('conservative_ig').GetName]Planeringen av utställningen väcker kontroverser i takt med att invigningen närmar sig. Medlemmar i  har uttryckt sin oro för att en stor besökarskara ska kunna förvandlas till en potentiell revolutionär folkmassa."
 exhibition_events.4.f:0 "”Det vansinniga och absurda i att[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]tillåta detta struntprat måste slå varje förnuftig och rättänkande människa, och jag är förvånad över att ministrarna själva inte insisterar på[ROOT.GetCountry.GetRuler.GetHerHim]att åtminstone bege sig till platsen[SCOPE.sState('grand_exhibition_state').GetNameNoFormatting]under utställningen, eftersom ingen människa på något sätt kan garantera vad som kan hända vid det tillfället.\n\nIdén... måste chockera varje ärlig och välmenande[ROOT.GetCountry.GetAdjectiveNoFormatting]  man. Men det verkar som om allt samverkar för att sänka vårt anseende i Europas ögon.”"
 exhibition_events.4.a:0 "Deras farhågor är ogrundade."
 exhibition_events.4.b:0 "Den stora tillströmningen av besökare kan orsaka vissa problem."
 ignored_conservatives_modifier:0 "Ignorerade farhågor kring utställningen"
 exhibition_controversy_tt:0 "Minskar#bold poängen i Grand Exhibition#! med #bold1#!"
 exhibition_events.5.t:0 "Gå på toaletten"
 exhibition_events.5.d:0 "[SCOPE.gsInterestGroup('anti_toilet_ig').GetName]Medlemmar i  har uttryckligen påpekat att installationen av offentliga toaletter på utställningen kommer att skada dess goda rykte och anseende."
 exhibition_events.5.f:0 "”Mamma, mamma! Jag måste gå på toaletten! Om bara myndigheterna i det här landet hade satt upp några offentliga toaletter!” \n\nÅh, herregud. Det här var vi inte beredda på."
 exhibition_events.5.a:0 "Om vi inte installerar dem skulle dess goda rykte och anseende försämras."
 exhibition_events.5.b:0 "Vi bör inte låta detta påverka utställningen negativt."
 grand_exhibition_toilets_modifier:0 "Kostnad för installerade offentliga toaletter"
 grand_exhibition_toilets_ig_modifier:0 "Offentliga toaletter – installerade"
 grand_exhibition_toilets_no_ig_modifier:0 "Offentliga toaletter installerades inte"
 exhibition_events.6.t:0 "En fantastisk souvenir"
 exhibition_events.6.d:0 "Nu när utställningen snart öppnar måste vi förbereda oss på att besökarna vill ta med sig en liten bit av den hem."
 exhibition_events.6.f:0 "En parfymdoftande kvinna vandrar runt på utställningen med pompösa rörelser. ”Lille August skulle älska det här!”, säger hon, medan hon stannar till vid varje föremål som fångar hennes blick. Du tvivlar på att lille August skulle uppskatta fontänens mekanismer, men du säger inget emot henne. \n\n”Blodiglar!”, hör du henne skrika, uppenbart upprymd."
 exhibition_events.6.a:0 "Med hjälp av stereoskopkort kan de återuppleva utställningen."
 exhibition_events.6.b:0 "Ett minne i papper skulle vara lätt överkomligt för vem som helst."
 stereoscope_cards_modifier:0 "Stereoskopkort – Souvenirer"
 lithographic_cards_modifier:0 "Litografiska kort – souvenirer"
 exhibition_events.7.t:0 "En affärsfråga"
 exhibition_events.7.d:0 "Det har rapporterats om misstänkta herrar som tar ut en extra avgift för vissa föremål inne i utställningshallen."
 exhibition_events.7.f:0 "Där står en man med en hög hatt – en väldigt, väldigt hög hatt. Han pekar på ett av teleskopen; just det här ser särskilt viktigt ut. ”Skulle du, lille herre, vilja prova det? För bara en penny kan du upptäcka natthimlens underverk!” \n\nDu tvekar. Maskinen glänser. Du skulle kunna svära på att du ser den pulsera under allt det där stålet. Inträdet kostade dig en hel slant. Dina fickor är tomma. Mannen har nu ett skarpt leende – ett väldigt, väldigt skarpt leende."
 exhibition_events.7.a:0 "Vi får inte låta dessa män skada utställningens goda rykte."
 exhibition_events.7.b:0 "Vi kan alla behöva en eller två extra pennies..."
 titanic.1.t:0 "Titanic"
 titanic.1.t2:0 "Den [SCOPE.GetRootScope.GetCountry.GetCustom('dynamic_titanic')]"
 titanic.1.d:0 "[SCOPE.sCharacter('titanic_leader').GetFullName], från [SCOPE.gsInterestGroup('titanic_ig').GetName], har beslutat att finansiera byggandet av ett minnesvärt oceangående passagerarfartyg vid varven i [SCOPE.sState('titanic_state').GetName]. Det kommer att bli något helt unikt."
 titanic.1.f:0 "”Majestätet, det perfekta ljuset som speglade sig mot de fyra svarta skorstenarna, räckte i sig självt. Några av oss som njöt av den friska luften promenerade omkring på däcket. På kvällen infinner sig en känsla av tomhet hos oss. En pojke stod tyst. Vi kunde inte säga något efter det. \n\nFartyget, solnedgången – och den skamlösa drömmen om framtiden, kristalliserad.”"
 titanic.1.a:0 "Folk kommer att prata om lyxen ombord på det här fartyget!"
 titanic.1.b:0 "Vi bör göra byggandet mer effektivt."
 titanic.1.c:0 "Vi har inte tid att ägna oss åt en galnings vanföreställningar."
