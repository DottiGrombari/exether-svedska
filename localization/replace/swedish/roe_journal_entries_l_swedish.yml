 je_bandit_state_formation:0 "Honor Among Thieves"
 je_bandit_state_formation_reason:0 "The brigands, pirates, and outlaws of [ROOT.GetCountry.GetNameNoFlag] live by the blade, but now dream of forging a realm from their plunder. Defying the so-called civilized nations, they thrive on raids, smuggling, and shadow rule. \n\nShould order rise from chaos and raiding be tempered into governance, the Great Powers may have no choice but to [Concept('concept_recognized_power', 'recognize')]  what began as crime as a nation in its own right."
