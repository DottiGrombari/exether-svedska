 je_guild_syndicalism_factory_councils:0 "Establish Factory Councils"
 je_guild_syndicalism_factory_councils_desc:0 "The [SelectLocalization(SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').IsValid, SCOPE.sPoliticalMovement('guild_syndicalist_movement_scope').GetName, 'movement_guild_syndicalist')] has secured both a sympathetic President and a significant share of seats in [SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]. It may now orchestrate the abolition of private factories, and establish itself as the sole legal mediator between workers and management in [ROOT.GetCountry.GetNameNoFormatting]."
