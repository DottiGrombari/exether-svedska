 je_prison_labor_suppression_button:0 "Enforce Due Process"
 je_prison_labor_suppression_button_desc:0 "While the [GetLawType('law_slave_trade').GetName] is too ingrained in [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] to fully suppress, certain measures may still be taken against the worst and most prominent offenders."
 je_prison_labor_end_suppression_button:0 "Permit Unchecked Gulag Transfers"
 je_prison_labor_end_suppression_button_desc:0 "Maintaining oversight of prisoner movement has become more trouble than its worth. For the sake of stability and continued output, we should allow the transfer of laborers to proceed without interference."
 restricted_prison_labor_modifier:0 "Limiting Prisoner Shipments"
 restricted_prison_labor_ig_modifier:0 "Limiting Prisoner Shipments"
 unrestricted_prison_labor_ig_modifier:0 "Exploiting Undesirables"
 unrestricted_prison_labor_modifier:0 "Exploiting Undesirables"
 end_prison_labor_button:0 "Dissolve the Gulag System"
 end_prison_labor_button_desc:0 "Influenced by international pressure and recent moral discourse, many within the upper echelons of our society have begun turning against the gulag network.\n\nShould our nation find itself with a #bold Reformist#! or #bold Humanitarian#! figure near the reins of power, or should the [GetInterestGroupVariant('ig_industrialists',GetPlayer).GetNameWithCountryVariant] be sufficiently contained, the abolition of forced labor in the camps could be accelerated, though not without consequence."
 je_baaceist:0 "The Setting Sun"
 je_baaceist_reason:0 "The masses cannot be freed while spellcasters, relics, and old loyalties command awe. A revolutionary vanguard must guide the collective, using state power to break superstition and secure equality beyond myth and memory."
 je_baaceist_lobby:0 "The masses cannot be freed while spellcasters, relics, and old loyalties command awe. A revolutionary vanguard must guide the collective, using state power to break superstition and secure equality beyond myth and memory."
 je_panopticon:0 "The Panopticon"
 je_panopticon_reason:0 "#italic \"A state that cannot distinguish the loyal from the false governs blindly.\" #!\n\nPersistent suspicion of [GetCulture('changeling').GetName] infiltration has steadily eroded confidence in conventional policing, civil registries, and testimonial evidence. Even the [concept_achon_agency], established to confront this threat through investigation, screening, and arcane verification, has become mired in controversy, accusations of excess, and doubts about its own integrity. If an agency dedicated to certainty can itself be deceived, then no individual judgment can be trusted.\n\nThe possibility that subversive activity may be conducted behind borrowed faces has rendered personal recognition unreliable and bureaucratic procedure fragile, complicating the maintenance of public order. The Panopticon is therefore proposed as a centralized system of arcane scrying, intended to supersede both human discretion and agency-led enforcement. Rather than identifying who a subject is, it observes what they do. Through continuous and impersonal oversight, it promises to deter crime, expose organized subversion, and restore administrative certainty without reliance on mass arrests, confessions, or the fallible vigilance of the [concept_achon_agency].\n\n[concept_changeling_paranoia]:\nShould belief in the scale or immediacy of the perceived [GetCulture('changeling').GetName] threat diminish, political support for the Panopticon will collapse, and the project will be abandoned before completion."
 je_panopticon_lobby:0 "#italic \"A state that cannot distinguish the loyal from the false governs blindly.\" #!\n\nPersistent suspicion of [GetCulture('changeling').GetName] infiltration has steadily eroded confidence in conventional policing, civil registries, and testimonial evidence. Even the [concept_achon_agency], established to confront this threat through investigation, screening, and arcane verification, has become mired in controversy, accusations of excess, and doubts about its own integrity. If an agency dedicated to certainty can itself be deceived, then no individual judgment can be trusted.\n\nThe possibility that subversive activity may be conducted behind borrowed faces has rendered personal recognition unreliable and bureaucratic procedure fragile, complicating the maintenance of public order. The Panopticon is therefore proposed as a centralized system of arcane scrying, intended to supersede both human discretion and agency-led enforcement. Rather than identifying who a subject is, it observes what they do. Through continuous and impersonal oversight, it promises to deter crime, expose organized subversion, and restore administrative certainty without reliance on mass arrests, confessions, or the fallible vigilance of the [concept_achon_agency].\n\n[concept_changeling_paranoia]:\nShould belief in the scale or immediacy of the perceived [GetCulture('changeling').GetName] threat diminish, political support for the Panopticon will collapse, and the project will be abandoned before completion."
 je_panopticon_fail_tt:0 "[concept_changeling_paranoia] has fallen to #v 0#!"
 panopticon_changeling_paranoia_progress_bar:0 "[concept_changeling_paranoia]"
 panopticon_changeling_paranoia_progress_bar_desc:0 "[concept_changeling_paranoia]: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/100)#!"
 je_panopticon_status:0 "Through magical surveillance and meticulous oversight, the safety of the state is ensured."
 je_panopticon_status_1:0 "Changeling Paranoia is #bold negligible#!"
 je_panopticon_status_2:0 "Changeling Paranoia is #bold waning#!"
 je_panopticon_status_3:0 "Changeling Paranoia is #bold widespread#!"
 je_panopticon_status_4:0 "Changeling Paranoia is #bold extreme#!"
 panopticon_control_changeling_land_button:0 "Reincorporate the Shifting Scar"
 panopticon_control_changeling_land_button_desc:0 "The former territories of the Shifting Scar have long existed beyond the reach of [ROOT.GetCountry.GetAdjectiveNoFlag] law, governed by changeling pretenders and informal authority. To restore confidence and stability, these lands must be fully reincorporated, placing them under direct oversight from [ROOT.GetCountry.GetCapital.GetCityHubName] and ending all ambiguity over their governance."
 panopticon_false_flag_button:0 "Manufacture a Security Incident"
 panopticon_false_flag_button_desc:0 "Recent assessments suggest that public vigilance has begun to wane, weakening support for the extraordinary measures required to ensure internal security. By authorizing a limited and carefully managed incident, and allowing responsibility to fall upon changeling elements, confidence in the necessity of the Panopticon can be renewed without risking broader instability."
 panopticon_secretkeepers_deal_button:0 "Negotiate with the Secretkeepers"
 panopticon_secretkeepers_deal_button_desc:0 "The Vynduri dwarves have indicated a willingness to assist in matters of internal security, provided the state commits more firmly to doctrinal unity and religious discipline. By granting the faithful a formal role in oversight and record-keeping, vigilance may be strengthened while dissent is recast as moral deviation rather than political resistance."
 je_spa_economic_regeneration_land_reform:0 "The Imperial Estates"
 je_spa_economic_regeneration_land_reform_reason:0 "The [ROOT.GetCountry.GetAdjectiveNoFlag] [GetLawType('law_latifundias').GetName] dominate vast stretches of the countryside, estates so extensive that entire communities depend upon the will of a single landlord. Though slavery is forbidden under [ROOT.GetCountry.GetAdjectiveNoFlag] law, the plantation system binds thousands of laborers, gnome and otherwise, to cycles of debt, seasonal contracts, and grinding poverty.\n\nFor centuries, the [GetLawType('law_latifundias').GetName] formed the backbone of the Thalorian economy. Their harvests filled granaries, financed fleets, and sustained armies. On the frontier, they were instruments of expansion, anchoring Thalorian settlement and projecting authority into newly claimed lands. To many, they are not merely estates, but institutions bound up with tradition, hierarchy, and the very identity of the old Empire.\n\nThe time has come for the government to determine whether these great estates shall endure as the pillars of Thalorian society, and to pursue its chosen course with unwavering resolve."
 je_spa_economic_regeneration_land_reform_lobby:0 "Vast Thalorian latifundia dominate the countryside, entwining labor and tradition. The government faces a choice: maintain these estates or pursue reform that could reshape rural life"
 je_dark_morass:0 "Draining the Swamp"
 je_dark_morass_reason:0 "While [SCOPE.sGoods('godsblood_scope').GetName] and its strange, potent properties have long been whispered of in illicit circles, its extraction from the Dark Morass has traditionally been sporadic and small in scale. The region’s sinking soils, stagnant waters, choking fogs and uncanny whispers have discouraged serious investment.\n\nYet with the #bold Industrial Revolution#! in full swing and new uses for [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting] discovered by sorcerers and chimerists alike, commercial demand has surged. If the Morass is to serve the nation, it must be mastered.\n\nCanals must be cut. Waters must be driven back. The swamp must be drained, diked, and reclaimed, transformed from a festering wilderness into firm ground fit for industry and settlement."
 je_dark_morass_tt:0 "All [SCOPE.sGoods('godsblood_scope').GetNameNoFormatting]-producing Morass [Concept('concept_state','$concept_states$')] must have their #bold state trait#! upgraded to #bold Reclaimed Dark Morass#!."
 morass_development_cooldown_modifier:0 "Draining the Morass"
 upgrade_dark_morass_button_1:0 "Develop Morass State"
 upgrade_dark_morass_button_1_desc:0 "The dark boglands of the Morass are an untapped source of wealth. Beneath the peat and standing water lie veins of Godsblood waiting to be extracted. It behooves us to drain and develop these lands for the sake of the nation and our continued prosperity."
 dark_morass_1_cooldown_tt:0 "Has not used the #bold Develop Morass State#! decision in the past #bold year#!"
 upgrade_dark_morass_button_2:0 "Exploit Morass State"
 upgrade_dark_morass_button_2_desc:0 "The wetlands, while partially reclaimed, still conceal their greatest reserves from us. To fully exploit the potential of the Morass, we must drive deeper canals, raise stronger embankments and work this land even harder."
 dark_morass_2_cooldown_tt:0 "Has not used the #bold Exploit Morass State#! decision in the past #bold year#!"
 dark_morass_border_treaty_button_1:0 "Sign the Treaty of Blackwater Reach"
 dark_morass_border_treaty_button_1_desc:0 "The western Morass borders of [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] have long suffered from poor delineation, resulting in needless disputes over drainage rights and settlements built on contested embankments.\n\nA comprehensive border treaty with our Morass neighbor would settle the issue. In the favor of [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting], of course."
 dark_morass_border_treaty_button_2:0 "Sign the Treaty of Greyfen"
 dark_morass_border_treaty_button_2_desc:0 "The northern Morass borders of [SCOPE.GetRootScope.GetCountry.GetNameNoFlag] are vague and open to exploitation from foreign governments and troublesome bandits alike. Clearly-delineated jurisdictions and mutual agreements with our neighbors would do much to protect our own borders and bring some order to this waterlogged frontier.\n\nOne sweeping treaty would neatly resolve this issue for [SCOPE.GetRootScope.GetCountry.GetNameNoFormatting]."
 je_prestige_goods_ice:0 "$prestige_good_generic_ice$"
 je_prestige_goods_ice_reason:0 "[SCOPE.sCompany('relevant_company').GetName] has established itself as an important actor within our economy. The company seeks to leverage its current prosperity to develop its own brand of generic ice. If successful, it will be able to expand its competitiveness within the global @generic_ice! #b $generic_ice$#! market."
 je_prestige_goods_ice_lobby:0 "[SCOPE.sCompany('relevant_company').GetName] has established itself as an important actor within our economy. The company seeks to leverage its current prosperity to develop its own brand of generic ice. If successful, it will be able to expand its competitiveness within the global @generic_ice! #b $generic_ice$#! market."
 je_prestige_goods_ice_goal:0 "Maintain the following for #v [GetPlayer.MakeScope.ScriptValue('prestige_good_journal_entry_months')] months#! (currently #v [ROOT.GetCountry.MakeScope.Var('prestige_ice_timer_var').GetValue]#!): #indent_newline: "
