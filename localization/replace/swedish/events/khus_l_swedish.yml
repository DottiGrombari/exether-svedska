 je_khus_lab_reason:0 "The $building_khus_lab_1$ has sat dormant for decades; affiliates of the [SCOPE.gsInterestGroup('relevant_ig').GetName] have raised funds for its renovation in [SCOPE.sState('relevant_state').GetCityHubName]. One philanthropist has already commissioned renowned architects to oversee the renovation.\n\nThe $building_khus_lab_1$ will need to be built in three phases and may be constructed in the State Panel for [SelectLocalization(SCOPE.sState('relevant_state').IsValid, SCOPE.sState('relevant_state').GetName, 'STATE_ZAHRAFI')]"
