 je_a_steppe_behind:0 "A Steppe Behind"
 je_a_steppe_behind_reason:0 "Our lack of real centralized governance has allowed our neighbors to exploit our lands and our people with impunity.  Our ruralist way of life must be enshrined if we are to stand up to the might of [GetCulture('dumonian').GetName] capitalists."
 je_a_steppe_forward:0 "Hostile Takeover"
 je_a_steppe_forward_reason:0 "Now that we have begun to centralize our governance, the time has come to revisit the holdings of the foreign companies within our lands."
 je_about_a_horse:0 "About A Horse"
 je_about_a_horse_reason:0 "Our friends in the Brackenshire Investor's Guild have been busy buying up what little industry exists in [SCOPE.sCountry('yanger_scope').GetNameNoFlag]. They have approached us with an interesting proposal; they believe the [SCOPE.sCountry('yanger_scope').GetAdjectiveNoFlag] government to be incapable of enforcing its own trade agreements.  If we were to take control over a greater portion of their economy, we could pull them inseparably into our sphere."
 je_soulwrought_subjects:0 "Our [GetCulture('soulwrought').GetName] Subjects"
 je_soulwrought_subjects_reason:0 "[GetCulture('soulwrought').GetName] make up a significant portion of nation's population, but have comparatively few legal rights and privileges.  As our citizens begin to discuss concepts such as legal personhood and equality before the law, a civil rights movement takes its first steps."
 cult_1_tt:0 "Every state owned by [THIS.GetCountry.GetName] gets: "
 conversion_cult_tt:0 "The Dragonblight will progress faster in this state."
 dragonblight_2_tt:0 "Will begin a [Concept('concept_migration_target', '$concept_mass_migration$')] of [GetCulture('illvasaari').GetName] pops to a random state in Thassarcia"
 je_dragonblight_vaccine:0 "A Cure for Kobolds"
 je_dragonblight_vaccine_reason:0 "While there is little agreement regarding what causes the Dragonblight, there a few things that #italic undeniably#! prevent it.  If we invested more resources into learning what these things are, perhaps we could get this pandemic in check."
 dragonblight_vaccine_full_tt:0 "The #variable $dragonblight_vaccine_progress_bar$#! progress bar has reached #bold 5000#!\n\nThe cure will progress faster by raising [concept_literacy] and building universities, as well as empowering the $ig_intelligentsia$ [concept_interest_group] by getting them into government and passing the [GetLawType('law_technocracy').GetName] or [GetLawType('law_appointed_bureaucrats').GetName] [Concept('concept_law','$concept_laws$')]."
 je_dragonblight:0 "The Dragonblight"
 je_dragonblight_reason:0 "Every day, more and more [GetCulture('illvasaari').GetName] dragonborn are turned into [GetCulture('kotskarvi').GetName] kobolds.  We must find a way to stop this disease before our administration collapses beneath the weight of this curse.\n\nThe spread of the Dragonblight can be slowed, and its effects reduced, with the [GetDecreeType('decree_special_measures').GetName] decree."
 je_dragonblight_completion_tt:0 "[THIS.GetCountry.GetName] has found a cure for the Dragonblight"
