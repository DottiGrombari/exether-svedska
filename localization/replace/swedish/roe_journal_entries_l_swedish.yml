 je_cove_devils_due:0 "The Devil's Due"
 je_cove_devils_due_reason:0 "The three Devils of avarice have once again come to the Cove. They demand their due and we must pay, be it in gold or be it in blood."
 je_cove_devils_due_status:0 "Every year we must pay the Devils of Avarice. If we fail to pay, they will take their due by force."
 je_lighthouse_survey:0 "Survey the Lonely Islands"
 je_lighthouse_survey_reason:0 "The petition made by the sailors that dare sail the oceans around the Lonely Islands have been met. After successfully gathering a team of genius engineers and mages, they've started to design a building that will stand tall amongst the waves. We will survey the islands to determine the feasibility of building a grand lighthouse"
 je_lighthouse_survey_status:0 "We are conducting a survey on Ngurulan to understand the size of the project. Though the island is not the biggest, we believe it can be done."
 je_lighthouse_survey_goal:0 "The Lonely Islands have been successfully surveyed"
 je_lighthouse_construction:0 "Construction of the Light of Solitude"
 je_lighthouse_construction_status:0 "The survey of the Lonely Islands has been completed. Our team has returned with a plan to build a grand lighthouse on the islands."
 je_lighthouse_construction_reason:0 "The construction of the Light of Solitude can begin. Our team of mage-neers are working tirelessly to complete the lighthouse. It's completion will ensure the safety of our ships and secure the trade routes between our colonies, truly marking our presence in the world stage."
 je_restore_upashna:0 "Restore the Upashna-Dhaalum"
 je_restore_upashna_reason:0 "Our empire once ruled all Locari. The very earth would tremble from the march of our armies, and the sky would shrink back from the beating wings of our Asuroth."
 je_restore_upashna_status:0 "Now psionic storms cause chaos while our rightful property has joined with awakened beasts to terrorize our sacred homeland and defile our once mighty temples. It's time to participate in a little blood sport. Or a lot of of blood sports. "
 nbi_formed:0 "Nagabumi has been formed"
 je_dragon_tombs:0 "Search for the Dragon Tombs"
 je_dragon_tombs_reason:0 "The discovery of the Gem Dragons' tombs has ignited a quest to find and uncover these legendary resting places. Our scholars and adventurers are now scouring the land, investigating sites rich with ancient draconic energy. With each step closer to locating the tombs, we come closer to unlocking knowledge and power lost for generations. Only time will tell what secrets and dangers await us."
 je_dragon_tombs_lobby:0 "The discovery of the Gem Dragons' tombs has ignited a quest to find and uncover these legendary resting places. Our scholars and adventurers are now scouring the land, investigating sites rich with ancient draconic energy. With each step closer to locating the tombs, we come closer to unlocking knowledge and power lost for generations. Only time will tell what secrets and dangers await us."
 je_songs_of_the_forest_opa:0 "Songs of the Forest"
 je_songs_of_the_forest_opa_lobby:0 "Our rivals in Vairia meddle in the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName]. Can we outweigh their influence?"
 je_songs_of_the_forest_vai_reason:0 "The [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] yet stirs.\n\nWhen the Thicket arose after the [concept_nightfall], not all Vairians fled. There were some who stayed, and learned the ways of the forest. The largest group among them would become the tribe of Varilafdt. While many now bear some amount of elven ancestry, they would still welcome the return of the Vairian empire.\n\nWhile we lack the ability to penetrate through the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName], we have ways to influence the factions within.\n\nBy completing various actions, we will earn #gold #bold Vermillion Influence#!#! which may be #green spent#! on actions that will further align our faction:\n  $EFFECT_LIST_BULLET$ #bold Performing #gold advisory#! actions#!\n  $EFFECT_LIST_BULLET$ #bold Increasing relations with [SCOPE.sCountry('vlf_scope').GetNameNoFlag]#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_guarantee_independence] [concept_treaty] with [SCOPE.sCountry('vlf_scope').GetNameNoFlag]#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_military_assistance] [concept_treaty] with [SCOPE.sCountry('vlf_scope').GetNameNoFlag]#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_foreign_investment_rights] [concept_treaty] with [SCOPE.sCountry('vlf_scope').GetNameNoFlag]#!\n  $EFFECT_LIST_BULLET$ #bold Supporting a #white Pro-Country#! [concept_political_lobby] in [SCOPE.sCountry('vlf_scope').GetNameNoFlag]#!\n  $EFFECT_LIST_BULLET$ #bold Maintaining a land border with our backed faction#!"
 je_songs_of_the_forest_vai:0 "Songs of the Forest"
 je_songs_of_the_forest_vai_lobby:0 "Our kin in Varilafdt risk being crushed beneath the wood elves. We must put our foot on the scales."
 je_songs_of_the_forest_opa_reason:0 "The [GetGeographicRegion('geographic_region_vermillion_thicket').GetName] yet stirs.\n\nWhile we lack the ability to penetrate through the [GetGeographicRegion('geographic_region_vermillion_thicket').GetName], we have ways to influence the factions within.\n\nBy completing various actions, we will earn #gold #bold Vermillion Influence#!#! which may be #green spent#! on actions that will further align our faction:\n  $EFFECT_LIST_BULLET$ #bold Performing #gold advisory#! actions#!\n  $EFFECT_LIST_BULLET$ #bold Increasing relations with our backed faction#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_guarantee_independence] [concept_treaty] with our backed faction#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_military_assistance] [concept_treaty] with our backed faction#!\n  $EFFECT_LIST_BULLET$ #bold Signing a [concept_foreign_investment_rights] [concept_treaty] with our backed faction#!\n  $EFFECT_LIST_BULLET$ #bold Supporting a #white Pro-Country#! [concept_political_lobby] in our backed faction#!\n  $EFFECT_LIST_BULLET$ #bold Maintaining a land border with our backed faction#!"
 je_hobgoblin_yoke:0 "The Crimson Yoke"
 je_hobgoblin_yoke_reason:0 "After the rise of the Yulug Dynasty, goblins have found themselves at the mercy of military governors, strict enforcers of the empire's caste system. The hobgoblins, wielding power thanks to the discovery of Sparkpowder, rule with an iron fist.\n\nSmall goblins, often forced into labor or conscripted as cannon fodder, toil under the shadow of their hobgoblin overseers. Life for them is one of harsh duty, low status, and constant sacrifice, with few chances for advancement in the rigid, military-run hierarchy of the Authority."
 je_hobgoblin_yoke_lobby:0 "After the rise of the Yulug Dynasty, goblins have found themselves at the mercy of military governors, strict enforcers of the empire's caste system. The hobgoblins, wielding power thanks to the discovery of Sparkpowder, rule with an iron fist.\n\nSmall goblins, often forced into labor or conscripted as cannon fodder, toil under the shadow of their hobgoblin overseers. Life for them is one of harsh duty, low status, and constant sacrifice, with few chances for advancement in the rigid, military-run hierarchy of the Authority."
 je_hobgoblin_army:0 "Whip and Barrel"
 je_hobgoblin_army_reason:0 "The hobgoblin armies are unmatched on the isle of Dornod, renowned for their iron discipline and ruthless efficiency. Recruitment is highly selective, allowing only the most capable to join, who must then endure a grueling training regime that forges them into elite soldiers. Rigorous drills, relentless physical tests, and unwavering loyalty are demanded from every recruit, ensuring their dominance on the battlefield.\n\nSociety under this system is entirely centered on military rule, where rank and status are earned through combat prowess. Hobgoblin leaders serve as both governors and generals, with their authority stemming from battlefield success. Civilian life is tightly controlled, with mandatory service and constant preparation for war, making military strength the foundation of Yulug society."
 je_hobgoblin_army_lobby:0 "The hobgoblin armies are unmatched on the isle of Dornod, renowned for their iron discipline and ruthless efficiency. Recruitment is highly selective, allowing only the most capable to join, who must then endure a grueling training regime that forges them into elite soldiers. Rigorous drills, relentless physical tests, and unwavering loyalty are demanded from every recruit, ensuring their dominance on the battlefield.\n\nSociety under this system is entirely centered on military rule, where rank and status are earned through combat prowess. Hobgoblin leaders serve as both governors and generals, with their authority stemming from battlefield success. Civilian life is tightly controlled, with mandatory service and constant preparation for war, making military strength the foundation of Yulug society."
 je_craggedwyn_question:0 "The Craggedwyn Question"
 je_craggedwyn_question_reason:0 "Thalmaric Alchemics was— and is, the favorite of all of the Boar's pet projects. The creators of the Wyldfire that won the [concept_buramog_wars], Thalmaric Alchemics is the Cerunite government's primary arm of alchemical weapons testing and development. The Margrave, however, grows old, and his ability to cover up what goes on behind company doors #red grows thin.#!\n\nAs long as $company_craggedwyn$ is allowed to operate, it will burn through [concept_arable_land] on a yearly basis, as well as run of the risk of generating [Concept('concept_diplomatic_incident','$concept_diplomatic_incidents$')] with any neighboring [Concept('concept_recognized_power','$concept_recognized_powers$')]. This risk is #red increased#! as the Thalmaric Danger Level rises.\n\nThe Thalmaric Danger Level is primarily increased and decreased as a result of events, however, it will increase yearly if the total [concept_arable_land] within the company drops below #bold 30#!, as well as having a slim chance of increasing yearly if company [concept_prosperity] reaches 100.\n\nIf the Thalmaric Danger Level reaches 100%, $company_craggedwyn$ may implode under its own weight, and repeat the disaster of Alchemist's Refuse."
 je_craggedwyn_question_lobby:0 "Thalmaric Alchemics was— and is, the favorite of all of the Boar's pet projects. The creators of the Wyldfire that won the [concept_buramog_wars], Thalmaric Alchemics is the Cerunite government's primary arm of alchemical weapons testing and development. The Margrave, however, grows old, and his ability to cover up what goes on behind company doors #red grows thin.#!\n\nAs long as $company_craggedwyn$ is allowed to operate, it will burn through [concept_arable_land] on a yearly basis, as well as run of the risk of generating [Concept('concept_diplomatic_incident','$concept_diplomatic_incidents$')] with any neighboring [Concept('concept_recognized_power','$concept_recognized_powers$')]. This risk is #red increased#! as the Thalmaric Danger Level rises.\n\nThe Thalmaric Danger Level is primarily increased and decreased as a result of events, however, it will increase yearly if the total [concept_arable_land] within the company drops below #bold 30#!, as well as having a slim chance of increasing yearly if company [concept_prosperity] reaches 100.\n\nIf the Thalmaric Danger Level reaches 100%, $company_craggedwyn$ may implode under its own weight, and repeat the disaster of Alchemist's Refuse."
 je_everfrost_expedition:0 "Beyond the Frost"
 je_everfrost_expedition_reason:0 "The secrets of the giants' homeland lie somewhere beyond the Gruaav Range, hidden from our charts and stories. To be the first to set foot in those fabled lands would unlock ancient truths, granting us a glimpse into legends long thought lost to time. The knowledge awaiting us could reshape our understanding of myth and history alike."
 everfrost_research:0 "Everfrost Geological Survey"
 climbed_krutum:0 "Scaled Mount Krutum"
 first_beyond_the_wall:0 "First to Bremala"
 everfrost_expedition_returned:0 "Successful Everfrost Expedition"
 je_winds_of_change:0 "Winds of Change"
 je_winds_of_change_reason:0 "The world is changing rapidly with the advent of magic and machinery. Will we join the coming tide, or be swallowed by it"
 je_emerald_sunset:0 "Emerald Sunset"
 je_emerald_sunset_reason:0 "The Ocelian Locari Company has begun to take advantage of our relative lack of established legal norms. What started as a small series of trade agreements is spiraling to land ownership and in some cases even minor administrative rights. If we do not formalize our legal succession before the death of Grifa Tallcat, they may attempt to seize control of the country."
 delegate_to_tribes_button:0 "Delegate Tasks to the Tribes"
 delegate_to_tribes_button_desc:0 "As Grifa Tallcat grows older, perhaps it would be best for esteemed members of the tribes to begin handling certain matters of governance."
 promote_magocrats_button:0 "Favor Starbrands over Tribal Leaders"
 promote_magocrats_button_desc:0 "Grifa Tallcat has much control over the highest of tribal appointments; she could use this privilege to exercise favoritism to the magically-gifted."
 je_buramog_raids:0 "Buramog Raids"
 je_buramog_raids_reason:0 "The Buramog orcs of the Plaguewood have resumed full-scale raids on their neighbors, terrorizing settlements on our shared border."
 unite_the_plaguewood_tribes:0 "Invoke the Steakamki"
 unite_the_plaguewood_tribes_desc:0 "Call upon the blood oaths sworn by the buramog orcs to unite against a common foe. This solemn pact sets aside past grievances, strengthening bonds and fostering unity among the tribes in moments of great need."
 invader_escalate_plaguewood_war:0 "Organize a Plaguewood Offensive"
 invader_escalate_plaguewood_war_desc:0 "The Plaguewood is a treacherous place, where we are currently at a disadvantage. We will to wait for the situation to develop in our favor."
 je_second_buramog_wars:0 "Predator and Prey"
 je_second_buramog_wars_reason:0 "The Buramog orcs of the Plaguewood have resumed full-scale raids on their neighbors, terrorizing settlements on our shared border."
 je_ebridor:0 "Avarice and Hunger for Power"
 je_ebridor_reason:0 "What's the basic fundaments of a mage? Magical capabilities, of course. #b And their hunger for power.#! \n\nAnd the fundaments of a Astral Consortium Magnate? #b Greed and money#!, for anyone wondering. \n\n#b That's why we must curtail their influence in our nation,#! for they will grow more powerful by each day should we do nothing about them. And one day should all of their pieces fall in place, we might regret not doing anything about them sooner."
 je_ebridor_status:0 "We must deal with our Neighbour's influence"
 je_serbinelle_unification:0 "A Late Betrothal"
 je_serbinelle_unification_reason:0 "[GetCulture('ocelian').GetName] and [GetCulture('enelli').GetName] peoples are oft considered to be sister cultures, sharing language, religious holidays and more.  In spite of this, when the Treaty of 1146 was ratified, formally creating the union known as the Emerald League, [SCOPE.sCountry('seb_scope').GetNameNoFlag] remained the only non-signatory party.\n\nTheir objections were primarily related to freedom of movement within the League itself; while there is technically no central authority blocking [GetCulture('enelli').GetName] from travelling and finding opportunity within the League, they face much discrimination in the northernmost regions, which local city governments have little interest in stopping.\n\nIf we were to prove to them that an Enelli has just as much opportunity in the Emerald League as an Ocelian, they would likely reconsider."
 je_mimic_demesne:0 "The Cursed Demesne"
 je_mimic_demesne_reason:0 "The Mimic Demesne to our west has been mostly empty of all life and civilization since the Nightfall destroyed the Khussite Empire and shattered Achon. If we can establish control over these territories, we could make them into prospering provinces of our growing realm."
 je_mimic_demesne_lobby:0 "The Mimic Demesne to our west has been mostly empty of all life and civilization since the Nightfall destroyed the Khussite Empire and shattered Achon. If we can establish control over these territories, we could make them into prospering provinces of our growing realm."
 mimic_button:0 "Conduct a military campaign"
 mimic_button_desc:0 "While military might alone will not allow us to settle the Mimic Demesnes, it surely won't hurt."
 je_plaguewood_expulsions:0 "Expulsion of Buramog Orcs"
 je_plaguewood_expulsions_reason:0 "The government's ambition to settle the former territory of the Plaguewoods with loyal subjects has led to a ruthless campaign to evict the region's [SCOPE.sCulture('buramog_culture_scope').GetName] population by any means necessary.\n\nWhilst this [concept_journal_entry] is active, [SCOPE.sCulture('buramog_culture_scope').GetName] [Concept('concept_pop', '$concept_pops$')] will be deported from our borders, at the cost of enormous loss of life."
 will_lead_to_expulsions_tt:0 "@warning! This will lead to drastic consequences for the [SCOPE.sCulture('buramog_culture').GetName] population"
 heptadrone_swarms_tt:0 "We have experienced heptadrone swarms"
 has_halted_deportations_tt:0 "Has halted the expulsions of [SCOPE.sCulture('buramog_culture_scope').GetName] people"
 halt_buramog_deportations_tt:0 "Efforts to continue the expulsions of [SCOPE.sCulture('buramog_culture_scope').GetName] people will cease"
 modifier_halted_plaguewood_expulsions:0 "Halted Plaguewood Expulsion Efforts"
 invader_halt_plaguewood_expulsions:0 "Halt Expulsions"
 invader_halt_plaguewood_expulsions_desc:0 "The continued deportation of the Buramog Orcs is no longer in the interest of the government. We will order the deportations cease immediately."
 halted_expulsions_tt:0 "Has already halted the expulsion of Buramog Orcs"
 je_thieves_guild:0 "Thieves Guild"
 je_thieves_guild_reason:0 "A notorious thieves' guild has entrenched itself in the heart of [ROOT.GetCountry.GetNameNoFlag], thriving amidst rampant corruption and a toothless constabulary. Smuggling, extortion, and clandestine dealings flourish, eroding the legitimacy of your rule.\n\nFaced with this growing menace, your advisors suggest two paths: invest heavily in reforming and empowering the local law enforcement, or sponsor a [concept_retainer] and their group of daring adventurers to infiltrate the guild's hideout and eliminate its shadowy leaders."
 je_thieves_guild_lobby:0 "A notorious thieves' guild has entrenched itself in the heart of [ROOT.GetCountry.GetNameNoFlag], thriving amidst rampant corruption and a toothless constabulary. Smuggling, extortion, and clandestine dealings flourish, eroding the legitimacy of your rule.\n\nFaced with this growing menace, your advisors suggest two paths: invest heavily in reforming and empowering the local law enforcement, or sponsor a [concept_retainer] and their group of daring adventurers to infiltrate the guild's hideout and eliminate its shadowy leaders."
 send_retainer_thieves_guild_button:0 "Send Retainer"
 send_retainer_thieves_guild_button_desc:0 "Will send a [concept_retainer] and their party to deal with the Thieves' Guild."
 send_police_thieves_guild_button:0 "Organize a Police raid"
 send_police_thieves_guild_button_desc:0 "Order law enforcement to conduct a raid targeting Thieves' Guild leadership and logistics."
 je_blue_riband:0 "The Azure Pennant"
 je_blue_riband_reason:0 "The [concept_blue_riband] is an unofficial accolade given to the passenger liner in regular intercontinental service with the record highest average speed.\n\n[SelectLocalization(GetMetaPlayer.GetPlayedOrObservedCountry.IsValid, 'blue_riband_tooltip_overlayed', 'OBSERVER_NO_COUNTRY_SELECTED') ]."
 je_blue_riband_lobby:0 "The [concept_blue_riband] is an unofficial accolade given to the passenger liner in regular intercontinental service with the record highest average speed.\n\n[SelectLocalization(GetMetaPlayer.GetPlayedOrObservedCountry.IsValid, 'blue_riband_tooltip_overlayed', 'OBSERVER_NO_COUNTRY_SELECTED') ]."
 je_blue_riband_status:0 "The competition is afoot"
 blue_riband_je_lead_tt:0 "We are in the lead for the [concept_blue_riband]."
 blue_riband_je_no_riband_tt:0 "There is no current [concept_blue_riband]."
 blue_riband_complete_tt:0 "40 years after any country research concrete arc wielding"
 blue_riband_je_tt:0 "Any country research gantry crane after 1203"
 blue_riband_je_require_tt:0 "Any of : leading producer of streamer, has a shipyard comany or has a high level shipyard."
