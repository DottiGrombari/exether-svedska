 je_prohibition_reason:0 "Även om deras ståndpunkter bygger på helt olika utgångspunkter är både  och[SCOPE.gsInterestGroup('intelligentsia_ig').GetName][SCOPE.gsInterestGroup('devout_ig').GetName]  överens om att alkohol är ett gift för sinnet. Endast ett statligt förbud kan sätta stopp för detta onda."
 je_prohibition_goal:0 "Följande villkor måste vara uppfyllda under sammanlagt 10 år (kan avbrytas):"
 prohibition_fail.tt:0 "Avvisade nykterhetsrörelsen i evenemanget ”Förbudstiden”."
 prohibition_success.tt:0 "Spriten[concept_obsession]kommer att avlägsnas från alla primärkulturer."
 prohibition.1.t:0 "Förbud"
 prohibition.1.d:0 "Både[SCOPE.gsInterestGroup('devout_ig').GetName]  och[SCOPE.gsInterestGroup('intelligentsia_ig').GetName]  har uttryckt sin önskan att få ett stopp på den alarmerande spritkonsumtionen i vårt land och har lämnat in en petition till regeringen om att förbjuda den."
 prohibition.1.f:0 "”Jag varken dricker eller röker, eftersom min lärare inpräntade tre grundläggande dygder i mig: renlighet i kropp och själ samt måttfullhet.”"
 prohibition.1.a:0 "Alkohol är ett gift för sinnet."
 prohibition.1.b:0 "Inget får en man att le mer än ett glas whisky innan han går och lägger sig!"
 started_temperance_modifier:0 "Startade nykterhetsrörelsen"
 rejected_prohibition_modifier:0 "Avvisade nykterhetsrörelsen"
 rejected_prohibition_tt:0 "Detta kommer att ta bort bokföringsposten för Temperance Movement."
 prohibition.2.t:0 "Inifrån"
 prohibition.2.d:0 "[SCOPE.sCharacter('alcoholic_leader').GetFullName], från [SCOPE.gsInterestGroup('alcoholic_ig').GetName], har visat sig ha inrättat ett olagligt bränneri i sitt eget hus. Under sonens[SCOPE.sCharacter('alcoholic_leader').GetHerHis] till synes oskyldiga fest öppnade gästerna fel skjul."
 prohibition.2.f:0 "”Det här är rena galenskapen! Hur kan jag, en föredömlig medborgare, anklagas för ett sådant svek – ett sådant… motbjudande beteende. Förräderi! Utpressning! Jag blir oskyldigt anklagad!”"
 prohibition.2.a:0 "Sluta med ursäkterna! Skicka männen till den där förbannade festen!"
 prohibition.2.b:0 "[SCOPE.sCharacter('alcoholic_leader').GetSheHe|U] har alltid haft ett besvärligt temperament."
 prohibition.2.c:0 "[SCOPE.sCharacter('alcoholic_leader').GetSheHe|U] blir uppenbarligen utsatt för en komplott."
 birthday_raid_modifier:0 "Olagligt bränneri upplöst"
 birthday_raid_leader_modifier:0 "Olagligt bränneri upptäckt"
 birthday_raid_gentlemen_modifier:0 "Olagligt bränneri upptäckt"
 prohibition.3.t:0 "Dåligt för affärerna"
 prohibition.3.d:0 "Medlemmar i[SCOPE.gsInterestGroup('industrialists_ig').GetName]  har uttryckt missnöje med den senaste tidens nykterhetsrörelse och klagat på att spritindustrin utgör en viktig del av deras inkomster."
 prohibition.3.f:0 "”Vad ska jag göra nu då? Sälja leksaker? Ska jag åka och hälsa på mormor nu? Be henne lära mig att sticka så att jag kan göra små, söta tröjor till fina dockor? Herregud, vi är ju alla vuxna män här, eller hur?”"
 prohibition.3.a:0 "Då[SCOPE.sCharacter('industrialist_leader').GetSheHe]  borde man ringa[SCOPE.sCharacter('industrialist_leader').GetHerHis]  mormor omedelbart."
 prohibition.3.b:0 "De kan fortfarande använda vingårdarna."
 industrialists_rejected_modifier:0 "Industrimännens krav på sprit avvisades"
 wine_allowed_modifier:0 "Stöd till vinproduktion"
 prohibition.4.t:0 "Den absolut bästa djuraffären i stan"
 prohibition.4.d:0 "Det har kommit in rapporter om ovanliga ljud och misstänkt beteende i [SCOPE.sState('temperance_state').GetCityHubName]. En lokal djuraffär – som nyligen öppnat – har lockat många kunder."
 prohibition.4.f:0 "”Djurbutik, va? Tja, jag har bara en fråga. Vilken sorts djurbutik är full av stökiga typer och högljudd musik klockan 01.00?”"
 prohibition.4.a:0 "Det är nog bara de där högljudda Pet Shop Boys."
 prohibition.4.b:0 "Nåväl, då får vi väl se de där dokumenten från djuraffären."
 prohibition.4.c:0 "Vem tror de att de lurar!? Poliser!"
 prohibition.5.t:0 "Ölbaronerna"
 prohibition.5.d:0 "Medlemmar i[SCOPE.gsInterestGroup('alcoholic_ig').GetName]  har ertappats med att använda[SCOPE.sBuilding('temperance_building').GetName]  i[SCOPE.sState('temperance_state').GetName]  för att tillverka ett överskott av alkoholhaltiga drycker som de olagligt har sålt för egen vinning."
 prohibition.5.f:0 "”Det var potatisen! Vad ska vi annars göra med den? En potatispuré? Om det ligger i dess natur att producera alkohol, hur ska vi då kunna förhindra det?”"
 prohibition.5.a:0 "Detta bör omedelbart tas bort."
 prohibition.5.b:0 "Det är ju bara en gård."
 subsistence_liquor_modifier:0 "Alkohol på gården tillåtet"
 subsistence_liquor_bad_modifier:0 "Förbud mot alkohol på gårdar"
 banned_subsistence_liquor:0 "Förbud mot alkohol på gårdar"
 prohibition.6.t:0 "Alkoholavhållsamhet"
 prohibition.6.d:0 "Medlemmar i[SCOPE.gsInterestGroup('devout_ig').GetName]  har förklarat att det är meningslöst att förbjuda sprit om folk fortfarande kan få tag på vin."
 prohibition.6.f:0 "”Om en man vill dricka sig full och förvandlas till ett monster till människa, så står det honom fortfarande fritt att göra det! Det är meningslöst att låtsas att de inte fortfarande finns där ute och dricker vin och festar som om ingenting vore på gång!”"
 prohibition.6.a:0 "De har faktiskt en poäng."
 prohibition.6.b:0 "Det finns gränser för hur mycket våra medarbetare kan hantera."
 teetoliarism_modifier:0 "Stöd för totalavhållsamhet"
 no_teetoliarism_modifier:0 "Avvisad nykterhet"
 prohibition.7.t:0 "Ett massmord i dagsljus"
 prohibition.7.d:0 "Medlemmar i två rivaliserande gäng har mördats mitt på ljusa dagen under ett bråk med anknytning till alkohol. En av deras ledare har nu identifierats och medborgarna kräver skydd."
 prohibition.7.f:0 "”Men han är ju en sån trevlig kille! Han har alltid varit väldigt välgörande, trots all spritsmuggling och de där skumma affärerna. Han skänker pengar till de fattiga och öppnar soppkök för dem som behöver hjälp. En modern Robin Hood, det kan jag lova!”"
 prohibition.7.a:0 "Det här är över. Vi stämmer honom."
 prohibition.7.b:0 "Vissa hatar honom. Andra älskar honom. Här finns det en överenskommelse att nå."
 prohibition.7.c:0 "Vi ska ge honom och hans gäng en läxa."
 deal_with_gangster_modifier:0 "Ta itu med gangstern"
 gangsters_modifier:0 "Stämde Gangster inför domstol"
 prohibition.8.t:0 "Blåbandsmärket"
 prohibition.8.d:0 "Efter regeringens åtgärder för att förbjuda alkoholhaltiga drycker [ROOT.GetCountry.GetName]är området nu fritt från alkohol."
 prohibition.8.f:0 "”Säg till Israels barn och be dem att de skall göra fransar på sina kläders kanter, i alla kommande generationer, och att de skall fästa ett blått band på fransarna vid kanterna. Det skall vara en frans för er, så att ni kan se på den och minnas alla Herrens bud och hålla dem.”"
 prohibition.8.a:0 "Äntligen är vårt folk befriat från ondskan."
 prohibition_laws_pm.tt:0 "Detta kommer att påtagligt påskynda framstegen i uppgiften ”Temperance Movement Journal Entry”."
 prohibition_laws_weak_pm.tt:0 "Detta kommer att öka framstegen i journalposten för nykterhetsrörelsen."
 prohibition_laws_bad_pm.tt:0 "Detta kommer att minska framstegen i journalposten för nykterhetsrörelsen."
 expedition_events.695.t:0 "En oväntad grupp"
 expedition_events.695.d:0 "Allteftersom expeditionen fortskrider avslöjar den frodiga djungeln en oväntad syn: medlemmarna i den försvunna[SCOPE.sCountry('lost_expedition_country').GetAdjectiveNoFormatting]expeditionen ligger sjukliga i provisoriska hängmattor."
 expedition_events.695.f:0 "\”Det var som om en slöja hade rivits bort. Jag såg i det elfenbensvita ansiktet ett uttryck av dyster stolthet, av hänsynslös makt, av feg skräck – av en intensiv och hopplös förtvivlan.\n\nLevde han om sitt liv i varje detalj av begär, frestelse och kapitulation under det där översta ögonblicket av fullständig insikt? Han ropade med en viskning inför någon bild, inför någon syn – han ropade två gånger, ett rop som inte var mer än ett andetag: \"Fasan! Fasan!\"\""
 expedition_events.695.a:0 "Vi ska leda dessa män till en säker tillflyktsort."
 expedition_events.695.b:0 "Häng med! Två expeditioner är bättre än en."
 expedition_events.695.c:0 "Det skulle bara fördröja oss."
 expedition_events.695.e:0 "Vi skulle aldrig kunna lita på[SCOPE.sCountry('lost_expedition_country').GetAdjectiveNoFormatting] en grupp män. Slipa era knivar."
 killed_lost_expedition_tt:0 "Denna åtgärd kan få konsekvenser."
 expedition_events.696.t:0 "Ryktet spred sig"
 expedition_events.696.d:0 "Kort efter deras triumferande återkomst har expeditionen under ledning av[SCOPE.sCharacter('expedition_leader').GetFullName]  kritiserats av[SCOPE.sCountry('lost_expedition_country').GetNameNoFormatting]  i takt med att ryktena om deras inblandning i den försvunna expeditionens öde tar fart."
 expedition_events.696.f:0 "\”Bronsfärgade fläckar på deras kläder, märken som slitits bort av solen, oxiderade. Deras ansikten förvridna i en barnslig grimas – nu ler de, nu skrattar de, nu… ångrar de sig. Kanske. Blodet har varit torkat i veckor, kanske till och med månader. Hatade de det? Var de stolta över sina handlingar? Kunde de någonsin komma undan? Glömma det? Avsky det? Det har varit torkat i veckor, kanske till och med månader.”"
 expedition_events.696.a:0 "[SCOPE.sCharacter('expedition_leader_cruel').GetSheHe|U] ska avgå omedelbart!"
 expedition_events.696.b:0 "De har ingen möjlighet att bevisa det."
 expedition_leader_cruel_fired_tt:0 "[SCOPE.sCharacter('expedition_leader').GetFullName] kommer att avgå."
 je_assassination:0 "Förhindra mordkomplotten"
 je_assassination_reason:0 "Ta reda på vilka konspiratörerna är och förhindra mordet innan det är för sent. \n\nHöj nivån på din#bold  polisorganisation#!, anta lagarna om#bold  förbjuden opposition#!,#bold  engagerad polis#! eller#bold  hemlig polis#!, och bedriv#bold forskning$identification_documents$#! inom  eller#bold  $mass_surveillance$#!för att öka dina chanser att sätta käppar i hjulet för förrädarna."
 je_assassination_low:0 "Framstegen i arbetet med att identifiera de som planerade mordet är begränsade."
 je_assassination_middle:0 "Det har skett vissa framsteg när det gäller att identifiera de som planerade mordet."
 je_assassination_high:0 "Vi är nästan säkra på vilka som ligger bakom mordkomplotten."
 je_assassination_tt:0 "Den hotade härskaren sitter inte längre vid makten."
 je_assassination_timeout_tt:0 "Konspiratörerna lyckas mörda vår härskare."
 je_assassination_caught_em_tt:0 "Vi får reda på vilka konspiratörerna är."
 assassination_events.1.t:0 "De osynliga männen"
 assassination_events.1.d:0 "Trovärdiga källor rapporterar om en intern komplott för att ta livet av [SCOPE.sCharacter('assassination_ruler_scope').GetFullNameWithTitle]. Om vi inte agerar i tid kommer landets stabilitet inte att kunna garanteras."
 assassination_events.1.f:0 "Kanske är det deras tonfall, kanske den oundvikliga ångest som följer med makten. En mörk, söt vänlighet som är så falsk att den får till och med förrädare att frukta en sista måltid. \n\n”Folk pratar, och vissa av dem önskar att[SCOPE.sCharacter('assassination_ruler_scope').GetFullNameNoFormatting]de inte skulle behöva prata mer.” \n\nTrettio silvermynt, ett symboliskt pris. Idag, kanske imorgon – om vi har tur."
 assassination_events.1.a:0 "Vi ska hitta dem och hänga dem!"
 advance_assassination_progress_tt:0 "Detta kommer att påskynda våra framsteg när det gäller att ta reda på vem som smider ränker mot vår härskare."
 assassination_events.2.t:0 "De osynliga männen: En tom plats"
 assassination_events.2.d:0 "[SCOPE.gsInterestGroup('suspicious_ig').GetName]Ett hemligt möte som anordnats av medlemmar i  har upptäckts. Även om de hävdar att syftet var rent ekonomiskt, är det många som misstänker att de har kopplingar till de som planerade mordet."
 assassination_events.2.f:0 "Rösterna hörs anmärkningsvärt tydligt ute på gatan, med tanke på deras avsikter. Ljudet av glas hörs dock bara inifrån. Deras ansikten blir otydliga när de speglas i vinet. \n\n”De har varit där hela dagen”, säger en blomsterhandlare och pekar föraktfullt med sina förhårdnade händer. ”Jag såg dem komma när jag öppnade butiken, de gick inte ens ut för att äta lunch.”"
 assassination_events.2.a:0 "Det ser helt enkelt ut som en fest."
 assassination_events.2.b:0 "Det är verkligen ganska misstänkt."
 assassination_events.2.c:0 "Det har sagts värre saker om [SCOPE.gsInterestGroup('second_suspicious_ig').GetName]."
 assassination_ig_not_monitored_modifier:0 "Inte övervakad intressegrupp"
 assassination_events.3.t:0 "De osynliga männen: Ett insidertips"
 assassination_events.3.d:0 "[SCOPE.gsInterestGroup('snitch_ig').GetName][SCOPE.sCharacter('snitch_leader').GetFullName], ledare för , har kommit till oss med en alarmerande varning.[SCOPE.sCharacter('snitch_leader').GetSheHe|U]  anklagar  för att[SCOPE.gsInterestGroup('snitched_ig').GetName] vara de som planerar mordet på [SCOPE.sCharacter('assassination_ruler_scope').GetFullName]."
 assassination_events.3.f:0 "[SCOPE.sCharacter('snitch_leader').GetWomanMan]”Du vet ju att jag är en ärlig person; jag skulle aldrig försöka gå emot en jämlike, en gentleman eller en sann dam. Men det här är inga ädla människor. De livnär sig på avund och svek, de kan inte ens hålla tungan i munnen eftersom de är genomruttna.”"
 assassination_events.3.a:0 "Det här är egentligen ingen överraskning."
 assassination_events.3.b:0 "Kan vi verkligen lita på en rival?"
 assassination_events.3.c:0 "Intressant... eftersom vi också har hört rykten om [SCOPE.sCharacter('snitch_leader').GetHerHim]."
 suspicious_modifier:0 "Misstänkt intressegrupp"
 snitch_modifier:0 "Tjallare"
 assassination_events.4.t:0 "De osynliga männen: Anklagelser"
 assassination_events.4.d:0 "Samhällets mest framstående medlemmar tillbringar nu sina dagar med att anklaga varandra för att vara inblandade i mordkomplotten, och den här gången är allas blickar riktade mot [SCOPE.gsInterestGroup('suspicious_ig').GetName]."
 assassination_events.4.f:0 "”Kära dagbok, idag var det en så härlig dag. Jag följde med mamma på middag och vi besökte några av hennes vänner från landet, som har kommit till stan för säsongen. \n\nAck, de pratade alla om det där meningslösa mordet och sa att den och den herrn hade setts tillsammans med den och den andra. Tack[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]och lov blev den lille Pincher ganska förtjust i mig och vi tillbringade större delen av kvällen med att leka i salongen! Vilken underbar ung man!”"
 assassination_events.4.a:0 "Det låter tillräckligt misstänkt."
 assassination_events.4.b:0 "#italic Vem#! är det egentligen som säger det här?"
 assassination_events.4.c:0 "Om informationen spreds så lätt, har vi allvarligare problem."
 assassination_events.6.t:0 "Mord – eller inte"
 assassination_events.6.d:0 "Komplotten att mörda honom har fått ett oväntat slut. Eftersom[SCOPE.sCharacter('assassination_ruler_scope').GetFullName] han inte längre är landets ledare har deras försök helt stoppats."
 assassination_events.6.f:0 "”Ibland vinner man, ibland förlorar man. Ibland måste man förlora för att kunna vinna.”"
 assassination_events.6.a:0 "Nåja, åtminstone blev det inget mord."
 deposed_ruler_modifier:0 "Avsatt härskare"
 assassination_events.7.t:0 "Mordförsök avvärjt"
 assassination_events.7.d:0 "De[SCOPE.gsInterestGroup('suspicious_ig').GetName] förrädiska avsikterna hos  har äntligen avslöjats. Myndighetsrepresentanter har hittat tillräckligt med bevis för att förhindra mordkomplotten."
 assassination_events.7.f:0 "[SCOPE.sCharacter('assassination_ruler_scope').GetFullNameNoFormatting] får[SCOPE.sCharacter('assassination_ruler_scope').GetHerHis]frukost klockan 8.00 måndag till fredag och klockan 8.30 på helgerna. Efter lunchen  tycker  om att ta en promenad i trädgården,[SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] sällan  i[SCOPE.sCharacter('assassination_ruler_scope').GetSheHe]sällskap. Därefter\n\n följer en lista med namn på alla de män som[SCOPE.sCharacter('assassination_ruler_scope').GetSheHe]  bjuder in för att spela kort med.[SCOPE.sCharacter('assassination_ruler_scope').GetHerHis|U]  Kocken, tjänsteflickorna, ett par statstjänstemän."
 assassination_events.7.a:0 "En dag att vara stolt över!"
 assassination_caught_em_modifier:0 "Förhindrat mordförsök"
 assassination_events.8.t:0 "Mord – eller inte?"
 assassination_events.8.d:0 "Komplotten att mörda personen har fått ett oväntat slut. Eftersom[SCOPE.sCharacter('assassination_ruler_scope').GetFullName] [personen] har avlidit av andra orsaker har deras försök avbrutits."
 assassination_events.8.f:0 "Och så är det alltid: efter döden följer en återuppståndelse. Ur den nuvarande stundens lidande växer glädjen fram. Och låt oss hoppas att nationen aldrig mer ska behöva uppleva döden!"
 assassination_events.8.a:0 "Må[SCOPE.sCharacter('assassination_ruler_scope').GetSheHe] han vila i frid."
 assassination_dead_ruler_modifier:0 "Den döde härskaren"
 election_other_parties_events.1.t:0 "Människan framför maskinen"
 election_other_parties_events.1.d:0 "[SCOPE.sParty('agrarian_party').GetName]Medlemmarna i  har uttryckt sin oro över att tekniken ska ersätta det manuella arbetets självständighet och värdighet."
 election_other_parties_events.1.f:0 "”Skulle du anförtro dina barns utbildning åt en maskin? Eller din kropps hälsa? Varför ska vi då anförtro dem arbetet med vår mark? \n\nDen mat vi äter, gemenskapen, det hårda arbetet och samarbetet som jordbruket ger upphov till – det är grunden för vårt samhälle, och framsteg kan inte och får inte ersätta dem.”"
 election_other_parties_events.1.a:0 "Vi bör inte äventyra våra medarbetares arbete."
 election_other_parties_events.1.b:0 "Framsteg hittar alltid en väg."
 anti_industrial_party_modifier:0 "Människan framför maskinen"
 election_other_parties_events.2.t:0 "Guds vilja"
 election_other_parties_events.2.d:0 "[SCOPE.sCharacter('religious_leader').GetFullName], från [SCOPE.gsInterestGroup('ig_devout').GetName], har setts predika till förmån för [SCOPE.sParty('religious_party').GetName], övertygad om att deras seger har förutsetts i [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]s planer."
 election_other_parties_events.2.f:0 "”Tror ni att[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]han inte skulle ha en plan för vår fromma nation? Självklart finns det en plan! Det måste alltid finnas en plan! Jag har själv sett den, det kan jag säga er, och jag har sett den lika tydligt som jag ser er alla just nu, rakt framför mina ögon. \n\nOch vem annan än de som tydligt kan läsa den planen ska leda denna vilsna regering?”"
 election_other_parties_events.2.a:0 "Och vem är vi att sätta oss emot [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]hans vilja?"
 election_other_parties_events.2.b:0 "Det är verkligen synd att landet inte styrs av [SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]… då."
 election_other_parties_events.2.c:0 "Men[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]  vill ju verkligen att[SCOPE.sParty('other_party').GetName]  ska vinna!"
 gods_will_modifier:0 "Guds vilja"
 gods_wont_modifier:0 "Avvisat tal"
 custom_god:0 "Gud"
 custom_the_lord:0 "Herren"
 custom_allah:0 "Allah"
 custom_gods:0 "Gudar"
 election_other_parties_events.3.t:0 "Den naturliga lösningen"
 election_other_parties_events.3.d:0 "Medlemmarna i[SCOPE.sParty('military_party').GetName]  har högljutt hävdat att det enda sättet att leda oss ut ur  kriget[SCOPE.sWar('ongoing_war').GetName] är att överlåta ledningen av vårt land till deras kompetenta händer."
 election_other_parties_events.3.f:0 "”I desperata tider krävs desperata åtgärder. Inte för att vi skulle vara en desperat åtgärd, förstås, men så lyder ju talesättet – språkvetenskapens naturliga ordning. Var och en efter sin smak, ordo naturalis, vi måste följa dessa regler. Och vad kan vara mer naturligt än att låta[SCOPE.sParty('military_party').GetNameNoFormatting]  leda oss genom kriget?”"
 election_other_parties_events.3.a:0 "De är verkligen våra mest kompetenta medarbetare."
 election_other_parties_events.3.b:0 "Militärpopulism? I mitt krig?"
 supported_war_politics_modifier:0 "Krigspolitik"
 supported_war_leaders_modifier:0 "Militära ledare som fått stöd"
 election_other_parties_events.4.t:0 "Den gyllene medelvägen"
 election_other_parties_events.4.d:0 "[SCOPE.sParty('social_democrat_party').GetName]Medlemmar i  har uppmärksammat uppgången för [SCOPE.sParty('leftist_party').GetName], och uttryckt sin vilja att erbjuda en mer moderat lösning som motvikt till deras politiska extremism."
 election_other_parties_events.4.f:0 "[SCOPE.sParty('leftist_party').GetNameNoFormatting]”Har du hört talas om den där farliga organisationen? Jag har hört att deras medlemmar träffas på natten, planerar sin nästa terroristattack och äter spädbarn! Spädbarn!”"
 election_other_parties_events.4.a:0 "Och tack[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')] och lov att de gör det."
 election_other_parties_events.4.b:0 "Det låter kanske lite långsökt, men det[SCOPE.sParty('social_democrat_party').GetName]är ändå det förnuftigaste alternativet."
 election_other_parties_events.5.t:0 "En radikal utvidgning"
 election_other_parties_events.5.d:0 "[SCOPE.sParty('radical_party').GetName]Idéerna från  har väckt intresse över hela landet, vilket har lett till risk för oroligheter."
 election_other_parties_events.5.f:0 "”De som säger sig vara för frihet men ändå förringar kampen är människor som vill ha skörd utan att plöja jorden; de vill ha regn utan åska och blixtar; de vill ha havet utan dess vågors dån.”"
 election_other_parties_events.5.a:0 "Och de borde expandera ännu mer."
 election_other_parties_events.5.b:0 "De äventyrar enigheten inom [ROOT.GetCountry.GetNameNoFormatting]!"
 election_other_parties_events.5.c:0 "Någon borde övertyga dem om att sluta."
 stopped_radicals_modifier:0 "Tog ställning mot radikalismen"
 je_belle_epoque:0 "Belle Époque"
 je_belle_epoque_reason:0 "Nu när vi har uppnått en så stor konstnärlig och samhällelig utveckling är det dags för oss att koppla av och njuta av våra framgångar."
 belle_epoque_sol_trigger:0 "Mer än 50 % av våra $concept_incorporated_state$kunder har en ålder$concept_sol$över #BOLD15 år#!."
 belle_epoque_events.1.t:0 "Eiffeltornet"
 belle_epoque_events.1.d:0 "I samband med uppförandet av Eiffeltornet är den parisiska allmänheten splittrad. Medan vissa hävdar att byggnaden kommer att bli stadens mest berömda landmärke, kallar andra den för ”det gigantiska radiotornet”."
 belle_epoque_events.1.f:0 "”Vi, författare, målare, skulptörer, arkitekter och passionerade beundrare av Paris hittills orörda skönhet, protesterar med all vår kraft och med all vår indignation, i den kränkta franska smakens namn, mot uppförandet av detta meningslösa och monstruösa Eiffeltorn.”"
 belle_epoque_events.1.a:0 "De har fel! Den här byggnaden är själva Paris!"
 belle_epoque_events.1.b:0 "Nu när de säger det..."
 belle_epoque_events.1.c:0 "Den kommer ändå att rivas om mindre än tio år."
 Alexandre_Gustave:0 "Alexandre Gustave"
 Eiffel:0 "Eiffel"
 eiffel_tower_modifier:0 "Invigningen av Eiffeltornet"
 gustave_eiffel_modifier:0 "Stödde Eiffel Architect"
 gustave_eiffel_sad_modifier:0 "Kritik mot byggandet av Eiffeltornet"
 eiffel_tower_intelligentsia_modifier:0 "Kritik mot Eiffels arkitektur"
 eiffel_tower_slander_modifier:0 "Förtal mot Eiffeltornet"
 gustave_eiffel_angry_modifier:0 "Visade brist på respekt mot Eiffeltornets arkitekt"
 belle_epoque_events.2.t:0 "Art Nouveau"
 belle_epoque_events.2.d:0 "Spridningen av en ny konstnärlig stil, inspirerad av naturen, som genom kraftfullt järn och glas efterliknar växternas böljande kurvor för att förmedla framstegets motsägelser, har nått [SCOPE.sState('belle_epoque_state').GetCityHubName]de högre sfärerna."
 belle_epoque_events.2.f:0 "”Tja, du vet, jag målade bara vidare. Jag fortsatte – utan förlagor eller skisser, det växte fram medan jag målade. Och mot slutet nådde jag en sådan perfektion – där jag lade varje penseldrag med sådan frihet – att när jag kom tillbaka till hörnet där jag började, ja, då var jag tvungen att måla om en del av det, eftersom skillnaden annars skulle ha blivit för påtaglig. Och när harmonin mellan blått och guld utvecklades, förstår du, glömde jag allt i min glädje över det.”"
 belle_epoque_events.2.a:0 "Den här nya stilen är verkligen fascinerande."
 belle_epoque_events.2.b:0 "Och de säger att de målar utan förlaga. Ja, det märks verkligen."
 art_nouveau_strike_modifier:0 "Art Nouveau-strejk"
 art_nouveau_love_modifier:0 "Fascinationen för jugendstilen"
 belle_epoque_events.3.t:0 "Symbolernas skog"
 belle_epoque_events.3.d:0 "Efter symboliströrelsens framgångsrika utgivningar har han beslutat sig för att följa sin egen väg och ge sig ut på en egen[SCOPE.sCharacter('symbolist_leader').GetHerHis] litterär resa,[SCOPE.sCharacter('symbolist_leader').GetFullName] vilket väcker oro hos [SCOPE.gsInterestGroup('symbolist_ig').GetName]."
 belle_epoque_events.3.f:0 "”Och ändå\n, framför vin och till och med opium, \nföredrar jag elixiret från dina läppar, där kärleken visar upp sig; \noch i begärets ödemark utgör dina\n ögon källorna som stillar min törst.”"
 belle_epoque_events.3.a:0 "De förtjänar att ha ett privatliv."
 belle_epoque_events.3.b:0 "Det här är helt otroligt! En poet som är politiker!"
 belle_epoque_events.3.c:0 "[SCOPE.sCharacter('symbolist_leader').GetSheHe|U] kommer att tvingas avgå."
 symbolist_leader_modifier:0 "Symbolismens ledare"
 symbolist_ig_bad_modifier:0 "Farhågor hos symbolismens ledare"
 symbolist_leader_bad_modifier:0 "Symbolistledaren med dåligt rykte"
 symbolist_ig_good_modifier:0 "Symbolistledare tillrättavisad"
 belle_epoque_events.4.t:0 "Moulin Rouge"
 belle_epoque_events.4.t2:0 "Rök och kabaré"
 belle_epoque_events.4.d:0 "Öppnandet av en lyxig kabaré vid foten av Montmartre-kullen har gjort nattlivet i Paris betydligt livligare. Detta har naturligtvis väckt både uppmärksamhet och misstankar hos de konservativa."
 belle_epoque_events.4.f:0 "Kvinnan suckar under hela redogörelsen i ett rökfyllt rum. Rökelse och cigaretter går inte att skilja åt – detsamma gäller ångan, även om det är omöjligt att veta varifrån den kommer. Musiken är dämpad här, tjock som sirap. \n\n”Tack för sällskapet under dessa kalla nätter”, säger hon med mjuk röst och kastar dokumentet i elden, ”vi behövde verkligen lite extra bränsle.”"
 belle_epoque_events.4.a:0 "Det stället har verkligen allt!"
 belle_epoque_events.4.b:0 "Denna omoraliska verksamhet ska stängas omedelbart."
 cabaret_modifier:0 "Premiär på Cabaret"
 cabaret_good_modifier:0 "Förbud mot kabaré"
 cabaret_building_modifier:0 "Stödde kabaréen"
 shut_down_cabaret_modifier:0 "Kostnader för bekämpning av kabaréverksamhet"
 belle_epoque_events.5.t:0 "Pasteurs rabiesvaccin"
 belle_epoque_events.5.t2:0 "Rabiesvaccinet"
 belle_epoque_events.5.d:0 "Louis Pasteur, en forskare känd för sina studier av sjukdomar hos silkesmaskar, sterilisering och smittspridning, har avslutat kliniska prövningar på människor av ett rabiesvaccin som framställts av torkad infekterad nervvävnad från kaniner."
 belle_epoque_events.5.d2:0 "För första gången har ett[ROOT.GetCountry.GetAdjective]laboratorium avslutat kliniska prövningar på människor av ett användbart rabiesvaccin som framställts av torkad infekterad nervvävnad från kaniner."
 belle_epoque_events.5.f:0 "”Barnets död verkade oundviklig. Jag beslöt mig – inte utan en intensiv och plågsam ångest, som man kan föreställa sig – för att tillämpa den metod på Joseph Meister som jag hade funnit vara genomgående framgångsrik på hundar.”"
 belle_epoque_events.5.f2:0 "För att säkerställa ett framgångsrikt resultat ska en daglig vaccinering genomföras under en period på fjorton till tjugoen dagar, mot slutet av arbetsperioden, med start så snart som möjligt efter exponering för det drabbade djuret."
 belle_epoque_events.5.a:0 "Mänskligheten vinner ännu en seger över pesten."
 modifier_rabies_vaccine:0 "Rabiesvaccinet"
 belle_epoque_events.6.t:0 "Lämnade Lumière-fabriken i [SCOPE.sState('lumiere_state').GetCityHubName]"
 belle_epoque_events.6.t2:0 "Filmografins framväxt"
 belle_epoque_events.6.d:0 "Louis och Auguste Lumière, uppfinnarna av Cinématographe, har släppt en 45 sekunder lång ”animerad fotografisk bild” som visar arbetarna på deras fabrik när[SCOPE.sState('lumiere_state').GetName]de lämnar sin arbetsplats."
 belle_epoque_events.6.d2:0 "En kortfilm som skildrar arbetare på en kamerafabrik i[SCOPE.sState('lumiere_state').GetCityHubName]  har väckt allmänhetens intresse för rörlig bildteknik. Publiken i[SCOPE.sState('belle_epoque_state').GetName]  har strömmat till för att se den här filmen och liknande filmer på både salonger och biografer."
 belle_epoque_events.6.f:0 "Publiken – bestående av både investerare och entreprenörer – följde fascinerat medan bilderna visades på skärmen. Ledningspersonalen lämnade salen först, följda av kvinnorna som arbetade på fabriken och därefter de vanliga arbetarna. De fyrtiofem sekunderna kändes betydligt längre när scenen bredde ut sig över tygduken, medan dammpartiklar i projektorns ljusstrålar svävade i luften i samma förväntan som publiken."
 belle_epoque_events.6.a:0 "1900-talet kommer att visas på film!"
 belle_epoque_events.6.b:0 "Filmen har ingen kommersiell framtid."
 modifier_film_industry_bonus:0 "Filmkonstens framväxt"
 modifier_trad_arts_bonus:0 "Traditionell konst som får stöd"
 belle_epoque_events.7.t:0 "Cinéorama"
 belle_epoque_events.7.d:0 "Uppfinnaren Raoul Grimoin-Sanson har utvecklat en apparat som kallas ”photoachygraphe”, en apparat som projicerar rörliga bilder på flera ytor samtidigt. Med hjälp av denna apparat har han lyckats skapa en simulerad luftballongattraktion med hjälp av filmbilder av Paris sett uppifrån, med titeln Cinéorama."
 belle_epoque_events.7.f:0 "Affischen fladdrade när en lätt bris svepte över den, vilket ytterligare rubbade de delvis lossnade fästnålarna som höll den på plats. Framför den reste sig den stora kupolen som hade byggts för evenemanget, omgiven av en enorm folkmassa. \n\n”La Grande Attraction Nouvellae: Ballon Cinéorama! Animerade panoramaprojektioner av GRIMOIN-SANSON!”"
 belle_epoque_events.7.a:0 "Fotoachygrapen har oändliga möjligheter!"
 belle_epoque_events.7.b:0 "Kanske en gränslös potential, men också en gränslös brandrisk."
 modifier_cineorama_nice:0 "Cinéorama-attraktioner"
 modifier_cineorama_fire:0 "Branden på Cinéorama"
 belle_epoque_events.8.t:0 "Peugeot Serpollet"
 belle_epoque_events.8.t2:0 "Steam Omnibus"
 belle_epoque_events.8.d:0 "Företaget Peugeot har i samarbete med ingenjören Léon Serpollet tagit fram en experimentell trehjulig ångcykel baserad på Serpollets ”snabbånggenerator”. Trots att den aldrig har lanserats på marknaden har anordningen blivit en symbol för innovation inom [ROOT.GetCountry.GetName]."
 belle_epoque_events.8.d2:0 "I takt med att myndigheternas bestämmelser om motordrivna fordon har blivit mindre strikta och allt effektivare ångmaskiner har utvecklats har ångdrivna transportbussar börjat trafikera[SCOPE.sState('belle_epoque_state').GetName]vägarna allt oftare."
 belle_epoque_events.8.f:0 "”Fördelarna? En snabb uppstart, låg vikt, liten storlek, låg vattenförbrukning… och en minimal explosionsrisk, förstås.”"
 belle_epoque_events.8.f2:0 "[SCOPE.sState('belle_epoque_state').GetFarmHubName]”Bussarna drivs med ånga och – vilket är viktigt i en stad av den här typen – är helt fria från lukt, buller och vibrationer.”"
 belle_epoque_events.8.a:0 "Dessa maskiner kommer att driva på tillväxten i våra städer."
 belle_epoque_events.8.b:0 "En beskattning av motorfordon kommer att ge nödvändiga intäkter."
 modifier_steam_car:0 "Ångvagnar"
 belle_epoque_events.9.t:0 "Paris–Rouen"
 belle_epoque_events.9.d:0 "Utvecklingen av fordon som drivs av förbränningsmotorer har inspirerat olika[ROOT.GetCountry.GetAdjective]biltillverkare att anordna en utställning i form av tävlingen ”Paris-Rouen Horseless Carriages Contest”."
 belle_epoque_events.9.f:0 "Fordonen stod uppställda i grupper om fem, alla med olika utseende, och drevs av bensin och ånga. \n\nNär flaggan viftades avgav deras motorer en kakofoni av skramlande och väsande ljud medan de rullade iväg längs gatan, i en fart som vida översteg den hos åskådarna till fots. Det dröjde inte länge förrän banan svängde bort från startlinjen och jubel ersatte motorljudet."
 belle_epoque_events.9.a:0 "Och nu är de iväg!"
 belle_epoque_events.9.b:0 "Vilken hemsk uppvisning!"
 modifier_paris_rouen:0 "Utställningen ”Paris–Rouen”"
 modifier_noise_complaints:0 "Klagomål om buller"
 belle_epoque_events.10.t:0 "De nyrika"
 belle_epoque_events.10.t2:0 "Nya pengar"
 belle_epoque_events.10.d:0 "Samhällets[ROOT.GetCountry.GetAdjective] välstånd har gett upphov till en ny generation av förmögna entreprenörer. Den mest trendiga tillflyktsorten för dessa ”nyrika” är Maxim’s, en exklusiv restaurang inredd i jugendstil, som vänder sig till de mest förmögna och trendiga invånarna i [SCOPE.sState('belle_epoque_state').GetCityHubName]."
 belle_epoque_events.10.d2:0 "De[ROOT.GetCountry.GetAdjective]samhällsmedlemmar som har blivit förmögna tack vare den senaste tidens tekniska framsteg har börjat skapa sina egna trender och deltar i allt mer extravaganta evenemang inom högsocieteten samt besöker exklusiva restauranger inredda i jugendstil."
 belle_epoque_events.10.f:0 "”Det var en sammansättning av sammet, spets, band, diamanter och allt möjligt annat som jag inte kunde beskriva. Att klä av en av dessa kvinnor är som en utflykt som kräver tre veckors förvarning – det är som att flytta.”"
 belle_epoque_events.10.f2:0 "”Hon har en avslöjande röst”, konstaterade jag. ”Den är full av…” Jag tvekade. \n\n”Hennes röst är full av pengar”, sa han plötsligt. \n\nDet var just det. Jag hade aldrig förstått det förut. Den var full av pengar – det var den outtömliga charmen som steg och sjönk i den, dess klirrande ljud, cymbalernas sång i den. \n\n— F. Scott Fitzgerald,#italic  Den store Gatsby#!"
 belle_epoque_events.10.a:0 "Ett ställe man kan ta med damer till – men aldrig sin egen fru."
 belle_epoque_events.10.b:0 "En ny värld; materiell utan att vara verklig."
 modifier_noveaux_riches:0 "Nya rikedomar"
 belle_epoque_events.11.t:0 "Rullskridskopalatset[SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.11.t2:0 "Dans på hjul"
 belle_epoque_events.11.d:0 "Ett rullskridskopalats har öppnat i ett trendigt område i [SCOPE.sState('belle_epoque_state').GetCityHubName], och har blivit oerhört populärt så fort det presenterades för allmänheten."
 belle_epoque_events.11.d2:0 "En rullskridskobana har öppnat i [SCOPE.sState('belle_epoque_state').GetCityHubName], vilket erbjuder en ny och spännande form av nöje för stadsbefolkningen."
 belle_epoque_events.11.f:0 "Medan de som hade turen att komma tidigt inne i byggnaden skrattade medan de snurrade runt på trägolvet, drabbade de som kommit sent utanför samman med polisen när de högljutt krävde att få sin tur."
 belle_epoque_events.11.f2:0 "”En modefluga? Ja, självklart är det det. Var annars skulle man kunna se en miljonär klädd i diamanter och siden ramla på rumpan, skratta som en galning och sedan göra om det hela igen?”"
 belle_epoque_events.11.a:0 "En gnutta välbehövlig fantasi."
 belle_epoque_events.11.b:0 "Ett enkelt sätt att glömma sina inre demoner."
 modifier_roller_skating_sol:0 "Dans på hjul"
 belle_epoque_events.12.t:0 "[SCOPE.sState('belle_epoque_state').GetCityHubName]Metron"
 belle_epoque_events.12.t2:0 "[SCOPE.sState('belle_epoque_state').GetCityHubName]Metro"
 belle_epoque_events.12.d:0 "Ett nätverk av tunnelbanestationer, med ingångar designade av Hector Guimard i jugendstil, har invigts i [SCOPE.sState('belle_epoque_state').GetCityHubName]. De slingrande formerna på tunnelbanestationernas ingångar, med sina röda lampor och utsmyckade bokstäver, har snabbt blivit en symbol för [SCOPE.sState('belle_epoque_state').GetCityHubName]."
 belle_epoque_events.12.d2:0 "Ett nytt nätverk av tunnelbanestationer har invigts i [SCOPE.sState('belle_epoque_state').GetCityHubName], vilket ger pendlare en ikonisk och prisvärd transportmöjlighet inom stadens gränser."
 belle_epoque_events.12.f:0 "”Dessa gudomliga ingångar till tunnelbanan, tack vare vilka man kan stiga ner i det undermedvetna hos morgondagens levande och monarkiska estetik.” –\n\n Salvador Dalí"
 belle_epoque_events.12.f2:0 "Gatorna var så mycket mer civiliserade nuförtiden, tänkte han medan han var på väg mot tunnelbanestationen. Tidigare hade de översvämmats av den trista strömmen av människomassor som släpade sig fram till och från arbetet, men nu hade dessa fula hjordar drivits ner under jorden, pressats in i sina tunnelbanevagnar och rusade genom tunnlarna. \n\nOch vad var framsteg, om inte att susa fram genom mörkret?"
 belle_epoque_events.12.a:0 "Ytterligare ett steg mot morgondagens stad."
 belle_epoque_events.12.b:0 "En ny symbol för vårt lands framsteg."
 modifier_metro_prestige:0 "Ett prestigefyllt tunnelbanesystem"
 modifier_metro_productivity:0 "Ett effektivt tunnelbanesystem"
 belle_epoque_events.13.t:0 "Kolonialutställningen i [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.13.d:0 "En utställning som visar rikedomarna i våra kolonier runt om i världen har hållits i [SCOPE.sState('belle_epoque_state').GetName], och lockat besökare med utställningar av exotiska djur, naturresurser och etnologiska utställningar om[SCOPE.sCulture('colonial_culture').GetName]olika folk i en efterbildad inhemsk by."
 belle_epoque_events.13.f:0 "Utställningens affisch var i en skrikande röd färg, hade titeln ”L’EXPOSITION ORIENTALE” och var prydd med karikatyrer av imperiets folk.\n\nBarbröstade kvinnor från Västafrika, beväpnade med sköldar och klubbor och med ilskna miner, flankerade algerier i dräkter som bar ananaser, samt näpna vietnamesiska flickor med läppstift som balanserade krukor på huvudet. \n\nEtt barn som höll sig fast vid armen på sin i siden klädda mor tittade från affischen till henne, med hopp i blicken. \"...det kostar bara en halv franc!\""
 belle_epoque_events.13.f2:0 "”Vi anser att vår ras redan är tillräckligt förnedrad utan att någon av oss behöver ställas ut tillsammans med aporna. Vi anser att vi är värda att betraktas som människor, med själar.” \n\n– James H. Gordon"
 belle_epoque_events.13.a:0 "Häpnadsväckande och lärorikt!"
 belle_epoque_events.13.b:0 "Kanske är dessa mänskliga uppvisningar överdrivna."
 modifier_condemned_human_zoos:0 "Fördömda ”mänskliga djurparker”"
 modifier_condemned_human_zoos_negative:0 "Fördömda ”mänskliga djurparker”"
 belle_epoque_events.14.t:0 "Haute Couture"
 belle_epoque_events.14.t2:0 "Passionen för mode"
 belle_epoque_events.14.d:0 "Fascinerade av de populära bilderna på perfekta sidenklänningar och trendiga smycken, skapade av de parisiska hantverkarna,[ROOT.GetCountry.GetAdjective] har kvinnor börjat resa till Paris[SCOPE.sCountry('haute_couture_country').GetName]för att köpa exklusiva kläder i de parisiska butikerna."
 belle_epoque_events.14.d2:0 "Fascinerade av de populära bilderna på perfekta sidenklänningar och trendiga smycken skapade av[SCOPE.sCountry('haute_couture_country').GetAdjective]designers har[ROOT.GetCountry.GetAdjective] kvinnor börjat ta steget över gränsen för att beställa exklusiva kläder."
 belle_epoque_events.14.f:0 "”Varför i hela världen skulle du begära så mycket pengar för ett enkelt klädesplagg? Vilken glädje skulle det kunna ge dig?” \n\n”Lika mycket som dina guldklockor och sablar, och kanske till och med mycket mer.”"
 belle_epoque_events.14.a:0 "Oavsett gränser hyllar våra båda nationer skönheten på lika villkor."
 belle_epoque_events.14.b:0 "De[SCOPE.sCountry('haute_couture_country').GetAdjective]får inte överträffa oss!"
 modifier_haute_couture_competition:0 "Haute Couture-tävling"
 belle_epoque_events.15.t:0 "Jakten på haute couture"
 belle_epoque_events.15.t2:0 "Högmodet"
 belle_epoque_events.15.d:0 "Fascinerade av de populära bilderna på perfekta sidenklänningar och trendiga smycken tillverkade av parisiska hantverkare har kvinnor från så långt bort som[SCOPE.sCountry('haute_couture_buyer_scope').GetName]  börjat resa till[SCOPE.sCountry('haute_couture_country').GetName]  för att köpa exklusiva kläder i parisiska butiker."
 belle_epoque_events.15.d2:0 "Fascinerade av de populära bilderna på perfekta sidenklänningar och trendiga smycken som tillverkas av våra hantverkare har kvinnor från så långt bort som[SCOPE.sCountry('haute_couture_buyer_scope').GetName]  börjat resa till[SCOPE.sCountry('haute_couture_country').GetName]  för att köpa våra designers kläder."
 belle_epoque_events.15.f:0 "Den här rutinen, som hade blivit vanlig de senaste dagarna, var en källa till stor munterhet för konduktörerna på stationen[SCOPE.sState('belle_epoque_state').GetCityHubName]. Kvinnor med oroliga blickar och välfyllda plånböcker anlände med tåg från[SCOPE.sCountry('haute_couture_buyer_scope').GetAdjectiveNoFormatting]olika stationer och reste vidare flera veckor senare i praktfulla klänningar och med plånböcker som var flera pund lättare. \n\nPå perrongerna blandades de båda grupperna, medan apatiska män vände bort blicken medan deras fruar berömde varandras goda omdöme och lovade att träffas igen."
 belle_epoque_events.15.a:0 "[ROOT.GetCountry.GetName] ska bli världens modehuvudstad."
 belle_epoque_events.15.b:0 "Det är formgivarna och arbetarna som gör sådana saker möjliga."
 modifier_prestigious_fashion_industry:0 "Den prestigefyllda modebranschen"
 modifier_recognised_fashion_industry:0 "Erkända yrkesutövare inom modebranschen"
 belle_epoque_events.16.t:0 "Parisiska pariserhjulet"
 belle_epoque_events.16.t2:0 "Sekelskiftet"
 belle_epoque_events.16.d:0 "[SCOPE.sState('belle_epoque_state').GetCityHubName]För att fira slutet av 1800-talet och början av 1900-talet har ett gigantiskt pariserhjul byggts i [SCOPE.sState('belle_epoque_state').GetCityHubName]. Från dess gondoler kan man se nyårsfyrverkerierna över hela den storslagna staden ."
 belle_epoque_events.16.d2:0 "[SCOPE.sState('belle_epoque_state').GetCityHubName]För att fira slutet av 1800-talet och början av 1900-talet har ett gigantiskt pariserhjul byggts i [SCOPE.sState('belle_epoque_state').GetCityHubName]. Från dess gondoler kan man se nyårsfyrverkerierna över hela den storslagna staden ."
 belle_epoque_events.16.f:0 "Hela Paris badade i ljus, från båtarna som strömmade nedför Seine till fyrverkeriernas speglingar på de snövitade hustaken. När gondolen nådde toppen av pariserhjulet föreställde sig Marie att hon kunde se sitt anspråkslösa hus, vars egna lampor var släckta för att spara ytterligare en slant till makens dryckeslyx. \n\nKanske, tänkte hon, fanns det trots allt en framtid för henne utanför den här världen, i en värld så vidsträckt och ljus."
 belle_epoque_events.16.f2:0 "Mänsklighetens största strävan är att se ner på alla andra, även om det bara är för ett ögonblick."
 belle_epoque_events.16.a:0 "Skål för det nya århundradet!"
 belle_epoque_events.16.b:0 "...och bort med det gamla!"
 modifier_new_century:0 "Ett nytt århundrade"
 belle_epoque_events.17.t:0 "Fin de siècle-tankegångar"
 belle_epoque_events.17.t2:0 "Slutet på seklet"
 belle_epoque_events.17.d:0 "I takt med att århundradet närmar sig sitt slut har en litterär och konstnärlig rörelse som uttrycker pessimism och rädsla för samhällets förfall spridit sig över [ROOT.GetCountry.GetName]."
 belle_epoque_events.17.f:0 "”Jag hoppas att det blir en fin dag i morgon, Lane.” \n\n”Det blir det aldrig, sir.” \n\n”Lane, du är en riktig pessimist.” \n\n”Jag gör mitt bästa för att uppfylla era förväntningar, sir.” \n\n— Oscar Wilde,#italic  The Importance of Being Earnest#!"
 belle_epoque_events.17.a:0 "Världen blir bättre – har de inte sett våra BNP-siffror?"
 belle_epoque_events.17.b:0 "I alla våra hjärtan finns ett frö av pessimism."
 modifier_fin_de_sicle:0 "Fin de siècle-tankegångar"
 modifier_fin_de_sicle_more:0 "Det intensifierade fin-de-siècle-tänkandet"
 belle_epoque_events.18.t:0 "Dekadens i [SCOPE.sState('belle_epoque_state').GetCityHubName]"
 belle_epoque_events.18.d:0 "Konstnärer och författare som är knutna till[SCOPE.gsInterestGroup('decadent_ig').GetName]  har börjat hämta konstnärlig inspiration från Joris-Karl Huysmans ”dekadenta” roman ”À Rebours”, som skildrar en mans upplevelser när han drar sig tillbaka till hyperestetiska sinnesupplevelser och idealistiskt konstnärskap för att fly från världen."
 belle_epoque_events.18.f:0 "”Det finns inte en enda av hennes uppfinningar, hur subtil eller imponerande den än må vara, som det mänskliga geniet inte skulle kunna skapa… Det råder inget tvivel om saken: denna eviga, babbliga gamla kvinna beundras inte längre av sanna konstnärer, och tiden är nu inne att ersätta henne med konstnärligt hantverk.”"
 belle_epoque_events.18.a:0 "Den ultimata guiden till dekadens."
 belle_epoque_events.18.b:0 "En giftig, frätande text."
 modifier_decadence_movement:0 "Dekadentism"
 modifier_decadence_movement_no:0 "Förkastande av dekadentismen"
 belle_epoque_events.19.t:0 "Det symbolistiska manifestet"
 belle_epoque_events.19.d:0 "I dekadentismens fotspår har poeten Jean Moréas publicerat ett konstnärligt manifest som beskriver en konstnärlig inriktning som syftar till att uttrycka exotiska ideal genom överdådiga liknelser och indirekta hänvisningar."
 belle_epoque_events.19.f:0 "”Rytm: den forntida metrik som återupplivats; ett kaos som på ett lärd sätt ordnats; rimen lysande och slagen som en sköld av guld och brons, till rim av obegriplig flyt; alexandrinen med talrika och rörliga pauser; uppgiften för vissa siffror – sju, nio, elva, tretton – djärva i de olika rytmiska kombinationer som de utgör priset för.”"
 belle_epoque_events.19.a:0 "Låt oss våga leva!"
 belle_epoque_events.19.b:0 "Varje renovering är rena galenskapen!"
