 je_feather_in_our_cap:0 "Feathers In Our Cap"
 je_feather_in_our_cap_reason:0 "In 1138, the #bold Aritzakarran Empire#! was dismantled by decree after royalist factions were forced to realize they could not match the combined might of the rebelling aristocrats and of the Sandcircler clans they had forged alliance with. If we were to take advantage of already-existent cultural divides and boost the legitimacy of new, nationalist states within [GetGeographicRegion('geographic_region_aritzakarri').GetName], we can keep the Avians beneath our thumbs indefinitely."
