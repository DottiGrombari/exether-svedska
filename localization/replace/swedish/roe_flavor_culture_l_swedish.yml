 vampire_flavor:0 "[GetCulture('sunkissed').GetName] feel an inherent bloodlust towards evildoers and feed on the blood of sinners and criminals to sustain themselves. Although the [GetReligion('cult_of_the_sun').GetName] denies it as slander, there have been instances of sunkissed champions becoming cast out after feeding on innocents and being forced to stalk the nights as vampires avoiding the sun god's gaze."
 sunkissed_flavor:0 "In rare cases, pious followers of the [GetReligion('cult_of_the_sun').GetName] have come back from the dead to continue serving their god. These undead individuals are known as the Sunkissed, and their blessed deathless state marks them as champions of the faith. Those who fall to darkness risk becoming a [GetCulture('vampire').GetName]."
